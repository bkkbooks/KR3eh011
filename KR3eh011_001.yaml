body:
  text: 自敘余發始燥則聞長老道說范文正公未逢時禱於神以不得為良相願為良醫因嘆古君子之存心濟物如此其切也當是時顓蒙無所知顧讀岐黃家言輒心開意解若有夙契者嘉靖丙寅母病阽危常潤名醫延致殆遍言人人殊罕得要領心甚陋之於是銳志學醫既起亡妹於垂死漸為人知延診求方戶屣恆滿先君以為妨廢舉業常嚴戒之遂不復窮究無何舉於鄉又十年成進士選讀中秘書備員史館凡四年請急歸旋被口語終已不振因伏自念受聖主作養厚恩見謂儲相材雖萬萬不敢望文正公然其志不敢不立而其具不敢不勉以庶幾無負父師之教而今已矣定省之餘頗多暇日乃復取岐黃家言而肆力焉二親篤老善病即醫非素習固將學之而況乎輕車熟路也於是聞見日益廣而藝日益精鄉曲有抱沉疴醫技告窮者叩閽求方亡弗立應未嘗敢萌厭心所全活者稍稍眾矣而又念所濟僅止一方孰若著為書傳之天下萬世耶偶嘉善高生隱從余遊因遂採取古今方論參以鄙見而命高生次第錄之遂先成雜病論與方各八巨袟高生請名余命之曰證治準繩高生曰何謂也余曰醫有五科七事曰脈曰因曰病曰證曰治為五科因復分為三曰內曰外曰亦內亦外並四科為七事如陰陽俱緊而浮脈也傷寒因也太陽病也頭痛發熱身痛惡寒無汗證也麻黃湯治也派析支分毫不容濫而時師皆失之不死者幸而免耳自陳無擇始發明之而其為三因極一方復語焉不詳李仲南為永類鈐方枝分派析詳矣而入理不精比附未確此書之所以作也曰五科皆備焉而獨名證治何也曰以言證治獨詳故也是書出而不知醫不能脈者因證檢書而得治法故也雖然大匠之所取平與直者準繩也而其能用準繩者心目明也倘守死句而求活人以準繩為心目則是書之刻且誤天下萬世而余之罪大矣家貧無貲假貸為之不能就其半會侍御周鶴陽公以接鹺行縣至金壇聞而助成之遂行於世時萬曆三十年歲次壬寅夏五月朔旦念西居士王肯堂宇泰識第一冊諸中門卒中暴厥經云暴病卒死皆屬於火注云火性速疾故也然初治之藥不寒而溫不降而升甚者從治也俗有中風中氣中食中寒中暑中濕中惡之別但見卒然仆倒昏不知人或痰涎壅塞咽喉作聲或口眼喎斜手足癱瘓或半身不遂或六脈沉伏或指下浮盛者並可用麻油薑汁竹瀝調蘇合香丸如口噤抉開灌之或用三生飲一兩加人參一兩煎成入竹瀝二三杯薑汁少許如抉不開不可進藥急以生半夏為末吹入鼻中或用細辛皂角菖蒲為末吹入得嚏則蘇此可以驗其受病深淺則知其可治不可治詳見中風門口噤條若口開手撒遺尿者虛極而陽暴脫也速用大料參耆接補之及臍下大艾灸之痰涎壅盛者宜吐之急救稀涎散豬牙皂角肥實不蛀者四挺去黑皮晉礬光明者一兩各為細末研勻輕者五分重者三字溫水調灌下又碧霞散揀上色精好石綠研篩水飛再研取二三錢同冰片三四豆許研勻以生薄荷汁合溫酒調服之二藥不大嘔吐但微微令涎自口角流出自蘇舊說口開心絕手撒脾絕眼合肝絕遺尿腎絕聲如鼾肺絕皆為不治之症然五症不全見者速服參耆膏灸臍下亦有得生者卒中眼上戴不能視者灸第二椎骨第五椎上各七壯一齊下火炷如半棗核大若中人髮直吐清沫搖頭上攛面赤如妝汗綴如珠或頭面赤黑眼閉口開氣喘遺尿皆不可治諸中或未蘇或巳蘇或初病或久病忽吐出紫紅色者死傳心方云治男子婦人涎潮於心卒然中倒當即時扶入暖室中扶策正坐當面作好醋炭熏之令醋氣衝入口鼻內良久其涎潮聚於心者自收歸舊輕者即時甦醒重者亦省人事唯不可吃一滴湯水入喉也如吃湯水則其涎永繫於心絡不能去必成廢人風邪中人六脈多沉伏亦有脈隨氣奔指下洪盛者浮遲吉堅大急疾凶浮遲為寒虛大為暑不當暑則為虛浮澀為濕浮大為風浮數無熱亦為風微而數浮而緊沉而遲皆氣中風應人迎氣應氣口洪大為火滑為痰或浮而滑沉而滑微而虛者皆虛與痰更當察時月氣候及其人之起居參以顯症而定病之主名以施治療中風中後當如東垣法分中血脈中腑中臟施治靈樞經云虛邪偏客於身半其入深內居榮衛榮衛稍衰則真氣去邪氣獨留發為偏枯故其邪氣淺者脈偏痛又云偏枯身偏不用而痛言不變志不亂病在分腠之間巨針取之益其不足損其有餘乃可復也痱之為病也身無痛者四肢不收志亂不甚其言微知可治甚則不能言不可治也此內經論中風之淺深也其偏枯身偏痛而言不變志不亂者邪在分腠之間即仲景東垣所謂邪中腑是也痱病無痛手足不收而言喑志亂者邪入於裡即仲景東垣所謂邪中臟是也中血脈外有六經之形症則以小續命湯加減及疏風湯治之太陽經中風無汗惡寒於續命湯中加麻黃防風杏仁一倍針太陽經至陰出血崑崙舉蹺有汗惡風於續命湯中加桂枝芍藥杏仁一倍針風府陽明經中風無汗身熱不惡寒於續命湯中加石膏二兩知母二兩甘草一兩有汗身熱不惡風於續命湯中加葛根二兩桂枝黃芩各一倍針陷谷刺厲兌太陰經中風無汗身涼於續命湯中加附子一倍乾薑加二兩甘草加三兩針隱白少陰經中風有汗無熱於續命湯中加桂枝附子甘草各一倍針太谿凡中風無此四證六經混淆繫於少陽厥陰或肢節攣痛或麻木不仁每續命八兩加羌活四兩連翹六兩刺厥陰之井大敦以通其經灸少陽之經絕骨以引其熱中腑內有便溺之阻隔宜三化湯或局方中麻仁丸通利之外無六經之形症內無便溺之阻隔知為血弱不能養筋故手足不能運動舌強不能語言也宜大秦艽湯養血而筋自榮若內外症俱有之先解表而後攻裡若內邪已除外邪已去當服愈風湯以行中道久服大風盡去縱有微邪只從愈風湯加減治之然治病之法不可失於通塞或一氣之微汗或一旬之通利如此乃常治之法也久之清濁自分榮衛自和矣中臟痰涎昏冒宜至寶丹活命金丹之類若中血脈中腑之病初不宜用龍腦麝香牛黃為麝香入脾治肉牛黃入肝治筋龍腦入腎治骨恐引風深入骨髓如油入面莫之能出中腑者多兼中臟如左關脈浮弦面目青左脅偏痛筋脈拘急目瞤頭目眩手足不收坐踞不得此中膽兼中肝也犀角散之類如左寸脈浮洪面赤汗多惡風心神顛倒言語謇澀舌強口乾忪悸恍惚此中小腸兼中心也加味牛黃散之類如右關脈浮緩或浮大面唇黃汗多惡風口喎語澀身重怠惰嗜臥肌膚不仁皮肉瞤動腹脹不食此中胃兼中脾也防風散之類如右寸脈浮澀而短鼻流清涕多喘胸中冒悶短氣自汗聲嘶四肢痿弱此中大腸兼中肺也五味子湯之類如左尺脈浮滑面目黧黑腰脊痛引小腹不能俯仰兩耳虛鳴骨節疼痛足痿善恐此中膀胱兼中腎也獨活散之類治風之法解表攻裡行中道三法盡矣然不可執也如小續命湯亦麻黃桂枝之變麻黃桂枝若不施於冬月即病之傷寒而施於溫熱之症未有不殺人者其可執乎戴復庵云治風之法初得之即當順氣及其久也即當活血久患風疾四物湯吞活絡丹愈者正是此義若先不順氣遽用烏附又不活血徒用防風天麻羌活輩吾未見其能治也然順氣之藥則可破氣瀉氣之藥則不可卒僕偏枯之症雖有多因未有不因真氣不周而病者故黃耆為必用之君藥防風為必用之臣藥黃耆助真氣者也防風載黃耆助真氣以周於身者也亦有治風之功焉許𦙍宗治王太后中風口噤煎二藥熏之而愈況服之乎多怒加羚羊角渴加葛根汁秦艽口噤口喎亦加秦艽恍惚錯語加茯神遠志不得睡加炒酸棗仁不能言加竹瀝荊瀝梨汁陳醬汁生葛汁人乳汁內熱加梨汁人乳生地黃汁痰多加竹瀝荊瀝少佐以薑汁予每治此症用諸汁以收奇功為其行經絡滲分肉捷於湯散故也小便不利三因白散子加木通燈心茅根煎熱盛去附子潔古云中風如小便不利不可以藥利之既已自汗則津液外亡小便自少若利之使榮衛枯竭無以制火煩熱愈甚當俟熱退汗止小便自行也遺尿濃煎參耆湯少加益智子頻啜之中風多食風木盛也盛則克脾脾受敵求助於食經曰實則夢與虛則夢取當瀉肝木治風安脾脾安則食少是其效也此其大略也仍分症詳著於後痰涎壅盛橘紅一斤逆流水五碗煮數滾去橘紅再煮至一碗頓服白湯導之吐痰之聖藥也竹瀝荊瀝少佐薑汁加入二陳湯星香散中乃必用之藥戴云肥人多中以氣盛於外而歉於內也肺為氣出入之道人肥者必氣急氣急必肺邪盛肺金克肝木膽為肝之腑故痰涎壅盛所以治之必先理氣為急中後氣未盡順痰未盡降調理之劑唯當以藿香正氣散和星香散煎服此藥非特可以治中風之症中氣中惡霍亂尤宜中後體虛有痰宜四君子湯和星香散或六君子湯和之脈沉伏無熱者用三生飲加全蠍一個養正丹可以墜下痰涎鎮安元氣氣實者以星香湯吞之氣虛者以六君子湯吞之口噤以蘇合香丸或天南星冰片末或白梅末擦牙以鬱金藜蘆末搐鼻以黃耆防風湯熏針人中頰車各四分白礬半兩鹽花一分細研揩點牙根下更以半錢匕綿裹安牙盡頭用甘草比中指節截作五截於生油內浸過炭火上炙候油入甘草以物斡開牙關令咬定甘草可人行十里許時又換甘草一截後灌藥極效口眼喎斜經曰木不及曰委和委和之紀其動緛戾拘緩又云厥陰所至為緛蓋緛縮短也木不及則金化縮短乘之以勝木之條達也戾者口目喎斜也拘者筋脈拘強也木為金之縮短牽引而喎斜拘強也緩者筋脈縱也木為金乘則土寡於畏故土兼化緩縱於其空隙而拘緩者自緩也故口目喎斜者多屬胃土然有筋脈之分焉經云足之陽明手之太陽筋急則口目為僻眥急不能卒視此胃土之筋為喎斜也又云胃足陽明之脈挾口環唇所生病者口喎唇斜此胃土之脈為喎斜也口目常動故風生焉耳鼻常靜故風息焉治宜清陽湯秦艽升麻湯或二方合用黃耆二錢人參當歸白芍藥各一錢甘草桂枝各五分升麻葛根秦艽各一錢白芷防風蘇木紅花酒黃柏各五分水酒各半煎稍熱服初起有外感者加蓮鬚蔥白三莖同煎取微汗第二服不用外以酒煮桂取汁一升以故布浸搨病右右喎搨上上喎搨左筋急喎斜藥之可愈脈急喎斜非灸不愈目斜灸承泣口喎灸地倉如未效於人迎頰車灸之戴云中而口眼喎邪者先燒皂角煙燻之以逐去外邪次燒乳香薰之以順其血脈半身不遂經云胃脈沉鼓澀胃外鼓大心脈小堅急皆鬲偏枯男子發左女子發右不喑舌轉可治三十日起其從者喑三歲起年不滿二十者三歲死蓋胃與脾為表裡陰陽異位更實更虛更逆更從或從內或從外是故胃陽虛則內從於脾內從於脾則脾之陰盛故胃脈沉鼓澀也澀為多血少氣胃之陽盛則脾之陰虛虛則不得與陽主內反從其胃越出於部分之外故胃脈鼓大於臂外也大為多氣少血心者元陽君主宅之生血主脈因元陽不足陰寒乘之故心脈小堅急小者陽不足也堅急者陰寒之邪也夫如是心胃之三等脈凡有其一即為偏枯者何也蓋心是天真神機開發之本胃是穀氣充大真氣之標標本相得則胸膈間之膻中氣海所留宗氣盈溢分布四臟三焦上下中外無不周遍若標本相失則不能致其氣於氣海而宗氣散矣故分布不周於經脈則偏枯不周於五臟則喑即此言之是一條可為後之諸言偏枯者綱領也未有不因真氣不周而病者也故治療之方不用黃耆為君人參當歸白芍藥為臣防風桂枝釣藤竹瀝荊瀝薑汁韭汁葛汁梨汁乳汁之屬為之佐使而雜沓乎烏附羌獨之屬以涸榮而耗衛如此死者醫殺之也丹溪云大率多痰在左挾死血與無血在右挾氣虛與痰亦是無本杜撰之談不必拘之古方順風勻氣散虎骨散虎脛骨酒黃耆酒皆可用外用蠶沙兩石分作三袋每袋可七斗蒸熱一袋著患處如冷再換一袋依前法數數換易百不禁瘥止須羊肚釀粳米蔥白薑椒豉等煮爛熟日食一具十日止失音不語素問云太陰所謂入中為喑者陽盛已衰故為喑也內奪而厥則為喑痱此腎虛也少陰不至者厥也夫腎者藏精主下焦地道之生育故衝任二脈系焉二脈與少陰腎之大絡同出腎下起於胞中其衝脈因稱胞絡為十二經脈之海遂名海焉衝脈之上行者滲諸陽灌諸精下行者滲三陰灌諸絡而溫肌肉別絡結於跗因腎虛而腎絡與胞絡內絕不通於上則喑腎脈不上循喉嚨挾舌本則不能言二絡不通於下則痱厥矣如是者以地黃飲子主之竹瀝荊瀝大梨汁各三杯生葛汁人乳汁各二杯陳醬汁半杯和勻隔湯頓溫服有痰者滌痰湯內熱者涼膈散加石菖蒲遠志為末煉蜜丸彈子大硃砂為衣每服一丸薄荷湯化下名轉舌膏寶鑑訶子湯正舌散茯神散四肢不舉有虛有實實者脾土太過瀉令濕退土平而愈虛者脾土不足十全散加減去邪留正詳見痿門身體疼痛鐵彈丸十味銼散內有熱藥無熱者宜之蠲痹湯昏冒活命金丹至寶丹至聖保命金丹牛黃清心丸中風要分陰陽陰中顏青臉白痰厥喘塞昏亂眩暈喎斜不遂或手足厥冷不知人多汗陽中臉赤如醉怒牙關緊急上視強直掉眩素問云諸風掉眩支痛強直筋縮為厥陰風木之氣自大寒至小滿風木君火二氣之位風主動善行數變木旺生火風火屬陽多為兼化且陽明燥金主於緊斂縮勁風木為病反見燥金之化由亢則害承乃制謂已過極則反似勝己之化故木極似金況風能勝濕而為燥風病勢甚而成筋縮燥之甚也有熱盛生風而為卒僕偏枯者以麻桂烏附投之則殆當以河間法冶之紺珠經云以火為本以風為標心火暴甚腎水必衰肺金既摧肝木自旺治法先以降心火為主或清心湯或瀉心湯大作劑料服之心火降則肝木自平矣次以防風通聖散汗之或大便閉塞者三化湯下之內邪已除外邪已盡當以羌活愈風湯常服之宣其氣血導其經絡病自已矣或舌謇不語者轉舌膏或活命金丹以治之此聖人心法也或有中風便牙關緊急漿粥不入急以三一承氣湯灌於鼻中待藥下則口自開矣然後按法治之有元氣素弱或過於勞役或傷於嗜欲而卒然厥僕狀類中風者手必散口必開非大劑參耆用至斤許豈能回元氣於無何有之鄉哉亦有不僕而但舌強語澀痰壅口眼喎斜肢體不遂者作中風治必殆以六君子湯加諸汁治之寶鑑云凡人初覺大指次指麻木不仁或不用者三年內有中風之疾也宜先服愈風湯天麻丸各一料此治未病之法也薛己云預防之理當養氣血節飲食戒七情遠幃幕可也若服前方以預防適所以招風取中也中寒中寒之症身體強直口噤不語或四肢戰掉或洒洒惡寒或翕翕發熱或卒然眩暈身無汗者此寒毒所中也其異於傷寒何也曰傷寒發熱而中寒不發熱也仲景於傷寒詳之而中寒不成熱者未之及何也曰陽動陰靜動則變生靜則不變寒雖陰邪既鬱而成熱遂從乎陽動傳變不一靡有定方故極推其所之之病不得不詳也其不成熱者則是邪中於陰形之中一定而不移不移則不變不變則止在所中寒處而生病是故略而不必詳也治之先用酒調蘇合香丸輕則五積散加香附一錢麝香少許重則用姜附湯若人漸蘇身體回暖稍能言語須更問其別有何證寒脈遲緊挾氣帶洪攻刺作痛附子理中湯加木香半錢挾風帶浮眩暈不仁加防風一錢挾濕帶濡腫滿疼痛加白朮一錢筋脈牽急加木瓜一錢肢節疼痛加桂一錢亦可灸丹田穴以多為妙大抵中在皮膚則為浮中在肉則為苛為重為聚液分裂而痛或痛在四肢或痛在胸脅或痛在脛背或痛在小腹引睪或經脈引注臟腑之膜原為心腹痛或注連於臟腑則痛死不知人中於筋骨為筋攣骨痛屈伸不利中入六腑五臟則仲景述在金匱要略中所以肺中寒者吐濁涕肝中寒者兩臂不能舉舌本燥喜太息胸中痛而不得轉側則吐而汗出也心中寒者其人苦心中如啖蒜狀劇者心痛徹背背痛徹心譬如蟲注其脈浮者自吐乃愈不言脾腎二臟中寒者缺文也然所謂中臟者乃中五臟所居畔界之郭內阻隔其經臟氣不得出入故病若真中臟則死矣永類鈐方云肝中寒其脈人迎並左關緊而弦其證惡寒發熱面赤如有汗胸中煩脅下攣急足不得伸心中寒者其脈人迎並左寸緊而洪其證如噉韭虀甚則心痛掣背惡寒四肢厥自吐昏塞不省脾中寒其脈人迎並右關緊而沉其證心腹脹四肢攣急噯噫不通臟氣不傳或秘或泄肺中寒其脈人迎並右寸緊而澀其證善吐濁氣短不能報息洒洒而寒吸吸而咳腎中寒其脈人迎並左尺緊而滑其證色黑氣弱吸吸少氣耳聾腰痛膝下拘疼昏不知人治當審微甚甚則以姜附湯為主微則不換金正氣散加附子附子五積散臍腹痛四肢厥附子理中湯姜附湯入肝加木瓜入肺加桑白皮入脾加朮入心加茯苓中暑更參傷暑門中暑之症面垢悶倒昏不知人冷汗自出手足微冷或吐或瀉或喘或滿以來復丹末同蘇合香丸用湯調灌或以來復丹研末湯調灌之卻暑散水調灌下亦得候其人稍蘇則用香薷飲香薷湯煎熟去渣入麝香少許服或剝蒜肉入鼻中或研蒜水解灌之蓋中傷暑毒陽外陰內諸暑藥多有暖劑如大順之用薑桂枇杷葉散之用丁香香薷飲之用香薷香薷味辛性暖蒜亦辛暖又蒜氣臭烈能通諸竅大概極臭極香之物皆能通竅故也熱死人切勿便與冷水及臥冷地正如凍死人須先與冷水若遽近火即死一法行路暍死人惟得置日中或令近火以熱湯灌之即活初覺中暑即以日曬瓦或布蘸熱湯更易熨其心腹臍下急以二氣丹末湯調灌下一方用不蛀皂角不拘多少刮去黑皮燒煙欲盡用盆合於地上周圍勿令透煙每用皂角灰一兩甘草末六錢和勻每服一錢新汲水調下氣虛人溫漿水調下昏迷不省者不過兩服蓋中暑人痰塞關竅皂角能疏利去痰故也又有暑途一證似中而輕欲睡懶語實人香薷飲加黃連一錢虛人星香飲加香薷一錢蘇後冷汗不止手足尚逆煩悶多渴者宜香薷飲蘇後為醫者過投冷劑致吐利不止外熱內寒煩躁多渴甚欲裸形狀如傷寒陰盛格陽宜用溫藥香薷飲加附子浸冷服渴者縮脾飲加附子亦浸冷服東垣云靜而得之謂之中暑中暑者陰證當發散也或避暑熱納涼於深堂大廈得之者名曰中暑其病必頭痛惡寒身形俱急肢節疼痛而煩心肌膚大熱無汗為房室之陰寒所遏使周身陽氣不得伸越世多以大順散主之是也動而得之為中熱中熱者陽證為熱傷元氣非形體受病也若行人或農夫於日中勞役得之者名曰中熱其病必苦頭疼發躁熱惡熱捫之肌膚大熱必大渴引飲汗大泄無氣以動乃為天熱外傷肺氣蒼朮白虎湯主之薛氏云若人元氣不足用前藥不應宜補中益氣湯主之大抵夏月陽氣浮於外陰氣伏於內若人飲食勞倦內傷中氣或酷暑勞役外傷陽氣者多患之法當調補元氣為主而佐以解暑若中暍者乃陰寒之症法當補陽氣為主少佐以解暑故先哲多用薑桂附子之類此推內經舍時從證之良法也今患暑症歿而手足指甲或肢體青黯此皆不究其因不溫補其內而泛用香薷飲之類所誤也夫香薷飲乃散陽氣導真陰之劑也須審有是證而服亦何患哉若人元氣素虛或犯房過度而飲之者適所以招暑也中濕參看傷濕門風寒暑濕皆能中人惟濕氣積久留滯關節故能中非如風寒暑之有暴中也中濕之證關節重痛浮腫喘滿腹脹煩悶昏不知人其脈必沉而緩或沉而微細宜除濕湯白朮酒有破傷處因澡浴濕氣從瘡口中入其人昏迷沉重狀類中濕名曰破傷濕宜白朮酒中氣中氣因七情內傷氣逆為病痰潮昏塞牙關緊急七情皆能為中因怒而中者尤多大略與中風相似風與氣亦自難辨風中身溫氣中身冷風中多痰涎氣中無痰涎風中脈浮應人迎氣中脈沉應氣口以氣藥治風則可以風藥治氣則不可才覺中氣急以蘇合香丸灌之候醒繼以八味順氣散加香附三五錢或木香調氣散尚有餘痰末盡平復宜多進四七湯及星香散若其人本虛痰氣上逆關隔不通上下升降或大便虛秘宜用三和丹中食中食之證忽然厥逆昏迷口不能言肢不能舉狀似中風皆因飲食過傷醉飽之後或感風寒或著氣惱以致填塞胸中胃氣有所不行陰陽痞隔升降不通此內傷之至重者人多不識若誤作中風中氣而以祛風行氣之藥重傷胃氣其死可立而待不若先煎姜鹽湯探吐其食仍視其風寒尚在者以藿香正氣散解之氣滯不行者以八味順氣散調之吐後別無他證只用平胃散加白朮茯苓半夏曲糵之類調理如遇此卒暴之病必須審問明白或方食醉飽或飲食過傷但覺胸膈痞悶痰涎壅塞氣口脈緊盛者且作食滯冶之戴云人之飲食下咽而入肝由肝而入脾由脾而入胃因食所傷肝氣不理故痰涎壅塞若中風然亦有半身不遂者肝主筋故也治以風藥則誤矣按復庵名醫也飲食下咽而先入肝於理難通其必有謂矣姑存之以俟問中惡中惡之證因冒犯不正之氣忽然手足逆冷肌膚粟起頭面青黑精神不守或錯言妄語牙緊口噤或頭旋暈倒昏不知人即此是卒厥客忤飛屍鬼擊吊死問喪入廟登塚多有此病蘇合香丸灌之候稍蘇以調氣散和平胃散服名調氣平胃散五絕治五絕一自縊二摧壓三溺水四魘魅五產乳用半夏一兩末之為丸豆大內鼻中愈心溫者一日可治自縊死仲景云自旦至暮雖已冷必可治暮至旦則難鞏此當言陰氣盛故也然夏時夜短於晝又熱猶應可治又云心下若微溫者一日以上猶可治之當徐徐抱解不得截繩上下安被臥之一人以腳踏其兩肩手挽其發常令弦急勿使縱緩一人以手按據胸上數摩動之一人摩捋臂脛屈伸之若已僵直但漸漸強屈之並按其腹如此一炊頃雖得氣從口出呼吸眼開仍引按莫置亦勿勞之須臾可少與桂湯及粥清含與之令喉潤漸漸能咽乃止更令兩人以管吹其兩耳此法最善無不活者自縊者切不可割斷繩子以膝蓋或用手厚裹衣物緊頂穀道抱起解繩放下揉其項痕搐鼻及吹其兩耳待其氣回方可放手若便泄氣則不可救矣肘後方自縊死安定心神徐緩解之慎勿割繩斷須抱取心下猶溫者刺雞冠血滴口中即活男雌女雄又方雞屎白如棗大酒半盞和灌及鼻中尤妙千金方以藍汁灌之余法同上自縊死但身溫未久者徐徐放下將喉氣管捻圓揪髮向上揉擦用口對口接氣糞門用火筒吹之以半夏皂角搐鼻以薑汁調蘇合香丸灌之或煎木香細辛湯調灌亦得得蘇可治繩小痕深過時者不治摧壓卒墮攧壓倒打死心頭溫者皆可救將本人如僧打坐令一人將其頭髮控放低用半夏末吹入鼻內如活卻以生薑汁香油打勻灌之余詳折傷門溺水死撈起以屍橫伏牛背上無牛以凳控去其水冬月以綿被圍之卻用皂角以生薑自然汁灌之上下以炒姜擦之得蘇可治若五孔有血者不治金匱救溺死方取灶中灰兩石埋之從頭至足水出七孔即活溺水者放大凳上睡著將腳後凳腳站起二磚卻蘸鹽擦臍中待其水自流出切不可倒提出水此數等但心頭微熱者皆可救治又方溺水死一宿者尚活搗皂角綿裹納下部須臾出水即活魘神虛氣濁風痰客於心肺所以得夢不覺濁氣閉塞而死氣動不蘇面青黑者不治急以搐鼻散引出膈痰次以蘇合香丸導動清氣身動則蘇若身靜色陷者不治魘死不得近前喚但痛咬其腳跟及唾其面不醒者移動些少臥處徐徐喚之元有燈則存無燈切不可點燈肘後方臥忽不寤勿以火照之殺人但痛齧大拇指際而唾其面則活取韭搗汁吹鼻孔冬月用韭根取汁灌口中皂角為末如綠豆大許吹入鼻中得嚏即氣通雄黃搗末細篩以管吹入鼻孔中諸傷門傷寒傷風別為一書傷暑傷暑與熱病外症相似但熱病脈盛中暑脈虛以此別之又有濕溫與中暑同但身涼不渴為異耳此事難知傷暑有二動而傷暑心火大盛肺氣全虧故身脈洪大動而火勝者熱傷氣也辛苦人多得之白虎加人參湯靜而傷暑火勝金位肺氣出表故惡寒脈沉疾靜而濕勝者身體重也安樂之人多受之白虎加蒼朮湯傷暑必自汗背寒面垢或口熱煩悶或頭疼發熱神思倦怠殊甚暑傷氣而不傷形故也但身體不痛與感風寒異宜香薷飲香薷湯六和湯嘔而渴者浸冷香薷湯或五苓散兼吞消暑丸嘔不止者枇杷葉散去茅根吞來復丹嘔而痰卻暑散吞消暑丸或小半夏茯苓湯或消暑飲瀉而渴生料平胃散和生料五苓散各半帖名胃苓散或理中湯加黃連名連理湯瀉定仍渴春澤湯或縮脾飲瀉而腹痛有積者生料五苓散藿香正氣散勻各半帖若瀉雖無積其腹痛甚生料五苓散加木香七分或六和湯加木香半錢或不加木香止與二藥煎熟去滓調下蘇合香丸又有不瀉而腹干痛者六和湯煎熟調蘇合香丸瀉而發熱者胃苓散瀉而發渴者胃苓散兼進縮脾飲瀉渴兼作未透者湯化蘇合香丸吞來復丹或研來復丹作末白湯調下已透者香薷飲感冒外發熱者六和湯香薷湯香薷飲身熱煩者五苓散或香薷湯加黃連一錢熱而汗多畏風甚者生料五苓散熱而渴者五苓散兼進縮脾飲暑氣攻裡熱不解心煩口乾辰砂五苓散或香薷飲加黃連一錢若大渴不止辰砂五苓散吞酒煮黃連丸暑氣攻裡腹內刺痛小便不通生料五苓散加木香七錢或止用益元散冒暑飲酒引暑入腸內酒熱與暑氣相併發熱大渴小便不利其色如血生料五苓散去桂加黃連一錢或五苓散去桂吞酒煮黃連丸暑氣入腸胃而大便艱澀不通者加味香薷飲仍佐以三黃丸暑氣入心身煩熱而腫者辰砂五苓散或香薷飲加黃連一錢傷暑而傷食者其人頭疼背寒自汗發熱畏食噁心噫酸臭氣胸膈痞滿六和湯倍砂仁若因暑渴飲食冷物致內傷生冷外傷暑氣亦宜此藥暑先入心者心屬南方離火各從其類小腸為心之腑利心經暑毒使由小腸中出五苓散利小便為治暑上劑也有傷於暑因而露臥又為冷氣所入其人自汗怯風身痛頭痛去衣則凜著衣則煩或已發熱或未發熱並宜六和湯內加扁豆砂仁一方用薷香一方用紫蘇正治已感於暑而復外感於風寒或內傷生冷以藿香紫蘇兼能解表砂仁扁豆兼能溫中然感暑又感冷亦有無汗者只宜前藥若加以感風則斷然多汗審是此症宜生料五苓散內用桂枝為佳市井中多有此病往往日間冒熱經營夜間開窗眠臥欲取清涼失蓋不覺用藥所當詳審有此症而發潮熱似瘧猶未成瘧者六和湯養胃湯各半帖相和煎有此症而鼻流清涕或鼻孔熱氣時出者六和湯加川芎半錢羌活黃芩各七分有因傷暑遂極飲以冷水致暑毒留結心胸精神昏憒語音不出者煎香薷湯化蘇合香丸若先飲冷後傷暑者五苓散主之此必心下痞憹生薑湯調服佳或四君子湯調中亦可中和後或小便不利或莖中痛宜蒲黃三錢滑石五錢甘草一錢有因傷暑用水沃面或入水洗浴暑濕相搏自汗發熱身重小便不利宜五苓散傷暑而大汗不止甚則真元耗散宜急收其汗生料五苓散倍桂加黃耆如術之數傷暑自汗手足厥冷者煎六和湯調蘇合香丸傷暑自汗手足時自搐搦者謂之暑風緣已傷於暑毛孔開而又邪風乘之宜香薷飲或香薷湯並加羌活一錢痰盛者六和湯半帖和星香散半帖暑月身癢如針刺間有赤腫處亦名暑風末子六和湯和消風散酒調服暑風而加以吐瀉交作者六和湯藿香正氣散各半帖加全蠍三個有暑毒客於上焦胸膈痞塞湯藥至口即出不能過關或上氣喘急六和湯浸冷調入麝香少許伏暑煩渴而多熱痰者於消暑丸中每兩入黃連末二錢名黃連消暑丸或二陳湯或小半夏茯苓湯並可加黃連一錢暑氣久而不解遂成伏暑內外俱熱煩躁自汗大渴喜冷宜香薷飲加黃連一錢繼進白虎湯若服藥不愈者暑毒深入結熱在裡譫語煩渴不欲近衣大便秘結小便赤澀當用調胃承氣湯或三黃石膏湯時當長夏濕熱大勝蒸蒸而熾人感之四肢困倦精神短少懶於動作胸滿氣促肢節沉疼或氣高而喘身熱而煩心下膨痞小便黃而數大便溏而頻或利出黃如糜或如泔色或渴或不渴不思飲食自汗體重或汗少者血先病而氣不病也其脈中得洪緩若濕氣相搏必加之以遲遲病雖互換少差其天暑濕令則一也宜以清燥之劑治之內經曰陽氣者衛外而為固也熱則氣泄今暑邪干衛故身熱自汗以黃耆甘溫補之為君人參陳皮當歸甘草甘微溫補中益氣為臣蒼朮白朮澤瀉滲利而除濕升麻葛根苦甘平善解肌熱又以風勝濕也濕熱則食不消而作痞滿故以炒曲甘辛青皮辛溫消食快氣腎惡燥急食辛以潤之故以黃柏辛苦寒借其氣味瀉熱補水虛者滋其化源以人參五味子麥門冬酸甘微寒救天暑之傷於庚金為佐名曰清暑益氣湯此病皆由飲食勞倦傷其脾胃乘天暑而病作也但藥中犯澤瀉豬苓茯苓燈心通草木通淡味滲利小便之類皆從時令之旺氣以泄脾胃之客邪而補金水之不及也此正方已是從權而立之若於其時病濕熱脾旺之證或小便已數腎肝不受邪者若誤用之必大瀉真陰竭絕腎水先損其兩目也復立變證加減法於後如心火乘脾乃血受火邪而不能升發陽氣伏於地中地者人之脾也必用當歸和血少用黃柏以益真陰如脾胃不足之證須少用升麻乃足陽明太陰引經之藥也使行陽道自脾胃中右遷少陽行春令生萬物之根蒂也更少加柴胡使諸經右遷生髮陰陽之氣以滋春之和氣也如脾虛緣心火亢盛而乘其土也其次肺氣受邪為熱所傷必須用黃耆最多甘草次之人參又次之三者皆甘溫之陽藥也脾始虛肺氣先絕故用黃耆之甘溫以益皮毛之氣而閉腠理不令自汗而損元氣也上喘氣短懶言語須用人參以補之心火乘脾須用炙甘草以瀉火熱而補脾胃中元氣甘草最少恐滋滿也若脾胃之急痛並脾胃大虛腹中急縮腹皮急縮者卻宜多用經曰急者緩之若從權必加升麻以引之恐左遷之邪堅盛卒不肯退反致項上及臀尻肉添而行陰道故引之以行陽道使清氣出地右遷而上行以和陰陽之氣也若中滿者去甘草咳甚者去人參口乾嗌乾者加乾葛如脾胃既虛不能升浮為陰火傷其生髮之氣榮血大虧榮氣伏於地中陰火熾盛日漸煎熬血氣虧少且心包與心主血血減則心無所養致使心亂而煩病名曰悗悗者心惑而煩悶不安也是由清氣不升濁氣不降清濁相干亂於胸中使周身血氣逆行而亂經云從下上者引而去之故當加辛溫甘溫之劑生陽陽生而陰長也或曰甘溫何能生血又非血藥也曰仲景之法血虛以人參補之陽旺則能生陰血也更加當歸和血又宜少加黃柏以救腎水蓋甘寒瀉熱火火減則心氣得平而安也如煩亂猶不能止少加黃連以去之蓋將補腎水使腎水旺而心火自降扶持地中陽氣也如氣浮心亂則以硃砂安神丸鎮固之得煩減勿再服以防瀉陽氣之反陷也如心下痞亦少加黃連氣亂於胸為清濁相干故以陳皮理之能助陽氣之升而散滯氣又助諸甘辛為用故長夏濕土客邪火旺可從權加蒼朮白朮澤瀉上下分消其濕熱之氣濕氣大勝主食不消化故食減不知穀味加炒曲以消之復加五味子麥門冬人參瀉火益肺氣助秋損也此三伏中長夏正旺之時藥也夫脾胃虛弱必上焦之氣不足遇夏天氣熱甚損傷元氣怠惰嗜臥四肢不收精神不足兩腳痿軟遇早晚寒厥日高之後陽氣將旺復熱如火乃陰陽氣血俱不足故或熱厥而陰虛或寒厥而氣虛口不知味目中溜火而視物䀮䀮無所見小便頻數大便難而秘結胃脘當心而痛兩脅痛或急縮臍下周圍如繩束之急甚則如刀刺腹難舒伸胸中閉塞時顯嘔噦或有痰嗽口沃白沫舌強腰背腹皆痛頭痛時作食不下或食入即飽全不思食自汗尤甚若陰氣覆在皮毛之上皆天氣之熱助本病也乃庚大腸辛肺金為熱所乘而作當先助元氣治庚辛之不足黃耆人參湯主之夫脾胃虛弱至六七月間河漲霖雨諸物皆潤人汗霑衣身重短氣甚則四肢痿軟行步不正腳欹眼黑欲倒者此腎水與膀胱俱竭之狀也當急救之滋肺氣以補水之上源又使庚大腸不受邪熱不令汗大泄也汗泄甚則亡津液亡津液則七神無所依經云津液相成神乃自生津者庚大腸所主三伏之義為庚金受囚也若亡津液汗大泄濕今亢甚則清肅之氣亡燥金受囚風木無制故風濕相搏骨節煩疼一身盡痛亢則害承乃制也孫思邈曰五月常服五味子是瀉丙火補庚金大腸益五臟之元氣壬膀胱之寒已絕於巳癸腎水已絕於午今更逢濕旺助熱為邪西方北方之寒清絕矣聖人立法夏月宜補者補天元之真氣非補熱火也今人夏食寒是也為熱傷元氣以人參麥門冬五味子生脈脈者元氣也人參之甘補元氣瀉熱火也麥門冬之苦寒補水之源而清肅燥金也五味子之酸以瀉火補庚大腸與肺金也當此之時無病之人亦或有二症況虛損脾胃有宿疾之人遇此天暑將理失所違時伐化必困乏無力懶語氣短氣弱氣促似喘非喘骨乏無力其形如夢寐朦朦如煙霧中不知身所有也必大汗泄若風犯汗眼皮膚必搐項筋皮枯毛焦身體皆重肢節時有煩疼或一身盡疼或渴或不渴或小便黃澀此風濕相搏也頭痛或頭重上熱壅盛口鼻氣短氣促身心煩亂有不樂生之意情思慘淒此陰勝陽之極也病甚則傳腎肝為痿厥厥者四肢如在火中者為熱厥四肢寒冷者為寒厥寒厥則腹中有寒熱厥則腹中有熱為脾主四肢故也若肌肉濡潰痹而不仁傳為肉痿證證中皆有肺疾用藥之人當以此調之氣上衝胸皆厥證也痿者四肢痿軟而無力也其心煩冤不止厥者氣逆也甚則大逆故曰厥逆其厥痿多相類也於前已立人參黃耆五味子麥門冬湯中每加白茯苓二分澤瀉四分豬苓白朮各一分如小便快利不黃澀者只加澤瀉二分與二術上下分消其濕如行步不正腳膝痿弱兩足欹側已中痿邪者加酒洗黃柏知母三分或五分令二足湧出氣力如汗大泄者津脫也急止之加五味子六粒炒黃柏五分炒知母三分不令妨其食當以意斟酌若妨食則止候食進再服取三里氣街以三稜針出血若汗不減不止者於三里穴下三寸上廉穴出血禁酒濕面六七月之間濕令大行子能令母實而熱旺濕熱相合而刑庚大腸故用寒涼以救之燥金受濕熱之邪絕寒水生化之源源絕則腎虧痿厥之病大作腰以下痿軟癱瘓不能動矣步行不正兩足欹側以清燥湯主之傷濕濕有天之濕霧露雨是也天本乎氣故先中表之榮衛有地之濕水泥是也地本乎形故先傷皮肉筋骨血脈有飲食之濕酒水乳酪之類是也胃為水穀之海故傷於脾胃有汗液之濕汗液亦氣也止感於外有人氣之濕太陰濕土之所化也乃動於中治天之濕當同司天法濕上甚而熱者平以苦溫佐以甘辛以汗為效而止如金匱要略諸條之謂風濕相搏身上疼痛者是也治地之濕當同在泉法濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之治飲食之濕在中奪之在上吐之在下引而竭之汗液之濕同司天者治雖人氣屬太陰脾土所化之濕者在氣交之分也與前四治有同有異何者土兼四氣寒熱溫涼升降浮沉備在其中脾胃者陰陽異位更實更虛更逆更從是故陽盛則木勝合為風濕至陽盛則火勝合為濕熱陰盛則金勝合為燥濕至陰盛則水勝合為陰濕為兼四氣故淫泆上下中外無處不到大率在上則病嘔吐頭重胸滿在外則身重腫在下則足脛胕腫在中腹脹中滿痞塞當分上下中外而治隨其所兼寒熱溫涼以為佐使至若先因乘克以致脾虛津積而成濕者則先治勝克之邪或脾胃本自虛而生濕者則用補虛為主或鬱熱而成濕者則以發熱為要或脾胃之濕淫泆流於四臟筋骨皮肉血脈之間者大概濕主乎痞塞以致所受之臟澀不得通疏本臟之病因而發焉其筋骨皮肉血脈受之則發為痿痹緩弱痛重不任為用所治之藥各有所入能入於此者不能入於彼且濕淫為病內經所論疊出於各篇本草治濕亦不一而見凡切於治功者便是要藥今丹溪書乃止歸重蒼朮一味豈理也哉傷濕為病發熱惡寒身重自汗骨節疼痛小便秘澀大便多泄腰腳痹冷皆因坐臥卑濕或冒雨露或著濕衣所致併除濕湯具前諸症而腰痛特甚不可轉側如纏五六貫重者濕氣入腎腎主水水流濕從其類也腎著湯滲濕湯小便秘大便溏雨淫腹疾故也五苓散吞戊己丸戊己屬土土剋水因以得名五苓乃濕家要藥所謂治濕不利小便非其治也傷濕而兼感風者既有前項證而又惡風不欲去衣被或額上微汗或身體微腫汗漬衣濕當風坐臥多有此證宜除濕湯桂枝湯各半帖和服令微發汗若大發其汗則風去濕在已得汗而發熱不去者敗毒散加蒼朮一錢防己半錢傷濕又兼感寒有前諸症但無汗慘慘煩痛宜五積散和除濕湯半帖和五苓散半帖傷濕而兼感風寒者汗出身重惡風喘滿骨節煩疼狀如歷節風臍下連腳冷痹不能屈伸所謂風寒濕合而成痹宜防己黃耆湯或五痹湯若因浴出未解裙衫身上未乾忽爾熟睡攻及腎經外腎腫痛腰背攣曲只以五苓散一帖入真壞少許下青木香丸如此三服臟腑才過腫消腰直其痛自止濕熱相搏者清熱滲濕湯其證肩背沉重疼痛上熱胸膈不利及遍身疼痛者拈痛湯酒面乳酪停滯不能運化而濕自內盛者除濕散及蒼白二陳湯加消息之藥燥之傷燥內經曰諸燥枯涸幹勁皴揭皆屬於燥乃陽明燥金肺與大腸之氣也燥之為病皆屬燥金之化然能令金燥者火也故曰燥萬物者莫熯乎火夫金為陰之主為水之源而受燥氣寒水生化之源竭絕於上而不能灌溉周身營養百骸色干而無潤澤皮膚滋生毫毛者有自來矣或大病而克伐太過或吐利而亡津液或預防養生誤餌金石之藥或房勞致虛補虛燥劑食味過厚辛熱太多醇酒炙肉皆能偏助狂火而損害真陰陰中伏火日漸煎熬血液衰耗使燥熱轉甚為諸病在外則皮膚皴揭在上則咽鼻焦乾在中則水液衰少而煩渴在下則腸胃枯涸津不潤而便難在手足則痿弱無力在脈則細澀而微此皆陰血為火熱所傷也治法當以甘寒滋潤之劑甘能生血寒能勝熱陰得滋而火殺液得潤而燥除源泉下降精血上榮如是則氣液宣通內神茂而外色澤矣滋燥養榮湯大補地黃丸清涼飲子導滯通幽湯潤腸丸八正散皆燥病中隨症酌用之方藥也傷飲食東垣曰陰陽應象論云水穀之寒熱感則害人六腑痹論云陰氣者靜則神臟躁則消亡飲食自倍腸胃乃傷此乃混言之也分之為二飲也食也飲者水也無形之氣也因而大飲則氣逆形寒飲冷則傷肺肺病則為喘咳為腫為水瀉輕則當發汗利小便使上下分消其濕解酲湯五苓散生薑半夏枳實白朮之類是也如重而蓄積為滿者芫花大戟甘遂牽牛之屬利下之此其大法也食者物也有形之血也如生氣通天論云因而飽食筋脈橫解腸澼為痔又云食傷太陰厥陰寸口大於人迎兩倍三倍者或嘔吐或痞滿或下利腸澼當分寒熱輕重治之輕則內消重則除下如傷寒物者半夏神麯乾薑三稜廣朮巴豆之類主之如傷熱物者枳實白朮青皮陳皮麥糵黃連大黃之類主之亦有宜吐者陰陽應象論云在上者因而越之瓜蒂散之屬主之然而不可過劑過則反傷脾胃蓋先因飲食自傷又加之以藥過故腸胃復傷而氣不能化食愈難消矣漸至羸困故五常政大論云大毒治病十去其六小毒治病十去其七常毒治病十去其八無毒治病十去其九不可過之此聖人之深戒也傷食之證胸膈痞塞吐逆咽酸噫敗卵臭畏食頭痛發熱惡寒病似傷寒但氣口大於人迎數倍身不痛耳內無熱與傷冷物者治中湯加砂仁一錢下紅丸子小七香丸內有熱與傷熱物者上二黃丸枳朮導滯丸通用保和丸枳朮丸曲糵枳朮丸木香枳朮丸檳榔丸木香檳榔丸傷肉食濕面辛辣厚味之物填塞悶亂胸膈不快三黃枳朮丸傷濕面心腹滿悶肢體沉重除濕益氣丸傷熱食痞悶兀兀欲吐煩亂不安上二黃丸傷濕熱之物不得旋化而作痞滿悶亂不安枳朮導滯丸傷蟹紫蘇丁香湯傷豆粉濕面油膩之物白朮丸食狗肉不消心下堅或腹脹口乾發熱妄語煮蘆根汁飲之食魚膾及生肉在胸膈不化必成癥瘕搗馬鞭草汁及生薑汁飲之傷冷食半夏枳朮丸小便淋加澤瀉寒熱不調每服加上二黃丸十丸或用木香乾姜枳朮丸丁香爛飯丸張仲景治宿食在上脘以瓜蒂散吐之不即下之凡脈浮而大按之反澀尺中亦微而澀或數而滑或緊如轉索無常及下利不欲食者皆宿食也皆用大承氣湯下之其人熱其傷物亦熱者宜之其人寒其傷物亦寒者不宜也戴云傷食腹痛脹滿大便不通者遂成食積小七香丸一帖用水一盞姜三片煎八分去滓吞感應丸此下傷冷之方也大抵氣口脈緊盛者宜下尺脈絕者宜吐經曰氣口脈盛傷於食心胃滿而口無味口與氣口同口曰坤者口乃脾之候故胃傷而氣口緊盛夫傷有多少有輕重如氣口一盛得脈六至則傷於厥陰乃傷之輕也枳朮丸之類主之氣口二盛脈得七至則傷於少陰乃傷之重也雄黃聖餅子木香檳榔丸枳殼丸之類主之氣口三盛脈得八至九至則傷太陰填塞悶亂則心胃大痛備急丸神保丸消積丸之類主之兀兀欲吐不已俗呼食迷風是也經曰上部有脈下部無脈其人當吐不吐者死瓜蒂散主之如不能吐是無治也經曰其高者因而越之此之謂也或曰盛食填塞胸中痞亂兩寸脈當用事今反兩尺脈不見其理安在曰胸中有食是木鬱宜達故探吐之食者物也物者坤土也是足太陰之號也胸中者肺也為物所塞肺者手太陰金也金主殺伐與坤土俱在手上而旺於天金能剋木故肝木發生之氣伏於地下非木鬱而何吐去上焦陰土之物木得舒暢則鬱結去矣食塞於上脈絕於下若不明天地之道無由達此至理水火者陰陽之徵兆天地之別名也故獨陽不生獨陰不長天之用在於地下則萬物生長地之用在於天上則萬物收藏此乃天地交而萬物通也此天地相根之道也故陽火之根本於地下陰水之源本於天上故曰水出高源故人五臟主有形之物物者陰也陰者水也右三部脈主之偏見於寸口食塞於上是絕五臟之源源絕則水不下流兩尺脈之絕此其理也何疑之有然必視所傷之物冷熱隨證加減如傷冷物一分熱物二分則用寒藥二停熱藥一停隨時消息經云必先歲氣無伐天和此之謂也既有三陰可下之法亦必有三陰可補之法故曰內傷三陰可用溫劑若飲冷內傷雖云損胃未知色脈各在何經若面色青黑脈浮沉不一弦而弱者傷在厥陰若面色紅赤脈浮沉不一細而微者傷在少陰若面色黃潔脈浮沉不一緩而遲者傷在太陰也傷在厥陰肝之經當歸四逆湯加吳茱萸生薑湯之類主之傷在少陰腎之經通脈四逆湯主之傷在太陰脾之經理中丸湯主之大便耎者宜湯結者宜丸凡諸脾脈微洪傷苦澀物經曰咸勝苦微弦傷冷硬物經云溫以克之微澀傷辛辣物經云苦勝辛微滑傷腥咸物經云甘勝咸弦緊傷酸硬物經云辛勝酸洪緩傷甜爛物經云酸勝甘微遲傷冷痰積聚惡物溫胃化痰單伏主物不消化曲糵三稜廣朮之類浮洪而數皆中酒葛根陳皮茯苓傷食作瀉不止於應服藥中加肉豆蔻益智仁以收固之傷食兼感風寒其證與前同但添身疼氣口人迎俱盛俗謂夾食傷寒宜生料五積散或養胃湯香蘇飲和解飲傷酒噁心嘔逆吐出宿酒昏冒眩暈頭痛如破宜沖和湯半夏茯苓湯或理中湯加乾葛七分或用末子理中湯和縮脾飲酒渴縮脾湯或煎乾葛湯調五苓散久困於酒遂成酒積腹痛泄瀉或暴飲有灰酒亦能致然並宜酒煮黃連丸多飲結成酒癖腹中有塊隨氣上下沖和湯加蓬朮半錢酒停胸膈為痰飲者枳實半夏湯加神麯麥芽各半錢沖和湯加半夏一錢茯苓七分解酒毒無如枝矩子之妙一名枳椇一名木蜜俗呼癩漢指頭北人名曰爛瓜江南謂之白石樹杭州貨賣名蜜屈立詩所謂南山有枸是也樹形似白楊其子著枝端如小指長數寸屈曲相連春生秋熟經霜後取食如餳美以此木作屋柱令一室之酒味皆淡薄趙以德治酒人發熱用枝矩子而愈即此也東垣云酒者大熱有毒氣味俱陽乃無形之物也若傷之止當發散汗出則愈矣其次莫如利小便乃上下分消其濕今之病酒者往往服酒症丸大熱之藥下之又有用牽牛大黃下之者是無形元氣受病反下有形陰血乖誤甚矣酒性大熱巳傷元氣而復重瀉之亦損腎水真陰及有形血氣俱為不足如此則陰血愈虛真水愈弱陽毒之熱大旺反增其陰火是以元氣消鑠折人長命不然則虛損之病成矣酒疸下之久則為黑疸慎不可犯宜以葛花解酲湯主之海藏云治酒病宜發汗若利小便炎焰不肯下行故曰火鬱則發之以辛溫散之是從其體性也是知利小便則濕去熱不去若動大便尤為疏陋蓋大便者有形質之物酒者無形之水從汗發之是為近理濕熱俱去故治以苦溫發其火也佐以苦寒除其濕也按酒之為物氣熱而質濕飲之而昏醉狂易者熱也宜以汗去之既醒則熱去而濕留止宜利小便而已二者宜酌而用之大抵葛花解酲湯備矣傷勞倦東垣曰調經篇云陰虛生內熱岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通而胃氣熱熱氣熏胸中故內熱舉痛論云勞則氣耗勞則喘且汗出內外皆越故氣耗矣夫喜怒不節起居不時有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土脾主四肢故困熱無氣以動懶於語言動作喘乏表熱自汗心煩不安當病之時宜安心靜坐以養其氣以甘寒瀉其熱火以酸味收其散氣以甘溫補其中氣經言勞者溫之損者溫之是也金匱要略云平人脈大為勞脈極虛亦為勞矣夫勞之為病其脈浮大手足煩熱春夏劇秋冬瘥脈大者熱邪也極熱者氣損也春夏劇者時助邪也秋冬差者時勝邪也以黃耆建中湯治之此亦溫之之意也蓋人受水穀之氣以生所謂清氣營氣運氣衛氣春升之氣皆胃氣之別名也夫胃氣為水穀之海飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也若陰陽失節寒溫不適脾胃乃傷喜怒憂恐損耗元氣脾胃氣衰元氣不足而心火獨盛心火者陰火也起於下焦其繫系於心心不主令相火代之相火包絡之火元氣之賊也火與元氣不兩立一勝則一負脾胃氣虛則下流肝腎陰火得以乘其土位故脾證始得則氣高而喘身熱而煩其脈洪大而頭痛或渴不止其皮膚不任風寒而生寒熱蓋陰火上衝則氣高喘而煩熱為頭痛為渴而脈洪脾胃之氣下流使穀氣不得升浮是春生之令不行則無陽以護其榮衛使不任風寒乃生寒熱此皆脾胃之氣不足所致也然與外感風寒之證頗同而實異內傷脾胃乃傷其氣外感風寒乃傷其形傷其外則有餘有餘者瀉之傷其內則不足不足者補之汗之下之吐之克之之類皆瀉也溫之和之調之養之之類皆補也內傷不足之病苟誤認作外感有餘之證而反瀉之則虛其虛也實實虛虛如此死者醫殺之耳然則奈何唯當以辛甘溫劑補其中而升其陽甘寒以瀉其火則愈矣經曰勞者溫之損者溫之又曰溫能除大熱大忌苦寒之藥損其脾胃今立補中益氣湯主之夫脾胃虛者因飲食勞倦心火亢甚而乘其土位其次肺氣受邪須用黃耆最多人參甘草次之脾胃一虛肺氣先絕故用黃耆以益皮毛而閉腠理不令自汗損其元氣上喘氣短人參以補之心火乘脾須炙甘草之甘以瀉火熱而補脾胃中元氣若脾胃急痛並大虛腹中急縮者宜多用之經曰急者緩之白朮苦甘溫除胃中熱利腰臍間血胃中清氣在下必加升麻柴胡以引之引黃耆甘草甘溫之氣味上升能補衛氣之散解而實其表也又緩帶脈之縮急二味苦平味之薄者陰中之陽引清氣上升也氣亂於胸中為清濁相干用去白陳皮以理之又能助陽氣上升以散滯氣助諸甘辛為用脾胃氣虛不能升浮為陰火傷其生髮之氣榮血大虧榮氣不營陰火熾盛是血中伏火日漸熬煎血氣日減心包與心主血血減則心無所養致使心亂而煩病名曰悗悗者心惑而煩悶不安也故加辛甘微溫之劑生陽氣陽生則陰長故血虛以人參補之更以當歸和之少加黃柏以救腎水能瀉陰中之伏火如煩猶不止少加生地黃補腎水水旺而心火自降如氣浮心亂以硃砂安神丸鎮固之則愈以手捫之而肌表熱者表證也只服補中益氣湯一二服得微汗則已非正發汗乃陰陽氣和自然汗出也若更煩亂如腹中或周身有刺痛皆血澀不足加當歸身五分或一錢如精神短少加人參五分五味子十二個頭痛加蔓荊子三分痛甚加川芎五分頂痛腦痛加藁本五分細辛三分諸頭痛並用此四味足矣若頭上有熱則此不能治別以清空膏主之如頭痛有痰沉重懶倦者乃太陰痰厥頭痛加半夏五分生薑三分耳鳴目黃頰頷腫頸肩臑肘臂外後廉痛面赤脈洪大者以羌活二錢防風藁本各七分甘草五分通其經血加黃芩黃連各三分消其腫人參五分黃耆七分益元氣而瀉火邪另作一服與之嗌痛頷腫脈洪大面赤者加黃芩甘草各三分桔梗七分口乾嗌乾加葛根五分升引胃氣上行以潤之久病痰嗽肺中伏火去人參初病勿去之冬月或春寒或秋涼時各宜加不去根節麻黃半錢如春令大溫只加佛耳草款冬花各五分夏月病嗽加五味子三五枚去心麥門冬五分如舌上白滑胎者是胸中有寒勿用之夏月不嗽亦加人參二分或三分並五味子麥門冬各等分救肺受火邪也食不下乃胸中胃上有寒或氣澀滯加青皮木香各三分陳皮五分此三味為定法如冬月加益智仁草豆蔻仁各五分如夏月加黃芩黃連各五分如秋月加檳榔草豆蔻白豆蔻縮砂各五分如春初猶寒少加辛熱之劑以補春氣之不足為風藥之佐益智草豆蔻可也心下痞夯悶加芍藥黃連各一錢如痞腹脹加枳實木香縮砂仁各三分厚朴七分如天寒少加乾薑或肉桂心下痞覺中寒加附子黃連各一錢不能食而心下痞加生薑陳皮各一錢能食而心下痞加黃連五分枳實三分脈緩有痰而痞加半夏黃連各一錢脈弦四肢滿便難而心下痞加柴胡七分黃連五分甘草三分胸中氣壅滯加青皮二分如氣促少氣去之腹中痛者加白芍藥五分炙甘草三分如惡寒冷痛者加桂心三分如惡熱喜寒而腹痛者於已加白芍藥甘草二味中更加生黃芩三二分如夏月腹痛而不惡熱者亦然治時熱也如天涼時惡熱而痛於已加白芍藥甘草黃芩中更少加桂如天寒時腹痛去芍藥味酸而寒故也加益智仁三分或加半夏五分生薑三片如腹中痛惡寒而脈弦者是木來剋土也小建中湯主之蓋芍藥味酸於土中瀉木為君如脈沉細腹中痛以理中湯主之乾薑辛熱於土中瀉水以為主也如脈緩體重節痛腹脹自利米穀不化是濕勝也平胃散主之脅下痛或脅下縮急俱加柴胡三分甚則五分甘草三分臍下痛加真熟地黃五分其痛立止如不已者乃大寒也更加肉桂三二分內經所說少腹痛皆寒證從復法相報中來也經云大勝必大復從熱病中變而作也非傷寒厥陰之證乃下焦血結膀胱也仲景以抵當湯並丸主之身有疼痛者濕若身重者亦濕加去桂五苓一錢如風濕相搏一身盡痛加羌活七分防風藁本根各半錢升麻蒼朮各一錢勿用五苓所以然者為風藥已能勝濕故別作一服與之如病去勿再服以諸風藥損人元氣而益其病故也小便遺失肺金虛也宜安臥養氣以黃耆人參之類補之不愈則是有熱也加黃柏生地黃各五分切禁勞役如臥而多驚小便淋者邪在少陽厥陰宜太陽經所加之藥更添柴胡五分如淋加澤瀉五分此下焦風寒合病也經云腎肝之病同一治為俱在下焦非風藥行經則不可乃受客邪之濕熱也宜升舉發散以除之大便秘澀加當歸稍一錢大黃酒洗煨五分或一錢閉澀不行者煎成正藥先用清者一口調玄明粉五分或一錢得行則止此病不宜下下之恐變凶證也腳膝痿軟行步乏力或痛乃腎肝伏熱加黃柏五分空心服不已更加漢防己五分脈緩顯沉困怠惰無力者加蒼朮澤瀉人參白朮茯苓五味子各五分上一方加減是飲食勞倦喜怒不節始病熱中則可用之若末傳寒中則不可用也蓋甘酸適足益其氣耳如黃耆人參甘草芍藥五味之類是也內傷始為熱中病似外感陽證頭痛大作四肢疰悶氣高而喘身熱而煩上氣鼻息不調四肢困倦不收無氣以動無氣以言或煩躁悶亂心煩不安或渴不止病久者邪氣在血脈中有濕故不渴如病渴是心火炎上克肺金故渴或表虛不任風寒目不欲開惡食口不知味右手氣口脈大於左手人迎三倍其氣口脈急大而數時一代而澀澀是肺之本脈代是無氣不相接乃脾胃不足之脈大是洪大洪大而數乃心脈刑肺急是弦急乃肝木挾心火克肺金也其右關脾脈比五脈獨大而數數中時顯一代此不甚勞役是飲食不時寒溫失所則無右關胃脈損弱隱而不見惟內顯脾脈如此也治用補中益氣湯內傷末傳寒中病似外感陰證腹脹胃脘當心痛上支兩脅隔噎不通或涎唾或清涕或多溺足下痛不能任身履地骨乏無力喜唾兩丸多冷陰陰作痛或妄見鬼狀夢亡人腰背胛眼脊膂皆痛不渴不瀉脈盛大以澀名曰寒中治用神聖復氣湯白朮附子湯草豆蔻丸似外感陽明中熱證有天氣大熱時勞役得病或路途勞役或田野中勞役或身體怯弱食少勞役或長齋久素胃氣久虛勞役其病肌體壯熱躁熱悶亂大惡熱渴飲水此與陽明傷寒熱白虎湯證相似鼻口中氣短促上喘此乃脾胃久虛元氣不足之證身亦疼痛至日西作必譫語熱渴悶不止脈洪大空虛或微弱白虎湯證其脈洪大有力與此內傷中熱不同治用清暑益氣湯飢困勞役之後肌熱躁熱困渴引飲目赤面紅晝夜不息其脈大而虛重按全無經曰脈虛則血虛血虛則發熱證象白虎惟脈不長實為辨也誤服白虎湯必危宜黃耆當歸補血湯似外感惡風寒證有因勞役坐臥陰涼處後病表虛不任風寒少氣短促懶言語困弱無力此因勞役辛苦腎中陰火沸騰後因脫衣或沐浴歇息於陰涼處其陰火不行還歸皮膚腠理極虛無陽被風與陰涼所遏以此表虛不任風寒與外感惡風相似不可同外感治宜用補中益氣湯內傷似外感雜證飲食失節勞役所傷脾胃中州變寒走痛而發黃治用小建中湯或理中湯或大建中湯選而用之勞倦所傷虛中有寒理中丸心肺在膈上為陽腎肝在膈下為陰此上下臟也脾胃屬土處在中州在五臟曰孤臟在三焦曰中焦因中焦治在中一有不調此丸專主故名曰理中丸人參味甘溫內經曰脾欲緩急食甘以緩之緩中益脾必以甘為主是以人參為君白朮味甘溫內經曰脾惡濕甘勝濕溫中勝濕必以甘為助是以白朮為臣甘草味甘平內經曰五味所入甘先入脾脾不足者以甘補之補中助脾必須甘劑是以甘草為佐乾薑味辛熱喜溫而惡寒者胃也寒則中焦不治內經曰寒淫所勝平以辛熱散寒溫胃必先辛劑是以乾薑為使脾胃居中病則邪氣上下左右無所不之故有諸加減焉若臍下築者腎氣動也去白朮加桂氣壅而不瀉則築然動也白朮味甘補氣去白朮則氣易散桂辛熱腎氣動者欲作奔豚也必服辛熱以散之故加桂以散腎氣泄奔豚氣吐多者去白朮加生薑氣上逆則吐多術甘而壅非氣逆者之所宜千金曰嘔家多服生薑以其辛散故吐多者加之下多者還用白朮氣泄而不收則下多術甘壅補使正氣收而不下泄也或曰濕勝則濡泄術專除濕故下多者加之悸者加茯苓飲聚則悸茯苓味甘滲泄伏水是所宜也渴欲得水者倍加朮津液不足則渴術甘以補津液故加之腹中痛者加人參虛則痛經曰補可以去弱人參羊肉之屬是也寒多者加乾薑以辛熱能散寒也腹滿者去白朮加附子內經曰甘者令人中滿術甘壅補於腹中滿者則去之附子味辛熱氣壅鬱腹為之滿以熱勝寒以辛散滿故加附子經曰熱者寒之寒者熱之此之謂也建中湯內經曰肝生於左肺生於右心位在上腎處在下左右上下四臟居焉脾者土也應中央處四臟之中州治中焦生育榮衛通行津液一有不調則榮衛失所育津液失所行必以此湯溫中益脾是以建中名之焉膠飴味甘溫甘草味甘平脾欲緩急食甘以緩之建脾者必以甘為主故以膠飴為君而甘草為臣桂辛熱散也潤也榮衛不足潤而散之芍藥味酸微寒收也泄也津液不通收而行之是以桂芍藥為佐生薑味辛溫大棗味甘溫胃者衛之源脾者榮之本靈樞經云榮出中焦衛出上焦是也衛為陽不足者益之必以辛榮為陰不足者補之必以甘甘辛相合脾胃建而榮衛通是以薑棗為使也嘔家不用此湯以味甜故也寶鑑育氣湯參朮調中湯養胃進食丸寬中進食丸和中丸安胃丸補中丸加減平胃散嘉禾散白朮散緩中丸沉香鱉甲散十華散沉香溫脾湯厚朴溫中湯雙和湯小沉香丸木香分氣丸木香餅子勞倦所傷虛中有熱金匱要略云夫男子平人脈大者為勞極虛亦為勞男子面色薄者主渴及亡血卒喘悸脈浮者裡虛也男子脈虛沉弦無寒熱氣促裡急小便不利面色白時目眩兼衄少腹滿此為勞使之然勞之為病其脈浮大手足煩春夏劇秋冬瘥陰寒精自出酸削不能行男子脈微弱而澀為無子精清冷夫失精家少腹弦急陰頭寒目瞑發落脈極虛芤遲為清穀亡血失精也調中益氣湯治因飢飽勞役損傷脾胃元氣不足其脈弦或洪緩按之無力中之下時一澀其證身體沉重四肢困倦百節煩疼胸滿短氣膈咽不通心煩不安耳聾耳鳴目有瘀肉熱壅如火視物昏花口中沃沫飲食失味忽肥忽瘦怠惰嗜臥溺色變赤或清利而數或上飲下便或時餐泄腹中虛痛不思飲食內經云勞則氣耗熱則傷氣以黃耆甘草之甘瀉熱為主以白芍藥五味子之酸能收耗散之氣又曰勞者溫之損者溫之以人參甘溫補氣不足當歸辛溫補血不足故以為臣白朮橘皮甘苦溫除胃中客熱以養胃氣為佐升麻柴胡苦平味之薄者陰中之陽為脾胃之氣下溜上氣不足故從陰引陽以補之又以行陽明之經為使也如時顯熱躁是下元陰火蒸蒸然發也加真生地黃二分黃柏三分如大便虛坐不得或大便了而不了腹中常逼迫血虛血澀也加當歸身五分如身體沉重雖小便數多亦加茯苓五分蒼朮一錢澤瀉五分黃柏三分時暫從權而祛濕也不可常用兼足太陰已病其脈亦絡於心中故顯濕熱相合而煩亂如胃氣不和加湯洗半夏半錢生薑三片有嗽者加生地黃三分以製半夏之毒痰厥頭痛非半夏不能除此足太陰經邪所作也如無以上證只服黃耆一錢人參三錢甘草五分橘皮酒洗三分柴胡二分升麻二分蒼朮五分黃柏酒洗二分上件銼如麻豆大依前煎服如秋冬之月胃脈四道為衝脈所逆並脅下少陽脈二道而反上行病名曰厥逆內經曰逆氣上行滿脈去形明七神昏絕離去其形而死矣其證氣上衝咽不得息而喘息有音不得臥加吳茱萸半錢或一錢半湯洗去苦觀厥氣多少而用之如夏月有此證為大熱也蓋此病隨四時為寒熱溫涼也宜以酒黃連酒黃柏酒知母各等分為細末熟湯為丸如梧桐子大每服二百丸白湯送下空心服仍多服熱湯服畢少時便以美飲食壓之不令胃中停留直至下元以瀉衝脈之邪也大抵治飲食勞倦所得之病乃虛勞七損證也當用溫平甘多辛少之藥治之是其本法也如時上見寒熱病四時也又或將理不如法或酒食過多或辛熱之食作病或寒冷之食作病或居大熱大寒之處益其病當臨時制宜暫用大寒大熱治法而取效此從權也不可以得效之故而久用之必致夭橫矣靈樞經曰從下上者引而去之上氣不足推而揚之蓋上氣者心肺上焦之氣陽病在陰從陰引陽宜以入腎肝下焦之藥引甘多辛少之藥使升發脾胃之氣又從而去其邪氣於腠理皮毛也又云視前痛者當先取之是先以繆刺瀉其經絡之壅者為血凝而不流故先去之而後治他病寶鑑桂枝加龍骨牡蠣湯黃耆建中湯人參黃耆散續斷湯柴胡散秦艽鱉甲散人參地骨皮散地仙散當歸補血湯犀角紫河車丸人參柴胡散清神甘露丸雙和散四君子湯豬肚丸酸棗仁丸定志丸麥煎散獨聖散飲食不節勞役所傷腹脅滿悶短氣遇春則口淡無味遇夏雖熱猶有惡寒飢則常如飽不喜食冷物升陽順氣湯主之脾胃不足之證須用升麻柴胡苦平味之薄者陰中之陽引脾胃中清氣行於陽道及諸經生髮陰陽之氣以滋春氣之和也又引黃耆人參甘草甘溫之氣味上行充實腠理使陽氣得衛外而為固也凡治脾胃之藥多以升陽補氣名之者此也飢飽勞役胃氣不足脾氣下溜氣短無力不能寒熱早飯後轉增昏悶須要眠睡怠惰四肢不收懶倦動作五心煩熱升陽補氣湯主之如腹脹及窄狹加厚朴如腹中似硬加砂仁脾胃虛弱氣促氣弱精神短少衄血吐血門冬清肺飲大阿膠丸痰喘人參清鎮丸勞風心脾壅滯痰涎盛多喉中不利涕唾稠黏嗌塞吐逆不思飲食或時昏憒皂角化痰丸病久厭厭不能食而臟腑或結或溏此胃氣虛弱也白朮和胃丸明醫雜著云東垣論飲食勞倦為內傷不足之證治用補中益氣湯溯洄集中又論不足之中又當分別飲食傷為有餘勞倦傷為不足予謂傷飲食而留積不化以致宿食鬱熱熱發於外此為有餘之證法當消導東垣自有枳朮丸等治法具於飲食門矣其補中益氣方論卻謂人因傷飢失飽致損脾胃非有積滯者也故只宜用補藥蓋脾胃全賴飲食之養今因飢飽不時失其所養則脾胃虛矣又脾主四肢若勞力辛苦傷其四肢則根本竭矣或專因飲食不調或專因勞力過度或飲食不調之後加之勞力或勞力過度之後繼以不調故皆謂之內傷元氣不足之證而宜用補藥也但須於此四者之間審察明白為略加減則無不效矣虛勞瘵骨蒸熱素問云脈虛氣虛尺虛是謂重虛所謂氣虛者言無常也尺虛者行步恇然脈虛者不象陰也又云脈細皮寒氣少泄利前後飲食不入是謂五虛五虛死漿粥入胃泄注止則虛可活治用黃耆建中湯理中湯之類此素問但言虛而無勞瘵之名然其因則固屢言之矣凡外感六淫內傷七情其邪展轉乘於五臟遂至大骨枯槁大肉陷下各見所合衰憊之證真臟脈見則有死期又如二陽之病則傳為風消息賁三陽之病傳為索澤癉成為消中大腸移熱於胃胃移熱於膽則皆善食而瘦嘗貴後賤病從內生名曰脫營嘗富後貧名曰失精暴樂暴喜始樂後苦皆傷精氣精氣竭絕形體毀沮離絕菀結喜怒憂恐五臟空虛血氣離守靈樞曰怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛瘁色夭死於冬又諸熱病在膚肉脈筋骨之間者各客於所合之本臟不得客於所不勝及考醫和視晉平公之疾曰是近女室晦女陽物而晦時淫則生內熱或蠱之疾非鬼非食疾不可為也至漢張仲景金匱要略明立虛勞門於是巢元方撰病源候論遂有虛勞有蒸病有注病皆由此而推之者也虛勞者五勞六極七傷是也五勞者志勞思勞心勞憂勞瘦勞六極者氣極血極筋極骨極肌極精極七傷者曰陰寒曰陰痿曰裡急曰精連連曰精少陰下濕曰精清曰小便苦數臨事不舉又曰大飽傷脾大怒氣逆傷肝強力舉重久坐濕地傷腎形寒飲冷傷肺憂愁思慮傷心風雨寒暑傷形大恐懼不節傷志蒸有五骨蒸脈蒸皮蒸肉蒸內蒸又有二十三蒸胞玉房腦髓骨血脈肝心脾肺腎膀胱膽胃三焦小腸肉膚皮氣各有一蒸其狀遍身發熱多因熱病愈後食牛肉或飲酒或房欲而成注者注之為言住也邪氣居人身內生既連滯停住死又注易傍人也即所謂傳屍已別立門外今以虛勞骨蒸合為一門而列古明醫治法於後金匱云五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡榮衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃䗪蟲丸主之按虛勞發熱未有不由瘀血者而瘀血未有不由內傷者人之飲食起居一失其節皆能成傷此亦可以睹矣故以潤劑治干以蠕動噉血之物行死血死血既去病根已劃而後可從事乎滋補之劑仲景為萬古醫方之祖有以哉又有陳大夫傳仲景百勞丸可與䗪蟲丸互用活法機要云虛損之疾寒熱因虛而感也感寒則損陽陽虛則陰盛故損則自上而下治之宜以辛甘淡過於胃則不可治也感熱則損陰陰虛則陽盛故損則自下而上治之宜以苦酸鹹過於脾則不可治也自上而損者一損損於肺故皮聚而毛落二損損於心故血脈虛弱不能榮於臟腑婦人則月水不通三損損於胃故飲食不為肌膚也自下而損者一損損於腎故骨痿不起於床二損損於肝故筋緩不能自收持三損損於脾故飲食不能消克也故心肺損則色弊肝腎損則形痿脾胃損則穀不化也治肺損皮聚而毛落宜益氣四君子湯治心肺虛損皮聚毛落血脈虛耗婦人月水愆期宜益氣和血八物湯治心肺損及胃損飲食不為肌膚宜益氣和血調飲食十全散治腎損骨痿不能起於床宜益精補腎金剛丸治腎肝損骨痿不能起於床宜益精筋緩不能自收時宜緩中牛膝丸治肝腎損及脾食穀不化宜益精緩中消穀煨腎丸如陽盛陰虛肝腎不足房室虛損形瘦無力面多青黃而無常色宜榮血養腎地黃丸如陽盛陰虛心肺不足及男子婦人面無血色食少嗜臥肢體困倦宜八味丸如形體瘦弱無力多困未知陰陽先損夏月宜地黃丸春秋宜腎氣丸冬月宜八味丸病久虛弱厭厭不能食和中丸肝勞盡力謀慮而成虛寒則口苦骨疼筋攣煩悶宜續斷湯灸肝俞實熱則關格牢澀不通眼目赤澀煩悶熱壅毛悴色夭宜羚羊角散心勞曲運神機而成虛寒則驚悸恍惚神志不定宜遠志飲子酸棗仁湯實熱則口舌生瘡大小便秘澀宜黃芩湯脾勞意外致思而成虛寒則氣脹咽滿食不下噫氣宜白朮湯生嘉禾散大建脾散實熱則四肢不和脹滿氣急不安宜小甘露飲肺勞預事而憂所成虛寒則心腹冷氣胸滿背痛吐逆宜溫肺湯實熱則氣喘面目苦腫宜二母湯腎勞矜持志節所成虛寒則遺精白濁腰脊如折宜羊腎丸實熱則小便黃赤澀痛陰生瘡宜地黃丸肝傷筋極虛則手足拘攣腹痛指甲痛轉筋宜木瓜散當歸枸杞續斷實則咳而脅下痛腳心痛不可忍手足甲青黑宜五加皮散心傷脈極虛則咳而心痛咽腫喉中介介如梗宜茯神湯遠志酸棗仁硃砂龍齒實則血焦發落唇舌赤語澀肌瘦宜麥門冬湯脾傷肉極虛則四肢倦關節痛不食陰引肩背皆強宜半夏湯豆蔻厚朴陳皮益智實則肌肉痹腠理開汗大泄四肢緩弱急痛宜薏苡仁散肺傷氣極虛則皮毛焦津液枯力乏腹脹喘息宜紫菀湯人參黃耆白石英實則喘息沖胸心恚腹滿熱煩嘔口燥咽乾宜前胡湯腎傷骨極虛則面腫垢黑脊痛氣衰毛髮枯槁宜鹿角丸益智五味鹿茸實則面焦耳鳴小便不通手足痛宜玄參湯臟腑氣虛視聽已卸精極虛則遺精白濁體弱小腹急莖弱核小宜磁石丸鹿茸蓯蓉破故紙龍骨人參附子鍾乳實則目昏毛焦虛熱煩悶泄精宜石斛湯古今錄驗五蒸湯甘草炙一兩茯苓三兩人參二兩乾地黃三兩竹葉二把葛根三兩知母二兩黃芩二兩粳米二合石膏五兩碎上十味㕮咀以水九升煮小麥一升至六升去麥入藥煎至二升半分三服實熱黃連黃芩黃柏大黃虛熱烏梅秦艽柴胡氣也青蒿鱉甲蛤蚧牡丹皮小麥血也肺鼻乾烏梅紫菀天門冬麥門冬皮舌白唾血石膏桑白皮膚昏昧嗜睡牡丹皮氣遍身氣熱喘促鼻乾人參黃芩梔子大腸鼻右孔干痛芒硝大黃脈唾白浪語經絡溢脈緩急不調當歸生地黃心舌乾黃連生地黃血發焦地黃當歸桂心童子小便小腸下唇焦木通赤茯苓生地黃脾唇焦芍藥木瓜苦參肉食無味而嘔煩躁不安芍藥胃舌下痛石膏粳米大黃芒硝葛根肝眼黑前胡川芎當歸筋甲焦川芎當歸膽眼白失色柴胡栝蔞三焦乍寒乍熱石膏竹葉腎兩耳焦石膏知母生地黃寒水石腦頭眩悶熱羌活地黃防風髓髓沸骨中熱當歸地黃天門冬骨齒黑腰痛足逆冷疳蟲食藏鱉甲當歸地骨皮牡丹皮生地黃肉肢細趺腫臟腑俱熱石膏黃柏胞小便黃赤生地黃澤瀉茯苓沉香滑石膀胱左耳焦澤瀉茯苓滑石凡此諸蒸皆因熱病後食肉油膩行房飲酒犯之而成久蒸不除變成疳病即死矣珍珠囊云地為陰骨為里皮為表地骨皮瀉腎火牡丹皮瀉包絡火總治熱在外無汗而骨蒸知母瀉腎火治熱在內有汗而骨蒸四物湯加二皮治婦人骨蒸玄珠云五行六氣水特五之一耳一水既虧豈能勝五火哉虛勞等證蜂起矣其體虛者最易感於邪氣當先和解微利微下之從其緩而治之次則調之醫者不知邪氣加於身而未除便行補劑邪氣得補遂入經絡至死不悟如此誤者何啻千萬良可悲哉夫涼劑能養水清火熱劑能燥水補火理易明也勞為熱證明矣還可補乎惟無邪無熱無積之人脈舉按無力而弱者方可補之又必察其胃中及右腎二火虧而用之心虛則動悸恍惚憂煩少色舌強宜養榮湯琥珀定神丸之類以益其心血脾虛面黃肌瘦吐利清冷腹脹腸鳴四肢無力飲食不進宜快胃湯進食丸之類以調其飲食肝虛目昏筋脈拘攣面青恐懼如人將捕之狀宜牛膝益中湯虎骨丹之類以養助其筋脈肺虛呼吸少氣喘乏咳嗽嗌乾宜枳實湯加人參黃耆阿膠蘇子以調其氣腎虛腰背脊膝厥逆而痛神昏耳鳴小便頻數精漏宜八味丸加五味鹿茸去附子用山藥等丸以生其精陳藏器諸虛用藥凡例虛勞頭痛復熱加枸杞萎蕤虛而欲吐加人參虛而不安亦加人參虛而多夢紛紜加龍骨虛而多熱加地黃牡蠣地膚子甘草虛而冷加當歸川芎乾薑虛而損加鍾乳棘刺蓯蓉巴戟天虛而大熱加黃芩天門冬虛而多忘加茯苓遠志虛而口乾加麥門冬知母虛而吸吸加胡麻覆盆子柏子仁虛而多氣兼微咳加五味子大棗虛而驚悸不安加龍齒沙參紫石英小草若冷則用紫石英小草若客熱即用沙參龍齒不冷不熱皆用之虛而身強腰中不利加磁石杜仲虛而多冷加桂心吳茱萸附子烏頭虛而勞小便赤加黃芩虛而客熱加地骨皮白水黃耆虛而冷加隴西黃耆虛而痰復有氣加生薑半夏枳實虛而小腸利加桑螵蛸龍骨雞䏶胵虛而小腸不利加茯苓澤瀉虛而損溺白加厚朴髓竭不足加地黃當歸肺氣不足加天門冬麥門冬五味子心氣不足加上黨人參茯苓菖蒲肝氣不足加天麻川芎脾氣不足加白朮白芍藥益智腎氣不足加熟地黃遠志牡丹皮膽氣不足加細辛酸棗仁地榆神昏不足加硃砂預知子茯神證治要訣云五勞皆因不量才力勉強云為憂思過度嗜欲無節或病失調將積久成勞其證頭旋眼暈身疼腳弱心怯氣短自汗盜汗或發寒熱或五心常熱或往來潮熱或骨蒸作熱夜多惡夢晝少精神耳內蟬鳴口中無味飲食減少此皆勞傷之證也五臟雖皆有勞心腎為多心主血腎主精精竭血燥則勞生焉治勞之法當以調心補腎為先不當用峻烈之劑惟當溫養滋補以久取效天雄附子之類投之適足以發其虛陽緣內無精血不足當此猛劑然不可因有熱純用甜冷之藥以傷其胃氣獨用熱藥者猶釜中無水而進火也過用冷藥者猶釜下無火而添水也非徒無益而又害之宜十全大補湯或雙和散或養榮湯七珍散樂令建中湯皆可選用間進雙補丸諸發有雜病如咳嗽吐血不得臥盜汗寒熱潮熱等已見各門審知因虛勞得之並宜用前藥未效用十四味建中湯無熱脈不數乃可用或大建中湯渴而不勝熱藥者七珍散加木香五味子各七分熱多黃耆鱉甲散或人參散獨五心發熱將欲成勞者茯苓補心湯飲食減少畏食而嘔者難獨用前滯甜藥須斟酌用前快脾之劑縮砂陳皮卻不可少仍下鹿茸橘皮煎丸如不嘔不畏食用前十全大補湯雙和散等藥亦當少加快脾之劑以為之防有患精血不足明知當補腎方欲一取之歸耆等藥其人素減食又恐不利於脾方欲理脾則不免用疏刷之藥又恐愈耗腎水全一舉而兩得之功莫若鹿茸橘皮煎丸為第一故曰精不足者補之以味又曰補腎不如補脾以脾上交於心下交於腎故也道家交媾心腎以脾為黃婆者即此意若腎元大段虛損病勢困篤則腎又不容少緩不必拘於此說要知於滋腎之中佐以砂仁澄茄之類於壯脾之中參以北五味黃耆之屬此又臨時審病用藥之活法難經曰腎有兩者非皆腎也其左為腎右為命門命門者諸精神之所舍原氣之所繫也男子以臟精女子以系胞故知腎有二也男子藏精者氣海也女子系胞者血海也所主者二受病者一也是故左腎為陰合主地道生育之化故曰元氣之舍也若夫腎之藏精者是受五臟六腑之精輸納入精房血海而藏之然精有陰有陽陰陽平則兩腎和而不偏不平則偏陰陽俱不足則兩腎俱虛故東垣治兩虛者以仲景八味丸補之偏於左腎之陰精不足則以地黃丸主之以三才封髓丹主之右腎之陽火不足則以八味丸天真丸之類主之此用方之凡例也丹溪論勞瘵主乎陰虛者蓋自子至巳屬陽自午至亥屬陰陰虛則熱在午後子前寤屬陽寐屬陰陰虛則汗從寐時盜出也升屬陽降屬陰陰虛則氣不降氣不降則痰涎上逆而連綿吐出不絕也脈浮屬陽沉屬陰陰虛則浮之洪大沉之空虛也此皆陰虛之證用四物湯加黃柏知母主之然世醫遵用治疾乃百無一效者何哉蓋陰既虛矣火必上炎而川芎當歸皆味辛氣大溫非滋虛降火之藥又川芎上竄尤非虛炎短乏者所宜地黃泥膈非胃弱食少痰多者所宜黃柏知母苦辛大寒雖曰滋陰其實燥而損血雖曰降火其實苦先入心久而增氣反能助火至其敗胃所不待言用藥如此烏能奏功也予每用薏苡仁百合天門冬麥門冬桑根白皮地骨皮牡丹皮枇杷葉五味子酸棗仁之屬佐以生地汁藕汁乳汁童子小便等如咳嗽則多用桑皮枇杷葉有痰則增貝母有血則多用薏苡仁百合增阿膠熱盛則多用地骨皮食少則用薏苡仁至七八錢而麥門冬常為之主以保肺金而滋生化之源無不應手而效蓋諸藥皆稟燥降收之氣氣之薄者為陽中之陰氣薄則發泄辛甘淡平寒涼是也以施於陰虛火動之症猶當溽暑伊鬱之時而商飈颯然倏動則炎歊如失矣與治暑熱用白虎湯同意然彼是外感外感為有餘故用寒沉藏之藥而後能輔其偏此是內傷內傷為不足但用燥降收之劑而已得其平矣此用藥之權衡也虛勞之疾百脈空虛非黏膩之物填之不能實也精血枯涸非滋濕之物濡之不能潤也宜用人參黃耆地黃天麥門冬枸杞子五味子之屬各煎膏另用青蒿以童便熬膏及生地汁白蓮藕汁人乳汁薄荷汁隔湯煉過酌定多少並糜角膠霞天膏合和成劑每用數匙湯化服之如欲行瘀血加入醋製大黃末子玄明粉桃仁泥韭汁之屬欲止血加入京墨之屬欲行痰加入竹瀝之屬欲降火加入童便之屬凡虛勞之症大抵心下引脅俱疼蓋滯血不消新血無以養之也尤宜用膏子加韭汁桃仁泥呼吸少氣懶言語無力動作目無精光面色㿠白皆兼氣虛用麥門冬人參各三錢橘紅桔梗炙甘草各半兩五味子二十一粒為極細末水浸油餅為丸如雞頭子大每服一丸細嚼津唾嚥下名補氣丸氣虛則生脈散不言白朮血虛則三才丸不言四物大略前言薏苡仁之屬治肺虛後言參耆地黃膏子之類治腎虛蓋肝心屬陽肺腎屬陰陰虛則肺腎虛矣故補肺腎即是補陰非四物黃柏知母之謂也勞瘵兼痰積其證腹脅常熱頭面手足則於寅卯時分乍有涼時者是也宜以霞天膏入竹瀝加少薑汁調玄明粉行之若頑痰在膈上膠固難治者必以吐法吐之或沉香滾痰丸透膈丹之類下之甚則用倒倉法若肝有積痰汙血結熱而勞瘵者其太衝脈必與衝陽脈不相應宜以補陰藥吞當歸龍薈丸古方柴胡飲子防風當歸飲子麥煎散皆用大黃蓋能折炎上之勢而引之下行莫速乎此然惟大便實者乃可若溏泄則雖地黃之屬亦不宜況大黃乎透肌解熱柴胡乾葛為要劑故治骨蒸方中多用之如秦艽鱉甲散人參地骨皮散人參柴胡散皆退熱之劑然非常用多服之藥也衍義云柴胡本經並無一字治勞今治勞方中鮮有不用者凡此誤世甚多嘗原病勞有一種真藏虛損復受邪熱者如經驗方治勞熱青蒿煎丸用柴胡正合宜耳服之無不效熱去即須急已若無邪熱不死何待又大忌芩連柏驟用純苦寒藥反瀉其陽但當用瓊玉膏之類大助陽氣使其復還寅卯之位微加瀉陰火之藥是也有重陰覆其陽火不得伸或洒洒惡寒或志意不樂或脈弦數四肢五心煩熱者火鬱湯柴胡升麻湯病去即已不可過劑服寒涼藥證雖大減脈反加數者陽郁也宜升宜補大忌寒涼犯之必死男子肌瘦氣弱咳嗽漸成勞瘵用豬肚丸服之即肥有面色如故肌體自充外看如無病內實虛損俗呼為桃花蛀當看有何證候於前項諸藥審而用之上所列五勞六極二十三蒸諸治法亦略備矣然當以脾腎二臟為要何以言之腎乃系元氣者也脾乃養形體者也經曰形不足溫之以氣者也謂真氣有少火之溫以生育形體然此火不可使之熱熱則壯壯則反耗真氣也候其火之壯少皆在兩腎間經又曰精不足補之以味五味入胃各從所喜之臟而歸之以生津液輸納於腎者若五味一有過節反成其臟有餘勝克之禍起矣候其五味之寒熱初在脾胃次在其所歸之臟即當補其不足瀉其有餘謹守精氣調其陰陽使神內臟夫如是則天樞開發而胃和脈生故榮衛以周於內外無不被滋養而病愈矣勞疾久而嗽血咽疼無聲此為自下傳上若不嗽不疼久而溺濁脫精此為自上傳下皆死證也骨蒸之極聲嗄咽痛面黧脈躁汗出如珠喘乏氣促出而無入毛焦唇反皆死證也又骨肉相失聲散嘔血陽事不禁晝涼夜熱者死附水丘先生紫庭治瘵秘方人有傳屍殗殜伏連五勞七傷二十六蒸其候各異其源不同世醫不明根本妄投藥石可勝嘆哉予休心雲水遠絕人事遂以所傳樞要精微以示世醫使之明曉夫傳屍勞者男子自腎傳心心而肺肺而肝肝而脾女子自心傳肺肺而肝肝而脾脾而腎五臟復傳六腑而死矣或連及親族至於滅門其源皆由房室飲食過度冷熱不時憂思悲傷有欲不遂驚悸喜懼或大病後行房或臨屍哭泣屍氣所感邪氣一生流傳五臟蠹食傷心雖有諸候其實不離乎心陽腎陰也若明陰陽用藥可以返魂奪命起死回生人知勞之名未知其理人生以血為榮氣為衛二者運轉而無壅滯勞何由生故勞者倦也血氣倦則不運凝滯疏漏邪氣相乘心受之為盜汗虛汗憂悲恐懼恍惚不安腎受之為骨蒸為鬼交陽虛好色愈甚肝受之為瘰癧脅滿痞聚拳攣拘急風氣乘之為疼痛脾受之為多思慮慕清涼不食多食無味肺受之為氣喘痰涎睡臥不安毛髮焦枯至於六腑亦各有證今人多用涼藥則損胃氣雖盧扁亦難矣予之所論但在開關把胃何則勞病者血氣不運遂致乾枯此關脈閉也故先用開關藥通其血脈既開關則須起胃蓋五臟皆有胃氣邪氣附之則五臟衰弱若不把胃則他藥何由而行故開關把胃乃治勞妙法也然必須明陰陽且如起胃陽病藥不可過暖陰病藥不可過涼今人言丁香厚朴肉桂蓯蓉可補五臟不知用之則喘息閉嗽如火益熱或以治鬼為先務要當法藥相濟道力資扶然後鬼屍可逐也此論上合黃帝岐扁下明臟腑陰陽非患人有福亦不遭逢寶之總論病證如夜夢鬼交遺精自泄夢魂不安常見先亡恐怖鬼神思量飲食食至不進目睛失白骨節疼痛五心煩熱頭髮作滯面臉時紅如敷胭脂唇紅異常肌膚不潤言語氣短大便秘澀或時溏利小便黃赤或時白濁項生瘰癧腹中氣塊鼻口生瘡口舌乾燥咽喉不利仰臥不得或時氣喘涕唾稠黏上氣憤滿痰吐噁心腹脅妨悶陰中冷痛陰癢生瘡多濕轉筋拘急或忿怒悲啼舌直苦痛目睛時疼盜汗抬肩喘息陽道虛剛如手足心煩疼口乾舌瘡小便黃赤大便難及熱多咽喉痛涎唾黃黏及兼前項一二證即是陽病當用陽病開關散為瀉陽而補陰如大便溏利小便白濁飲食不化胃逆口惡雖有熱痰唾白色及小便多仍兼前項數症即是陰病當用陰病開關藥凡勞病虛極亦多令人煩躁大小便不利宜兼諸脈證審之陰陽二症皆用起胃散又歌訣云水丘道人年一百煉得龍精並虎魄流傳此法在人間聊向三天助陰德扶危起死莫蹉跎此藥於人有效多不問陰陽與冷熱先將脾胃與安和脾經虛冷易生寒最是難將熱藥攻閉卻大便並上氣為多厚朴與蓯蓉此法精關兩道方病人入口便知良但須仔細看形候莫向陰中錯用陽涕唾稠黏小便赤乾枯四體無筋力烏龍膏子二十丸便似焦枯得甘滴遺精夢泄腹膨高咳嗽陰疼為患勞此病是陰須識認便當急下玉龍膏嗽里痰涎仰臥難陰陽交併候多端卻須兼服訶黎散治取根源病自安七寶丸瀉骨蒸傳屍邪氣陽病可服黃連四兩為細末用豬肚一個洗淨入藥末線縫之用童便五升文火煮令爛干為度以肚細切同藥爛研置風中吹乾丸如桐子大硃砂麝香作衣空心麥門冬水下或用陽病開關散嚥下無硃砂亦可陽病開關散北柴胡去蘆桔梗炒秦艽麥門冬去心各半兩芍藥木香澤瀉各一兩木通半兩甘草一錢炙當歸桑白皮蜜炙地骨皮各一兩㕮咀每服三錢水一盞姜三片煎六分空心服小便多即病去也陰病開關散當歸赤芍藥肉桂白芷甘草炙各半兩木香二錢制枳殼三錢天南星一錢去皮薑汁浸一宿焙㕮咀每服三錢姜三片煎七分入無灰酒三分盞童便三分盞又煎七分溫服先服此起胃散一二日後不問退否兼玉龍膏服之起胃散陰陽二候皆用黃耆炙二兩白朮炒一兩白芷半兩人參半兩山藥一兩㕮咀每服三錢加木瓜煎或加沉香茯苓甘草各半兩烏龍膏烏梅去核柴胡紫菀生乾地黃木香各一兩秦艽實好者貝母麵炒去心防風各三錢杏仁五兩面炒為末皂角六十片二十片去黑皮醋炙為末二十片燒灰存性二十片湯浸去黑皮用精豬肉剁爛如泥同皂角一處入水五升細揉汁入童便三升無灰酒一升並熬如膏和前藥末為丸如梧桐子大每服二十丸空心麥門冬湯下甚者二十日效玉龍膏青蒿子柴胡白檳榔各二兩制鱉甲白朮赤茯苓木香牡蠣各半兩地骨皮半兩人參一兩生乾地黃一兩當歸三錢硃砂一錢豆豉心二合虎頭骨斫開酒炙黃赤色一兩肉蓯蓉酒浸一宿炙一兩鱉甲湯煮去皮裙酒浸炙黃赤皆為末又加烏梅肉枳殼上前件末成卻以杏仁五升壯者以童便浸春夏七日秋冬十日和瓶日中曬每日一換新者日數足以清水淘去皮尖焙乾別以童便一升於銀石器內以文火煎至隨手爛傾入砂盆用柳木槌研爛為膏細布濾過入酥一兩薄荷自然汁二合攪勻和藥用槌搗五百下丸如梧桐子大空心湯下十五丸加至三十丸如覺熱減丸數服熱少還添加減經月日諸證皆退進食安臥面有血色乃藥行也當勤服無怠忌莧菜白粥冷水生血雀鴿等物訶黎散治勞嗽上氣赤茯苓二兩訶黎勒皮二兩木香半兩檳榔一兩當歸一兩炒大黃一兩炒吳茱萸湯泡七次半兩㕮咀每服三錢生薑三片水一盞煎六分溫服傳屍勞本事方云葛稚川言鬼疰者是五屍之一疰又按諸鬼邪為害其變動乃有三十六種至九十九種大約使人淋漓沉沉默默的不知其所苦而無處不惡累年積月漸就頓滯以至於死傳於旁人乃至滅門覺知是候者急治獺肝一具陰乾取末水服方寸七日三服效未知再服此方神良紫庭方云傳屍伏屍皆有蟲須用乳香薰病人之手乃仰手掌以帛覆其上熏良久手背上出毛長寸許白而黃者可治紅者稍難青黑者即死若熏之良久無毛者即非此症屬尋常虛勞症也又法燒安息香令煙出病人吸之嗽不止乃傳屍也不嗽非傳屍也直指方云瘵蟲食人骨髓血枯精竭不救者多人能平時愛護元氣保養精血瘵不可得而傳惟夫縱欲多淫精血內耗邪氣外乘是不特男子有傷婦人亦不免矣然而氣虛腹餒最不可入勞瘵之門弔喪問喪衣服器用中皆能乘虛而染觸間有婦人入其房睹其人病者思之勞氣隨入染患日久莫不化而為蟲治療之法大抵以保養精血為上去蟲次之安息蘇合阿魏麝犀丹砂雄黃固皆驅伐惡氣之藥亦須以天靈蓋行乎其間蓋屍疰者鬼氣也伏而未起故令淹纏得枯骸枕骨治之鬼氣飛越不復附人於是乎瘥外此則虎牙骨鯉魚頭皆食人之類也其亦枕骨之亞乎要之發用以前當以川芎當歸先立乎根本之地先用芎歸血餘散吞北斗符次用鱉甲生犀散取蟲蘇遊論曰傳屍之候先從腎起初受之兩脛痠疼腰背拘急行立腳弱飲食減少兩耳颼颼真似風聲夜臥遺泄陰汗痿弱腎既受訖次傳於心心初受氣夜臥心驚或多恐悸心懸懸氣吸吸欲盡夢見先亡有時盜汗飲食無味口內生瘡心氣煩熱惟欲眠臥朝輕夕重兩頰口唇悉皆紋赤如敷胭脂有時手足五心煩熱心受已次傳於肺肺初受氣咳嗽上氣喘臥益甚鼻口乾燥不聞香臭如或忽聞惟覺朽腐氣有時噁心欲吐肌膚枯燥時或疼痛或似蟲行干皮細起狀如麩片肺既受已次傳於肝肝初受氣兩目胱胱面無血色常欲顰眉視不能遠目常乾澀又時赤痛或復睛黃常欲閤眼及時睡臥不著肝既受已次傳於脾脾初受氣兩脅虛脹食不消化又時瀉利水穀生蟲有時肚痛腹脹雷鳴唇口焦乾或生瘡腫毛髮乾聳無有光潤或時上氣撐肩喘息利赤黑汁見此證者乃不治也夫骨蒸殗殜伏連屍疰勞疰蟲疰毒疰熱疰冷疰食疰鬼疰善皆曰傳屍以疰者注也病自上注也其變有二十二種或三十六種或九十九種大略令人寒熱盜汗夢與鬼交遺精白濁發乾而聳或腹內有塊或腦後兩邊有小結復連數個或聚或散沉沉默默咳嗽痰涎或咯膿血如肺痿肺癰狀或腹下利羸瘦困乏不自勝持積月累年以至於死死復傳注親屬乃至滅門者是也更有蜚屍遁屍寒屍喪屍與屍疰謂之五屍及大小附著等證乃挾諸鬼邪而害人其證多端傳變推遷難以推測故自古及今愈此病者十不一得所謂貍骨獺肝天靈蓋銅鎖鼻徒有其說未嘗取效惟膏肓俞四花穴若及早灸之可否幾半晚亦不濟矣上清紫庭追勞方云三尸九蟲之為害治者不可不知其詳九蟲之內三蟲不傳蝟蛔寸白也其六蟲者或臟種毒而生或親屬習染而傳疾之初覺精神恍惚氣候不調切在戒忌酒色調節飲食如或不然五心煩熱寢汗忪悸如此十日頓成羸瘦面黃光潤此其證也大抵六蟲一旬之中遍行四穴周而復始病經遇木氣而生立春一日後方食起三日一食五日一退方其作苦百節皆痛蟲之食也退即還穴醉睡一醉五日其病乍靜候其退醉之時乃可投符用藥不然蟲熟於符藥之後不能治也一蟲在身中佔十二穴六蟲共佔七十二穴一月之中上十日蟲頭向上從心至頭遊四穴中十日蟲頭向內從心至臍遊四穴下十日蟲頭向下從臍至足遊四穴陽日長雄陰日長雌其食先臟腑脂膏故其色白五臟六腑一經食損即皮聚毛脫婦人即月信不行血脈皆損不能榮五臟六腑也七十日後食人血肉盡故其蟲黃赤損於肌肉故變瘦劣飲食不為肌膚筋緩不能收持一百二十日外血肉食盡故其蟲紫即食精髓傳於腎中食精故其蟲色黑食髓即骨痿不能起於床諸蟲久即生毛毛色雜花鐘孕五臟五行之氣傳之三人即自能飛其狀如禽亦多品類傳入腎經不可救治利藥下蟲後其蟲色白可三十日服藥補其蟲黃赤可六十日服藥補其蟲紫黑此病已極可百二十日服藥補又云蟲頭赤者食患人肉可治頭口白者食患人髓其病難治只宜斷後故經曰六十日者十得七八八十日內治者十得三四過此以往未知生全但可為子孫除害耳第一代為初勞病謂初受其疾不測病源酒食加餐漸覺羸瘦治療蹉跎乃成重病醫人不詳其故誤藥多死此蟲形如嬰兒背上毛長三寸在人身中此蟲形如鬼狀變動在人臟腑中此蟲形如蝦蟆變動在人臟腑中以上諸蟲在人身中縈著之後或大或小令人夢寐顛倒魂魄飛揚精神離散飲食不減形容漸羸四肢痠疼百節勞倦憎寒壯熱背膊拘急頭腦疼痛口苦舌乾面無顏色鼻流清涕虛汗常多行步艱辛眼睛多痛其蟲遇丙丁日食起醉歸心俞穴中四穴輪轉周而復始候蟲大醉方可醫灸取出蟲後用藥補心此用守靈散第二代為覺勞病謂傳受此病已覺病者患人乃自知夜夢不祥與亡人為伴侶醒後全無情思昏沉似醉神識不安所食味輒成患害或氣痰發動風毒所加四體不和心胸滿悶日漸羸瘦骨節乾枯或嘔酸水或是醋心唇焦口苦鼻塞胸痛背膊痠疼虛汗常出腰膝刺痛如此疾狀早須醫治過時難療致傷性命此蟲形如亂絲長三寸許在人臟腑中此蟲形如蜈蚣或似守宮在人臟腑中此蟲形如蝦蟹在人臟腑中以上諸蟲在人身中令人氣喘唇口多幹咳嗽憎寒心煩壅滿毛髮焦落氣脹吞酸津液漸衰次多虛渴鼻流清水四肢將虛臉赤面黃皮膚枯瘦腰膝無力背脊痠疼吐血唾膿語言不利鼻塞頭痛胸膈多痰重者心悶吐血僵仆在地不能自知其蟲遇庚辛日食起醉歸肺俞穴中四穴輪轉周而復始俟蟲大醉方可治醫取出其蟲補肺則瘥虛成散第三代為傳屍勞病謂傳受病人自尋得知之日漸消瘦頓改容顏日日恓惶夜夜憂死不遇良醫就死伊邇此蟲形如蚊蟻俱遊人臟腑中此蟲形如蜣螂大如碎血片在人臟中此蟲形如刺蝟在人腹中以上諸蟲在人身中令人三焦多昏日常思睡嘔吐苦汁或吐清水或甜或苦黏涎常壅腹脹虛鳴臥後多驚口鼻生瘡唇黑麵青日漸消瘦精神恍惚魂魄飛揚飲食不消氣咽聲干目多昏淚其蟲遇庚寅日食起醉歸厥陰穴中四穴輪轉周而復始俟蟲大醉方可治取蟲出之後補氣即瘥第四代此蟲形如亂絲在人腹臟之中此蟲形如豬肺在人腹內之中此蟲形如蛇虺在人五臟之中以上諸蟲在人身中令人臟腑虛鳴嘔逆傷中痃癖氣塊憎寒壯熱肚大筋生腰背疼痛或虛或瘦瀉利無時行履困重四肢憔悴上氣喘急口苦舌乾飲食及水過多要吃酸鹹之物其蟲遇戊己日食起醉歸脾俞穴中四穴輪轉周而復始俟蟲大醉方可治取蟲出之後補脾為瘥魂停散第五代此蟲形如鼠似小瓶渾無表裡背裡此蟲形如有頭無足有足無頭此蟲變動形如血片在於陽宮以上諸蟲入肝經而歸腎得血而變更也令人多怒氣逆筋骨拳攣四肢解散唇黑麵青憎寒壯熱腰背疼痛起坐無力頭如斧斫眼睛時痛翳膜多淚背膊刺痛力乏虛羸手足乾枯臥著床枕不能起止有似風中肢體頑麻腹內多痛眼見黑花忽然倒地不省人事夢寐不祥覺來遍體虛汗或有面色紅潤如平時者或有通靈而言未來事者其蟲遇癸未日食起醉歸肝俞穴中四穴輪轉周而復始俟蟲大醉方可醫救取蟲出後補肝乃瘥金明散第六代此代蟲有翅足全者千里傳疰所謂飛屍不以常法治也此蟲形如馬尾有兩條一雌一雄此蟲形如龜鱉在人五臟中此蟲形如爛面或長或短或如飛禽以上諸蟲在人身中居於腎臟透連脊骨令人思食百味要吃身體危羸腰膝無力髓寒骨熱四體乾枯眼見火生或多黑暗耳內虛鳴陰汗燥癢冷汗如油夢多鬼交小便黃赤醒後昏沉臍下結硬或奔心腹看物如豔心腹悶亂骨節疼痛食物進退有時喘嗽其蟲遇醜亥日食起醉歸腎俞穴中四穴輪轉周而復始俟蟲大醉可醫治取蟲後補腎填精瘥育嬰散寒熱門發熱凡病鮮有不發熱者而內傷外感其大關鍵也已各立門詳其治法此又立發熱門者重在內傷示人治熱之都例也明醫雜著云世間發熱症類傷寒者數種治各不同張仲景論傷寒傷風此外感也因風寒之邪感於外自表入里故宜發表以解散之此麻黃桂枝之義也以其感於冬春之時寒冷之月即時發病故謂之傷寒而藥用辛熱以勝寒若時非寒冷則藥當有變矣如春溫之月則當變以辛涼之藥如夏暑之月則當變以甘苦寒之藥故云傷寒不即病至春變溫至夏變熱而其治法必因時而有異也又有一種冬溫之病謂之非其時而有其氣蓋冬寒時也而反病溫焉此天時不正陽氣反泄用藥不可溫熱又有一種時行寒疫卻在溫暖之時時行溫暖而寒反為病此亦天時不正陰氣反逆用藥不可寒涼又有一種天行溫疫熱病多發於春夏之間沿門闔境相同者此天地之癘氣當隨令參氣運而施治宜用劉河間辛涼甘苦寒之藥以清熱解毒以上諸症皆外感天地之邪者若夫飲食勞倦為內傷元氣此則真陽下陷內生虛熱故東垣發補中益氣之論用人參黃耆等甘溫之藥大補其氣而提其下陷此用氣藥以補氣之不足也又若勞心好色內傷真陰陰血既傷則陽氣偏勝而變為火矣是謂陰虛火旺勞瘵之症故丹溪發陽有餘陰不足之論用四物加黃柏知母補其陰而火自降此用血藥以補血之不足者也益氣補陰皆內傷症也一則因陽氣之下陷而補其氣以升提之一則因陽火之上升而滋其陰以降下之一升一降迥然不同矣又有夏月傷暑之病雖屬外感卻類內傷與傷寒大異蓋寒傷形寒邪客表有餘之症故宜汗之暑傷氣元氣為熱所傷而耗散不足之症故宜補之東垣所謂清暑益氣者是也又有因時暑熱而過食冷物以傷其內或過取涼風以傷其外此則非暑傷人乃因暑而自致之之病治宜辛熱解表或辛溫理中之藥卻與傷寒治法相類者也凡此數症外形相似而實有不同治法多端不可或謬故必審其果為傷寒傷風及寒疫也則用仲景法果為溫病及瘟疫也則用河間法果為氣虛也則用東垣法果為陰虛也則用丹溪法如是則庶無差誤以害人矣今人但見發熱之症一皆認作傷寒外感率用汗藥以發其表汗後不解又用表藥以涼其肌設是虛證豈不死哉間有頗知發熱屬虛而用補藥則又不知氣血之分或氣病而補血或血病而補氣誤人多矣故外感之與內傷寒病之與熱病氣虛之與血虛如冰炭相反治之若瘥則輕病必重重病必死矣可不畏哉內外傷辨人迎脈大於氣口為外感氣口脈大於人迎為內傷外感則寒熱齊作而無間內傷則寒熱間作而不齊外感惡寒雖近烈火不能除內傷惡寒得就溫暖而必解外感惡風乃不禁一切風寒內傷惡風唯惡夫些少賊風外感證顯在鼻故鼻氣不利而壅盛有力內傷證顯在口故口不知味而腹中不和外感則邪氣有餘故發言壯厲先輕而後重內傷則元氣不足故出言懶怯先重而後輕外感頭痛常常而痛內傷頭痛時止時作外感手背熱手心不熱內傷手心熱手背不熱東垣辨法大要如此有內傷而無外感有外感而無內傷以此辨之則判然矣若夫內傷外感兼病而相合者則其脈證並見而難辨尤宜細心求之若顯內證多者則是內傷重而外感輕宜以補養為先若是外證多者則是外感重而內傷輕宜以發散為急此又東垣未言之意也東垣云五臟有邪各有身熱其狀各異以手捫摸有三法以輕手捫之則熱重按之則不熱是熱在皮毛血脈也重按至筋骨之分則熱蒸手極甚輕摸之則不熱是熱在筋骨間也輕手捫之則不熱重手加力按之亦不熱不輕不重按之而熱是熱在筋骨之上皮毛血脈之下乃熱在肌肉也此謂三法以三黃丸通治之細分之則五臟各異矣肺熱者輕手乃得微按全無瞥瞥然見於皮毛上為肺主皮毛故也日西尤甚乃皮毛之熱也其證必見喘咳灑淅寒熱輕者瀉白散重者涼膈散白虎湯之類治之及地黃地骨皮散海藏云皮膚如火燎而以手重取之不甚熱肺熱也目白睛赤煩躁引飲單與黃芩一物湯丹溪青金丸黃芩末粥丸亦名與點丸伐脾肺火此二方瀉肺中血分之火瀉白散瀉肺中氣分之火心熱者心主血脈微按至皮膚之下肌肉之上輕手乃得微按至皮毛之下則熱少加力按之則全不熱是熱在血脈也日中大甚乃心之熱也其證煩心心痛掌中熱而噦以黃連瀉心湯導赤散硃砂丸安神丸清涼散之類治之千金地黃丸門冬丸清心丸火腑丹導赤散瀉丙瀉心湯瀉丁火腑丹丙丁俱瀉脾熱者輕手捫之不熱重按至筋骨又不熱不輕不重在輕手重手之間此熱在肌肉遇夜尤甚其證必怠惰嗜臥四肢不收無氣以動以瀉黃散調胃承氣湯治實熱用之人參黃耆散補中益氣湯治中虛有熱者用之肝熱者按之肌肉之下至骨之上乃肝之熱寅卯間尤甚其脈弦其證四肢滿悶便難轉筋多怒多驚四肢困熱筋痿不能起於床瀉青丸柴胡飲之類治之兩手脈弦者或寅申發者皆肝熱也俱宜用之當歸龍薈丸回金九佐金丸腎熱者輕按之不熱重按之至骨其熱蒸手如火如炙其人骨酥酥然如蟲蝕其骨困熱不任亦不能起於床滋腎丸六味地黃丸主之以脈言之則輕按之如三菽之重與皮毛相得洪大而數者肺熱也如六菽之重與血脈相得洪大而數者心熱也如九菽之重與肌相得洪大而數者脾熱也如十二菽之重與筋相得洪大而數者肝熱也按之至骨舉指來疾洪大而數者腎熱也有表而熱者謂之表熱無表而熱者謂之裡熱故苦者以治五臟五臟屬陰而居於內辛者以治六腑六腑屬陽而在於外故曰內者下之外者發之又宜養血益陰身熱自除以脈言之浮數為外熱沉數為內熱浮大有力為外熱沉大有力為內熱晝則發熱夜則安靜是陽氣自旺於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名曰熱入血室晝則發熱煩躁夜亦發熱煩躁是重陽無陰當亟瀉其陽峻補其陰晝熱則行陽二十五度柴胡飲子夜熱則行陰二十五度四順飲子平旦發熱熱在行陽之分肺氣主之故用白虎湯以瀉氣中之火日晡潮熱熱在行陰之分腎氣主之故用地骨皮散以瀉血中之火白虎湯治脈洪故抑之使秋氣得以下降也地骨皮散治脈弦故舉之使春氣得以上升也氣分熱柴胡飲子白虎湯血分熱清涼飲子桃仁承氣湯牽牛味辛烈能瀉氣中之濕熱不能除血中之濕熱防己味苦寒能瀉血中之濕熱又能通血中之滯塞骨肉筋血皮毛陰足而熱反勝之是為實熱骨痿肉燥筋緩血枯皮聚毛落陰不足而有熱疾是為虛熱能食而熱口舌乾燥大便難者實熱也以辛苦大寒之劑下之瀉熱補陰經云陽盛陰虛下之則愈脈洪盛有力者是已不能食而熱自汗氣短者虛熱也以甘寒之劑瀉熱補氣經云治熱以寒溫而行之脈虛弱無力者是已金匱云熱在上焦者因咳為肺痿熱在中焦者為堅熱在下焦者為尿血亦令淋閟不通靈樞云肘前熱者腰以上熱手前獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱肘後以下三四寸熱者腸中有蟲掌中熱者腹中亦熱又云胃足陽明之脈盛則身以前皆熱又云胃中熱則消穀令人懸心善飢臍以上皮熱腸中熱則出黃如糜臍以下皮熱蓋胃居臍上故胃熱則臍以上熱腸居臍下故腸熱則臍以下熱如肝膽居脅肝膽熱則當脅亦熱肺居胸背肺熱則當胸背亦熱腎居腰腎熱則當腰亦熱可類推也上焦熱身熱脈洪無汗多渴者宜桔梗湯易老法涼膈散減大黃芒硝加桔梗同為舟楫之劑浮而上之治胸膈中與六經熱以手足少陽之氣俱下膈絡胸中三焦之氣同相火遊於身之表膈與六經乃至高之分此藥浮載亦至高之劑故施於無形之中隨高而走去胸膈中及六經之熱也三焦熱用藥大例上焦熱梔子黃芩中焦熱小便不利黃連芍藥下焦熱黃柏大黃上焦熱清神散連翹防風湯涼膈散龍腦飲子龍腦雞蘇丸犀角地黃湯中焦熱小承氣湯調胃承氣湯洗心散四順清涼飲桃仁承氣湯瀉脾散貫眾散下焦熱大承氣湯五苓散立效散八正散石韋散四物湯三才封髓丹滋腎丸通治三焦甚熱之氣三黃丸黃連解毒湯暴熱者病在心肺積熱者病在腎肝暴熱者宜局方雄黃解毒丸積熱者宜局方妙香丸暴者上喘也病在心肺謂之高喘宜木香金鈴子散上焦熱而煩者宜牛黃散有病久憔悴發熱盜汗謂之五臟齊損此熱勞骨蒸之病也瘦弱虛損煩喘腸澼下血皆蒸勞也治法宜養血益陰熱自能退此謂不治而治也錢氏地黃丸主之黃連解毒湯治大熱甚煩躁錯語不得眠加防風連翹為金花丸治風熱加柴胡治小兒潮熱與四物相合各半治婦人潮熱陰覆乎陽火不得伸宜汗經曰體若燔炭汗出而散是也脈弦而數此陰氣也宜風藥升陽以發火鬱則脈數峻退矣凡治此病脈數者當用黃柏少加黃連柴胡蒼朮黃耆甘草更加升麻得汗則脈必下乃火鬱則發之意也男婦四肢發熱肌肉熱筋痹熱骨髓中熱如火燎火燒捫之令人亦熱四肢主屬脾脾者土也熱伏地中此病多因血虛而得又因胃虛過食冷物冰水無度郁遏陽氣於脾土中經曰火鬱則發之柴胡升陽湯五心煩熱是火鬱於地中四肢土也心火下陷在脾土之中故宜升發火鬱以火鬱湯主之手足心熱用梔子香附蒼朮白芷半夏川芎末之神麯糊丸兩手大熱為骨厥如在火中可灸湧泉穴三壯立愈素問帝曰人有四肢熱逢風寒如炙如火者何也岐伯曰是人者陰氣虛陽氣盛四肢者陽也兩陽相得而陰氣虛少少水不能滅盛火而陽獨治獨治者不能生長也獨勝而止耳逢風如炙如火者是人當肉爍也仲景有三物黃芩湯治婦人四肢煩熱小兒癍後餘熱不退痂不收斂大便不行是謂血燥則當以陰藥治之因而補之用清涼飲子通大便而瀉其熱潔古云涼風至而草木實夫清涼飲子乃秋風徹熱之劑也傷寒表邪入於裡日晡潮熱大渴引飲譫語狂躁不大便是胃實乃可攻之夫胃氣為熱所傷以承氣湯瀉其上實元氣乃得周流承氣之名於此具矣今世人以苦泄火故備陳之除熱瀉火非甘寒不可以苦寒瀉火非徒無益而反害之故有大熱脈洪大服苦寒劑而熱不退者加石膏如症退而脈數不退洪大而病有加者宜減苦寒加石膏如大便軟或泄者加桔梗食後服此藥誤用則其害非細用者旋旋加之如食少者不可用石膏石膏善能去脈數如病退而脈數不退者不治肌熱燥熱目赤面紅煩渴引飲日夜不息脈浮大而虛重按全無為血虛發熱症似白虎唯脈不長實為辨也誤服白虎必危宜當歸二錢黃耆一兩水煎服有腎虛火不歸經遊行於外而發熱者煩渴引飲面目俱赤遍舌生刺兩唇黑裂喉間如煙火上衝兩足心如烙痰涎壅盛喘急脈洪大而數無倫次按之微弱者是也宜十全大補湯吞八味丸或問燥熱如此復投桂附不為以火濟火乎曰心包絡相火附於右尺命門男子以藏精女子以系胞因嗜欲竭之而火無所附故厥而上炎桂附與火同氣也而其味辛能開腠理致津液通氣道據其窟宅而招之同氣相求火必下降矣且火從腎出者是水中之火也火可以水折而水中之火不可以水折故巴蜀有火井焉得水則熾得火則熄則桂附者固治相火之正藥歟楊仁齋云凡壯熱煩躁用柴胡黃芩大黃解利之其熱乍輕而不退蓋用黃芩川芎甘草烏梅作劑或用黃連生地黃赤茯苓同煎臨熟入燈心一捻主之其效亦速蓋川芎生地黃皆能調血心血一調其熱自退其人脈澀必有漱水之症必有嘔惡痰涎之證必有兩腳厥冷之證亦必有小腹結急之證或唾紅或鼻衄此皆滯血作熱之明驗也用藥不止於柴胡黃芩當以川芎白芷桃仁五靈脂甘草佐之大便秘結者於中更加大黃濃蜜使滯血一通黑物流利則熱不復作東垣云發熱晝少而夜多太陽經中尤甚晝病則在氣夜病則在血是足太陽膀胱血中浮熱微有氣也既病人大小便如常知邪氣不在臟腑是無里證也外無惡寒知邪氣不在表也有時而發有時而止知邪氣不在表不在裡在經絡也夜發多而晝發少是邪氣下陷之深也此雜證當從熱入血室而論瀉血湯主之丹溪治陰虛發熱者於血藥四物湯亦分陰陽血之動者為陽芎歸主之血之靜者為陰生地黃芍藥主之若血之陰不足雖芎歸辛溫亦在所不用若血之陽不足雖薑桂辛熱而亦用之與瀉火之法有正治有從治皆在臨機應變飲酒發熱者緣酒性大熱有毒遇身之陽氣本盛得酒則熱愈熾剛而又剛陰氣破散陽氣亦亡故難治矣然耗之未至於亡者則猶可治一富家子二十餘歲四月間病發熱脈之浮沉皆無力而虛熱有往來潮作無時間得洪數之脈隨熱進退因知非外感之熱必是飲酒留毒在內今因房勞氣血虛乏而病作問之果得其情遂用補氣血藥加葛根以解酒毒服一帖微汗反懈怠熱如故因思是病氣血皆虛不禁葛根之散而然也必得雞矩子方可解其毒偶得乾者少許加於藥中其熱即愈治酒肉發熱青黛瓜蔞仁薑汁又有服金石辛熱者甘草烏豆湯下火邪者艾湯下冷飲食者乾薑湯下炙爆者茶清甘草湯下三消諸失血後蓐勞久痢諸虛復發熱者皆非美證有當直攻其發者有不當專治其熱者因他病而發為熱者也當隨證用藥不可一概求之其他諸證作熱當自治其本病即於本證藥中加入退熱藥元戎謂參蘇飲治一切發熱皆能作效不必拘其所因謂中有風藥解表有氣藥和中則外感風寒及內積痰飲並可用也而合四物湯名茯苓補心湯尤能治虛熱則此方乃虛實表裡兼治之劑然不可過如素有痰飲者俟熱退即以六君子湯調之素陰虛者俟熱退即用三才丸之屬調之治各有五一治曰和假令小熱之病當以涼藥和之和之不已次用取二治曰取為熱勢稍大當以寒藥取之取之不已次用從三治曰從為勢既甚當以溫藥從之為藥氣溫也味隨所為或以寒因熱用味通所用或寒以溫用或以汗發之不已又用折四治曰折為病勢極甚當以逆制之逆制之不已當以下奪之下奪之不已又用屬五治曰屬為求其屬以衰之緣熱深陷在骨髓間無法可出針藥所不能及故求其屬以衰之求屬之法是同聲相應同氣相求經曰陷下者灸之夫衰熱之法同前所云火衰於戌金衰於辰之類是也如或又不已當廣其法而治之譬如孫子之用兵若在山谷則塞淵泉在水陸則把渡口在平川廣野當清野千里塞淵泉者刺俞穴把渡口者奪病發時前清野千里者如肌羸瘦弱宜廣服大藥以養正治熱以寒溫而行之有三皆因大熱在身止用黃耆人參甘草此三味者皆甘溫雖表裡皆熱燥發於內捫之肌熱於外能和之汗自出而解矣此溫能除大熱之至理一也熱極生風乃左遷入地補母以虛其子使天道右遷順行諸病得天令行而必愈二也況大熱在上其大寒必伏於內溫能退寒以助地氣地氣者在人乃胃之生氣使真氣旺三也診脈浮大而無力為虛沉細而有力為實沉細或數者死病熱有火者生心脈洪是也無火者死沉細是也浮而澀澀而身有熱者死熱而脈靜者難治脈盛汗出不解者死脈虛熱不止者死脈弱四肢厥不欲見人食不入利下不止者死潮熱潮熱有作有止若潮水之來不失其時一日一發若日三五發即是發熱非潮熱也有虛有實惟傷寒日晡發熱乃胃實別無虛證其餘有潮熱者當審其虛實若大便堅澀喜冷畏熱心下愊然睡臥不著此皆氣盛所謂實而潮熱者也輕宜參蘇飲重則小柴胡湯若氣消乏精神憔悴飲食減少日漸尫羸雖病暫去而五心常有餘熱此屬虛證宜茯苓補心湯十全大補湯養榮湯之類病後欠調理者八珍散主之有潮熱似虛胸膈痞塞背心疼痛服補藥不效者此乃飲證隨氣而潮故熱隨飲而亦潮宜於痰飲門求之外有每遇夜身發微熱病人不覺早起動作無事飲食如常既無別證可疑只是血虛陰不濟陽宜潤補之茯苓補心湯候熱稍減繼以養榮湯十全大補湯脈滑腸有宿食常暮發熱明日復止者於傷飲食門求之濕痿夜熱以黃芩黃柏黃連白芍藥為末粥丸潮熱者黃芩生甘草辰戌時發加羌活午間發黃連未時發石膏申時發柴胡酉時發升麻夜間發當歸梢有寒者加黃耆參術分晝夜例見前發熱門惡寒振寒氣分寒三焦寒寒痹血分寒五臟寒經曰惡寒戰慄皆屬於熱又曰戰慄如喪神守皆屬於火惡寒者雖當炎月若遇風霜重綿在身如覺凜凜戰慄如喪神守惡寒之甚也原病式曰病熱證而反覺自冷此為病熱實非寒也或曰往往見有服熱藥而愈者何也曰病熱之人其氣炎上郁為痰飲抑遏清道陰氣不升病勢尤甚積痰得熱亦為暫退熱勢助邪其病益深或曰寒勢如此誰敢以寒涼藥與之非殺而何曰古人遇戰慄之證有以大承氣湯下燥糞而愈者惡寒戰慄明是熱證但有虛實之分耳晝則惡寒是陰氣上溢於陽分也夜則惡寒是陰血自旺於陰分也有衛氣虛衰不能實表溫分肉而惡寒者丹溪用參耆之類甚者加附子少許以行參耆之氣是也有上焦之邪隔絕榮衛不能升發出表而惡寒者丹溪治一女子用苦參赤小豆為末虀水吐後用川芎蒼朮南星黃芩酒麴糊丸是也有酒熱內郁不得泄而惡寒者丹溪治一人形瘦色黑平生喜飲酒年近半百且有別館一日大惡寒戰且自言渴卻不能飲其脈大而弱唯右關稍實略類弦重取則澀以黃耆一物與乾葛同煎與之盡黃耆二兩乾葛一兩脈得小次日安六月大熱之氣反得大寒之病氣難布息身涼脈遲何以治之曰病有標本病熱為本大寒為標用涼則順時而失本用熱則順本而失時故不從標本而從乎中治中治者何用溫是已然既曰溫則不能治大寒之病治大寒者非姜附不可若用姜附又似非溫治之例然衰其大半乃止脈得四至余病便無令治之足矣雖用姜附是亦中治也非溫而何經曰用熱遠熱雖用之不當然勝至可犯亦其理也丹溪治色目婦人年近六十六月內常覺惡寒戰慄喜炎火御綿多汗如雨其形肥肌厚已服附子十餘帖渾身癢甚兩手脈沉澀重取稍大知其熱甚而血虛也以四物去川芎倍地黃加白朮黃耆炒黃柏生甘草人參每服一兩重方與一帖腹大泄目無視口無言知其病勢深而藥無反佐之過也仍用前藥熱炒與之蓋借火力為嚮導一帖利止四帖精神回十帖全安又治蔣氏年三十餘形瘦面黑六月喜熱惡寒兩手脈沉而澀重取似數以三黃丸下之以薑湯每服三十粒二十帖微汗而安婦人先病惡寒手足冷全不發熱脈八至兩脅微痛治者便作少陽治之陽在內伏於骨髓陰在外致使發寒治當不從內外從乎中治也宜以小柴胡調之倍加薑棗脾胃之虛怠惰嗜臥四肢不收時值秋燥令行濕熱少退體重節痛口舌乾食無味大便不調小便頻數不嗜食食不消兼見肺病灑淅惡寒氣慘慘不樂面色惡而不和乃陽氣不伸故也升陽益胃湯主之背惡寒是痰飲仲景云心下有留飲其人背惡寒冷如冰治法茯苓丸之類是也身前寒屬胃經云胃足陽明之脈氣虛則身以前皆寒慄治法宜針補三里穴是也手足寒者厥也掌中寒者腹中寒魚上白肉有青血脈者胃中有寒理中之類治之黃耆補胃湯治表虛惡賊風上焦不通則陽氣抑遏而皮膚分肉無以溫之故寒慄東垣升陽益胃湯用升發之劑開發上焦以伸陽明出外溫之也丹溪吐出濕痰亦開發上焦使陽氣隨吐升發出外溫之也故寒慄皆愈振寒謂寒而顫振也經云陽明所謂洒洒振寒者陽明者午也五月盛陽之陰也陽盛而陰氣加之故洒洒振寒也此當瀉陽者也又云寒氣客於皮膚陰氣盛陽氣虛故為振寒寒慄此當補陽者也又云厥陰在泉風淫所勝病洒洒振寒治以辛涼又云陽明司天之政清熱之氣持於氣交民病振寒四之氣寒雨降病振慄治視寒熱輕重多少其制六脈中之下得弦細而澀按之無力腹中時痛心胃相控睪隱隱而痛或大便溏泄鼻不聞香臭清濁涕不止目中淚出喘喝痰嗽唾出白沫腰沉沉苦痛項背胸脅時作痛目中流火口鼻惡寒時時頭痛目眩苦振寒不止或嗽或吐或嘔或噦則發躁蒸蒸而熱如坐甑中必得去衣居寒處或飲寒水則便如故其振寒復至或氣短促胸中滿悶而痛如有膈咽不通欲絕之狀甚則口開目瞪聲聞於外而淚涕痰涎大作其發躁方過而振寒復至或面白而不澤者脫血也悲愁不樂情慘意悲健忘或善嚏此風熱大損寒水燥金之復也如六脈細弦而澀按之空虛此大寒證也亦傷精氣以辛甘溫熱潤之劑大瀉西北二方則愈寒痹帝曰人身非衣寒也中非有寒氣也寒從中生者何岐伯曰是人多痹氣也陽氣少陰氣多故身寒如從水中出帝曰人有身寒湯火不能熱厚衣不能溫然不凍慄是為何病岐伯曰是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨腎不生則髓不能滿故寒甚至骨也所以不能凍慄者肝一陽也心二陽也腎孤臟也一水不能勝二火故不能凍慄名曰骨痹是人當攣節也治法當求之痹門氣分寒桂枝加附子湯桂枝加芍藥人參新加湯血分寒巴戟丸神珠丸上焦寒陳皮厚朴藿香胡椒理中丸鐵刷湯桂附丸中焦寒白朮乾薑丁香大建中湯二氣丹附子理中丸下焦寒肉桂附子沉香八味丸還少丹天真丹海藏云下焦寒四逆例乾薑味苦能止而不行附子味卒能行而不守泄小便不通二藥皆陽氣化能作小便若薑附術三味內加茯苓以分利之為佳附生用而不炮則無火力熱則行而不止兼以水多煎少則熱直入下焦五臟寒方肝寒雙和湯心寒定志丸菖蒲丸脾寒益黃散肺寒小青龍湯腎寒八味丸通治大寒四逆湯大已寒丸沉香桂附丸王太僕云小寒之氣溫以和之大寒之氣熱以取之甚寒之氣則下奪之奪之不已則逆折之折之不盡則求其屬以衰之東垣云治寒以熱涼而行之有三北方之人為大寒所傷其足脛脹乃寒勝則浮理之然也若火灸湯浴必脫毛見骨須先以新汲水浴之則時見完復矣更有大寒凍其面或耳若近火湯必脫皮成瘡須先於涼房處浴之少時以溫手熨烙必能完復此涼而行之除其大寒之理一也大寒之氣必令母實乃地道左遷入肺逆行於天以涼藥投之使天道右遷而順天令諸病得天令行而必愈二也況大寒在外其大熱伏於地下者乃三焦包絡天真之氣所居之根蒂也熱伏於中元氣必傷在人之身乃胃也以涼藥和之則元氣充盛而不傷三也往來寒熱凡病多能為寒熱但發作有期者瘧也無期者諸病也內因經云榮之生病也寒熱少氣血上下行小柴胡與四物各半湯外因經云風氣盛於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰飲食其熱也則消肌肉故使人怢慄而不能食名曰寒熱又云因於露風乃生寒熱又云風盛為寒熱解風湯防風湯肺經云脈之至也喘而虛名曰肺痹寒熱得之醉而使內也又曰肺脈微急為肺寒熱脾經云脾脈小甚為寒熱太陽經云三陽為病發寒熱陽維經云陽維為病苦寒熱火熱攻肺經云少陰司天熱氣下臨肺氣上從喘嘔寒熱又云少陽司天火氣下臨肺氣上從寒熱胕腫又云少陰司天熱淫所勝寒熱皮膚痛又云歲木不及燥乃大行復則病寒熱瘡瘍治以寒劑寒熱相錯經云陽明司天之政天氣急地氣明民病寒熱發暴三之氣燥熱交合民病寒熱又云陽明司天燥氣下臨肝氣上從民病寒熱如瘧又云少陰司天之政四之氣寒熱互至民病寒熱治視寒熱多少其制皮寒熱者不可附席毛髮焦鼻槁臘不得汗取三陽之絡以補手太陰肌寒熱者肌痛毛髮焦而唇槁臘不得汗取三陽於下以去其血者補足太陰以出其汗骨寒熱者病無所安汗注不休齒未槁取其少陰於陰股之絡齒已槁死不治骨厥亦然無汗而寒熱者屬表可治寒熱汗出不休骨寒熱者已入骨髓故難治也灸寒熱之法先灸項大椎以年為壯數王注云如患人之年數次灸橛骨以年為壯數尾窮謂之橛骨視背腧陷者灸之膏肓等腧陷者為筋骨之間陷中也王注以背胛骨際有陷處也舉臂肩上陷者灸之肩腢穴也兩季脅之間灸之京門穴也外踝上絕骨之端灸之陽輔穴也足小指次指間灸之俠谿穴也腨下陷脈灸之承筋穴也外踝後灸之崑崙穴也缺盆骨上切之堅動如筋者灸之當隨其所有而灸之膺中陷骨間灸之天突穴也未詳是否掌束骨下灸之陽池穴也未詳是否臍下關元三寸灸之毛際動脈灸之氣衝穴也膝下三寸分間灸之三里穴也足陽明跗上動脈灸之衝陽穴也巔上一灸之百會穴也凡當灸二十九處灸之不已者必視其經之過於陽者數刺其俞而藥之按項大椎至巔上一灸之二十九處也以上出骨空論邪在肺則病皮膚痛寒熱上氣喘汗出咳動肩背取之膺中外腧背三節五臟之旁以手疾按之快然乃刺之取之缺盆中以越之小腹滿大身時寒熱小便不利取足厥陰絡病者善太息口苦下利寒熱取陽陵泉病風且寒且熱汗出一日數過先刺諸分理絡脈汗出且寒且熱三日一刺百日而已凡刺寒熱皆多血絡必間日而一取之血盡乃止乃調其虛實寒熱五處及天柱風池腰腧長強大杼中膂內俞上窌齦交上脘關元天牖天容合谷陽谿關衝中渚陽池消爍少澤前谷腕骨陽谷少海然谷至陰崑崙主之身寒熱陰都主之寒熱刺腦戶風寒熱液門主之心如懸陰厥腳腨後廉急不可前卻癃癖便膿血足跗上痛舌卷不能言善笑心下痞四肢倦溺青赤白黃黑青取井赤取熒黃取輸白取經黑取合血痔泄後重腹痛如癃狀臥僕必有所扶持及失氣涎出鼻孔中痛腹中常鳴骨寒熱無所安汗出不休復溜主之骨寒熱溲難腎腧主之肺寒熱呼吸不得臥上氣嘔沫喘氣相追逐胸滿脅膺急息難振慄脈鼓氣鬲胸中有熱支滿不嗜食汗不出腰脊痛肺俞主之咳而嘔鬲寒食不下寒熱皮肉膚痛少氣不得臥胸滿支兩脅鬲上兢兢脅痛腹䐜胃脘暴痛上氣肩背寒痛汗不出喉痹腹中痛積聚默默然嗜臥怠惰不欲動身常濕濕一作溫心痛無可搖者鬲俞主之咳而脅滿急不得息不得反側腋脅下與臍相引筋急而痛反折目上視眩耳中翛然肩項痛驚狂衄少腹滿目䀮䀮生白翳咳引胸痛筋寒熱唾血短氣鼻酸肝俞主之寒熱食多身羸瘦兩脅引痛心下賁痛心如懸下引臍少腹急痛熱面急一作黑目䀮䀮久喘咳少氣溺濁赤腎俞主之寒熱咳嘔沫掌中熱虛則肩背寒慄少氣不足以息寒厥交兩手而瞀口沫出實則肩背熱痛汗出暴四肢腫身濕搖肘寒熱飢則煩飽則善面色變一作癰口噤不開惡風泣出列缺主之寒熱胸背急喉痹咳上氣喘掌中熱數欠伸汗出善忘四肢厥逆善笑溺白列缺主之胸中膨膨然甚則交兩手而瞀暴痹喘逆刺經渠及天腑此謂之大腧肺系急胸中痛惡寒胸滿悒悒然善嘔膽汁腦中熱喘逆氣氣相追逐多濁唾不得息肩背風汗出面腹腫鬲中食噎不下喉痹肩息肺脹皮膚骨痛寒熱煩滿中腑主之寒熱目䀮䀮善咳喘逆通谷主之煩心咳寒熱善噦勞宮主之寒熱唇口乾身熱喘息目急痛善驚三間主之一本云寒熱心背引痛胸中不得息咳唾血涎煩中善飢食不下咳逆汗不出如瘧狀目淚出悲傷心腧主之寒熱善嘔商丘主之嘔厥寒時有微熱脅下支滿喉痛嗌乾膝外廉痛淫濼脛酸腋下腫馬刀瘻肩腫吻傷痛大沖主之寒熱頭痛喘喝目不能視神庭主之其目泣出頭不痛者聽會取之寒熱頭痛如破目痛如脫喘逆煩滿嘔吐流汗頭維主之寒熱胸滿頭痛四肢不舉腋下腫上氣胸中有聲喉中鳴天池主之寒熱頭痛水溝主之寒熱善怖頭重足寒不欲食腳攣京骨主之下部寒熱病汗不出體重逆氣頭眩痛飛陽主之肩背痛寒熱瘰癧繞頸有大氣暴聾氣蒙瞀耳目不開頭頷痛淚出目鼻衄不得息不知香臭風眩喉痹天牖主之寒熱痠痛四肢不舉腋下腫馬刀挾癭髀膝脛骨淫濼酸痹不仁陽輔主之寒熱頸瘰癧咳呼吸灸手三里左取右右取左寒熱頸瘰癧大迎主之寒熱瘰癧胸中滿有大氣缺盆中滿痛者死外潰不死肩引項不舉缺盆中痛汗不出喉痹咳嗽血缺盆主之寒熱頸瘰癧肩痛不可舉臂臑腧主之寒熱頸瘰癧耳鳴無聞痛引缺盆肩中熱痛手臂不舉肩真主之寒熱瘰癧目不明咳上氣唾血肩中腧主之寒熱頸腋下腫申脈主之寒熱頸頷腫後谿主之胸中滿耳前痛齒熱痛目赤痛頸腫寒熱渴飲輒汗出不飲則皮乾熱煩曲池主之振寒小指不用寒熱汗不出頭痛喉痹舌急卷小指之間熱口中熱煩心心痛臂內廉痛聾咳瘛瘲口乾頭痛不可顧少澤主之振寒寒熱肩臑肘臂痛頭不可顧煩滿身熱惡寒目赤痛眥爛生翳膜暴痛鼽衄耳聾臂重痛肘攣痂疥胸滿引臑泣出而驚頸項強身寒頭不可顧後谿主之振寒寒熱頸項腫實則肘攣頭眩痛狂易虛則生疣小者痂疥支正主之寒熱淒厥鼓頷承漿主之肩痛引項寒熱缺盆主之身熱汗不出胸中熱滿天窌主之寒熱肩腫引胛中肩臂痠痛臑腧主之臂厥肩膺胸滿痛目中白翳眼青轉筋掌中熱乍寒乍熱缺盆中相引痛數咳喘不得息臂內廉痛上鬲飲已煩滿太淵主之寒熱腹䐜央央然不得息京門主之善齧頰齒唇熱病汗不出口中熱痛衝陽主之胃脘痛時寒熱皆主之寒熱篡反出承山主之寒熱篡後出瘛瘲腳腨酸重戰慄不能久立腳急腫痛趺筋足攣少腹痛引喉嗌大便難承筋主之寒熱脛腫丘墟主之寒熱痹脛不收陽交主之跟厥膝急腰脊痛引腹篡陰股熱陰暴痛寒熱膝酸重合陽主之寒熱解孏一作爛淫濼脛酸四肢重痛少氣難言至陽主之寒熱腰痛如折束骨主之寒熱骨痛玉枕主之黃帝曰人之善病寒熱何以候之少俞答曰小骨弱肉者善病寒熱黃帝曰何以候骨之大小肉之堅脆色之不一也少俞答曰顴骨者骨之本也顴大則骨大顴小則骨小皮膚薄而其肉無䐃其臂濡濡然其地色炲然不與天同色汙然獨異此其候也然臂薄者其髓不滿故善病寒熱也問曰病者有灑淅惡寒而復發熱者何也曰陰脈不足陽往從之陽脈不足陰往乘之何謂陽不足假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也何謂陰不足假令尺脈弱名曰陰不足陽氣下陷入陰中則發熱也凡治寒熱用柴胡之屬者升陽氣使不下陷入陰中則不熱也用黃芩之屬者降陰氣使不得上入陽中則不寒也上俱靈素難甲乙金匱之文備載之者以世醫書多不列寒熱門僅僅綱目有之又止針法少用藥之方然知針所取之經絡則知藥之所取亦猶是矣吾非不能一一以藥代之但不欲印定後人眼目仲景曰婦人中風七八日續得寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之小柴胡加減法如寒熱往來經水不調去半夏加秦艽芍藥當歸知母地骨皮牡丹皮川芎白朮茯苓如小柴胡湯與四物湯各半名調經湯無孕嘔者加半夏無汗者加柴胡惡寒者加桂有汗者加地骨皮嗽者加紫菀通經加京三稜廣朮勞者加鱉甲完顏小將軍病寒熱間作腕後有斑三五點鼻中微血出兩手脈沉澀胸膈四肢按之殊無大熱此內傷寒也問之曏者臥殿角傷風又渴飲冰酪水此外感者輕內傷者重外從內病俱為陰也故先斑後衄顯內陰證寒熱間作脾亦有之非徒少陽之寒熱也與調中湯數服而愈脈經云大腸有宿食寒慄發熱有時如瘧輕則消導重則下之當求之傷食門血中風氣體虛發渴寒熱地骨皮散寒熱體瘦肢節疼痛口乾心煩柴胡散產後往來寒熱柴胡四物湯黃耆丸師尼寡婦獨陰無陽欲心萌而不遂陰陽交爭寒熱互作全類溫瘧久則成勞其肝脈弦長而上魚際宜抑陰地黃丸結熱在裡往來寒熱者大柴胡湯武陽仇天祥之子病發寒熱諸醫作骨蒸勞治之半年病甚戴人往視之診其手脈尺寸皆潮於關關脈獨大戴人曰肺癰也問其乳媼曾有痛處乳媼曰無戴人令兒去衣舉其兩手觀其兩脅下右脅稍高戴人以手側按之兒移身避之按其左脅則不避戴人曰此肺部有癰已吐膿矣診寸口脈沉而喘曰寒熱脈沉數細散者寒熱也沉細為寒數散為熱脈澀洪大寒熱在中尺膚烘然先熱後寒寒熱也言初捫尺膚則熱久之則寒也尺膚先寒久之而熱者亦寒熱也言初捫尺膚則寒久之則熱也寒熱奪形脈堅搏是逆也尺肉熱者解㑊安臥脫肉者寒熱不治診寒熱赤脈上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死見赤脈不下貫瞳子可治也寒熱病者平旦死外熱內寒外寒內熱仲景云病人身大熱反欲得近衣者熱在皮膚寒在骨髓也活人云先與桂枝湯治寒次與小柴胡湯治熱也又云病人身大寒反不欲近衣者寒在皮膚熱在骨髓也活人云先與白虎加人參湯治熱次與桂枝麻黃各半湯以解其外上熱下寒上寒下熱脈經云熱病所謂陽附陰者腰以下至足熱腰以上寒陰氣下爭還心腹滿者死所謂陰附陽者腰以上至頭熱腰以下寒陰氣上爭還得汗者生靈樞經云上寒下熱先刺其項太陽久留之已刺則熨項與肩胛令熱下合乃止此所謂推而上之者也上熱下寒視其虛脈而陷之於經絡者取之氣下乃止此所謂引而下之者也東垣云另有上熱下寒經曰陰病在陽當從陽引陰必須先去絡脈經隧之血若陰中火旺上騰於天致六陽反不衰而上充者先去五臟之血絡引而下行天氣降下則下寒之病自去矣慎勿獨瀉其六陽此病陽亢乃陰火之邪滋之只去陰火只損血絡經隧之邪勿誤也聖人以上熱下寒是有春夏無秋冬也當從天外引陽下降入地中此症乃上天群陰火熾而反助六陽不能衰退先於六陽中決血絡出血使氣下降三陰雖力微能逐六陽下行以陰血自降故也亦可謂老陽變陰之象也故經云上熱下寒視其虛脈下陷於經絡者取之此所謂引而下之也但言絡脈皆是也病大者三稜針決血去陽中之熱熱者手太陽小腸中留火熱之邪致此老陽不肯退化為陰而下故先決去手太陽之熱血使三陰得時之用而下降以行秋令奉收道下入地中而舉藏也乃瀉老陽在天不肯退化行陰道者也至元戊辰春中書參政楊公正卿年逾七十病面顏郁赤若飲酒狀痰稠黏時眩暈如在風霧中一日會都堂此症忽來復加目瞳不明遂歸命予診候兩寸脈洪大尺脈弦細無力此上熱下寒明矣欲藥之為高年氣弱不任記先師所論凡上熱譬猶鳥巢高顛射而取之即以三稜針於顛前髮際疾刺二十餘出紫黑血約二合許即時頭目清利諸苦皆去自後不復作中書左丞姚公茂六旬有七宿有暗風至元戊申末因酒病發頭面赤腫而痛耳前後腫尤甚胸中煩悶嗌咽不利身半以下皆寒足脛尤甚由是以床相接作坑身半以上常臥於床飲食減少精神困倦而體痛命予治之診得脈浮數按之弦細上熱下寒明矣內經云熱勝則腫又曰春氣者病在頭難經云蓄則腫熱砭射之也蓋取其易散故遂於腫上約五十餘刺出血紫黑約一杯數頃時疼痛消散又於氣海中大艾灸百壯乃助下焦陽虛退其陰寒次於三里二穴各灸三七壯治足胻下寒引導陽氣下行故也遂制一方名曰既濟解毒湯以熱者寒之然病有高下治有遠近無越於此以黃芩黃連苦寒酒製為引用瀉其上熱桔梗甘草辛甘溫升佐諸苦藥治其熱柴胡升麻苦平味薄者也陽中之陽散發上熱連翹苦辛平散結消腫當歸辛溫和血止痛酒煨大黃苦寒引苦性上行止煩熱投劑之後腫散痛減大便利再服減大黃慎言語節飲食不旬日良愈瘧內經論病諸篇唯瘧論最詳語邪則風寒暑濕四氣皆得留著而病瘧論邪入客處所則有腸胃之外榮氣之舍脊骨之間五臟募原與入客於臟腑淺深不同語其病狀則分寒熱先後遇寒熱之多寡則因反時而病以應令氣生長化收藏之變此皆外邪所致者也及乎語溫瘧在臟者止以風寒中於腎語癉瘧者止以肺素有熱然冬令之寒既得以中於腎則其餘四臟令氣之邪又寧無入客於所屬之臟者乎既肺本氣之熱為瘧則四臟之氣鬱而為熱者又寧不似肺之為瘧乎此殆舉一隅可以三隅反也故陳無擇謂內傷七情飢飽房勞皆得鬱而蘊積痰涎其病氣與衛氣並則作瘧者豈非用此例以推之歟夫如是內外所傷之邪皆因其客在榮氣之舍故瘧有止發之定期榮氣有舍猶行人之有傳舍也故瘧榮衛之氣日行一周歷五臟六腑十二經絡之界分每有一界分必有其舍舍有隨經絡沉內薄之瘧邪故與日行之衛氣相集則病作離則病休其作也不惟脈外之衛虛併入於陰靈樞所謂足陽明與榮俱行者亦虛以從之陽明之氣虛則天真因水穀而充大者亦暫衰所以瘧作之際禁勿治刺恐傷胃氣與天真也必待陰陽並極而退其榮衛天真胃氣離而復集過此邪留所客之地然後治之或當其病未作之先迎而奪之丹溪謂瘧邪得於四氣之初弱者即病胃氣強者伏而不得動至於再感胃氣重傷其病乃作此謂外邪必用汗解虛者先以參朮實胃加藥取汗唯足厥陰最難得汗其汗至足方佳大率取汗非用麻黃輩但開鬱通經其邪熱即散為汗矣又云瘧發於子半之後午之前是陽分受病其病易愈發於午之後寅之前陰分受病其病難愈必分受病陰陽氣血藥以佐之觀形察色以別之蓋嘗從是法而治形壯色澤者病在氣分則通經開鬱以取汗色稍夭者則補虛取汗挾痰者先實其胃一二日方服劫劑形弱色枯者則不用取汗亦不可劫但補養以通經調之其形壯而色紫黑者病在血分則開其阻滯色枯者補血調氣夫如是者猶為尋常之用至於取汗不得汗理血而汗不足若非更求藥之切中病情直造邪所著處何能愈之乎經云夏傷於暑秋必痎瘧暑者季夏也季夏者濕土也君火持權不與之子暑濕之令不行也濕令不行則土虧矣所勝妄行木氣太過少陽旺也所生者受病則肺金不足所不勝者侮之故水得以乘之土分土者坤也坤土申之分申為相火水入於土則水火相干陰陽交爭故為寒熱兼木氣終見三焦是二少陽相合也少陽在濕土之分故為寒熱肺金不足灑淅寒熱此皆往來未定之氣也故為痎瘧久而不愈瘧不發於夏而發於秋者以濕熱在酉之分方得其權故發於大暑以後也在氣則發早在血則發晏淺則日作深則間日或在頭項或在背中或在腰脊雖上下遠近之不同在太陽一也或在四肢者風淫之所及隨所傷而作不必盡當風府也先寒而後熱者謂之寒瘧先熱而後寒者謂之溫瘧二者不當治水火當從乎中治中治者少陽也渴者燥勝也不渴者濕勝也瘧雖傷暑遇秋而發其不應也秋病寒甚太陽多也冬寒不甚陽不爭也春病則惡風夏病則多汗汗者皆少陽虛也其病隨四時而作異形如此又有得之於冬而發之於暑邪客於腎足少陰也有藏之於心內熱熏於肺手太陰也至於少氣煩冤手足熱而嘔但熱而不寒謂之癉瘧足陽明也治之奈何方其盛也勿敢必毀因其衰也治法易老瘧論備矣易老云夏傷於暑濕熱閉藏而不能發泄於外邪氣內行至秋而發為瘧也初不知何經受病隨其受而取之有中三陽者有中三陰者經中邪氣其證各殊同傷寒論之也五臟皆有瘧其治各異肺瘧令人心寒寒甚熱熱間善驚如有所見者桂枝加芍藥湯心瘧令人煩心甚欲得清水反寒多不甚熱桂枝黃芩湯肝瘧令人色蒼蒼然太息其狀若死者四逆湯通脈四逆湯脾瘧令人寒腹中痛熱則腸中鳴鳴已汗出小建中湯芍藥甘草湯腎瘧令人洒洒然腰脊痛宛轉大便難目眴眴然手足寒桂枝加當歸芍藥湯足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已羌活加生地黃湯小柴胡加桂湯足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚小柴胡湯足陽明之瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然桂枝二白虎一黃芩芍藥加桂湯足太陰之瘧令人不樂好太息不嗜食多寒熱汗出病至則善嘔嘔已乃衰小建中湯異功散足少陰之瘧令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已小柴胡加半夏湯足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便噫恐懼氣不足腹中悒悒四物柴胡苦練附子湯在太陽經者謂之風瘧治多汗之在陽明經者謂之熱瘧治多下之在少陽經者謂之風熱瘧治多和之此三陽受病皆謂暴瘧也發在夏至後處暑前者此乃傷之淺者近而暴也在陰經者則不分三經皆謂之溫瘧宜以太陰經論之其發處暑後冬至前者此乃傷之重者遠而深也痎瘧者老瘧也故謂之久瘧瘧疾處暑前發頭痛項強脈浮惡風有汗桂枝羌活湯瘧疾頭痛項強脈浮惡寒無汗麻黃羌活湯發瘧如前證而夜發者麻黃黃芩湯桃仁散血緩肝夜發乃陰經有邪此湯散血中風寒也瘧疾身熱目痛熱多寒少脈長睡臥不安先以大柴胡湯下之微利為度如下過微邪未盡者宜白芷湯以盡其邪瘧無他證隔日發先寒後熱寒少熱多宜桂枝石膏湯瘧寒熱大作不論先後此太陽陽明合病也謂之大爭寒作則必戰動經曰熱勝則動也發熱則必汗泄經曰汗出不愈知為熱也陽盛陰虛之證當實內治外不治恐久而傳入陰經也桂枝芍藥湯主之如前藥服之寒熱轉大者知太陽陽明少陽三陽合病也宜桂枝黃芩湯和之服藥已如外邪已罷內邪未已再詮下藥從卯至午時發者宜大柴胡湯下之從午至酉發者知邪在內也宜大承氣湯下之從酉至子發者或至寅時發者知邪在血也宜桃仁承氣湯下之前項下藥微利為度更以小柴胡湯徹其微邪之氣大法先熱後寒者小柴胡湯先寒後熱者小柴胡加桂枝湯多熱但熱者白虎加桂枝湯多寒但寒者柴胡桂薑湯此以瘧之寒熱多少定治法也若多寒而但有寒者其脈或洪實或滑當作實熱治之若便用桂枝誤也如或多熱而但有熱者其脈或空虛或微弱當作虛寒治之若便用白虎亦誤也所以欲學者必先問其寒熱多少又診脈以參之百無一失矣仲景云瘧脈自弦弦數者多熱弦遲者多寒弦小緊者可下之弦遲者可溫之弦緊者可發汗及針灸也浮大者可吐之弦數者風疾發也以飲食消息止之陰氣孤絕陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰痹瘧若但熱不寒者邪氣內臟於心肺外舍於分肉之間令人消爍脫肉又云溫瘧者其脈如平身無寒但熱骨節疼煩時時嘔逆以白虎加桂枝湯主之瘧多寒者名曰牝瘧蜀漆散主之外臺牡蠣湯亦主之予弱冠遊鄉校時校師蔣先生之內患牝瘧身痛逾月不瘥困甚時予初知醫延予診治告以醫欲用姜附溫之予曰溽暑未衰明系熱邪安得寒而溫之經云陽並於陰則陰實而陽虛陽明虛則寒慄鼓頷也巨陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒此所云寒乃陰陽交爭互作之寒非真寒也豈得用桂附溫之乃處一方以柴胡升麻葛根羌活防風補三陽之虛升之也何曰補曰虛亦非真虛以陷入陰分而謂之虛故升之即補矣以桃仁紅花引入陰分而取陽以出還於陽分以豬苓分隔之使不復下陷一劑而病良已瘧病發渴小柴胡去半夏加栝蔞根湯亦治勞瘧張子和法白虎加人參湯小柴胡湯五苓散神祐丸服前三服未動次與之承氣湯甘露飲調之人參柴胡飲子補之在上者常山飲吐之劉立之法先當化痰下氣調理榮衛草果平胃散理中湯加半夏藿香正氣散不換金正氣散對金飲子皆要藥也俟榮衛正方進瘧藥楊仁齋法風瘧自感風而得惡風自汗煩躁頭疼轉而為瘧風陽氣也故先熱後寒可與解散風邪如川芎白芷青皮紫蘇之類或細辛檳榔佐之溫瘧一證亦先熱後寒此為傷寒壞病與風瘧大略則同熱多寒少小柴胡湯熱少寒多小柴胡湯內加官桂寒瘧自感寒而得無汗惡寒攣痛面慘轉而為瘧寒陰氣也故先寒後熱可與發散寒邪生料五積散增桂養胃湯或良薑乾薑官桂草果之類甚則姜附湯附子理中湯暑瘧者暑勝熱多得之一名癉瘧陰氣獨微陽氣獨發但熱不寒裡實不泄煩渴且嘔肌肉消鑠用小柴胡湯香薷散嘔者縮脾飲加生薑溫服下消暑丸熱多燥甚者少與竹葉湯常山柴胡於暑證最便濕瘧者冒襲雨濕汗出澡浴得之身體痛重肢節煩疼嘔逆脹滿用五苓散除濕湯加蒼朮茯苓輩寒多者朮附湯最良牝瘧者久受陰濕陰盛陽虛陽不能制陰所以寒多不熱氣虛而泄悽慘振振柴胡桂薑湯減半黃芩加半夏食瘧一名胃瘧飲食無節飢飽有傷致然也凡食啖生冷咸藏魚鹽肥膩中脘生痰皆為食瘧其狀苦飢而不能食食則中滿嘔逆腹痛青皮陳皮半夏草果縮砂白豆蔻作劑或四獸湯下紅丸子瘴瘧挾嵐瘴溪源蒸毒之氣致然也自嶺以南地毒苦炎燥濕不常人多瘴瘧其狀血乘上焦病欲來時令人迷困甚則發躁狂妄亦有啞不能言者皆由敗血瘀於心毒涎聚於脾坡仙指為脾胃實熱所致又有甚於傷暑之瘧耳治之須用涼膈疏通大腸小柴胡加大黃治瘴木香丸觀音丸皆為要藥戴復菴法不問寒熱多少且用清脾飲草果飲二陳湯加草果生料平胃散加草果前胡初發之際風寒在表雖寒熱過後而身體常自疼常自畏風宜草果飲或養胃湯每服加川芎草果各半錢熱少者進取微汗寒多者宜快脾湯或養胃湯每服更加草果半錢服藥後寒仍多者養胃湯每服加熟附官桂各半錢獨寒者尤宜不效則七棗湯熱多者宜驅瘧飲或參蘇飲每服加草果半錢大熱不除宜小柴胡湯渴甚則佐以五苓散入辰砂少許獨熱無寒宜小柴胡湯熱雖劇不甚渴者於本方加桂四分熱多而脾氣怯者柴樸湯寒熱俱等者常服宜如上項二陳湯平胃散加料之法發日進柴胡桂薑湯候可截則截之有獨熱用清脾飲效者內煩增參作一錢食瘧乃是飲食傷脾得之或瘧已成而猶不忌口或寒熱正作時吃食其人噫氣吞酸胸膈不利宜生料平胃散每服加草果砂仁各半錢仍佐以紅丸子七香丸暑瘧其人面垢口渴雖熱已過後無事之時亦常有汗宜養胃湯一帖香薷飲一帖和勻作二服渴甚汗出多者加味香薷飲間進辰砂五苓散不問已發未發其人嘔吐痰食俱出宜多服二陳湯加草果半錢又恐伏暑蘊結為痰宜消暑丸按戴院使處元末國初大亂之後草昧之初故其用藥多主溫熱醫者當更斟酌於天時方土物情之間而得其宜以為取捨可也仲景易老治瘧法晰矣然用之外因暑邪病在盛熱之時為宜若深秋悽清之候與七情痰食諸傷未可泥也故又備諸治法然暑月之瘧必脈浮有表證始可用麻桂羌活等表藥脈洪數長實有熱證始可用白虎等藥脈沉實有里證始可用大柴胡承氣等藥若弦細芤遲四肢倦怠飲食少進口乾小便赤雖得之傷暑當以清暑益氣湯十味香薷飲投之雖人參白虎非其治也至於內外俱熱煩渴引飲自汗出而不衰雖熱退後脈長實自如即處暑後進白虎何害是又不可泥矣澹寮云用藥多一冷一熱半熟半生分利陰陽按局方交解飲子即半熟半生之例也東垣云秋暮暑氣衰病熱瘧知其寒也局方用雙解飲子是已治瘴瘧尤妙邑令劉蓉川先生深秋患瘧而洞泄不止問予以先去其一為快予以此方投之一服而二病俱愈外祖母虞太孺人年八十餘夏患瘧諸舅以年高不堪懼其再發議欲截之予曰欲一劑而已亦甚易何必截乎乃用柴胡升麻葛根羌活防風之甘辛氣清以升陽氣使離於陰而寒自已以知母石膏黃芩之苦甘寒引陰氣下降使離於陽而熱自已以豬苓之淡滲分利陰陽使不得交併以穿山甲引之以甘草和之果一劑而止故趙以德云嘗究本草知母草果常山甘草烏梅檳榔穿山甲皆言治瘧集以成方者為知母性寒入足陽明藥將用治陽明獨盛之火熱使其退就太陰也草果性溫燥治足太陰獨盛之寒使其退就陽明也二經合和則無陰陽交錯之變是為君藥也常山主寒熱瘧吐胸中痰結是為臣藥也甘草和諸藥烏梅去痰檳榔除痰癖破滯氣是佐藥也穿山甲者以其穴山而居遇水而入則是出陰入陽穿其經絡於榮分以破暑結之邪為之使藥也然則此方乃脾胃有郁痰伏涎者用之收效若無痰止於暑結榮分獨應是太陰血證而熱者當發唇瘡而愈於此方則無功矣柴升等藥外因為宜知母等藥內因為宜東南瀕海海風無常所食魚鹽人多停飲故風瘧食瘧所由以盛烏頭草果陳皮半夏施得其宜西北高曠隆冬則水冰地裂盛夏則爍石流金人多中寒伏暑故多暑瘧寒瘧柴胡恆山故應合用東南西北往來其間病在未分之際可與藿香正氣散草果飲是猶養胃湯也治北方瘧以馬鞭草莖葉煎一盞露一宿早服寒多加薑汁戴云近世因寒熱發作見其指甲青黑遂名曰沙或戛或挑或灌以油茶且禁其服藥此病即是南方瘴氣生料平胃散加草果檳榔正其所宜豈有病而無藥者哉按南人不以患瘧為意北人則畏之北人而在南方發者尤畏之以此見治者當知方土之宜也上三條姑引其端耳潔古家珍治久瘧不能食胸中鬱郁欲吐而不能吐者以雄黃散吐之按此必上部脈浮滑有力確知胸中有澼而後可用不然能無虛虛之禍楊仁齋云有中年人臟腑久虛大便嘗滑忽得瘧疾嘔吐異常唯專用人參為能止嘔其他瘧劑並不可施遂以茯苓二陳湯加人參縮砂而倍用白豆蔻進一二服病人自覺氣脈頓平於是寒熱不作蓋白豆蔻能消能磨流行三焦榮衛一轉寒熱自平繼今遇有嘔吐發瘧之症或其人素嘔而發瘧謹勿用常山惟以生萊菔生薑各碾自然汁半盞入蜜三四匙烏梅二枚同煎吞局方雄黃丸三四粒候其利下惡血痰水即以人參川芎茯苓半夏砂仁甘草調之萬一嘔不止熱不退卻用真料小柴胡湯多加生薑主治其或嘔吐大作而又發熱且先與治瘧生熟飲嘔定以小柴胡湯繼之按仁齋論治雖悉而用藥不甚中肯綮若審知胸中有澼而吐不若以逆流水煎橘皮湯導而吐之若吐不出便可定之抑之使下於隨證藥中加枇杷葉蘆根之屬大抵當審其所以吐之故從其本而藥之難以言盡也仁齋又云瘧家多蓄痰涎黃水常山為能吐之利之是固然矣其有純熱發瘧或蘊熱內實之證投以常山大便點滴而下似泄不泄須用北大黃為佐大泄數下然後獲愈又云凡瘧皆因腹中停蓄黃水惟水不行所以寒熱不歇此瘧家受病之處也治法暑瘧純熱以香薷飲加青皮北大黃兩個烏梅同煎侵晨溫服寒瘧多寒以二陳湯加青皮良薑多用姜同煎侵晨吞神保丸五粒並欲取下毒水則去其病根寒熱自解又云瘧有水有血水即水飲也血即瘀血也唯水飲所以作寒熱唯瘀血所以憎寒熱常山逐水利飲固也苟無行血藥品佐助其間何以收十全之效耶繼自今瘧家或衄血或大便血絲或月候適來適去皆是血證當於瘧藥中加五靈脂桃仁為佐入生薑蜜同煎以治之又云瘧之經久而不歇其故何耶有根在也根者何曰飲曰水曰敗血是耳惟癖為瘧之母惟敗血為暑熱之毒惟飲與水皆生寒熱故暑之脈虛水飲之脈沉癖之脈結挾水飲者為之逐水消飲結癖者脅必痛為之攻癖敗血暑毒隨證而疏利之寒熱不除吾未之信按仁齋之論固是矣其於治未也大黃止能去有形之積不能去水其取瘀血亦必醋製及以桃仁之屬引之而後行不然不行也常山治瘧是其本性雖善吐人亦有蒸製得法而不吐者瘧更易愈其功不在吐痰明矣亦非吐水之劑但能敗胃耳內弟於中甫多留飲善患瘧嘗一用常山截之大吐瘧亦不止反益重今談及之猶兀兀欲嘔也甲午以多飲茶過醉且感時事憤懣於中飲大積腹中常轆轆有聲夏秋之交病大發始作寒熱寒熱已而病不衰予見其嘔惡用瓜蒂散人參蘆煎湯導吐之不得吐因念積飲非十棗湯不能取乃用三藥以黑豆煮制曬乾研為末棗肉和丸如芥子大而以棗湯下之初服五分後見其不動復加五分無何腹痛甚以棗湯飲之大便五六行皆溏糞無水時蓋晡時也夜半乃大下積水數斗而疾平然當其下時瞑眩特甚手足厥冷絕而復甦舉家號泣咸咎予之孟浪嗟乎藥可輕試哉王海藏云水者肺腎脾三經所主有五臟六腑十二經之部分上而頭中而四肢下而腰腳外而皮毛中而肌肉內而筋骨脈有尺寸之殊浮沉之別不可輕瀉當知病在何經何臟方可用之若誤投之則害深矣況仁齋所用尤非治水之藥其誅罰無過不為小害故愚謂病人果有積水瘀血其實者可用小胃丸行水抵當湯行血其虛者不若且以淡滲之劑加竹瀝薑汁以治痰而於隨證藥中加桃仁韭汁之屬以活血疾亦當以漸而平慎無急旦夕之功而貽後悔也瘧發已多遍諸藥未效度無外邪及虛人患瘧者以人參生薑各一兩煎湯於發前二時或發日五更連進二服無不愈者愈後亦易康復不煩調將近因人參價高難用濟貧以白朮代之夜發則用當歸亦莫不應手而愈金匱問曰瘧以月一日發當十五日愈設不瘥當月盡日解也如其不瘥當云何師曰此結為癥瘕名曰瘧母急宜治之可用鱉甲煎丸瘧母丸鱉甲醋炙二兩三稜莪朮各醋煮一兩香附醋製二兩阿魏醋化二錢醋糊為丸服之積消及半即止諸久瘧及處暑後冬至前後瘧及非時之間日瘧並當用瘧母法治之以鱉甲為君瘧之間日而作者其氣之舍深內薄於陰陽氣獨發陰邪內著陰與陽爭不得出故間日而作也其有間二日或至數日發者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作也丹溪曰三日一作者邪入於三陰經也作於子午卯酉日者少陰瘧也作於寅申巳亥日者厥陰瘧也作於辰戌丑未日者太陰瘧也當更參之證與脈而後決其經以立治法淹疾瘧病肝病面青脈弦皮急多青則痛形盛胸脅痛耳聾口苦舌乾往來寒熱而嘔以上是形盛當和之以小柴胡湯也如形衰骨搖而不能安於地此乃膝筋治之以羌活湯本草云羌活為君也瘧證取以少陽如久者發為癉瘧宜以鑱針刺絕骨穴復以小柴胡湯治之心病面赤脈洪身熱赤多則熱暴病壯熱惡寒麻黃加知母石膏黃芩湯主之此證如不發汗久不愈為瘧也淹疾䪼腫面赤身熱脈洪緊而消瘦婦人則亡血男子則失精脾病面黃脈緩皮膚亦緩黃多則熱形盛依傷寒說是為濕溫其脈陽浮而弱陰小而急治在太陰濕溫自汗白虎湯加蒼朮主之如久不愈為溫瘧重暍白虎加桂枝主之淹疾肉消食少無力故曰熱消肌肉宜以養血涼藥內經曰血生肉肺病面白皮澀脈亦澀多白則寒暴病澀癢氣虛麻黃加桂枝令少汗出也傷寒論云夏傷於暑汗不得出為癢若久不痊為風瘧形衰面白脈澀皮膚亦澀形羸氣弱形淹衛氣不足腎病面黑身涼脈沉而滑多黑則痹暴病形冷惡寒三焦傷也治之以姜附湯或四逆湯久不愈為瘧暴氣衝上吐食夜發俗呼謂之夜瘧太陽經桂枝證形衰淹疾黑癉羸瘦風痹痿厥不能行也外有傷寒往來寒熱如瘧勞病往來寒熱亦如瘧謂之如瘧非真瘧也然傷寒寒熱如瘧初必惡風寒發熱頭痛體疼自太陽經而來勞病寒熱如瘧初必五心煩熱倦怠咳嗽久乃成寒熱與正瘧自不同諸病皆有寒熱如失血痰飲癥瘕積聚小腸㿗疝風寒暑濕食傷發勞勞瘵腳氣瘡毒已各見本門其餘不能盡舉應有發寒熱者須問其元有何病而生寒熱則隨病施治凡寒熱發作有期者瘧也無期者諸病也厥婁全善曰王太僕云厥者氣逆上也世謬傳為腳氣讀此始知其病上古稱之為腳氣也經曰寒厥者手足寒也曰熱厥者手足熱也曰痿厥者痿病與厥雜合而足弱痿無力也曰痹厥者痹病與厥病雜合而腳氣頑麻腫痛也曰厥逆者即前寒厥熱厥痿厥痹厥風厥等氣逆上而或嘔吐或迷悶或脹或氣急或小腹不仁或暴不知人世所謂腳氣衝心者是也今人又以忽然昏運不省人事為厥或問世以手足冷者名為厥何如曰非也在張仲景論傷寒則以手足熱者為熱厥手足冷者為寒厥冷者曰逆謂凡厥者陰陽不相順接便為厥厥者手足逆冷也是故於陽虛而不接者則溫之於陽陷而伏深不與陰相順者則下之於邪熱入而未深者則散其傳陰之熱隨其淺深輕重以為治此乃為傷寒之邪自表入里至太陰手足厥者獨歸於二經也蓋自傷寒六經傳邪者論故厥陰是兩陰交盡之經熱傳至此乃極深之時故曰厥陰及內經厥論篇之義則不然概以足之三陽起於足五指之表三陰起於足五指之裡故陽氣勝則足下熱陰氣勝則從五指至膝上寒論得寒厥之由則謂前陰者宗筋之所聚太陰陽明之所合也此人質壯秋冬陰氣盛陽氣衰之時也奪於所用下氣上爭不能復精氣溢下邪氣因從之而上陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也論得熱厥之由則謂人必數醉若飽以入房氣聚於脾中腎氣有衰陽氣獨勝故手足為之熱也觀其微旨殆將為腎得先身生之精元氣從此而充二臟相因脈道乃行運陰陽於內外各有所司陽主表其氣溫陰主裡其氣寒表裡之脈循環相接於四肢是故舉此脾胃傷於酒色致陰陽二厥之大者為例著於篇首續敘十二經之厥逆者止出本經氣逆病形皆不言手足之厥亦不及受病之由亦非一言而可足既設二例在前於此便可推而及之故不復言也雖然更以諸篇有關於厥者詳陳以明之如太陰陽明論曰陽明者五臟六腑皆稟氣於胃今脾病不能與胃行其津液於三陰胃亦不能行津液於三陽四肢不得稟水穀氣日以益衰陰道不利筋骨肌肉皆無氣以生即此而言脾胃有更實更虛互相盛衰衰者不行津液盛者獨行獨行必寒此脾胃之致厥一也又十二經皆稟氣於胃受胃之寒則經氣亦寒受胃之熱則經氣亦熱因之經脈不和比流行相接之際必有所遺寒熱於四末此脾胃之致厥二也更有脾胃是腎之勝臟脾胃有邪必乘於腎腎乃治下主厥者也腎受邪則厥此脾胃之致厥三也靈樞曰衝脈者與少陰大絡同出於腎為五臟六腑之海故五臟六腑皆稟焉其上者滲諸陽灌諸精其下者並少陰之經滲三陰灌諸絡而溫肌肉其別絡結則胕上不動不動則厥厥則寒矣夫衝脈者是行腎臟治內之陽者陽即火也故陽動之以正則為生物溫養之少火動之以妄則為炎熾害物之壯火火壯則元真之陽亦衰李東垣謂火與元氣不兩立一勝則一負是也如前厥論謂下氣上爭邪氣因從之而上者非別有其邪即此火所亂陰陽之淫氣起而上逆者也故經以逆氣為衝脈之病病機亦言諸逆衝上皆屬於火諸厥皆屬於下然而在腎之陰陽和則下治不和則下不治不治則寒熱之厥生矣此腎主厥之道也至於衝脈與胃皆以海名故十二經稟氣而致厥病悉同又若他篇論厥有謂因陽氣煩勞則張精絕闢積於夏使人煎厥者有二陽一陰發病為風厥者有志不足則厥者有臟厥者有暴不知人之厥者有五絡俱竭而屍厥者凡此諸因上逆之邪皆相火與五火相扇而起起則變亂其經氣所以屬風寒燥濕熱之五氣相從而起五氣多相兼化風燥同熱化濕同寒化病甚則手足經從其所化之寒熱以為厥蓋所逆之氣自下而上者非得之火炎之勢而能之乎如三焦足少陽沖任督皆自司相火在下者然而統屬乎腎何則足少陰子與手少陰午對化者寄於其間如是則腎之元氣安於治下若相火妄動須當先救其腎分正治從治折其沖逆辨五氣所從之盛衰者補瀉之雖然亦有不因氣逆而遽冷者如原病式謂陰水主清淨故病寒則四肢冷是也乃為陽虛而陰獨在故寒即仲景所謂先厥後熱因寒邪外中陽氣未能勝之故先厥也雖邪有內外之分然在溫之則一耳寒熱二厥素問黃帝曰厥之寒熱者何也岐伯對曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥帝曰熱厥之為熱也必起於足下者何也岐伯曰陽氣起於足五指之表陰脈者集於足下而聚於足心故陽氣勝則足下熱也帝曰寒厥之為寒也必從五指而上於膝者何也岐伯曰陰氣起於五指之裡集於膝下而聚於膝上故陰氣勝則從五指至膝上寒其寒也不從外皆從內也帝曰寒厥何為而然也岐伯曰前陰者宗筋之所聚太陰陽明之所合也春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此人者質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也氣因於中陽氣衰不能滲榮其經絡陽氣日損陰氣獨在故手足為之寒也帝曰熱厥何如而然也岐伯曰酒入於胃則絡脈滿而經脈虛脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不榮其四肢也此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相搏熱盛於中故熱遍於身內熱而溺赤也夫酒氣盛而慓悍腎氣日衰陽氣偏勝故手足為之熱也靈樞顛狂篇厥逆為病也足暴清胸若將裂腸若將以刀切之煩而不能食脈大小皆澀暖取足少陰清取足陽明清則補之溫則瀉之儒門事親云西華李政之病寒厥其妻病熱厥前後十餘年其妻服逍遙散十餘劑終無效一日命予診之二人脈皆浮大而無力政之曰吾手足之寒時時漬以熱湯漬而不能止吾婦手足之熱終日沃以冷水沃而不能已者何也予曰寒熱之厥也此皆得之貪飲食縱嗜欲遂出內經厥論證之政之喜曰十年之疑今而釋然縱不服藥愈過半矣僕曰熱厥者寒在上也寒厥者熱在上也寒在上者以溫劑補肺金熱在上者以涼劑清心火分取二藥令服之不輟不旬日政之詣門謝曰寒熱厥者皆愈矣原病式謂厥者有陰陽之辨陰厥者原病脈候皆為陰證身涼不渴脈遲細而微也陽厥者原病脈候皆為陽證煩渴譫妄身熱而脈數也若陽厥極深或失下而至於身冷反見陰證脈微欲絕而死者正為熱極而然也王安道曰熱極而成厥逆者陽極似陰也寒極而成厥逆者獨陰無陽也陽極似陰用寒藥獨陰無陽用熱藥不可不辨也葉氏曰內經所謂寒熱二厥者乃陰陽之氣逆而為虛損之證也寒厥補陽熱厥補陰正王太僕所謂壯水之主以鎮陽光益火之原以消陰翳此補其真水火之不足耳仲景河間安道所論厥證乃傷寒手足之厥冷也證既不同治法亦異寒厥表熱裡寒下利清穀食入即吐脈沉伏手足冷四逆湯主之熱厥腹滿身重難以轉側面垢譫語遺溺厥冷自汗脈沉滑白虎湯主之熱厥手足熱而遊赤宜升陽泄火湯若大便結實大柴胡湯主之寒厥手足冷以附子理中湯指尖冷謂之清理中湯主之寒厥手足冷脈沉數實為熱東垣治中書貼合公腳膝尻腰背冷脈沉數有力用黃柏滋腎丸再服而愈又治中書左丞姚公茂上熱下寒用既濟解毒湯良愈丹溪治呂宗信腹有積塊足冷至膝用大承氣加減下之愈此皆寒厥有熱也脈沉細微為寒羅謙甫治徵南副元帥大忒木兒年六十秋七月徵南至仲冬病自利完穀不化臍腹冷痛足胻寒以手搔之不知痛癢常燒石以溫之亦不得暖診之脈沉細而微此年高氣弱深入敵境軍務煩冗朝夕形寒飲食失節多飲乳酪履於卑濕陽不外固由是清濕襲虛病起於下故胻寒而逆內經云感於寒而受病微則為咳盛則為泄為痛此寒濕相合而為病也法當急退寒濕之邪峻補其陽非灸不能病已先以大艾炷於氣海灸百壯補下焦陽虛次灸三里各三七壯治胻寒而逆且接引陽氣下行又灸三陰交以散足受寒濕之邪遂處方云寒淫所勝治以辛熱濕淫於外平以苦熱以苦發之以附子大辛熱助陽退陰溫經散寒為君乾薑官桂大熱辛甘亦除寒濕白朮半夏苦辛溫而燥脾濕故以為臣人參草豆蔻甘草大溫中益氣生薑大辛溫能散清濕之邪蔥白辛溫能通上焦陽氣故以為佐又云補下治下制以急急則氣味厚故大作劑服之不數服瀉止痛減足胻漸溫調其飲食十日平復明年秋過襄陽值霖雨閱旬余前證復作再依前灸添陽輔各二七壯再以前藥投之數服愈內經寒厥皆屬腎虛云腎臟志志不足則厥又云腎虛則清厥意不樂又云下虛則厥又云諸厥固泄皆屬於下是也靈樞逆順肥瘦篇黃帝曰少陰之脈獨下行何也歧伯曰不然夫衝脈者五臟六腑之海也五臟六腑皆稟焉其上者出於頏顙滲諸陽灌諸精其下者注少陰之大絡出於氣衝循陰股內廉入膕中伏行骭骨內下至內踝之後屬而別其下者並於少陰之經滲三陰其前者伏行出跗屬下循跗入大指間滲諸絡而溫肌肉故別絡結則跗上不動不動則厥厥則寒矣經云經絡堅緊火所治之蓋灸以治之或湯酒漬之也運氣寒厥有二一曰寒經云水平氣曰靜順靜順之紀其病厥又云歲水太過寒氣流行邪害心火躁悸陰厥又云歲金不及炎火乃行復則病陰厥且格是也二曰寒濕經云太陰司天之政天氣下降地氣上騰民病寒厥是也千金方治丈夫腰腳冷不隨不能行方上醇酒三斗水三斗合著甕中溫漬至膝三日止冷則甕下常著灰火勿令冷東垣云經云厥在於足宗氣不下脈中之血凝而留止非火調弗能取之潔古云身熱如火足冷如冰可灸陽輔穴又云胻酸冷絕骨取之熱厥手足熱丹溪曰司丞叔平生腳自踝以下常覺熱冬不可加綿於上嘗自言曰我資稟壯不怕冷予曰此足三陰虛宜斷欲事以補養陰血庶乎可免笑而不答年方十七患痿半年而死千金方手足煩者小便三升盆中溫漬手足素問熱厥取足太陰少陽皆留之暴不知人之厥已前見卒中暴厥門但有輕而未至於卒僕者難以諸中目之故復附見於此厥有涎潮如拽鋸聲在咽中為痰厥先用瓜蒂散或稀涎散或人參蘆煎湯探吐隨用導痰湯多加竹瀝少加薑汁暴怒氣逆而昏運者為氣厥宜八味順氣散或調氣散或四七湯手足搐搦為風厥宜小續命湯因酒而得為酒厥宜二陳湯加乾葛青皮或葛花解酲湯又有骨枯爪痛為骨厥身立如椽為骭厥喘而惋為陽明厥此皆由氣逆也厥亦有腹滿不知人者一二日稍知人者皆卒然悶亂者皆因邪氣亂陽氣逆是少陰腎脈不至也腎氣衰少精血奔逸使氣促迫上入胸脅宗氣反結心下陽氣退下熱歸股腹與陰相助令身不仁又五絡皆會於耳五絡俱絕則令人身脈皆動而形體皆無知其狀如屍故曰屍厥正由臟氣相刑或與外邪相忤則氣鬱不行閉於經絡諸脈伏匿昏不知人唯當隨其臟氣而通之寒則熱之熱則寒之閉則通之仲景云屍厥脈動而無氣氣閉不通故靜而死也菖蒲屑內鼻孔中吹之令人以桂屑著舌下又剔取左角發方寸燒灰末酒和灌之立起以竹管吹其兩耳還魂湯奄忽死去四肢逆冷不醒人事腹中氣走如雷鳴此屍厥也以焰硝五錢硫黃二錢研細作三服每服好陳酒一大盞煎覺硝焰起傾於盆內蓋著溫服如人行五里又進一服不過三服即醒灸百會四十九壯氣海丹田三百壯身溫灸止如無前藥用黑附子一隻炮製人參一兩分作二服酒三盞煎服或生薑汁酒合煎亦妙灸百會艾炷止許如綠豆大粗則傷人診沉微不數為寒厥沉伏而數為熱厥細為氣虛大如蔥管為血虛浮數為痰弦數為熱浮者外感脈至如喘為氣厥寸沉大而滑沉為實滑為氣實氣相搏血氣入臟唇口青身冷死如身和汗自出為入腑此為屍厥第二冊諸氣門諸氣經云諸痛皆因於氣百病皆生於氣怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄驚則氣亂勞則氣耗思則氣結九氣不同也按子和云天地之氣常則安變則病而況人稟天地之氣五運迭侵於外七情交戰於中是以聖人嗇氣如持至寶庸人役物而反傷太和此軒岐所以論諸痛皆因於氣百病皆生於氣遂有九氣不同之說氣本一也因所觸而為九怒喜悲恐寒熱驚思勞也蓋怒氣逆甚則嘔血及餐泄故氣逆上矣怒則陽氣逆上而肝木乘脾故甚則嘔血及餐泄也喜則氣和志達榮衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣逆逆則下焦脹故氣不行矣寒則腠理閉氣不行故氣收矣熱則腠理開榮衛通汗大泄故氣泄矣驚則心無所倚神無所歸慮無所定故氣亂矣勞則喘息汗出內外皆越故氣耗矣思則心有所存神有所歸正氣留而不行故氣結矣嘗考其為病之詳變化多端如怒氣所至為嘔血為餐泄為煎厥為薄厥為陽厥為胸滿脅痛食則氣逆而不下為喘渴煩心為消癉為肥氣為目暴盲耳暴閉筋緩發於外為癰疽喜氣所至為笑不休為毛革焦為內病為陽氣不收甚則為狂悲氣所至為陰縮為筋攣為肌痹為脈痿男為數溲血女為血崩為酸鼻辛頞為目昏為少氣不能報息為泣則臂麻恐氣所至為破䐃脫肉為骨酸痿厥為暴下綠水為面熱膚急為陰痿為懼而脫頤驚氣所至為潮涎為目睘為口呿為癡癇為不省人為僵仆久則為𤸷痹勞氣所至為嗌噎病為喘促為嗽血為腰痛骨痿為肺鳴為高骨壞為陰痿為唾血為冥目視為耳閉男為少精女為不月衰甚則潰潰乎若壞都汨汨乎不可止思氣所至為不眠為嗜臥為昏瞀為中痞三焦閉塞為咽嗌不利為膽癉嘔苦為筋痿為白淫為得後與氣快然如衰為不嗜食寒氣所至為上下所出水液澄徹清冷下利清白云云熱氣所至為喘嘔吐酸暴注下迫云云竊又稽之內經治法但以五行相勝之理互相為治如怒傷肝肝屬木怒則氣並於肝而脾土受邪木太過則肝亦自病喜傷心心屬火喜則氣並於心而肺金受邪火太過則心亦自病悲傷肺肺屬金悲則氣並於肺而肝木受邪金太過則肺亦自病恐傷腎腎屬水恐則氣並於腎而心火受邪水太過則腎亦自病思傷脾脾屬土思則氣並於脾而腎水受邪土太過則脾亦自病寒傷形形屬陰寒勝熱則陽受病寒太過則陰亦自病熱傷氣氣屬陽熱勝寒則陰受病熱太過則陽亦自病凡此數者更相為治故悲可以治怒以愴惻苦楚之言感之喜可以治悲以謔浪褻狎之言娛之恐可以治喜以迫遽死亡之言怖之怒可以治思以汙辱欺罔之言觸之思可以治恐以慮彼志此之言奪之凡此五者必詭詐譎怪無所不至然後可以動人耳目易人視聽若胸中無才器之人亦不敢用此法也熱可以治寒寒可以治熱逸可以治勞習可以治驚經曰驚者平之夫驚以其忽然而遇之也使習見習聞則不驚矣如丹溪先生治一女子許婚後夫經商二年不歸因不食困臥如癡他無所病但向里床坐此思想氣結也藥難獨治得喜可解不然令其怒脾主思過思則脾氣結而不食怒屬肝木怒則木氣升發而衝開脾氣矣因激之大怒而哭至二時許令解之與藥一帖即求食矣然其病雖愈必得喜方已乃紿以夫回既而果然病不舉又如子和治一婦人久思而不眠令觸其怒婦果怒是夕困睡捷於影響惟勞而氣耗恐而氣奪者為難治喜者少病百脈舒和故也又聞莊先生治喜勞之極而病者莊切其脈為之失聲佯曰吾取藥去數日更不來病者悲泣後即愈矣素問曰懼勝喜可謂得玄關者也凡此之類內經自有治法庸工廢而不行亦已久矣幸河間子和丹溪數先生出而其理始明後之學者宜知所從事丹溪云冷氣滯氣逆氣皆是肺受火邪氣得炎上之化有升無降熏蒸清道甚而轉成劇病局方類用辛香燥熱之劑以火濟火咎將誰執氣無補法世俗之言也以其為病痞悶壅塞似難於補不思正氣虛者不能運行邪滯著而不出所以為病經曰壯者氣行則愈怯者著而成病苟或氣怯不用補法氣何由行氣屬陽無寒之理上升之氣覺惡寒者亢則害承乃制也氣有餘便是火冷生氣者高陽生之謬言也自覺冷氣自下而上者非真冷也蓋上升之氣自肝而出中挾相火自下而上其熱為甚火極似水陽亢陰微也按河間論氣為陽而主輕微諸所動亂勞傷乃陽火之化神狂氣亂而病熱矣又云五志過極皆為火也而其治法獨得言外之意凡見喜怒悲恐思之證皆以平心火為主至於勞者傷於動動便屬陽驚者駭於心心便屬火二者必以平心火為主俗醫不達此者遂有寒涼之謗氣鬱用香附蒼朮撫芎調氣用木香然味辛氣能上升如氣鬱而不達固宜用之若陰火衝上而用之則反助火邪矣故必用黃柏知母而少用木香佐之氣從左邊起者肝火也氣刺痛皆屬火當降火藥中加枳殼破滯氣用枳殼枳殼能損至高之氣二三服即止恐傷真氣氣實者可服實熱在內相火上衝有如氣滯用知母黃柏芩連陰虛氣滯用四物以補血因事氣鬱不舒伸而痛者木香調達之憂而痰氣香附五錢栝蔞一兩貝母山楂各三錢半夏一兩稟受素壯而氣刺痛用枳殼烏藥因死血而痛者桃仁紅花歸頭解五臟結氣益少陰經血用梔子炒黑為末入湯同煎飲之甚效河間云婦人性執故氣疾為多宜正氣天香湯先導之戴復庵云七氣致病雖本一氣而所以為氣者隨症而變三因方論最詳喜怒憂思悲恐驚謂之七氣有痰在咽喉間如綿絮相似咯不出咽不下並宜四七湯未效進丁沉透膈湯內有熱者不宜審知是思慮過度宜四七湯去茯苓加半夏人參菖蒲審知是盛怒成疾面色青黃或兩脅脹滿宜調氣散或四七湯加枳殼木香各半錢因驚恐得疾心下怔忡者見驚悸門脈滑者多血少氣澀者少血多氣大者血氣俱多小者血氣俱少下手脈沉便知是氣其或沉滑氣兼痰飲脈弦軟或虛大虛滑微弱飲食不節勞傷過度精神倦怠四肢困乏法當補益補中益氣湯調中益氣湯十全大補湯夏月清暑益氣湯四君四物之類加減脈結澀或沉弦急疾收斂四肢腹脅腰胯間牽引疼痛不能轉側皆由七情鬱滯䟶閃傷損謹察病原隨證疏導三因七氣湯流氣飲子大七氣湯蘇子降氣湯化氣散四磨湯大玄胡湯選用脈沉滑氣兼痰飲者二陳湯桔梗半夏湯四七湯枳殼烏藥紫蘇大腹皮桑白皮之類隨證加減郁六元正紀大論曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣過者折之以其畏也所謂瀉之王安道曰木鬱達之五句治郁之法也調其氣一句治郁之餘法也過者折之三句調氣之餘法也夫五法者經雖為病由五運之郁所致而立然擴而充之則未嘗不可也且凡病之起也多由乎郁郁者滯而不通之義或因所乘而為郁或不因所乘而本氣自郁皆郁也豈惟五運之變能使然哉郁既非五運之變可拘則達之發之奪之泄之折之之法固可擴焉而充之矣木鬱達之達者通暢之也如肝性急怒氣逆胠脅或脹火時上炎治以苦寒辛散而不愈者則用升發之藥加以厥陰報使而從治之又如久風入中為餐泄及不因外風之人而清氣在下為餐泄則以輕揚之劑舉而散之凡此之類皆達之之法也王氏謂吐之令其條達為木鬱達之東垣謂食塞胸中食為坤土胸為金位金主殺伐與坤土俱在於上而旺於天金能剋木故肝木生髮之氣伏於地下非木鬱而何吐去上焦陰土之物木得舒暢則鬱結去矣此木鬱達之也竊意王氏以吐訓達此不能使人無疑者以為肺金盛而抑制肝木歟則瀉肺氣舉肝氣可矣不必吐也以為脾胃濁氣下流而少陽清氣不升歟則益胃升陽可也不必吐也雖然木鬱固有吐之之理今以吐字總該達字則是凡木鬱皆當用吐矣其可乎哉至於東垣所謂食塞肺分為金與土旺於上而剋木又不能使人無疑者夫金之剋木五行之常道固不待夫物傷而後能也且為物所傷豈有反旺之理若曰吐去其物以伸木氣乃是反為木鬱而施治非為食傷而施治矣夫食塞胸中而用吐正內經所謂其高者因而越之之義耳恐不勞引木鬱之說以汨之也火鬱發之發者汗之也升舉之也如腠理外閉邪熱怫鬱則解表取汗以散之又如龍火鬱甚於內非苦寒降沉之劑可治則用升浮之藥佐以甘溫順其性而從治之使勢窮則止如東垣升陽散火湯是也凡此之類皆發之之法也土鬱奪之奪者攻下也劫而衰之也如邪熱入胃用鹹寒之劑以攻去之又如中滿腹脹濕熱內甚其人壯氣實者則攻下之其或勢盛而不能頓除者則劫奪其勢而使之衰又如濕熱為痢有非力輕之劑可治者則或攻或劫以致其平凡此之類皆奪之之法也金鬱泄之泄者滲泄而利小便也疏通其氣也如肺金為腎水上原金受火爍其令不行原鬱而滲道閉矣宜肅清金化滋以利之又如肺氣膹滿胸憑仰息非利肺氣之劑不足以疏通之凡此之類皆泄之之法也王氏謂滲泄解表利小便為金鬱泄之夫滲泄利小便固為泄金鬱矣其解表二字莫曉其意得非以人之皮毛屬肺其受邪為金鬱而解表為泄之乎竊謂如此則凡筋病便是木鬱肉病便是土鬱耶此二字未當於理今刪去且解表間於滲泄利小便之中是滲泄利小便為二治矣若以滲泄為滋肺生水以利小便為直治膀胱則直治膀胱既責不在肺何為金鬱乎是亦不通故予易之曰滲泄而利小便也水鬱折之折者制御也伐而挫之也漸殺其勢也如腫脹之病水氣淫溢而滲道以塞夫水之所不勝者土也今土氣衰弱不能制之故反受其侮治當實其脾土資其運化俾可以制水而不敢犯則滲道達而後愈或病勢既旺非上法所能遽制則用泄水之藥以伐而挫之或去菀陳莝開鬼門潔淨府三治備舉迭用以漸平之王氏所謂抑之制其沖逆正欲折挫其氾濫之勢也夫實土者守也泄水者攻也兼三治者廣略而決勝也守也攻也廣略也雖俱為治水之法然不審病者之虛實久近淺深雜焉而妄施治之其不傾踣者寡矣且夫五郁之病固有法以治之矣然邪氣久客正氣必損今邪氣雖去正氣豈能遽平哉苟不平調正氣使各安其位復其常於治郁之餘則猶未足以盡治法之妙故又曰然調其氣苟調之而其氣猶或過而未服則當益其所不勝以制之如木過者當益金金能制木則木斯服矣所不勝者所畏者也故曰過者折之以其畏也夫制物者物之所欲也制於物者物之所不欲也順其欲則喜逆其欲則惡今逆之以所惡故曰所謂瀉之王氏以咸瀉腎酸瀉肝之類為說未盡厥旨雖然自調其氣以下蓋經之本旨故予推其義如此若擴充為應變之用則不必盡然也丹溪言郁有六氣血濕熱痰食也氣鬱胸脅痛脈沉而澀宜香附蒼朮撫芎濕鬱周身走痛或關節痛遇陰寒則發其脈沉細宜蒼朮川芎白芷茯苓熱鬱目瞀小便赤其脈沉數宜山梔青黛香附蒼朮撫芎痰鬱動則喘寸口脈沉滑宜海石香附南星栝蔞仁血鬱四肢無力能食便紅其脈芤宜桃仁紅花青黛川芎香附食鬱噯酸腹滿不能食右寸脈緊盛宜香附蒼朮山楂神麯針砂上諸郁藥春加防風夏加苦參秋冬加吳茱萸蒼朮撫芎總解諸郁凡郁皆在中焦以蒼朮撫芎開提其氣以升之假令食在氣上氣升則食自除矣余仿此或問方論分門敘證未嘗有郁病之名今出六郁之藥何也曰夫人氣之變一如天地六淫而分之故郁者燥淫為病之別稱也燥乃陽明秋金之位化經曰金木者生成之終始又曰木氣之下金氣乘之蓋物之化從於生物之成從於殺造化之道於生殺之氣未始相離猶權衡之不可輕重也生之重殺之輕則氣殫散而不收殺之重生之輕則氣斂澀而不通是謂郁矣郁有外邪內傷外邪者內經有六氣五運勝克之郁內應乎人氣而生病者是也用五鬱而治木鬱者達之火鬱者發之水鬱者折之土鬱者奪之金鬱者泄之內傷者人之天真與穀氣並分布五臟名五陽者金木水火土之五氣也各司一臟而金木則統為生殺之紀綱以其五陽又復相通移五五二十五陽於是一臟一五氣各有生長化收藏之用雖各自為之用然必歸於肺肺屬金主氣分陰陽其化燥其變斂澀斂澀則傷其分布之政不惟生氣不得升而收氣亦不得降故經曰逆秋氣則太陰不收肺氣焦滿又曰諸氣怫鬱皆屬於肺此之謂也今觀此集所云郁病多在中焦及六郁凡例之藥誠得其要矣中焦者脾胃也水穀之海法天地生萬物體乾健之化具坤靜之德五性備而沖和之氣五臟六腑皆稟乏以為主榮衛由穀氣之精悍所化天真亦由穀氣而充大東垣所謂人身之清氣榮氣運氣衛氣春升之氣皆胃氣之別稱然而諸氣豈盡是胃氣者哉乃因胃氣以資其生故也脾胃居中心肺在上腎肝在下凡有六淫七情勞役妄動上下所屬之臟氣致虛實勝克之變過於中者而中氣則常先是故四臟一有不平則中氣不得其和而先郁矣更有因飲食失節停積痰飲寒溫不適所脾胃自受所以中焦致郁之多也今以其藥兼升降而用之者蓋欲升之必先降之而後得以升也欲降之必先升之而後得以降也老氏所謂將欲取之必先與之其蒼朮足陽明藥也氣味雄壯辛烈強胃強脾開發水穀氣其功最大香附陰血中快氣藥也下氣最速一升一降以散其鬱撫芎者足厥陰直達三焦俾生髮之氣上至頭目下抵血海通疏陰陽氣血之使者也然用此不專開中焦而已其胃主行氣於三陽脾主行氣於三陰脾胃既布水穀之氣行縱是三陰三陽各臟腑自受其燥金之郁者亦必因胃氣可得而通矣天真等氣之不達亦必可得而伸矣況蒼朮尤能徑入諸經疏泄陽明之濕通行斂澀者也觀此六郁藥之凡例其升降消導皆因內經變而致殆將於受病未深者設也若或氣耗血衰津液枯竭病已入深寧復令人守此不從病機大要治法以有者求之無者求之盛者責之虛者責之必先五勝者哉不然如前條中風傷寒外邪者尚分虛實論治何乃郁病屬內傷多者反不分之乎先生之意當不止是集書者不能備其辭也曰子言郁乃燥淫之別稱劉河間則又以怫鬱屬熱者何也曰燥之為氣有涼有熱而燥者秋風氣至大涼革候肅殺堅勁生氣不揚草木斂容人物之象一也在人身則腠理閉密中外澀滯氣液皆不滑澤是以原病式敘諸澀枯涸幹勁皴揭者在燥淫條下從化何如內經有之少陰少陽熱火下臨肺氣上從白起金用草木眚河間又謂六氣不必一氣獨為病氣有相兼或風熱勝濕成燥澀者或肺受火熱致金衰耗津而燥者或火熱亢極兼賊鬼水化反閉塞而燥者或因寒邪外閉腠理陽氣鬱而成燥其病在外甚亦入內或口食生冷陽氣內鬱而成燥熱者其病在肉裡甚亦在外或兼於濕者濕主於否因致怫鬱成熱以燥者或兼風者因熱傷肺金不能平木而生風勝濕而燥也易曰燥萬物者莫熯乎火燥之從化者其此之謂歟至於論郁之為病外在六經九竅四屬內在五臟六腑大而中風暴病暴死顛狂勞癆消渴等疾小而百病莫不由是氣液不能宣通之所致治郁之法有中外四氣之異在表者汗之在內者下之兼風者散之熱微者寒以和之熱甚者瀉陽救水養液潤燥補其已衰之陰兼濕者審其濕之太過不及猶土之旱澇也寒濕之勝則以苦燥之以辛溫之不及而燥熱者則以辛潤之以寒調之大抵須得仲景之法治之要各守其經氣而勿違然方論止敘風寒濕熱四氣之病無燥火二淫之故殆是從四時令氣之傷人者於秋不言傷其燥而乃曰傷其濕者為相火代君火行令於暑故止言熱而不言火夫如是之天氣合四時者尚不能明況能推究人以一氣之變亦如天氣六淫之分者乎且人氣之燥火二淫常通貫於風寒濕熱病中尤多於四氣之相移也何以言之在病之沖逆奔迫即屬之火氣液不得通即屬之燥其火遊行於五者之間今不以為言尚不可也抑夫燥者正屬五行金氣所化而亦舍之此何理焉及觀其所立氣門多是二淫之病可見其不識人氣有六化六變之道宜乎其治氣病之法無端緒矣診郁脈多沉伏郁在上則見於寸郁在中則見於關郁在下則見於尺郁脈或促或結或澀滑伯仁云氣血食積痰飲一有留滯於其間則脈必因之而止澀矣但當求其有神所謂神者胃氣也痞脹在腹中脹有形胸痹痞在心下痞無形內附或問痞屬何臟邪屬何氣曰嘗考之內經有陽明之復心痛痞滿者注以清甚於內熱鬱於外太陽之復心胃生寒心痛痞悶者注以心氣內燔備化之紀病痞卑監之紀留滿痞塞太陰所至為積飲否隔注皆以陰勝陽也由是觀之則是受病之臟者心與脾也因而怫鬱壅塞不通為痞者火與濕也其論致病所由之邪則不可一言而盡天氣之六淫外感人氣之五邪相乘陰陽之偏負飲食七情之過節皆足以亂其火土之氣蓋心陽火也主血脾陰土也主濕凡傷其陽則火怫鬱而血凝傷其陰則土壅塞而濕聚二臟之病相去不離方寸間至於陰陽之分施治之法便不可同也何則金匱要略水病篇謂心下堅大如盤邊如旋杯水飲所作者二條同是語也但一條之上有氣分二字用桂枝去芍藥加麻黃附子細辛湯治為水寒之邪閉結氣海之陽不布榮衛不行一條用枳朮湯為中焦水停土壅故也又胸痹篇云胸痹心下痞留氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之一證列二方原其意蓋是留氣結在胸為重者便須補中又心中痞諸逆心懸痛桂枝生薑枳實湯主之傷寒論中有謂病人手足厥冷脈作緊邪結在胸中者當吐之脈浮大心下反硬有熱屬臟者下之茲二者為不汗下而痞滿從其邪有高下故吐下之不同若經汗下而心下痞則以諸瀉心湯大抵痞與結胸同是滿硬但結胸則湧治豈非仲景治痞亦在心脾二臟從火土之陰陽者歟各適其宜而治高者越之下者竭之上氣不足推而揚之下氣不足溫而行之高者抑之下者舉之郁者開之結者解之寒者熱之熱者寒之虛則補實則瀉隨機應變以為治東垣云夫痞者心下滿而不痛是也太陰者濕也主壅塞乃土來心下為痞滿也傷寒下太早亦為痞乃為寒傷其榮榮者血也心主血邪入於本故為心下痞悶仲景立瀉心湯數方皆用黃連以瀉心下之土邪其效如響應桴故活人書云審知是痞先用桔梗枳殼湯非以此專治痞也蓋因先錯下必成痞證是邪氣將陷而欲過胸中故先用截散其邪氣使不至於痞先之一字早用之義也若已成痞而用之則失之晚矣不惟不能消痞而反損胸中之正氣則當以仲景痞藥治之經云察其邪氣所在而調治之正謂此也非止傷寒如此至於酒積雜病下之太過亦作痞傷蓋下多亡陰亡陰者謂脾胃水穀之陰亡也故胸中之氣因虛下陷於心之分野則致心下痞宜升胃氣以血藥兼之若全用氣藥導之則其痞益甚甚而復下之氣愈下降必變為中滿膨脹皆非其治也又有虛實之殊如實痞大便閉者厚朴枳實湯主之虛痞大便利者白芍陳皮湯主之如飲食所傷痞悶者當消導之去其胸中窒塞上逆兀兀欲吐者則吐之所謂在上者因而越之也海藏云治痞獨益中州脾土以血藥治之其法無以加矣傷寒痞者從血中來雜病痞者亦從血中來雖俱為血證然傷寒之證從外至內從有形至無形故無形氣證以苦泄之有形血證以辛甘散之中滿者勿食甘不滿者復當食也中滿者腹脹也如自覺滿而外無腹脹之形即非中滿乃不滿也不滿者病也當以甘治之可也主方黃耆補中湯加柴胡升麻緣天地不交為痞今以豬苓澤瀉從九天之上而降柴胡升麻從九地之下而升則可以轉否而為泰矣無形氣證以苦泄之枳實黃連之類大消痞丸黃連消痞丸失笑丸有形血證以辛甘散之枳實理中丸人參湯半夏瀉心湯傷寒五六日不論以下未下心下痞滿瀉心湯小柴胡湯加枳桔主之少陰面赤下利心下痞瀉心湯加減例易老單用瀉心湯用錢氏法後隨症加減煩者加山梔躁加香豉嘔加半夏滿加枳實厚朴腹痛加芍藥脈遲加附子下焦寒加乾薑大便硬加大黃如用姜附先煎令熟使熱不僭後加黃連同用痞而頭目不清者以上清散主之胸中不利者悉利於表飲食傷脾痞悶輕者大消痞丸枳朮丸回金丸之類甚者微下之吐之下之者檳榔丸煮黃丸吐之者二陳湯及瓜蒂散探吐之若酒積雜病下之太過亦作痞滿宜升提胃氣以血藥兼之濕者四肢困重小便短宜平胃和五苓以滲之郁者越鞠丸熱則煩渴溺赤以苦寒泄之大消痞丸煎湯用黃連及葛根升麻發之便結即利之寒則中清以辛甘散之枳實理中丸撾脾湯加丁香或丁沉透膈湯戴復庵以諸痞塞及噎膈乃是痰為氣所激而上氣又為痰所隔而滯痰與氣搏不能流通並宜用二陳湯加枳實砂仁木香或木香流氣飲入竹瀝薑汁服因七氣所傷結滯成疾痞塞滿悶宜四七湯或導痰湯加木香半錢或下來復丹脾胃弱而轉運不調為痞宜四君子湯傷於勞倦者補中益氣湯大病後元氣未復而痞者亦宜之脈之右關多弦弦而遲者必心下堅此肝木克脾土鬱結涎閉於臟腑氣不舒則痞木香順氣湯挾死血者多用牡丹皮江西紅曲麥芽炒研香附童便制桔梗川通草穿山甲番降香紅花山楂肉蘇木各錢許酒童便各一鍾煎甚者加大黃臨服入韭汁桃仁泥此方一應大怒之後作痞者皆可服胸痹心下滿而不痛為痞心下滿而痛為胸痹金匱方胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘枳薑湯主之胸痹緩急者薏苡仁附子散主之此二條不言痛支飲胸滿者枳樸大黃湯主之不言痹胸痹之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數者以栝蔞薤白白酒湯主之胸痹不得臥心痛徹背栝蔞薤白半夏湯主之胸痹心中痞留氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之一味栝蔞取子熟炒連皮或煎或丸最能盪滌胸中垢膩水脹總論許學士云臍腹四肢悉腫者為水但腹脹四肢不甚腫為蠱蠱即脹也然脹亦有頭面手足盡腫者大抵先頭足腫後腹大者水也先腹大後四肢腫者脹也靈樞經五癃津液別篇黃帝問曰水穀入於口輸於腸胃其液別為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣並則為泣中熱胃緩則為唾邪氣內逆則氣為之閉塞而不行不行則為水脹予知其然也不知其何由生願聞其道岐伯曰水穀皆入於口其味有五各注其海津液各走其道故三焦出氣以溫肌肉充皮膚為其津其流而不行者為液天暑衣厚則腠理開故汗出寒留於分肉之間聚沫則為痛天寒則腠理閉氣濕不行水下留於膀胱則為溺與氣五臟六腑心為之主耳為之聽目為之候肺為之相肝為之將脾為之衛腎為之主外故五臟六腑之津液盡上滲於目心悲氣並則心系急心系急則肺舉肺與則液上溢夫心系舉肺不能常舉乍上乍下故咳而泣出矣中熱則胃中消穀消穀則蟲上下作腸胃充郭故胃緩胃緩則氣逆故唾出五穀之津液和合而為膏者內滲入於骨空補益腦髓而下流於陰股陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛酸陰陽氣道不通四海閉塞三焦不瀉津液不化水穀並於腸胃之中別於迴腸留於下焦不得滲膀胱則下焦脹水溢則為水脹水脹篇黃帝問於岐伯曰水與膚脹鼓脹腸覃石瘕石水何以別之岐伯答曰水始起也目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也黃帝曰膚脹何以候之岐伯曰膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也鼓脹何如岐伯曰腹脹身皆大大與膚脹等也色蒼黃腹筋起此其候也腸覃何如岐伯曰寒氣客於腸外與衛氣相搏氣不得營因有所繫癖而內著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也石瘕何如岐伯曰石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下黃帝曰膚脹鼓脹可刺耶岐伯曰先瀉其脹之血絡後調其經刺去其血絡也石水臍以下腫其脈沉水腫素問湯液醪醴論帝曰其有不從亳毛而生五臟陽以竭也津液充郭其魄獨居孤精於內氣耗於外形不可與衣相保此四極急而動中是氣拒於內而形施於外治之奈何岐伯曰平治於權衡去宛陳莝微動四極溫衣繆刺其處以復其形開鬼門潔淨府精以時服五陽以布疏滌五臟故精自生形自盛骨肉相保巨氣乃平釋云不從毫毛生者明其邪不自腠理入是水從內而溢出於外者也五臟陽以竭者為由脾胃虛弱夫脾胃者土也法天地生萬物故水穀入胃清陽化氣濁陰成味五臟稟其氣曰陽稟其味曰精即經之謂五陽者胃脘之陽是也氣和精生今不得稟水穀氣則無氣以生不得稟五味則無精以化肺主氣而魄臟焉無氣則魄獨居腎為陽故動之經脈行則脾胃之水穀得以化四臟亦得以稟之然後可以施治其水在表在上者汗之在下在裡者分利之夫如是此條所治正與評熱論陰虛者對待而言也彼為腎之陰虛不能敵夫所湊之陽此為胃之陽虛不能制夫溢水之陰也仲景法諸有水者腰以下腫當利小便腰以上腫當發汗乃愈防己黃耆湯防己茯苓湯蒲灰散以上利小便越婢湯越婢加朮湯甘草麻黃湯麻黃附子湯杏子湯以上發汗觀此可見仲景之法一出於內經後世治水腫方有五皮散香蘇散中用薑橘紫蘇大腹皮辛以散之茯苓防己木通桑皮淡以滲之是開鬼門潔淨府同用也丹溪云因脾虛不能制水水漬妄行當以參術補脾氣得實則自能健運自能升降運動其樞機則水自行非五苓之行水也又云內經曰諸氣膹郁皆屬於肺諸濕腫滿皆屬於脾諸腹脹大皆屬於熱是三者相因而為病蓋濕者土之氣土者火之子故濕每生於熱熱氣亦能自濕者母氣感子濕之變也濕氣盛肺氣不行而膹郁矣故水腫病者脾失運化之職清濁混淆因鬱而為水脾土既病肺為之子而肺亦虛榮衛不布氣停水積凝聚濁液滲透經絡涵流溪谷窒礙津液久久灌入隧道血亦化水矣凡治腫皆宜以治濕為主所挾不同故治法亦異更宜清心經之火補養脾土火退則肺氣下降而水道通脾土旺則運化行清濁分其清者復回而為氣為血為津液其敗濁之甚者在上為汗在下為溺以漸而分消矣盧砥鏡治水腫類例以肺金盛而生水水溢妄行氣息閉樞機壅而為腫必欲導腎以決去之豈理也哉夫肺者腎之母其氣清肅若果由肺盛生水則將奉行降令通調水道下輸膀胱水精四布五經並行而何病腫之有或問丹溪所論水病之源在於脾土盧氏論水宗於水熱篇陰盛水溢其源在腎所起不同故治必異今如丹溪之論則內經非歟曰不然試用水熱篇三章之義繹之則晰然矣首章問少陰何以主腎腎何以主水曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也此以少陰經脈在上主腎行冬令至陰盛水氣化之常者而言也非是為病之因也當時若遇邪傷則二臟之氣停而皆積水矣今盧氏不求其為因所感之邪而致氣停水積乃輒以至陰盛水謂是臟氣有餘而生病者誤矣不然何乃次章復問腎何以能聚水而生病曰腎者胃之關也關門不利故聚水而從其類也上下溢於皮膚故為胕腫胕腫者聚水而生病也此承上章積水之病故註文以腎主下焦膀胱為腑主其分注開竅二陰故腎氣化則二陰通二陰閉則胃填滿故云腎者胃之關也關閉則水積然而氣停水溢之義尚有可言者焉當是下焦之氣也何則靈樞本輸篇曰少陽者屬腎上連肺故將兩臟三焦者決瀆之腑也水道出焉屬膀胱是孤腑也宣明五氣篇下焦溢為水註文以分注之所氣窒不瀉則溢而為水也又曰三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹以此觀之其下焦少陽之經氣當相火之化六氣中惟相火有其經無其腑臟遊行於五者之間故曰少陽為遊部其經脈之在上者布膻中散絡心包在下者出於委陽上絡膀胱豈非上佐天道之施化下佐地道之生髮與手厥陰為表裡以行諸經之使者乎是故腎經受邪則下焦之火氣鬱矣火氣鬱則水精不得四布而水聚矣火鬱之久必發發則與衝脈之屬火者同逆而上蓋衝脈者十二經之海其上者出於項顙滲諸陽灌諸精其下者並少陽下足滲三陰灌諸絡由是水從火溢上積於肺而為喘呼不得臥散聚於陰絡而為胕腫隨五臟之虛者入而聚之為五臟之脹夫如是之病皆相火氾濫其水而生病者也非相火則水不溢而止為積水之病如內經所謂陰陽結斜多陰少陽曰石水少腹腫三陰結寒為水腎肝並沉為石水之類是也又嘗推其腎氣不化之由多是四氣相乘害之蓋胃是腎之勝臟或濕熱盛而傷之或胃氣不足下陷而害之或心火太過下乘而侮之或燥金斂澀之或風木搖撼之與夫勞役色欲七情外感皆足以致腎氣之不足也夫胃之關不惟因腎氣不化而後閉其胃之病者而關亦自閉矣其水不待腎水而生所飲之水亦自聚矣蓋胃主中焦為水穀之海胃氣和則升降出納之氣行水穀各從其道而輸泄也胃氣不和則出納之關皆不利故水穀之津液皆積聚而變水也即靈樞經脈篇曰胃所生病大腹水腫膝臏腫痛津液篇曰五穀之津液因陰陽不和則氣道不通四海閉塞三焦不瀉津液不化水穀並於腸胃之中留於下焦不得滲膀胱則下焦脹水溢則為水脹王叔和脈經曰脾常懷抱其子子肺金也子畏火傷下避水中木畏金乘下為荊棘脾復畏木居一隅水遂上溢而為脹也即此諸論觀之所謂關門不利云云者蓋以二臟相因而然耳第三章問諸水皆生於腎乎曰腎者牝臟也地氣上者屬於腎而生水液也故曰至陰勇而勞甚則腎汗出腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳為胕腫本之於腎名曰風水觀是章所謂地氣上者指人形體皆稟地之陰以生者而言也腎居五臟之下是至陰主水以生津液是故津液在百體猶水在地中行五氣所化之五液悉屬於腎今因勞火迫於腎氣之液發出為汗因逢風而玄府閉其汗與風相搏遂結於皮膚於是五氣所化新舊之液則皆類聚而成水矣用是比例推之則腎氣之勞不止房事一端而已如夜行勞甚渡水跌僕持重遠行極怒驚恐之類豈無越出腎液於表亦得以逢於風者乎此聖人之言簡而意博舉一而可十者也又按評熱篇曰有病腎風者面胕痝然壅害於言虛不當刺不當刺而刺後五日其氣必至至必少氣時熱時熱從胸背上至頭汗出手熱口乾苦渴小便黃目下腫腹中鳴身重難以行月事不來煩而不能食不能正偃正偃則咳病名曰風水此腎虛不可妄治治之則陰愈虛而陽必湊之轉及五臟有是熱病狀也用此比類前後所敘諸水溢之病未有不因腎虛得之設不顧虛輒攻其水是重虛其陰也虛則諸邪可入而轉生病矣內經又謂肝腎脈並浮為風水此尤見是陰虛之甚者也何則夫腎肝二臟同居下焦腎為陰主靜其脈沉肝為陽主動其脈浮而陰道易乏陽道易饒為二臟俱有相火故也若相火所動不得其正動於腎者猶龍火之於海故水附而龍起動於肝者猶雷火之出於地疾風暴發故水如波湧今水從風是以肝腎並浮也王注以為風薄於下似若水風之邪世人莫知肝木內發之風也靈樞水脹篇有水脹膚脹鼓脹腸覃石瘕石水之病治膚脹鼓脹者先瀉其脹之血絡後調其經刺去其血絡也觀此膚脹與脹論篇謂榮氣循脈衛氣逆為脈脹衛氣並脈循分肉為膚脹三里而瀉近者一下遠者三下無問虛實工在疾瀉此篇之鼓脹亦與腹中論中之鼓脹同其病狀彼則治之以雞矢醴一劑知二劑已若飲食不節其病雖已當病氣復聚於腹也何與此篇治是二證皆先瀉其脹之血絡刺去其血而復調其經如是之不同何哉蓋彼以氣聚之病此以氣停與血相搏故血凝於絡氣凝於經而生水液為脹故治不同也仲景云風水其脈自浮外證骨節疼痛惡風針經論疾診尺篇云視人之目窠上微腫如新臥起狀其頸脈動時咳按其手足上窅而不起者風水膚脹也又仲景云太陽病脈浮而緊法當骨節疼痛反不痛身體反重而酸其人不渴汗出即愈為風水風水脈浮身重汗出惡風者防己黃耆湯主之風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之惡風者加附子一枚炮續法風水身體浮腫發歇不定肢節疼痛上氣喘急大腹皮散主之風水毒氣遍身腫滿楮白皮散主之皮水其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不渴當發其汗又云渴而不惡寒者此是皮水蓋法當風水惡寒不渴皮水不惡寒而渴假令皮水不渴亦當發汗也皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之厥而皮水者蒲灰散主之續法皮水身體面目悉浮腫木香丸主之正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘大奇論腎肝並沉為石水並浮為風水續法石水四肢細瘦腹獨腫大海蛤丸主之石水病腹光緊急如鼓大小便澀檳榔散主之黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰膿又云身腫而冷狀如周痹胸中窒不能食反聚痛暮躁不得眠此為黃汗治法見黃疸門里水者一身面目黃腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴越婢加朮湯主之甘草麻黃湯亦主之水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗即已脈沉者宜麻黃附子湯浮者宜杏子湯心水者其身重而少氣不得臥煩而躁其人陰腫肝水者其腹大不能自轉側脅下腹中痛時時津液微生小便續通肺水者身腫小便難時時鴨溏脾水者其腹大四肢苦重津液不生但苦少氣小便難腎水者其腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷面黃瘦大便反堅諸病水者渴而不利小便數者皆不可發汗問曰病者苦水面目四肢身體皆腫小便不利脈之不言水反言胸中痛氣上衝咽狀如炙肉當微咳喘審如師言其脈何類師曰寸口脈沉而緊沉為水緊為寒沉緊相搏結在關元始時當微年盛不覺陽衰之後榮衛相干陽損陰盛結寒微動腎氣上衝喉咽塞噎脅下急痛醫以為留飲而大下之氣擊不去其病不除後重吐之胃家虛煩咽燥欲飲水小便不利水穀不化面目手足浮腫又與葶藶丸下水當時如小瘥食飲過度腫復如前胸脅苦痛象若奔豚其水揚溢則浮咳喘逆當先攻擊沖氣令止乃治咳咳止其喘自瘥先治新病病當在後上仲景治水諸方皆用脈病為本然後量輕重虛實而施治皆守聖經之法耳奈何今世俗之醫因病者急求一時之效以破氣去水為功不知過一二日則病復至而不可救矣嗚呼予每痛夫世人病水腫多死不救者有二一以病人不善調攝二以醫誤投下藥之過竭其陰陽絕其胃氣故多死於是詳摘素靈金匱之言而稍發明之有志者當不厭其繁也腫病不一或遍身腫或四肢腫面腫腳腫皆謂之水氣然有陽水有陰水並可先用五皮飲或除濕湯加木瓜腹皮各半錢如未效繼以四磨飲兼吞桂黃丸仍用赤小豆粥佐之遍身腫煩渴小便赤澀大便多閉此屬陽水輕宜四磨飲添磨生枳殼兼進保和丸重則䟽鑿飲子利之以通為度亦有雖煩渴而大便已利者此不可更利宜用五苓散加木通大腹皮半錢以通小便遍身腫不煩渴大便自調或溏泄小便雖少而不赤澀此屬陰水宜實脾飲小便多少如常有時赤有時不赤至晚則微赤卻無澀滯者亦屬陰也不可遽補木香流氣飲繼進復元丹若大便不溏氣息脹滿宜四磨飲下黑錫丹四肢腫謂之肢腫宜五皮飲加薑黃木瓜各一錢或四磨飲或用白朮三兩㕮咀每服半兩水一盞半大棗三枚拍破同煎至九分去查溫服日三無時名大棗湯面獨腫蘇子降氣湯兼氣急者尤宜或煎熟去滓後更磨沉香一呷有一身之間唯面與雙腳浮腫早則面甚晚則腳甚經云面腫為風腳腫為水乃風濕所致須問其大小腑通閉別其陰陽二症前後用藥惟除濕湯加木瓜腹皮白芷各半錢可通用或以蘇子降氣湯除濕湯各半帖煎之羅謙甫導滯通經湯治面目手足浮腫感濕而腫者其身雖腫而自腰下至腳尤重腿脹滿尤甚於身氣或急或不急大便或溏或不溏但宜通利小便為佳以五苓散吞木瓜丸內犯牽牛亦不可輕服間進除濕湯加木瓜腹皮各半錢炒萊菔子七分半因氣而腫者其脈沉伏或腹脹或喘急宜分氣香蘇飲飲食所傷而腫或胸滿或噯氣宜消導寬中湯不服水土而腫者胃苓湯加味五皮湯有患生瘡用干瘡藥太早致遍身腫宜消風敗毒散若大便不通升麻和氣飲若大便如常或自利當導其氣自小便出宜五皮飲和生料五苓散腹若腫只在下宜除濕湯和生料五苓散加木瓜如澤瀉之數以上數條為有餘之證大病後浮腫此係脾虛宜加味六君子湯白朮三錢人參黃耆各一錢半白茯苓二錢陳皮半夏曲芍藥木瓜各一錢炙甘草大腹皮木瓜各五分薑棗煎服小便不利間入五苓散有脾肺虛弱不能通調水道者宜用補中益氣湯補脾肺六味丸補腎有心火克肺金不能生腎水以致小便不利而成水證者用人參平肺散以治肺滋陰丸以滋小便若腎經陰虧虛火爍肺金而小便不生者用六味地黃丸以補腎水用補中益氣湯以培脾土肺脾腎之氣交通則水穀自然克化二經既虛漸成水脹又誤用行氣分利之藥以致小便不利喘急痰盛已成蠱證宜加減金匱腎氣丸主之以上數條為不足之證不足者正氣不足有餘者邪氣有餘凡邪之所湊必正氣虛也故以治不足之法治有餘則可以治有餘之法治不足則不可潔古法如水腫因氣為腫者加橘皮因濕為腫者煎防己黃耆湯調五苓散因熱為腫者八正散如以熱燥於肺為腫者乃絕水之源也當清肺除燥水自生矣於梔子豉湯中加黃芩如熱在下焦陰消使氣不得化者當益陰而陽氣自化黃柏內加黃連是也如水脹之病當開鬼門潔淨腑也白茯苓湯主之白茯苓湯能變水白茯苓澤瀉各二兩郁李仁五錢水一碗煎至一半生薑自然汁入藥常服無時從少至多服五七日後覺腹下再腫治以白朮散白朮澤瀉各半兩為末煎服三錢或丸亦可煎茯苓湯下三十丸以黃耆芍藥建中湯之類調養之平復後忌房室豬魚鹽面等物香薷熬膏丸如桐子大每服五丸日三漸增以小便利為度冬瓜不限多少任吃鯉魚一頭重一斤以上者煮熟取汁和冬瓜蔥白作羹食之青頭鴨或白鴨治如食法細切和米並五味煮熟作粥食之宜空腹時進何柏齋學士云造化之機水火而已宜平不宜偏宜交不宜分水為濕為寒火為燥為熱火性炎上水性潤下故火宜在下水宜在上則易交也交則為既濟不交則為未濟不交之極則分離而死矣消渴證不交而火偏盛也水氣證不交而水偏盛也制其偏而使之交則治之之法也小火不能化大水故必先瀉其水後補其火開鬼門瀉在表在上之水也潔淨腑瀉在裡在下之水也水勢既減然後用暖藥以補元氣使水火交則用藥之次第也又云盧氏以水腫隸肝腎胃而不及脾丹溪非之似矣然實則皆非也蓋造化生物天地水火而已矣主之者天也成之者地也故曰乾知太始坤作成物至於天地交合變化之用則水火二氣也天運水火之氣於地之中則物生矣然水火不可偏盛太旱物不生火偏盛也太澇物亦不生水偏盛也水火和平則物生矣此自然之理也人之臟腑以脾胃為主蓋飲食皆入於胃而運以脾猶地之土也然脾胃能化物與否實由於水火二氣非脾胃所能也火盛則脾胃燥水盛則脾胃濕皆不能化物乃生諸病水腫之證蓋水盛而火不能化也火衰則不能化水故水之入於脾胃者皆滲入血脈骨肉血亦化水肉發腫脹皆自然之理也導去其水使水氣少減復補其火使二氣平和則病去矣丹溪謂脾失運化由肝木侮脾乃欲清心經之火使肺金得令以制肝木則脾土全運化之職水自順道乃不為腫其詞迂而不切故書此辨之按何公雖於醫學未精其論水火則醫書所未發是可存也故附著於此診目窠微腫如臥蠶之狀曰水足脛腫曰水頸脈動喘疾咳曰水病下利後渴飲水小便不利腹滿因腫此法當病水若小便自利及汗出者自當愈趺陽脈當伏今反數本自有熱消穀小便數今反不利此欲作水寸口脈浮而遲浮脈則熱遲脈則潛熱潛相搏名曰沉趺陽脈浮而數浮脈則熱數脈則止熱止相搏名曰伏沉伏相搏名曰水沉則絡脈虛伏則小便難虛難相搏水走皮膚則為水矣脈得諸沉當責有水身體腫重水病脈出者死三因云大抵浮脈帶數即是虛寒潛止於其間久必沉伏沉伏則陽虛陰實為水必矣面痝然浮腫疼痛其色炲黑多汗惡風者屬腎風陽水兼陽證脈必沉數陰水兼陰證脈必沉遲沉而滑為風水浮而遲弦而緊皆為腫水病脈洪大者可治微細者不可治又云浮大輕者生沉細虛小者死又云實者生虛者死唇黑則傷肝缺盆平則傷心臍出則傷脾足心平則傷腎背平則傷肺凡此五傷必不可治脹滿腸覃石瘕仲景云脹滿按之不痛為虛痛者為實可下之腹脹時減復如故此為寒當與溫藥腹滿不減減不足言須當下之宜大承氣湯心下堅大如盤邊如旋杯水飲所作枳朮湯主之腹滿口舌乾燥此腸胃間有水氣防己椒藶丸主之病腹滿發熱十日脈浮而數飲食如故厚朴七物湯主之脾虛滿者黃耆湯芍藥停濕脾實滿不運平胃散蒼朮泄濕東垣云腹脹滿氣不轉者加厚朴以破滯氣腹中夯悶此非腹脹滿乃散而不收可加芍藥收之是知氣結而脹宜厚朴散之氣散而脹宜芍藥收之六元政紀論云太陰所至為中滿太陰所至為蓄滿諸濕腫滿皆屬脾土論云脾乃陰中之太陰同濕土之化脾濕有餘腹滿食不化天為陽為熱主運化也地為陰為濕主長養也無陽則陰不能生化故云藏寒生滿病調經篇云因飲食勞倦損傷脾胃始受熱中末傳寒中皆由脾胃之氣虛弱不能運化精微而制水穀聚而不散而成脹滿經云腹滿䐜脹支膈胠脅下厥上冒過在太陰陽明乃寒濕鬱遏也脈經所謂胃中寒則脹滿者是也腹滿大便不利上走胸臆喘息喝喝然取足少陰又云脹取三陽三陽者足太陽寒水為脹與通評虛實論說腹暴滿按之不下取太陽經絡胃之募也正同取者瀉也經云中滿者瀉之於內者是也宜以辛熱散之以苦瀉之淡滲利之使上下分消其濕正如開鬼門潔淨腑溫衣繆刺其處是先瀉其血絡後調其真經氣血平陽布神清此治之正也或問諸脹腹大皆屬於熱者何也此乃病機總辭假令外傷風寒有餘之邪自表傳裡寒變為熱而作胃實腹滿仲景以大承氣湯治之亦有膏粱之人濕熱鬱於內而成脹滿者此熱脹之謂也大抵寒脹多而熱脹少治之者宜詳辨之諸腹脹大皆屬於熱此乃八益之邪有餘之證自天外而入是感風寒之邪自表傳裡寒變為熱作胃實腹病日晡潮熱大渴引飲譫語是太陽陽明並大實大滿者大承氣湯下之少陽陽明微滿實者小承氣湯下之經云泄之則脹已此之謂也假令痎瘧為脹滿亦有寒脹熱脹是天之邪氣傷暑而得之不即時發至秋暑氣衰絕而瘧病作矣知其寒也局方用交解飲子者是也內虛不足寒濕令人中滿及五臟六腑俱有脹滿更以脈家寒熱多少較之胃中寒則脹滿濁氣在上則生䐜脹取三陽三陽者足太陽膀胱寒水為脹腹暴滿按之不下取太陽經絡者胃之募也正同腹滿䐜脹支膈胠脅下厥上冒過在太陰陽明此胃之寒濕鬱遏也太陰䐜脹後不利不欲食食則嘔不得臥按內經所說寒脹之多如此中滿治法當開鬼門潔淨腑開鬼門者謂發汗也潔淨腑者利小便也中滿者瀉之於內謂脾胃有病當令上下分消其氣下焦如瀆氣血自然分化不待泄滓穢如或大實大滿大小便不利從權以寒熱藥下之或傷酒濕面及味厚之物膏粱之人或食已便臥使濕熱之氣不得施化致令腹脹滿此脹亦是熱脹治熱脹分消丸主之如或多食寒涼及脾胃久虛之人胃中寒則脹滿或臟寒生滿病以治寒脹中滿分消湯主之中滿熱脹鼓脹氣脹皆分消丸主之中滿寒脹寒疝大小便不通陰躁足不收四肢厥逆食入反出下虛中滿腹中寒心下痞下焦躁寒沉厥奔豚不收皆分消湯主之中滿腹脹內有積聚堅硬如石其形如盤令人不能坐臥大小便澀滯上喘氣促面色痿黃通身虛腫廣朮潰堅湯主之二服後中滿減半止有積不消再服半夏厚朴湯陰陽應象論云清氣在下則生餐泄濁氣在上則生䐜脹此陰陽反作病之逆從也夫䐜脹者以寒熱溫涼論之此何腹脹也曰此飲食失節為脹乃受病之始也濕熱亦能為脹右關脈洪緩而沉弦脈浮於上是風濕熱三脈相合而為病也是脾胃之令不行陰火亢甚乘於脾胃盛則左遷而陽道不行是六腑之氣已絕於外火盛能令母實風氣外絕風氣外絕者是穀氣入胃清氣營氣不行便是風氣也異呼同類即胃氣者是也經云虛則兼其所勝土不勝者肝之邪也是脾胃之土不足水火大勝者也經云濁陰出下竅濁陰走五臟濁陰歸六腑濁陰歸地此平康不病之常道反此則為脹也陰陽論云飲食不節起居不時者陰受之陰受之則入五臟入五臟則䐜脹閉塞調經篇云下脘不通則胃氣熱熱氣熏胸中故內熱下脘者幽門也人身之中上下有七衝門皆下衝上也幽門上衝吸門吸門者會厭也沖其吸入之氣不得下歸於腎肝為陰火動相拒故咽膈不通致濁陰之氣不得下降而大便乾燥不行胃之濕與客陰之火俱在其中則腹脹作矣治在幽門使幽門通利泄其陰火潤其燥血生益新血幽門通利則大便不閉吸門亦不受邪其膈咽得通䐜滿腹脹俱去是濁陰得下歸地矣故經曰中滿者瀉之於內此法是也通幽湯潤腸丸脹而大便燥結脈沉之洪緩浮之弦者宜沉香交泰丸範天騋夫人先因勞役飲食失節加之憂思氣結病心腹脹滿旦食則不能暮食兩脅刺痛診其脈弦而細至夜濁陰之氣當降而不降䐜脹尤甚大抵陽主運化飲食勞倦損傷脾胃陽氣不能運化精微聚而不散故為脹滿先灸中脘乃胃之募穴引胃中生髮之氣上行陽道後以木香順氣湯助之則濁陰之氣自此而降矣經曰留者行之結者散之以柴胡升麻之苦平行少陽陽明二經發散清氣運行陽分為君以生薑半夏草豆蔻益智仁之甘辛大熱消散中寒為臣以厚朴木香蒼朮青皮之辛苦大溫通順滯氣以陳皮當歸人參辛甘溫調和榮衛滋養中氣濁氣不降宜以苦泄之吳茱萸之苦熱泄之者也氣之薄者為陽中之陰茯苓甘平澤瀉鹹平氣薄引濁陰之氣自上而下故以為佐氣味相合散之泄之上之下之使清濁之氣各安其位也靈樞經云腹滿大便不利上走胸臆喘息喝喝然取足少陰取者瀉也宜以辛熱散之良薑肉桂益智仁草豆蔻仁厚朴升麻甘草獨活使黃柏少許引用又方桂枝桔梗人參陳皮青皮少許良薑白朮澤瀉吳茱萸太陰所至為蓄滿辨云脾為陰中之太陰又云脾為陰中之至陰乃為坤元亙古不遷之土天為陽火也地為陰水也在人則為脾同陰水之化脾有餘則腹脹滿食不化故無陽則不能化五穀脾盛乃大寒為脹滿故脈經云胃中寒則脹滿大抵此病皆水氣寒濕為之也治宜大辛熱之劑必愈然亦有輕重木香塌氣丸丹溪云脾者具坤靜之德而有乾健之運故能使心肺之陽降腎肝之陰升而成天地交之泰是為平人今也七情內傷六淫外感飲食失節房勞致虛脾土之陰受傷轉輸之官失職胃雖受谷不能運化故陽升陰降而成天地不交之否清濁相混隧道壅塞而為熱熱留為濕濕熱相生遂成脹滿經云鼓脹是也以其外雖堅滿中空無物有似於鼓以其膠固難治又名曰蠱若蟲之侵蝕而有蠱之義焉宜補其脾又須養肺金以制木使脾無賊邪之患滋腎水以制火使肺得清化之令卻鹹味斷妄想遠音樂無有不安醫者不察急於取效病者苦於脹滿喜行利藥以求通快不知寬得一日半日其脹愈甚而病邪甚矣真氣傷矣或問方論或以胃冷中虛或以旦食則不能暮食由至陰居中五陽不布然也今丹溪乃云濕熱相生則固無寒者歟曰初病因寒飲食與外受寒氣亦或有之若丹溪之所言者則非一日之病初雖因寒陽氣被郁久亦成熱矣經曰諸腹脹大諸病有聲鼓之如鼓皆屬於熱是也今使心肺之陽降腎肝之陰升即是五陽布之也何必薑附之熱乎然先以救其脾胃虛弱者為本從而視其標之有餘者治之此亦聖人之旨也靈樞脹論謂五臟六腑皆有脹其脹皆在臟腑之外排臟腑而郭胸腹脹皮膚胸腹者臟腑之郭也各有畔界各有形狀榮氣循脈衛氣逆為脈脹衛氣並脈循分肉為膚脹夫諸脹者皆因厥氣在下榮衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也凡此諸脹其道在一明知逆順針數不失瀉虛補實神去其室致邪失正真不可定粗之所敗謂之天命補虛瀉實神歸其室久塞其空謂之良工以此而觀則聖人未嘗不以補虛為要曰靈樞脹論多言由厥氣在下寒氣逆上而為脹也更有他邪之可言乎曰考之內經脈要精微篇謂胃脈實氣有餘則脹腹中論謂病心腹滿旦食不能暮食名為鼓脹有病熱者三陽盛入於陰故病在頭與腹乃䐜脹而頭痛有病膺腫頸痛胸滿腹脹名曰厥逆風論謂胃風鬲塞不通腹善滿失衣則䐜脹調經篇謂形有餘則腹脹涇溲不利志有餘則腹脹餐泄至真大要篇謂諸濕腫滿皆屬於脾六元正紀大論謂土鬱之發心腹脹腸鳴而數後水運太過陰厥上下中寒甚則腹大脛腫寢汗憎寒至真大要論謂厥陰司天食則嘔腹脹溏泄在泉病腹脹善噫少陰司天腹䐜脹腹大滿彭彭而喘咳陽明之復脹而泄嘔苦咳噦陽明初之氣病中熱脹面目浮腫太陰陽明論謂飲食起居失節入五臟則䐜滿閉塞下為餐泄繆刺論謂有所墮墜惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡診要謂手少陰終者面黑齒長而垢腹脹閉上下不通而終足太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通面黑皮毛焦而終陰陽別論謂二陰一陽發病善脹心滿善氣為腎膽同逆三焦不行氣稸於上陰陽應象論濁氣在上則生䐜脹六元正紀論謂太陰所至為稸滿又云太陰所至為中滿脈解篇謂太陰子也十一月萬物氣皆藏於中故曰病脹所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故上走心為噫所謂食則嘔者物盛滿而上溢故嘔所謂得後與氣則快然如衰者十二月陰氣下衰而陽氣且出靈樞水脹篇謂鼓脹者腹脹身皆大與膚脹等色蒼黃腹筋起此其候也經脈篇謂胃氣不足胃中寒則脹滿身以前皆寒有脾是動病胃脘痛腹脹得後與氣則快然如衰邪氣論謂胃病者腹䐜脹胃脘當心而痛上支兩脅膈咽不通飲食不下又胃是動病賁響腹脹本神篇謂脾氣實則腹脹涇溲不利經脈篇謂足太陰之別公孫虛則鼓脹師傳篇謂胃中寒腸中熱則脹而泄脹論篇謂榮氣順脈衛氣逆為脈脹衛氣並脈循分肉為膚脹脾脹者善噦四肢煩悗體重不能勝衣臥不安胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難肺脹者虛滿而喘咳大腸脹者腸鳴而痛濯濯有聲腎脹者腹滿引背央央然腰髀痛膀胱脹者少腹滿而氣癃肝脹者脅下滿而痛引少腹膽脹者脅下痛脹口中苦善太息三焦脹者氣滿於皮膚中輕輕然不堅心脹者煩心短氣臥不安小腸脹者少腹䐜脹引腰而痛二經諸條之論各邪所生之脹各脹之病狀如此李東垣嘗引五常政大要云下之則脹已者謂西北二方地形高寒及異法方宜論云北方之人臟寒生滿病亦謂適寒涼者脹皆秋冬之氣也二者盡由寒涼在外六陽在於坤土之中坤土者人之脾胃也五臟之病外寒必內熱然陰盛陽虛故下之則愈又曰大抵寒脹多而熱脹少治者宜詳辨之予因是而思豈獨寒熱而已凡治是病必會通聖經諸條之旨然後能識臟腑之部分形證邪氣之所自來縱是通腹脹滿卒難究竟者亦必有脹甚之部與病先起處即可知屬何臟腑之氣受邪而不行者為先而後及乎中焦氣交之分於是轉運不前壅聚通腹脹滿也若脾胃受邪便先是胃脘心下痞氣起漸積為通腹脹也腹屬脾也屬脾胃者則飲食少屬他腑臟者則飲食如常此亦可驗又須分其表裡淺深以脹在皮膚孫絡之間者飲食亦如常其在腸胃肓膜之間者則飲食減少其氣壅塞於五臟則氣促急不食而病危矣是故病在表者易治入腑者難治入臟者不治更要分虛寒實熱其臟腑之氣本盛被邪填塞不行者為實其氣本不足因邪所壅者為虛實者祛之虛者補之寒者熱之熱者寒之結者散之留者行之邪從外入內而盛於中者先治其外而後調其內陰從下逆上而盛於中者先抑之而調其中陽從上降下而盛於中者先舉之亦調其中使陰陽各歸其部故內經治法謂平治權衡去菀陳莝開鬼門潔淨腑宣布五陽巨氣乃平此之謂也每見俗工不明其道專守下之則脹已者一法耳雖得少寬一二日然真氣未免因瀉而下脫而邪氣既不降必復聚成脹遂致不救可勝嘆哉因書一二證以驗之嘉定沈氏子年十八患胸腹身面俱脹滿醫治半月不效診其脈六部皆不出也於是用紫蘇桔梗之類煎服一盞胸有微汗再服則身盡汗其六部和平之脈皆出一二日其證悉平又一男子三十餘歲胸腹脹大發煩躁渴面赤不得臥而足冷予以其人素飲酒必酒後入內奪於所用精氣溢下邪氣因從之上逆逆則陰氣在上故為䐜脹其上焦之陽因下逆之邪所迫壅塞於上故發煩躁此因邪從下上而盛於上者也於是用吳茱萸附子人參輩以退陰逆冰冷飲之以解上焦之浮熱入咽覺胸中頓爽少時腹中氣喘如牛吼泄氣五七次明日其證愈矣風寒暑濕脹藿香正氣散七情脹五膈寬中散木香流氣飲沉香降氣湯或飲食所傷脾胃虛弱以致水穀聚而不化此寒濕鬱遏而脹香砂調中湯大怒而脹分心氣飲憂思過度而脹紫蘇子湯濕熱內甚心腹脹滿小便不利大便滑泄及水腫大橘皮湯失飢傷飽痞悶停酸早食暮不能食名谷脹大異香散雞矢醴治心腹脹滿旦食不能暮食由脾元虛弱不能剋制於水水氣上行浸漬於土土濕不能運化水穀氣不宣流上下痞塞故令人中滿旦陽氣方長穀氣易消故能食暮陰氣方進谷不得化故不能食其脈沉實滑病名谷脹用雞矢白半升以好酒一斗漬七日每服一盞食後臨臥溫服脾土受濕不能制水水漬於腸胃溢於皮膚漉漉有聲怔忪喘息名水脹大半夏湯煩躁漱水迷忘驚狂痛悶喘惡虛汗厥逆小便多大便血名血脹人參芎歸湯有因積聚相攻或疼或脹者初用七氣消聚散日久元氣虛脾胃弱而脹者參朮健脾湯少佐消導藥瘀蓄死血而脹腹皮上見青紫筋小水反利脈芤澀婦人多有此疾先以桃仁承氣湯勢重者抵當湯如虛人不可下者且以當歸活血散調治勞倦所傷脾胃不能運化而脹者補中益氣湯加減法見勞倦門大病後飲食失調脾胃受傷運化且難而生脹者先以化滯調中湯次以參苓白朮散瀉利後並過服通利藥以致脾胃太弱而脹專以補脾為主若瀉痢未止間用胃風湯喘滿不得臥虛者人參生脈散之類實者葶藶湯之類胸膈滿脹一身面目盡浮鼻塞咳逆清涕流出當用小青龍湯二三服分利其經卻進消脹藥經久患泄瀉晝夜不止乃氣脫也宜用益智子煎濃湯服立愈凡腹脹小腹脹有腎熱三焦虛寒石水腸癰女勞疸金匱云寸口脈遲而澀遲則為寒澀則為血不足趺陽脈微而遲微則為氣遲則為寒寒氣不足則手足逆冷手足逆冷則榮衛不利榮衛不利則腹脹腸鳴相逐氣轉膀胱榮衛俱勞陽氣不通即身冷陰氣不通即骨寒陽前通則惡寒陰前通則痹不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺尿名曰氣分寸口脈沉而遲沉則為水遲則為寒寒水相搏趺陽脈伏水穀不化脾氣衰則驚溏胃氣衰則身體腫少陽脈卑少陰脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分師曰寸口脈沉而數數則為出沉則為入出則為陽實入則為陰結趺陽脈微而弦微則無胃氣弦則不得息少陰脈沉而滑沉則為在裡滑則為實沉滑相搏血結胞門其瘕不瀉經絡不通名曰血分問曰病有血分水分何也師曰經水前斷後病水名曰血分此病為難治先病水後經水斷名曰水分此病易治何以故去水其經自當下氣分謂氣不通利而脹血分謂血不通利而脹非脹病之外又有氣分血分之病也蓋氣血不通利則水亦不通利而尿少尿少則腹中水漸積而為脹但氣分心下堅大而病發於上血分血結胞門而病發於下氣分先病水脹後經斷血分先經斷後病水脹也劉立之云氣分之證當以下氣消膨為先如枳殼散木香流氣飲三和散之類是也金匱方氣分心下堅大如盤邊如旋杯水飲所作桂枝去芍加麻辛附子湯主之良方加味枳朮湯治氣分脹滿婦人血分如奪命丹黑神散皆為要藥血分一證大小產後多有之唯產前腳腫不同產後則皆敗血所致當於血上治之腸覃腸覃者寒氣客於腸外與沖氣相搏氣不得榮因有所繫癖而內著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也夫腸者大腸也覃者延也大陽以傳導為事乃肺之腑也肺主衛衛為氣得熱則泄得冷則凝今寒客於大腸故衛氣不榮有所繫止而結瘕在內貼著其延久不已是名腸覃也氣散則清氣聚則濁結為瘕聚所以惡氣發起瘜肉乃生小漸益大至期而鼓其腹如懷子之狀也此氣病而血未病故月事不斷應時而下本非胎娠可以此為辨矣晞露丸木香通氣散主之石瘕石瘕者生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下夫膀胱為津液之腑氣化則能出焉今寒客於子們則氣塞而不通血壅而不流衃以留止結硬如石是名石瘕也此病先氣病而後血病故月事不來則可宣導而下出者也難經云任之為病其內苦結男子生七疝女子為瘕聚此之謂也非大辛之劑不能已也可服見睍丸和血通經湯診脈盛而緊大堅以澀遲而滑皆脹也關上脈虛則內脹脹脈浮大洪實者易治沉細微弱者難治唇偏舉者脾偏傾脾偏傾則善滿善脹腹脹身熱脈大是逆也如是者不過十五日死矣脹或兼身熱或兼如瘧狀皆不可治累驗腹大脹四末清脫形泄甚是逆也如是者不及一時死矣腹脹便血其脈大時絕是逆也嘔咳腹脹且餐泄其脈絕是逆也少陰終者面黑齒長而垢腹脹閉上下不通而終矣太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦而終矣積聚內經論積有寒氣客於小腸募原之間絡血之中血泣不得注於大經血氣稽留成積謂之瘕者有小腸移熱於大腸為伏瘕為沉者有脾傳腎為疝瘕者有任脈為病女子瘕聚者有厥陰司天溏泄瘕水閉者有二陽三陰脈並絕浮為血瘕有腎脈小急亦為瘕有伏梁二其一謂少腹盛上下左右皆有根裹大膿血居腸胃之外其二謂氣溢於大腸而著於肓肓之原在臍下故環臍而痛靈樞經言積皆生於風雨寒暑清濕喜怒喜怒不節則傷臟臟傷則病起於陰陰既虛矣則風雨襲陰之虛病起於上而生積清濕襲陰之虛病起於下而成積虛邪中人始於皮膚皮膚緩則腠理開開則邪從毛髮入入則抵深深則毛髮立毛髮立則淅然故皮膚痛留而不去傳舍於絡脈則痛於肌肉其痛之時息大經乃代傳舍於經則灑淅善驚傳舍於輸則六經不通四肢則肢節痛腰脊乃強傳舍於伏沖之脈則體重身痛傳舍於腸胃則賁響腹脹多寒則腸鳴餐泄食不化多熱則溏出麋傳舍於腸胃之外募原之間巳上數端皆邪氣襲虛留而不去以次相傳未曾留著無有定所若留著而有定所則不能傳矣下文是也留著於脈稽留而不去息而成積不一其處或著孫絡之脈者往來移行腸胃之間水湊滲注灌濯濯有音有寒則䐜滿雷引故時切痛或著於陽明之經者則挾臍而居飽食則益大飢則益小或著於緩筋者似陽明之積飽食則痛飢則安或著於腸胃之募原者痛而外連於緩筋飽食則安飢則痛或著於伏沖之脈者按之應手而動發手則熱氣下於兩股如湯沃之狀或著於膂筋在腸後者飢則積見飽則積不見按之不得或著於輸之脈者閉塞不通津液不下孔竅乾壅此邪氣之從外入內從上下也此謂風雨襲陰之虛病起於上而積生也積之始生得寒乃生厥乃成積也厥氣生足悗足悗生脛寒脛寒則血脈凝澀血脈凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相搏則併合凝聚不得散而積成矣卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血蘊裹而不散津液澀滲著而不去而積皆成矣此謂清濕襲陰之虛病起於下而成積也內經言積始末明且盡矣難經五積不過就其中析五臟相傳分部位以立其名金匱要略以堅而不移者為臟病名曰積以推移而不定者為腑病名曰聚然而二者原其立名之由亦不過就其肓膜結聚之處以經脈所過部分屬臟者為陰陰主靜靜則牢堅而不移屬腑者為陽陽則推蕩而不定以故名之耳又有槃氣者即飲食之氣滲注停積之名也巢氏病源於積聚之外復立癥瘕之名謂由寒溫不調飲食不化與臟氣相搏結所生其病不動者癥也雖有癖而可推移者瘕也瘕者假也虛假可動也張子和謂五積者因受勝己之邪而傳於己之所勝適當旺時拒而不受復還於勝己者勝己者不肯受因留結為積故肝之積得於季夏戊己日云云此皆抑鬱不伸而受其邪也豈待司天克運然後為郁哉故五積六聚治同郁斷如伏梁者火之郁火鬱則發之是也復述九積丸食積酸心腹滿大黃牽牛之類甚者礞石巴豆酒積目黃口乾葛根麥糵之類甚者甘遂牽牛氣積噫氣痞塞木香檳榔之類甚者枳殼牽牛涎積咽如拽鋸硃砂膩粉之類甚者瓜蒂甘遂痰積涕唾稠黏半夏南星之類甚者瓜蒂藜蘆癖積兩脅刺痛三稜廣朮之類甚者甘遂蠍稍水積足脛脹滿郁李商陸之類甚者甘遂芫花血積打撲肭瘀產後不月桃仁地榆之類甚者虻蟲水蛭肉積疒贅瘤核癧膩粉白丁香砭刺出血甚者硇砂阿魏每見子和辯世俗之訛必引內經為證若此者論病是從難經五積之名論治立九積丸是從病源攻其所食之物內經之義則未有發明然則用內經之義而治當何如曰內經分六淫六邪喜怒飲食起居房勞各有定治之法今既論積瘕由內外邪所傷豈不以諸邪之治法盡當行於其間乎邪自外入者先治其外邪自內生者先治其內然而天人之氣一陰陽也是故人氣中外之邪亦同天地之邪也從手經自上而下者同司天法平之從足經自下而上者同在泉法治之從五臟氣之相移者同五運郁法治之從腸胃食物所留者則奪之消之去菀陳莝也若氣血因之滯者則隨其所在以疏通之因身形之虛而邪得以入客稽留者必先補其虛而後瀉其邪大抵治是病必分初中末三法初治其邪入客後積塊之未堅者當如前所云治其始感之邪與留結之客者除之散之行之虛者補之約方適其主所為治及乎積塊已堅氣鬱已久變而為熱熱則生濕濕熱相生塊日益大便從中治當祛濕熱之邪其塊之堅者削之咸以耎之比時因邪久湊正氣尤虛必以補瀉迭相為用若塊消及半便從末治即住攻擊之劑因補益其氣兼導達經脈使榮衛流通則塊自消矣凡攻病之藥皆是傷氣損血故經曰大毒治病十去其五小毒治病十去其七不得過也潔古云壯人無積虛人則有之皆由脾胃怯弱氣血兩衰四時有感皆能成積若遽以磨堅破結之藥治之疾似去而人已衰矣乾漆硇砂三稜牽牛大黃之類得藥則暫快藥過則依然氣愈消疾愈大竟何益哉故善治者當先補虛使血氣壯積自消如滿座皆君子則小人自無容地也不問何臟先調其中使能飲食是其本也東垣云許學士云大抵治積或以所惡者攻之所喜者誘之則易愈如硇砂阿魏治肉積神麯麥糵治酒積水蛭虻蟲治血積木香檳榔治氣積牽牛甘遂治水積雄黃膩粉治痰積礞石巴豆治食積各從其類也若用群隊之藥分其勢則難取效須要認得分明是何積聚兼見何證然後增加佐使之藥不爾反有所損要在臨時通變也治積當察其所痛以知其病有餘不足可補可瀉無逆天時詳臟腑之高下如寒者熱之結者散之客者除之留者行之堅者削之強者奪之咸以耎之苦以瀉之全真氣藥補之隨其所積而行之節飲食慎起居和其中外可使必已不然遽以大毒之劑攻之積不能除反傷正氣終難復也可不慎歟肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人嘔逆或兩脅痛牽引小腹足寒轉筋久則如瘧宜大七氣湯煎熟待冷卻以鐵器燒通紅以藥淋之乘熱服兼吞肥氣丸肺之積名曰息賁在右脅下大如覆杯氣逆背痛或少氣喜忘目瞑膚寒皮中時痛如蝨緣針刺久則咳喘宜大七氣湯加桑白皮半夏杏仁各半錢兼吞息奔丸心之積名曰伏梁起臍上大如臂上至心下久不愈令人病煩心腹熱咽乾甚則吐血宜大七氣湯加石菖蒲半夏各半錢兼吞伏梁丸脾之積名曰痞氣在胃脘大如覆杯痞塞不通背痛心疼飢減飽見腹滿吐泄久則四肢不收發黃疸飲食不為肌膚足腫肉消宜大七氣湯下紅丸子兼吞痞氣丸腎之積名曰賁豚發於少腹上至心若豚狀或下或上無時飢見飽減小腹急腰痛口乾目昏骨冷久不已令人喘逆骨痿少氣宜大七氣湯倍桂加茴香炒練子肉各半錢兼吞奔豚丸雜積通治萬病紫菀丸局方溫白丸厚朴丸熱積寒取之千金硝石丸醋煮三稜丸神功助化散聖散子寒積熱取之雞爪三稜丸硇砂煎丸紅丸子胃弱少食勿與攻下二賢散常服塊亦自消驚風成塊者妙應丸加穿山甲炒鱉甲燒各三錢玄胡索蓬朮各四錢每五十丸加至七十丸以利為度脅痛有塊龍薈丸加薑黃桃仁各半兩蜜丸龍薈丸加白鴿糞大能消食積或入保和丸肉積阿魏丸有正當積聚處內熱如火漸漸遍及四肢一日數發如此二三日又愈此不當攻其熱又有元得熱病熱留結不散遂成癥癖此卻當用去熱之劑有病癥瘕腹脹純用三稜莪朮以酒煨服下一物如黑魚狀而愈或加入香附子用水煎多服取效又有病此者用姜蘇湯吞六味丸六味者乃小七香丸紅丸子小安腎丸連翹丸三稜煎理中丸六件等也有飲癖結成塊在脅腹之間病類積聚用破塊藥多不效此當行其飲宜導痰湯五飲湯何以知為飲其人先曾病瘥口吐涎沫清水或素來多痰者是也又多飲人結成酒癖肚腹積塊脹急疼痛或全身腫滿肌黃少食宜十味大七氣湯用紅酒煎服腹中似若瘕癖隨氣上下未有定處宜散聚湯若氣作痛遊走心腹間攻刺上下隱若雷鳴或已成積或未成積沉香降氣散戴用全蠍一個劈破煎湯調蘇合香丸以上磨積之藥必用補氣血藥相兼服之積消及半即止若純用之致死乃醫殺之也貼塊三聖膏琥珀膏大黃朴硝各等分為末大蒜搗膏和勻貼熨症方吳茱萸碎之以酒和煮熱布裹熨症上冷更炒更番用之症移走逐熨之候消乃止婦人血塊加減四物湯當歸丸牡丹散息積乃氣息痞滯於脅下不在臟腑榮衛之間積久形成氣不幹胃故不妨食病者脅下滿氣逆息難頻歲不已化氣湯倒倉法用肥嫩黃牡牛肉二十斤必得三十斤方可寧使多勿使不及切成小塊去筋膜長流水煮糜爛以布濾去滓取淨汁再入鍋中慢火熬至琥珀色則成矣令病人預先斷欲食淡前一日不食晚飯設密室令明快而不通風置穢桶及瓦盆貯吐下之物置一瓷盆盛所出之溺至日病者入室以汁飲一鍾少時又飲一鍾積數十鍾寒月則重湯溫而飲之任其吐利病在上者欲其吐多病在下者欲其利多上中下俱有者欲其吐利俱多全在活法而為之緩急多寡也連進之急則逆上而吐多緩則順下而利多矣視其所出之物必盡病根乃止吐利後必渴不得與湯以所出之溺飲之名輪迴酒非惟可以止渴抑且可以浣濯余垢行後倦睡覺飢先與稠米湯飲次與淡稀粥三日後方與少菜羹次與厚粥軟飯調養半月或一月覺精神煥發形體輕健沉疴悉安矣其後忌牛肉數一作五年夫牛坤土也黃土之色也以順為性而效法乎干以為功者牡之用也肉者胃之樂也熟而為液無形之物也橫散入肉絡由腸胃而滲透肌膚皮毛爪甲無不入也積聚久而形質成依附腸胃回薄曲折處以為棲泊之窠臼阻礙津液氣血熏蒸燔灼成病自非刮腸剖骨之神妙可以銖兩丸散窺犯其藩牆戶牖乎肉液之散溢腸胃受之其厚皆倍於前有似乎腫其回薄曲折處肉液充滿流行有如洪水泛漲浮槎陳朽皆推逐盪漾順流而下不可停留表者因吐而汗清道者自吐而湧濁道者自泄而去凡屬滯礙一洗而空牛肉全重厚和順之性盎然渙然潤澤枯槁補益虛損寧無精神煥發之樂乎霞天膏即倒倉法有人指授韓懋天爵投煎劑治痰而遂推廣之黃牯牛一具選純黃肥澤無病才一二歲者上洗淨取四腿項脊去筋膜將精肉切作塊子如慄大秤三十斤或四五十斤於靜室以大銅鍋或新鐵鍋加長流水煮之不時攪動另以一新鍋煮沸湯旋加常使水淹肉五六寸掠去浮沫直煮至肉爛如泥漉去渣卻將肉汁以細布漉入小銅鍋用一色桑柴文武火候不住手攪不加熟水只以汁漸如稀餳滴水不散色如琥珀其膏成矣此節火候最要小心不然壞矣大段每肉十二斤可煉膏一斤瓷器盛之用調煎劑初少漸多沸熱自然溶化用和丸劑則每三分攙白麵一分同煮為糊或同煉蜜寒天久收若生黴用重湯煮過熱天冷水窨之可留三日診細而附骨為積寸口見之積在胸中微出寸口積在喉中關上積在臍傍上關下積在心下微下關積在少腹尺中積在氣街脈出在右積在右脈出在左積在左脈左右兩出積在中央沉而有力為積脈浮而毛按之辟易脅下氣逆背相引痛為肺積沉而芤上下無常處胸滿悸腹中熱名心積弦而細二脅下痛邪走心下足腫寒重名肝積沉而急苦腎與腰相引痛飢見飽減名腎積浮大而長飢減飽見腹滿泄嘔脛腫名脾積寸口沉而橫脅下及腹有橫積痛左手脈橫症在左右手脈橫症在右脈頭大者在上頭小者在下脈弦腹中急痛為瘕脈細微者為癥脈沉重而中散者因寒食成癥脈左轉而沉重者氣症在胃中右轉出不至寸口者內有肉症也脈細而沉時直者身有癰若腹中有伏梁脈沉小而實者胃中有積聚不下食食即嘔吐脈沉而緊者心下有寒時痛有積聚關上脈大而尺寸細者必心腹冷積遲而滑中寒有癥結弦而伏者腹中有症不可轉也必死不治虛弱者死堅強急者生痰飲痰皆動於脾濕寒少而熱濕在肝經謂之風痰濕在心經謂之熱痰濕在脾經謂之濕痰濕在肺經謂之氣痰濕在腎經謂之寒痰風痰脈弦面青四肢滿悶便溺秘澀心多躁怒水煮金花丸川芎防風丸熱痰脈洪面赤煩熱心痛唇口乾燥多喜笑小黃丸小柴胡湯加半夏濕痰脈緩面黃肢體沉重嗜臥不收腹脹而食不消白朮丸局方防己丸氣痰脈澀面白氣上喘促灑淅寒熱悲愁不樂玉粉丸局方桔梗湯寒痰脈沉面色黧黑小便急痛足寒而逆心多恐怖薑桂丸局方胡椒理中丸金匱吳茱萸湯心下痞悶加枳實五錢身熱甚加黃連五錢體重加茯苓白朮各一兩氣逆上加苦葶藶五錢氣促加人參桔梗各五錢浮腫加郁李仁杏仁各五錢大便秘加大黃五錢以上本出咳嗽門咳嗽當參看痰分五色色白西方本色色黃逆而之坤色紅甚而之內金受火囚為難治青色受風之羈絆黑如煙煤點順而之北方不治自愈經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行安有所謂痰者哉痰之生由於脾氣不足不能致精於肺而淤以成焉者也故治痰先補脾脾復健運之常而痰自化矣然停積既久如溝渠壅遏淹久則倒流逆上瘀濁臭穢無所不有若不疏決溝渠而欲澄治已壅之水而使之清無是理也金匱云其人素盛今瘦水走腸間轆轆有聲謂之痰飲當以溫藥和之又云心下有痰飲者桂苓甘術湯主之飲後水流在脅下咳唾引痛謂之懸飲十棗湯主之此藥太峻以小胃丹代之差緩然虛人切不可用飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲當發其汗大青龍湯小青龍湯主之咳逆倚息短氣不得臥其形如腫謂之支飲又云嘔家本渴今反不渴心下有支飲故也小半夏湯主之又云心下有支飲其人苦冒眩澤瀉湯主之通用海藏五飲湯局方倍術丸丹溪曰痰之源不一有因痰而生熱者有因熱而生痰者有因氣而生者有因風而生者有因驚而生者有積飲而生者有多食而成者有因暑而生者有傷冷物而成者有脾虛而成者有嗜酒而成者其為病也驚痰則成心包痛顛疾熱痰則成煩躁頭風爛眼燥結怔忡懊憹驚眩風痰成癱瘓大風眩暈暗風悶亂飲痰成脅痛四肢不舉每日嘔吐食痰成瘧痢口出臭氣暑痰中暈眩冒黃疸頭疼冷痰骨痹四肢不舉氣刺痛酒痰飲酒不消但得酒次日又吐脾虛生痰食不美反胃嘔吐氣痰攻注走刺不定婦人於驚痰最多蓋因產內交接月事方行其驚因虛而入結成塊者為驚痰必有一塊在腹發則如身孕轉動跳躍痛不可忍按熱痰用黃連利膈丸當下者用妙應丸加盆硝等分每服三兩丸亦可用滾痰丸驚痰用妙應丸加硃砂二錢全蠍三錢每用八九丸常與之三五服去盡驚氣成塊妙應丸加穿山甲炒鱉甲燒各三錢玄胡索蓬朮各四錢每服五十丸加至七十丸以利為度寒痰妙應丸加胡椒丁香蠍桂各等分每服二十五丸風痰祛風丸導痰丸酒痰妙應丸加雄黃全蠍各二錢每服十丸飲痰小胃丹食痰保和丸暑痰消暑丹龐安常有言人身無倒上之痰天下無逆流之水故善治痰者不治痰而治氣氣順則一身之津液亦隨氣而順矣並宜蘇子降氣湯導痰湯各半帖和煎或小半夏茯苓湯加枳實木香各半錢吞五套丸或以五套丸料依分兩作飲子煎服亦好平居皆無他事只有痰數口或清或堅宜二陳湯小半夏茯苓湯痰多間進青州白丸子和來復丹名來白丸如和以八神來復丹即名青神丸此非特治痰飲尤甚療喘嗽嘔逆翻胃痰飲流入四肢令人肩背痠疼兩手軟痹醫誤以為風則非其治宜導痰湯加木香薑黃各半錢大凡病痰飲而變生諸證不當為諸證牽掣妄言作名且以治飲為先飲消則諸證自愈故如頭風眉稜角疼累以風藥不效投以痰藥收功如患眼赤羞明而痛與之涼藥弗瘳畀以痰劑獲愈凡此之類非一而足散在各證門中不復繁引有陰血不足陰火上逆肺受火侮不得清肅下行由是津液凝濁生痰不生血者此則當以潤劑如門冬地黃枸杞子之屬滋其陰使上逆之火得返其宅而息焉而痰自清矣投以二陳立見其殆腎虛不能納氣歸原出而不納則積積而弗散則痰生焉八味丸主之脈來細滑或緩痰涎清薄身體倦怠手足痠軟此脾虛挾濕六君子湯或補中益氣加半夏茯苓脈來結澀胸膈不利或作刺痛此挾氣鬱宜七氣湯越鞠丸有人坐處率吐痰涎滿地其痰不甚稠黏只是沫多此氣虛不能攝涎不可用利藥宜六君子湯加益智仁一錢以攝之丹陽貢魯庵年七十餘膈間有痰不快飲食少思初無大害就醫京口投以越鞠丸清氣化痰丸胸次稍寬日日吞之遂不輟口年餘困頓不堪僦舟來就予診治則大肉已脫兩手脈如遊絲太谿絕不至矣見予有難色因曰吾亦自分必死但膈間脹不可忍大便秘結不通誠為寬須更即死瞑目矣固強予疏方以至親難辭教用大劑人參白朮煎湯進之少頃如廁下積痰數升胸膈寬舒更數日而歿咳嗽肺痿肺脹咳謂無痰而有聲肺氣傷而不清也嗽謂無聲而有痰脾濕動而為痰也咳嗽是有痰而有聲蓋因傷於肺氣而咳動於脾濕因咳而為嗽也經言臟腑皆有咳嗽咳嗽屬肺何為臟腑皆有之蓋咳嗽為病有自外而入者有自內而發者風寒暑濕外也七情飢飽內也風寒暑濕先自皮毛而入皮毛者肺之合故雖外邪欲傳臟腑亦必先從其合而為嗽此自外而入者也七情飢飽內有所傷則邪氣上逆肺為氣出入之道故五臟之邪上蒸於肺而為嗽此自內而發者也然風寒暑濕有不為嗽者蓋所感者重徑傷臟腑不留於皮毛七情亦有不為嗽者蓋病尚淺止在本臟未即上攻所以傷寒以有嗽為輕而七情飢飽之嗽久而後見治法當審脈證三因若外因邪氣止當發散又須原其虛實冷熱若內因七情則隨其部經在與氣口脈相應當以順氣為先下痰次之有停飲而咳又須消化之方不可用烏梅罌粟酸澀之藥其寒邪未除亦不可便用補藥尤忌憂思過度房室勞傷遂成瘵疾宜養脾生肺也仁齋直指云感風者鼻塞聲重傷冷者悽清怯寒挾熱為焦煩受濕為纏滯瘀血則膈間腥悶停水則心下怔忪或實或虛痰之黃白唾之稀稠從可知也治嗽大法肺脈浮為風邪所客以發散取之肺脈實為氣壅內熱以清利行之脈濡散為肺虛以補肺安之其間久嗽之人曾經解利以致肺胃俱寒飲食不進則用溫中助胃加和平治嗽之藥至若酒色過度虛勞少血津液內耗心火自炎遂使燥熱乘肺咯唾膿血上氣涎潮其嗽連續而不已唯夫血不榮肌故邪在皮毛皆能入肺而自背得之尤速此則人參芎歸所不可無一種傳注病涉邪惡五臟反克毒害尤深近世率用蛤蚧天靈蓋桃柳枝丹砂雄黃安息香蘇合香丸通神之劑然則咳嗽證治於此可以問津索途矣抑猶有說焉肺出氣也腎納氣也肺為氣之主腎為氣之本凡咳嗽暴重動引百骸自覺氣從臍下逆奔而上者此腎虛不能收氣歸元也當以破故紙安腎丸主之毋徒從事於寧肺感風而嗽者惡風自汗或身體發熱或鼻流清涕其脈浮宜桂枝湯加防風杏仁前胡細辛感寒而嗽者惡寒發熱無汗鼻流清涕其脈緊宜杏子湯去乾薑五味加紫蘇乾葛或二陳加紫蘇葛根杏仁桔梗暴感風寒不惡寒發熱止是咳嗽鼻塞聲重者寧嗽化痰湯薛新甫云春月風寒所傷咳嗽聲重頭疼用金沸草散咳嗽聲重身熱頭痛用局方消風散蓋肺主皮毛肺氣虛則腠理不密風邪易入治法當解表兼實肺氣肺有火則腠理不閉風邪外乘治宜解表兼清肺火邪退即止若數行解散則重亡津液邪蘊而為肺疽肺痿矣故凡肺受邪不能輸化而小便短少皮膚漸腫咳嗽日增者宜用六君子湯以補脾肺六味丸以滋腎水夏月喘急而嗽面赤潮熱其脈洪大者黃連解毒湯熱躁而咳梔子湯咳唾有血麥門冬湯俱吞六味丸壯水之主以制陽光而保肺金秋月咳而身熱自汗口乾便赤脈虛而洪者白虎湯身熱而煩氣高而短心下痞滿四肢困倦精神短少者香薷飲若病邪既去宜用補中益氣湯加乾山藥五味子以養元氣柴胡升麻各二分以升生氣冬月風寒外感形氣病氣俱實者宜華蓋散加減麻黃湯所謂從表而入自表而出若形氣病氣俱虛者宜補其元氣而佐以解表之藥若專於解表則肺氣益虛腠理益疏外邪乘虛易入而其病愈難治矣活法機要云夏月嗽而發熱者謂之熱痰嗽小柴胡湯四兩加石膏一兩知母半兩用之冬月嗽而發寒熱謂之寒嗽小青龍加杏仁服之感濕而嗽者身體痛重或有汗或小便不利此多乘熱入水或冒雨露或浴後不解濕衣致有此患宜白朮酒熱嗽咽喉干痛鼻出熱氣其痰嗽而難出色黃且濃或帶血縷或出血腥臭或堅如蠣肉不若風寒之嗽痰清而白宜金沸草散去麻黃半夏加薄荷枇杷葉五味杏仁桑根白皮貝母茯苓桔梗入棗子一個同煎仍以辰砂化痰丸或薄荷煎八風散含化有熱嗽諸藥不效竹葉石膏湯去竹葉入粳米少加知母多服五味杏仁枇杷葉此必審是伏熱在上焦心肺間可用冷熱嗽因增減衣裳寒熱俱感遇乍寒亦嗽乍熱亦嗽飲熱亦嗽飲冷亦嗽宜金沸草散消風散各一帖和煎或應夢人參散或款冬花散以薄荷代麻黃或二母散仍以辰砂化痰丸八風丹吞化七情飢飽嗽無非傷動臟腑正氣致邪上逆結成痰涎肺道不理宜順氣為先四七湯一帖加杏仁五味子桑白皮人參阿膠麥門冬枇杷葉各一錢有飲冷熱酒或飲冷水傷肺致嗽俗謂之湊肺宜紫菀飲有嗽吐痰與食俱出者此蓋飲食失節致肝氣不利而肺又有客邪肝濁道肺清道清濁相干宜二陳湯加木香杏仁細辛枳殼各半錢食積痰嗽發熱二陳湯加栝蔞萊菔子山楂枳實曲糵機要云痰而能食者大承氣微下之痰而不能食者厚朴湯主之嗽而失聲潤肺散或清音丸戴云有熱嗽失聲咽疼多進冷劑而聲愈不出者宜以生薑汁調消風散少少進之或只一味薑汁亦得冷熱嗽後失聲者尤宜嗽而失聲者非獨熱嗽有之宜審其證用藥佐以橄欖丸含化仍濃煎獨味枇杷葉散熱服聲啞者寒包其熱也宜細辛半夏生薑辛以散之亦有痰熱壅於肺者金空則鳴必清金中邪滯用清咽寧嗽湯勞嗽有因久嗽成勞者有因病勞乃嗽者其證寒熱往來或獨熱無寒咽乾嗌痛精神疲極所嗽之痰或濃或淡或時有血腥臭異常語聲不出者薏苡仁五錢桑根白皮麥門冬各三錢白石英二錢人參五味子款冬花紫菀杏仁貝母阿膠百合桔梗秦艽枇杷葉各一錢薑棗粳米同煎去渣調鍾乳粉亦宜蛤蚧散或保和湯知母茯苓湯紫菀散寧嗽湯經年累月久嗽不已服藥不瘥余無他證卻與勞嗽不同戴用三拗湯青金丸予謂其不妥獨宜保肺而已一味百部膏可也衍義云有婦人患肺熱久嗽身如炙肌瘦將成肺勞以枇杷葉木通款冬花紫菀杏仁桑白皮各等分大黃減半各如常制治訖同為末蜜丸如櫻桃大食後夜臥各含化一丸未終劑而愈有風寒者可用熏法有熱者可用枳殼湯有實積者可用款氣丸利膈丸馬兜鈴丸脾胃如常飲食不妨者加味人參清肺湯參粟湯素問云咳嗽煩冤者是腎氣之逆也八味丸安腎丸主之有暴嗽服諸藥不效或教之進生料鹿茸丸大菟絲子丸方愈有本有標卻不可以其暴嗽而疑遽補之非所以易愈者亦覺之早故也時行嗽發熱惡寒頭痛鼻塞氣急狀如傷冷熱連咳不已初得病即伏枕一兩日即輕俗呼為蝦蟆瘟用參蘇飲加細辛半錢潔古云咳而無痰者以辛甘潤其肺蜜煎生薑湯蜜煎橘皮湯燒生薑胡桃皆治無痰而嗽者本事方補肺法生地黃二斤淨洗杏仁二兩生薑蜜各四兩搗如泥入瓦盆中置飯上蒸五七度每五更挑三匙嚥下金匱方咳而上氣喉中水雞聲射干麻黃湯主之咳嗽喉中作聲一味白前妙千金有白前湯一男子五十餘歲病傷寒咳嗽喉中聲如齁與獨參湯一服而齁聲徐至二三帖咳嗽亦漸退凡服二三斤病始全愈丹溪云上半日嗽多屬胃中有火午後嗽多屬陰虛黃昏嗽多此火氣浮於肺不宜用涼藥宜斂而降之有一咳即出痰者脾濕勝而痰滑也有連咳十數不能出痰者肺燥勝痰澀也滑者宜南星半夏皂角灰之屬燥其脾若利氣之劑所當忌也澀者宜枳殼紫蘇杏仁之屬利其肺若燥肺之劑所當忌也形肥或有汗或脈緩體重嗜臥之人咳者脾濕勝也宜白朮蒼朮茯苓之屬燥之形瘦或夏月無汗或脈澀之人咳者肺燥勝也宜杏仁栝蔞之屬潤之凡咳嗽面赤胸腹脅常熱唯於足乍有涼時其脈洪者熱痰在胸膈也宜小陷胸湯礞石丸之類清膈降痰甚而不已者宜吐下其痰熱也面白悲嚏或脅急脹痛或脈沉弦細遲而咳者寒飲在胸腹也宜辛甘熱去之半夏溫肺湯丹溪治飲酒傷肺痰嗽以竹瀝煎入韭汁就吞栝蔞杏仁青黛黃連丸按此恐太寒閉遏熱氣不得發舒不若先以辛散之而後以酸收之甚者吐之後與五苓甘露勝濕去痰之劑吃醋搶喉咳嗽不止用甘草二兩去赤皮作二寸叚中半劈開用豬膽汁五枚浸三日取出火上炙乾為細末煉蜜丸每服四十丸茶清吞下臨臥服咸物所傷哮嗽不止用白麵二錢砂糖二錢通搜和用糖餅灰汁捻作餅子放在爐內炸熟劃出加輕粉四錢另炒略熟將餅切作四亞摻輕粉在內令患人吃盡吐出病根即愈肺咳之狀咳而喘息有音甚則唾血麻黃湯心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹桔梗湯肝咳之狀咳而兩脅下痛甚則不可以轉轉則兩胠下滿小柴胡湯仲景云咳引脅痛為懸飲宜十棗湯丹溪云咳引脅痛宜疏肝氣用青皮枳殼香附子等實者白芥子之屬脾咳之狀咳則右脅下痛陰陰引肩背甚則不可以動動則咳劇升麻湯腎咳之狀咳則腰背相引而痛甚則咳涎麻黃附子細辛湯五臟之久嗽乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出烏梅丸肝咳不已則膽受之膽咳之狀咳嘔膽汁黃芩加半夏生薑湯肺咳不已則大腸受之大腸咳狀咳而遺失赤石脂禹餘糧湯桃花湯不止用豬苓分水散心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失芍藥甘草湯腎咳不已則膀胱受之膀胱咳狀咳而遺溺茯苓甘草湯久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也錢氏異功散肺痿仲景云熱在上焦者因咳為肺痿肺痿之病從何得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之肺痿咳吐涎沫不止咽燥而渴生薑甘草湯主之生薑五兩人參二兩甘草四兩大棗十五枚水七升煮取三升分溫三服炙甘草湯治肺痿涎唾多心中溫溫液液者用甘草一味水三升煮半升分溫三服桂枝去芍藥加皂莢湯治肺痿吐涎沫桂技生薑各三兩甘草一兩大棗十枚皂莢十枚去皮弦炙焦水七升微火煮取三升分三溫服肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾甘草乾薑湯以溫之甘草炙四兩乾薑炮二兩水三升煮取一升五合分溫再服若服湯口渴屬消渴肺痿咳唾咽燥欲飲水者自愈自張口者短氣也咳而口中自有津液舌上胎滑此為浮寒非肺痿也肺痿或咳沫或咳血今編咳沫者於此咳血者入血證門肺脹仲景云咳而上氣此為肺脹脈浮大者越婢加半夏湯主之又云肺脹咳而上氣煩躁而喘脈浮者心下有水小青龍湯加石膏主之丹溪治主收斂用訶子為主佐以海石香附童便浸三日栝蔞仁青黛半夏曲杏仁薑汁蜜調噙之肺脹而嗽或左或右不得眠此痰夾瘀血礙氣而病宜養血以流動乎氣降火疏肝以清痰四物湯加桃仁訶子青皮竹瀝韭汁之屬壅遏不得眠者難治診浮為風緊為寒數為熱細為濕浮緊則虛寒沉數則實熱弦澀則少血洪滑則多痰澀為房勞右關濡傷脾左關弦短傷肝浮短傷肺脈出魚際為逆氣喘息弦為飲咳而浮四十日已咳而眩實者吐之愈咳而脈虛必苦冒脈沉不可發汗脾脈微為咳肺脈微急為咳唾血浮直而濡者易治喘而逆上氣脈數有熱不得臥難治上氣喘面浮腫肩脈浮大者死久嗽脈弱者可治實大數者死上氣喘息低昂脈滑手足溫者生脈澀四肢寒者死咳而脫形身熱脈小堅急以疾是逆也不過十五日死咳嗽羸瘦脈形堅大者死咳嗽脈沉緊者死浮直者生浮軟者生小沉伏匿者死咳而嘔腹滿泄弦急欲絕者死喘哮喘者促促氣急喝喝息數張口抬肩搖身擷肚短氣者呼吸雖數而不能接續似喘而不搖肩似呻吟而無痛呼吸雖急而無痰聲逆氣者但氣上而奔急肺壅而不下宜詳辨之或問喘病之源何如曰嘗考古今方論自巢氏病源稱為肺主氣為陽氣之所行通榮臟腑故氣有餘俱入於肺或為喘息上氣或為咳嗽因此至嚴氏謂人之五臟皆有上氣而肺為之總由其居於五臟之上而為華蓋喜清虛而不欲窒礙調攝失宜或為風寒暑濕邪氣所侵則肺氣脹滿發而為喘呼吸促迫坐臥不安或七情內傷鬱而生痰脾胃俱虛不能攝養一身之痰皆能令人發喘治之之法當究其源如感外邪則祛散之氣鬱則調順之脾胃虛者溫理之聖濟方又云呼隨陽出氣於是升吸隨陰入氣於是降一升一降陰陽乃和所謂上氣者蓋氣上而不下升而不降痞滿膈中氣道奔迫喘息有音者是也本於肺臟之虛復感風邪肺葉脹舉諸臟又上衝而壅遏此所以有上氣之候也歷代醫者用此調氣之說以為至當無復他論及觀劉河間原病式則以喘病敘於熱淫條下謂火熱為陽主乎急數故熱則息數氣粗而為喘也與巢氏所云氣為陽有餘則喘較之則劉氏之言為勝何則陰陽各因其對待而指之形與氣對則以形為陰氣為陽寒與熱對則以寒為陰熱為陽升與降對則以降為陰升為陽動與靜對則以靜為陰動為陽巢氏不分一氣中而有陰陽寒熱升降動靜備於其間一皆以陽為說致後人止知調氣者調其陽而已今劉氏五運所主之病機則是一氣變動而分者也其病機如何曰不獨病之有機於化生者亦有之知生化之機則可以知為病之機也蓋一氣運行升降浮沉者由生氣根於身中而神居之主陰陽動靜之機也其機動而清靜者則生化治動而煩擾者則苛疾作矣其動有甚衰以致五行六氣勝負之變作故內經至真大要篇立病機一十九條而統領五運六氣之大綱如喘者謂諸喘皆屬於上王注以上乃上焦氣也炎熱薄爍心之氣也承熱分化肺之氣也又謂諸逆衝上皆屬於火是故河間敘喘病在熱淫條下誠得其旨矣曰喘病之綱屬熱屬火則聞命矣亦有節目之可言者乎曰予嘗考之內經靈樞諸篇有言喘喝有言喘息有言喘逆有言喘嗽有言喘嘔有言上氣而喘諸喘之形狀或因熱之微甚或邪之所自故也其獨喘者內經逆調篇謂臥則喘是水氣之客也經脈別論篇謂夜行喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心渡水跌僕喘出於腎與骨痹論謂肺痹者煩滿喘嘔腸痹者中氣喘爭大奇論篇謂肺癰者喘而兩胠滿至真大要論謂太陰司天客勝首面胕腫呼吸氣喘太陰陽明篇謂邪入六腑身熱喘呼不得臥脈解篇謂陽明之厥則喘而惋惋則惡人連臟則死連經則生其言喘喝者喝謂大呵出聲生氣通天篇謂陽氣者因於暑煩則喘喝五常政篇堅成之紀喘喝胸滿仰息靈樞本神篇肺實者喘喝胸滿仰息經脈篇謂肺所生病則上氣喘喝煩心胸滿腎是動病者喝喝而喘坐而欲起其言喘息者玉機真臟篇謂大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真臟見十月死注云是脾臟也皆以至其月真臟脈見乃予之期日又謂秋脈不及其氣來毛而微其病在中令人喘呼吸少氣而咳上氣見血下聞病音注云音是肺中喘息之聲也舉痛篇謂勞則喘息汗出內外皆越故氣耗矣逆調篇起居如故而息有音風論篇息而惡風口乾善渴不能勞事奇病篇謂有病癃一日數十溲身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也太陰脈微細如髮此不足也病在太陰其盛在胃頗在肺病名厥死不治繆刺篇謂邪客手陽明之絡令人氣滿胸中喘息而支胠胸中熱刺其井痿論篇謂肺者臟之長為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦發為痿蹷注云鳴者喘息之聲也陰陽別論篇謂陰爭於內陽擾於外魄汗未臟四逆而起起則熏肺使人喘鳴又二陽之病發心脾傳為息賁死不治注云息奔者喘息而上奔脾胃腸肺及心互相傳克故死靈樞五邪篇謂邪在肺上氣喘汗出本臟篇謂肺高則上氣肩息肝高則上支賁切脅悗為息賁經筋篇謂太陰筋病甚成息賁脅急其言上氣而喘逆者經脈別論篇謂太陽獨至厥喘虛氣逆是陰不足陽有餘至真大要論謂陽明在泉主勝則腰重腹痛少腹生寒寒厥上衝胸中甚則喘不能久立痹論篇謂心痹者煩則心下鼓暴上氣而喘脈解篇謂嘔咳上氣而喘者陰氣在下陽氣在上諸陽氣浮無所依從故也東垣解以此論秋冬之陰陽也經氣之燥寒在上陽也臟氣之金水在下陰也所謂上喘而為水者陰氣下而復上邪客臟腑間故為水也脈要篇謂肝脈搏堅而長當病墜若搏因血在脅下令人喘逆其言喘咳者臟氣法時篇謂肺病者喘咳逆氣肩背痛又腎病者腹大脛腫喘咳身重寢汗憎風刺熱篇謂肺熱病者惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背頭痛汗出而寒五常政篇謂從革之紀發喘咳氣交變篇謂歲火太過肺金受邪少氣喘咳血溢血泄嗌燥中熱肩背熱歲金太過甚則火氣復之喘咳逆氣肩背痛咳逆甚而血溢歲水太過害在心火病在中上下寒甚則腹大脛腫喘咳寢汗出憎風六元正紀篇謂少陰司天三之氣大火行病氣厥心痛寒熱更作咳喘終之氣燥令行餘火內格腫於上咳喘甚則血溢內作寒中至真大要論篇謂少陰司天胸中熱胠滿寒熱喘咳唾血少陰司天客勝少氣發熱甚則胕腫血溢咳喘靈樞經脈篇謂肺是動病肺脹滿膨膨而喘咳缺盆中痛其言喘嘔者痹論篇謂肺痹者煩滿喘而嘔至真大要篇謂少陰司天喘嘔寒熱其言喘咳上氣者調經篇謂風有餘喘咳上氣玉機篇謂肺脈不及喘少氣而咳上氣見血下聞病音夫諸篇節目之多如此然猶是設為凡例者耳何則蓋聖人之言舉一邪而諸邪具舉一臟而五臟具用是推之其陰陽之變百病之生莫不各有所窮其理之極致唯張仲景得其旨在傷寒證中諸喘症者皆因其邪動之機以致方藥務不失其氣宜若夫從後代集證類方者不過從巢氏嚴氏之說而已獨王海藏辯華佗云肺氣盛為喘活人云氣有餘則喘氣盛當認作氣衰有餘當認作不足肺氣果盛與有餘則清肅下行豈復為喘以其火入於肺炎爍真氣衰與不足而為喘焉所言盛與有餘者非肺氣也肺中之火也此語高出前輩發千古所未發惜乎但舉其端未盡乎火所兼行之氣何則如外感六淫鬱而成火者則必與六淫相合因內傷五邪相勝者亦必與邪相併遂有風熱暑熱濕熱燥熱寒熱之分諸逆衝上之火亦然而有所從之氣在焉蓋相火出於肝腎厥陽之火氣起於五臟夫火生於動五臟主藏精宅神乃火也至若陰精先有所傷而虛不能閉藏其氣遇有妄動其神至則火隨發而炎起起於腎者本臟寒水之氣從之起於肝者本臟風木之氣從之起於脾者濕氣從之起於心者熱氣從之起於肺者燥氣從之所從者得以附火之炎而逆也諸逆之氣盛先入於所勝之臟甚而至於上焦或因火而徑衝於肺此亦火之合併臟氣五邪者也此外復有心火因逆氣不得下降奔迫於上者有臟氣之俱不足其火浮溜於上而虛者有離其宮室而務於取勝反自虛者更有人之稟素弱者有常貴後賤之脫營常富後貧之氣離守者夫如是之病雖有當攻之實亦不重瀉大抵必從病機大要治法曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其調達而致和平凡處治虛實之法盡在此數語矣予今獨引內經靈樞諸篇綱目之詳如此條者蓋欲令人知是集之百病盡有綱目之當察因書以為例丹溪云喘因氣虛火入於肺有痰者有火炎者有陰虛自小腹下起而上逆者有氣虛而致氣短者有水氣乘肺者戴復庵云痰者凡喘便有痰聲火炎者乍進乍退得食則減食已則喘大概胃中有實火膈上有稠痰得食墜下稠痰喘即止稍久食已入胃反助其火痰再升上喘反大作俗不知此作胃虛治以燥熱之藥以火濟火也一人患此諸醫作胃虛治之不愈後以導水丸利五六次而愈此水氣乘肺也若氣短喘急者呼吸急促而無痰聲有胃虛喘者抬肩擷肚喘而不休是也蓋肺主清陽上升之氣居五臟之上通榮衛合陰陽升降往來無過不及何病之有若內傷於七情外感於六氣則肺氣不清而喘作矣外感風寒暑濕脈人迎大於氣口必上氣急不得臥喉中有聲或聲不出審是風寒者局方三拗湯華蓋散三因神秘湯審是濕者滲濕湯審是暑者白虎湯通用秘傳麻黃湯加減麻黃有汗不去節無汗去根節川升麻北細辛桑白皮桔梗生甘草各等分熱加栝蔞根濕加蒼朮薑蔥煎溫熱服或加川芎乾葛則群隊矣暑喘勿用仲景云上氣喘而躁者屬肺脹欲作風水發汗則愈又云咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之又云肺脹咳而上氣煩躁而喘脈浮者心下有水小青龍加石膏主之東垣麻黃定喘湯麻黃蒼朮湯以上皆外因七情鬱結上氣喘急宜四磨湯四七湯內因羅謙甫治石憐吉歹元帥夫人年逾五十身體肥盛時霖雨不止又飲酒及潼乳過腹脹喘滿聲聞舍外不得安臥大小便澀滯氣口脈大兩倍於人迎關脈沉緩而有力此霖雨之濕飲食之熱濕熱大盛上攻於肺神氣躁亂故為喘滿邪氣盛則實實者宜下之故制平氣散以下之一服減半再服喘愈止有胸膈不利煩熱口乾時時咳嗽再與加減瀉白散全愈內外俱因仲景云膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐之不愈木防己湯主之虛者即愈實者三日復發復與不愈者宜木防己湯去石膏加茯苓芒硝湯主之支飲不得息葶藶大棗瀉肺湯主之云岐云四七湯治痰涎咽喉中上氣喘逆甚效風痰作喘千緡湯半夏丸經驗方定喘化痰豬蹄甲四十九個淨洗控干每個指甲內入半夏白礬各一字裝罐子內封閉勿令煙出火煅通赤去火毒細研入麝香一錢匕糯米飲下人參半夏丸化痰定喘婁全善云予平日用此方治久喘未發時服此丸已發時用沉香滾痰丸微下累效槐角利膈丸亦可下痰婁全善云凡下痰定喘諸方施之形實有痰者神效若陰虛而脈浮大按之澀者不可下下之必反劇而死以上治痰例初虞世云火喘用白虎湯加栝蔞仁枳殼黃芩神效雙玉散治痰熱而喘痰湧如泉寒水石石膏各等分為細末人參湯下三錢食後服以上治實火例經云歲火大過炎暑流行肺金受邪民病少氣咳喘又熱淫所勝病寒熱喘咳宜以人參麥門冬五味子救肺童便炒黃柏知母降火平居則氣平和行動則氣促而喘者此衝脈之火用滋腎丸仲景云火逆上氣咽喉不利止逆下氣麥門冬湯主之保命天門冬丸以上治虛火例丹溪云喘須分虛實久病是氣虛用阿膠人參五味補之新病是氣實用桑白皮葶藶瀉之金匱云無寒熱短氣不足以息者實也或又曰實喘者氣實肺盛呼吸不利肺竅壅滯上寸沉實宜瀉肺虛喘者腎虛先覺呼吸氣短兩脅脹滿左尺大而虛宜補腎邪喘者由肺受寒邪伏於肺中關竅不通呼吸不利右寸沉而緊亦有六部俱伏者宜發散則身熱退而喘定三因又云肺實者肺必脹上氣喘逆咽中逆如欲嘔狀自汗肺虛者必咽乾無津少氣不足以息也永類鈐方云右手寸口氣口以前陰脈應手有力肺實也必上氣喘逆咽塞欲嘔自汗皆肺實證若氣口以前陰脈應手無力必咽乾無津少氣此肺虛證右分虛實例從前皆瀉實例今述補虛例於後東垣云肺脹膨膨而喘咳胸膈滿壅盛而上奔者於隨證用藥方中多加五味子人參次之麥門冬又次之黃連少許如甚則交兩手而瞀者真氣大虛也若氣短加黃耆五味子人參氣盛去五味子人參加黃芩荊芥穗冬月去荊芥穗加草豆蔻仁丹溪云氣虛者用人參蜜炙黃柏麥冬地骨皮之類本草治咳嗽上氣喘急以人參一味為末雞子清投新水調下一錢昔有二人同走一含人參一不含俱走三五里許其不含者大喘含者氣息自如此乃人參之力也婁全善治一婦人五十餘歲素有痰嗽忽一日大喘痰出如泉身汗如油脈浮而洪似命絕之狀速用麥門冬四錢人參二錢五味子一錢五分煎服一帖喘定汗止三帖後痰亦漸少再與前方內加栝蔞仁一錢五分白朮當歸芍藥黃芩各一錢服二十餘帖而安此實麥門冬五味子人參之功也如自汗兼腹滿脈沉實而喘者裡實也宜下之以上治氣虛例丹溪云喘有陰虛自小腹下火起而上者宜四物湯加青黛竹瀝陳皮入童便煎服有陰虛挾痰喘者四物湯加枳殼半夏補陰降火愚謂歸地泥膈生痰枳半燥泄傷陰不如用天門冬桑皮貝母馬兜鈴地骨皮麥門冬枇杷葉之屬以上治陰虛例東垣曰病機云諸痿喘嘔皆屬於上辯云傷寒家論喘嘔以為火熱者是明有餘之邪中於外寒變而為熱心火太旺攻肺故屬於上又云膏粱之人奉養太過及過愛小兒亦能積熱於上而為喘咳宜以甘寒之劑治之脈經又云肺盛有餘則咳嗽上氣喘渴煩心胸滿短氣皆衝脈之火行於胸中而作也系在下焦非屬上也故雜病不足之邪起於有餘病機之邪自是標本病傳多說飲食勞役喜怒不節水穀之寒熱感則害人六腑皆由中氣不足其䐜脹腹滿咳喘嘔食不下皆以大甘辛熱之劑治之則立已今立熱喘寒喘二方於後人參平肺散治心火刑肺傳為肺痿咳嗽喘嘔痰涎壅盛胸膈痞悶咽嗌不利參蘇溫肺湯治形寒飲冷則傷肺喘煩心胸滿短氣不能宣暢調中益氣湯加減法如秋冬月胃脈四道為衝脈所逆並脅下少陽脈二道而反上行病名曰厥逆其證氣上衝咽不得息而喘息有音不得臥加茱萸五分或一錢湯洗去苦觀厥氣多少而用之如夏月有此證為大熱也蓋此症隨四時為寒熱溫涼宜以酒黃連酒黃柏酒知母各等分為細末熟湯丸如桐子大每服二百丸白湯送下空心服仍多飲熱湯服畢少時便以美膳壓之使不得胃中停留直至下元以瀉衝脈之邪也大抵治飲食勞倦所得之病乃虛勞七損症也當用溫平甘多辛少之藥治之是其本法也如時止見寒熱病四時症也又或將理不如法或酒食過多或辛熱之食作病或寒冷之食作病或居大寒大熱之處益其病當臨時制宜暫用大寒大熱治法而取效此從權也不可以得效之故而久用之必致夭橫矣黃帝針經曰從下上者引而去之上氣不足推而揚之蓋上氣者心肺上焦之氣陽病在陰從陰引陽宜以入腎肝下焦之藥引甘多辛少之藥使升發脾胃之氣又從而去邪氣於腠理皮毛也又曰視前痛者當先取之是先以繆刺瀉其經絡之壅塞者為血凝而不流故先取之而後治他病以上分寒熱例胃絡不和喘出於陽明之氣逆陽明之氣下行今逆而上行古人以通利為戒如分氣紫蘇飲指迷七氣湯加半夏二陳湯加縮砂施之為當真元耗損喘生於腎氣之上奔真陽虛憊腎氣不得歸元固有以金石鎮墜助陽接真而愈者然亦不可峻驟且先與安腎丸八味丸輩否則人參煎湯下養正丹主之肺虛則少氣而喘經云秋脈者肺也秋脈不及則喘呼吸少氣而咳上氣見血下聞病音其治法則門冬五味人參之屬是也肺痹肺積則久喘而不已經云淫氣喘息痹聚在肺又云肺痹者煩滿喘而嘔是肺痹而喘治法或表之或吐之使氣宣通而愈也難經又云肺之積名息賁在右脅下如杯久不已令人喘咳發肺癰治法則息賁丸以磨其積是也右治肺喘例胃喘則身熱而煩經云胃為氣逆又云犯賊風虛邪者陽受之陽受之則入六腑入六腑則身熱不時臥上為喘呼又云陽明厥則喘而啘啘則惡人或喘而死者或喘而生者何也厥逆連臟則死連經則生是也啘王注謂熱內鬱而煩凡此胃喘治法宜加減白虎湯之類是也右治胃喘例腎喘則嘔咳經云少陰所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故嘔咳上氣喘也東垣治以瀉白散是也右治腎喘例喘不得臥凡喘而不得臥其脈浮按之虛而澀者為陰虛去死不遠慎勿下之下之必死宜四物加童便竹瀝青黛門冬五味枳殼蘇葉服之素問逆調論夫不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水臟主津液主臥與喘也東垣云病人不得眠眠則喘者水氣逆行上乘於肺肺得水而浮使氣不流通其脈沉大宜神秘湯主之仲景云咳逆倚息不得臥小青龍湯主之支飲亦喘不得臥加短氣其脈平也青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕然如醉狀因復下流陰股小便難時覆冒者與茯苓桂技五味子甘草湯治其氣衝沖氣即低而反更咳胸滿者用桂枝茯苓五味甘草湯去桂加乾薑細辛各三兩以治其咳滿咳滿即止而更復渴沖氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復納半夏以去其水於桂苓甘草五味湯中去桂加乾薑細辛半夏是也水去嘔止其人形腫者加杏仁半升主之其證應納麻黃以其人遂痹故不納之若逆而納之必厥所以然者以其人血虛麻黃髮其陽故也用茯苓四兩甘草乾薑細辛各三兩五味子半夏杏仁去皮尖各半升上煎去渣溫日三服若面熱如醉此為胃熱所沖熏其面加大黃三兩以利之素問逆調論不得臥而息有音是陽道之逆也足三陽者下行今逆而上行故息有音也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也下經曰胃不和則臥不安此之謂也治法已見前哮與喘相類但不似喘開口出氣之多如聖濟總錄有名呷嗽者是也以胸中多痰結於喉間與氣相系隨其呼吸呀呷於喉中作聲呷者口開呀者口閉乃開口閉口盡有其聲蓋喉嚨者呼吸之氣出入之門也會厭者聲音之戶也懸雍者聲之關也呼吸本無聲胸中之痰隨氣上升沾結於喉嚨及於會厭懸雍故氣出入不得快利與痰引逆相擊而作聲也是痰得之食味鹹酸太過因積成熱由來遠矣故膠如漆黏於肺系特哮出喉間之痰去則聲稍息若味不節其胸中未盡之痰復與新味相結哮必更作此其候矣丹溪云哮主於痰宜吐法治哮必用薄滋味不可純作涼藥必帶表散治哮方用雞子略擊破殼不可損膜浸尿缸內三四日夜煮吃效蓋雞子能去風痰又方用貓屎燒灰沙糖湯調下立效哮喘遇冷則發者有二證其一屬中外皆寒治法乃東垣參蘇溫肺湯調中益氣加茱萸湯及紫金丹劫寒痰者是也其二屬寒包熱治法乃仲景丹溪用越婢加半夏湯等發表諸劑及預於八九月未寒之時先用大承氣湯下其熱至冬寒時無熱可包自不發者是也遇厚味即發者清金丹主之產後喘產後喉中氣急喘促者因所下過多榮血暴竭衛氣無主獨聚肺中故令喘也此名孤陽絕陰為難治陳無擇云宜大料芎歸湯或用獨參湯尤妙若惡露不快散血停凝上熏於肺亦令喘急宜奪命丹參蘇飲血竭散若因風寒所傷宜旋覆花湯若因憂怒鬱結用小調經散以桑白皮杏仁煎湯調服婁全善治浦江吳輝妻孕時足腫七月初旬產後二月洗浴即氣喘但坐不得臥者五個月惡風得暖稍寬兩關脈動尺寸皆虛百藥不效用牡丹皮桃仁桂枝茯苓乾薑枳實厚朴桑白皮紫蘇五味子栝蔞仁煎湯服之即寬二三服得臥其痰如失蓋作汙血感寒治之也若傷鹹冷飲食而喘者宜見睍丸診喘者肺主氣形寒飲冷則傷肺故其氣逆而上行沖急喝喝而息數張口抬肩搖身滾肚是為喘也喘逆上氣脈數有熱不得臥者難治上氣面浮腫肩息脈浮大者危上氣喘息低昂脈滑手足溫者生脈澀四肢寒者死右寸沉實而緊為肺感寒邪亦有六部俱伏者宜發散則熱退而喘定右寸沉實為肺實左尺大為腎虛短氣短氣者氣短而不能相續似喘而非喘若有氣上衝而實非氣上衝也似喘而不搖肩似呻吟而無痛金匱云平人無寒熱短氣不足以息者實也丹溪治白雲許先生脾疼胯疼短氣用大吐大下者二十餘日凡吐膠痰一大桶如爛魚腸或如桕油條者數碗而安仲景論短氣皆屬飲金匱云夫短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之又云咳逆倚息短氣不得臥其形如腫謂之支飲又云支飲亦喘而不得臥加短氣其脈平也又云膈上有留飲其人氣短而渴四肢歷節痛脈沉者有留飲又云肺飲不弦但苦喘短氣其治法危急者小青龍湯脹滿者厚朴大黃湯冒眩者苓桂朮甘湯及澤瀉湯不得息葶藶大棗湯吐下不愈者木防己湯之類是也胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘枳薑湯亦主之胸痹喘息咳唾胸背痛短氣栝蔞薤白半夏湯主之磨積孫兆正元散治氣不接續氣短兼治滑泄及小便數蓬莪朮一兩金鈴子去核二錢半為末入硼砂一錢揀過研細和勻每服二錢鹽湯或溫酒調下空心服補虛東垣云胸滿少氣短氣者肺主諸氣五臟之氣皆不足而陽道不行也氣短小便利者四君子湯去茯苓加黃耆以補之如腹中氣不轉者更加甘草一半肺氣短促或不足者加人參白芍藥中焦用白芍藥則脾中陽升使肝膽之邪不敢犯之如衣薄而短氣則添衣於無風處居止氣尚短則以沸湯一碗熏其口鼻即不短也如厚衣於不通風處居止而氣短則宜減衣摩汗孔令合於漫風處居止如久居高屋或天寒陰濕所遏令氣短者亦如前法熏之如居周密小室或大熱而處寒涼氣短則就風日凡短氣皆宜食滋味湯飲令胃氣調和戴復庵云短乏者下氣不接上呼吸不來語言無力宜補虛四柱飲木香減半加黃耆山藥各一錢若不勝熱藥及痰多之人當易熟附子作生附在人活法余皆仿此藥輕病重四柱飲不足取效宜於本方去木香加炒川椒十五粒更不效則用椒附湯上焦乾燥不勝熱藥者宜於椒附湯中加人參一錢尋常病當用姜附而或上盛燥熱不可服者唯此最良氣短乏力之人於進藥之外選一盛壯男子吸自己之氣噓入病人口中如此數次亦可為藥力一助此法不特可治虛乏尋常氣暴逆致呃者用之良驗針灸靈樞云短氣息短不屬動作氣索補足少陰去血絡診寸口脈沉胸中短氣陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣少氣少氣者氣少不足以言也素問云三陽絕三陰微是為少氣又云怯然少氣者是水道不行形氣消索也又云言而微終日乃復言者此奪氣也其治法則生脈散獨參湯之屬是也運氣少氣有二一曰火熱經云火鬱之發民病少氣又云少陰之復少氣骨痿又云少陽之復少氣脈痿治以諸寒是也二曰風濕經云太陽司天之政四之氣風濕交爭風化為雨民病大熱少氣是也針灸少氣有三一曰補肺經云肺臟氣氣不足則息微少氣補其經隧無出其氣又云肺虛則少氣不能報息耳聾嗌乾取其經太陰足太陽之外厥陰內血者是也二曰補腎經云少氣身漯漯也言吸吸也骨酸體重懈惰不能動補足少陰是也三曰補氣海經云膻中者為氣之海其輸上在於柱骨之上下前在於人迎氣海不足則氣少不足以言審守其輸調其虛實所謂柱骨之上者蓋天容穴也人迎者結喉兩旁之脈動處也乃取天容人迎二穴補之也診魚際絡青短者少氣也脾脈搏堅而長其色黃當病少氣一呼脈一動一吸脈一動曰少氣尺堅大脈小甚少氣悗有加立死謂尺內堅而脈反小而少氣悗加也第三冊諸嘔逆門嘔吐膈氣總論潔古家珍吐證有三氣積寒也皆從三焦論之上焦在胃口上通於天氣主內而不出中焦在中脘上通天氣下通地氣主腐熟水穀下焦在臍下下通於地氣主出而不納是故上焦吐者皆從於氣氣者天之陽也其脈浮而洪其症食已暴吐渴欲飲水大便燥結氣上衝胸而發痛其治當降氣和中中焦吐者皆從於積有陰有陽食與氣相假為積而痛其脈浮而弦其證或先痛而後吐或先吐而後痛法當以小毒藥去其積檳榔木香和其氣下焦吐者皆從於寒地道也其脈大而遲其證朝食暮吐暮食朝吐小便清利大便秘而不通治法宜毒藥通其閉塞溫其寒氣大便漸通復以中焦藥和之不令大腑秘結而自愈也此事難知問嘔吐噦胃所主各有經乎答曰胃者總司也內有太陽陽明少陽三經之別以其氣血多少而為聲物有無之不同即吐屬太陽有物無聲乃血病也有食入即吐食已則吐食久則吐之別嘔屬陽明有物有聲氣血俱病也仲景云嘔多雖有陽明證不可下噦屬少陽無物有聲乃氣病也此以乾嘔為噦也醫家大法食剎則吐為之嘔生薑半夏湯食入則吐為之暴吐生薑橘皮湯食已則吐為之嘔吐橘皮半夏湯食久則吐為之反胃水煮金花丸食再則吐為之翻胃易老紫沉丸旦食不能暮食則吐食不下脈實而滑半夏生薑大黃湯下之潔古論吐分三焦其說蓋本於黃帝所謂氣為上膈食飲入而遠出為下膈食晬時乃反出之其上焦食已暴吐者今世謂之嘔吐也中下二焦食久而吐食再而吐者今世謂之膈氣反胃也分嘔吐膈氣為二門趙以德云夫陰陽氣血隨處有定分獨脾胃得之則法天地人而三才之道備故胃有上中下三脘上脘法天為陽下脘法地為陰中脘法氣交之分陽清而陰濁故陽所司者氣陰所司者血然陽中亦有陰陰中亦有陽於是上脘氣多血少則體乾道之變化動也下脘血多氣少則體坤道之資生靜也中脘氣血相半故運上下動靜升降之氣行由是物之入胃各從其類聚水飲者物之清穀食者物之濁然清中有濁濁中有清故飲之清者必先上輸於司氣之肺而後四布為津為液清中之濁者則下輸膀胱為便溺出焉食之清者亦必先淫精於司血之心肝以養筋骨經脈更化榮衛流注百骸濁中之濁者則自下脘變糟粕傳送下大腸出焉若邪在上脘之陽則氣停氣停則水積故飲之清濁混亂則為痰為飲為涎為唾變而成嘔邪在下脘之陰則血滯血滯則谷不消故食之清濁不分而為噎塞為痞滿為痛為脹變而成吐邪在中脘之氣交者盡有二脘之病是故嘔從氣病法天之陽動而有聲與飲俱出猶雷震必雨注也吐從血病法地之陰靜而無聲與食俱出象萬物之吐出於地也氣血俱病法陰陽之氣交則嘔吐並作飲食皆出然在上脘非不吐食也設陽中之陰亦病則食入即吐不得納於胃也非若中脘之食已而後吐下脘之食久而方出其下脘非不嘔也設陰中之陽亦病則吐與嘔齊作然嘔少於吐不若上脘之嘔多於吐也嘔吐漏氣走哺吐食乾嘔噁心嘔苦吐酸吞酸嘔清水吐涎沫嘔膿嘔蟲東垣曰夫嘔吐噦者皆屬於胃胃者總司也以其氣血多少為異耳且如嘔者陽明也陽明多血多氣故有聲有物氣血俱病也仲景云嘔多雖有陽明症慎不可下孫真人曰嘔家多服生薑乃嘔吐之聖藥也氣逆者必散之故以生薑為主吐者太陽也太陽多血少氣故有物無聲乃血病也有食入則吐有食已則吐以陳皮去白主之噦者少陽也少陽多氣少血故有聲無物乃氣病也以薑製半夏為主故朱奉議治嘔吐噦以生薑半夏陳皮之類是也究三者之源皆因脾氣虛弱或因寒氣客胃加之飲食所傷而致也宜以丁香藿香半夏茯苓陳皮生薑之類主之若但有內傷而有此疾宜察其虛實使內消之痰飲者必下之當分其經對證用藥不可亂也金匱方諸嘔吐谷不得下者小半夏湯主之又云嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之用半夏一升生薑半斤水七升煮取一升半分溫再服又云卒嘔吐心下痞有水眩悸者小半夏加茯苓湯主之即前方加茯苓四兩也然則生薑半夏固通治嘔吐之正劑矣然東垣云辛藥生薑之類治嘔吐但治上焦氣壅表實之病若胃虛穀氣不行胸中閉塞而嘔者唯宜益胃推揚穀氣而已勿作表實用辛藥瀉之故服小半夏湯不愈者服大半夏湯立愈此仲景心法也寒而嘔吐則喜熱惡寒四肢悽清或先覺咽酸脈弱小而滑因胃虛傷寒飲食或傷寒汗下過多胃中虛冷所致當以剛壯溫之宜二陳湯加丁香十粒或理中湯加枳實半錢或丁香吳茱萸湯藿香安胃散鐵刷湯不效則溫中湯甚則附子理中湯或治中湯加丁香並須冷服蓋冷遇冷則相入庶不吐出羅謙甫云諸藥不愈者紅豆丸神效曾有患人用附子理中湯四逆湯加丁香到口即吐後去乾薑只參附加丁木二香煎熟更磨入沉香立吐定蓋虛寒痰氣凝結丁附既溫佐以沉木香則通乾薑白朮則泥耳熱嘔食少則出喜冷惡熱煩躁引飲脈數而洪宜二陳湯加黃連炒梔子枇杷葉竹茹乾葛生薑入蘆根汁服金匱方嘔而發熱者小柴胡湯主之潔古用小柴胡湯加青黛以薑汁打糊丸名清鎮丸治嘔吐脈弦頭痛蓋本諸此胃熱而吐者聞穀氣即嘔藥下亦嘔或傷寒未解胸中有熱關脈洪者是也並用蘆根汁金匱方嘔吐而病在膈上後思水解急與之思水者豬苓散主之嘔而胸滿者吳茱萸湯主之嘔而渴煮枇杷葉汁飲之嘔而腸鳴心下痞者半夏瀉心湯主之氣嘔吐胸滿膈脹關格不通不食常飽食則常氣逆而吐此因盛怒中飲食而然宜二陳湯加枳實木香各半錢或吳茱萸湯不效則丁沉透膈湯及五膈寬中湯食嘔吐多因七情而得有外感邪氣並飲食不節而生大概治以理中為先二陳湯加枳實一錢或加南星七分沉香木香各四分亦好或只服枳南湯或導痰湯又有中脘伏痰遇冷即發俗謂之冷癇或服新法半夏湯或撾脾湯有痰飲粥藥到咽即吐人皆謂其番胃非也此乃痰氣結在咽膈之間宜先以姜蘇湯下靈砂丹俟藥可進則以順氣之藥繼之外有吐瀉及痢疾或腹冷痛進熱藥太驟以致嘔逆宜二陳湯加砂仁白豆蔻各半錢沉香少許嘔吐諸藥不效當借鎮重之藥以墜其逆氣宜姜蘇湯下靈砂丹百粒俟藥得止卻以養正丹半硫丸導之嘔吐津液既去其口必渴不可因渴而遽以為熱若陰虛邪氣逆上窒塞嘔噦不足之病此地道不通也正當用生地黃當歸桃仁紅花之類和血涼血潤血兼用甘草以補其氣微加大黃芒硝以通其閉大便利邪氣去則氣逆嘔噦自不見矣復有胸中虛熱穀氣久虛發而為嘔噦者但得五穀之陰以和之則嘔噦自止漏氣身背皆熱肘臂牽痛其氣不續膈間厭悶食入即先嘔而後下名曰漏氣此因上焦傷風閉其腠理經氣失道邪氣內著麥門冬湯主之走哺下焦實熱大小便不通氣逆不續嘔逆不禁名曰走哺人參湯主之吐食上焦氣熱上衝食已暴吐脈浮而洪宜先降氣和中以桔梗湯調木香散二錢隔夜空腹服之三服後氣漸下吐漸去然後去木香散加芍藥二兩黃耆一兩半同煎服之病愈則止如大腑燥結食不盡下以大承氣湯去芒硝微下之少利為度再服前藥補之如大便復結又依前微下之保命集用荊黃湯調檳榔散中焦吐食由食積與寒氣相格故吐而疼宜服紫沉丸金匱大黃甘草湯治食已即吐又治吐水吐食而脈弦者由肝勝於脾而吐乃由脾胃之虛宜治風安胃金花丸青鎮丸主之金匱茯苓澤瀉湯治胃反吐而渴欲飲水者乾嘔金匱方乾嘔噦若手足厥者陳皮湯主之卒乾嘔不息取甘蔗汁溫服半升日三或入生薑汁搗葛根絞取汁服噁心噁心乾嘔欲吐不吐心下映漾人如畏船宜大半夏湯或小半夏茯苓湯或理中湯治中湯皆可用金匱方病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者生薑半夏湯主之胃氣虛弱身重有痰噁心欲吐是邪氣羈絆於脾胃之間當先實其脾胃茯苓半夏湯主之舊有風證不敢見風眼澀眼黑胸中有痰噁心兀兀欲吐但遇風覺皮肉緊手足難舉動重如石若在暖室少出微汗其證隨減再遇風病復如是柴胡半夏湯主之仲景云病人慾吐者不可下之又用大黃甘草治食已即吐何也曰欲吐者其病在上因而越之可也而逆之使下則必抑塞憒亂而益以甚故禁之若既已吐矣吐而不已有升無降則當逆而折之引令下行無速於大黃者也故不禁也兵法曰避其銳擊其惰此之謂也丹溪泥之而曰凡病嘔吐切不可下固矣夫嘔苦經云善嘔嘔有苦長太息邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔膽取三里以下胃氣逆則刺少陽血絡以閉膽逆卻調虛實以去其邪又云口苦嘔宿汁取陽陵泉為胃主嘔而膽汁苦故獨取膽與胃也陽明在泉燥淫所勝病善嘔嘔有苦又云陽明之勝嘔苦治以苦溫辛溫是運氣嘔苦皆屬燥也吐酸吞酸附東垣曰病機云諸嘔吐酸皆屬於熱辨云此上焦受外來客邪也胃氣不受外邪故嘔傷寒論云嘔家雖有陽明證不可攻之是未傳入里三陰不受邪也亦可見此症在外也仲景以生薑半夏治之孫真人云嘔家多用生薑是嘔家聖藥以雜病論之嘔吐酸水者甚則酸水浸其心不任其苦其次則吐出酸水令上下牙酸澀不能相對以大辛熱劑療之必減吐酸嘔出酸水也酸味者收氣也西方肺金旺也寒水乃金之子子能令母實故用大咸熱之劑瀉其子以辛熱為之佐以瀉肺之實以病機之法作熱攻之者誤矣蓋雜病醋心濁氣不降欲為中滿寒藥豈能治之乎丹溪曰或問吞酸素問明以為熱東垣又以為寒何也曰吐酸與吞酸不同吐酸似吐出酸水如醋平時津液隨上升之氣鬱而成積成積既久濕中生熱故從木化遂作酸味非熱而何其有鬱積之久不能自湧而出伏於肺胃之間咯不得上咽不得下肌表得風寒則內熱愈鬱而酸味刺心肌表溫暖腠理開發或得香熱湯丸津液得行亦可暫解非寒而何素問言熱者言其本也東垣言寒者言其末也但東垣不言外得風寒而作收氣立說欲瀉肺金之實又謂寒藥不可治酸而用安胃湯加減二陳湯俱犯丁香且無治熱濕鬱積之法為未合經意予嘗治吞酸用黃連茱萸各制炒隨時令迭為佐使蒼朮茯苓為輔湯浸蒸餅為小丸吞之仍教以糲食蔬果自養則病易安中脘有飲則嘈有宿食則酸故常噯宿腐氣逆咽酸水亦有每晨吐清酸水數口日間無事者亦有膈間常如酸折皆飲食傷於中脘所致生料平胃散加神麯麥芽各一錢或八味平胃散有熱則咽醋丸膈間停飲積久必吐酸水神術丸酒癖停飲吐酸水乾薑丸風痰眩冒頭痛惡心吐酸水半夏南星白附生為末滴水丸桐子大以生面為衣陰乾每服十丸至二十丸薑湯送下參萸丸可治吞酸亦可治自利酸心用檳榔四兩陳皮二兩末之空心生蜜湯下方寸匕嘔清水經云太陰之復嘔而密默唾吐清液治以甘熱是嘔水屬濕一味蒼朮丸主之金匱方心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食茯苓飲主之能消痰氣令能食又云渴欲飲水水入則吐者名曰水逆五苓散主之千金方治痰飲水吐無時節者其原因冷飲過度遂令脾胃氣羸不能消於飲食飲食入胃則皆變成冷水反吐不停者赤石脂散主之赤石脂搗篩服方寸匕酒飲時稍加至三匕服盡一斤終身不吐痰水又不下利吐涎沫金匱方乾嘔吐逆吐涎沫半夏乾薑散主之半夏乾薑各等分杵為散取方寸匕漿水一升半煎至七合頓服之乾嘔吐涎沫頭痛者吳茱萸湯主之婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之涎沫止乃治痞瀉心湯主之嘔膿仲景云嘔家有癰膿不可治嘔膿儘自愈仁齋直指以地黃丸湯主之嘔蟲仲景以吐蛔為胃中冷之故則成蛔厥宜理中湯加炒川椒五粒檳榔半錢吞烏梅丸胃咳之狀咳而嘔嘔甚則長蟲出亦用烏梅丸取胃三里有嘔吐諸藥不止別無他證乃蛔在胸膈作嘔見藥則動動則不納藥藥出而蛔不出雖非吐蛔之比亦宜用吐蛔藥或於治嘔藥中入炒川椒十粒蛔見椒則頭伏故也診形狀如新臥起陽緊陰數其人食已即吐陽浮而數亦為吐或浮大皆陽偏勝陰不能配之也為格主吐逆無陰和之寸緊尺澀其人胸滿不能食而吐寸口脈數其人則吐寸口脈細而數數則為熱細則為寒數為嘔吐金匱問數為熱當消穀引食而反吐者何也曰以發其汗令陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故吐也趺陽脈微而澀微則不利澀則吐逆谷不得入或浮而澀浮則虛虛傷脾脾傷則不磨朝食暮吐名反胃寸口脈微而數微則血虛血虛則胃中寒脈緊而澀者難治關上脈浮大風在胃中心下澹澹食欲嘔關上脈微浮積熱在胃中嘔吐蛔蟲關上脈緊而滑者蛔動脈緊而滑者吐逆脈小弱而澀胃反浮而洪為氣浮而匿為積沉而遲為寒趺陽脈浮胃虛嘔而不食恐怖者難治寬緩生寒氣在上陰氣在下二氣並爭但出不入先嘔卻渴此為欲解先渴卻嘔為水停心下屬飲脈弱而嘔小便複利身有微熱見厥者死嘔吐大痛色如青菜葉者死胃反即膈噎金匱要略云發汗令陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷其氣無餘朝食暮吐變為胃反又云趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨朝食暮吐暮食朝吐宿食不化名曰胃反傷寒論太陽病吐後汗出不惡寒發熱關脈細數欲食冷食朝食暮吐注以晨食入胃胃虛不能克化至暮胃氣行里與邪相搏則食反出也巢氏病源亦曰榮衛俱虛血氣不足停水積飲在胃脘即臟冷臟冷則脾不磨而宿食不化其氣逆而成反胃則朝食暮吐甚則食已即吐王太僕注內經亦曰食不得入是有火也食入反出是無火也由是後世悉以胃虛為寒而惟用辛香大熱之劑以復其陽雖有脈數為邪熱不殺穀者亦用之殊不思壯火散氣其大熱之藥果能復氣乎丹溪謂膈噎反胃之病得之七情六淫遂有火熱炎上之化多升少降津液不布積而為痰為飲被劫時暫得快七情飲食不節其證復作前藥再行積成其熱血液衰耗胃脘乾槁其槁在上近咽之下水飲可行食物難入入亦不多名之曰噎其槁在下與胃為近食雖可入難盡入胃良久復出名之曰膈亦曰反胃大便秘少若羊矢然必外避六淫內節七情飲食自養滋血生津以潤腸胃則金無畏火之炎腎有生水之漸氣清血和則脾氣健運而食消磨傳送行矣此論膈噎之久病者也然而亦有病未久而食入即反出之不已與膈噎形狀同者何以言之內經謂厥陰之復嘔吐飲食不入入而復出甚則入脾食痹而吐王注食痹者食已心下痛陰陰然不可忍也吐出乃止此胃氣逆而不下行也又胃脈耎散當病食痹又肺病傳之肝曰肝痹脅痛出食與夫金匱要略復有肝中寒心中風厥陰之為病三者皆食入則吐則必又從其病由之邪而治也大抵反胃亦必如前條治吐分氣積寒三法可也奈後世概用調氣之劑制一方名十膈散治十般膈氣今人守之為良方略古聖賢而勿論夫治病之道非中其邪而病豈能愈乎予試以昔嘗求邪而得驗者明之一男子壯年食後必吐出數口卻不盡出膈上時作聲面色如平人知其病不在脾胃而在膈間問其得病之由乃因大怒未止輒吃麵即時有此證料之以怒甚則血菀於上積在膈間有礙氣之升降津液因聚為痰為飲與氣相搏而動故作聲也用二陳湯加香附韭汁萊菔子服二日以瓜蒂散酸漿吐之再一日又吐痰中見血一盞次日復吐見血一鍾其病即愈一中年人中脘作痛食已則吐面紫霜色兩關脈澀知其血病也問之乃云跌僕後中脘即痛投以生新推陳血劑吐出停血碗許則痛不作而食亦不出矣咽喉閉塞胸膈膨滿似屬氣滯暫宜香砂寬中丸開導結散而已然服耗氣藥過多中氣不運而致者當補氣而使自運補氣運脾湯李絳療反胃嘔吐無常粥飲入口即吐困倦無力垂死者以上黨人參三大兩劈破水一大升煮取四合熱頓服大便燥結如羊矢閉久不通似屬血熱止可清熱潤養小著湯丸累累加之關扃自透滋血潤腸湯薑汁炙大黃人參利膈丸玄明粉少加甘草然服通利藥過多致血液耗竭而愈結者當補血潤血而使自行有因火逆衝上食不得入其脈洪大有力而數者滋陰清膈散加枇杷葉二錢蘆根一兩或痰飲阻滯而脈結澀者二陳湯入竹瀝薑汁痰多食飲才下便為痰涎裹住不得下者以來復丹控其痰涎自制滌痰丸半夏曲枯礬皂角火炙刮去皮弦子玄明粉白茯苓枳殼各等分霞天膏和丸有因脾胃陽火內衰其脈沉微而遲者以辛香之藥溫其氣卻宜丁沉透膈湯五膈寬中散嘉禾散之類仍以益陰之藥佐之瘀血在膈間阻礙氣道而成者居多以代抵當丸作芥子大取三錢去枕仰臥細細嚥之令其搜逐停積至天明利下惡物卻好將息自愈五靈脂治淨為細末黃犬膽汁和丸如龍眼大每服一丸好酒半盞溫服不過三服效亦行瘀血之劑也亦有蟲者以秦川剪紅丸取之此丸亦取瘀血本事方芫花丸治積聚停飲痰水生蟲久則成反胃及變為胃癰其說在靈樞及巢氏病源有實積而無內熱者古方厚朴丸萬病紫菀丸當如方服之能取下蟲物治反胃用新汲水一大碗留半碗將半碗水內細細澆香油鋪滿水面上然後將益元散一貼輕輕鋪滿香油麵上須臾自然沉水底此即陰陽升降之道也用匙攪勻服卻將所留水半碗蕩藥碗漱口令淨吐既止卻進末子涼膈散通其大小便未效再進一帖益元及涼膈即效也此方極驗童便降火竹瀝行痰韭汁行血人乳汁牛乳汁補虛潤燥蘆根汁止嘔茅根汁涼血薑汁佐竹瀝行痰甘蔗汁和胃驢尿殺蟲仍入燒酒米醋蜜各少許和勻隔湯頓溫服自制通腸丸大黃酒浸滑石飛研各二兩陳皮去白厚朴薑製各一兩半人參當歸貫眾去毛乾漆炒煙盡各一兩木香檳榔各七錢半三稜煨蓬朮煨川芎薄荷玄明粉雄黃桃仁泥甘草各五錢俱各另取細末用竹瀝童便韭汁人乳驢尿蘆根汁茅根汁甘蔗汁燒酒米醋蜜各二杯薑汁一杯隔湯煮濃和丸如芥子大每服三錢去枕仰臥唾津嚥下通利止後服服此丸及前諸汁後得藥不反切不可便與粥飯及諸飲食每日用人參五錢陳皮二錢作湯細啜以扶胃氣覺稍安漸漸加人參旬日半月間方可小試陳倉米飲及糜粥倉廩未固不宜便貯米穀常見即食粥飯者遂致不救又有反胃因叫呼極力破損氣喉氣喉破漏氣壅胃管胃受氣亦致反胃法在不治或用牛喉管焙燥服之張子和十膈五噎浪分支派䟽病派之分自巢氏始病失其本亦自巢氏始何則老子曰少則得多則惑且俗謂噎食一症在內經原無多語惟曰三陽結謂之膈三陽者大腸小腸膀胱也結謂結熱也小腸結熱則血脈燥大腸結熱則後不圊膀胱結熱則津液涸三陽俱結則前後秘澀下既不通必反上行此所以噎食不下縱下而復出也謂胃為水穀之海日受其新以易其陳一日一便乃常度也今病噎者三五七日不便乖其度也豈非三陽俱結於下大腸枯涸所食之物為咽所拒縱入太倉還出喉嚨此陽火不下推而上行也經曰少陽所至為嘔湧溢食不下又氣厥論云肝移寒於心為狂膈中注陽與寒相搏故膈食而中不通此膈熱與寒為之也非獨專於寒也六節藏象云人迎四盛以上為格陽王太僕云陽盛之極故膈拒而食不入正理論云格則吐逆故膈亦當為格後世強分為五噎後又別為十膈五噎其派既多其惑滋甚人之溢食初未必遽然也初或傷酒食或胃熱欲吐或胃風欲吐醫氏不察本原火里燒姜湯中煮桂丁香未已豆蔻繼之蓽茇未已胡椒繼之雖曰和胃胃本不寒雖曰補胃胃本不虛設如傷飲止可逐飲設如傷食止可逐食豈可言虛便將熱補素熱之人三陽必結三陽既結食必上潮醫者猶云胃寒不納燒針著艾三陽轉結分明一句到了難從不過抽薪退熱最為緊要揚湯止沸愈急愈增歲月彌深為醫所誤人言可下退陽養陰張眼吐舌恐傷元氣止在沖和閉塞不通腸宜通暢是以腸鳴腸既不通遂成噎病或曰憂恚氣結亦可下乎予曰憂恚盤礴便同火鬱太倉公見此皆下法廢以來千年不復今代劉河間治膈氣噎食用承氣三乙湯獨超近代今予不恤姑示後人用藥之時更詳輕重假如秘久慎勿頓攻總得攻開必慮後患宜先潤養小著湯丸累累加之關扃自透其或咽噎上阻痰涎輕用苦酸微微湧出因而治下藥勢易行設或不行蜜鹽下導始終勾引兩藥相通結散陽消飲食自下莫將巴豆耗卻天真液燥津枯留毒不去人言此病曾下奪之從下奪來轉虛轉痞此為巴豆非大黃牽牛之過也箕城一酒官病嘔吐逾年不愈皆以胃寒治之丁香半夏青陳薑附種種燥熱燒錐燎艾莫知其數或少愈或復劇且十年大便澀燥小便赤黃予視之曰諸痿喘嘔皆屬於上王太僕云上謂上焦也火氣炎上之氣謂皆熱甚而為嘔以四生丸下三十行燥糞腸垢何啻如斗其人昏困一二日頻以冰水呷之漸投涼乳酪芝麻飲時時咽之數日後大啜飲食精神氣血如昔繼生三子至五十歲診寸口脈微而數微則無氣無氣則榮虛榮虛則血不足血不足則胸中冷趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨朝食暮吐暮食朝吐完穀不化名曰胃反脈緊而澀其病難治脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之令脈反弦故名曰虛胃脈耎而散者當病食痹至真要論云食痹而吐腎脈微緩為洞洞者食不化下嗌還出沉緩而無力或大而弱為氣虛數而無力或澀小為血虛數而有力為熱寸關沉或伏或大而滑數是痰寸關脈沉而澀是氣反胃之脈沉細散亂不成條道沉浮則有中按則無必死不治更參面色不欲黃白亦不欲純白皆惡候也年高病久元氣敗壞手足寒冷糞如羊矢沫大出者皆不治噎噎謂飲食入咽而阻礙不通梗澀難下有下者有不得下者有吐者有不吐者故別立門血槁者地黃麥門冬當歸煎膏入韭汁乳汁童便蘆根汁桃仁泥和勻細細呷之大便秘澀加桃仁泥玄明粉或用人參散有實積者可暫用厚朴丸亦可用昆布丸食物下咽屈曲自膈而下梗澀作微痛多是瘀血用前膏子藥潤補之後以代抵當丸行之有生薑汁煎方用生薑汁白蜜牛酥各五兩人參去蘆末百合末各二兩內銅鍋中慢火煎如膏不拘時候含一匙如半棗大津咽或煎人參湯調下一茶匙亦得此虛而燥者宜之手巾布裹舂杵頭糠時時拭齒治卒噎刮舂米杵頭細糠吞之或煎湯呷或煉蜜丸含咽津亦得杵頭糠人參末石蓮肉末柿霜玄明粉等分舐吃枇杷葉拭去毛炙陳皮去白各一兩生薑半兩水煎分溫三服噎病喉中如有肉塊食不下用昆布二兩洗去鹹水小麥二合水三大盞煎候小麥爛熟去滓每服不拘時吃一小盞仍揀取昆布不住含三兩片咽津極效噎病聲不出竹皮飲東垣曰堵塞咽喉陽氣不得出者曰塞陰氣不得下降者曰噎夫噎塞迎逆於咽喉胸膈之間令諸經不行則口開目瞪氣欲絕當先用辛甘氣味俱陽之藥引胃氣以治其本加堵塞之藥以瀉其標也寒月陰氣大助陰邪於外於正藥內加吳茱萸大熱大辛苦之味以瀉陰寒之氣暑月陽盛則於正藥中加青皮陳皮益智黃柏散寒氣泄陰火之上逆或以消痞丸合滋腎丸滋腎丸者黃柏知母微加肉桂三味是也或更加黃連別作丸二藥七八十丸空心約宿食消盡服之待少時以美食壓之不令胃中停留也以上諸法悉於補中益氣湯加減之膈咽不通並四時換氣用藥法黃帝針經云胃病者腹䐜脹胃脘當心而痛上肢兩脅膈咽不通飲食不下取三里夫咽者咽物之門戶也膈者上焦心肺之分野不通者升降之氣上不得下交通又云清氣在下則生餐泄泄黃如糜米穀不化者是也濁氣在上則生䐜脹腹中脹滿不得大便或大便難先結後溏皆是也濁氣在上當降而不降者乃腎肝吸入之陰氣不得下而反在上也胃氣逆上或為嘔或為吐或為噦者是陰火之邪上衝而吸入之氣不得入故食不下也此皆氣衝之火逆胃之脈反上而作者也清氣在下則生餐泄者胃氣未病之日當上行心肺而經營也因飲食失節勞役形體心火乘於土位胃氣弱而下陷入陰中故米穀入而不得升反降而為餐泄也膈咽之間交通之氣不得表裡者皆衝脈上行逆氣所作也蓋胃病者上肢兩脅膈咽不通飲食不下取三里者是也針經云清濁相干亂於胸中是為大悗悗者惑也氣不交通最為急證不急去之諸變生矣聖人治此有要法陽氣不足陰氣有餘先補其陽後瀉其陰是先令陽氣升發在陽分而後瀉陰也春夏之月陽氣在經當益其經脈去其血絡秋冬陽氣降伏當先治其臟腑若有噎有塞塞者五臟之所生陰也血也噎者六腑之所生陽也氣也二者皆由陰中伏陽而作也今立四時用藥並治法於後冬三月陰氣在外陽氣內臟當外助陽氣不得發汗內消陰火勿令泄瀉此閉臟周密之大要也盛冬乃水旺之時水旺則金旺子能令母實肺者腎之母皮毛之陽元本虛弱更以冬月助其令故病者善嚏鼻流清涕寒甚則出濁涕嚏不止比常人尤大惡風寒小便數而欠或上飲下便色清而多大便不調夜惡無寐甚則為痰咳為嘔為噦為吐為唾白沫以至口開目瞪氣不交通欲絕者吳茱萸丸主之夏三月大暑陽氣在外陰氣在內以此病而值此時是天助正氣而銼其邪氣不治而自愈矣然亦有當愈不愈者蓋陰氣極盛正氣不能伸故耳且如膈咽不通咽中如梗甚者前證俱作治法當從時用利膈丸瀉肺火以黃耆補中湯送下如兩足痿厥行步恇怯欹側欲倒臂臑如折及作痛而無力或氣短氣促而喘或不足以息以黃耆人參甘草白朮蒼朮澤瀉豬苓茯苓橘皮等作湯送下滋腎丸一百五十丸六七月之間濕熱之令大行氣短不能言者加五味子麥門冬如心下痞膨悶食不下以上件白朮蒼朮等湯送下消痞丸五七十丸更當審而用之診寸口脈浮大醫反下之此為大逆浮即無血大即為寒寒氣相搏即為腸鳴醫不知而反與飲水令汗大出水得寒氣冷必相搏其人即噎寸口脈緊而芤緊則為寒芤則為虛虛寒相搏脈為陰結而遲其人則噎吐利成無己云若止嘔吐而利經謂之吐利是也上吐下利躁擾煩亂乃謂之霍亂其與但稱吐利者有異也蓋暴於旦夕者為霍亂可數日久者為吐利綱目以霍亂與傷寒吐利合為一門今仍分為二而以徐而日久者入此門脈經云心乘肝必吐利內經云厥陰所至為嘔泄又云木太過曰發生發生之紀上徵則氣逆其病吐利是風木之為吐利者也又云水太過曰流衍流衍之紀其動漂泄沃湧是寒水之為吐利者也漂泄謂瀉利沃湧為吐沫也金匱云乾嘔而利者黃芩加半夏生薑湯主之黃芩湯亦主之海藏云上吐下瀉不止當渴而反不渴脈微細而弱者理中湯主之丹溪云泄瀉或嘔吐生薑汁湯調六一散服潔古云有痰而泄利不止甚則嘔而欲吐利下而不能食由風痰羈絆脾胃之間水煮金花丸主之霍亂乾霍亂陳無擇曰霍亂者心腹卒痛嘔吐下利憎寒壯熱頭痛眩暈先心痛則先吐先腹痛則先利心腹俱痛吐利並作甚則轉筋入腹則斃蓋陰陽反戾清濁相干陽氣暴升陰氣頓墜陰陽痞膈上下奔迫宜詳別三因以調之外因傷風則惡風有汗傷寒則惡寒無汗冒濕則重著傷暑則煩熱內因九氣所致郁聚痰涎痞膈不通遂致滿悶隨其勝復必作吐利或飽食膾炙恣餐乳酪冰脯寒漿旨酒胃既䐜脹脾臟停凝必因郁發遂成吐利當從不內外因也或問霍亂病亦復有他論者乎曰嘗考之內經有太陰所至為中滿霍亂吐下有土鬱之發民病嘔吐霍亂注下上濕土霍亂即仲景五苓散理中丸之類有歲土不及風乃大行民病霍亂餐泄上土虛風勝霍亂即羅謙甫桂苓白朮散之類有熱至則身熱霍亂吐下上熱霍亂即活人書香薷散之類靈樞有足太陰之別名曰公孫去本節後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則蠱脹取之所別有清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干亂於腸胃則為霍亂取之足太陰陽明不下取之三里巢氏因此一條乃云霍亂者由陰陽清濁二氣相干亂於腸胃間因遇飲食而變發則心腹絞痛挾風而實者身發熱頭痛體疼虛者但心腹痛而已亦有因飲酒食肉腥膾生冷過度居處不節或露臥濕地或當風取涼風冷之氣歸於三焦傳於脾胃水穀不化皆成霍亂自巢氏之說行後世守之以為法無復知內經諸條者矣至劉河間乃云吐下霍亂三焦為水穀傳化之道路熱氣甚則傳化失常而吐瀉霍亂火性躁動故也世俗止謂是停食者誤也轉筋者亦是脾胃土衰肝木自甚熱氣燥爍於筋則筋攣而痛亦非寒也張戴人則以風濕暍三氣合而為邪蓋脾濕土為風木所克鬱則熱乃發發則心火炎上故嘔吐嘔吐者暍也脾濕下注故注泄注泄者濕也風急甚故筋轉轉筋者風也可謂善推病情者乎王海藏亦謂風濕熱外至生冷物內加內外合病者此條殆似之矣凡治病當從內經隨宜施治安可執一端而已哉然則此病當以何為要曰脾胃之濕為本諸邪感動者為病之由然其間脾胃有虛有實邪有陰陽相干之孰甚皆宜消息處治至若明理論謂傷寒吐利者由邪氣所傷霍亂吐利者由飲食所傷其有兼傷寒之邪內外不和者加之頭痛發熱而吐利者是霍亂傷寒也原仲景之意豈必在飲食始為是病彼於寒邪傳入中焦胃氣因之不和陰陽痞膈者安得不有以致之乎不然何以用理中四逆等湯治之此疾多生夏秋之交縱寒月有之亦多由伏暑而然病之將作必先腹中㽲痛吐瀉之後甚則轉筋此兼風也手足厥冷氣少唇青此兼寒也身熱煩渴氣粗口燥此兼暑也四肢重著骨節煩疼此兼濕也傷風傷寒當於傷寒吐利門中求之若風暑合病宜石膏理中湯暑濕相搏宜二香散夏月中暑霍亂上吐下利心腹撮痛大渴煩躁四肢逆冷汗自出兩腳轉筋宜香薷飲井底沉極冷頓服之桂苓白朮湯亦妙羅謙甫治蒙古人因食酒肉飲潼乳得吐瀉霍亂症脈沉數按之無力所傷之物已出矣即以新汲水半碗調桂苓白朮散徐徐服之稍得安靜又於牆陰掘地約二尺許入新汲水攪之澄清名曰地漿用清一杯再調服之漸漸氣和吐瀉遂止翼日微煩渴卻以錢氏白朮散時時服之良愈或問用地漿者何也曰坤為地地屬陰土平曰靜順感至陰之氣又於牆陰貯新汲水取重陰之氣也陰中之陰能泄陽中之陽霍亂症由暑熱內傷而得之故痹論云陰氣者靜則神臟躁則消亡又加暑熱七神迷亂非至陰之氣何由息乎又治提學侍其公七十九歲中暑霍亂吐瀉昏冒不知人脈七八至洪大無力頭熱如火足寒如冰半身不遂牙關緊急此年高氣弱不任暑氣陽不維陰則瀉陰不維陽則吐陰陽不相維則既吐且瀉矣前人見寒多以理中湯熱多以五苓散作定法冶之今暑氣極盛陽明得時之際況因動而得之中暑明矣非甘辛大寒之劑不能泄其暑熱墜浮焰之火而安神明也遂以甘露散甘辛大寒瀉熱補氣加茯苓以分陰陽冰水調灌之漸省人事諸症悉去後慎言語節飲食三日以參朮調中湯以意增減服之理其正氣逾旬方平復戴氏云人於夏月多食瓜果及飲冷乘風以致食留不化因食成痞隔絕上下遂成霍亂六和湯倍藿香煎熟調蘇合香丸濕霍亂除濕湯訶子散七情鬱結五臟六腑互相刑剋陰陽不和吐利交作七氣湯霍亂轉筋吐瀉不止頭目昏眩須臾不救者吳茱萸湯霍亂吐利轉筋四肢逆冷須臾不救急以茱萸食鹽湯霍亂多寒肉冷脈絕宜通脈四逆湯有宜吐者雖已自吐利還用吐以提其氣用二陳湯探吐或樟木煎湯亦可吐或白礬湯亦可吐三因吐法用極鹹鹽湯三升熱飲一升刺口令吐宿食便盡不吐更服吐訖仍飲三吐乃止此法勝他法遠矣俗人鄙而不用坐觀其斃哀哉吐後隨證調理亦有可下者保命集云夫傷寒霍亂者其本在於陽明胃經也胃者水穀之海主稟四時皆以胃氣為本與脾臟為表裡皆主中焦之氣腐熟水穀脾胃相通濕熱相合中焦氣滯或因寒飲或因飲水或傷水毒或感濕氣冷熱不調水火相干陰陽相搏上下相離榮衛不能相維故轉筋攣痛經絡亂行暴熱吐瀉中焦胃氣所主也有從標而得之者有從本而得之者有從標本而得之者六經之變治各不同察其色脈知犯何經隨經標本各施其冶此治霍亂之法也如頭痛發熱邪自風寒而來中焦為熱相半之分邪稍高者居陽分則為熱熱多飲水者五苓散以散之如邪稍下者居陰分則為寒寒多不飲水者理中丸以溫之如吐利後有表者解之汗出厥者溫之如既吐且利小便利大汗出內外熱者亦溫之如吐下後汗出厥逆不解脈欲絕者四逆等湯治之傷寒吐瀉轉筋身熱脈長陽明本病也宜和中平胃散建中湯或四君子湯脈浮自汗者四君子加桂五錢主之脈浮無汗者四君子加麻黃五錢主之傷寒吐瀉轉筋脅下痛脈弦者木剋土也故痛甚平胃散加木瓜五錢亦可治宜建中加柴胡木瓜湯傷寒吐瀉後大小便不通胃中實痛者四君子加大黃一兩主之傷寒吐瀉轉筋腹中痛體重脈沉而細者宜四君子加芍藥高良薑湯傷寒吐瀉四肢拘急脈沉而遲此少陰霍亂也宜四君子加姜附厚朴湯厥陰霍亂必四肢逆冷脈微緩宜建中加附子當歸湯戴復庵云霍亂之病揮霍變亂起於倉卒與中惡相似但有吐利為異耳其證胸痞腹㽲氣不升降甚則手足厥逆冷汗自出或吐而不瀉或瀉而不吐或吐瀉兼作或吐瀉不透宜蘇合香丸以通其痞塞繼進藿香正氣散加木香半錢仍以蘇合香丸調吞來復丹若果瀉已甚則不可用來復丹瀉而不吐胸膈痞滿先以陰陽湯或濃鹽湯頓服以導其吐已吐未吐並藿香正氣散間進蘇合香丸吐而不瀉心腹㽲痛頻欲登圊苦於不通藿香正氣散加枳殼一錢多下來復丹欲捷則用生枳殼若更不能作效逼迫已甚其勢不容不用神保丸但神保雖能通利亦入大腸而後有功若隔於上而不能下轉服轉秘須用來復丹研末湯調吞下養正丹百粒庶可引前藥到下吐瀉兼作心腹纏擾未安者藿香正氣散加官桂木香各半錢不愈則投四順湯吐利不止元氣耗散病勢危篤或水粒不入或口渴喜冷或惡寒戰掉手足逆冷或發熱煩躁欲去衣被此蓋內虛陰盛卻不可以其喜冷欲去衣被為熱宜理中湯甚則附子理中湯不效則四逆湯並宜放十分冷服霍亂已透而余吐余瀉未止腹有餘痛宜一味報秋豆葉煎服乾者尤佳霍亂並諸吐瀉後胸膈高起痞塞欲絕理中湯加枳實半錢茯苓半錢名枳實理中湯吐瀉已愈而力怯精神未復者十補散轉筋陳氏云轉筋者以陽明養宗筋屬胃與大腸今暴吐下津液頓亡外感四氣內傷七情飲食甜膩攻閉諸脈枯削於筋宗筋失養必致攣縮甚則舌卷囊縮者難治也劉宗厚云冷熱不調陰陽相搏故轉筋攣痛甚者遍體轉筋此實陰陽之氣反戾風寒乘之筋失血氣所榮而為攣縮急痛也又河間論轉筋皆屬火丹溪謂屬血熱二公之論轉筋非因於霍亂者也其不因霍亂而轉筋者誠如二公之言亦有血虛筋失所養則轉而急痛不能舒也若夫霍亂而轉筋則陳氏劉氏備矣亦有榮血中素有火熱卒然霍亂而風寒外束榮中之熱內郁而其勢猖狂則筋亦為之轉動也大抵霍亂見此症甚者多不可救宜急治之木瓜煮汁飲之香薷煮汁飲之燒梔子二十枚研末熟水調下熱者宜之理中湯去朮加生附子一枚或理中湯加凍膠銼炒一錢或以造麴蓼汁暖熱浸或用濃鹽湯浸仍令其縶縛腿脛若筋入腹及通身轉筋者不可治寒者宜之直指木瓜湯皂角末一小豆許入鼻中取嚏蓼花一把去兩頭以水二升半煮一升半頓服之灸承山二十七壯神效煩渴陳氏云陰陽反戾清濁相干水與谷並小便閉澀既走津液腎必枯燥引飲自救煩渴必矣止渴湯主之霍亂煩渴以增損縮脾飲主之能解伏熱消暑毒止吐利霍亂之後服熱藥太多煩躁作渴尤宜服之霍亂吐瀉後煩渴飲水宜茯苓澤瀉湯霍亂已愈煩熱多渴小便不利宜小麥門冬湯霍亂後噁心懶食口乾多渴宜白朮散霍亂後利不止冷汗出腹脅脹宜烏梅散霍亂後下利無度腹中㽲痛宜黃連丸霍亂後下利見血宜止血湯赤石脂湯潔古老人云霍亂轉筋吐瀉不止病在中焦陰陽交而不和發為疼痛此病最急不可與分毫粥飲穀氣入胃則必死矣保命集云凡霍亂慎勿與粟米粥湯入胃即死如吐瀉已多欲住之後宜以稀粥漸漸補養以遲為妙診霍亂遍身轉筋肚痛四肢厥冷欲絕者其脈洪大易治脈微囊縮舌卷不治霍亂之後陽氣已脫或遺尿而不知或氣少而不語或膏汗如珠或大躁欲入水或四肢不收皆不可治也乾霍亂忽然心腹脹滿攪痛欲吐不吐欲瀉不瀉燥亂憒憒無奈俗名攪腸沙者是也此由脾土鬱極而不得發以致火熱內擾陰陽不交或表氣發為自汗或裡氣不通而作腹痛然膈上為近陽也膈下為近陰也若欲陰陽之氣行必先自近從上開之陽氣得通則先下之陽也若欲陰陽之氣行必死於其火也曰方論皆謂脾胃有宿食與冷氣相搏子何言為火耶曰神志昏冒煩躁悶亂非諸躁狂越之為屬火者乎不急治即死非暴病暴死之屬火者乎但處治不可過於攻攻之過則脾愈虛亦不可過於熱熱之過則內火愈熾不可過於寒寒之過則火必與捍格須反佐以治然後郁可升食可出而火可散矣古方有用鹽熬調以童便非獨用其降陰之不通陰既不通其血亦不行兼用行血藥也此誠良法足可為處方者比類矣丹溪云吐提其氣最是良法吐中兼有發散之義有用解散者不用涼藥但二陳湯加川芎蒼朮防風白芷戴復庵法先以濃鹽湯頓服次調蘇合香丸吞下來復丹仍進藿香正氣散加木香枳殼各半錢厚朴湯活命散冬葵子湯刺委中穴並十指頭出血亦好妊娠霍亂若先吐或腹痛吐利是因於熱也若頭痛體疼發熱是挾風邪也若風折皮膚則氣不宣通而風熱上衝為頭痛若風入腸胃則泄利嘔吐甚則手足逆冷此陽氣暴竭謂之四逆妊娠患多致損胎也薛氏曰若因內傷飲食外感風寒用藿香正氣散若因飲食停滯用平胃散果脾胃頓傷陽氣虛寒手足厥冷須用溫補之劑治當詳審毋使動胎也人參散人參白朮散縮脾飲木瓜煎竹茹湯四君子湯理中丸香薷飲產後霍亂陳氏云因臟腑虛損飲食不消觸冒風冷所致若熱而飲水者五苓散寒而不飲水者理中丸虛冷者加附子來復丹尤妙予謂宜參之於保命集治法關格關者不得小便格者吐逆上下俱病者也格則吐逆九竅五臟陰極自地而升是行陽道乃東方之氣金石之變上壅是也極則陽道不行反閉於上故令人吐逆是地之氣不能上行也逆而下降反行陰道故氣填塞而不入則氣口之脈大四倍於人迎此清氣反行濁道也故曰格關則不便下竅六腑陽極自天而降是行陰道乃西方之氣膏粱之物下泄是也極則陰道不行反閉於下故不得小便是天之氣不得下通也逆而上行反行陽道故血脈凝滯而不通則人迎之脈大四倍干氣口此濁氣反行清道也故曰關或問關格之病因何如曰內經以臟腑陰陽之病診見於外者則在人迎氣口謂人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰人迎與寸口俱盛四倍以上為關格關格之脈贏不能極於天地之精氣則死矣注謂格者陽盛之極故格拒而食不得入也關者陰盛之極故關閉而溲不通也靈樞亦嘗三言之其二者皆如內經之論人迎氣口之盛分經脈也但更謂盛者是足經盛而躁者是手經至人迎四盛且大且數名曰溢陽溢陽為外格手太陰脈口四盛且大且數名曰溢陰溢陰為內關內關不通死不治人迎與太陰脈口俱盛四倍以上命曰關格關格者與之短期而人迎與脈口俱盛三倍以上命曰陰陽俱溢如是不開則血脈閉塞氣無所行流淫於中五臟內傷矣凡刺之道從所分人迎一盛三盛五盛瀉其陽補其所合之陰二瀉一補寸口亦然分瀉其陰補其所合之陽二補一瀉皆以上氣和乃止其一言邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰不利陰脈不利則血留之血留之則陰氣盛矣陰氣太盛則陽氣不能榮也故曰關陽氣太盛則陰氣不能榮也故曰格陰陽俱盛不得相榮也故曰關格關格者不得盡期而死也由此而觀前之論人迎寸口者為人迎主外氣口主內故分三陰三陽氣之多寡定一盛二盛三盛而言也若此之不言人迎寸口者殆亦有謂焉何則此因論脈度及之而以手足十二經周行上下者是大經隧然一陰一陽經相為臟腑之表裡者即有支橫之路通其內外臟腑陰陽之氣與之相榮故在兩手寸關尺六部以為診法浮則為腑沉則為臟者於陰陽之盛豈盡從其部而見耶故不復言人迎氣口耳及張仲景之言關格者則可見矣如謂寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆又謂心脈洪大而長是心之本脈也上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死又云趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格蓋胃者水穀之海營之居也營者營衛之根源營之機不動則衛氣不布衛氣不布則脈伏伏則穀不化而吐逆榮氣不行則脈澀澀則食不入如是皆為外格未見內關之病亦通言為關格矣注乃又以澀脈為脾病且脾者陰臟也脾病則陰盛陰盛當為內關豈以外格其飲食不入耶蓋關格之名義格者拒捍其外入者不得內關者閉塞其內出者不得泄豈不明且盡乎後世妄以小便不通為格大便不通為關泛指在下陰陽二竅者為言及乎陰陽之大法者不復窮已抑非獨此也復有以陰陽格絕之證通為關格之病者是非錯亂有可嘆焉夫隔絕之證具於內經者有曰隔則閉絕上下不通者暴憂之病也注云憂愁則氣閉塞不行血脈斷絕故大小便不得通有曰病久則傳化之行上下不並良醫勿為又有三陽結謂之隔注云小腸膀胱熱結也小腸熱結則血脈燥膀胱熱結則津液涸故隔塞而不便又謂三陽積則九竅皆塞又謂陽蓄積病死而陽氣當隔隔者當瀉不亟正治粗乃敗之原此數條其與關格果何如耶丹溪書云必用吐提其氣之橫格不必在出痰也又云有痰二陳湯吐之吐中便有降中氣不運者補氣藥中升降此蓋竊其治小便之法填於條下蹈世俗之弊而不悟悲夫又考之王氏脈經從八十一難謂有太過有不及有陰陽相乘有覆有溢有關有格然關之前者陽之動也脈當見九分而浮過者法曰太過減者法曰不及遂上魚為溢為外關內格此陰乘之脈也關以後者陰之動也脈當見一寸而沉過者法曰太過減者法曰不及遂入尺為覆為內關外格此陽乘之脈也故覆溢是其真臟之脈人不病自死大抵亦人迎氣口之互見者也云岐子云陰陽易位病名關格胸膈上陽氣常在則熱為主病身半以下陰氣常在則寒為主病寒反在胸中舌上白胎而水漿不下故曰格格則吐逆熱在丹田小便不通故曰關關則不得小便胸中有寒以熱藥治之丹田有熱以寒藥治之若胸中寒熱兼有以主客之法治之治主當緩治客當急柏子仁湯人參散既濟丸檳榔益氣湯木通二陳湯導氣清利湯加味麻仁丸皂角散孫尚藥治奉職趙令儀女忽吐逆大小便不通煩亂四肢漸冷無脈凡一日半與大承氣湯一劑至夜半漸得大便通脈漸和翼日乃安呃逆呃逆即內經所謂噦也或曰成無己許學士固以穢為呃逆然東垣海藏又以噦為乾嘔陳無擇又以噦名咳逆諸論不同今子獨取成許二家之說何也曰噦義具在內經顧諸家不察耳按靈樞雜病篇末云噦以草刺鼻嚏嚏而已無息而疾迎引之立已大驚之亦可已詳此經文三法正乃治呃逆之法按呃逆用紙捻刺鼻便嚏嚏則呃逆立止或閉口鼻氣使之無息亦立已或作冤盜賊大驚駭之亦已此予所以取成許二家之論噦為呃逆為得經旨也若以噦為乾嘔設使乾嘔之人或使之嚏或使之無息或使之大驚其乾嘔能立已乎噦非乾嘔也明矣若以噦名咳逆按內經生氣通天論曰秋傷於濕上逆而咳陰陽應象論曰秋傷於濕冬生咳嗽以此論之則咳逆為咳嗽無疑以春夏冬三時比例自見孫真人千金曰咳逆者嗽也本自明白後人不知何以將咳逆誤作呃逆失之遠矣趙以德曰成無己云噦者俗謂之咳逆呃呃然有聲然引咳逆是噦非也內經以噦與咳逆為兩證噦是胃病咳逆是肺病謂胃氣逆為噦注云胃為水穀之海腎與為關關閉不利則氣逆而上胃以包容水穀性喜受寒寒谷相搏故為噦也又謂陽明之復咳噦太陽之復嘔出清水及為噦噫少陰之復噦噫靈樞亦謂谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦補手太陰瀉足少陰張仲景言噦者皆在陽明證中謂濕家下之太早則噦而陽明病不能食攻其熱必噦皆因下後胃氣虛而噦者也至有風熱內壅氣不能通有潮熱時時噦者與小柴胡湯和解之噦而腹滿視前後知何部不利利之者此皆可治之證至若病極譫語甚者至噦又不尿腹滿加噦者皆不治丹溪先生亦嘗謂呃逆氣逆也氣自臍下直衝上出於口而作聲之名也內經謂諸逆衝上皆屬於火東垣謂是陰火上衝而吸之氣不得入胃脈反逆由陰中伏陽而作也從四時用藥法治古方悉以胃弱言之而不及火且以丁香柿蒂竹茹陳皮等劑治之未審孰為降火孰為補虛人之陰氣依胃為養胃土傷損則木氣侮之此土敗木賊也陰為火所乘不得內守木挾相火乘之故直衝清道而上言胃弱者陰弱也虛之甚也病人見此似為危證然亦有實者不可不知嗟乎聖人之言胃氣逆為噦者非由一因而逆緣王太僕用靈樞之意竟作腎寒逆上之病注之由是後代方論或用熱劑治寒或用辛溫散氣安知脾與胃一陰一陽也二者不和亦逆腎肝在下相凌亦逆且腎之逆未可便謂之寒也左腎主水性本潤下烏能自逆必右腎相火炎上挾其沖逆須觀所挾多寡分正治反治以療之肝木之風從少陽相火沖剋者亦必治火皆當如先生所言者以治若別有其故而噦者又必如仲景法隨其攸利而治之劉宗厚曰呃逆一證有虛有實有火有痰有水氣不可專作寒論蓋傷寒發汗吐下之後與瀉利日久及大病後婦人產後有此者皆脾胃氣血大虛之故也若平人食入太速而氣噎或飲水喜笑錯喉而氣搶或因痰水停隔心中或因暴怒氣逆痰厥或傷寒熱病失下而有此者則皆屬實也夫水性潤下火性炎上今其氣自下衝上非火而何大抵治法虛則補之虛中須分寒熱如因汗吐下後誤服寒涼過多當以溫補之如脾胃陰虛火逆上衝當以平補之挾熱者涼而補之若夫實者如傷寒失下地道不通因而呃逆當以寒下之如痰飲停蓄或暴怒氣逆痰厥此等必形氣俱實別無惡候皆隨其邪之所在湧之泄之清之利之也胃傷陰虛木挾相火直衝清道而上者宜參朮湯下大補陰丸吐利後胃虛寒者理中湯加附子丁香柿蒂吐利後胃虛熱者橘皮竹茹湯三因方云凡吐利後多作噦此由胃中虛膈上熱故噦或至八九聲相連於氣不回至於驚人者若傷寒久病得此甚惡內經所謂壞病者是也丹溪治趙立道年近五十質弱多怒暑月因飢後大怒得滯下病口渴自以冷水調生蜜飲之痢漸緩五七日後診脈稍大不數遂令止蜜水渴時且以參朮湯調益元散與之痢亦漸收七八日後覺倦甚發呃知其因下久而陰虛也令守前藥然利尚未止又以煉蜜與之眾皆尤藥之未當欲用姜附曰補藥無速效附子非補陰者服之必死眾曰冷水飲多得無寒乎曰炎暑如此飲涼非寒勿多疑待以日數藥力到當自止又四日而呃止滯下亦安又治陳擇仁年近七十素厚味有久嗽病新秋患滯下食大減至五七日後呃作脈皆大豁眾以為難丹溪曰形瘦者尚可為以參朮湯下大補丸七日而安婁全善治其兄九月得滯下每夜五十餘行嘔逆食不下五六日後加呃逆與丁香一粒噙之立止但少時又至遂用黃連瀉心湯加竹茹飲之呃雖少止滯下未安若此者十餘日遂空心用御米殼些少澀其滑日間用參朮陳皮之類補其虛自服御米殼之後呃聲漸輕滯下亦收而安以上吐利後補虛例仲景云噦而腹滿視其前後知何部不利利之即愈大腸結燥脈沉數者調胃承氣湯大便不通噦數譫語小承氣湯丹溪治超越陳氏二十餘歲因飽後奔走數里患噦但食物則連噦百餘聲半日不止飲酒與湯則不作至晚發熱脈澀數以血入氣中治之用桃仁承氣湯加紅花煎服下汙血數次即減再用木香和中丸加丁香服之十日而愈右下例有實積者宜之又治一女子年逾笄性躁味厚炎月因大怒而呃作作則舉身跳動脈不可診神昏不知人問之乃知暴病視其形氣俱實遂以人參蘆二兩煎湯飲一碗大吐頑痰數碗大汗昏睡一日而安人參入手太陰補陰中之陽者也蘆則反是大瀉太陰之陽女子暴怒氣上肝主怒肺主氣經曰怒則氣逆因怒逆肝木乘火侮肺故呃大作而神昏參蘆善吐痰盡則氣降而火衰金氣復位胃氣得和而解上宣例痰鬱者宜乏三因云噦而心下堅痞眩悸者膈間有痰水所為虛不禁吐者宜二陳湯導痰湯加薑汁竹瀝亦有汙血而噦者丹溪治超越陳氏用桃仁承氣湯是也虛不禁下者於蓄血門求輕劑用之仲景云噦逆者陳皮竹茹湯主之又云乾嘔噦若手足厥者陳皮湯主之本事方用枳殼五錢木香二錢半細末每服一錢白湯調下孫兆方用陳皮二兩去白水煎通口服或加枳殼一兩此皆破氣之劑氣逆者宜之唯陳皮竹茹湯氣逆而虛者宜之水寒相搏者小青龍湯寒甚加附子尖炒潔古柿錢散寶鑑丁香柿蒂散羌活附子湯皆熱劑唯寒呃宜之戴復庵以熱呃唯傷寒有之其他病發呃者皆屬寒用半夏一兩生薑一兩半水一碗煎半碗熱服或用丁香十粒柿蒂十個切碎白水一盞半煎或理中湯加枳殼茯苓各半錢半夏一錢不效更加丁香十粒亦有無病偶然致呃此緣氣逆而生重者或經一二日宜小半夏茯苓湯加枳實半夏湯或煎湯泡蘿蔔子研取汁調木香調氣散乘熱服逆氣用之最佳若胃中寒甚呃逆不已或復加以嘔吐輕劑不能取效宜丁香煮散及以附子粳米湯增炒川椒丁香每服各二三十粒治呃逆於臍下關元灸七壯立愈累驗又方男左女右乳下黑盡處一韭葉許灸三壯甚者二七壯診心脈小甚為噦肺脈散者不治噦聲頻密相連者為實可治若半時噦一聲者為虛難治多死在旦夕產後呃逆此惡候也急灸期門三壯神效屈乳頭向下盡處是穴乳小者乳下一指為率男左女右與乳正直下一指陷中動脈處是穴炷如小豆大穴真病立止丁香散羌活散桂心五錢薑汁三合水煎服參附湯上皆熱劑乾柿一個切碎以水一盞煎六分熱呷內有熱不禁熱劑者可用噫氣內經所謂噫即今所謂噯氣也宣明五氣論以心為噫痹論以心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫至真大要論以太陽司天少陰之復皆為噦噫四時刺逆從論刺中心一日死其動為噫陰陽別論二陽一陰發病主驚駭背痛善噫善欠名曰風厥脈解太陰所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也此乃噫從心出者也厥陰在泉腹脹善噫得後與氣則快然如衰玉版論太陰終者善噫靈樞云足太陰是動病腹脹善噫又云寒氣客於胃厥逆從下上散復出於胃故為噫仲景謂上焦受中焦氣未和不能消是故能噫衛出上焦又云上焦不歸者噫而酢酸不歸不至也上焦之氣不至其部則物不能傳化故噫而吞酸由是觀之噫者是火土之氣鬱而不得發故噫而出王註解心為噫之義象火炎上煙隨焰出如痰閉膈間中氣不得伸而噯者亦土氣內郁也仲景云痞而噫旋覆代赭湯主之本事方心下蓄積痞悶或作痛多噫敗卵氣枳殼散主之丹溪云胃中有實火膈上有稠痰故成噯氣用二陳湯加香附梔子仁黃連蘇子前胡青黛栝蔞或丸或湯服之診寸口脈弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於膈上寸脈緊寒之實也寒在上焦胸中必滿而噫趺陽脈微而澀微無胃氣澀即傷脾寒在膈而反下之寒積不消胃微脾傷穀氣不行食已自噫寒在胸膈上虛下實穀氣不通為閉塞之病趺陽脈微澀及寸脈緊而噫者皆屬寒太陰終者腹脹閉噫氣嘔逆諸逆衝上逆氣五臟皆有一曰心小腸經云諸逆衝上皆屬於火又云少腹控睪引腰脊上衝心邪在小腸取之肓原以散之刺太陽以予之取厥陰以下之取巨虛下廉以去之按其所過之經以調之是也二曰胃經云胃為氣逆是也胃逆有嘔有吐有噦故刺嘔吐取中脘三里也刺噦取乳下黑根盡處及臍下三寸皆大驗也治各見本門三曰肺大腸經云肺苦氣上逆急食苦以泄之又云腹中常鳴氣上衝胸喘不能久立邪在大腸刺肓之原巨虛下廉是也其肺逆曰咳喘取天突人迎泄之也治亦各有門四曰肝經云肝氣逆則耳聾不聰頄腫取血是也五曰腎即奔豚氣逆腳氣衝心之類是也治亦各有門六曰腎經云督脈別絡生病從少腹上衝心而痛不得前後為沖疝是也運氣厥逆有三一曰風火經云少陽司天火氣下臨風行於地厥逆膈不通是也二曰寒經云水鬱之發善厥逆是也三曰濕經云太陰司天濕氣下臨厥逆是也經云逆氣象陽凡氣逆必見象陽證面赤脈洪當以法降其逆乃愈若以氣象陽盛而用寒藥攻之則不救矣氣上衝心咽不得息治法見傷寒厥陰病條東垣云如秋冬之月胃脈四道為衝脈所逆並脅下少陽脈二道而反上行病名曰厥逆經曰逆氣上行滿脈去形七神昏絕離去其形而死矣其症氣上衝咽不得息喘息有聲不得臥於調中益氣加吳茱萸半錢或一錢觀厥氣多少用之如夏月有此症為大熱也蓋此症隨四時為寒熱溫涼宜以酒黃連酒黃柏酒知母各等分為細末熟湯為丸如桐子大每服二百丸空心白湯下仍多飲湯服畢少時便以美飲食壓之使不得胃中停留直至下焦以瀉衝脈之邪也戴復庵云虛炎之證陰陽不升降下虛上盛氣促喘息宜蘇子降氣湯去前胡下黑錫丹或養正丹氣急甚而不能眠臥者沉附湯或正元散或四柱散去木香用沉香並以鹽煎下黑錫丹或靈砂丹三炒丹不效則以前藥下硃砂丹此多用香燥剛熱之劑若陰虛內熱者誤用立殆醫者審之諸血門諸見血證附九竅出血血從毛孔出東垣云衄血出於肺以犀角升麻梔子黃芩芍藥生地紫參丹參阿膠之類主之咯唾血者出於腎以天門冬麥門冬貝母知母桔梗百部黃柏遠志熟地黃之類主之如有寒者乾薑肉桂之類主之痰涎血者出於脾葛根黃耆黃連芍藥甘草當歸沉香之類主之嘔血出於胃實者犀角地黃湯主之虛者小建中湯加黃連主之海藏云胸中聚集之殘火腹裡積久之太陰上下隔絕脈絡部分陰陽不通用苦熱以定於中使辛熱以行於外升以甘溫降以辛潤化嚴肅為春溫變凜冽為和氣汗而愈也然餘毒土苴猶有存者周身陽和尚未泰然胸中微躁而思涼飲因食冷物服涼劑陽氣復消余陰再作脈退而小弦細而遲激而為衄血唾血者有之心肺受邪也下而為便血溺血者有之腎肝受邪也三焦出血色紫不鮮此重沓寒濕化毒凝泣水穀道路浸漬而成若見血證不詳本源便用涼折變乃生矣陽證溢出鮮血陰證下如豚肝上而血者黃耆桂枝湯白芍當歸湯中而血者當歸建中湯增損胃風湯下而血者芎歸朮附湯桂附六合湯若三血證在行陽二十五度見黃耆四君子湯主之若三血證在行陰二十五度見當歸四逆加吳茱萸主之吐血衄血便血其人陰虛陽走其脈沉而散其外證虛寒無熱候宜烏金丸散止之法宜上用散下用丸次以木香理中湯和大七氣湯入川芎煎調蘇合香丸溫之仁齋直指云血遇熱則宣流故止血多用涼藥然亦有氣虛挾寒陰陽不相為守榮氣虛散血亦錯行所謂陽虛陰必走是耳外證必有虛冷之狀法當溫中使血自歸於經絡可用理中湯加南木香或局方七氣湯加川芎或甘草乾薑湯其效甚著又有飲食傷胃或胃虛不能傳化其氣逆上亦令吐衄木香理中湯甘草乾薑湯出血諸證每以胃藥收功木香理中湯或參苓白朮散二分枳殼散一分夾和米湯乘熱調下或真方四君子湯夾和小烏沉湯米湯調下以上並用薑棗略煎亦得上藥不惟養胃蓋以調氣輩與之並行若夫桔梗枳殼湯夾和二陳湯薑棗同煎入蘇合香丸少許佐之又調氣之上藥也經云歲火太過炎暑流行肺金受邪民病血溢血泄又云少陽之復火氣內發血溢血泄是火氣能使人失血者也而又云太陽司天寒淫所勝血變於中民病嘔血血泄鼽衄善悲又云太陽在泉寒淫所勝民病血見是寒氣能使人失血也又云太陰在泉濕淫所勝民病血見是濕氣能使人失血也又云少陰司天之政水火寒熱持於氣交熱病生於上冷病生於下寒熱凌犯而爭於中民病血溢血泄是寒熱凌犯能使人失血也太陰司天之政初之氣風濕相薄民病血溢是風濕相薄血溢也又云歲金太過燥氣流行病反側咳逆甚而血溢是燥氣亦能使血溢也然則六氣皆能使人失血何獨火乎攖寧生卮言云古人言諸見血非寒證皆以血為熱迫遂至妄行然皆復有所挾也或挾風或挾濕或挾氣又有因藥石而發者其本皆熱上中下治各有所宜在上則梔子黃芩黃連芍藥犀角蒲黃而濟以生地黃牡丹皮之類胃血古人有胃風湯正是以陽明火邪為風所扇而血為之動中間有桂取其能伐木也若蒼朮地榆白芍藥之類而濟以火劑大腸血以手陽明火邪為風為濕也治以火劑風劑風能勝濕也如黃連黃芩芍藥柏皮荊芥防風羌活之類兼用雞冠花則又述類之義也驚而動血者屬心怒而動血者屬肝憂而動血者屬肺思而動血者屬脾勞而動血者屬腎血溢血泄諸蓄妄證其始也予率以桃仁大黃行血破瘀之劑折其銳氣而後區別治之雖往往獲中然猶不得其所以然也後來四明遇故人蘇伊舉間論諸家之術伊舉曰吾鄉有善醫者每治失血蓄妄必先以快藥下之或問失血復下虛何以當則曰血既妄行迷失故道不去蓄利瘀則以妄為常曷以御之且去者自去生者自生何虛之有予聞之愕然曰名言也昔者之疑今釋然矣婦人之於血也經水蓄而為胞胎則蓄者自蓄生者自生及其產育為惡露則去者自去生者自生其醞而為乳則無復下滿而為月矣失血為血家妄逆產婦為婦人常事其去其生則一也失血家須用下劑破血蓋施之於蓄妄之初亡血虛家不可下蓋戒之於亡失之後九竅出血南天竺飲主之或用血餘灰自發為佳無即父子一氣者次則男胎髮又次則亂髮皂角水淨洗曬乾燒灰為末每二錢以茅草根車前草煎湯調下荊葉搗取汁酒和服刺薊一握絞汁酒半盞和服如無生者搗乾者為末冷水調三錢血從毛孔出名曰肌衄用人中白不拘多少刮在新瓦上用火逼干研令極細每服二錢入麝香少許溫酒調下外以男胎髮燒灰𨢴之未效以鬱金末水調鵝翎掃之即止九靈山房集云湖心寺僧履師偶搔膕中疥忽自出血汨汨如湧泉竟日不止瘍醫治療弗效邀呂元膺往視時已困極無氣可語及持其脈惟尺脈如蛛絲他部皆無即告之曰夫脈血氣之先也今血妄溢故榮氣暴衰然兩尺尚可按惟當益榮以瀉其陰火乃作四神湯加荊芥穗防風不間晨夜並進明日脈漸出更服十全大補湯一劑遂痊凡九竅出血皆可用牆頭苔蘚可以塞車前草汁可以滴火燒蓮房用水調鍋底黑煤可以吃石榴花片可以塞生萊菔汁可以滴火燒龍骨可以吹水煎茅花可以吃玉機微義曰經云榮者水穀之精也和調五臟灑陳於六腑乃能入於脈也源源而來生化於脾總統於心臟受於肝宣布於肺施泄於腎灌溉一身目得之而能視耳得之而能聽手得之而能攝掌得之而能握足得之而能步髒得之而能液腑得之而能氣是以出入升降濡潤宣通者由此使然也注之於脈少則澀充則實常以飲食日滋故能陽生陰長取汁變化而赤為血也生化旺則諸經恃此而長養衰耗竭則百脈由此而空虛可不謹養哉故曰血者神氣也得之則存失之則亡是知血盛則形盛血弱則形衰神靜則陰生形役則陽亢陽盛則陰必衰又何言陽旺而生陰血也蓋謂血氣之常陰從乎陽隨氣運行於內苟無陰以羈束則氣何以樹立故其致病也易調治也難以其比陽常虧而又損之則陽易亢陰易乏之論可以見矣諸經有云陽道實陰道虛陰道常乏陽常有餘陰常不足婦人之生也年至十四經行四十九而經斷可見陰血之難成易虧如此陰氣一傷所變立至妄行於上則吐衄衰涸於外則虛勞妄反於下則便紅積熱膀胱則癃閉溺血滲透腸間則為腸風陰虛陽搏則為崩中濕蒸熱瘀則為滯下熱極腐化則為膿血火極似水血色紫黑熱勝於陰發為瘡瘍濕滯於血則為痛癢癮疹皮膚則為冷痹蓄之在上則人喜忘蓄之在下則人喜狂墮恐跌僕則瘀惡內凝若分部位身半以上同天之陽身半以下同地之陰此特舉其所顯之證者治血必血屬之藥欲求血藥其四物之謂乎河間謂隨證輔佐謂之六合湯者詳言之矣予故陳其氣味專司之要不可不察夫川芎血中氣藥也通肝經性味辛散能行血滯於氣也地黃血中血藥也通腎經性味甘寒能生真陰之虛也當歸分三治血中主藥也通肝經性味辛溫全用能活血各歸其經也芍藥陰分藥也通脾經性味酸寒能和血治虛腹痛也若求陰藥之屬必於此而取則焉脾胃論有云若善治者隨證損益摘其一二味之所宜為主治可也此特論血病而求血藥之屬者也若氣虛血弱又當如長沙血虛以人參補之陽旺則生陰血也若四物者獨能主血分受傷為氣不虛也輔佐之屬若桃仁紅花蘇木血竭牡丹皮者血滯所宜蒲黃阿膠地榆百草霜棕櫚灰者血崩所宜乳香沒藥五靈脂凌霄花者血痛所宜蓯蓉瑣陽牛膝枸杞子益母草夏枯草敗龜板者血虛所宜乳酪血液之物血燥所宜乾薑肉桂血寒所宜生地黃苦參血熱所宜特取其正治大略耳人能觸類而長可以應無窮之變矣診脫血而脈實者難治病若吐血復鼽衄脈當沉細反浮大而牢者死吐血衄血脈滑弱小者生實大者死汗出若衄其脈滑小者生大躁者死嘔血胸滿引痛脈小而疾者逆也脈至而搏血衄身熱者死吐血咳逆上氣其脈數而有熱不得臥者死諸見血身熱脈大者難治難治者邪勝也身涼脈靜者易治易治者正氣復也衄血者若但頭汗出身無汗及汗出不至足者死血溢上行或唾或嘔或吐皆凶也若變而下行為惡利者順也血上行為逆其治難下行為順其治易故仲景云蓄血證下血者當自愈若無病之人忽然下利者其病進也今病血證上行而復下行惡利者其邪欲去是知吉也鼻衄出血三因方云衄者因傷風寒暑濕流傳經絡湧泄於清氣道中而致者皆外所因積怒傷肝積憂傷肺煩思傷脾失志傷腎暴喜傷心皆能動血隨氣上溢而致者屬內所因飲酒過多啖炙爆辛熱或墜墮車馬傷損致者皆非內非外因也鼻通於腦血上溢於腦所以從鼻而出宜茅花湯調止衄散時進折二泔仍令其以麻油滴入鼻或以萊菔汁滴入亦可茅花白芍藥對半尤穩糯米炒微黃為末新水下二錢亂髮燒灰存性細研水服方寸匕並吹鼻中萱草根搗汁每一盞入生薑汁半盞相和時時細呷竹蛀屑水飲調百藥煎半燒半生水酒調服白芨末新汲水調下神效治鼻衄久不止或素有熱而暴作者諸藥不效神法以大白紙一張作十數揲於冷水內浸濕置頂中以熱熨斗熨之至一重或二重紙干立止又方用線扎中指中節如左鼻孔出血扎左指右鼻孔出血扎右指兩鼻孔齊出則左右俱扎之血衄不愈以三稜針於氣街穴出血更用五味子十粒麥門冬當歸黃耆生地人參各一錢水煎空心熱服六脈細弦而澀按之空虛其色必白而夭不澤者脫血也此大寒證以辛溫補血養血以甘溫甘熱滑潤之劑佐之即愈理中湯小建中湯六脈俱大按之空虛心動面赤善驚上熱乃手少陰心脈也此氣盛多而亡血以甘寒鎮墜之劑大瀉其氣以墜氣浮以甘辛溫微苦峻補其血三黃補血湯實熱衄血先服硃砂蛤粉次服木香黃連大便結者下之用大黃芒硝甘草生地溏耎者梔子黃芩黃連犀角地黃湯可選用之有頭風自衄頭風才發則衄不止宜芎附飲間進一字散下虛上盛而衄不宜過用涼劑宜四物湯加參耆麥門五味磨沉香下養正丹八味地黃丸傷濕而衄腎著湯加川芎名除濕湯伏暑而衄茅花湯調五苓散上膈極熱而衄金沸草散去麻黃半夏加茅花如荊芥數或用黃芩芍藥湯加茅花一撮虛者茯苓補心湯生料雞蘇散飲酒過多而衄茅花湯加乾葛雞矩子或理中湯去乾薑用乾葛加茅花攧而衄不止蘇合香丸一丸或以小烏沉湯一錢白湯調下或煎濃紫蘇湯獨調小烏沉湯或添入黑神散一錢鹽湯調下亦得仍驀然以水噀其面使驚則血止非特攧而衄凡五竅出血皆治曾病衄後血因舊路一月或三四衄又有洗面而衄日以為常此即水不通借路之意並宜止衄散茅花煎湯調下或四物湯加石菖蒲阿膠蒲黃各半錢煎熟調火煅石膏末一匙頭許兼進養正丹前諸證服藥不效大衄不止者養正丹多服仍佐以蘇子降氣湯使血隨氣下衄後頭暈四物湯十全大補湯有先因衄血衄止而變生諸證或寒熱間作或喘急無寐病狀不一漸成勞憊當於虛損諸證詳之舌衄舌上忽出血如線用槐花炒研末摻之麥門冬煎湯調妙香散香薷汁服一升日三發灰二錢米醋調服且敷血出處文蛤散治熱壅舌上出血如泉五倍子白膠香牡蠣粉等分為末每用少許摻患處或燒熱鐵烙孔上齒衄血從齒縫中或齒齦中出謂之齒衄亦曰牙宣有風壅有腎虛風壅者消風散內服外擦外用加鹽腎虛者以腎主骨牙者骨之餘火乘水虛而上炎服涼藥而愈甚宜鹽湯下安腎丸間黑錫丹仍用青鹽炒香附黑色為末擦之亦有胃熱牙疼而齦間出血以至崩落口臭不可近人者內服清胃散甘露飲外用大黃米泔浸令軟生地黃大者薄切二味旋切各用一二片合定貼所患牙上一夜即愈忌說話嘗治三人不咳唾而血見口中從齒縫舌下來者每用益腎水瀉相火治之不旬日愈醫旨緒餘云有侄女十歲因毀齒動搖以苧麻摘之血出不止一日夜積十一盆用末藥止其處少頃復從口出診其脈皆洪大有力以三製大黃末二錢枳殼湯少加童便調下去黑糞數塊其血頓止一男子每齒根出血盈盆一月一發百藥不效知其人好飲投前劑一服而安一老嫗患此一發五七日日約升余投前劑亦安所下皆有黑糞是知此疾多陽明熱盛所致緣衝任二脈皆附陽明陽明一經氣血俱多故一發如潮湧急則治其標故投以釜底抽薪之法應手而愈要知腎虛血出者其血必點滴而出齒亦攸攸而疼必不如此之暴且甚也耳衄耳中出血以龍骨吹入即止左關脈弦洪柴胡清肝散尺脈或躁或弱六味地黃丸吐血夫口鼻出血皆繫上盛下虛有升無降血隨氣上越出上竅法當順其氣氣降則血歸經矣宜蘇子降氣湯加人參阿膠各一錢下養正丹亦有氣虛不能攝血者其脈必微弱虛軟精神疲憊宜獨參湯或人參飲子團參丸上膈壅熱吐血脈洪大弦長按之有力精神不倦或覺胸中滿痛或血是紫黑塊者用生地黃赤芍當歸牡丹皮荊芥阿膠滑石大黃玄明粉桃仁泥之屬從大便導之此釜底抽薪法也血從下出者順從上出者逆一應血上溢之證苟非脾虛泄瀉羸瘦不禁者皆當以大黃醋製和生地黃汁及桃仁泥牡丹皮之屬引入血分使血下行以轉逆而為順此妙法也不知此而日從事於芩連梔柏之屬輔四物而行之使氣血俱傷脾胃兩敗今醫治血證百豈有一生者耶血既下行之後用薏苡仁多用百合麥門冬鮮地骨皮嗽渴加枇杷葉五味子桑根白皮有痰加貝母皆氣薄味淡西方兌金之本藥因其衰而減之自不再發於虛勞證為尤宜急欲止之用血餘灰二錢以白湯化阿膠二錢入童便生藕汁刺薊汁生地黃汁各一杯仍用好墨磨濃黑頓溫服胸中煩熱吐血不止口舌乾燥頭疼石膏散冒雨著湯鬱於經絡血溢妄行從鼻則衄衄行清道吐行濁道流入胃脘令人吐血用腎著湯頭疼加川芎最止浴室中發衄吐血在暑天病人口渴面垢頭暈乾嘔煎茅花燈心麥門冬湯仍入藕節汁側扇柏汁茅根汁生薑汁少許生蜜亦少許調五苓散血止用生地黃當歸牡丹皮赤芍藥百草霜末煎服一二帖卻用黃耆六一湯調理怒氣傷肝者唇青面黑當用雞蘇丸煎四物湯吞下並用十四友丸燈心麥門冬湯吞下蓋其中有理肝之藥打撲傷損吐血先以藕節汁側扇柏汁茅根汁韭汁童便磨墨汁化阿膠止之卻以川芎當歸白芍藥百合荊芥穗阿膠牡丹皮紫金藤大黃滑石紅花煎湯調番降香末白芨末與服戴復庵先用蘇合香丸卻以黑神散和小烏沉湯童便調治勞心吐血用蓮心五十粒糯米五十粒研末溫酒調服及天門冬湯勞力太過吐血不止蘇子降氣湯加人參阿膠用豬肝煮熟蘸白芨末食之吐血久不止松花散百花煎並常服大阿膠丸未效以伏龍肝二錢米飲調下速止或飲酒之後悶吐之時血從吐後出或因啖辛熱而得吐血之證名曰肺疽宜大薊散古方用紅棗燒存性百藥煎煅等分為末米飲調服二錢飲酒傷胃吐血理中湯加金鉤子乾葛茅花酒色過度飢飽吐血效方枇杷葉款冬花北紫菀杏仁鹿茸桑白皮木通大黃為末煉蜜丸噙化內損吐血下血或飲酒太過勞傷於內其血妄行出如湧泉口鼻皆流須臾不救即死用側柏葉蒸焙一兩半荊芥穗燒灰人參各一兩為細末入飛羅面一錢新汲水調如稀糊不拘時啜服傷胃吐血因飲食太飽之後胃中冷不能消化便煩悶強嘔吐使所食之物與氣共上衝蹙因傷裂胃口吐血色鮮正赤腹亦絞痛自汗其脈緊而數者為難治也宜理中湯加川芎乾葛各半錢或只依理中本方加川芎扁豆尤好不必乾葛若渴甚用葛丸則白朮丸曹氏必用方云吐血須煎乾薑甘草作湯與服或四物理中湯亦可如此無不愈者若服生地黃竹茹藕汁去生便遠三因方云理中湯能止傷胃吐血以其方最理中脘分利陰陽安定血脈按患人果身受寒氣口受冷物邪入血分血得冷而凝不歸經絡而妄行者其血必黯黑其色必白而夭其脈必微遲其身必清涼不用薑桂而用涼血之劑殆矣臨病之工宜詳審焉有時或吐血兩口隨即無事數日又發經年累月不愈者宜黑神散和小烏沉湯常服吐血人多發渴名為血渴十全大補湯或黃耆人參五味子地黃麥門冬葛根枇杷葉量胃氣虛實用之吐甚頭暈發為寒熱者降氣湯合四物湯各半帖加阿膠一錢若單發熱者茯苓補心湯吐血之後有潮熱咳嗽脈洪大而數五至以上不可治也金匱方心氣不足吐血衄血瀉心湯主之大黃二兩黃連黃芩各一兩水三升煮取一升頓服之此正謂心手少陰經之陰氣不足本經之陽亢甚無所輔肺肝俱受其火而病作以致陰血妄行而飛越故用大黃泄去亢甚之火黃芩救肺黃連救肝使之和平則陰血自復而歸經矣云岐子加生地名犀角地黃湯又云吐血不止柏葉湯主之柏葉乾薑各二兩艾三把以水五升取馬通汁一升合煮取一升分溫再服凡吐血不已則氣血皆虛虛則生寒是故用柏葉柏葉生而西向乃稟兌金之氣而生可制肝木木主升金主降取其升降相配夫婦之道和則血得以歸臟於肝矣故用是為君乾薑性熱止而不走用補虛寒之血艾葉之溫能入內而不炎於上可使陰陽之氣反歸於里以補其寒用二味為佐馬通者為血生於心心屬午於是用午獸之通主降火消停血引領而行為使仲景治吐血唯此二方可以為準繩觸類而長之咳嗽血或問咳血止從肺出他無可言耶曰肺不獨咳血而亦唾血蓋肺主氣氣逆為咳腎主水水化液為唾腎脈上入肺循喉嚨俠舌本其支者從肺出絡心注胸中故二臟相連病則俱病於是皆有咳唾血也亦有可分別者涎唾中有少血散漫者此腎從相火炎上之血也若血如紅縷在痰中咳而出者此肺絡受熱傷之血也其病難已若咳白血必死白血淺紅色似肉似肺也然肝亦唾血肝臟血肺臟氣肝血不臟亂氣自兩脅逆上唾而出之內經有血枯證先唾血為氣竭傷肝也熱壅於肺能嗽血久嗽損肺亦能嗽血壅於肺者易治不過涼之而已損於肺者難治漸以成勞也熱嗽有血宜金沸草散加阿膠一錢痰盛加栝蔞仁貝母勞嗽有血宜補肺湯加阿膠白芨一錢嗽血而氣急者補肺湯加阿膠杏仁桑白皮各一錢吞養正丹或三炒丹間進百花膏亦可用七傷散大阿膠丸丹溪云咳血乃火升痰盛身熱多是血虛痰帶血絲出童便竹瀝止之經血逆行或血腥吐血唾血韭汁服立效韭汁童便合和隔湯頓熱磨鬱金濃汁蕩勻服之其血自消千金方治一切肺病咳唾唾膿血用好酥三十斤煉取凝當中醍醐服一合日三升即止薏苡仁十兩杵碎水三升煎取一升入酒少許服或以薏苡仁細末煮豬肺白蘸食之上氣喘息咳嗽唾血咯血人參細末雞子清調三錢五更初服便去枕仰臥忌酸鹹酢醬面等物及過醉飽嗽咯血成勞眼睛疼四肢困倦腳膝無力五味子黃耆散脈大發熱喉中痛是氣虛用參耆蜜炙黃柏荊芥地黃當歸韭汁童便少加薑汁磨鬱金飲之嗽血久而成勞或勞病成而嗽血肌肉消瘦四肢倦怠五心煩熱咽乾頰赤心忡潮熱盜汗減食黃耆鱉甲散人參黃耆散陰虛火動而嗽血者滋陰保肺湯二三年間肺氣上喘咳嗽咯唾膿血滿面生瘡遍身黃腫人參蛤蚧散蛤蚧補肺勞虛嗽有功治久嗽不愈肺間積虛熱久則成瘡故嗽出膿血曉夕不止喉中氣塞胸膈噎痛用蛤蚧阿膠生犀角鹿角膠羚羊角各一兩除膠外皆為屑次入膠分四服每服用河水三升於銀石器內慢火煮至半升濾去滓臨臥微溫細細呷之其渣候服盡再捶都作一服以水三升煎至半升如前服傷寒後傷肺咳唾膿血胸脅脹滿上氣羸瘦麥門冬湯脈浮大者作虛治用前虛勞條諸補藥若浮大而上壅甚者雞蘇丸脈沉滑有力者當用攻攻中有補丹溪治台州林德芳年三十餘得咳而咯血發熱肌體漸瘦眾醫以補藥調治數年其證愈甚診其六脈皆澀此因好色而多怒精血耗少又因補塞藥太多榮衛不行瘀血內積肺氣壅遏不能下降治肺壅非吐不可精血耗少非不可唯倒倉法二者俱備但使吐多於瀉耳兼灸肺俞五次而愈脈浮數忌灸若誤灸之必唾血唾血而脈浮數其不可灸又可知也脈經云肺傷者其人勞倦則咳唾血此為一項以人參救肺散治之其脈細緊浮數皆唾血此為躁擾嗔怒得之肺傷氣壅所致此為一項以降氣寧神之藥治之豬心一個竹刀切開勿令相離以沉香末一錢重半夏七個入在縫中紙裹蘸小便內令濕煨熟取出去半夏只吃豬心此方嗽血吐血均冶熱嗽咽疼痰帶血絲或痰中多血其色鮮者並宜金沸草散若服涼藥不愈其色瘀者此非熱證宜杏子湯咳嗽甚而吐血者鮮桑白皮一斤米泔浸三宿淨刮上黃皮銼細入糯米四兩焙乾一處搗為末每服一二錢米飲調下久嗽咯血成肺痿及吐白涎胸膈滿悶不食扁豆散肺痿吐膿血甘桔加阿膠紫菀湯肺痿痰嗽痰中有血線盜汗發熱熱過即冷食減劫勞散前薏苡仁一味方咳而胸滿心胸甲錯振寒脈數咽乾不渴時出濁唾腥臭久之吐膿如粥者肺癰也然待吐膿而後覺為癰不已晚乎千金云咳唾膿血其脈數實者為肺癰若口中辟辟燥咳即胸中隱痛脈反滑數此肺癰也更於本門細查之咯血咯血不嗽而咯出血也咯與唾少異唾出於氣上無所阻咯出於痰氣鬱於喉嚨之下滯不得出咯而乃出求其所屬之臟咯唾同出於腎也治咯血之方宜用童便青黛以瀉手足少陽三焦與膽所合之相火而薑汁為佐用四物地黃牛膝輩以補腎陰安其血也攖寧生卮言云咯血為病最重且難治者以肺手太陰之經氣多血少又肺者金象為清肅之臟金為火所制迫而上行以為咯血逆之甚矣上氣見血下聞病音謂喘而咯血且咳嗽也初得病且宜白扁豆散去半夏加貝母入生地黃藕節尤佳及濃磨京墨調黑神散小烏沉湯各一錢或新掘生地黃淨洗生薑少許搗汁去滓溫進又有以生薑一片四面蘸百草霜含咽如百草霜已淡吐出再蘸如姜已無味則吐出易之勞瘵吐咯血七珍散加阿膠當歸各半錢惡甜人更加百藥煎半錢仍調鍾乳粉尤佳一味鍾乳粉用糯米飲調吐血嗽血亦治因飽屈身傷肺吐咯血者白芨枇杷丸或白芨蓮鬚散治咯血黃藥子漢防己各一兩為末每服一錢匕水一盞小麥二十粒同煎食後溫服白芨一兩藕節半兩為末每一錢湯調服新綿灰半錢酒調下薏苡仁為末熟煮豬胰切片蘸藥食後微空時取食之青黛一錢杏仁四十粒去皮尖以黃明蠟煎黃色取出研細二味同研勻卻以所煎蠟少許溶開和之捏作錢大餅子每服用乾柿一個中破開入藥一餅合定以濕紙裹慢火煨熟取出糯米粥嚼下溲血痛者為血淋不痛者為溺血血淋別見淋門經云悲哀太甚則胞絡絕胞絡絕則陽氣內動發則心下崩數溲血也又云胞移熱於膀胱則癃溺血是溺血未有不本於熱者陳無擇以為心腎氣結所致曾不思聖人之言簡意博舉一而可十者也血雖主於心其四臟孰無血以為養所尿之血豈拘於心腎氣結者哉若此類推之則五臟凡有損傷妄行之血皆得如心下崩者滲於胞中五臟之熱皆得如膀胱之移熱傳於下焦何以言之肺金者腎水之母謂之連臟況恃之通調水道下輸膀胱者也肺有損傷妄行之血若氣逆上者既為嘔血矣氣不逆者如之何不從水道下降入於胞中耶其熱亦直抵腎與膀胱可知也脾土者勝水之賊邪也水精不布則壅成濕熱濕熱必陷下傷於水道腎與膀胱俱受其害害則陰絡傷傷則血散入胞中矣肝屬陽主生化主疏泄主納血腎屬陰血閉臟而不固必滲入胞中正與內經所謂傷肝血枯症時時前後血者類也大抵溲血淋血便血三者雖以前後陰所出之竅血有不同然於受病則一也故治分標本亦一也其散血止血之藥無越於數十品之間惟引導佐使各走其鄉者少異耳先與生料五苓散和四物湯若服藥不效其人素病於色者此屬虛證宜五苓散和膠艾湯吞鹿茸丸或八味地黃丸或鹿角膠丸或辰砂妙香散和五苓散吞二項丸子若小便自清後有數點血者五苓散加赤芍藥一錢亦有如砂石而色紅卻無石淋之痛亦屬虛證宜五苓散和膠艾湯或五苓散和辰砂妙香散吞鹿茸丸八味丸鹿角膠丸干膠炙搗末酒和服鹿角膠尤妙每服一二兩發灰二錢茅根車前草煎湯調下當歸四兩酒三升煮取一升頓服鏡面草自然汁加生蜜一匙服之以八正散加麥門冬蔥煎服小便澀痛藥內調海金砂末夏枯草燒灰存性為末米飲或涼水調下車前草自然汁數合空心服實者可以調胃承氣湯加當歸下之脈經云尺脈滑氣血實婦人經脈不利男子尿血宜服朴硝煎大黃湯下去經血針關元瀉之咳而且溲血脫形其脈小勁是逆也咳溲血形肉脫脈搏是逆也下血腸風臟毒中蠱血之在身有陰有陽陽者順氣而行循流脈中調和五臟灑陳六腑如是者謂之榮血也陰者居於絡脈專守臟腑滋養神氣濡潤筋骨若其臟感內外之邪傷則或循經之陽血至其傷處為邪氣所阻漏泄經外或居絡之陰血因著留之邪僻裂而出則皆滲入腸胃而泄矣世俗每見下血率以腸風名之不知風乃六淫中之一耳或風有從腸胃經脈而入客者或肝經風木之邪內乘於腸胃者則可謂之腸風若其他不因風邪而腸胃受火熱二淫與寒燥濕怫鬱其氣及飲食用力過度傷其陰絡之血者亦謂之腸風可乎許學士謂下清血色鮮者腸風也血濁而色黯者臟毒也肛門射如血線者脈痔也然腸風挾濕者亦下如豆汁及紫黑瘀血不必盡鮮正當以久暫為別耳然要之皆俗名也世醫編書者或以瀉血為腸風或分瀉血與腸風臟毒為二門皆非也先血而後便此近血也由手陽明隨經下行滲入大腸傳於廣腸而下者也赤小豆當歸散主之先便而後血此遠血也由足陽明隨經入胃淫溢而下者也黃土湯主之下血腹中不痛謂之濕毒下血血色不鮮或紫黑或如豆汁黃連湯主之下血腹中痛謂之熱毒下血血色鮮芍藥黃連湯主之東垣治宿有腸血症因五月大熱吃杏腸澼下血遠三四尺散漫如篩腰沉沉然腹中不痛血色紫黑是陽明少陽經血證升麻補胃湯濕毒太陰陽明腹痛大便常溏泄若不泄即秘而難見在後傳作濕熱毒下鮮紅血腹中微痛脅下急縮脈緩而洪弦中指下得之按之空虛和中益胃湯濕熱腸澼下血另作一派其血𣹜出有力而遠射四散如篩下腹中大作痛乃陽明氣衝熱毒所作也升陽除濕和血湯濕熱腸澼下血紅或深紫黑色腹中痛腹皮惡寒右三部脈中指下得之俱弦按之無力關脈甚緊肌表陽明分涼腹皮熱而喜熱物熨之內寒明矣益智和中湯挾寒夫腸澼者為水穀與血另作一派如𣹜桶湧出也夏濕熱太甚正當客氣盛而主氣弱故腸澼之病甚也以涼血地黃湯主之黃柏知母炒各一錢青皮炒槐子炒當歸熟地各五分水一盞煎七分溫服如小便澀臍下悶或大便前後重調木香檳榔細末各半錢稍熱於食前空心服如裡急後重又不去者當下之如腹中動搖有水聲而小便不調者停飲也診是何臟以去水飲藥瀉之假令脈洪大用瀉火利小便之類是也如胃虛不能食而大渴不止不可用淡滲之藥止之乃胃中元氣少故也與七味白朮散補之如發熱惡熱煩躁大渴不止肌熱不欲近衣其脈洪大按之無力或無目痛鼻乾者非白虎湯證也此血虛發躁當以黃耆一兩當歸二錢㕮咀水煎服如大便秘塞或裡急後重數至圊而不能便或少有白膿或少有血慎勿利之利之則必致病重及鬱結不通以升陽除濕防風湯升其陽則陰氣自降矣素問云結陰者便血一升再結二升三結三升駱龍吉云結陰之病陰氣內結不得外行血無所稟滲入腸間故便血也其脈虛澀者是也因血結不行故下古方有結陰丹羅謙甫治因強飲酸酒得腹痛次傳泄瀉十餘日便後見血或紅或紫腸鳴腹痛服涼藥如故仍不欲食食則嘔酸心下痞惡冷物口乾煩躁不得安臥其脈弦細而微遲手足稍冷以平胃地榆湯溫中散寒除濕和胃數服病減大半又灸中脘二七壯引胃氣上升次灸氣海百壯生髮元氣灸則強食生肉又以還少丹服之至春再灸三里二七壯溫脾壯胃生髮元氣次服芳香之劑慎言語節飲食而愈八物湯去生地黃甘草加官桂名胃風湯治風冷乘虛入客腸胃水穀不化泄瀉注下及腸胃濕毒下如豆汁或下瘀血日夜無度蓋亦結陰之類也為陰氣內結故去甘寒而加辛熱結者散之也潔古云如下血防風為上使黃連為中使地榆為下使若血瘀色紫者陳血也加熟地黃若血鮮色紅者新血也加生地黃若寒熱者加柴胡若肌熱者加地骨皮此證乃甲欺戊也風在胃口中焦濕泄不止濕既去盡而反生燥庚欺甲也本無金氣以甲勝戊虧庚為母復讎也故經曰亢則害承乃制是反制勝己之化也若脈洪實痛甚者加酒浸大黃戴復庵以色鮮為熱色瘀為寒熱血連蒲散寒血理物湯血色鮮紅者多因內蘊熱毒毒氣入腸胃或因飲酒過多及啖糟臟炙爆引血入大腸故瀉鮮血宜連蒲散吞黃連阿膠丸及香連丸或一味黃連煎飲大瀉不止者四物湯加黃連槐花仍取血見愁草少許生薑搗取汁和米飲服於血見愁草中加入側柏葉與生薑同搗汁尤好有暑毒入腸胃下血者一味黃連煎湯飲腸風下血以香附末加百草霜米飲調服加入麝香少許其應尤捷冷氣入客腸胃下瘀血理中湯不效宜黑神散米飲調下或用膠艾湯加米湯煎吞震靈丹攧撲內損惡血入腸胃下出濁物如瘀血者宜黑神散加老黃茄為末酒調酒積下血不止糞後見用神面一兩半白酒藥二丸同為末清水調捏作餅子慢火上炙黃為細末每服二錢白湯調下亦治泄瀉海藏治梅師大醉醒發渴飲水及冰茶後病便鮮紅先與吳茱萸丸翌日又與平胃五苓各半散三大服血止復自利又與神應丸四服自利乃止或問何不用黃連之類以解毒曰若用寒藥其疾大變難治寒飲內傷復用寒藥非其治也況血為寒所凝入大腸間而便下血溫之乃行所以得熱則自止唐生病因飲酪水及食生物下利紫黑血十餘行脾胃受寒濕毒與六神平胃散半兩加白朮三錢以利腰臍間血一服愈攖寧生卮言云腸風則足陽明積熱久而為風風有以動之也臟毒則足太陰積熱久而生濕從而下流也風則陽受之濕則陰受之戴氏要訣云臟毒者蘊積毒氣久而始見腸風者邪氣外入隨感隨見三因方五痔臟毒腸風之辯甚詳臟毒腸風之血出於腸臟間五痔之血出於肛門蝕孔處治各不同無擇翁烏連湯治脈痔外無形而所下血一線如箭或點滴不能已此由脈竅中來也詳見痔門腸風臟毒不拘糞前糞後並宜米飲湯調枳殼散下酒煮黃連丸或枳殼散下烏梅丸此乃因登廁糞中有血卻與瀉血不同或用小烏沉湯和黑神散米飲調下血色清鮮者以瓦松燒灰研細米飲調服宜減桂五苓散加茅花半錢吞荊梅花丸仍以側柏葉同姜搗爛冷水解下侵些米飲佳如血色淡濁者胃風湯吞蒜連丸或烏荊丸或棕灰散仍以米飲調香附末或三灰散腸風腹中有痛下清血先當解散腸胃風邪甚者肛門腫疼敗毒散加槐角荊芥或槐花湯枳殼散臟毒腹內略疼濁血兼花紅膿並下或肛門腫脹或大腸頭突出大便難通先以拔毒疏利之劑追出惡血膿水然後以內托並涼血祛風量用人虛兼以參耆苓術助養胃氣諸般腸風臟毒並宜生銀杏四十九個去殼膜爛研入百藥煎末丸如彈子大每兩三丸空心細嚼米飲下下血久面色痿黃漸成虛憊下元衰弱宜黃耆四君子湯下斷紅丸或十全大補湯或黃耆飲中蠱臟腑敗壞下血如雞肝如爛肉其證唾水沉心腹絞痛者是也治之方馬藺根末水服方寸匕隨吐則出白蘘荷葉密安病人席下勿令病人知覺自呼蠱主姓名蚯蚓十四枚以苦酒三升漬之服其汁蝟毛燒末水服方寸匕吐毒苦瓠一枚水二升煮取一升服吐或用苦酒一升煮瓠令消服之診腎脈小搏沉為腸澼下血血溫身熱者死淫而奪精身熱色夭然及酒後下血血篤重是逆也心肝澼亦下血二臟同病者可治其脈小沉澀為腸澼其身熱者死熱見七日死身熱則死身寒則生脈懸絕則死滑大則生脈沉小留連者生數疾且大有熱者死腹脹便血脈大時絕是逆也如此者不及一時而死矣胃移熱於脾傳為虛腸澼死不治脾脈外鼓沉為腸澼久自已肝脈小緩為腸澼易治蓄血夫人飲食起居一失其宜皆能使血瘀滯不行故百病由汙血者多而醫書分門類症有七氣而無蓄血予故增著之衄血蓄血上焦心下手不可近蓄血中焦臍腹小腫大痛蓄血下焦三焦蓄血脈俱在左手中蓄血上焦活人犀角地黃湯蓄血中焦仲景桃仁承氣湯蓄血下焦仲景抵當湯韓氏地黃湯生漆湯海藏云蓄血可用仲景抵當湯丸恐庸醫不知藥性用之太過有不止損血之候老弱虛人之禁也故立生地黃湯虻蟲水蛭大黃桃仁內加生地黃乾漆生藕藍葉之輩也又云生漆湯一方亦恐抵當湯丸下之太過也是以知乾漆為破血之劑比之抵當湯則輕用之通則重用之破積治食則重也食藥內乾漆硇砂非氣實不可用也如牙齒等蝕數年不愈當作陽明蓄血治之以桃仁承氣湯細末煉蜜丸桐子大服之好飲者多有此疾屢服有效若登高墜下重物撞打箭鏃刃傷心腹胸中停積鬱血不散以上中下三焦部分分之以易老犀角地黃湯桃仁承氣湯抵當湯丸之類下之亦有以小便同酒煎治之者更有內加生地黃當歸煎服者亦有加大黃者又法虛人不禁下之者以四物湯加穿山甲煎服妙亦有用花蕊石散以童子小便煎服或酒調下此藥與寒藥正分陰陽不可不辨也第四冊諸痛門頭痛偏頭風雷頭風真頭痛大頭痛眉稜骨痛頭風屑頭重頭搖醫書多分頭痛頭風為二門然一病也但有新久去留之分耳淺而近者名頭痛其痛卒然而至易於解散速安也深而遠者為頭風其痛作止不常愈後遇觸復發也皆當驗其邪所從來而治之世俗治頭痛不從風則從寒安知其有不一之邪乎試考內經論頭痛所因以明之如風從外入振寒汗出頭痛新沐中風為首風當先風一日頭痛不可以出內大寒內至骨髓髓以腦為主腦逆故頭痛齒亦痛少陽司天之政初之氣風勝乃搖候乃大溫其病氣怫於上頭痛二之氣火反郁白埃四起其病熱鬱於上頭痛少陽司天火淫所勝民病頭痛發熱惡寒如瘧歲金不及炎火乃行復則陰厥且格陽反上行頭腦戶痛延及腦頂發熱太陽之勝熱反上行頭項頂巔腦戶中痛目如脫太陽之復心痛痞滿頭痛太陰司天濕淫所勝腰脊頭項痛時眩太陰在泉濕淫所勝病沖頭痛目似脫項似拔太陰之復頭頂痛重而掉瘛尤甚陽明之復咳噦煩心病在膈中頭痛傷寒一日巨陽受之頭項痛腰脊強靈樞謂風痹股脛爍足如履冰時如入湯煩心頭痛時眩悲恐短氣不出三年死凡此皆六氣相侵與清陽之真氣相薄而痛者也至於頭痛甚則腦盡痛手足寒至節死頭痛巔病下虛上實注以腎虛不能引膀胱之氣故爾心煩頭痛耳鳴九竅不利腸胃之所生心熱病者卒心痛煩悶頭痛面赤刺手少陰太陽肺熱病者頭痛不堪汗出而寒刺手太陰陽明腎熱病者項痛員員澹澹然刺足少陰太陽靈樞謂厥頭痛面若腫起而煩心取足陽明太陰厥頭痛頭脈痛心悲善泣取血與厥陰厥頭痛貞貞頭重而痛取手足少陰厥頭痛意善忘按之不得取頭面左右動脈後取足太陰厥頭痛項先痛腰脊為應先取天柱後取足太陽厥頭痛頭痛甚耳前後脈湧有熱瀉出其血後取足少陽頭痛不可取於腧者有所擊墮惡血在於內若肉傷痛未已可側取不可遠取也頭痛不可刺者大痹為惡日作者可令少愈不可已頭半寒痛先取手少陽陽明後取足少陽陽明膀胱足太陽所生病頭囟頂腦戶中痛膽足少陽所生病頭痛凡此皆臟腑經脈之氣逆上亂於頭之清道致其不得運行壅遏經隧而痛者也蓋頭象天三陽六腑清陽之氣皆會於此三陰五臟精華之血亦皆注於此於是天氣所發六淫之邪人氣所變五賊之逆皆能相害或蔽覆其清明或瘀塞其經絡因與其氣相薄鬱而成熱則脈滿滿則痛若邪氣稽留則脈亦滿而氣血亂故痛甚是痛皆為實也若寒濕所侵雖真氣虛不與相薄成熱然其邪客於脈外則血泣脈寒寒則脈縮卷緊急外引小絡而痛得溫則痛止是痛為虛也如因風木痛者則抽掣惡風或有汗而痛因暑熱痛者或有汗或無汗則皆惡熱而痛因濕而痛者則頭重而痛遇天陰尤甚因痰飲而痛者亦頭昏重而痛憒憒欲吐因寒而痛者絀急惡寒而痛各與本臟所屬風寒濕熱之氣兼為之狀而痛更有氣虛而痛者遇勞則痛甚其脈大有血虛而痛者善驚惕其脈芤用是病形分之更兼所見證察之無不得之矣東垣曰金匱真言論云東風生於春病在肝俞在頸項故春氣者病在頭又諸陽會於頭面如足太陽膀胱之脈起於目內眥上額交巔直入絡腦還出別下項病則沖頭痛又足少陽膽之脈起於目銳眥上抵頭角病則頭角額痛夫風從上受之風寒傷上邪從外入客經絡令人振寒頭痛身重惡寒治在風池風府調其陰陽不足則補有餘則瀉汗之則愈此傷寒頭痛也頭痛耳鳴九竅不利者腸胃之所生乃氣虛頭痛也如氣上不下頭痛巔疾者下虛上實也過在足少陰巨陽甚則入腎寒濕頭痛也有厥逆頭痛者所犯大寒內至骨髓髓以腦為主腦逆故令頭痛齒亦痛有心煩頭痛者病在膈中過在手巨陽少陰乃濕熱頭痛也凡頭痛皆以風藥治之者總其大體而言之也高巔之上惟風可到故味之薄者陰中之陽自地昇天者也然亦有三陰三陽之異太陽經頭痛惡風寒脈浮緊川芎獨活之類為主少陽經頭痛脈弦細往來寒熱用柴胡黃芩主之陽明經頭痛自汗發熱不惡寒脈浮緩長實者升麻葛根石膏白芷主之太陰經頭痛必有痰體重或腹痛為痰癖脈沉緩者蒼朮半夏南星主之少陰經頭痛三陰三陽經不流行而足寒氣逆為寒厥其脈沉細麻黃附子細辛湯主之厥陰經頭疼項痛或吐痰沫冷厥其脈浮緩吳茱萸湯主之三陽頭痛藥羌活防風荊芥升麻葛根白芷柴胡川芎芍藥細辛蔥白連須陰證頭痛只用溫中藥如理中薑附之類風濕熱頭痛上壅損目及腦痛偏正頭痛年深不愈並以清空膏主之如苦頭痛每料中加細辛二錢如太陰脈緩有痰名曰痰厥頭痛去羌活防風川芎甘草加半夏一兩半如偏頭痛服之不愈減羌活防風川芎一半加柴胡一倍如發熱惡熱而渴此陽明頭痛只與白虎湯加白芷丹溪云東垣清空膏諸般頭痛皆治惟血虛頭痛從魚尾相連痛者不治又云治少陽頭痛如痛在太陽厥陰者勿用蓋謂頭巔痛也頭旋眼黑頭痛宜安神散川芎散熱厥頭痛雖嚴寒猶喜風寒微來暖處或見煙火其痛復作宜清上瀉火湯後用補氣湯風熱頭疼石膏散荊芥散冬月大寒犯腦令人腦痛齒亦痛名曰厥逆出奇病論中宜羌活附子湯頭痛胸中痛食減少咽嗌不利寒冷脈左寸弦急宜麻黃吳茱萸湯濕熱在頭而頭痛者必以苦吐之輕者用透頂散搐鼻取涎新沐中風為首風頭面多汗惡風當先風一日則病甚至其風日則少愈大川芎丸主之風氣循風府而上則為腦風項背怯寒腦戶極冷神聖散主之凡治頭痛皆用芎芷羌防等辛溫氣藥升散者由風木虛不能升散而土寡於畏得以壅塞而痛故用此助肝木散其壅塞也若風盛疏散太過而痛服辛散藥反甚者則宜用酸澀收而降之乃愈乳香盞落散之類是也以上外因頭痛耳鳴九竅不利腸胃之所生東垣以為此氣虛頭痛也用人參黃耆主之羅謙甫治柏參謀六十一歲先患頭昏悶微痛醫作傷寒解之汗出後痛轉加復汗解病轉加而頭愈痛每召醫用藥雷同到今痛甚不得安臥惡風寒不喜飲食脈弦細而微氣短促懶言語經曰春氣病在頭今年高氣弱清氣不能上升頭面故昏悶此病本無表邪因發汗數四清陽之氣愈虧損不能上榮亦不能外固所以病增甚宜升陽補氣頭痛自愈制順氣和中湯經曰陽氣者衛外而為固也誤汗之衛外之氣損故黃耆甘溫補衛實表為君人參甘溫補氣當歸辛溫補血芍藥味酸收衛氣為臣白朮陳皮炙甘草苦甘溫養衛氣生髮陽氣上實皮毛腠理為佐柴胡升麻苦辛引少陽陽明之氣上升通百脈灌溉周身者也川芎蔓荊子細辛辛溫體輕浮清利空竅為使一服減半再服全愈血虛頭痛自魚尾眉尖後近髮際曰魚尾上攻頭痛當歸川芎主之當歸一兩酒一升煮取六合飲至醉效當歸川芎連翹熟苄各二錢水煎去渣入龍腦薄荷末二錢乘沸泡之鼻吸其氣候溫即服服即安臥效氣血俱虛頭痛者於調中益氣湯加川芎蔓荊子細辛其效如神痰厥頭痛眼黑頭旋噁心煩亂半夏白朮天麻湯主之痰厥頭痛非半夏不能療眼黑頭旋風虛內作非天麻不能解天麻苗謂之定風草獨不為風所搖以治內風之神藥內風者虛風是也黃耆甘溫瀉火補元氣實表虛止自汗人參甘溫調中補氣瀉火二術甘溫除濕補中益氣澤瀉茯苓利小便導濕橘皮苦溫益氣調中而升陽炒麵消食蕩胃中滯氣麥芽寬中助胃氣乾薑辛熱以滌中寒黃柏苦寒用酒洗以療冬日少火在泉而發躁也東垣壯歲病頭痛每發時兩頰盡黃眩暈目不欲開懶於言語身體沉重兀兀欲吐數日方過潔古老人曰此厥陰太陰合而為病名曰風痰宜以局方玉壺丸治之可加雄黃白朮以治風濕更有水煮金花丸灸俠谿二穴各二七壯不旬日愈鼻鼽腹腫頭痛病在胃經云陽明所謂客孫脈則頭痛鼻鼽腹腫者陽明並於上上者則其孫絡太陰也故頭痛鼻鼽腹腫也動作頭重痛熱氣潮者屬胃丹溪云頭痛如破酒炒大黃半兩茶煎服婁全善云病在胃而頭痛者必下之方愈也如孫兆以利膈藥下張學士傷食頭痛郭茂恂以黑龍丹下其嫂產後汙血頭痛皆下咽即安是也心煩頭痛病在膈中過在手巨陽少陰乃濕熱頭痛也東垣清空膏之類治之頭痛巔病下虛上實過在足少陰巨陽甚則入腎許學士謂之腎厥頭痛也其脈舉之則弦按之則堅用玉真丸治之戴復庵用正元散或大三五七散入鹽煎服或於正元散內入炒椒十五粒下來復丹間進黑錫丹有服諸藥不效其痛愈甚宜茸朱丹素問曰頭疼巔疾下虛上實過在足少陰巨陽甚則入腎徇蒙招尤目眩耳聾下實上虛過在足少陽厥陰甚則入肝下虛者腎虛也故腎虛則頭痛上虛者肝虛也故肝虛則頭暈徇蒙者如以物蒙其首招搖不定目眩耳聾皆暈之狀也故肝厥頭暈腎厥巔痛不同如此肚厥宜釣藤散傷食頭痛胸膈痞塞咽酸噫敗卵臭畏食雖發熱而身不痛宜治中湯加砂仁一錢或紅丸子傷酒頭痛噁心嘔吐出宿酒昏冒眩暈宜葛花解酲湯怒氣傷肝及肝氣不順上衝於腦令人頭痛宜沉香降氣散並蘇子降氣湯下養正丹上熱頭目赤腫而痛胸膈煩悶不得安臥身半以下皆寒足䯒尤甚大便微秘宜既濟解毒湯外有臭毒頭痛一味吃炒香附愈頭痛連睛痛石膏鼠黏子炒為末茶清食前調下頭風搐鼻白芷散川芎散如金散瓜蒂神妙散火筒散鬱金散偏頭風頭半邊痛者是也丹溪云有痰者多左屬風荊芥薄荷左屬血虛川芎當歸上屬痰蒼朮半夏上屬熱黃芩川芎散細辛散蓽茇豬膽搐鼻中蓽麻子半兩去皮大棗十五枚去核上共搗令熟塗紙上用箸一隻卷之去箸納鼻中良久取下清涕即止生蘿蔔汁仰臥注鼻中左痛注右右痛注左一婦人患偏頭痛一邊鼻塞不聞香臭常流清涕時作臭氣服遍治頭痛藥如芎蠍等皆不效後一醫人教服局方芎犀丸不十數服忽作嚏突出一鋌稠膿其疾遂愈雷頭風頭痛而起核塊者是也或云頭如雷之鳴也為風邪所客風動則作聲也夫治雷頭風諸藥不效者證與藥不相對也夫雷者震也震仰盂故東垣製藥用荷葉者象震之形其色又青乃述類象形當煎局方中升麻湯主之名曰清震湯張子和用茶調散吐之次用神芎丸下之然後服烏荊丸及愈風餅子之類衰者用涼膈散消風散熱頭上赤腫結核或如酸棗狀用排針出血則愈亦有因痰火者痰生熱熱生風故也痰火上升壅於氣道兼乎風化則自然有聲輕如蟬鳴重如雷聲故名雷頭風也用半夏牙皂薑汁煮一兩大黃酒浸透濕紙包煨再浸再煨三次二兩白殭蠶連翹橘紅桔梗天麻各五錢片芩酒炒七錢薄荷葉三錢白芷青礞石粉草各一錢末之水浸蒸餅丸如綠豆大食後臨臥茶吞二錢以痰利為度然後用清痰降火煎藥調理真頭痛天門真痛上引泥丸夕發旦死旦發夕死為腦為髓海真氣之所聚卒不受邪受邪則死不可治古方云與黑錫丹灸百會猛進參沉烏附或可生然天柱折者亦難為力矣大頭痛頭腫大如斗是也是天行時疫病東垣監濟源稅時長夏多疫癘初覺憎寒體重次傳面目腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭天行親戚不相訪問如染之多不救張縣丞亦患此醫以承氣湯加藍根下之稍緩翼日其病如故下之又緩終莫能愈漸至危篤東垣診視具說其由曰夫身半以上天之氣也身半以下地之氣也此雖邪熱客於心肺之間上攻頭而為腫盛以承氣下之瀉胃中之實熱是誅罰無過殊不知適其病所為故遂處方用黃連黃芩味苦寒瀉心肺間熱以為君橘紅玄參苦寒生甘草甘寒瀉火補氣以為臣連翹鼠黏子薄荷葉苦辛平板藍根味甘寒馬屁勃白殭蠶味苦平散腫消毒定喘以為佐新升麻柴胡苦平行少陽陽明二經不得伸桔梗味辛溫為舟楫不令下行共為細末用湯調時時服之拌蜜為丸噙化服盡良愈乃施其方全活甚眾名普濟消毒飲子海藏云大頭病者雖在身半以上熱伏於經以感天地四時非節瘟疫之氣所著以成此疾至於潰裂膿出而又染他人所以謂之疫癘也大抵足陽明邪熱太甚實資少陽相火為之熾多在少陽或在陽明甚則逆傳視其腫勢在何部分隨其經而取之濕熱為腫木盛為痛此邪發於首多在兩耳前後所先見出者為主為根治之宜早藥不宜速恐過其病所謂上熱未除中寒已作有傷人命矣此疾是自外而之內者是為血病況頭部分受邪見於無形之處至高之分當先緩而後急先緩者謂邪氣在上著無形之部分既著無形所傳無定若用重劑大瀉之則其邪不去反過其病矣雖用緩藥若又急服之或食前或頓服咸失緩體則藥不能除病矣當徐徐漬無形之邪或藥性味形體據象服餌皆須不離緩體及寒藥或酒炒浸之類皆是也後急者謂前緩劑已經高分瀉邪氣入於中是到陰部染於有形質之所若不速去反損陰也此卻為客邪當急去之是治客以急也且治主當緩者謂陽邪在上陰邪在下各為本家病也若急治之不惟不能解其紛而反致其亂矣此所以治主當緩也治客當急者謂陽分受陽邪陰分受陰邪主也陰分受陽邪陽分受陰邪客也凡所謂客者當急去之此治客以急也假令少陽陽明之為病少陽為邪者出於耳前後也陽明者首面大腫也先以黃芩黃連甘草通炒過銼煎少少不住服呷之或服畢再用大黃或酒浸或煨又以鼠黏子新瓦上炒香㕮咀煎去渣內芒硝各等分亦細細呷之當食後用徐得微利及邪氣已只服前藥如不已再服後藥依前次第用之取大便利邪已即止如陽明渴者加石膏少陽渴者加栝蔞根湯陽明行經加升麻葛根芍藥之類太陽行經加羌活防風荊芥之類選而加之並與上藥均合不可獨用散也黑白散甘桔湯加鼠黏子連翹大黃玄明粉白殭蠶荊芥殭蠶一兩錦紋大黃二兩薑汁丸彈子大新汲泉水和生蜜調服外用井底泥調大黃芒硝末敷之眉稜骨痛眉骨者目系之所過上抵於腦為目屬於腦也若諸陽經或挾外邪郁成風熱毒上攻於頭腦下注於目睛遂從目系過眉骨相併而痛若心肝壅熱上攻目睛而痛則亦目系與眉骨牽連並痛若胸膈風痰上攻者亦然若太陰之勝濕氣內郁寒迫下焦痛留項互引眉間其痛有酸者有抽掣者有重者有昏悶者便可審是孰氣之勝也東垣選奇湯治眉骨痛不可忍神效丹溪云屬風熱與痰治類頭風風熱者宜祛風清上散因痰者二陳湯加酒黃芩白芷因風寒者羌烏散戴云眼眶痛有二證皆屬肝有肝虛而痛才見光明則眼眶骨痛甚宜生熟地黃丸有肝經停飲發則眉稜骨痛不可開晝靜夜劇宜導痰湯或小芎辛湯加半夏橘紅南星茯苓頭風屑羅謙甫云肝經風盛木自搖動尚書云滿招損老子云物壯則老故木陵脾土金來克之是子來為母復仇也使梳頭有雪皮見肺之證也肺主皮毛大便實瀉青丸主之虛者人參消風散主之萬病紫菀丸治頭多白屑每服三丸至五七丸薑湯下按上治法必有風熱上攻頭目眩痛諸證而後用之若止是白屑但宜白芷零陵香之屬外治而已頭重何因得之曰因天之濕淫外著也因人之濕痰上蒸也因在下之陰氣逆於上也皆得而頭重何以言之頭象於天其氣極清地氣重濁地者陰也土濕也若外著內蒸必壅蔽清道致氣血不利沉滯於經隧脈絡故重內經曰陽氣者因於濕首如裹是外濕蔽著者也又曰脾熱病者先頭重是胃脈引其熱上於頭也太陰之復飲發於中濕氣內逆太陽上留而重痛胸中掉瘛尤甚太陽之勝濕氣內郁亦頭重巨陽之厥腫首頭重發為徇僕靈樞謂督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽虛則頭重高搖之俠脊之有過者取之所別也東垣云頭重如山此濕氣在頭也紅豆散鼻內搐之又方羌活根燒連翹各三錢紅豆半錢上為末搐鼻為飲除濕藥則過病所誅罰無過故於鼻取之猶物在高巔之上必射而取之也丹溪云壯實人氣實有痰或頭痛或眩暈大黃酒浸三次為末茶調服頭搖風也火也二者皆主動會之於巔乃為搖也內經曰徇蒙招尤目瞑耳聾下實上虛過在足少陽厥陰注謂徇疾也蒙目不明招掉搖不定也尤甚也目疾不明首掉尤甚又太陰之復頭項痛重掉瘛尤甚注謂濕氣內逆太陽上留胸中而掉瘛也靈樞謂督脈之別長強虛則頭重高搖之然病機有謂諸風掉眩皆屬肝木夫頭之巔足太陽之所過督脈與厥陰之所會是故三經所逆之火留聚於此者皆從風木而為掉搖也張仲景又言心絕者亦直視搖頭也診寸口之脈中手短者曰頭痛推而下之下而不上頭頂痛寸口緊急或短或弦或浮皆頭痛浮滑為風痰易治短澀難治浮緊為太陽弦細少陽浮緩長陽明沉緩太陰沉細少陰浮緩厥陰浮弦為風浮洪為火右寸滑或大或弦而有力皆痰火積熱細或緩兼體重者濕左脈不足血虛右脈不足氣虛左右俱不足氣血俱虛右寸緊盛食積右關洪大為胃熱上攻寸口弦細為鬲上有風涎冷痰或嘔吐沉細為陰毒傷寒但頭痛身不熱也診頭痛目痛久視無所見者死病苦頭痛目痛脈急短澀死面痛面痛皆屬火蓋諸陽之會皆在於面而火陽類也心者生之本神之變其華在面而心君火也暴痛多實久痛多虛高者抑之郁者開之血熱者涼血氣虛者補氣不可專以苦寒瀉火為事許學士醫檢正患鼻頞間痛或麻痹不仁如是數年忽一日連口唇頰車髮際皆痛不開口言語飲食皆妨在頞與頰上常如糊手觸之則痛此足陽明經絡受風毒傳入經絡血凝滯而不行故有此證或以排風小續命透體丹之類與之皆不效制犀角升麻湯贈之數日愈夫足陽明胃也經云腸胃為市又云陽明多血多氣胃之中腥膻五味無所不納如市釐無所不有也以其腐熟飲食之毒聚於胃此方以犀角為主解飲食之毒也陽明經脈環唇挾舌起於鼻合頞中循頰車上耳前過客主人循髮際至頭顱今所患皆一經絡也故以升麻佐之余藥皆滌除風熱升麻黃芩專入胃經老母年七十餘累歲患頰車痛每多言傷氣不寐傷神則大發發之劇則上連頭下至喉內及牙齦皆如針刺火灼不可手觸乃至口不得開言語飲食並廢自覺火光如閃電尋常涎唾稠黏如絲不斷每勞與餓則甚得臥與食則稍安知其虛也始以清胃散犀角升麻湯人參白虎湯羌活勝濕湯加黃芩甘桔皆不效後改用參耆白朮芎歸升柴甘桔之類稍佐以芩梔連翹黍黏空腹進之而食遠則服加減甘露飲始漸安第老人性躁不耐閒勞與多言時有之不能除去病根然發亦稀少即發亦不如往歲之劇矣從子鋙因喪子鬱結復多餌鹿角膠諸種子藥或於食後臨臥輒進之以至積成胃熱遂患面痛如老母證服清胃散甘露飲大加石膏過當而見虛證又服參耆等補藥過當而復見火證門人施生以越鞠加山梔連翹貝母橘紅之屬開其鬱結而始向安諸方書無面痛門今補之且具載上三條以見用藥不可執一耳非三條之足以盡是病也頸項強痛經云東風生於春病在肝腧在頸項諸痙項強皆屬於濕缺盆之中任脈也名曰天突當缺盆中央動脈是一次任脈側之動脈足陽明也名曰人迎挾喉兩旁動脈二次脈手陽明也名曰扶突挾喉動脈之後曲頰之前一寸後是三次脈手太陽也名曰天牕手陽明之後當曲頰之下四次脈足少陽也名曰天容曲頰之後當耳之下五次脈手少陽也名曰天牖耳後當完骨上六次脈足太陽也名曰天柱挾項大筋中七次脈頸中央之脈督脈也名曰風府足陽明挾喉之動脈也其腧在膺中手陽明次在其腧外不至曲頰一寸太陽當曲頰足少陽在耳下曲頰之後手少陽出耳後上加完骨之上足太陽挾項大筋之中然則頸項強急之證多由邪客三陽經也寒搏則筋急風搏則筋弛左多屬血右多屬痰頸項強急發熱惡寒脈浮而緊此風寒客三陽經也宜驅邪湯頸項強急動則微痛脈弦而數實右為甚作痰熱客三陽經治宜消風豁痰湯頸項強急動則微痛脈弦而澀左為甚作血虛邪客太陽陽明經治宜疏風滋血湯頸項強急寒熱往來或嘔吐或脅痛宜小柴胡湯升麻防荊湯頸項強急腰似折項似拔加味勝濕湯精神短少不得睡項筋腫急難伸禁甘溫宜苦寒養神湯主之本事方椒附散治腎氣上攻項背不能轉側於虛寒者為宜丹溪治一男子項強不能回顧動則微痛其脈弦而數實右手為甚作痰客太陽經治之用二陳湯加酒洗黃芩羌活紅花服後二日愈許學士治一人患筋急項不得轉側自午後發至黃昏時定此患必從足起經言十二經絡各有筋惟足太陽之筋自足至項大抵筋者肝之合也日中至黃昏天之陽陽中之陰也又曰陽中之陰肺也自離至兌陰旺陽弱之時故靈寶畢法云離至乾腎氣絕而肝氣弱肝腎二臟受陰氣故發於是時授以木瓜煎方三服而愈戴云頸痛非是風邪即是氣挫亦有落枕而成痛者並宜和氣飲食後服按人多有挫閃及久坐失枕而致項強不可轉移者皆由腎虛不能生肝肝虛無以養筋故機關不利宜六味地黃丸常服內經刺灸項頸痛有二其一取足手太陽治項後痛經云足太陽之脈是動則病項如拔視虛盛寒熱陷下取之又云項痛不可俯仰刺足太陽不可以顧刺手太陽又云大風項頸痛刺風府風府在上椎又云邪客於足太陽之絡令人頭項肩痛刺足小指爪甲上與肉交者各一痏立已不已則刺外踝下三痏左取右右取左如食頃是也其二取足手陽明治頸前痛經云足陽明之脈所生病者頸腫又云手陽明之脈是動則病頸腫皆視盛虛寒熱陷下取之也心痛胃脘痛膈痛心瘥或問丹溪言心痛即胃脘痛然乎曰心與胃各一臟其病形不同因胃脘痛處在心下故有當心而痛之名豈胃脘痛即心痛者哉歷代方論將二者混同敘於一門誤自此始蓋心之藏君火也是神靈之舍與手少陰之正經邪皆不得而傷其受傷者乃手心主包絡也如包絡引邪入於心之正經臟而痛者則謂之真心痛必死不可治夫心統性情始由怵惕思慮則傷神神傷臟乃應而心虛矣心虛則邪干之故手心主包絡受其邪而痛也心主諸陽又主血是以因邪而陽氣鬱伏過於熱者痛陽氣不及惟邪勝之者亦痛血因邪泣在絡而不行者痛血因邪勝而虛者亦痛然方論雖有九種心痛曰飲曰食曰風曰冷曰熱曰悸曰蟲曰疰去來其因固多終不得聖人之旨豈復識六淫五邪不一之因哉且五臟六腑任督支脈絡於心臟腑經脈挾其淫氣自支脈乘於心而為痛者必有各腑臟病形與之相應而痛如靈樞謂厥心痛與背相控善瘈如從後觸其心傴僂者腎心痛也厥心痛腹脹胸滿心尤痛甚胃心痛也厥心痛痛如以錐針刺其心心痛甚者脾心痛也厥心痛色蒼蒼如死狀終日不得太息肝心痛也厥心痛臥若徒居心痛間動作痛益甚色不變肺心痛也更以陽明有餘上歸於心滑則病心疝又心痛引少腹滿上下無定處溲便難者取足厥陰心痛腹脹嗇然大便不利取足太陰心痛短氣不足以息取手太陰心痛引背不得息刺足少陰不已取手少陽與夫內經於六氣五運司上下勝復淫邪應臟氣盛衰而相乘者亦必有諸淫氣之病狀與心而痛是故苟不能遍識諸臟腑所從來之病因將何以施治哉胃脘痛亦如心痛有不一之因蓋胃之真濕土也位居中焦稟沖和之氣多氣多血是水穀之海為三陽之總司五臟六腑十二經脈皆受氣於此是以足之六經自下而上凡壯則氣行而已胃脘弱則著而成病其沖和之氣變至偏寒偏熱因之水穀不消停留水飲食積真氣相搏為痛惟肝木之相乘者尤甚胃脘當心而痛上肢兩脅裡急飲食不下膈咽不通食則為食痹者謂食已心下痛吐出乃止又腎氣上逆者次之逆則寒厥入胃亦痛夫如是胃脘之受邪非止其自病者多然胃脘逼近於心移其邪上攻於心為心痛者亦多若夫心痛之病形如前所云者則詳矣今欲分胃脘不一病因之狀當何如曰胃之濕土主乎痞故胃病者或滿或脹或食不下或嘔吐或吞酸或大便難或瀉利面色浮而黃者皆是胃之本病也其有六淫五邪相乘於胃者大率與前所列心痛之形狀相類但其間必與胃本病參雜而見之也活法機要云諸心痛者皆少陰厥陰氣上衝也有熱厥心痛者身熱足寒痛甚則煩躁而吐額自汗出知其為熱也其脈浮大而洪當灸太谿及崑崙謂表裡俱瀉之是為熱病汗不出引熱下行表汗通身而出者愈也灸畢服金鈴子散則愈痛止服枳朮丸去其餘邪也有大實心中痛者因氣而食卒然發痛大便或秘久而注悶心胸高起按之愈痛不能飲食急以煮黃丸利之利後以藁本湯去其邪也有寒厥心痛者手足厥逆而通身冷汗出便溺清利或大便利而不渴氣微力弱急以朮附湯溫之寒厥暴痛非久病也朝發暮死急當救之是知久病無寒暴病非熱也丹溪云凡心膈痛須分新久若明知身受寒氣口吃寒物而得者於初得之日當與溫散或溫利之溫散謂治身受寒氣於外者如陳無擇麻黃桂枝湯治外因心痛之類是也溫利謂治口食寒物於裡者如仲景九痛丸潔古煮黃丸治大實心痛之類是也病得之稍久則成郁矣鬱則蒸熱熱則生火若欲行溫散溫利寧無助火添病耶由是方中多以山梔仁為熱藥之嚮導則邪易伏病易退正氣復而病安矣大概胃口有熱而作痛非山梔不可須薑汁佐之多用臺芎開之金匱要略云心中寒者其人病心如啖蒜狀劇者心痛徹背背痛徹心譬如蠱注其脈浮者自吐乃愈心痛徹背背痛徹心烏豆赤石脂丸主之胸痹不得臥心痛徹背者栝蔞薤白半夏湯主之心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛而不可觸近大建中湯主之心中痞厥逆心懸痛桂枝生薑枳實湯主之上仲景方大抵皆溫散之劑有寒結而痛者宜之左脈浮弦或緊兼惡風寒者有外邪宜藿香正氣散或五積散加薑蔥之類外吸涼風內食冷物寒氣客於腸胃之間則卒然而痛者二陳草果乾薑吳茱萸扶陽助胃湯草豆蔻丸之類心膈痛曾服香燥熱藥復作復劫轉轉深痼宜山梔子炒黑二兩川芎香附鹽水浸炒各一兩黃連酒炒黃芩酒炒木香檳榔各二錢五分赤曲番降香各五錢芒硝二錢為細末生薑汁童子小便各半盞調二錢痛時呷下仲景云按之心下滿痛者此為實也當下之宜大柴胡湯凡脈堅實不大便腹滿不可按並可承氣湯下之有實積者脈沉滑氣口緊盛按之痛宜小胃丹津下十五丸亦可服厚朴丸紫菀丸痰積作痛星半安中湯海蛤丸火痛清中湯心膈大痛攻走腰背發厥嘔逆諸藥不納者就吐中以鵝翎探吐之以盡其痰積而痛自止外臺治卒心痛黃連八兩水七升煮五升絞去渣溫服五合日三肘後治卒心痛龍膽草四兩酒三升煮一升半頓服仲景云心傷者其人勞役即頭面赤而下重心中痛而自煩發熱臍跳其脈弦此為心臟所傷也可服妙香散錢氏云心虛者炒鹽補之圖經衍義謂蠣粉治心痛皆心傷之正藥也以物拄按而痛者挾虛以二陳湯加炒乾姜和之按之痛止者為虛宜酸以收之勿食辛散之劑又有病久氣血虛損及素作勞羸弱之人患心痛者皆虛痛也有服大補之劑而愈者不可不知氣攻刺而痛宜加味七氣湯沉香降氣散正氣天香散治心痛但忍氣則發者死血作痛脈必澀作時飲湯水下或作呃壯人用桃仁承氣湯下弱人用歸尾川芎牡丹皮蘇木紅花玄胡索桂心桃仁泥赤曲番降香通草大麥芽穿山甲之屬煎成入童便酒韭汁大劑飲之或失笑散蟲痛面上白斑唇紅能食或食即痛或痛後便能飲食或口中沫出上半月蟲頭向上易治下半月蟲頭向下難治先以雞肉汁及糖蜜飲之引蟲頭向上用集效丸或萬應丸剪紅丸之類下之若因蛔作痛蛔攻齧心痛有休止其人吐蛔或與之湯飲藥餌轉入轉吐蓋緣物入則蛔動蛔動則令人噁心而吐用川椒十數粒煎湯下烏梅丸仲景云蛔蟲為病令人吐涎心痛發作有時毒藥不止甘草粉蜜湯主之為脾受肝制而急故蟲不安用粉蜜之甘緩以安之有腎氣逆上攻心以致心痛用生韭研汁和五苓散為丸空心茴香湯下病人舊有酒積食積痰積在胃脘一遇觸犯便作疼痛挾風寒參蘇飲加薑蔥挾怒氣二陳加青皮香附薑汁炒黃連挾飲食二陳加炒山梔曲糵草果山楂挾火熱者二陳加枳實厚朴薑汁炒黃連山梔加減越鞠丸川芎蒼朮香附神麯貝母炒梔子砂仁草果參酌脈病施治服寒藥多致脾胃虛弱胃脘痛宜溫胃湯寒濕所客身體沉重胃脘痛面色痿黃宜術桂湯心脾痛用荔枝核為末每服一錢熱醋湯調下劉寄奴末六錢玄胡索末四錢薑汁熱酒調服效白礬辰砂糊丸好醋吞下神效心胃腹脅散痛二陳加蒼朮諸香藥治之或沉香降氣散不愈則和其血熱飲痛黃連甘遂作丸服之冬寒停飲桂黃散心極痛以生地黃汁調面煮吃打下蟲積效實痛者手不可近六脈沉細甚有汗大承氣加桂強壯痛甚者加桃仁附子連小腹虛寒作痛小建中湯寒熱嘔吐而痛脈沉弦大柴胡湯脾虛積黃而痛胃苓湯胃虛感冷而痛理中湯內傷發熱不食胃口作痛補中益氣湯加草豆蔻熱痛加梔子肥人心脾胃脘當心痛或痞氣不食用草豆蔻炒三稜白朮各一兩白豆蔻仁桂枝小草遠志莪朮丁香丁皮木香藿香炊餅丸梧桐子大薑湯下三五十丸胃脘停濕者溫中丸脾胃不和而痛大安丸因氣者加減木香檳榔丸咳逆上氣痰飲心痛海蛤粉煅栝蔞仁帶穰等分為末和勻米糊丸丹溪治許文懿公因飲食作痰成心脾痛後觸風雪腿骨痛醫以黃芽歲丹烏附治十餘年艾灸萬計又冒寒而痛加胯難開合脾疼時胯稍輕胯痛則脾疼止此初因中脘有食積痰飲續冒寒濕郁遏經絡氣血不行津液不通痰飲注入骨節往來如潮湧上則為脾疼降下則為胯痛須湧泄之以甘遂末一錢入豬腰子內煨食之連泄七行足便能步後嘔吐大作不食煩躁氣弱不語記金匱云無寒熱而短氣不足以息者實也其病多年鬱結一旦泄之徒引動其猖獗之勢無他制御之藥故也仍以吐劑達其上焦次第治及中下二焦連日用瓜蒂藜蘆苦參等藥俱吐不透而噦躁愈甚乃用附子尖三枚和漿水以蜜飲之方大吐膠痰一大桶以朴硝滑石黃芩石膏連翹等一斤濃煎置井中極冷飲之四日服四斤後腹微痛二便秘脈歇至於卯酉時予謂卯酉為手足陽明之應此乃胃與大腸有積滯未盡當速瀉之諸醫惑阻乃作紫雪三日服至五兩腹減稍安後又小便閉痛飲以蘿蔔子汁得吐立通又小腹滿痛以大黃牽牛等分水丸服至三百丸下如爛魚腸者二升許脈不歇又大便迸痛小腹滿悶又與前丸藥百粒腹大絞痛腰胯重眼火出不言語瀉下穢物如桕油條一尺許肛門如火以水沃之自病半月不食不語至此方啜稀粥始有生意數日平安自嘔吐至安日脈皆平常弦大次年行倒倉法全愈治一人以酒飲牛乳患心痛年久無汗醫多以丁附羸弱食減每痛以物拄之脈遲弦而澀又苦吞酸以二陳加芩連白朮桃仁郁李仁澤瀉每旦服之湧出酸苦黑水並如爛木耳者服至二百餘帖脈澀退至添純弦而漸充滿時令暖意其欲汗而血氣未充以參朮歸芍陳皮半夏甘草痛緩與麻黃蒼朮芎歸才下咽忽暈厥須臾而蘇大汗痛止一童子久瘧方愈心脾痛六脈伏痛減時氣口緊盛餘部弦而實意其宿食詢之果傷冷油麵食以小胃丹津嚥下十餘粒禁餘食三日與藥十二次痛止後又與谷太早忽大痛連脅乃禁食亦不與藥蓋宿食已消今因新谷與余積相迸而痛若再藥攻必傷胃氣至夜心嘈索食先以白朮黃連陳皮丸服之以止其嘈此非飢也乃余飲未了因氣而動耳若與食復痛詢其飢作膈間滿悶又與前丸子一晝夜不飢而昏睡後少與粥漸安一婦因久積憂患後心痛食減羸瘦渴不能飲心與頭更換而痛不寐大便燥結以四物加陳皮甘草百餘帖未效予曰此肺久為火所郁氣不得行血亦蓄塞遂成汙濁氣壅則頭痛血不流則心痛通一病也治肺當自愈遂效東垣清空膏例以黃芩細切酒浸透炒赤色為細末湯下頭稍汗十餘帖汗漸通身而愈因其膝下無汗瘦弱脈澀小便數大便澀當補血以防後患以四物湯加陳皮甘草桃仁酒芩服之愈一婦春末心脾疼自言腹脹滿手足寒時膝須綿裹火烘胸畏熱喜掀露風涼脈沉細澀稍重則絕輕似弦而短渴喜熱飲不食以草豆蔻仁三倍加黃連滑石神麯為丸以白朮為君茯苓為佐陳皮為使作湯下百丸至二斤而安一婦形瘦色嫩味厚幼時曾以火烘濕鞋濕氣上襲致吐清水吞酸服丁香熱藥時作時止至是心疼有痞塊略吐食脈皆微弦重似澀輕稍和與左金丸三四十粒薑湯下三十餘次食不進予曰結已開矣且止藥或思飲與水間與青綠丸脈弦漸添與人參酒芍藥引金瀉木漸思食若大便秘以生芍藥陳皮桃仁人參為丸與之又以蜜導便通食進一老人心腹大痛昏厥脈洪大不食不勝一味攻擊之藥用四君子加川歸沉香麻黃服愈東垣治一婦人重娠六個月冬至因慟哭口吸風寒忽病心痛不可忍渾身冷氣欲絕曰此乃客寒犯胃故胃脘當心而痛急與草豆蔻半夏乾生薑炙甘草益智仁之類或曰半夏有小毒重娠服之可乎曰乃有故而用也岐伯曰有故無殞故無殞也服之愈滑伯仁治一婦人盛暑洞泄厥逆惡寒胃脘當心而痛自腹引脅轉為滯下嘔噦不食人皆以中暑霍亂治之益甚脈三部俱微短沉弱不應呼吸此陰寒極矣不亟溫之則無生意遂以薑附三四進間以丹藥脈稍有力厥逆漸退更服薑附七日而安厥心痛者他臟病干之而痛皆有治也真心痛者心臟自病而痛故夕發旦死旦發夕死無治也然心臟之經絡有病在標者其心亦痛而有治經云心手少陰之脈是動則病嗌乾心痛渴而欲飲又心主手少陰之脈所生病者心痛掌中熱皆視盛虛熱寒陷下取之又經云手心主之別名曰內關去腕二寸出於兩筋之間實則心痛取之兩筋間也又云邪在心則病心痛喜悲時眩僕視有餘不及調其俞是也卒急心痛若脈洪大而數其人火熱盛者用前黃連龍膽草單方飲之若無熱者荔枝核之類治之若中惡心痛腹脹大便不通者走馬湯治之海上方急救男子婦人心疼牙關緊急欲死者用隔年陳蔥白三五根去皮須葉擂為膏將病人口斡開用匙將膏送入咽喉用香油四兩灌送下油不以多少但得蔥下喉其人必蘇一方用香油頓服一盞亦妙經云邪客於足少陰之絡令人卒心痛暴脹胸脅支滿無積者刺然骨之前出血如食頃而已不已左取右右取左病新發者五日已膈痛與心痛不同心痛則在岐骨陷處本非心痛乃心支別絡痛耳膈痛則痛橫滿胸間比之心痛為輕痛之得名俗為之稱耳諸方稱為煩躁忪悸皆其證也五苓散瀉心小腸之熱恐非其對不若用四物湯十全大補湯去桂生血而益陰此以水制火之義膈痛多因積冷與痰氣而成宜五膈寬中散或四七湯加木香桂各半錢或撾脾湯加木香膈痛而氣上急者宜蘇子降氣湯去前胡加木香如數痰涎壅盛而痛者宜小半夏茯苓湯加枳實一錢間進半硫丸心瘥亦痰飲所致俗名飲瘥有胃口熱食易消故瘥素問謂之食瘥亦類消中之狀俗名肚瘥痰氣宜小半夏茯苓湯加枳實一錢胃中熱宜二陳湯加黃連一錢或五苓散去桂加辰砂亦有病瘥呷薑湯數口或進乾薑劑而愈此膈上停寒中有伏飲見辛熱則消予讀中秘書時館師韓敬堂先生常患膈痛診其脈洪大而澀予用山梔仁赤曲通草大麥芽香附當歸川芎煎湯加薑汁韭汁童便竹瀝之類飲之而止一日勞倦忍飢痛大發亟邀予至火房問曰晨起痛甚不能待公服家兄藥藥下咽如刀割痛益甚不可忍何也予曰得非二陳平胃烏藥紫蘇之屬乎曰然曰是則何怪乎其增病也夫勞餓而發飽逸則止知其虛也飲以十全大補湯一劑而痛止診脈多見於右關陰弦為痛微急為痛微大為心痹引背痛短數為痛澀為痛痛甚者脈必伏大是久病洪大數屬火熱滑大屬痰右手實者痰積沉滑者有宿食弦遲者有寒沉細而遲者可治堅大而實浮大而長滑而利數而緊皆難治真心痛手足俱青至節者不治胸痛心痛條有膈痛痞條有胸痹宜與此條參看經云南風生於夏病在心俞在胸脅又云仲夏善病胸脅此則胸連脅痛屬心肝虛則胸痛引背脅肝實則胸痛不得轉側喜太息肝著則常欲蹈壓其胸經云春脈如弦其氣不實而微此謂不及令人胸痛引背下則兩脅脹滿此肝虛而其脈證見於春如此也宜補肝湯金匱云肝中寒者兩臂不舉舌本燥喜太息胸中痛不得轉側食則吐而出汗也肝著其人常欲踏其胸上先未苦時但欲飲熱旋覆花湯主之素問曰陽明所謂胸痛短氣者水氣在臟腑也水者陰氣也陰氣在中故胸痛少氣也輕者五苓散重者用張子和法取之脈經云寸口脈沉胸中引脅痛胸中有水氣宜澤漆湯及刺巨闕瀉之水杜壬治胸脅痛徹背心腹痞滿氣不得通及治痰咳大栝蔞去穰取子熟炒連皮研和麵糊為丸如桐子大米飲下五十丸斗門方治胸膈壅滯去痰開胃用半夏洗淨焙乾搗羅為末生薑自然汁和為餅子用濕紙裹於慢火中煨令香熟水一盞用餅子一塊如彈丸大入鹽半分煎取半盞溫服痰丹溪治一人鬲有一點相引痛吸氣皮覺急用滑石一兩桃仁半兩枳殼炒一兩黃連炒半兩甘草炙二錢為細末每服錢半以蘿蔔汁煎熟飲之一日五六次又治一人因吃熱補藥又妄自學吐納以致氣亂血熱嗽血消瘦遂與行倒倉法今嗽血消瘦已除因吃炒豆米膈間有一點氣梗痛似有一條絲垂映在腰與小腹亦痛大半偏在左邊此肝部有汙血行未盡也用滑石一兩黃丹三錢枳殼一錢黃連五錢生甘草二錢紅花一錢柴胡五錢桃仁二兩為細末每服一錢半以蘿蔔汁煎沸服之胸痛連脅脅支滿膺背肩胛兩臂內亦痛經云歲火太過則有此證其脈若洪數宜用降火涼劑胸痛引背兩脅滿且痛引少腹經謂歲金太過與歲土不及風木大行而金復則有此疾是為金邪傷肝宜用補肝之劑胸中痛連大腹小腹亦痛者為腎虛宜先取其經少陰太陽血後用補腎之藥胸連脅肋髀膝外皆痛為膽足少陽木所生病詳盛虛熱寒陷下取之手心主之筋其病當所過者支轉筋前及胸痛息賁治在燔針劫刺以知為數以痛為輸又足太陽之筋足少陽之筋痛皆引胸痛治在燔針劫刺以知為數以痛為輸也腹痛少腹痛或問腹痛何由而生曰邪正相搏是以作痛夫經脈者乃天真流行出入臟腑之道路也所以水穀之精悍為榮衛行於脈之內外而統大其用是故行六氣運五行調和五臟灑陳六腑法四時升降浮沉之氣以生長化收藏其正經之別脈絡在內者分守臟腑部位各司其屬與之出納氣血凡是榮衛之妙用者皆天真也故經曰血氣人之神不可不謹養養之則邪弗能傷矣失之則榮氣散解而諸邪皆得從其臟腑所虛之舍而入客焉入客則氣停液聚為積為痰血凝不行或瘀或蓄脈絡皆滿邪正相搏真氣迫促故作痛也脾胃內舍心腹心肺內舍胸膺兩脅肝內舍胠脅小腹腎內舍小腹腰脊大小腸衝任皆在小腹此臟腑所通之部位也曰舉痛論敘腹痛一十四條屬熱者止一條余皆屬寒後世方論因盡作風冷客之攻擊而作痛今子乃云諸邪何哉曰方論不會通諸篇之旨因不解篇末復謂百病皆生於氣列九氣之狀其間雖不言痛必亦為或有作痛者故也不然何乃出於諸痛篇之末耶試以靈樞百病始生篇觀之其旨則顯然矣所論邪有三部風雨傷於上清濕傷於下傷於上者病從外入內從上下也次第傳入舍於輸之時六經不通或著絡脈或著經脈或著輸脈或著伏沖之脈或著腸胃之膜原皆得成積而痛傷於下者病起於足故積之始生得寒乃生厥乃成積厥氣生足悗悗生脛寒脛寒則血脈凝澀血脈凝澀則寒氣上入於腸胃入於腸胃則䐜脹腸外之汁沫迫聚不得散日以成積傷於臟者病起於陰故卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相搏則併合凝聚不得散而積成矣卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血蘊裹而不散津液澀滲著而不去而積皆成矣自今觀之此篇所謂成積作痛未至於癥瘕結塊之積乃汁沫聚而不散之積也與舉痛論所謂血氣稽留不得行而成積同也豈七情敘於篇末者之不同然於作痛乎然推原二篇之意百病始生篇在乎三部之邪會而為痛故相連而為言舉痛論在乎其邪各自為病所以獨引寒淫一者亦為寒邪之能閉塞陽氣最甚故也用是為例其他則可自此而推之矣至如七情之氣逆即傷其榮衛而不行榮衛不行則液聚血凝及飲食用力過度者亦然皆不待與寒相會始成積作痛也且如諸篇有言胃氣實而血虛其脈軟散者當病食痹謂食則痛也有言歲土太過濕淫所勝大腹小腹痛者有言衝脈之病其氣溢於大腸而著於膏肓之原在臍下故環臍而痛有言脾傳之腎少腹冤熱而痛有言肝熱病者腹痛身熱有言腎虛者亦大腹小腹痛有言厥陰之厥小腹腫脹太陰厥逆心痛引背有言六氣司上下之勝之復等邪各隨其所入之部分而痛豈非諸邪各有自徑入作痛初無與寒相關者耶難經云臍上牢若痛心內證也臍下牢若痛腎內證也臍右牢若痛肺內證也臍左牢若痛肝內證也方論之未備者不獨此而已至若厥心痛五邪相乘者亦不能推及四臟與之無異豈五五二十五陽之相移獨心而已哉更於五臟之疝不干涉於睪丸止在腹中痛者猶未明也止知諸脈急者為疝未知脈滑微有熱者亦病疝也其詳備見疝條且劉河間嘗解急脈之意急脈固是寒之象然寒脈當短小而遲非急數而洪也由緊脈主痛急而為痛甚所以痛而脈有緊急者脈為心之所養也凡六氣為病則心神不寧而緊急不得舒緩故脈亦從之而見也欲知何氣之為病者適其緊急相兼之脈而可知也如緊急洪數則為熱痛之類也此論可謂善推脈理病情者也曰諸邪之作痛則聞命矣然其邪之博也奈何以治將亦有所守要約之方乎曰自博而求約何患約之無其道不自博而從事於約約必失其道失其道寧無實實虛虛誅伐無過之患乎然其道要在於審經脈氣血之虛實辨六淫五邪之有無兼氣於是擇至真大要諸治法中並五郁者之所當施而後選其經分祛邪補正適所宜之藥配君臣佐使以為方夫如是而約之則猶約囊也不切中其病矣東垣云夫心胃痛及腹中諸痛皆因勞力過甚飲食失節中氣不足寒邪乘虛而入客之故卒然而作大痛經言得炅則止炅者熱也以熱治寒治之正也然腹痛有部分臟腑有高下治之者亦宜分之如厥心痛者乃寒邪客於心包絡也前人以良薑菖蒲大辛熱之味末之酒調服其痛立止此直折之耳真心痛者寒邪傷其君也手足青至節甚則旦發夕死夕發旦死中脘痛者太陰也理中建中草豆蔻丸之類主之臍腹痛者少陰也四逆姜附禦寒湯之類主之少腹痛者厥陰也正陽散回陽丹當歸四逆湯之類主之雜證而痛者苦楝湯酒煮當歸丸丁香楝實丸之類主之是隨高下治之也更循各臟部分穴俞而灸刺之如厥心痛者痛如針刺其心甚者脾之痛也取之然谷太谿餘臟皆然如腹中不和而痛者甘草芍藥湯主之如傷寒誤下傳太陰腹滿而痛者桂枝加芍藥湯主之痛甚者桂枝加大黃湯主之夏月肌熱惡熱脈洪疾而痛者黃芩芍藥湯主之又有諸蟲痛者如心腹懊憹作痛聚往來上下行痛有休止腹熱善渴涎出面色乍青乍白乍赤嘔吐水者蛔咬也以手緊按而堅持之無令得脫以針刺之久持之蟲不動乃出針也或局方化蟲丸及諸蟲之藥量虛實用之不可一例治也海藏云秋腹痛肌寒惡寒脈沉微足太陰足少陰主之桂枝芍藥湯中脘痛太陰也理中建中黃耆湯之類臍腹痛少陰也四逆真武附子湯之類小腹痛厥陰也重則正陽散回陽丹之類輕則當歸四逆湯之類太陰傳少陰痛甚者當變下利而止夏腹痛肌熱惡熱脈洪疾手太陰足陽明主之芍藥黃芩湯治腹痛脈洪數肚腹痛者芍藥甘草湯主之稼穡作甘甘者己也曲直作酸酸者甲也甲己化土此仲景妙方也脈緩傷水加桂枝生薑脈洪傷金加黃芩大棗脈澀傷血加當歸脈弦傷氣加芍藥脈遲傷火加乾薑丹溪云有寒有熱有食積有濕痰有死血綿綿痛而無增減欲得熱手按及喜熱食其脈遲者寒也當用香砂理中湯或治中湯小建中湯五積散等藥若冷痛用溫藥不效痛愈甚大便不甚通當微利之用藿香正氣散每服加官桂木香枳殼各半錢吞下來復丹或用蘇感丸不利則量虛實用神保丸時痛時止熱手按而不散其脈洪大而數者熱也宜二陳平胃炒芩連或四順清涼飲黃連解毒湯神芎丸金花丸之類若腹中常覺有熱而痛此為積熱宜調胃承氣湯感暑而痛或泄利並作其脈必虛豁宜十味香薷飲六和湯感濕而痛小便不利大便溏泄其脈必細宜胃苓湯痰積作痛或時眩暈或嘔冷涎或下白積或小便不利或得辛辣熱湯則暫止其脈必滑宜二陳加行氣之劑及星半安中湯食積作痛痛甚欲大便利後痛減其脈必弦或沉滑宜二陳平胃加山楂神麯麥芽砂仁草果溫中丸枳朮丸保和丸木香檳榔丸之類酒積腹痛用三稜蓬朮香附官桂蒼朮厚朴陳皮甘草茯苓木香檳榔主之多年敗田螺殼煅存性加三倍於木香檳榔丸中更加山茵陳等分其效甚速氣滯作痛痛則腹脹其脈必沉宜木香順氣散死血作痛痛有常處而不移其脈必澀或芤宜桃仁承氣湯虛者加歸地蜜丸服以緩除之或用牡丹皮江西紅曲麥芽香附川通草穿山甲番降香紅花蘇木山楂玄胡索桃仁泥酒童便各一鍾煎至一鍾入韭汁服七情內結或寒氣外攻積聚堅牢如杯心腹絞痛不能飲食時發時止發即欲死宜七氣湯腹痛有作止者有塊耕起往來者吐清水者皆是蟲痛或以雞汁吞萬應丸下之或以椒湯吞烏梅丸安之金匱要略問曰病腹痛有蟲其脈何以別之師曰腹中痛其脈當沉若弦反洪大故有蛔蟲關上脈緊而滑者蛔毒脈沉而滑者寸白肘後粗以下三四寸熱者腸中有蟲脾胃虛而心火乘之不能滋榮上焦元氣遇冬腎與膀胱之寒水旺時子能令母實致肺金大腸相輔而來克心乘脾胃此大復其讎也經曰大勝必大復故皮毛血脈分肉之間元氣已絕於外又大寒大燥二氣並乘之則苦惡風寒耳鳴及腰背相引胸中而痛鼻息不通不聞香臭額寒腦痛目時眩目不欲開腹中為寒水反乘痰唾涎沫食入反出腹中常痛及心胃痛脅下急縮有時而痛腹不能努大便多瀉而少秘下氣不絕或腸鳴此脾胃虛之極也胸中氣亂心煩不安而為霍亂之漸膈咽不通噎塞極則有聲喘喝閉塞或日陽中或暖房內稍緩口吸風寒則復作四肢厥冷身體沉重不能轉側不可回顧小便溲而時燥以草豆蔻丸主之此主秋冬寒涼大復氣之藥也復氣乘冬足太陽寒氣足少陰腎水之旺子能令母實手太陰肺實反來侮土火木受邪腰背胸膈閉塞疼痛善嚏口中涎目中泣鼻中流濁涕不止或有瘜肉不聞香臭咳嗽痰沫上熱如火下寒如水頭作陣痛目中流火視物䀮䀮耳鳴耳聾頭並口鼻或惡風寒喜日陽夜臥不安常覺痰塞膈咽不通口無滋味兩脅縮急而痛牙齒動搖不能嚼物腰臍間及尻臀膝足寒冷陰汗前陰冷行步欹側起居艱難掌中寒風痹麻木小便數而晝多夜頻而少氣短喘喝少氣不足以息卒遺失無度婦人白帶陰戶中大痛牽心而痛黧黑失色男子控睪牽心陰陰而痛面如赭色食少大小便不調煩心霍亂逆氣裡急而腹皮色白後出餘氣腹不能努或腸鳴膝下筋急肩胛大痛此皆寒水來復火土之讎也以神聖復氣湯主之季秋心腹中大痛煩躁冷汗自出宜益智和中丸季秋客寒犯胃心胃大痛不可忍者麻黃草豆蔻丸脾胃虛寒心腹滿及秋冬客寒犯胃時作疼痛宜厚朴湯為戊火已衰不能運化又加客氣聚為滿痛散以辛熱佐以苦甘溫以淡泄之扶持胃氣以期平也腹痛或大便利或用手重按痛處不痛者為虛宜於以上治寒痛方中選用之無寒者芍藥甘草湯仲景云虛勞裡急腹中痛小建中湯主之此補例也溫例也痛而秘者厚朴三物湯主之此瀉例也寒例也三陰受邪於心臍少三腹疼痛氣風等證當歸丸主之失笑散治心腹痛效心痛門有劉寄奴玄胡索方亦治腹痛皆通理氣血之劑也有全不喜食其人本體素怯弱而又加以腹冷疼者養胃湯以人參白朮蒼朮仍加桂茱萸各半錢木香三分應腹冷痛或心脾疼者加生薑均治之諸寒作痛得炅則止者熨之用熟艾半斤以白紙一張鋪於腹上紙上攤艾令勻又以憨蔥數枝批作兩半片鋪於艾上再用白紙一張覆之以慢火熨斗熨之冷則易之覺腹中熱腹皮暖不禁以帛三搭多縫帶系之待冷方解一法用鹽炒布裹熨痛處神效腹痛證治上條列之詳矣但有因別病而致痛者不可不明且如疝致腹痛必是睪丸腫疼牽引而痛或邊有一條沖腹而痛霍亂腹痛必吐利兼作甚有不嘔不利四肢厥冷痛極者名乾霍亂又名攪腸沙急用樟木煎湯大吐之或用白礬末一錢清湯調服探吐之或用臺芎為末每一錢許入薑汁半盞熱湯調服甚者面青昏倒不省人事急以鼠矢一合研為細末滾湯調澄清通口服之或刺委中並十指出血腸內生癰亦常腹痛但小便數似淋脈滑數身甲錯腹皮急按之濡如腫狀或繞臍生瘡治法見本門凡此數證要當審辨隨其所因而施治毋苟且而誤人也少腹痛傷寒蓄血在下焦宜抵當丸桃仁承氣之類若因氣鬱而痛以青皮主之寒者以桂枝吳茱萸溫之苦練丸酒煮當歸丸若因疝奔豚症聚者更檢本門施治若身甲錯腹皮急按之濡如腫狀或繞臍生瘡者小腸癰也急宜下之或以雲母膏太乙膏作丸服診脈多細小緊急滑為痰弦為食陰弦或緊或尺緊而實或伏者可下細小遲者生堅大疾者數而緊者浮大而長者死痛而喘臍下或大痛人中黑色者不治脅痛或問脅痛從肝治復有可言者乎曰肝病內舍胠脅而脅痛也則何異於心肺內舍膺脅而痛者哉若謂肝實病而胠脅痛也則何異於肝木不及陽明所勝之胠脅痛者哉若謂由是厥陰肝經所過而痛也則何異於足少陽手心主所過而脅痛者哉若謂獨經脈挾邪而痛也則何異於經筋所過而痛者哉豈執一說而可已乎非察色按脈遍識各經氣變雖在一病之中而辨其異狀者卒不能也且夫左右者陰陽之道路也是故肝生於左肺臟於右所以左屬肝肝臟血肝陽也血陰也乃外陽而內陰也上屬肺肺主氣肺陰也氣陽也外陰而內陽也由陰陽互臟其左脅多因留血作痛右脅悉是痰積作痛其兩脅之病又可一概而言乎若論其致病之邪凡外之六淫內之七情勞役飲食皆足以致痰氣積血之病雖然痰氣固亦有流注於左者然必與血相搏而痛不似右脅之痛無關於血也戴云傷寒脅痛屬少陽經合用小柴胡湯痛甚而不大便者於內加枳殼若尋常脅痛不繫正傷寒時身體帶微熱者本事方中枳殼煮散用枳殼桔梗細辛川芎防風各四分乾葛錢半甘草一錢若只是脅痛別無雜證其痛在左為肝經受邪宜用川芎枳殼甘草其痛在右為肝經移病於肺宜用片薑黃枳殼桂心甘草此二方出嚴氏濟生續集加減在人又有肝膽經停痰伏飲或一邊脅痛宜用嚴氏導痰湯痰結成癖間進半硫丸蓋枳殼乃治脅痛的劑所以諸方中皆不可少曾見潘子先說有人脅痛下青龍湯痛止兼嗽得可此其痛必在右脅故也灼然知是寒氣作痛枳實理中湯為宜挾外感風寒有表證宜芎葛湯中脘不快腹脅脹滿香橘湯腹脅疼痛氣促喘急分氣紫蘇飲悲哀傷肝氣引兩脅疼痛枳殼煮散右脅痛推氣散左脅痛枳芎散或柴胡疏肝散死血者日輕夜重或午後熱脈短澀或芤桃仁承氣湯加鱉甲青皮柴胡芎歸之屬若跌撲脅痛者亦是死血宜復元活血湯破血散瘀湯怒氣者脈弦實有力大劑香附合芎歸之屬痰飲停伏者脈沉弦滑導痰湯加白芥子戴云停飲脅痛本事方面丸最佳食積痛凡痛有一條扛起者是也用保和丸或吳茱萸炒黃連神麯麥芽山楂蓬朮三稜青皮發寒熱脅痛覺有積塊當歸龍薈丸經云肝病者兩脅下痛引少腹善怒又云肝氣實則怒左關必弦實鼓擊獨大於諸脈知肝火盛也龍薈丸治肝實脅痛其人氣收者善怒是也甚則用薑汁吞下經云風木淫勝治以辛涼是也因驚傷肝脅痛桂枝散仲景云脅下偏痛發熱其脈弦緊此寒也以溫藥下之宜大黃附子湯煮黃丸治脅下痃癖痛如神控涎丹治一身氣痛及脅走痛痰挾死血加桃仁泥凡脅有痰流注二陳加南星川芎蒼朮實者控涎丹下之枳實散攻中有補虛人可用戴云曾有人脅痛連膈進諸氣藥並自大便導之其痛殊甚後用辛熱補劑下黑錫丹方愈此乃虛冷作痛愈疏而愈虛耳肝氣不足兩脅下滿筋急不得太息四肢厥冷發搶心腹痛目不明瞭爪甲枯口面青宜補肝湯左脅偏痛久宿食不消並目䀮䀮昏風淚出見物不審而逆風寒偏甚宜補肝散肝虛寒脅下痛脹滿氣急目昏濁視物不明其脈遲弱者宜檳榔湯肝氣虛視物不明兩脅脹滿筋脈拘急面色青小腹痛用山茱萸當歸山藥黃耆五味子木瓜川芎各一兩半熟地黃白朮各一兩獨活酸棗仁各四銖為末每三錢匕棗二枚水一盞煎取八分空心服房勞過多腎虛羸怯之人胸膈之間多有隱隱微痛此腎虛不能約氣氣虛不能生血之故氣與血猶水也盛則流暢少則壅滯故氣血不虛則不滯既虛則鮮有不滯者所以作痛宜用破故紙之類補腎芎歸之類和血若作尋常脅痛治即殆矣一人六月途行受熱過勞性又躁暴忽左脅痛皮膚上一片紅如碗大發水泡瘡三五點脈七至而弦夜重於晝醫作肝經鬱火治之以黃連青皮香附川芎柴胡之類進一服其夜痛極且增熱次早視之皮膚上紅大如盤水泡瘡又加至三十餘粒醫教以水調白礬末敷仍於前藥加青黛龍膽草進之夜痛益甚脅中如鉤摘之狀次早視之紅已及半身矣水泡又增至百數乃載以詢黃古潭為訂一方以大栝蔞一枚重一二兩者連皮搗爛加粉草二錢紅花五分進藥少頃即得睡比覺已不痛矣蓋病勢已急而時醫執尋常瀉肝正治之劑又多苦寒愈資其燥故病轉增劇水泡瘡發於外者肝鬱既久不得發越乃侮所不勝故皮腠為之潰也栝蔞味甘寒經云泄其肝者緩其中且其為物柔而滑潤於郁不逆甘緩潤下又如油之洗物未嘗不潔此其所以奏效之捷也歟九靈山房集云里鍾姓者一男子病脅痛眾醫以為癰也投諸香薑桂之屬益甚項彥章診其脈告曰此腎邪病法當先溫利而後竭之投神保丸下黑溲痛止即令更服神芎丸或疑其太過彥章曰向用神保丸以腎邪透膜非全蠍不能引導然巴豆性熱非得芒硝大黃盪滌之後遇熱必再作乃大泄數出病已彥章所以知男子之病者以陽脈弦陰脈微澀弦者痛也澀者腎邪有餘也腎邪上薄於脅不能下且腎方惡燥今以燥熱發之非得利不愈經曰痛隨利減殆謂此也雲中秦文山掌教平湖與家兄同官每患脅痛遇勞忍餓則發介家兄書來求方予為處以人參黃耆白朮當歸川芎地黃牛膝木瓜山茱萸石斛薏苡仁酸棗仁柏子仁桃仁之屬令常服之後來謝云自服藥後積久之疾一朝而愈不復發矣聞魏昆溟吏部亦以勞餓得脅痛無大病也而醫者投以枳殼青皮破氣之藥痛愈甚不數日而殞予故著之以為世戒診合腋張脅者肺下肺下則居賁迫肺善脅下痛青色粗理者肝大肝大則逼胃迫咽則苦膈中且脅下痛凡脅骨偏舉者肝偏傾肝偏傾則脅下痛揭唇者脾高脾高則䏚引季脅而痛寸口脈弦者即脅下拘急而痛其人嗇嗇惡寒也脈雙弦是兩手俱弦也沉澀是郁細緊或弦者怒氣腰痛腎著腰胯痛腰軟六元正紀論云太陽所至為腰痛又云巨陽即太陽也虛則頭項腰背痛足太陽膀胱之脈所過還出別下項循肩膊內挾脊抵腰中故為病項如拔挾脊痛腰似折髀不可以曲是經氣虛則邪客之痛病生矣夫邪者是風熱濕燥寒皆能為病大抵寒濕多而風熱少然有房室勞傷腎虛腰痛者是陽氣虛弱不能運動故也經云腰者腎之腑轉搖不能腎將憊矣宜腎氣丸茴香丸之類以補陽之不足也膏粱之人久服湯藥醉以入房損其真氣則腎氣熱腎氣熱則腰脊痛而不能舉久則髓減骨枯發為骨痿宜六味地黃丸滋腎丸封髓丹之類以補陰之不足也靈樞云腰痛上寒取足太陰陽明上熱取足厥陰不可俯仰取足少陽蓋足之三陽從頭走足足之三陰從足走腹經所過處皆能為痛治之者當審其何經所過分野循其空穴而刺之審何寒熱而藥之假令足太陽令人腰痛引項脊尻背如重狀刺其郄中太陽二經出血余皆仿此彼執一方治諸腰痛者固不通矣有風有濕有寒有熱有挫閃有瘀血有滯氣有痰積皆標也腎虛其本也風傷腎而痛其脈必帶浮或左或右痛無常處牽引兩足宜五積散每服加防風半錢全蠍三個小續命湯獨活寄生湯皆可選用三因方小續命湯加炒去皮桃仁治風腰痛最妙仍吞三仙丹杜仲薑汁炒研末每一錢溫酒調空心服治腎氣腰痛兼治風冷為患名杜仲酒三因又有牛膝酒治腎傷風毒攻刺腰痛不可忍者傷濕而痛如坐水中蓋腎屬水久坐水濕處或為雨露所著兩水相得以致腰痛其脈必帶緩遇天陰或久坐必發身體必帶沉重宜滲濕湯主之不效宜腎著湯或生附湯風濕腰痛獨活寄生湯寒濕腰痛五積散加桃仁川芎肉桂湯麻黃蒼朮湯並摩腰膏濕熱腰痛蒼朮湯獨活湯羌活湯東垣云如身重腰沉沉然乃經中有濕熱也於羌活勝濕湯中加黃柏一錢附子五分蒼朮二錢感寒而痛者腰間如冰其脈必緊見熱則減見寒則增宜五積散去桔梗加吳茱萸半錢或姜附湯加辣桂杜仲外用摩腰膏傷熱而痛者脈必洪數而滑發渴便閉宜甘豆湯加續斷天麻間服敗毒散若因閃挫或攧撲傷損而痛者宜乳香趁痛散及黑神散和復元通氣散酒調下不效則必有惡血停滯宜先用酒調下蘇合香丸仍以五積散加桃仁大黃蘇木各一錢當歸倍原數若因勞役負重而痛宜和氣飲或普賢正氣散或十補湯下青娥丸挫閃腰痛不能轉側用陳久神麯一大塊燒通紅淬老酒去曲以酒通口吞青娥丸仰臥片時未效再服不用丸亦得又方以茴香根同紅曲擂爛好熱酒調服東垣云打撲傷損從高墜下惡血在太陽經中令人腰脊痛或脛腨臂膊中痛不可忍鼻壅塞不通地龍湯主之橘核酒熟大黃湯丹溪治徐質夫年六十因墜馬腰痛不可轉側六脈散大重取則弦小而長稍堅此雖有惡血未可驅逐且以補接為先遂令煎蘇木人參黃耆川芎當歸陳皮木通甘草服至半月飲食漸進遂與前藥調下自然銅等藥一月而安瘀血為病其脈必澀轉側若錐刀之刺大便黑小便赤黃或黑日輕夜重名瀝血腰痛宜調榮活絡飲或桃仁酒調黑神散或四物湯加桃仁紅花之類丹溪用補陰丸中加桃仁紅花主之氣滯而痛其脈必沉宜人參順氣散或烏藥順氣散加五加皮木香入少甘草煎湯調下或用降真香檀香沉香共一兩重煎湯空心服痰注而痛其脈必滑或伏宜二陳湯加南星香附烏藥枳殼主之食積腰腿痛用龜板酒炙柏葉酒製香附五錢辣芥子凌霄花一錢五分酒糊丸煎四物湯加陳皮甘草一分吞下食積痰積如氣實脈有力者宜下之威靈仙治痛之要藥為細末每服二錢豬腰子一隻批開摻藥在內濕紙包煨熟五更細嚼熱酒下以微利為度本事方治五般腰痛用胡桃肉五個去皮殼研為膏五靈脂黑牽牛炒白牽牛炒各三錢狗脊微炒半兩萆薢炒三錢沒藥三十文巴豆五粒用濕紙包煨取肉去油上為末入前胡桃膏醋糊丸如桐子大每服十五丸風腰疼豆淋無灰酒下氣腰疼煨蔥白酒下血腰疼當歸酒下打撲腰疼蘇木酒下張子和治趙進道病腰疼一年不愈診其兩手脈沉重有力以通經散陳皮當歸甘遂為末每三錢臨臥溫酒調下下五七行次以杜仲去粗皮細切炒斷絲為末每服三錢豬腰子一枚薄批五七片先以椒鹽淹去腥水摻藥在內裹以荷葉以濕紙數重封文武火燒熟臨臥細嚼溫酒送下每旦以無比山藥丸一服數日而愈治腰痛牽引足膝腳膕屢用神效杜仲薑汁炒去絲續斷黑牽牛破故紙桃仁炒去皮尖玄胡索各等分為細末酒煮麵糊胡桃肉和丸如桐子大每服五七十丸食前溫酒白湯任下以上俱用下藥實者宜之腰胯連腳膝曉夜疼痛宜虎骨散補骨脂丸百倍丸養腎散選而用之大抵諸腰痛皆起腎虛既挾邪氣則須除其邪如無外邪積滯而自痛則惟補腎而已腰肢痿弱身體疲倦腳膝痠軟脈或洪或細而皆無力痛亦攸攸隱隱而不甚是其候也亦分寒熱二證脈細而無力怯怯短氣小便清利是為陽虛宜腎氣丸茴香丸鹿茸羊腎之屬或以大建中湯加川椒十粒吞下腰腎丸及生料鹿茸丸之類仍以茴香炒研末破開豬腰子作薄片勿令斷層層摻藥末水紙裹煨熟細嚼酒咽此皆所以補陽之不足也其脈洪而無力小便黃赤虛火時炎是謂陰虛東垣所謂膏粱之人久服湯藥醉以入房損其真氣則腎氣熱腎氣熱則腰脊痛而不能舉久則髓減骨枯發為骨痿宜六味丸滋腎丸封髓丹補陰丸之類以補陰之不足也楊仁齋云經云腰者腎之腑轉搖不能腎將憊矣審如是則病在少陰必究其受病之源而處之為得雖然宗筋聚於陰器肝者腎之同系也五臟皆取氣於谷脾者腎之倉廩也鬱怒傷肝則諸筋縱弛憂思傷脾則胃氣不行二者又能為腰痛之冠故並及之鬱怒傷肝發為腰痛宜調肝散主之憂思傷脾發為腰痛宜沉香降氣湯和調氣散薑棗煎主之煨腎丸治肝腎損及脾損穀不化腰痛不起者神效又有沮銼失志傷腎而痛者和劑七氣湯多加白茯苓少加乳香沉香主之瘧痢後腰痛及婦人月經後腰痛俱屬虛宜補於補氣血藥中加杜仲側柏葉主之丹溪云久腰痛必用官桂開之方止腹脅痛亦然橘香丸治腰痛經久不瘥亦用官桂開之之意也腎著腎著為病其體重腰冷如冰飲食如故小便自利腰以下冷痛如帶五千錢治宜流濕兼用溫散腎著湯腰胯痛腰痛足太陽膀胱經也胯痛足少陽膽經之所過也若因傷於寒濕流注經絡結滯骨節氣血不和而致腰胯痛者宜除濕丹或滲濕湯加芍藥青皮蒼朮檳榔有痰積鬱滯經絡流搏瘀血內亦作痛用導痰湯加檳榔青皮芍藥實者禹攻散濕執腰胯作疼宜清濕散腰軟丹溪以為腎肝伏熱治宜黃柏防己診大者腎虛澀為瘀血緩為寒濕或滑或伏為痰尺沉為腰背痛尺脈沉而弦沉為滯弦為虛沉弦而緊為寒沉弦而浮為風沉弦而澀細為濕沉弦而實閃肭腎憊及盛怒傷志則腰失強不能轉搖而死經云腎者腰之腑轉搖不能腎將憊矣得強者生失強者死又云腎盛怒而不止則傷志志傷則善忘其前言腰脊不可以俯仰屈伸毛悴色夭死於季夏是也脊痛脊強內經刺灸脊痛脊強有三法其一取督脈經云督脈之別名曰長強別走太陽實則脊強取之所別也其二取足太陽經曰厥挾脊而痛至頂頭沉沉然目䀮䀮然腰脊強取足太陽膕中血絡是也其三取小腸經云小腹控睪引腰脊上衝心邪在小腸取之肓原以散之刺太陰以予之取厥陰以下之取巨虛下廉以去之是也脊痛項強腰似折項似拔沖頭痛乃足太陽經不行也羌活勝濕湯主之打撲傷損從高墜下惡血在太陽經中腰脊痛不可忍地龍湯主之肩背痛肩背分野屬肺經云西風生於秋病在肺腧在肩背故秋氣者病在肩背又云肺病者喘咳逆氣肩背痛汗出又云秋肺太過為病在外則令人逆氣背痛慍慍然又云肺手太陰之脈氣盛有餘則肩背痛風寒汗出氣虛則肩背痛寒少氣不足以息此肺金自病也經云歲火太過民病肩背熱又云少陰司天熱淫所勝病肩背臑缺盆中痛此肺金受火邪而病也經云邪在腎則病肩背頸項痛取之湧泉崑崙視有血者盡取之是腎氣逆上而痛也東垣云肩背痛不可回顧此手太陽氣鬱而不行以風藥散之脈經云風寒汗出肩背痛中風小便數而欠者風熱乘其肺使肺氣鬱甚也當瀉風熱以通氣防風湯主之按風寒汗出而肩背痛小便數者既以瀉風熱之藥通肺氣之壅則寒熱氣不足以息而肩背痛小便遺失者當以人參黃耆之屬補肺氣之虛不言可知也濕熱相搏肩背沉重而疼者當歸拈痛湯當肩背一片冷痛背膂疼痛古方用神保丸愈者此有積氣故也其人素有痰飲流注肩背作痛宜星香散或導痰湯下五套丸有腎氣不循故道氣逆挾脊而上致肩背作痛宜和氣飲加鹽炒小茴香半錢炒川椒十粒或看書對奕久坐而致脊背疼者補中益氣湯或八物湯加黃耆有素虛人及病後心膈間痛或牽引乳脅或走注肩背此乃元氣上逆當引使歸元不可復下疏刷之劑愈刷愈痛發汗人患此者眾惟宜溫補拘於氣無補法之說誤矣汗者心之液陽受氣於胸中汗過多則心液耗陽氣不足故致疼也丹溪治一男子忽患背胛縫有一線疼起上跨肩至胸前側脅而止其痛晝夜不息不可忍其脈弦而數重取豁大左大於右夫胛小腸經也胸脅膽經也此必思慮傷心心臟未病而腑先病故痛從背胛起及慮不能決又歸之膽故痛至胸脅而止乃小腸火乘膽木子來乘母是為實邪詢之果因謀事不遂而病以人參四錢木通二錢煎湯下龍薈丸數服而愈診脈洪大洪為熱大為風脈促上擊者肩背痛脈沉而滑者背膂痛臂痛手氣手腫痛臂痛有六道經絡究其痛在何經絡之間以行本經藥行其氣血血氣通則愈矣以兩手伸直其臂貼身垂下大指居前小指居後而定之則其臂臑之前廉痛者屬陽明經以升麻白芷乾葛行之後廉痛者屬太陽經以藁本羌活行之外廉痛者屬少陽經以柴胡行之內廉痛者屬厥陰經以柴胡青皮行之內前廉痛者屬太陰經以升麻白芷蔥白行之內後廉痛者屬少陰經以細辛獨活行之並用針灸法視其何經而取之臂為風寒濕所搏或飲液流入或因提挈重物皆致臂痛有腫者有不腫者除飲證外其餘諸痛並可五積散及烏藥順氣散或蠲痹湯若坐臥為風濕所搏或睡後手在被外為寒邪所襲遂令臂痛宜五積散及蠲痹湯烏藥順氣散審知是濕蠲痹湯每服加蒼朮三匙防己四分或用五痹湯曾有挈重傷筋以致臂痛宜琥珀散劫勞散或和氣飲每服加白薑黃半錢以薑黃能入臂故也痰飲流入四肢令人肩背痠疼兩手軟痹醫誤以為風則非其治宜導痰湯加木香薑黃各半錢如未效輕者指迷茯苓丸重者控涎丹控涎丹加去油木鱉子一兩桂五錢治臂痛每服二十丸加至三十丸外有血虛不榮於筋而致臂痛宜蠲痹湯四物湯各半帖和勻煎服有氣血凝滯經絡不行而致臂痛宜舒筋湯治臂痛半夏一錢陳皮半錢茯苓五分蒼朮二錢威靈仙五分酒芩白朮南星香附各一錢甘草少許紅花神麯炒為末薑黃四兩甘草羌活各一兩白朮二兩茯苓丸治臂痛如神赤茯苓防風細辛白朮澤瀉官桂各半兩栝蔞根紫菀附子黃耆芍藥甘草炙各七錢半生地黃牛膝酒浸山芋獨活半夏酒浸山茱萸各二錢半為細末煉蜜丸如桐子大每服十丸溫酒下手氣手腫痛或掌指連臂膊痛宜五痹湯蠲痹湯薄桂味淡能橫行手臂令他藥至痛處白薑黃能引至手臂尤妙身體痛身體拘急體痛謂一身盡痛傷寒霍亂中暑陰毒濕痹痛痹皆有體痛但看兼證及問因診脈而別之治法已分見各門其留連難已者於此求之寒而一身痛者甘草附子湯熱者拈痛湯內傷勞倦飲食兼感風濕相搏一身盡痛者補中益氣湯加羌活防風升麻藁本蒼朮治之濕熱相搏肩背沉重疼痛上熱胸膈不利遍身疼痛宜拈痛湯陰室中汗出懶語四肢困倦乏力走注疼痛乃下焦伏火不得伸浮而躁熱汗出一身盡痛蓋風濕相搏也以麻黃髮汗漸漸發之在經者亦宜發汗況值季春之月脈緩而遲尤宜發之令風濕去而陽氣升困倦乃退血氣俱得生旺也麻黃復煎湯主之丹溪用蒼朮一兩黃柏半兩羌活威靈仙各二錢半姜擂服遍身皆痛如勞證者本事方用黃耆人參甘草附子炮羌活木香知母芍藥川芎前胡枳殼桔梗白朮當歸茯苓半夏制以上各五錢柴胡鱉甲醋炙各一兩桂心酸棗仁各三分杏仁炒半兩上為末每服四錢水一盞姜三片棗二個烏梅三枚蔥白三寸同煎至七分空心溫服但少年虛損冷憊老人諸疾並皆治之惟傷寒身體痛者不可服活血丹與四物蒼朮各半湯相表裡治遍身骨節疼痛如神身體拘急皆屬寒與寒濕風濕經云諸寒收引皆屬於腎又云太陰司天之政民病寒厥拘急初之氣風濕相搏民病經絡拘強關節不利治法蓋小續命湯仲景三黃湯之類是也診傷寒太陽經表證六脈俱緊陰毒傷寒身如被杖脈沉緊傷寒發汗後身體痛氣血未和脈弦遲傷濕流關節一身盡痛風濕相搏肢體重痛不可轉側脈緩虛勞人氣血虛損脈弦小或豁大痿痹門痹內經謂風寒濕三氣雜至合而為痹其風勝者為行痹行痹者行而不定也稱為走注疼痛及歷節之類是也寒氣勝者為痛痹痛痹者疼痛苦楚世稱為痛風及白虎飛屍之類是也濕氣勝者為著痹著痹者著而不移世稱為麻木不仁之類是也痹者閉也五臟六腑正氣為邪氣所閉則痹而不仁靈樞云病人一臂不遂時復移在一臂者痹也非風也要略曰風病當半身不遂若但臂不遂者痹也以冬遇此為骨痹以春遇此為筋痹以夏遇此為脈痹以至陰遇此為肌痹以秋遇此為皮痹凡風寒濕所為行痹痛痹著痹之病又以所遇之時所客之處而命其名非此行痹痛痹著痹之外又別有骨痹筋痹脈痹肌痹皮痹也陳無擇云三氣襲人經絡入於骨則重而不舉入於脈則血凝不流入於筋則屈而不伸入於肉則不仁入於皮則寒久不已則入五臟煩滿喘嘔者肺也上氣嗌乾厥脹者心也多飲數溲夜臥則驚者肝也尻以代踵脊以代頭者腎也四肢懈惰發咳嘔沫者脾也大抵顯臟證則難治矣又有腸痹胞痹及六腑各有俞風寒濕所中治之隨其腑俞以施針灸之法仍服發散等劑則病自除又有血痹周痹支飲作痹皆以類相從也風痹者遊行上下隨其虛邪與血氣相搏聚於關節筋脈弛縱而不收宜防風湯寒痹者四肢攣痛關節浮腫宜五積散濕痹者留而不移汗多四肢緩弱皮膚不仁精神昏塞宜茯苓川芎湯熱痹者臟腑移熱復遇外邪客搏經絡留而不行陽遭其陰故𤸷痹熻然而悶肌肉熱極體上如鼠走之狀唇口反裂皮膚色變宜升麻湯三氣合而為痹則皮膚頑厚或肌肉痠痛此為邪中周身搏於血脈積年不已則成癮疹風瘡搔之不痛頭髮脫落宜疏風涼血之劑腸痹者數飲而小便不通中氣喘爭時作餐泄宜五苓散加桑皮木通麥門冬或吳茱萸散胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕宜腎著湯腎瀝湯血痹者邪入於陰血之分其狀體常如被風所吹骨弱勞瘦汗出臥則不時搖動宜當歸湯周痹者在血脈之中上下游行周身俱痛也宜蠲痹湯支飲者手足麻痹臂痛不舉多睡眩冒忍尿不便膝冷成痹宜茯苓湯五臟痹宜五痹湯肝痹加酸棗仁柴胡心痹加遠志茯苓麥門冬犀角脾痹加厚朴枳實砂仁神麯肺痹加半夏紫菀杏仁麻黃腎痹加獨活官桂杜仲牛膝黃耆萆薢痹在五臟之合者可治其入藏者死診粗理而肉不堅者善病痹關中薄澤為風沖濁為痹浮絡多青則痛黑則痹絡脈暴黑者留久痹也脈大而澀為痹脈來急亦為痹肺脈微大為肺痹引胸背起惡日光心脈微為心痹引背善淚出右寸沉而遲澀為皮痹左寸結不流利為血痹右關脈舉按皆無力而澀為肉痹左關弦緊而數浮沉有力為筋痹遲為寒數為熱濡為濕滑為痰豁大弦小為虛行痹即走注疼痛行痹走注無定防風湯主之黃柏蒼朮各二錢各用酒炒煎就調酒威靈仙末羚羊角灰臣蒼朮佐芥子使用姜一片入藥末一錢擂碎以前藥再溫服東垣云身體沉重走注疼痛濕熱相搏而風熱鬱不得伸附著於有形也宜蒼朮黃柏之類濕傷腎腎不養肝肝自生風遂成風濕流注四肢筋骨或入左肩髃肌肉疼痛漸入左指中薏苡仁散主之兩手十指一指疼了一指疼疼後又腫骨頭裡痛膝痛左膝痛了右膝痛發時多則五日少則三日晝輕夜重痛時覺熱行則痛輕腫卻重解云先血後氣乃先痛後腫形傷氣也和血散痛湯主之走注又與歷節不同歷節但是肢節疼痛未必行也綱目未免混淆今以專主走注疼痛方具於後如意通聖散虎骨散桂心散仙靈脾散沒藥散小烏犀丸沒藥丸虎骨丸十生丹骨碎補丸定痛丸八神丹一粒金丹乳香應痛丸地龍一兩去土炒水蛭半兩糯米內炒熟麝香二錢半另研上為細末每服一錢以溫酒調下不拘時候外貼方牛皮膠一兩水熔成膏蕓薹子安息香川椒附子各半兩為細末入膠中和成膏塗紙上隨痛處貼之萆麻子一兩去皮草烏頭半兩乳香一錢另研上以豬肚脂煉去沫成膏方入藥攪勻塗摩攻注之處以手心摩娑如火之熱卻塗摩患處妙陳無擇云凡人忽胸背手腳頸項腰膝隱痛不可忍連筋骨牽引鉤痛坐臥不寧時時走易不定俗醫不曉謂之走注便用風藥及針灸皆無益又疑是風毒結聚欲為癰疽亂投藥餌亦非也此是痰涎伏在心膈上下變為疾或令人頭痛不可舉或神思昏倦多睡或飲食無味痰唾稠黏夜間喉中如鋸聲口流涎唾手腳重腿冷痹氣不通誤認為癱瘓亦非也凡有此疾但用控涎丹不過數服其疾如失痰挾死血丹溪控涎散痛痹即痛風留著之邪與流行榮衛真氣相擊搏則作痛痹若不幹其流行出入之道則不痛但痿痹耳隨其痹所在或陽多陰少則為痹熱或陰多陽少則為痹寒雖曰風寒濕三氣雜至合而為痹至四時刺逆從篇於六經皆云有餘不足悉為痹注曰痹痛也此非人氣之邪亦作痛耶且人身體痛在外有皮肉脈筋骨之異由病有不同之邪亦各欲正其名名不正將何以施治如邪是六淫者便須治邪是人氣者便須補瀉其氣病在六經四屬者各從其氣故制方須分別藥之輕重緩急適當其所庶得經意有風有濕有痰有火有血虛有瘀血診其脈浮者風也緩細者濕也滑者痰也洪大者火也芤者血虛也澀者瘀血也因於風者加減小續命湯或烏藥順氣散去乾薑加羌活防風因於濕者遇陰雨即發身體沉重宜除濕蠲痛湯佐以竹瀝薑汁或大橘皮湯傷濕而兼感風寒者汗出身重惡風喘滿骨節煩疼狀如歷節風臍下連腳冷痹不能屈伸宜防己黃耆湯或五痹湯因痰者王隱君豁痰湯二陳湯加薑汁竹瀝甚者控涎丹因火者潛行散加竹瀝因濕熱者二妙散因於血虛者四物蒼朮各半湯吞活血丹因瘀血者芎歸桃仁紅花水蛭入麝香少許肥人多濕痰瘦人多血虛與熱上部痛羌活桂枝桔梗威靈仙下部痛牛膝防己木通黃柏上部腫痛五積散烏藥順氣散加薑蔥煎發其汗下部腫痛五苓八正大橘皮湯加燈心竹葉利小便若腫痛而大便不通者大柴胡湯防風通聖散主之大勢既退當隨其所因之本病施治防其再發忌羊肉法酒濕面房勞寒濕相合腦戶痛惡寒項筋脊強肩背胛卵痛膝臏痛無力行步能食身沉重其脈沉緩洪上急宜蒼朮復煎散目如火腫痛兩足及伏兔骨筋痛膝少力身重腰痛夜惡寒痰嗽項頸筋骨皆急痛目多眵淚食不下宜緩筋湯風濕客於腎經血脈凝滯腰背腫疼不能轉側皮膚不仁遍身麻木上項頭目虛腫耳內常鳴下注腳膝重痛少力行履艱難項背拘急不得舒暢宜活血應痛丸晝則靜夜則動其痛徹骨如虎之齧名曰白虎病痛如掣者為寒多腫滿如脫者為濕多汗出者為風多於上藥中求之通用虎骨二兩犀角屑沉香青木香當歸赤芍藥牛膝羌活秦艽骨碎補桃仁各一兩甘草半兩槲葉一握每服五錢水煎臨服入麝香少許一人感風濕得白虎歷節風證遍身抽掣疼痛足不能履地者三年百方不效一日夢與木通湯愈遂以四物湯加木通服不效後以木通二兩銼細長流水煎汁頓服服後一時許遍身癢甚上體發紅丹如小豆大粒舉家驚惶隨手沒去出汗至腰而止上體不痛矣次日又如前煎服下體又發紅丹方出汗至足底汗乾後通身舒暢而無痛矣一月後人壯氣復步履如初後以治數人皆驗蓋痛則不通通則不痛也熨法靈樞經寒痹之為病也留而不去時痛而皮不仁刺布衣者以火焠之刺大人者以藥熨之用醇酒二十斤蜀椒一升乾薑一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈並納酒中置酒馬矢熅中蓋封塗勿使泄五日五夜出布綿絮曝乾之干復漬以盡其汁每漬必晬其日乃出干之並用查與綿絮復布為復巾長六七尺為六七巾則用之生桑炭炙巾以熨寒痹所刺之處令熱入至於病所寒復炙布以熨之三十遍而止汗出以巾拭其身亦三十遍而止起步內中無見風每刺必熨如此病已矣此所謂內熱也內熱之內音納外臺方以三年釅醋五升熱煎三四沸切蔥白二三升煮一沸濾出布帛熱裹當病上熨之瘥為度熏洗法用樟木屑一斗置大桶內桶邊放一兀凳以急流水一擔熬沸泡之桶內安一矮凳子令人坐桶邊放腳在桶內外以草荐圍之勿令湯氣入眼肢節腫痛痛屬火腫屬濕兼受風寒而發動於經絡之中流注於肢節之間用麻黃去節赤芍藥各一錢防風荊芥羌活獨活白芷蒼朮威靈仙酒片芩枳實桔梗葛根川芎各五分當歸甘草升麻各二分下焦加酒黃柏腫多加檳榔大腹皮痛多加沒藥婦人加酒紅花風濕相搏肢節疼痛宜大羌活湯金匱方諸肢節疼痛身體尫羸腳腫如脫頭眩短氣兀兀欲吐桂枝芍藥知母湯主之肥人多是風濕與痰飲流注經絡而痛宜南星半夏瘦人是血虛與熱四物加防風羌活酒芩瘦人或性急躁而痛發熱是血熱四物加酒炒芩柏脈濡滑者用燥濕蒼朮南星兼行氣以木香枳殼檳榔脈澀數為瘀血芎歸桃仁泥紅花加大黃微利之倦怠無力而痛用參朮南星半夏之類風熱成歷節攻手指作赤腫麻木甚則攻肩背兩膝遇暑熱或大便秘即作宜牛蒡子散此病胸膈生痰久則赤腫附著肢節久久不退遂成癘風宜早治之著痹即麻木原病式列麻證在六氣燥金諸澀條下釋之曰物得濕則滑澤干則澀滯麻猶澀也由水液聚少而燥澀氣行壅滯而不得滑澤通行氣強攻衝而為麻也俗方治麻病多用烏附者令氣行之暴甚以故轉麻因之衝開道路以得通利而麻愈也然六氣不必一氣獨為病氣有相兼若亡液為燥或麻木無熱證即當此法或風熱勝濕為燥因而病麻則宜以退風散熱活血養液潤燥通氣之涼藥調之東垣則曰麻者氣之虛也真氣弱不能流通填塞經絡四肢俱虛故生麻木不仁或在手或在足或通身皮膚盡麻者皆以黃耆人參白朮甘草五味芍藥當歸升麻柴胡之類隨時令所兼之氣出入為方但補其虛全不用攻衝之劑竊詳劉李二公生同時居同地無世運方土之異宜何乃凡病遽有補攻之別如此蓋因悟入聖人之道不同劉以人稟天賦本無虧欠因邪入攪亂其氣而後成病所以攻邪為要邪退則正氣自安李以人之真氣榮養百骸周於性命凡真氣失調少有所虧則五邪六淫便得乘間而入所以補正為要正復則邪氣自卻今宜酌量二公之法當攻當補從中調治無執泥其說丹溪又分麻木為二以麻止習習然尚無氣血攻衝不行之狀木則氣血已痹不仁莫知其痛癢也癘風初起者其手足必先木而後皮膚瘍潰與夫癱瘓者手足亦時麻木當自求之本門素問曰榮氣虛則不仁衛氣虛則不用榮衛俱虛則不仁且不用靈樞曰衛氣不行則為麻木東垣治麻痹必補衛氣而行之蓋本諸此渾身麻木不仁或左或右半身麻木或面或頭或手臂或腳腿麻木不仁並神效黃耆湯皮膚間有麻木此肺氣不行也芍藥補氣湯如肌肉麻必待瀉營氣而愈如濕熱相合四肢沉痛當瀉濕熱治杜彥達左手右腿麻木右手大指次指亦常麻木至腕已三四年矣諸醫不效求治明之明之遂制人參益氣湯服二日便覺手心熱手指中間如氣滿脹至三日後又覺兩手指中間皮肉如不敢觸者似癢痛滿脹之意指上瑟瑟不敢用手擦旁觸之此真氣遍至矣遂於兩手指甲旁各以三稜針一刺之微見血如黍黏許則痹自息矣又為處第二第三服之大效左腿麻木沉重除濕補氣湯金匱方血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀黃耆桂枝五物湯主之李正臣夫人病診得六脈中俱弦洪緩相合按之無力弦在其上是風熱下陷入陰中陽道不行其證閉目則渾身麻木晝減而夜甚覺而目開則麻木漸退久則絕止常開其目此證不作懼其麻木不敢閤眼故不得眠身體皆重時有痰嗽覺胸中常是有痰而不利時煩躁氣短促而喘肌膚充盛飲食大小便如常惟畏麻木不敢閤眼為最苦觀其色脈形病相應而不逆內經曰陽盛瞋目而動輕陰病閉目而靜重又云諸脈皆屬於目靈樞曰開目則陽道行陽氣遍布周身閉目則陽道閉而不行如晝夜之分知其陽衰而陰旺也且麻木為風雖三尺之童皆以為然細校之則非如久坐而起亦有麻木假為繩繫縛之人釋之覺麻木作而不敢動久則自已以此驗之非有風邪乃氣不行也不須治風當補其肺中之氣則麻木自去矣知其經脈陰火乘其陽分火動於中為麻木也當兼去陰火則愈矣時痰嗽者秋涼在外濕在上作也當實其皮毛以溫劑身重脈緩者濕氣伏匿而作也時見躁作當升陽助氣益血微瀉陰火去濕通行經脈調其陰陽則已非五臟六腑之本有邪也補氣升陽和中湯主之李夫人立冬嚴霜時得病四肢無力乃痿厥濕熱在下焦也醋心者是濁氣不降欲滿也閤眼麻木者陽道不行也開眼不麻木者目開助陽道故陰寒之氣少退也頭旋眩暈者風氣下陷於血分不伸越而作也溫經除濕湯主之濕氣風證不退眩運麻木不已除風濕羌活湯主之停蓄支飲手足麻痹多睡昡冒茯苓湯主之本事方治風寒濕痹麻木不仁粥法川烏生為末用白米作粥半碗入藥末四錢同米用慢火熬熟要稀薄不要稠下薑汁一茶匙許蜜三大匙攪勻空心啜之溫為佳如是濕更入薏苡仁二錢增米作一鍾服此粥治四肢不隨痛重不能舉者左氏曰風淫末疾謂四肢為四末也脾主四肢風邪客於肝則淫脾脾為肝克故疾在末穀氣引風濕之藥徑入脾經故四肢得安然必真有風寒中於衛氣致衛氣不行而不仁者外必有惡風寒等證然後可服榮虛衛實肌肉不仁致令𤸷重名曰肉苛宜前胡散苦參丸丹溪曰手麻是氣虛木是濕痰死血十指麻木胃中有濕痰死血氣虛者補中益氣湯或四君子加黃耆天麻麥門冬川歸濕痰者二陳湯加蒼白朮少佐附子行經死血者四物湯加桃仁紅花韭汁戴人以苦劑湧寒痰次與淡劑白朮除濕茯苓利水桂伐木薑附寒勝加之內經針灸著痹分新久新者湯熨灸之久者焠針刺之取三里陝帥郭巨濟偏枯二指著痹足不能伸迎潔古治之以長針刺委中深至骨而不知痛出血一二升其色如墨又且繆刺之如是者六七次服藥三月病良愈大理少卿韓珠泉遍身麻痹不能舉動求治於予予以神效黃耆湯方加減授之用耆一兩二錢參芍各六錢他稱是一服減半彼欲速效遂並兩劑為一服之旬日而病如失矣予以元氣初復宜靜以養之完固而後可出渠不能從盛夏遽出見朝謁客勞頓累日偶從朝房出上馬忽欲墜僕從者扶至陳虛舟比部寓邀予視之予辭不治數日而歿嗚呼行百里者半於九十可不戒哉痿痿者手足痿軟而無力百節緩縱而不收也聖人以痿病在諸證為切要故特著篇目分五臟之熱名病其所屬皮脈筋肉骨之痿致足不任於地及敘五臟得熱之邪則以一臟因一邪所傷觀其微旨是用五志五勞六淫從臟氣所要者各舉其一以為例耳若會通八十一篇而言便見五勞五志六淫盡得成五臟之熱以為痿也何則言肺氣熱則皮痿因有所失亡所求不得者與他篇之謂始富後貧雖不傷邪皮焦筋屈痿躄為攣者同是一於七情之不揚若病機之謂諸痿喘嘔諸氣憤郁皆屬於上者言之即此可推何熱而不為痿何脈而不為熱也如言心氣熱為脈痿因得之悲哀太甚陽氣內動而血崩大經空虛乃為脈痿此以心為神明之官主脈為要者言也及乎推之五臟各有神各有志若怒則氣上逆甚則嘔血之類亦五志所動以熱傷血血逆行於經脈亦必空虛有若形樂志苦病生於脈則是五志皆得以痿其脈不獨悲哀一因也且五志之在各臟自傷其所屬若怒甚筋縱其若不容與形樂志樂病生於肉形苦志樂病生於筋又若憂恐喜怒因太虛則五臟相乘故病有五五二十五變皆至於大骨枯槁大肉陷下之病其神志在五臟之為熱病者不可勝計如言肝臟氣熱因思想無窮所願不得猶肺之所求不得也其入房太甚宗筋弛縱亦猶腎之遠行勞倦也即此可見五勞各得傷其五臟所合之皮肉筋骨矣如言脾臟氣熱因得之有漸於濕以水為事者若歲運太陰濕土司天在泉之濕皆致肌肉痿足痿不收此是從五臟中舉外感者為例耳諸臟皆然少陰之復為骨痿少陽之復為脈痿陽明司天之政四之氣亦為骨痿厥陰司天風氣下臨脾氣上從而為肌肉痿有因於濕首如裹濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿靈樞有八風之變或傷筋或傷肉或傷骨與邪客筋骨間者熱多則筋弛骨消肉爍夫其外淫而生五臟痿病者如此然有不言邪止從經臟之虛而論者謂脾病者身重肌肉痿足痿不收行善瘛謂腎虛者為跛為痱謂三陽有餘三陰不足為偏枯謂足少陽之別虛則痿蹷坐不能起足陽明之別虛則足不收脛枯又有飲食所傷味過於咸則大骨氣勞味過於辛則筋脈沮弛與夫膏粱之人病偏枯痿厥以上所陳止就本條足痿不用者言耳至若五臟盡熱神昏仆倒手足俱不用世俗所謂癱瘓者豈非亦是痿之大者也又若下條肺痿之為臟病者而經又有心氣痿者死則是五臟盡有其痿蓋可知矣原病式論小便遺失謂肺熱客於腎部干於足厥陰之經而氣血不得宣通則痿痹故神無所用而不遂其機因致溲便遺失由是論之凡神機氣血或劣弱或閉塞即臟腑經絡四屬若內若外隨處而不用故內經重其事疊出諸篇後之覽者竟失其旨集方論者或並見虛勞證或並見風門賴丹溪始發揮千餘年之誤表而出之而復語焉不詳可惜也曰痿論陽明衝脈合宗筋會於氣街因陽明虛故宗筋縱帶脈不引而足痿所以獨取陽明今子歷陳受病之邪及諸痿證又將若之何治曰聖人凡語其一推之而可十可百豈惟足痿而已乎所謂各補其滎而通其俞調其虛實和其逆順者則治邪之法盡在其中矣所云筋脈骨肉各以其時受月則病已者治四屬內外諸痿之法亦在其中矣然而諸痿之病未有不因陽明虛而得者何以言之按靈樞有謂真氣所受於天與穀氣並而充身也又謂谷始入於胃之兩焦以溉五臟別出兩行榮衛之道其大氣之搏而不行者積於胸中命曰氣海素問則謂足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陰陽明者表也五臟六腑之海也亦為之行氣於三陽臟腑各因其經而受氣於陽明故為胃行其津液四肢不得稟水穀氣日以益衰陰道不利筋骨肌肉無氣以生故不用焉而衝脈者出於腎下與任脈起於胞中治血海亦云為五臟六腑之海也五臟六腑皆稟焉其上行者滲三陽灌諸精其下行者滲三陰灌諸絡而溫肌肉與陽明宗筋會於氣衝因言陽明虛則宗筋縱帶脈不引故足痿不用也即此而觀真氣者天之道也穀氣者地之道也地非天不生天非地不成是故真氣與穀氣並而後生成形氣之道立矣故陽明虛於五臟無所稟則不能行血氣營陰陽濡筋骨利關節氣海無所受則衛氣不能溫分肉充皮膚肥腠理司開闔血海無所受則上下內外之絡脈空虛於是精神氣血之奉生身周於性命者劣弱矣故百體中隨其不得受水穀氣處則不用而為痿治痿不獨取陽明而何哉丹溪云肺金體燥居上而主氣畏火者也脾土性濕居中而主四肢畏木者也火性炎上若嗜欲無節則水失所養火寡於畏而侮所勝肺得火邪而熱矣木性剛急肺受熱邪則金失所養木寡於畏而侮所勝脾得木邪而傷矣肺熱則不能管攝一身脾傷則四肢不能為用而諸痿作矣瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此駱龍吉亦曰風火相熾當滋腎水東垣先生取黃柏為君黃耆等藥為輔佐而無一定之方有兼痰積者有濕多者有熱多者有濕熱相半者有挾寒者臨病制方其善於治痿乎雖然藥中肯綮矣若將理失宜聖醫不治也天產作陽厚味發熱凡病痿者若不淡薄滋味吾知其必不能安全也按丹溪以難經瀉南補北之法摘為治痿之方亦是舉其例耳若胃口不開飲食少進者當以芳香辛溫之劑進之不可拘於此例宜藿香養胃湯主之況依內經當分五臟肺熱葉焦則皮毛虛弱急薄著則生痿躄肺者臟之長為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦故曰五臟因肺熱葉焦發為痿躄又曰肺熱者色白而毛敗宜黃耆天麥門冬石斛百合山藥犀角通草桔梗枯芩梔子仁杏仁秦艽之屬主之心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地悲哀太甚則胞絡絕胞絡絕則陽氣內動發則心下崩數溲血也故本病曰大經空虛發為肌痹傳為脈痿又曰心熱者色赤而絡脈溢宜鐵粉銀屑黃連苦參龍膽石蜜牛黃龍齒秦艽白蘚皮牡丹皮地骨皮雷丸犀角之屬主之肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫故下經曰筋痿者生於肝使內也又曰肝熱者色蒼而爪枯宜生地黃天門冬百合紫葳白蒺藜杜仲萆薢菟絲子川牛膝防風黃芩黃連之屬主之又方治筋痿兩手握固無力兩腿行動無力急飢食少口舌生瘡忽生痰涎忽然睡中涎溢身上躁熱忽時憎寒項頸強急小便赤白不定大腑忽冷忽熱不調用連翹防風荊芥穗蔓荊子羌活獨活牡丹皮山梔仁秦艽麻黃去根木香各等分為細末每服一錢食後白湯調下脾氣熱則胃干而渴肌肉不仁發為肉痿有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿故下經曰肉痿者得之濕地也又曰脾熱者色黃而肉蠕動宜蒼白朮二陳入霞天膏之屬主之腎氣熱則腰脊不舉骨枯而髓減發為骨痿有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不勝火則骨枯而髓虛故足不任身發為骨痿故下經曰骨痿者生於大熱也又曰腎熱者色黑而齒槁宜金剛丸腎肝俱損骨痿不能起於床筋弱不能收持宜益精緩中宜牛膝丸加味四斤丸腎肝脾俱損穀不化宜益精緩中消穀宜煨腎丸丹溪云痿屬濕熱有濕痰者有氣虛者有血虛者有食積妨礙不降者有死血者濕熱東垣健步丸加黃柏蒼朮黃芩或清燥湯濕痰二陳加蒼朮黃柏之類入竹瀝薑汁血虛四物湯加蒼朮黃柏下補陰丸氣虛四君子湯加蒼朮黃柏氣血俱虛十全大補湯食積木香檳榔丸死血桃仁紅花蓬朮歸梢赤芍藥之類痿病食積妨礙不得降者亦有死血者俱宜下之保命集云四肢不舉俗曰癱瘓經所謂脾太過則令人四肢不舉又曰土太過則敦阜阜高也敦厚也既厚而又高則令除去此真所謂膏粱之疾其治則瀉令氣弱陽衰土平而愈或三化湯或調胃承氣湯選而用之若脾虛則不用也經所謂土不及則卑陷卑下也陷坑也故脾病四肢不舉四肢皆稟氣於胃而不能至經必因於脾乃得稟受今脾病不能與胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉其治可十全散加減四物去邪留正又云心熱盛則火獨光火炎上腎之脈常下行今火盛而上炎用事故腎脈亦隨火炎爍而逆上行陰氣厥逆火復內焰陰上隔陽下不守位心氣通脈故生脈痿膝腕樞如折去而不相提挈經筋縱緩而不任地故也可下數百行而愈東垣補益腎肝丸蕭炳神龜滋陰丸丹溪補益丸虎潛丸王啟玄傳玄珠耘苗丹經驗方何首烏牛膝等分酒浸蜜丸皆補益腎肝壯筋骨之藥下虛者選而用之痿發於夏俗名注夏當從東垣法治之詳見傷暑門痿厥足痿軟不收為痿厥有二一屬腎膀胱經云恐懼不解則傷精精傷則骨酸痿厥精時自下是腎傷精脫也又云三陽為病發寒熱下為癰腫及為痿厥腨㾓是膀胱在下發病也二屬脾濕傷腎經云凡治痿厥發逆肥貴人則膏粱之疾又云秋傷於濕上逆而咳發為痿厥是也目中溜火視物昏花耳聾耳鳴困倦乏力寢汗憎風行步不正兩腳欹側臥而多驚腰膝無力腰以下消瘦宜補益腎肝丸膝中無力伸不能屈屈不能伸腰膝腿腳沉重行步艱難宜健步丸愈風湯送下腿腳沉重無力者於羌活勝濕湯中加酒洗漢防己五分輕則附子重則川烏少許以為引用而行經也嘗治一老人痿厥累用虎潛丸不愈後於虎潛丸加附子立愈如神蓋附反佐之力東垣治中書黏合公三十二歲病腳膝痿弱臍下尻陰皆冷陰汗臊臭精滑不固服鹿茸丸十旬不減診其脈沉數而有力此醇酒膏粱滋火於內逼陰於外醫見其證不知陽強不能密緻皮膚以為內實有寒投以熱劑反瀉其陰而補其陽是實實虛虛也不危幸矣復何望效耶即處以滋腎大苦寒之劑制之以急寒因熱用飲入下焦適其病所瀉命門相火之盛再服而愈求方不與亦不著其方於書恐過用之則故病未已新病復起也此必滋腎丸神龜滋陰丸之類中病則已可常服乎熱本事方治腳膝無力用菟絲子五兩石蓮肉山藥茴香各二兩白茯苓一兩五味子五錢糊丸每服五十丸木瓜酒或鹽湯下空心晚食前各一服寒人參酒浸服之治風軟腳弱可逐奔馬故曰奔馬草曾用有效虛仲景方肉極熱則身體津脫腠理開汗大泄厲風氣下焦腳弱宜越婢加朮湯表斗門方用商陸根細切煮熟入綠豆爛煮為飯食之及本事方左經丸續骨丹此中有濕痰汙血阻礙經絡而得痿厥者宜之里腳氣腳氣之名起自後代其頑麻腫痛者則經所謂痹厥也痿軟不收者則經所謂痿厥也其衝心者則經所謂厥逆也東垣云腳氣之疾實水濕之所為也蓋濕之害人皮肉筋脈而屬於下然亦有二焉一則自外而感一則自內而致其治法自應不同故詳而論之其為病也有證無名腳氣之稱自晉蘇敬始關中河朔無有也惟南方地下水寒其清濕之氣中於人必自足始故經曰清濕襲虛則病起於下或者難曰今茲北方其地則風土高寒其人則腠理致密而復多此疾者豈是地濕之氣感之而為耶答曰南方之疾自外而感者也北方之疾自內而致者也何以言之北方之人常食潼乳又飲酒無節過傷而不厭且潼乳之為物其氣味則潼乳其形質則水也酒醴亦然人之水穀入胃胃氣蒸騰其氣與味宣之於經絡化之為血氣外榮四末內注五臟六腑周而復始以應刻數焉是謂天地之紀此皆元氣充足脾胃之氣無所傷而然也苟元氣不充則胃氣之本自弱飲食既倍則脾胃之氣有傷既不能蒸化所食之物其氣與味亦不能宣暢旁通其水濕之性流下而致之其自外而入者止於下脛腫而痛自內而致者乃或至於手節也經云足脛腫曰水太陰所至為重胕腫此但言其自外者也所治之法前人方論備矣自內而致者治法則未有也楊大受云腳氣是為壅疾治以宣通之劑使氣不能成壅也壅既成而盛者砭惡血而去其重勢經曰蓄則腫熱砭射之後以藥治之按東垣論南方腳氣外感清濕作寒治北方腳氣內傷酒乳作濕熱治此實前人之未發者後學泥之遂成南北二派互相詆譭南毀北者曰彼所論乃北方病也彼所治乃北方法也不可施於南北毀南者曰彼所論乃南方病也彼所治乃南方法也不可施於北嗚呼立論之始不究內經首尾所言輒創其名以致後人守其說者知其一不知其二故相乖迕若此夫素靈諸篇上窮天文下究地理中知人事之變疊出不一書者為天地以二氣食於人而人以六經三陰三陽上奉之是故三陰三陽亦是在人之六經氣也內以養於臟腑壯精神運水穀以為生化百骸之用及乎天地六氣一有不正則變變則襲人身形之虛入客以為病者謂之外邪若人之三陰三陽一有不正則變變則淫泆為病者謂之內邪二者皆得致周身之百病況足之六經皆起於腳五趾行過於腿膝上屬臟腑統身半以下氣血之運行故外入之邪客之則壅閉其經氣凝泣其絡血若人氣內注之邪著而留之則亦必如外邪壅閉氣血者無異也及其沖痛痿痹厥逆之狀亦無異也於是皆以腳氣名也此四方之所同今乃以南方者止中外邪之濕北方者止中內注之濕豈理也哉然北方縱無地之卑濕其在踐雨露履汗襪洗濯足皆濕也與夫脫卸靴履汗出而風吹之而血凝於足者寧不與南方地之濕同類盡屬外中者乎南方雖無潼乳之濕其在酒食與臟腑所傷津液水穀停積之濕而下注者寧不與北方潼乳同類盡屬內注者乎能達此理第恐自責辨邪之不易奚暇相毀哉千金云凡腳氣之病始起甚微多不令人識也食飲嬉戲氣力如故惟卒起腳屈弱不能動有此為異耳凡腳氣之候或見食嘔吐憎聞食臭或有腹痛下利或大小便閉澀不通或胸中衝悸不欲見光明或精神昏憒或喜迷忘語言錯亂或壯熱頭痛或身體極冷疼煩或覺轉筋或腫或不腫或䏶腿頑痹或時緩縱不隨或復百節攣急或小腹不仁此皆腳氣狀貌也方書以腫者為濕腳氣不腫者為乾腳氣不問久近乾溼及屬何經並可用除濕湯加木瓜檳榔白芷各半錢或芎芷香蘇散加赤芍藥萆薢各半錢仍吞木瓜丸腳氣發動兩足痛不可忍者五積散加全蠍三五個入酒煎腳氣發動必身痛發熱大類傷寒若卒起腳弱或少腹不仁或舉體轉筋或見食嘔逆或兩脛赤腫便當作腳氣治乾者於前二藥中或更加萊菔子炒研半錢濕者於前二藥中加青橘皮十數片千金云若脈大而緩宜服續命湯二劑立瘥活人云腳氣屬冷者小續命湯煎成旋入生薑自然汁服之最快若風盛宜作越婢湯加白朮二兩若脈浮大而緊轉駃宜作竹瀝湯此最惡脈細而駃亦惡脈微而弱宜服風引湯此人脈多是因虛而得之若大虛短氣力乏可間作補湯隨病冷熱而用之若未愈更服竹瀝湯即止竹瀝湯若不及熱服輒停在胸膈更為人患每服當使極熱若服竹瀝湯得下者必佳也若加服數劑病及脈勢未折而苦脹滿者可以大鱉甲湯下之湯勢盡而不得下可以丸藥助湯令下下後更服竹瀝湯令脈勢折將息料理乃佳東垣云外臺所錄皆謂南方卑濕霧露所聚之地其民腠理疏陽氣不能外固因而履之則清濕襲虛病起於下此因血虛氣弱受清濕之邪氣與血並行於膚腠邪氣盛正氣少故血氣澀澀則痹虛則弱故令痹弱也後人名曰腳氣初覺即灸患處二三十壯以導引濕氣外出及飲醪醴以通經散邪所制之方寒藥少熱藥多多用麻黃川烏薑附之屬內經云濕淫於外以苦發之麻黃苦溫發之者也川烏辛熱走而不守通行經絡薑附辛甘大熱助陽退陰亦能散清濕之邪又察足之三陰三陽是何經絡所起以引用藥為主治復審六氣中何氣當之治以佐使之藥按前廉為陽明宜以白芷升麻葛根為引用後廉為太陽宜以羌活防風為引用外廉為少陽宜以柴胡為引用內廉為厥陰宜以青皮吳茱萸川芎為引用內前廉為太陰宜以蒼朮白芍藥為引用風勝者自汗走注其脈浮而弦宜發散越婢加朮湯寒勝者無汗攣急掣痛其脈遲而澀宜溫熨酒浸牛膝丸濕勝者腫痛重著其脈濡而細宜分滲除濕湯暑勝者煩渴熱積其脈洪而數宜清利清暑益氣湯若四氣兼見但推其多者為勝分其表裡以施治也太陽經腳氣病者頭痛目眩項強腰脊身體經絡外踝之後循京骨至小指外側皆痛宜隨四時之氣發散而愈麻黃左經湯陽明經腳氣病者翕翕寒熱呻欠口鼻乾腹脹髀膝臏中循胻外臁下足跗入中趾內間皆痛宜隨四時氣微利之大黃左經湯少陽經腳氣病者口苦上喘脅痛面垢體無光澤頭目皆痛缺盆並腋下如馬刀腫自汗振寒發熱胸中脅肋髀膝外至胻絕骨外踝及諸節指皆痛宜隨四氣和解之半夏左經湯三陽併合腳氣病者憎寒壯熱自汗惡風或無汗惡寒暈眩重著關節掣痛手足拘攣疼痛冷痹腰腿緩縱不隨心躁氣上嘔吐下利其脈必浮弦緊數宜大料神秘左經湯加味敗毒散太陰經腳氣病者腹滿夾咽連舌系急胸膈痞滿循胻骨下股膝內前廉內踝過核骨後連足大趾之端內側皆痛宜六物附子湯少陰經腳氣病者腰脊痛小趾之下連足心循內踝入跟中上腨內出膕中內廉股肉皆痛上衝胸咽飢不能食面黑小便淋閉咳唾不已善恐心惕惕如將捕之小腹不仁者難治四氣偏勝各隨其氣所中輕重而溫之宜八味丸厥陰經腳氣病者腰脅偏疼從足大趾連足趺上廉上膕至內廉循股環陰抵小腹夾臍諸處脹痛兩腳攣急嗌乾嘔逆洞泄各隨四氣所中輕重而調之神應養真丹三陰併合腳氣四肢拘攣上氣喘滿小便秘澀心熱煩悶遍身浮腫腳弱緩縱不能行步宜追毒湯以上六經受風寒暑濕流注自汗為風勝無汗疼痛為寒勝熱煩為暑勝重著腫滿為濕勝各隨其氣所勝者而偏調之不可拘於一方也濕熱為病肢節煩疼肩背沉重胸膈不利兼遍身疼痛流注手足足脛腫痛不可忍者當歸拈痛湯主之本草十劑云宣可去壅通可去滯內經云濕淫所勝治以苦溫羌活苦辛透關節勝濕防風甘辛溫散經絡中留濕故以為君水性潤下升麻葛根苦辛平味之薄者陰中之陽引而上行以苦發之也白朮苦甘溫和平除濕蒼朮體輕浮氣力雄壯能除膚腠間濕故以為臣夫血壅而不流則為痛當歸身辛溫以散之使血氣各有所歸人參甘草甘溫補脾養正氣使苦藥不能傷脾胃仲景云濕熱相合肢節煩疼苦參黃芩知母茵陳苦寒乃苦以泄之者也凡酒製炒以為因用治濕不利小便非其治也豬苓甘溫平澤瀉鹹平淡以滲之又能導其留飲故以為佐氣味相合上下分流其濕使壅滯之氣得宣通也楊大受謂腳氣之疾自古皆尚疏下為疾壅故也然不可太過太過則損傷脾胃使營運之氣不能上行反下注為腳氣又不可不及不及則使壅氣不能消散今立三方於後詳虛實而用之腳氣初發一身盡痛或肢節腫痛便溺阻隔先以羌活導滯湯導之後用當歸拈痛湯除之飲食不消心下痞悶者開結導飲丸治廉平章年三十八身體充肥腳氣始發頭面渾身肢節微腫皆赤色足脛赤腫痛不可忍不敢扶策手著皮膚其痛轉甚晝夜苦楚此以北土高寒故多飲酒積久傷脾不能運化飲食下流之所致投以當歸拈痛湯一兩二錢其痛減半再服腫痛悉除止有左手指末微赤腫以三稜針刺爪甲端多出黑血赤腫全去不數日因食濕面肢體覺痛再以枳實大黃湯治之夫腳氣之疾皆水濕之為也面滋其濕血壅而不行故肢節煩疼經云風勝濕羌活辛溫透關節去濕故以為主血留而不能行則痛當歸之辛溫散壅止痛枳實之苦寒治痞消食故以為臣大黃苦寒以導面之濕熱並治諸老血留結取其峻駃故以為使也服後利下兩行痛止控涎丹加胭脂一錢檳榔木瓜各一兩卷柏半兩先以鹽水煮半日次日白水煮半日同前藥為丸每三十丸加至四五十丸利下惡物立效衍義云有人嗜酒日須五七十杯後患腳氣甚危或教以巴戟半兩糯米同炒米微轉色不用米大黃一兩銼炒同為末熟蜜為丸溫水下五七十丸仍禁酒遂愈腎臟風壅積腰膝沉重威靈仙末蜜和丸如桐子大酒下八十丸平明微利惡物如青膿桃膠即是風毒腳氣多屬肺氣經云肺病者汗出尻陰股膝髀腨胻足皆痛故戴人治腳氣用湧法者良由此也又千金方多汗之者亦瀉肺之意也古方用紫蘇陳皮生薑湯調檳榔末服之於疏通肺氣為佳三因十全丹續斷丸薏苡仁酒虎骨酒皆藥性平良病人下虛而無實積者可以常服腳氣衝心丹溪用四物湯加炒柏以附子末津調敷湧泉穴以艾灸泄引其熱下行金匱八味丸治腳氣上攻入少腹不仁以上虛者宜之檳榔為末童便調服三脘散大腹子散桑白皮散薏苡仁散以上實者宜之犀角散熱者宜之茱萸木瓜湯沉香散無熱者宜之腳氣上氣喘息紫蘇葉三兩桑白皮銼炒二兩前胡去蘆一兩㕮咀每服八錢水二盞半檳榔二枚杏仁去皮尖二十枚生薑五片煎至一盞溫服無時腳氣喘急此係入腹宜蘇子降氣湯仍佐以養正丹或四磨飲腳氣迫肺令人喘嗽宜小青龍湯每服入檳榔一錢煎服腳氣嘔逆噁心宜八味平胃散加木瓜一錢畏食者宜生料平胃散加木瓜一錢二證並可用半夏散橘皮湯小便不通用生料五苓散一帖除濕湯一帖加木瓜二錢重分二服大便不通羌活導滯湯大小便俱不通檳榔丸或五苓散和復元通氣散發熱不退者敗毒散加木瓜一錢或用敗毒散五積散各半帖和勻名交加散更加木瓜一錢若久履濕而得兩腳或腫或瘡五苓散或和氣飲加木瓜蘿蔔子各半錢大黃一錢腳氣日久腳脛枯細或寒或熱或疼或癢或一腳偏患軟弱嚲曳狀如偏風者宜小續命湯加木瓜或獨活寄生湯附子八味湯吞活絡丹虎骨四斤丸之類腳氣生瘡腫痛心神煩熱犀角散腳氣腿腕生瘡用鹿茸丸芎歸散腳氣生瘡腫痛用漏蘆白蘞槐白皮五加皮甘草各七錢半蒺藜子二兩㕮咀水煎去渣看冷熱於無風處淋洗之腳氣跟注一孔深半寸許每下半日痛異常此乃腳氣注成漏以人中白於火上煅中有水出滴入瘡口腳心痛者宜大聖散二錢重入木瓜末一錢豆淋酒調仍用川椒香白芷草烏煎湯洗腳氣隱痛行步艱辛用平胃散加赤曲同煎服最妙雞鳴散亦佳腳氣有壅者加減檳榔湯無壅者牛膝湯川牛膝酒洗白茯苓去皮人參去蘆各一兩當歸去蘆半兩為細末每服三錢空心溫酒調服腳氣兩脛腫滿是為壅疾南方多見兩足粗大與疾偕老者初起當以重劑宣通壅滯或砭惡血而去其重勢後以藥治經曰蓄則腫熱砭射之也渫洗活人書云凡腳氣服補藥及用湯渫洗皆醫之大禁也為南方外感濕氣乘虛襲人為腫痛而言非為北方內受濕氣注下腫痛而言也蓋濕氣不能外達宜淋渫開導泄越其邪名曰導氣除濕湯外臺云第一忌嗔嗔則心煩煩則腳氣發第二禁大語大語則傷肺肺傷亦發動又不得露足當風入水以冷水洗腳兩腳脛尤不宜冷雖暑月常須著綿褲至冬寒倍令兩脛溫暖得微汗大佳依此將息氣漸薄損每至寅丑日割手足甲割少侵肉去氣夏時腠理開不宜當風臥睡睡覺令人按挼勿使邪氣稽留數勞動關節常令通暢此並養生之要拒風邪之法也尋常有力每食後行三五百步疲倦便止腳中惡氣隨即下散雖浮腫氣不能上也凡治此疾每旦早飯任意飽食午飯少食晚飯不食彌佳恐傷脾胃營運之氣失其天度況夜食則血氣壅滯而陰道愈增腫痛矣第一凡飲食酒及潼酪勿使過度過則傷損脾胃下注於足脛跗腫遂成腳疾第二欲不可縱嗜欲多則腳氣發凡飲食之後宜緩行二三百步不至汗出覺困則止如此則不能成壅也經云逸者行之又云病濕痹忌溫食飽食濕地濡衣診脈浮弦為虛濡細為濕洪數為熱遲澀為寒微滑為虛牢堅為實浮為表沉為里沉弦為風沉緊為寒沉細為濕沉數為熱結因氣散因憂緊因怒細因悲入心則恍惚謬妄嘔吐食不入眠不安脈左寸乍大乍小乍無者不治入腎則腰腳皆腫小便不通呻吟口額黑沖胸而喘左尺絕者不治但見心下急氣喘不停或自汗數出或乍寒乍熱其脈促短而數嘔吐不止者死第五冊諸風門癘風素問脈要精微論曰脈風成為癘風論曰風寒客於脈而不去名曰癘風癘風者榮衛熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰又謂風氣與太陽俱入行諸脈俞散諸分肉之間與衛氣相干其道不利故使肌肉膹䐜而有瘍衛氣有所凝而不行故其肉有不仁也長刺節論曰大風骨節重鬚眉墮名曰大風刺肌肉為故汗出百日王注以泄衛氣之怫熱刺骨髓汗出百日王注以泄榮氣之怫熱二百日鬚眉生而止靈樞曰癘風者數刺其腫上已刺以銳針針其處按出其惡氣腫盡乃止常食方食毋食他食今觀經之論治分榮衛者如此若古方雖多但混瀉其風熱於榮衛又無先後之分至東垣丹溪始分之活法機要云先樺皮散從少至多服五七日灸承漿穴七壯灸瘡愈再灸再愈三灸之後服二聖散泄熱祛血之風邪戒房室三年病愈此先治其衛後治其榮也試效方治段庫使用補氣瀉榮湯此治榮多於治衛也丹溪云須分在上在下在上者以醉仙散取臭惡血於齒縫中出在下者以通天再造散取惡物蛔蟲於穀道中出所出雖有上下道路之異然皆不外於陽明一經而已看其疙瘩上先見在上體多者病在上也下先見在下體多者病在下也上下同得者病在上覆在下也陽明主胃與大腸無物不受此風之入人也氣受之在上多血受之在下多血氣俱受者上下皆多自非醫者神手病者鐵心罕有免者夫氣為陽為衛血為陰為榮身半以上陽先受之身半以下陰先受之是故再造散治其病在陰者用皂角剌出風毒於榮血中肝主血惡血留止其屬肝也蟲亦生於厥陰風木所化必用是治其臟氣殺蟲為主以大黃引入腸胃榮血之分利出瘀惡蟲物醉仙散治其病在陽者用鼠黏子出風毒遍身惡瘡胡麻逐風補肺潤皮膚蒺藜主惡血身體風癢通鼻氣防風治諸風栝蔞根治瘀血消熱胕腫枸杞消風熱散瘡毒蔓荊子主賊風苦參治熱毒風皮肌煩躁生瘡赤癩眉脫八味藥治功固至矣然必銀粉為使銀粉乃是下膈通大腸之要劑所以用其驅諸藥入陽明經開其風熱怫鬱痞隔逐出惡風臭穢之毒殺所生之蟲循經上行至牙齒軟薄之分而出其臭毒之涎水服此藥若有傷於齒則以黃連末揩之或先固濟以解銀粉之毒銀粉在醉仙散有奪旗斬將之功遂成此方之妙用非他方可企及故丹溪取二方分用之如破敵之先鋒至於餘邪未除者但調和榮衛藥中少加驅逐劑耳薛新甫曰大抵此證多由勞傷氣血腠理不密或醉後房勞沐浴或登山涉水外邪所乘衛氣相搏濕熱相火血隨火化而致故淮陽閩廣間多患之眉毛先落者毒在肺面發紫泡者毒在肝腳底先痛或穿者毒在腎遍身如癬者毒在脾目先損者毒在心此五臟受病之重者也一曰皮死麻木不仁二曰肉死針刺不痛三曰血死爛潰四曰筋死指脫五曰骨死鼻柱壞此五臟受傷之不可治也若聲啞目盲尤為難治治當辨本證兼證變證類證陰陽虛實而斟酌焉若妄投燥熱之劑膿水淋漓則肝血愈燥風熱愈熾腎水愈枯相火愈旺反成壞證矣本證治法癘瘍所患非止一臟然其氣血無有弗傷兼證無有弗雜況積歲而發現於外須分經絡之上下病勢之虛實不可概施攻毒之藥當先助胃壯氣使根本堅固而後治其瘡可也癘瘍當知有變有類之不同而治法有汗有下有砭刺攻補之不一蓋兼證當審輕重變證當察先後類證當詳真偽而汗下砭刺攻補之法又當量其人之虛實究其病之源委而施治焉蓋虛者形氣虛也實者病氣實而形氣則虛也癘瘍砭刺之法子和張先生謂一汗抵千針蓋以砭血不如發汗之周遍也然發汗即出血出血即發汗二者一律若惡血凝滯在肌表經絡者宜刺宜汗取委中出血則效若惡毒蘊結於臟非盪滌其內則不能瘥若毒在外者非砭刺遍身患處及兩臂腿腕兩手足指縫各出血其毒必不能散若表裡俱受毒者非外砭內泄其毒決不能退若上體患多宜用醉仙散取其內蓄惡血於齒縫中出及刺手指縫並臂腕以去肌表毒血下體患多宜用再造散令惡血陳蟲於穀道中出仍針足指縫並腿腕隔一二日更刺之以血赤為度如有寒熱頭疼等證當大補血氣癘瘍服輕粉之劑若腹痛去後兼有膿穢之物不可用藥止之若口舌腫痛穢水時流作渴發熱喜冷此為上焦熱毒宜用瀉黃散若寒熱往來宜用小柴胡湯加知母若口齒縫出血發熱而大便秘結此為熱毒內淫宜用黃連解毒湯若大便調和用濟生犀角地黃湯若穢水雖盡口舌不愈或發熱作渴而不飲冷此為虛熱也宜用七味白朮散癘瘍手足或腿臂或各指拳攣者由陰火熾盛虧損氣血當用加味逍遙散加生地黃及換肌散兼服癘瘍生蟲者五方風邪翕合相火制金木盛所化內食五臟而證見於外也宜用升麻湯送瀉青丸或樺皮散以清肺肝之邪外灸承漿以䟽陽明任脈則風熱息而蟲不生矣肝經虛熱者佐以加味逍遙散六味地黃丸兼證治法頭目眩暈若右寸關脈浮而無力脾肺氣虛也用補中益氣湯若左關尺脈數而無力肝腎氣虛也用六味地黃丸若右寸尺脈浮大或微細陽氣虛也用八味地黃丸血虛者四物湯加參苓白朮氣虛者四君子湯加當歸黃耆肝經實熱者柴胡清肝散肝經虛熱者六味地黃丸脾氣虛弱者補中益氣湯脾虛有痰者半夏白朮天麻湯砭血過多者芎歸湯發熱惡寒者聖愈湯大凡發熱則真氣傷矣不可用苦寒藥恐復傷脾胃也口喎目斜若手足牽搐或眉稜癢動屬肝經血虛風熱用加味逍遙散六味地黃丸以生肝血滋腎水若寒熱往來或耳聾脅痛屬肝木熾盛先用小柴胡合四物湯以清肝火生肝血若筋攣骨痛或不能動履用六味地黃丸補中益氣湯以滋化源若因服燥藥而致者用四物湯加生甘草金銀花以解熱毒益陰血凡此俱屬肝經血燥所致須用六味地黃丸補中益氣湯為主若因怒氣房勞而甚者用六味地黃丸十全大補湯為主若因勞傷形體而甚者用補中益氣湯十全大補湯為主夏秋濕熱行令若飲食不甘頭目眩暈遍身痠軟或兩腿麻木口渴自汗氣促身熱小便黃數大便稀溏濕熱傷元氣也用清燥湯如在夏令用清暑益氣湯若自汗盜汗氣高而喘身熱脈大元氣內傷也用補中益氣湯若嘔吐少食肚腹痞悶大便不實脾胃受傷也用六君子湯若胸腹不利飲食少思吐痰不止脾胃虛痞也用四君子湯若形氣倦怠肢體麻木飲食少思熱傷元氣也用人參益氣湯熱渴便濁若夜安晝熱者熱在氣分也用清心蓮子飲晝安夜熱者熱在血分也用四物二連湯俱佐以六味地黃丸若寒熱往來者肝經血虛也用加味逍遙散六味地黃丸小便不利若因服燥藥而致者用四物湯加炒黑黃柏知母生甘草以滋陰血若頻數而色黃者用四物湯加參朮麥門五味子以生氣血若短而色黃者用補中益氣湯加山藥麥門五味以滋化源大便不通若血虛內熱而澀滯者用四物湯加麥門五味子以生血潤燥若因燥熱之藥而患者用四物湯加連翹生甘草以生血清熱若服克伐之藥而致者用四君子湯加芎歸以助氣生血若作渴飲冷者熱淫於內也用竹葉石膏湯以清胃火若作渴飲湯者腸胃虛熱也用竹葉黃耆湯以補氣生津若內熱作渴面赤飲湯者用四物湯送潤腸丸以涼血潤燥若腸胃滿脹燥在直腸而不通者用豬膽汁導之腸胃氣虛血涸而不通者用十全大補湯若肝膽邪盛脾土受侮而不能輸化者用小柴胡湯加山梔郁李仁枳殼治之怔忡無寐或兼衄血便血若內熱晡熱作渴飲湯肢體倦怠此脾血虛而火動也用四君子加芎歸若思慮傷脾動火而致用歸脾湯加山梔若發熱晡熱用八珍湯加酸棗仁茯神遠志若因心血虛損用柏子仁散大抵此證皆心脾血少所致但調補胃氣則痰清而神自安不必專於清熱治痰發熱惡寒若肢體倦怠煩躁作渴氣高而喘頭痛自汗者此內傷氣血也用補中益氣湯加五味麥門倦怠食少大便不調小便頻數灑淅惡寒者此脾肺氣虛也用升陽益胃湯煩躁作渴體倦少食或食而不化者此脾氣虛熱也用六君子湯發熱在午前脈數而有力者氣分熱也用清心蓮子飲脈數而無力者陽氣虛也用補中益氣湯午後脈數而有力者血分熱也用四物湯加牡丹皮脈數而無力者陰血虛也用四物湯加參術熱從兩脅起者肝虛也用四物湯加參朮黃耆從臍下起者腎虛也用四物湯加參朮黃柏知母五味麥門肉桂或六味丸其熱晝見夜伏夜見晝止或去來無定時或起作無定處或從腳起者此無根虛火也須用加減八味丸及十全大補湯加麥門五味更以附子末唾津調搽湧泉穴若形體惡寒喜熱飲食者陽氣虛寒也急用八味丸口乾若惡冷飲食者胃氣虛而不能生津液也用七味白朮散若喜冷飲食者胃火盛而消爍津液也須用竹葉石膏湯夜間發熱口渴者腎水弱而不能上潤也當用六味地黃丸若因汗下之後而有前患胃氣虛也宜用八珍湯作渴若煩躁飲冷者屬上焦實熱用涼膈散兼大便秘結者屬下焦實熱用清涼飲若用克伐之藥而渴者氣血虛也急用八珍湯六味丸耳聾耳鳴若左寸關脈弦數者心肝二經虛熱也用四物湯加山梔柴胡生陰血右寸關脈浮大者脾肺二經虛熱也用補中益氣湯加山梔桔梗培陽氣若因怒便作用小柴胡湯加山梔芎歸清肝涼血若午前甚用小柴胡湯加參耆歸術補氣清肝午後甚用四物湯加酒炒黑黃柏知母五味補陰降火如兩足心熱屬腎虛用六味丸以壯水之主兩足冷屬陽虛用八味丸以益火之源項強口噤腰背反張者氣血虛而發痙也仲景云足太陽病發汗太多則痙風病下之則痙復發汗則加拘急瘡家發汗則痙蓋風能散氣故有汗而不惡寒曰柔痙寒能澀血故無汗而惡寒曰剛痙皆因內虛復汗亡津血筋無所養而然悉屬虛象非風證也當大補氣血為主故產婦潰瘍勞傷氣血濕熱相火誤服克伐之劑者多患之其義可見婦女經閉若因鬱火傷脾以歸脾湯加山梔丹皮氣血俱虛以八珍湯加山梔丹皮若因服燥藥傷血以四物湯加生甘草若經候過期而來者氣血虛也八珍湯倍用參術先期而來者血虛熱也四物湯倍加參朮牡丹皮將來而作痛者氣虛血滯也四物湯加茯苓白朮香附色紫而成塊者血熱也四物湯加山梔丹皮作痛而色淡者血氣虛也用八珍湯其血崩之證肝火不能臟血者用加味逍遙散脾虛不能統血者用補中益氣湯凡此皆六淫七情虧損元氣所致當審其因而調補胃氣為善變證治法身起疙瘩搔破膿水淋漓若寒熱往來者肝經氣血虛而有火也用八珍散加丹皮柴胡寒熱內熱者血氣弱而虛熱也用八珍散倍用參術若惡寒形寒者陽氣虛寒也用十全大補湯若肌膚搔如帛隔者氣血不能外榮也用人參養榮湯若面部搔之麻癢者氣血不能上榮也用補中益氣湯若痿軟筋攣者血氣不能滋養也用補中益氣湯佐以六味地黃丸口舌生瘡或咽喉作痛若飲食喜冷大便秘結者實熱也用四順清涼飲肌熱惡熱煩渴引飲者血虛也用當歸補血湯飲食惡寒大便不實者虛熱也用十全大補湯熱從下或從足起者腎虛熱也用加減八味丸若飲食難化四肢逆冷者命門火衰也用八味地黃丸牙齒作痛或牙齦潰爛若喜寒惡熱屬胃火加味清胃散為主惡寒喜熱屬胃虛補中益氣湯為主自汗屬氣虛用補中益氣湯送六味地黃丸盜汗屬血虛用當歸六黃湯內芩連黃柏炒黑用送六味地黃丸若因勞心而致以歸脾湯倍用茯神酸棗仁唾痰或作喘若右寸脈浮緩者肺氣虛也用六君子湯加桔梗右寸脈洪滑者肺經有熱也用瀉白散右寸關脈浮緩遲弱者脾肺氣虛也用六君子湯加桔梗黃耆右寸關脈洪滑遲緩者脾熱傳肺也用瀉白瀉黃二散右尺脈微弱者命門火衰而脾肺虛也用人參理中丸如不應用八味地黃丸右寸脈洪數者心火克肺金也用人參平肺散如不應用六味地黃丸左寸關脈洪弦數者心肝二經有熱也用柴胡清肝散如不應佐以牛黃清心丸清其風熱仍用六味地黃丸以鎮陽光左尺脈數而無力者腎虛而水泛上也用六味地黃丸加五味子以滋陰如脈微細或手足冷或兼喘促急用八味地黃丸以補陽舌赤裂或生芒刺兼作渴引飲或小便頻數不時發熱或熱無定處或足心熱起者乃腎水乾涸心火亢盛用加減八味丸主之佐以補中益氣湯若誤用寒涼之劑必變虛寒而歿口舌生瘡作渴不止不時發熱或晝熱夜止或夜熱晝靜小便頻數其熱或從足心或從兩脅或從小腹中起外熱而無定處者此足三陰虧損之證也用加減八味丸為主佐以十全大補湯若誤用寒涼治火之劑復傷脾胃胸腹虛痞飲食少思或大便不實小便不利胸腹膨脹肢體患腫或手足俱冷者此足三陰虧損之虛寒證也急用加減金匱腎氣丸亦有復生者肚腹腫脹若朝寬暮急屬陰虛暮寬朝急屬陽虛朝暮皆急陰陽俱虛也陽虛者朝用六君子湯夕用加減腎氣丸陰虛者朝用四物湯加參術夕用加減腎氣丸真陽虛者朝用八味地黃丸夕用補中益氣湯若肚腹痞滿肢體腫脹手足並冷飲食難化或大便泄瀉口吸氣冷者此真陽衰敗脾肺腎虛寒不能司攝而水泛行也急用加減腎氣丸否則不救發熱惡寒若寸脈微名陽氣不足陰氣上入陽中則惡寒也用補中益氣湯尺部脈弱名陰氣不足陽氣下陷於陰中則發熱也用六味地黃丸若暑熱令而肢體倦怠此濕熱所乘屬形氣虛而病氣實也當專補陽氣用補中益氣湯若發熱大渴引飲目赤面紅此血虛發熱屬形病俱虛也當專補陰血用當歸補血湯發熱作渴若右寸關脈浮大而無力者脾肺之氣虛也用補中益氣湯數而有力者脾肺之氣熱也用竹葉石膏湯寸脈微數而無力者肺氣虛熱也用竹葉黃耆湯尺脈微細或微數而無力者命門火衰也用八味地黃丸左寸關脈數而有力者心肝之氣熱也用柴胡梔子散數而無力者心肝之氣虛也用六味地黃丸尺脈數而無力者腎經虛火也用加減八味丸大凡瘡愈後口渴或先渴而患瘡或口舌生瘡或咽喉腫痛或唇裂舌黃目赤痰涎上湧者皆敗證也非此丸不能救眼目昏弱或內障黑花屬血虛神勞用滋陰腎氣丸若視物無力或見非常之狀屬陰精虛弱用滋陰地黃丸若視物無力或視物皆大屬陽盛陰虛用六味地黃丸若目緊體倦或肌膚麻木屬脾肺氣虛用神效黃耆湯若至夜目暗燈下亦暗屬陽虛下陷用決明夜靈散若眼暗體倦內障耳鳴屬脾胃氣虛用益智聰明湯蓋五臟六腑之精氣皆稟受於脾土上貫於目脾為諸陰之首目為血脈之宗當補脾土為善鼻衄吐血若左寸關脈數而無力血虛也四物加參術浮而無力氣虛也補中益氣湯尺脈數或無力腎虛也六味地黃丸右寸關脈數而有力者肺胃熱也犀角地黃湯數而無力者肺胃虛熱也先用濟生犀角地黃湯後用四物湯加參苓白朮尺脈數無力陰虛也用六味地黃丸若面黃目澀眵多手麻者脾肺虛也用黃耆芍藥湯飲食少思若因胃氣虛而不能食用四君子湯若因脾氣虛而不能化用六君子湯大便不實或嘔吐者脾氣虛寒也用六君子湯加乾薑木香若作嘔口渴或惡冷飲食者胃氣虛熱也用五味異功散喜冷飲食者胃氣實熱也用瀉黃散帶下因經行產後外邪入胞傳於五臟而致之其色青者屬於肝用加味逍遙散加防風濕熱壅滯小便赤澀用前散加炒黑龍膽草肝血不足或燥熱風熱用六味丸逍遙散色赤者屬於心用小柴胡湯加黃連山梔當歸思慮過傷者用妙香散六味丸色白者屬於肺用六味丸補中益氣湯加山梔色黃者屬於脾用六味丸六君子湯加山梔柴胡不應用歸脾湯色黑者屬於腎用六味丸氣血俱虛用八珍湯陽氣下陷用補中益氣湯濕痰下注前湯加茯苓半夏蒼朮黃柏氣虛痰飲四七湯送六味丸若病久元氣下陷或克伐所傷但壯脾胃升陽氣為善若拘於人之肥瘦而用燥濕瀉火之藥反傷脾胃為患不淺二便下血若右關脈浮數氣虛而熱也用四君子加升麻當歸尺脈浮大或微弱元氣下陷也用補中益氣湯左關脈洪數血虛也用四物湯加炒山梔升麻秦艽脈遲緩或浮大氣虛也用四君子湯加升麻炮姜尺脈洪數或無力者腎虛也用六味地黃丸若因房勞傷損精氣陰虛火動而小便下血諸血病者不問脈證百端但用前丸料煎服為善泄瀉在五更或清晨乃脾腎虛五更服四神丸日間服白朮散或不應或愈而復作急用八味丸補命門火以生脾土其瀉自止大便不通屬脾肺虧損大腸津液乾涸或血虛火鑠不可計其日期飲食數多必待腹滿脹自欲去而不能乃熱在直腸間也用豬膽汁潤之若妄服苦寒辛散之劑元氣愈傷或通而不止或成中痞之證若氣血虛者用八珍湯加麻子仁腸胃虛者用補中益氣湯加麻子仁腎液不能滋潤用六味地黃丸加麻子仁若厚味積壅小便淋秘者肝腎虛也用六味地黃丸以滋腎水用補中益氣湯以補脾胃若發熱晡熱用六君子湯加味逍遙散養陰血清風熱若兼筋骨痛先用透經解攣湯秦艽地黃湯後用八珍散加牡丹皮柴胡主之若誤服風劑而傷陰血者用易老祛風丸若兩股或陰囊或兩足必用四生散地黃丸為善若誤服草烏川烏之類或敷巴豆砒石等味肌肉腐潰反成癘證治者審之面赤搔癢或眉毛脫落屬肺經風熱用人參消風散樺皮散氣虛用補中益氣湯加天麻殭蠶血虛用加味逍遙散加釣藤鉤面發紫泡或成塊或眉毛脫落屬肝經風熱先用小柴胡湯加山梔丹皮釣藤鉤後用加味逍遙散凡證屬肝經血燥生風但宜滋腎水生肝血則火自息風自定癢自止遍身疙瘩或癮疹搔癢此風熱傷血用羌活當歸散氣虛者佐以補中益氣湯加山梔釣藤鉤血虛者佐以加味逍遙散加釣藤鉤若手足皴裂不問黯白或在手足腿腕搔起白皮此風熱而秘澀用清胃散加芍藥蓋腎開竅於二陰精血不足則大便秘塞而不通矣須用六味地黃丸補中益氣湯以滋化源小便不利若不渴而不利者熱在下焦血分也用滋腎丸渴而不利者熱在上焦氣分也用清肺散腎經陰虛而不利者用六味地黃丸熱結膀胱而不利者用五淋散元氣虛而不能輸化者用補中益氣湯脾肺之氣燥而不能化生者用黃芩清肺飲若轉筋便閉氣喘不問男女孕婦急用八味丸緩則不救白濁足三陰經主之屬厚味濕熱所致者用加味清胃散肝腎虛熱者用六味地黃丸為主佐以逍遙散脾腎虛熱者用六味丸佐以六君子湯肝脾鬱滯者六味丸佐以歸脾湯脾肺氣虛者六味丸佐以補中益氣湯濕痰下注者益氣湯佐以六味丸類證治法兩臁如癬搔癢久則膿水淋漓或搔起白皮者名腎臟風也用四生散以祛風邪用六味地黃丸以補腎水若頭目不清內熱口乾體倦痰熱血燥秋間益甚故俗名雁來風宜用羌活白芷散加味逍遙散氣虛者佐以補中益氣湯加皂角刺釣藤鉤血虛者佐以八物湯加柴胡牡丹皮或加味逍遙散兼服肢體或腿臂腕間患㾦㿔而遊走不定者赤曰赤遊風白曰白遊風為血虛陰火內動外邪所搏之證白用人參消風散赤用加味逍遙散氣血俱虛用八珍湯晡熱內熱用加味逍遙散六味地黃丸遍身或頭面起疙瘩或如霞片或破而膿水淋漓或癢痛寒熱乃肝火血虛也用加味逍遙散若口苦脅痛小便淋瀝肝火血熱也用柴胡清肝散若婦女夜間譫語發熱熱入血室也用小柴胡湯加山梔生地黃血虛者四物合小柴胡湯病退卻用逍遙散以健脾胃生陰血此證多有因怒氣而發者治當審之婦人肢體癮疹疙瘩搔破成瘡膿水淋漓熱渴眩暈日晡益甚者用四物湯加柴胡山梔丹皮清肝火補肝血若煩熱體倦頭目不清用八珍散加丹皮山梔補脾氣生陰血若自汗盜汗月水不調肚腹作痛用八珍湯六味丸若食少體倦心忪盜汗經閉寒熱用八珍湯佐以加味逍遙散若病久元氣怯弱用十全大補湯佐以歸脾湯女子十三四或十六七而天癸未至或婦人月經不調發赤癍癢痛此屬肝火血熱用小柴胡湯加山梔生地黃牡丹皮防風生蟲者乃相火制金不能平木而化耳非風邪所生也但滋腎水生肝血或佐以灸承漿之類說見本證敷砒霜患處作痛或腐潰用濕泥頻塗換之若毒入腹胸膈苦楚或作吐瀉飲冷米醋一二杯即止多亦不妨生綠豆末芝麻油俱可敷貼雄黃藥悶亂或吐瀉用防己煎湯解之服辛熱藥而眉發脫落者乃肝經血傷而火動非風也用四物湯六味丸以滋肝血生腎水服川烏草烏等藥悶亂流涎或昏憒嘔吐或出血吐血用大豆遠志防風甘草任用一味煎湯解之大凡服風藥過多皆宜用之未應急用甘草生薑汁敷貼巴豆之藥患處作痛肌肉潰爛以生黃連為末水調敷之若毒入內吐瀉等證更以水調服一二錢大小豆菖蒲汁俱可敷貼藜蘆毒入內煎蔥湯解之服祛風克伐之藥嘔吐少食胸膈不利或形氣倦怠等證用六君子湯以補陽氣若煩躁作渴飲食不思或晡熱內熱面赤發熱用四物湯加參術以生陰血余從各門治之薛新甫以邪之所湊其氣必虛世醫治癘止知攻邪而不知補虛非徒無益而又害之故作癘瘍機要三卷循其法雖不能去病亦可以延天年無夭枉之患故備述於篇乃至去病之法則前再造醉仙之外千金翼有耆婆治惡病阿魏雷丸散諸方先服藥出蟲看其形狀青黃赤白黑然後與藥療之此出西域異人龍宮所秘病者能洗滌身心懺悔業障精虔修治而用之萬無不瘥也詳具類方中茲不贅破傷風夫風者百病之始也清淨則腠理閉拒雖有大風苛毒莫之能害諸瘡不瘥榮衛虛肌肉不生瘡眼不合而風邪入之為破傷風之候亦有因瘡熱鬱結多著白痂瘡口閉塞氣難宣通故熱甚而生風者先辨瘡口平無汁者中風也邊自出黃水者中水也並欲作痙急治之東垣云破傷風者通於表裡分別陰陽同傷寒證治人知有發表不知有攻裡和解夫脈浮而無力太陽也在表宜汗脈長而有力陽明也在裡宜下脈浮而弦小者少陽也半在表半在裡宜和解明此三法而治不中病者未之有也此但云三陽不及三陰者蓋風邪在三陽經便宜按法早治而愈若得傳入三陰其證已危或腹滿自利口燥嗌乾舌卷卵縮皆無生理故置而勿論也河間云破傷風風熱燥甚怫鬱在表而裡氣尚平者善伸數欠筋脈拘急或時惡寒或筋惕而搐脈浮數而弦也宜以辛熱治風之藥開沖結滯而愈猶傷寒表熱怫鬱而以麻黃湯辛熱發散也凡用辛熱開衝風熱結滯宜以寒藥佐之則良免致藥中病而風熱轉甚也如治傷寒發熱用麻黃桂枝加黃芩知母石膏之類是也若止以甘草滑石蔥豉寒藥發散甚妙若表不已漸傳入里里又未太甚而脈弦小者宜以退風熱開結滯之寒藥調之或微加治風辛熱藥亦得猶傷寒在半表半裡而以小柴胡和解之也若里勢已甚而舌強口噤項背反張驚惕搐搦涎唾稠黏胸腹滿塞便溺秘結或時汗出脈沉洪數而弦也然汗出者由風熱鬱甚於里而表熱稍罷則腠理疏泄而心火熱甚故汗出也法宜除風散結寒藥下之後以退風熱開結滯之寒藥調之則熱退結散而風自愈矣解表羌活防風湯防風湯九味羌活湯蜈蚣散解後實之白朮防風湯攻裡大芎黃湯江鰾丸左龍丸後服小羌活湯和解羌活湯地榆防風散小柴胡湯日久氣血漸虛邪氣入胃宜養血四物湯加防風藁本白芷各等分細辛減半為粗末每服五錢水煎服風藥過多自汗出者白朮黃耆湯大汗不止筋攣搐搦白朮升麻湯搐痙不已蠲痙湯背後搐者羌活獨活防風甘草向前搐者升麻白芷獨活防風甘草兩旁搐者柴胡防風甘草右搐加滑石手足顫掉不已硃砂指甲散四般惡證不可治第一頭目青黑色第二額上汗珠不流第三眼小目瞪第四身上汗出如油又痛不在瘡處者傷經絡亦死證也外治初覺瘡腫起白痂身寒熱急用玉真散敷之或用杏仁去皮細嚼和雄黃飛羅白麵敷之一方只用杏仁白麵等分和勻新汲水調和如膏敷腫漸消為度若腰脊反張四肢強直牙關口噤用鼠一頭和尾燒作灰細研以臘月豬脂和敷牙關緊不能開用蜈蚣一條焙乾研細末擦牙吐涎立蘇狗咬破傷風人參不拘多少桑柴火上燒令煙絕用盞子合研為末摻瘡上仍以魚膠煮烊封固嬰童百問云縣尹張公嘗言吾有一妙方治破傷風如神用人家糞堆內蠐螬蟲一枚爛草房上亦有之捏住其脊待其蟲口中吐水就抹在瘡口上覺麻即汗出立愈後試之果然其蟲仍埋故處勿傷其命痙說文僵直也而無痓字廣韻痓惡也非僵直明矣作痓者誤今正之金匱云病者身熱足寒頸項僵急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也活人書云外證發熱惡寒與傷寒相似但其脈沉遲弦細而項背反張為異耳太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出而不惡寒名曰柔痙太陽病其證備身體強𠘧𠘧然脈反沉遲此為痙栝蔞桂枝湯主之太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之剛痙為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯此陽明經藥也陽明總宗筋以風寒濕熱之邪入於胃中津液不行宗筋無所養故急宜此湯下濕熱行津液故宣明云痙病目直口噤背強如弓臥搖動手足搐搦宜三一承氣湯下之亦此意也然非察證之明的有實熱者亦不可輕用也按世知治痙之法創自仲景而不知仲景之論傷寒皆自內經中來其所謂剛痙者為中風發熱重感於寒而得之與內經所謂赫羲之紀上羽其病痙其義一也風淫之熱與火運之熱無少異其重感於寒亦與上羽之寒同是外郁者熱因鬱則愈甚甚則熱兼燥化而無汗血氣不得宣通大小筋俱受熱害而僵直故曰剛痙也其所謂柔痙者為太陽發熱重感於濕而得之即內經所謂諸痙項僵皆屬於濕又謂因於濕首如裹濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿肺移熱於腎傳為柔痙注云柔謂筋柔而無力痙謂骨強而不隨三者之義比之仲景所言重感於濕為柔痙者豈不同是小筋得濕則痿弛而無力者乎其搖頭髮熱頸項強急腰背反張瘛瘲口噤與剛痙形狀等者又豈不同是大筋受熱則拘攣強直者乎後代方論乃以無汗為表實有汗為表虛不思濕勝者自多汗出乃以為表虛而用姜附溫熱等劑寧不重增大筋之熱歟及守仲景方者但知剛痙用葛根湯柔痙用桂枝加葛根湯而不解金匱於柔痙之脈沉遲者在桂枝湯不加葛根而加栝蔞根蓋用葛根不惟取其解肌之熱而取其體輕可生在表陽分之津以潤筋之燥急今因沉遲沉乃衛氣不足故用桂枝以和之遲乃榮血不足故用栝蔞根其體重可生在表陰分之津此仲景隨脈浮沉用藥淺深之法也至於太陽傳入陽明胸滿口噤臥不著席腳攣齘齒者與大承氣亦可見治痙與傷寒分六經表裡無纖毫之異矣至若所謂太陽病發汗太過及瘡家不可汗而汗之因致痙者太陽病發熱脈沉細而病痙者病者身熱足寒頸項強急惡寒時頭熱面赤獨頭動搖卒口噤背反張若發其汗寒濕相得其表益虛即惡寒甚發其汗已其脈如蛇者暴腹脹大為欲解脈如故反伏弦為痙者皆不出方言治雖然能識療傷寒隨機應變之法則無患方之不足用也海藏云發汗太多因致痙身熱足寒項強惡寒頭熱面腫目赤頭搖口噤背反張者太陽痙也若頭低視下手足牽引肘膝相構陽明痙也若一目或左右斜視並一手一足搐搦者少陽痙也汗之止之和之下之各隨其經可使必已太陽痙屬表無汗宜汗之有汗宜止之陽明痙屬裡宜下之少陽痙屬半表半裡宜和之所謂各隨其經也神術湯加羌活麻黃治剛痙解利無汗白朮湯加桂心黃耆治柔痙解利有汗太陽陽明加川芎荊芥穗正陽陽明加羌活酒大黃少陽陽明加防風柴胡根熱而在表者加黃芩寒而在表者加桂枝黃耆附子熱而在裡者加大黃寒而在裡者加乾薑良薑附子右王氏分經論痙固得仲景傷寒之法矣其間用仲景方去葛根栝蔞根更風藥者殆從風痙筋強而然也及原病式論筋勁項強而不柔和者則不然乃邪在濕淫條下謂土主安靜故耳亢則害承乃制故濕過極反兼風化制之然兼化者虛象而實非風也豈可盡從風治乎又海藏分六經不及厥陰厥陰固有痙矣經云厥陰在泉客勝則大關節不利內為痙強拘急外為不便者非乎靈樞又謂足少陰筋病主癇瘛及痙此非六陰經痙病之例乎抑海藏所遺非獨此而已至若內經有謂太陽所至為寢汗痙手陽明少陽厥逆發喉痹痙者乃是人之六經所屬風寒濕熱燥火之氣自相盛衰變而為痙者也亦皆勿論予嘗思夫外感內傷之邪病痙治法迥別不可不辨天氣因八風之變鼓舞六淫而入是為經風外傷腠理內觸五臟故治邪必兼治風人氣因五性勞役感動厥陽君相二火相扇六經之淫邪而起遂有五陽勝負之變故勝者瀉負者補必兼治火調胃土以復火傷之氣蓋不可瘥也苟於內傷而用外感藥以散邪則原氣愈耗血竭神離而至於不救矣丹溪云大率與癇相似比癇為甚蓋因氣血大虛挾痰挾火而成藥宜人參竹瀝之類不可用風藥一男子二十餘歲患痘瘡靨謝後忽患口噤不開四肢強直不能屈時或繞臍腹痛一陣則冷汗如雨痛定則汗止時作時止其脈極弦緊而急此因勞倦傷血山居多風寒乘虛而感又因痘瘡其血愈虛當用辛溫養血辛涼散風遂用當歸身芍藥為君川芎青皮鉤藤為臣白朮陳皮甘草為佐桂枝木香黃連為使更加紅花少許煎十二帖而安薛新甫云痙病因傷寒汗下過度與產婦潰瘍等病及因克伐之劑傷損氣血而變若金衰木旺先用瀉青丸後用異功散腎水虛用六味丸肝火旺先用加味小柴胡湯次用加味四物湯發熱用加味逍遙散若木侮脾土用補中益氣加芍藥山梔脾經鬱結用加味歸脾湯脾土濕熱用三一承氣湯大凡病後氣血虛弱用參術濃煎佐以薑汁竹瀝時時用之如不應用十全大補湯更不應急加附子或用參附湯緩則不救虞搏治一婦人年三十餘身形瘦弱月經後忽發痙口噤手足攣縮角弓反張此去血過多風邪乘虛而入用四物湯加防風羌活荊芥少加附子行經二帖病減半六帖病全安張子和治呂君玉妻年三十餘病風搐目眩角弓反張數日不食諸醫皆作風治不效夫諸風掉眩皆屬肝木曲直搖動風之用也陽主動陰主靜由火盛制金金衰不能平木肝木茂而自病因湧風涎二三升次以寒劑下十餘行又以排針刺百會穴出血一杯立愈上內傷例痙既以有汗無汗辨剛柔又以厥逆不厥逆辨陰陽仲景雖曰痙皆身熱足寒然陽痙不厥逆其厥逆者皆陰也陽痙已前見陰痙一二日面腫手足厥冷筋脈拘急汗不出恐陰氣內傷宜八物白朮散若發熱脈沉而細者附太陰也必腹痛宜桂枝加芍藥防風防己湯又宜小續命湯陰痙手足厥逆筋脈拘急汗出不止頸項僵直頭搖口噤宜附子散桂心白朮湯附子防風散上三陰例診太陽病發熱其脈沉而細者名曰痙為難治痙脈伏按之緊如弦堅直上下行無擇云凡痙脈皆伏弦沉緊痙病發其汗已其脈滄滄如蛇暴腹脹大者為欲解脈如故反伏弦者痙此痙字恐當作死字痙病有灸瘡難治妊娠痙多由風寒濕乘虛而感皆從太陽經治之恐仍當如前例分六經表裡薛氏云若心肝風熱用鉤藤湯肝脾血虛加味逍遙散肝脾鬱怒加味歸脾湯氣逆痰滯紫蘇飲肝火風熱鉤藤散脾郁痰滯二陳薑汁竹瀝產後痙良方云產後汗多變痙因氣血虧損肉理不密風邪所乘其形口噤背強如癇或搖頭馬嘶不時舉發氣息如絕宜速灌小續命湯若汗出兩手拭不及者不治千金治產中風口噤面青手足急強用竹瀝一升分為五服微溫頻服大效婁全善云小續命湯舉卿古拜散大豆紫湯皆治產後痙太陽厥陰藥也邪實脈浮弦有力者固宜但產後血氣大虛之人不宜輕發其表第用防風當歸散治之為妙薛氏云產後痙由亡血過多筋無所養與傷寒汗下過多潰瘍膿血大泄皆敗證也急以十全大補湯如不應急加附子亦有六淫七情所致者治法見上瘛瘲瘈者筋脈拘急也瘲者筋脈張縱也俗謂之搐是也原病式云諸熱瞀瘛皆屬於火熱勝風搏並於經絡風主動而不寧風火相乘是以熱瞀瘛生矣治法祛風滌熱之劑折其火熱瞀瘛可立愈若妄加灼艾或飲以發表之劑則死不旋踵矣素問云心脈急甚者為瘛瘲此心火虛寒也治宜補心牛黃散主之靈樞云心脈滿大癇瘈筋攣此心火實熱也治宜瀉心火涼驚丸主之肝脈小急亦癇瘈筋攣此肝虛也續斷丸主之若肝脈盛者先救脾宜加減建中湯素問云脾脈急甚者亦為瘛瘲此脾虛肝乘之而瘈也故宜實土瀉肝木之劑熱傷元氣四肢困倦手指麻木時時瘛瘲人參益氣湯主之尹氏表姑年近七十暑月得病手足常自搐搦如小兒驚風狀醫者不識以訊予予曰此暑風也緣先傷於暑毛孔開而風乘之宜香薷飲加羌活防風各一錢黃耆二錢白芍藥一錢半二劑而病如失風虛昏憒不自覺知手足瘛瘲或為寒熱血虛不能服發汗藥獨活湯主之虛風證能食麻木牙關緊急手足瘛瘲目肉蠕瞤面腫此胃中有風胃風湯主之肝勞虛寒脅痛脹滿眼昏不食攣縮瘛瘲續斷丸主之風氣留滯心中昏憒四肢無力口眼瞤動或時搐搦或渴或自汗續命煮散主之運氣瘛瘲有二其一曰火經曰火鬱之發民病嘔逆瘛瘲又曰少陽所至為暴注瞤瘈又曰少陽司天客勝則為瘛瘲是也其二曰水經曰陽明司天燥氣下臨木氣上從民病脅痛目赤掉振鼓慄又曰歲土太過雨濕流行民病足痿不收行善瘈又曰太陰之復頭頂痛重而掉瘈尤甚是也產後瘛瘲經云肝主筋而藏血蓋肝氣為陽為火肝血為陰為水前證因產後陰血去多陽火熾盛筋無所養而然耳故癰疽膿水過多金瘡出血過甚則陽隨陰散亦多致此治法當用加味逍遙散或八珍散加丹皮鉤藤以生陰血則陽火自退諸證自愈如不應當用四君芎歸丹皮鉤藤以補脾土蓋血生於至陰至陰者脾土也故小兒吐瀉之後脾胃虧損亦多患之乃虛象也無風可逐無痰可消若屬陽氣脫陷者用補中益氣加薑桂陽氣虛敗者用十全大補加桂附亦有復生者此等證候若肢體惡寒脈微細者此為真狀若脈浮大發熱煩渴此為假象唯當固本為善無力抽搐戴眼反折汗出如珠者皆不治古方海藏愈風湯交加散增損柴胡湯秦艽湯顫振顫搖也振動也筋脈約束不住而莫能任持風之象也內經云諸風掉眩皆屬肝木肝主風風為陽氣陽主動此木氣太過而克脾土脾主四肢四肢者諸陽之末木氣鼓之故動經謂風淫末疾者此也亦有頭動而手足不動者蓋頭乃諸陽之首木氣上衝故頭獨動而手足不動散於四末則手足動而頭不動也皆木氣太過而兼火之化也木之畏在金金者土之子土為木克何暇生金素問曰肝一陽也心二陽也腎孤臟也一水不能勝二火由是木挾火勢而寡於畏反侮所不勝直犯無憚難經謂木橫乘金者是也此病壯年鮮有中年已後乃有之老年尤多夫老年陰血不足少水不能制盛火極為難治前哲略不及之唯張戴人治新寨馬叟作木火兼痰而治得效遇此證者當參酌厥旨而運其精思云新寨馬叟年五十九因秋欠稅官杖六十得驚氣成風搐已三年矣病大發則手足顫掉不能持物食則令人代哺口目張睒唇舌嚼爛抖擻之狀如線引傀儡每發市人皆聚觀夜臥發熱衣被盡蹇遍身燥癢中熱而反外寒久欲自盡手不能繩傾產求醫至破其家而病益堅叟之子邑中舊小吏也以父母病訊戴人戴人曰此病甚易治若隆暑時不過一湧再湧奪則愈矣今已秋寒可三之如未更刺腧穴必愈先以通聖散汗之繼服湧劑湧痰一二升至晚又下五七行其疾小愈待五日再一湧出痰三四升如雞黃成塊狀如湯熱叟以手顫不能自探妻與代探咽嗌腫傷昏憒如醉約一二時許稍稍省又下數行立覺足輕顫減熱亦不作足亦能步手能巾櫛自持匙箸未至三湧病去如濯病後但覺極寒戴人曰當以食補之久則自退蓋大疾之去衛氣未復故宜以散風導氣之藥切不可以熱劑溫之恐反成他病也孫一奎曰據戴人此治非真知為痰火盛實莫敢如此療也木之有餘由金之衰弱病既久矣恐亦有始同而終異者況吐汗下之後謂絕不必補養可乎病之輕者或可用補金平木清痰調氣之法在人自斟酌之中風手足軃曳星附散獨活散金牙酒無熱者宜之摧肝丸鎮火平肝消痰定顫有熱者宜之氣虛而振參朮湯補之心虛而振補心丸養之挾痰導痰湯加竹瀝老人戰振宜定振丸攣內經言攣皆屬肝肝主身之筋故也又陽明之復甚則入肝驚駭筋攣又脾移寒於肝癰腫筋攣有熱有寒有虛有實熱攣者經所謂肝氣熱則筋膜乾筋膜乾則筋急而攣又云因於濕首如裹濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿之類是也丹溪云大筋軟短者熱傷血不能養筋故為拘攣小筋弛長者濕傷筋不能束骨故為痿弱筋膜乾者用生苄當歸之屬濡之大筋軟短者薏苡仁散主之衍義云筋急拘攣有兩等素問大筋受熱則縮而短故攣急不伸則可用薏苡仁若素問言因寒筋急不可用也寒攣者經所謂寒多則筋拳骨痛者是也烏頭湯千金薏苡仁湯虛攣者經所謂虛邪搏於筋則為筋拳又云脈弗榮則筋急又仲景云血虛則筋急此皆血脈弗榮於筋而筋成攣故丹溪治攣用四物加減本事治筋急極用養血地黃丸蓋本乎此實攣者丹溪治一村夫背傴僂而足攣已成廢人診其脈兩手皆沉弦而澀遂以戴人煨腎散與之上吐下瀉過月餘久吐瀉交作如此凡三帖然後平復東垣治董監軍臘月大雪初霽出外忽覺有風氣暴僕診得六脈俱弦甚按之洪實有力其證手攣急大便秘澀面赤熱此風寒始至加於身也四肢者脾也以風寒之邪傷之則搐急而攣痹乃風淫末疾而寒在外也內經云寒則筋攣正此謂也本人素多飲酒內有實熱乘於腸胃之間故大便閉澀而面赤熱內則手足陽明受邪外則足太陰脾經受風寒之邪用桂枝甘草以卻其寒邪而緩其急搐用黃柏之苦寒滑以瀉實而潤燥急救腎水用升麻葛根以升陽氣行手足陽明之經不令遏絕更以桂枝辛熱入手陽明之經為引用潤燥復以芍藥甘草專補脾氣使不受風寒之邪而退木邪專益肺金也加人參以補元氣為之輔佐加當歸身去裡急而和血潤燥名之曰活血通經湯更令暖房中近火摩搓其手乃愈本事方春夏服養血地黃丸秋服羚羊角湯冬服烏頭湯下虛則挾腰膝疼痛防風散上虛則挾心神煩熱不得睡臥麥門冬散黃耆丸外感風濕四肢拘攣蒼耳子搗末煎服酒煮木瓜令爛研作粥漿用裹筋急處冷即易灸筋急不能行內踝筋急灸內踝四十壯外踝筋急灸外踝三十壯立愈眩暈眩謂眼黑眩也運如運轉之運世謂之頭旋是也內經論眩皆屬肝木屬上虛丹溪論眩主於補虛治痰降火仲景治眩亦以痰飲為先也趙以德曰丹溪先生主火而言者道也然道無所之而不在道之謂何陰陽水火是也其順淨清謐者水之化動擾撓亂者火之用也腦者地氣之所生故藏於陰目之瞳子亦腎水至陰所主所以二者皆喜靜謐而惡動擾靜謐則清明內持動擾則掉擾散亂是故腦轉目眩者皆由火也靈樞曰五臟六腑之精氣皆上注目而為之精筋骨血氣之精與脈併為目系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣所謂邪者風寒濕熱內外之諸邪也然諸邪晝謂以火之所成眩者何內經謂諸風掉眩皆屬肝木者是專言風邪矣原病式釋之曰風火皆屬陽多為兼化陽主乎動兩動相搏則頭目為之眩暈而旋轉火本動也焰得風則自然旋轉於是乎掉眩掉搖也眩昏亂旋運也此非風邪之因火所成者歟然風有內外外入者兼火化者則如是若內發者尤是因火所生之風也及諸篇中考之有謂厥陰司天客勝耳鳴掉眩厥陰之勝者亦然此司天之氣從上受者外入者也又謂發生之紀與歲木運太過皆掉眩巔疾善怒肝脈太過善忘忽忽冒眩巔疾又徇蒙招尤過在足少陽厥陰者言目瞤動蒙暗也巢氏亦謂脅下痛頭眩者肝實也此或得於肝臟應天氣者所動或因本臟虛實之氣自動皆名之為風非火之烈焰何能上於巔也至於木鬱之發甚則耳鳴眩轉目不識人善暴僵仆者尤是肝木中火發之甚也此天氣內應於臟與肝虛實之氣動者是皆名內發之風者也又謂太陽之勝熱反上行頭項頂腦中痛目如脫註文謂寒氣凌逼陽不勝之太陽之氣標在於巔入絡於腦故病如是謂太陽司天善悲時眩僕靈樞謂邪在心者病亦同二者皆是邪逼於心下致神志不安則悲心火不行則妄動上炎謂太陰之復陰氣上厥飲發於中頭項胸痛而掉瘛尤甚註文謂濕氣內逆寒氣不行太陽上留故為是病謂太陰在泉病沖頭痛目似脫註文云亦是足太陽病也謂太陰司天頭項痛善眩靈樞謂邪在腎頸項時眩此皆濕邪害腎逼太陽之氣留於上而然也至於金匱要略謂心下有支飲其人苦冒眩者亦是格其心火不行而上衝也謂尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食谷即眩謂陽明脈遲食難用飽飽則發煩頭眩二者因脾胃虛而陽氣不足所以外見遲緊之脈內受濕飲之郁不足之微陽者始與所郁之熱並而衝上於胸目也用此比類言之則眩運之病非一邪而可終若夫太乙天真元氣皆得胃脘之陽以行於周身分三陰三陽之經脈六氣應天之陰陽運行於表者謂之六化布五行於五臟屬之氣應地之陰陽運行於里者謂之五陽雖然表裡固分為二及乎一經合一臟相通氣而行則表裡必似二而一一而二者也悉如其天之有德有化有用有變於氣交者備在身形之中經曰成敗倚伏皆生於動動之清靜則生化治動之躁亂則苛疾起自此言之掉眩由人氣所動者豈止如金匱所云濕飲而已若此五陽六化妄動而病者又可勝數哉且夫凡有過節即隨其所動經臟之氣而妄起因名曰厥陽之火厥陽之火有五謂之五邪五邪之變遂勝克之病作又或腎水不足或精血傷敗不能制其五陽之火獨光或中土虛衰不能堤防下氣之逆則龍雷之火得以震動於巔諸火上至於頭重則搏擊為痛輕則旋轉為眩暈矣夫如是比類之道在經有之諸治病循法守度援物比類化之冥冥循上及下何必守經不引比類是知不明也其此之謂歟或曰治諸邪當何如曰夫火因動而起但各從其所動之因而治之因實熱而動者治其熱因邪搏擊而動者治其邪因厥逆逼上者下治所厥之邪因陰虛而起者補其陰抑其陽按而收之因陽虛而氣浮上者則補其陽斂其浮游之氣因五志而動者各安其臟氣以平之因鬱而發者治其所郁之邪開之發之因精血不足者補之不已則求其屬以衰之因勝克而動者從盛衰之氣而補瀉之中氣虛衰而動者補其土以安之上焦清明之氣虛不能主持而動者亦當補中焦之穀氣推而揚之因五臟六腑上注之精氣不足而動者察其何者之虛而補之如是雖不專治其火而火自息矣凡治百病之由火而生者皆然非唯掉眩而已嚴氏云外感六淫內傷七情皆能眩暈當以脈證辨之風則脈浮有汗項強不仁局方消風散本事川芎散羚羊角散都梁丸青州白丸子寒則脈緊無汗筋攣掣痛不換金正氣散加芎芷白芍藥甚則姜附湯濟生三五七散暑則脈洪大而虛自汗煩悶黃連香薷飲十味香薷飲消暑丸濕則脈細沉重吐逆涎沫腎著湯加川芎名除濕湯滲濕湯濟生芎術散風熱羌活湯鉤藤散寒濕芎術除眩湯理中湯仍吞來復丹甚者養正丹七情相干眩暈欲倒用十四友丸安腎丸二藥夾和以和劑七氣湯送下仍間用乳香泡湯下有氣虛者乃清氣不能上升或汗多亡陽所致當升陽補氣黃耆人參白朮川芎當歸甘菊花柴胡升麻之類直指方云淫欲過度腎家不能納氣歸元使諸氣逆奔而上此眩暈出於氣虛也宜益氣補腎湯有血虛者乃因亡血過多陽無所附而然當益氣補血芎歸湯之類直指方云吐衄崩漏肝家不能收攝榮氣使諸血失道妄行此眩暈生於血虛也宜補肝養榮湯有因虛致暈雖暈醒時面常欲近火欲得暖手按之蓋頭面乃諸陽之會陽氣不足故耳丹溪云一男子年七十九歲頭目昏眩而重手足無力吐痰口口相續左手脈散大而緩右手緩而脈大不及於左重按皆無力飲食略減而微渴大便三四日一行眾人皆與風藥至春深必死予曰此大虛證當以補藥作大劑服之眾怒而去予教用人參當歸身黃耆芍藥白朮濃煎作湯使下連柏丸三十粒如此者服一年半而精力如少壯時連柏丸冬加乾薑少許餘三時皆依本法連柏皆薑汁炒為細末又以薑汁煮糊為丸東垣云範天騋之內素有脾胃之病時顯煩躁胸中不利大便不通初冬出外晚歸為寒氣怫鬱悶亂大作火不得伸故也醫疑有熱治以疏風丸大便行而病不減又疑藥力少復加七八十丸下兩行前證仍不減復添吐逆食不能停痰吐稠黏湧出不止眼黑頭旋噁心煩悶氣短促上喘無力不欲言心神顛倒兀兀不止目不敢開如在風雲中頭苦痛如裂身重如山四肢厥冷不得安臥予謂前證乃胃氣已損復下兩次則重損其胃而痰厥頭痛作矣製半夏白朮天麻湯治之而愈中脘伏痰嘔逆眩暈旋覆花湯主之金匱方卒嘔吐心下痞膈間有水眩悸者半夏加茯苓湯主之假令瘦人臍下有悸吐涎沫而頭眩此水也五苓散主之又云心下有支飲短氣倚息形如腫為支飲其人苦冒眩澤瀉白朮湯主之澤瀉五兩白朮二兩水二升煮一升分溫再服痰閉不出者吐之青黛散搐鼻取涎治眩神效頭風眩暈可用獨聖散吐之吐訖可用清上辛涼之藥防風通聖散加半夏等味仲景云此痰結胸中而致也大小便結滯者微利之河間搜風丸體虛有寒者溫之仲景云風虛頭重眩苦極不知食味暖肌補中益精氣白朮附子湯主之肝厥狀如癇疾不醒嘔吐醒後頭虛運發熱用麻黃鉤藤皮石膏乾葛半夏曲柴胡甘草枳殼甘菊為粗末每服四錢水一鍾半生薑三片棗一枚同煎至八分去渣溫服鉤藤散鉤藤陳皮半夏麥門冬茯苓石膏人參甘菊防風各等分甘草減半為粗末每服四錢水一鍾半生薑七片煎八分溫服戴復庵云有眩暈之甚抬頭則屋轉眼常黑花觀見常如有物飛動或見物為兩宜小三五七散或芎附湯生料正元飲加鹿茸一錢下靈砂丹或用正元飲加炒川椒一十五粒下茸朱丸若不效則獨用鹿茸一味每服半兩用無灰酒一盞半煎至一盞去滓入麝香少許服緣鹿茸生於頭頭暈而治以鹿茸蓋以類相從也曾有頭痛不愈服茸朱丹而效右上一條為虛寒者設也若實熱者用之殆矣故丹溪云眩暈不可當者大黃三次酒炒干為末茶調下每服一錢至二錢劉宗厚以眩暈為上實下虛所致而又明之曰所謂虛者血與氣也所謂實者痰涎風火也是固然矣然針經胃風篇云上虛則眩又五臟生成篇云徇蒙招尤目瞑耳聾下實上虛蒙昏冒也招搖掉也瞑黑眩也即眩暈之證則劉氏所稱無乃與之冰炭乎蓋知虛者正氣虛實者邪氣實邪之所湊其氣必虛留而不去其病為實則虛即實實即虛何冰炭之有然亦當從寸部以定虛實上虛者以鹿茸法治之上實者以酒大黃法治之本事方治虛風頭旋吐痰涎不已以養正丹主之稱其升降陰陽補接真氣非止頭旋而已嚴氏云世所謂氣不歸元而用丹藥鎮墜沉香降氣之法蓋香竄散氣丹藥助火其不歸之氣豈能因此而復耶內經云治病必求其本氣之歸求其本而用藥則善矣診左手脈數熱多脈澀有死血右手脈實痰積脈大是久病神志門癲狂癇總論素問止言癲而不及癇靈樞乃有癇瘈癇厥之名諸書有言癲狂者有言癲癇者有言風癇者有言驚癇者有分癲癇為二門者迄無定論究其獨言癲者祖素問也言癲癇言癲狂者祖靈樞也要之癲癇狂大相徑庭非名殊而實一之謂也靈樞雖編顛狂為一門而形證兩具取治異途較之於癇又不侔矣徐嗣伯云大人曰癲小兒曰癇亦不然也素問謂癲為母腹中受驚所致今乃曰小兒無癲可乎癇病大人每每有之婦人尤多今據經文分辨於後癲者或狂或愚或歌或笑或悲或泣如醉如癡言語有頭無尾穢潔不知積年累月不愈俗呼心風此志願高大而不遂所欲者多有之狂者病之發時猖狂剛暴如傷寒陽明大實發狂罵詈不避親疏甚則登高而歌棄衣而走逾垣上屋非力所能或與人語所未嘗見之事如有邪依附者是也癇病發則昏不知人眩仆倒地不省高下甚而瘛瘲抽掣目上視或口眼喎斜或口作六畜之聲趙以德曰考之內經有癇有癲以癇而名者曰心脈滿大癇瘈筋攣注云心脈滿大則肝氣下流熱氣內摶筋乾血枯故癇瘈筋攣曰肝脈小急癇瘈筋攣注云肝養筋臟血肝氣受病故癇瘈筋攣曰二陰急為癇厥注云少陰也曰治癇驚脈王注云陽陵泉也陽陵泉乃足少陽合穴也曰厥狂顛疾久逆之所生也靈樞以癇名者曰足少陰筋病主癇瘈及痙曰暴攣癇眩足不任身取天柱以癲名者肺脈急甚為癲疾腎脈急甚為骨癲疾癲狂篇則曰癲疾始生先不樂頭重痛視舉目赤甚作極已而煩心候之於顏取手太陽陽明太陰血變而止治癲疾者常與之居察其所當取之處病至視之有過者瀉之置其血於瓠壺中至其發時血獨動矣不動灸窮骨二十壯窮骨者骶骨也骨癲疾者顑齒諸腧分肉皆滿而骨居汗出煩悗嘔多沃沫氣下泄不治筋癲疾者身倦攣急大刺項大經之大杼嘔多沃沫氣下泄不治脈癲疾者暴僕四肢之脈皆脹而縱脈滿盡刺之出血不滿灸之挾項太陽灸帶脈於腰相去三寸諸分肉本輸嘔多沃沫氣下泄不治癲疾發如狂者死不治氣下泄不治者癲本由邪入於陰陰氣滿風閉塞於下而逆上今氣下泄則自腎間正氣虛脫於下故死癲發如狂死不治者由心之陽不勝其陰氣之逆神明散亂陽氣暴絕故如狂猶燈將滅而明也雖然未可以一概論也蓋必診脈而後定陰下脫者尺脈不應如狂者寸脈不應若尺寸俱實則是陰陽交錯既癲而又狂則不可與此同語矣何以言之內經復謂陽明之厥則癲疾欲走腹滿不得臥而妄言者蓋足陽明者胃脈也與足太陰脾為表裡脾為陰胃為陽陰脈從足而上行陽脈從頭而下行二者有更虛更實之變是故陽明之厥者由太陰之脈逆上陽明之脈不得下行而返上故曰厥厥則蓄積於中蓄之未甚則癲甚則為熱熱則狂而妄言也不獨陽明之厥有是證凡足三陽之厥皆然何則如經所謂癲疾厥狂久逆之所生是也靈樞經脈篇言足太陽脈所生病者為狂癲之疾凡經脈稱是動者為氣病所生病為血病血者陰也足太陽內與腎少陰為表裡外與諸陽主氣故得為癲亦得為狂也及考越人書於二十難曰經言脈有陰陽更有相乘更相伏也脈居陰部而反陽脈見者為陽乘陰也雖時沉澀而短此謂陽中伏陰也脈居陽部而反陰脈見者為陰乘陽也脈雖時浮滑而長為陰中伏陽也重陽者狂重陰者癲詳難經之言自陰陽相伏相乘至於重陰重陽皆為癲狂之病以此諸陰陽之交錯盡能致其病非一因而已夫如是始與內經之意合奈何諸家之注止從重陰重陽為癲狂於前乘伏則勿論及按王叔和脈經云陰附陽則狂陽附陰則癲者則與難經伏匿之意即是捨己宮觀而之他邦者何以言之脈經論熱病條謂陽附陰者腰以下至足熱腰以上寒陰附陽者腰以上至頭熱腰以下寒蓋陰虛氣不能治於內則附陽而上升陽無承而不下降故上熱而下寒陽虛氣不能衛於外則下陷附於陰故下熱上寒及用脈論癲狂則謂心脈急甚為瘛瘲肝脈微澀為瘛瘲筋攣脾脈急甚為瘛瘲脈氣弦急病在肝少食腹滿頭眩筋攣癲疾脈大脈堅實者癲病脈洪大長者風眩癲疾心氣虛者精神離散陰氣衰則為癲疾陽氣衰則為狂及定生死脈則云診癲病虛則可治實則死脈實堅者生脈沉細小者死脈搏大滑久久自已沉小急實不可治小堅急亦不可治脈實而緊急癲癇可治又有論奇經之癲癇者前部左右彈者陽蹺也動苦腰痛癲癇惡風偏枯僵仆羊鳴身強皮痹取陽蹺在外踝上三寸直絕骨是後部左右彈者陰蹺也動苦癲癇寒熱皮膚強痹從少陽斜至太陽是陽維也動苦癲癇僵仆羊鳴手足相引甚者失音不能言癲疾直取客主人兩陽維脈在外踝絕骨下二寸從少陰斜至厥陰是陰維也動苦癲癇尺寸俱浮直下直上此為督脈腰背強痛不得俯仰大人癲病小兒癇疾脈來中央浮直上下痛者督脈也動苦腰背膝寒大人癲小兒癇也灸頂上三丸或曰奇經之癲癇古今所無脈經獨言之何也曰豈無所自者哉按越人難經曰奇經八脈者不拘於十二經何也蓋經有十二絡有十五凡二十七氣相隨上下獨八脈不拘於經也比於聖人圖設溝渠溝渠滿溢流入深湖故聖人不能拘通也而人脈隆盛入於八脈而不環周故十二經亦不能拘之其受邪氣蓄則腫熱砭射之也今於衝任帶且勿論獨用五脈病癲癇者言督脈者注云其脈之流行起自下極循脊中上行至大椎與手足三陽脈交會上至喑門穴與陽維會上至百會與太陽交會下至於鼻柱下水溝穴與手陽明交會據此推之實為諸陽之海陽脈之都綱也病則脊強而厥陽維陰維者維絡一身陽維維於陽陰維維於陰為病心苦痛陽蹺脈者起於跟中循外踝上行入風池陰蹺脈者亦起跟中循內踝上行至咽喉注云蹺揵疾也言此脈是人行走之機要動足之所由故曰蹺脈焉陰蹺為病陽緩而陰急陽蹺為病陰緩而陽急然而言二蹺之所行尚未及二脈皆上交會於目內眥陽脈交於陰則目閉陰脈交於陽則目開若靈樞癲狂篇首敘目之外內上下眥者正為癲則目閉狂則目開之不同也故大惑諸篇亦曰衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉也衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑矣由是而推晝夜榮衛行五十度而寤寐之機豈不在二脈乎二脈者足少陰腎之別脈也督與腎之大絡同起於會陰脈經謂陽維從少陽斜至太陽陰維從少陰斜至厥陰自其腎肝同在下焦主地道資生言之可見五脈皆是輔相天機動用於形體之要者也故不隨十二經之環周嗟乎巢氏方不達王叔和之指撰為病源不復妝採於是後失傳焉不獨此也至於聖人之旨亦不皆及輒立五癲之說一曰陽癲發如死人遺尿食頃乃解二曰陰癲初生小兒臍瘡未愈數洗浴因此得之三曰風癲發時眼目相引牽縱反僵羊鳴食頃乃解由熱作汗出當風因房室過度醉飲令人心意逼迫短氣脈悸得之四曰濕癲眉頭痛身重坐熱沐頭濕結腦沸未止得之五曰馬癲發時反目口噤手足相引身體皆然諸癲發則仆地吐沫無知若強倞起如狂及遺矢者難治脈虛則可治實則死由是後代錢氏方論遂增五獸所屬為五臟之癲各有其狀犬癲者反折上竄犬吠肝也雞癲者驚跳反折雞叫肺也羊癲者目瞪吐舌搖頭羊叫心也牛癇者目直視腹滿牛叫脾也豬癇者如屍吐沫豬叫腎也卻無馬癲及三因方論則復有馬癇者作嘶鳴搐搦騰踴多因挾熱者驚心動膽攝郁涎入心之所致也諸方皆以初因涎鬱閉塞臟氣不動因之倒僕口吐涎沫也安知口吐涎沫豈止素積於胸中者哉大抵癲癇之發厥乃成厥由腎中陰火上逆而肝從之故作搐搦搐搦則遍身之脂液促迫而上隨逆氣吐出於口也蓋諸方不察其病源故論如此其源何如大抵雖曰癲由邪入於陰然如前所云相乘相附交錯之變於所病經脈一一當較量而治更分其有從標而得者有從本而得者標者止在經脈氣不通眩暈倒僕本者深入兩腎間動氣中當時腎受傷而虛腎臟志志不足則神躁擾所以靈樞云其先不樂也所謂腎間者以腎居兩旁各有腎俞一穴離脊中三寸又有志室二穴楊上善謂七節之旁中有小心者指此也越人分之左屬腎右為命門命門者精神之所舍原氣之所繫及論右腎之氣與左腎相通則謂之兩腎間動氣是人生命也繫於生氣之原五臟六腑十二經脈之根本呼吸之門也夫如是者即內經所謂腎治於裡者是也所謂生氣者陽從陰極而生即蒼天之氣所自起之分也故經曰蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也或經脈引入外感內傷深入於根本傷其生氣之原邪正混亂天樞不發衛氣固留於陰而不行不行則陰氣蓄滿鬱極乃發發則命門之相火自下焦逆上填塞其音聲惟迫出其羊鳴者一二聲而已遍身之脂液脾之涎沫皆迫而上胸臆流出於口五臟六腑十二經脈筋骨肉皆不勝其沖逆故卒倒而不知也食頃火氣退散乃醒醒後若邪氣從病發而散生氣得復則顛不再作或邪不散仍與生氣混亂或邪雖退而生氣之原尚虛當時不治則邪易入而復作也如此者多成常證故內經曰癲疾者初病歲一發不治月四五發也或曰子以癲癇之疾有由邪入兩腎間而後作者此言古今未嘗聞將有所自乎曰方論未之考爾內經既有二陰之癲靈樞又有足少陰筋病之癇二陰非腎之經乎腎間動氣非腎之氣乎更以胎癇言之便可推之腎間動氣本受父母精氣既為立命之門安得各經引邪深入者不止於此乎若夫以胎始論之則七節之旁命門穴在其後臍在其前腎在兩旁胎在其中是故子臍系以胞蒂隨母呼吸母呼亦呼母吸亦吸通母之生氣食母穀氣以化育內外百骸之形者皆是腎間動氣所致也當母受驚之邪子在母腹隨呼吸得之與腎間動氣混在其中雖生出腹後一二歲始發或八九歲後發蓋小兒初生之陽如日方升邪不易入故癇未發必待復感之邪入深與所感母腹之邪相搏而後作夫如是大人與小兒病此癲疾者縱得稟質強壯終因邪害其生命之原難得中壽若發頻而志愚者僅至四十陰氣衰半而已小兒質弱目瞪者則不過歲月遠亦難出成人之年蓋腎間生命之氣虛而不復故不得壽也諸方中所治皆不及此何哉李東垣晝發灸陽蹺夜發灸陰蹺為二蹺能行下焦之陰陽陰陽行則動氣中之邪因而可散故也癲癲病俗謂之失心風多因抑鬱不遂侘傺無聊而成精神恍惚言語錯亂喜怒不常有狂之意不如狂之甚狂者暴病癲則久病也宜星香散加石菖蒲人參各半錢和竹瀝薑汁下壽星丸或以湧劑湧去痰涎後服寧神之劑因驚而得者抱膽丸思慮傷心而得者酒調天門冬地黃膏多服取效有心經蓄熱發作不常或時煩躁鼻眼覺有熱氣不能自由有類心風稍定復作清心湯加石菖蒲有病癲人專服四七湯而愈蓋痰迷為癲氣結為痰故也四川真蟬肚鬱金七兩明礬三兩細末薄荷丸如桐子大每服五六十丸湯水任下此病由七情得之痰涎包絡心竅此藥能去郁痰孫兆治相國寺僧充忽患癲疾半年名醫皆不效召孫療之孫曰但有咸物盡與食之但待云渴可來取藥今夜睡著明日便愈也至夜僧果渴孫乃與酒一角調藥一服與之有頃再索酒與之半角其僧遂睡兩晝夜乃覺人事如故僧謝之問其治法曰眾人能安神矣而不能使神昏得睡此乃靈苑方中硃砂酸棗仁乳香散也人不能用耳陳良甫治一女人眼見鬼物言語失常循衣直視醫用心藥不效投養正丹二帖煎乳香湯送下以三生飲佐之立愈滑伯仁治一僧病發狂譫妄視人皆為鬼診其脈累累如薏苡子且喘且搏曰此得之陽明胃實素問云陽明主內其經血氣俱多甚則棄衣升高逾垣妄罵遂以三化湯三四下復進以火劑即愈一妓心癡狂歌痛哭裸裎妄罵瞪視默默脈之沉堅而結曰得之憂憤沉鬱食與痰交積胸中湧之皆積痰裹血復與火劑清上膈而愈一人方飯間坐甫定即搏爐中灰雜飯猛噬且喃喃罵人令左右掖而脈之皆弦直上下行而左手寸口尤浮滑蓋風痰留心胞證也法當湧其痰而凝其神湧出痰沫四五升即熟睡次日乃寤寤則病已去矣徐以治神之劑調之如舊若脈乍大乍小乍有乍無忽六部一息四至如常忽如雀啄如屋漏如蝦游魚戲此鬼祟之徵也宜以針灸治之扁鵲曰百邪所病者針有十三穴也凡針之體先從鬼宮起次針鬼信便至鬼壘又至鬼心末必須並針止五六穴即可知矣若是邪蠱之精便自言說論其由來往驗有實立得其精邪必須盡其命求去治之男從左起針女從右起針若數處不言便遍穴針也依訣而行針灸等處並宜主之仍須依法治之萬不失一黃帝掌訣別是術家秘要縛鬼禁劫五嶽四瀆山精鬼魅並悉禁之有在人兩手中十指節間第一針人中名鬼宮從左邊下針上邊出之第二針手大指爪甲下名鬼信入肉三分第三針足大指爪甲下名鬼壘入肉二分第四針掌後橫紋名鬼心針入半寸即太淵穴第五針外踝下白肉際足太陽名鬼路火針七鋥三下即申脈穴第六針大椎上入髮際一寸名鬼枕火針七鋥三下第七針耳前髮際宛宛中耳垂下五分名鬼床火針七鋥三下第八針承漿名鬼市從左出右第九針手橫紋上三寸兩筋間名鬼路即勞宮穴第十針直鼻上入髮際一寸名鬼堂即上星穴火針七鋥三下十一針陰下縫灸三壯女人即玉門頭名鬼臟十二針尺澤橫紋外頭接白肉際名鬼臣即曲池穴火針七鋥三下十三針舌頭一寸當舌中下縫刺貫出舌上名鬼封仍以一板橫口吻先針頭令舌不得動已前若是手足皆相對針兩穴若是孤穴即單針之秦承祖灸鬼法以病者兩手大拇指相併用細麻繩扎縛定以大艾炷騎縫灸之甲及兩指角肉四處著火一處不著即無效灸七壯神驗狂難經曰狂之始發少臥而不飢自高賢也自辯智也自貴倨也妄笑好歌樂妄行不休是也素問病能篇帝曰有病怒狂者此病安生岐伯曰生於陽也陽氣者暴折而難決故善怒病名曰陽厥曰何以知之曰陽明者常動巨陽少陽不動不動而動大疾此其候也治之奪其食即已夫食入於陰長氣於陽故奪其食即已使之服以生鐵落為飲夫生鐵落者下氣疾也陽氣怫鬱而不得疏越少陽膽木挾三焦少陽相火巨陽陰火上行故使人易怒如狂其巨陽少陽之動脈可診也奪其食不使胃火復助其邪也飲以生鐵落金以制木也木平則火降故曰下氣疾速氣即火也陽明脈解篇帝曰陽明病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者何也岐伯曰四肢者諸陽之本也陽盛則四肢實實則能登高也熱盛於身故棄衣欲走也陽盛則使人妄言罵詈不避親疏而不欲食不欲食故妄走也脈解篇云陽明所謂病甚則欲乘高而歌棄衣而走者陰陽復爭而外並於陽故使之棄衣而走也治法上實者從高抑之生鐵落飲抱膽丸養正丹在上者因而越之瓜蒂散來蘇膏子和治一人落馬發狂以車軸埋之地中約高二丈許上安中等車輪其輞上鑿一穴如作盆之狀縛病人在其上使之伏臥以軟裀襯之又令一人於下坐機一枚以棒攪之轉千百遭病人吐出青黃涎沫一二斗許病人自言不堪因解之索水與冰水飲數升而愈陽明實則脈伏宜下之大承氣湯海藏治許氏病陽厥狂怒罵詈親疏或哭或歌六脈舉按無力身表如冰石發即叫呼聲高因不與之食用大承氣湯下之得渣穢數升狂稍寧數日復發復下如此五七次行大便數斗疾瘥身溫脈生良愈此易老奪食之法也當歸承氣湯保命集云若陽狂奔走罵詈不知親疏此陽有餘陰不足大黃芒硝去胃中實熱當歸補血益陰甘草緩中加薑棗者胃屬土此引入胃中也經所謂微者逆之甚者從之此之謂也以大利為度微緩以瓜蒂散入防風末藜蘆末吐之其病立安後用調心散洗心散涼膈散解毒湯等調之子和治一人以調胃承氣大作湯下數十行三五日復上湧一二升三五日復下之凡五六十日下百餘行吐亦七八度如吐時暖室置火以助其汗此三法並施例也郁者發之子和治一叟年六十值徭役煩擾而暴發狂口鼻覺如蟲行兩手爬搔數年不已診其脈兩手皆洪大如絙斷之曰肝主謀膽主決徭役迫遽財不能支則肝屢謀而膽屢不能決屈無所伸怒無所泄心火盤薄乘陽明金然胃本屬土而肝屬木膽屬相火火隨木氣而入胃故暴發狂乃命置燠室中湧而汗出如此三次內經曰木鬱則達之火鬱則發之正謂此也又以調胃承氣湯半斤用水五升煎半沸分作三服大下二十行血水與瘀血相雜而下數升來日乃康以通聖散調其後虛者補之寧志膏一醉膏辰砂散蓋狂之為病少臥少臥則衛獨行陽不行陰故陽盛陰虛今昏其神得睡則衛得入於陰而陰得衛填不虛陽無衛助不盛故陰陽均平而愈矣經云悲哀動中則傷魂魂傷則狂妄不精不精則不正此悲哀傷魂而狂當以喜勝之以溫藥補魂之陽婁云仲景防己地黃湯本事驚氣丸之類是也經云喜樂無極則傷魄魄傷則狂狂者意不存人此喜樂傷魄而狂當以恐勝之以涼藥補魄之陰婁云辰砂鬱金白礬之類是也初虞世用苦參末蜜丸桐子大每服十丸薄荷湯化下蓋子午乃少陰君火對化故藥之味苦而氣寒者類能助水而抑火諸躁狂越皆屬於火故苦參一味能療之戴院使主治痰寧心用辰砂妙香散加金箔真珠末雜青州白丸子末濃薑湯調下吞十四友丸滑石六一湯加真珠末白湯調下熱入血室發狂不認人牛黃膏主之金匱云病如狂狀妄行獨語不休無寒熱其脈浮防己地黃湯主之有婦人狂言叫罵歌笑不常似祟憑依一邊眼與口角吊起或作狂治或作心風治皆不效乃是舊有頭風疾風痰使然用芎辛湯加防風數服頓愈癇癇病與卒中痙病相同但癇病僕時口中作聲將醒時吐涎沫醒後又復發有連日發者有一日三五發者中風中寒中暑之類則僕時無聲醒時無涎沫醒後不復再發痙病雖亦時發時止然身強直反張如弓不如癇之身軟或如豬犬牛羊之鳴也原病式以由熱甚而風燥為其兼化涎溢胸膈燥爍而瘛瘲昏冒僵仆也三因以驚動臟氣不平鬱而生涎閉塞諸經厥而乃成或在母腹中受驚或感六氣或飲食不節逆於臟氣而成蓋忤氣得之外驚恐得之內飲食屬不內外所因不同治法亦異如驚者安神丸以平之痰者三聖散以吐之火者清神湯以涼之可下則以承氣湯下之丹溪大法分痰與熱多少治之以黃芩黃連栝蔞半夏南星為主有熱以涼藥清其心有痰必用吐吐後用東垣安神丸及平肝之藥青黛柴胡川芎之類子和法癇病不至目瞪如愚者用三聖散投之更用火盆於暖室中令汗吐下三法並行次服通聖散百餘日愈矣虛不禁吐下者星香散加人參菖蒲茯苓麥門冬各一錢全蠍三個入竹瀝下酥角丸楊氏五癇丸犀角丸龍腦安神丸參朱丸琥珀壽星丸或用天南星九蒸九曬為末薑汁打糊丸如桐子大每服二十丸煎人參麥門冬茯神菖蒲湯入竹瀝下治法雜論云凡病發項強直視不省人事此乃肝經有熱也或有咬牙者先用葶藶苦酒湯吐之吐後可服瀉青丸下之次服加減通聖散顯咬牙證用導赤散治之則愈如病發者可用輕粉白礬代赭石發過米飲調下經云重劑以鎮之海藏云治長洪伏三脈風癇驚癇發狂惡人與火者灸第三椎第九椎服局方妙香丸以針穿一眼子透冷水內浸少時服之如本方若治弦細緩三脈諸癇似狂者李仲南五生丸晝發治陽蹺升陽湯夜發治陰蹺先灸兩蹺各二七壯然後服前藥凡灸癇必須先下之乃可灸不然則氣不通能殺人平旦發者足少陽晨朝發者足厥陰日中發者足太陽黃昏發者足太陰人定發者足陽明半夜發者足少陰煎藥中各加引經藥千金云病先身熱瘛瘲驚啼而後發脈浮洪者為陽癇病在六腑外在肌膚猶易治也先身冷不驚掣不啼叫病發脈沉者為陰癇病在五臟內在骨髓難治也劉宗厚曰陰陽癇猶急慢驚陽癇不因吐下由其有痰有熱客於心胃之間因聞大驚而作若熱盛雖不聞驚亦自作也宜用寒藥以攻治之陰癇亦本於痰熱所作醫以寒涼攻下太過損傷脾胃變而成陰宜用溫平補胃燥痰之藥治之若曰不因壞證而有陰陽之分則是指痰熱所客表裡臟腑淺深而言癇病豈本自有陰寒者哉病久成積厚朴丸從本方春秋加添外又於一料中加人參菖蒲茯苓各一兩五錢和劑服之積久生蟲妙功丸取之病愈後痰熱藥中加養血寧神之藥如四物酸棗仁遠志麥門冬安神丸至寶丹服餌不輟仍加謹節疾不再作矣診脈洪長伏為風癇弦細緩為諸癇浮為陽癇沉為陰癇虛弦為驚沉數為實熱沉小急實者虛而弦急者皆不治煩躁總論成氏曰煩為擾亂而煩躁為憤激而躁合而言之煩躁為熱也析而言之煩陽也躁陰也煩為熱之輕者躁為熱之甚者陳氏曰內熱曰煩外熱曰躁東垣煩躁發熱論黃帝針經五亂篇云氣亂於心則煩心密默俯首靜伏云云氣在於心者取少陰心主之俞又云咳喘煩冤者是腎氣之逆也又云煩冤者取足少陰又云煩冤者取足太陰仲景分之為二煩也躁也蓋火入於肺則煩入於腎則躁俱在於腎者以道路通於肺母也大抵煩躁者皆心火為病心者君火也火旺則金爍水虧唯火獨存故肺腎合而為煩躁又脾經絡於心中心經起於脾中二經相搏濕熱生煩夫煩者擾擾心亂兀兀欲吐怔忡不安躁者無時而熱冷汗自出少時則止經云陰躁者是也仲景以梔子色赤而味苦入心而治煩鹽豉色黑而味鹹入腎而治躁名梔子豉湯乃神藥也若有宿食而煩者梔子大黃湯主之運氣煩躁有二一曰熱助心火煩躁經云少陰之復燠熱內作煩躁鼽嚏又云少陽之復心熱煩躁便數憎風是也二曰寒攻心虛煩躁經云歲水太過寒氣流行邪害心火病身熱煩心躁悸陰厥是也先賢治煩躁俱作有屬熱者有屬寒者治獨煩不躁者多屬熱唯悸而煩者為虛寒治獨躁不煩者多屬寒唯火邪者為熱蓋煩者心中煩胸中煩為內熱也躁者身體手足躁擾或裸體不欲近衣或欲在井中為外熱也內熱者有本之熱故多屬熱外熱者多是無根之火故屬寒也診內外俱虛身體冷而汗出微嘔而煩擾手足厥逆體不得安靜者死熱病七八日其脈微細小便不利加暴口燥脈代舌焦乾黑者死虛煩懊憹瞀悶並虛煩之劇者不別立門活人云虛煩似傷寒非傷寒也成無己云傷寒有虛煩有心中煩有胸中煩二說不同考之於書成無己之言實出仲景活人無據然往往有非因傷寒而虛煩者今故兩存之陳無擇云虛煩身不覺熱頭目昏疼口乾嗌燥不渴清清不寐皆虛煩也保命集云起臥不安睡不穩謂之煩宜梔子豉湯竹葉石膏湯活人云但獨熱者虛煩也諸虛煩熱與傷寒相似但不惡寒身不疼痛故知非傷寒也不可發汗頭不痛脈不緊數故知非裡實也不可下病此者內外皆不可攻攻之必遂煩渴當與竹葉湯若嘔者與陳皮湯一劑不愈再與之三因淡竹茹湯東垣硃砂安神丸仲景云下利後更煩按之心下濡者為虛煩也梔子豉湯主之素問帝曰有病身熱汗出煩滿煩滿不為汗解此為何病岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥帝曰願卒聞之岐伯曰巨陽主氣故先受邪少陰與其為表裡得熱則上從之從之則厥也帝曰治之奈何岐伯曰表裡刺之飲之服湯表謂太陽里謂少陰剌以治風湯以止逆上之腎氣如仲景止逆下氣麥門湯之類丹溪治一女子年二十餘歲在室素強健六月間發煩悶困憊不食發時欲入井六脈皆沉細而弱數兩日後微渴眾以為病暑治不效四五日加嘔而人瘦手心極熱喜在陰處漸成伏脈時妄語乃急制局方妙香丸如桐子大以井水下一丸半日許大便藥已出病無退減遂以麝香水洗藥以針穿三竅次日以涼水送下半日許大便下稠痰數升是夜得睡困頓伏枕旬日而愈因記金匱云昔肥而今瘦者痰也遂作此藥治之溫膽湯治大病後虛煩不得眠審知有飲者用之無飲者勿用金匱酸棗湯治虛勞虛煩不得眠上九法治熱煩前五法煩熱怔忡知熱在心肺也故用竹葉石膏硃砂鎮墜其熱使下行也第六法煩而下利知熱在上也故用梔豉湯吐之第七法煩而汗出不解知表裡有邪也故用表裡飲湯第八法脈沉口渴手心熱知熱不在表也故用妙香丸下之第九法溫膽酸棗治不得眠也凡心虛則煩心肝腎脾虛亦煩心經云夏脈者心也其不及者令人煩心又云肝虛腎虛脾虛皆令人體重煩冤是知煩多生於虛也大法津液去多五內枯燥而煩者八珍湯加竹葉酸棗仁麥門冬榮血不足陽勝陰微而煩者人參生地黃麥門冬地骨皮白芍藥竹茹之屬或人參養榮湯下硃砂安神丸腎水下竭心火上炎而煩者竹葉石膏湯下滋腎丸病後虛煩有飲溫膽湯無飲遠志湯產痘滯下後虛煩為血液耗散心神不守危矣宜猛進獨參湯煩而小便不利五苓散心中蘊熱而煩清心蓮子飲煩而嘔不喜食陳皮湯運氣煩有五一曰熱助心實而煩經云少陰司天熱淫所勝病胸中煩熱嗌乾又云少陽司天火淫所勝病煩心胸中熱又云少陽之勝煩心心痛治以鹹寒是也二曰心從水制而煩經云太陽司天寒氣下臨心氣上從寒清時舉火氣高明心熱煩是也三曰金攻肝虛而煩經云歲金太過燥氣流行肝木受邪民病體重煩冤是也四曰土攻腎虛而煩經云歲土太過雨濕流行腎水受邪民病體重煩冤又云歲水不及濕乃大行民病煩冤足痿是也五曰木攻脾虛而煩經云歲木太過風氣流行脾土受邪民病體重煩冤蓋肝虛腎虛皆令人體重煩冤故金太過則肝虛土太過則腎虛木太過則脾虛凡此三太過之歲則肝腎脾受邪而虛皆病體重煩冤也灸刺煩心有四其一取心俞經云心主手厥陰心包絡之脈所生病者煩心心痛掌中熱詳盛虛寒熱陷下取之又云氣亂於心則煩心密默俯首靜伏取之手少陰心主之腧是也其二取腎膀胱俞經云腎足少陰之脈所生病者煩心心痛痿厥足下熱痛視盛虛熱寒陷下取之又云舌縱涎下煩悗取足少陰又云足少陰之別名曰大鐘當踝後繞跟別走太陽其病氣逆則煩悶取之所別也又汗出煩滿不解表裡取之巨陽少陰也其三取肺俞經云手太陰之脈所生病者煩心胸滿視盛虛熱寒陷下取之又云振寒洒洒鼓頷不得汗出腹脹煩冤取手太陰是也其四取脾俞經云脾足太陰之脈所生病者煩心心下急痛溏瘕泄水閉視盛虛熱寒陷下取之是也胎前煩妊娠煩悶名曰子煩以四月受少陰君火以養精六月受少陽相火以養氣若母心驚膽寒多有是證產寶云是心肺虛熱或痰積於胸若三月而煩者但熱而已若痰飲而煩者吐涎惡食內熱者竹葉湯竹茹湯益母丸氣滯者紫蘇飲痰滯者二陳白朮黃芩枳殼氣鬱者分氣飲加川芎脾胃虛弱者六君紫蘇山梔產後煩金匱云婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者三物黃芩湯主之又云婦人產中虛煩亂嘔逆安中益氣竹皮大丸主之產後余血不盡奔心煩悶生藕汁飲二升竹瀝亦得產後余血攻心或下血不止心悶面青冷氣欲絕羊血一盞頓服如不定更服產後血虛氣煩生地黃汁清酒各一盞相和煎一沸分二服蒲黃方寸匕以東流水和服良產後去血過多血虛則陰虛陰虛生內熱心胸煩滿短氣頭疼悶亂晡時輒甚與大病後虛煩相類宜和劑人參當歸散產後短氣欲絕心中煩悶竹葉湯甘竹湯產後虛煩不得眠芍藥梔豉湯酸棗湯經驗方治產後煩躁禹餘糧一枚狀如酸餡者入地埋一半四面緊築用炭一秤發頂火一斤煅去火三分耗二為度用濕砂土奄一宿方取出打去外面一重只使裡面細研水淘澄五七度將紙襯干再研數千遍用甘草煎湯調二錢匕躁經云諸躁狂越皆屬於火又曰陰盛發躁名曰陰躁欲坐井中宜以熱藥治之何也成無己曰雖躁欲坐井中但欲水不得入口是也東垣云陰躁之極欲坐井中陽已先亡醫猶不悟復指為熱重以寒藥投之其死也何疑焉況寒涼之劑入腹周身之火得水則升走矣宜霹靂煎理中湯四逆湯之類治之譫妄屍疰等證丹溪虛病痰病有似鬼祟論血氣者身之神也神既衰乏邪因而入理或有之若夫血氣兩虧痰客中焦妨礙升降不得運用以致十二官各失其職視聽言動皆有虛妄以邪治之其人必死籲哉冤乎誰執其咎憲幕之子傅兄年十七八時暑月因大勞而渴欲飲梅漿又連得大驚三四次妄言妄見病似鬼邪診其脈兩手皆虛弦而帶沉數予曰數為有熱虛弦是大驚又梅漿之酸鬱於中脘補虛清熱導去痰滯病乃可安遂與人參白朮陳皮茯苓芩連等藥濃煎湯入竹瀝薑汁與旬日未效眾皆尤藥之不對予脈之知其虛之未完與痰之未導也仍與前方入荊瀝又旬日而安外弟戚一日醉飽後亂言妄見詢之系伊亡兄附體言出前事甚的乃叔在邊叱之曰非邪乃食魚生與酒太過痰所為耳灌鹽湯一大碗吐痰一二升汗因大作歷一宵而安金氏婦壯年暑月赴筵歸乃姑詢其坐次失序遂赧然自愧因此成疾言語失倫其中多間一句曰奴奴不是脈大率皆數而弦予曰此非邪乃病也但與補脾清熱導痰數日當自安其家不信邀數巫者噴水而呪之旬余而死或曰病非邪而以邪治之何遽至於死予曰暑月赴宴外境蒸熱辛辣適口內境鬱熱而況舊有積痰加之愧悶其痰與熱何可勝言今乃驚以法尺是驚其神而血不寧也噴以法水是瀋其體密其膚使汗不得泄汗不出則蒸熱內燔血不寧則陰消而陽不能獨立也不死何為或曰外臺秘要有禁呪一科庸可廢乎予曰移精變氣乃小術耳可治小病若內有虛邪當用正大之法自有成式昭然可考然符水惟膈上熱病一呷冷涼胃熱得之豈不暫快亦可取安若內傷而虛與冬令嚴寒符水下咽必冰胃而致害彼鬱熱在上熱邪在表須以汗解卒得清冷膚腠固密熱何由解必致內攻陰陽離散血氣乖爭去死為近又何訝焉仲景云邪哭使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人多畏合目欲眠夢遠行則精神離散魂魄妄行陰氣衰者為顛陽氣衰者為狂運氣譫妄有二一曰火邪助心經云歲火太過上臨少陰少陽病反譫妄狂越又云火太過曰赫曦其動炎灼妄擾又云少陰所至為譫妄又云少陰之復振慄譫妄又云少陽之勝心痛煩心善驚譫妄治以鹹寒是也二曰寒邪傷心經云歲水太過寒氣流行邪害心火病身熱煩心躁悸陰厥上下中寒譫妄心痛上臨太陽渴而妄冒又云陽明司天之政四之氣寒雨降振慄譫妄治以甘熱是也中風或歌哭或笑語無所不至加減續命湯中惡卒心腹脹滿吐利不行如干霍亂狀由人精神不全心志多恐遂為邪鬼所擊或附著沉沉默默妄言譫語誹謗罵詈訐露人事不避譏嫌口中好言未然禍福及至其時毫髮未失人有起心已知其故登高陟險如履平地或悲泣呻吟不欲見人如醉如狂其狀萬端但隨方俗考驗治之屍疰等證飛屍者發無由漸忽然而至其狀心腹刺痛氣息喘急脹滿遁屍者停遁在人肌肉血脈之間觸即發動亦令人心腹脹滿刺痛喘急攻脅衝心瘥後復發沉屍者發時亦心腹絞痛脹滿喘急雖歇之後猶沉痼在人腑臟令人無處不惡風屍者在人四肢循環經絡其狀淫躍去來沉沉默默不知痛處衝風則發伏屍者其病隱伏五臟積年不除未發身體都如無患發則心腹刺痛脹滿喘急又有諸屍疰候者則是五屍內之屍疰而挾外鬼邪之氣流注身體令人寒熱淋瀝或腹痛脹滿喘急或壘塊踴起或攣引腰脊或舉身沉重精神雜錯恆覺昏謬每節氣改變輒致大惡積年累月漸至頓滯以至於死死後復易旁人乃至滅門故為屍疰皆用忍冬藤葉銼數斛煮令濃取汁煎服日三瘥太乙神精丹蘇合香丸治此疾第一因喪驚憂悲哀煩惱感屍氣成諸證變動不已似冷似熱風氣觸則發用雄朱散頃在徽城日常修合神精丹一料庚申予家一婦人夢中見二蒼頭一前一後手中持一物前者云到也未後應云到也擊下爆然有聲遂魘覺後心一點痛不可忍昏悶一時許予忽憶神精丹有此一證取三粒令服之少頃已無病矣云服藥覺痛止神醒今如常矣日後相識稍有邪氣與一二服無不應驗方在千金中治中風之要藥但近世少得曾青磁石為難合耳產後譫妄陳氏云產後狂言譫語乃心血虛也用硃砂末酒調下龍虎丹參丸琥珀地黃丸薛新甫云前證當固胃氣為主而佐以見證之藥為善若一於攻痰則誤矣郭氏論產後乍見鬼神者何答曰心主身之血脈因產耗傷血脈心氣虛則敗血得積上干於心心不受觸遂致心中煩躁起臥不安乍見鬼神言語顛倒俗人不識呼為風邪如此但服調經散每服加龍膽一捻得睡即安產後發熱狂言奔走脈虛大者四物湯加柴胡不愈加甘草柴胡生地黃等分煎服亦可循衣摸床循衣撮空摸床多是大虛之候不問雜病傷寒以大補之劑投之多有得生者東垣云循衣撮空許學士說作肝熱風淫末疾故手為之循衣撮空此論雖然莫若斷之為肺熱似為愈矣其人必譫語妄言經云肺入火為譫語兼上焦有疾肺必主之手經者上焦也二者皆當其理果如何哉天地互為體用此肺之體肝之用肝主諸血血者陰物也此靜體何以自動蓋肺主諸氣為氣所鼓舞故靜得動一者說肝之用一者說肺之體此天地互為體用二者俱為當矣是知肝臟血自寅至申行陽二十五度諸陽用事氣為肝所使肺主氣自申至寅行陰二十五度諸陰用事血為肺所用海藏云婦人血風證因大脫血崩漏或前後失血因而枯燥其熱不除循衣撮空摸床閉目不醒揚手擲足搖動不寧錯語失神脈弦浮而虛內躁熱之極也氣粗鼻乾不潤上下通燥此為難治宜生地黃黃連湯主之大承氣湯氣藥也自外而之內者用之生地黃黃連湯血藥也自內而之外者用之氣血合病循衣撮空證同自氣而之血血而復之氣大承氣湯下之自血而之氣氣而復之血地黃黃連湯主之二者俱不大便診病人循衣縫譫語者不可治病人陰陽俱絕掣衣撮空妄言者死喜笑不休喜笑皆屬心火經曰心臟神神有餘則笑不休又云在臟為心在聲為笑在志為喜又云精氣並於心則喜又云火太過為赫曦赫曦之紀其病笑狂妄又云少陰所至為喜笑者是也河間云笑蕃茂鮮淑舒榮彰顯火之化也故喜為心火之志也喜極而笑者猶燔爍太甚而鳴笑之象也故病笑者心火之盛也一婦病喜笑不休已半年矣眾人皆無術求治於戴人戴人曰此易治也以滄鹽成塊者二兩餘用火燒令通赤放冷研細以河水一大碗同煎至三五沸放溫分三次啜之以釵探於喉中吐出熱痰五升次服降火劑火主苦黃連解毒是也不數日而笑定矣內經曰神有餘者笑不休也所謂神者心火是也火得風而焰故笑之象也五行之中惟火有笑常治一老男子笑不休口流涎黃連解毒湯加半夏竹葉竹瀝薑汁而笑止矣刺灸喜笑獨取心主一經經云心主手厥陰之脈是動則病面赤目黃喜笑不休詳盛虛熱寒陷下取之怒怒在陰陽為陰閉遏其陽而陽不得伸也經云陰出之陽則怒又云血並於上氣並於下心煩冤善怒東垣云多怒者風熱陷下於地是也怒屬肝膽經云在臟為肝在志為怒又云肝臟血血有餘則怒又云膽為怒是也丹溪治怒方香附末六兩甘草末一兩上和勻白湯調服五錢運氣怒皆屬木太過經云木太過曰發生發生之紀其病怒又云歲木太過風氣流行甚則善怒又云歲土不及風反大行民病善怒是也怒在禁忌多生厥逆經云陽氣者大怒則形氣絕而血菀於上使人薄厥又云暴怒傷陽又云怒則氣逆甚則嘔血及餐泄是也大法以悲勝之或用藥益肺金以平肝木善太息運氣善太息皆屬燥邪傷膽經云陽明在泉燥淫所勝病善太息又云陽明之勝太息嘔苦又云少陰司天地乃燥清悽愴數至脅痛善太息是也內經灸刺善太息皆取心膽二經經云黃帝曰人之太息者何氣使然岐伯曰思憂則心系急心系急則氣道約約則不利故太息以出之補手少陰心主足少陽留之也又曰膽病者善太息口苦嘔宿汁視足少陽脈之陷下者灸之又云膽足少陽之脈是動則病口苦善太息視盛虛實寒熱陷下取之是也悲悲屬肺經云在臟為肺在志為悲又云精氣並於肺則悲仲景云婦人臟躁喜悲傷欲哭象如神靈所作數欠伸甘麥大棗湯主之甘草三兩小麥一升大棗十枚水六升煮三升溫分三服運氣悲皆屬寒水攻心經云火不及曰伏明伏明之紀其病昏惑悲忘從水化也又云太陽司天寒氣下臨心氣上從喜悲數欠又云太陽司天寒淫所勝善悲時眩僕又云太陽之復甚則入心善忘善悲治以諸熱是也針灸悲有二其一取心經云邪在心則病心痛善悲時眩僕視有餘不足而調其輸也其二取厥陰經云厥陰根於大敦結於玉英絡於膻中厥陰為闔闔折即氣絕而喜悲悲者取之厥陰視有餘不足虛實寒熱陷下而取之也驚悸恐總論或問驚悸怔忡恐怖之別曰悸即怔忡也怔忡者本無所驚自心動而不寧驚者因外有所觸而卒動張子和云驚者為自不知故也恐者為自知也蓋驚者聞響即驚恐者自知如人將捕之狀及不能獨自坐臥必須人為伴侶方不恐懼或夜必用燈照無燈燭亦恐懼者是也內經無有稱驚怖者始於金匱要略奔豚條云有驚怖繼之云驚恐由是而見驚怖即驚恐怖懼也恐亦懼也於義且同凡連稱其名以為提綱者多是一陰一陽對待而言如喜怒並稱者喜出於心心居於陽怒出於肝肝居於陰志意並稱者志是靜而不移意是動而不定靜則陰也動則陽也驚恐並稱者驚因觸於外事內動其心心動則神搖恐因惑於外事內歉其志志歉則精卻是故內經謂驚則心無所依神無所歸慮無所定故氣亂矣恐則精卻卻則上焦閉閉則無氣還無氣還則下焦脹故氣不行矣又謂嘗貴後賤嘗富後貧悲憂內結至於脫營失精病深無氣則灑然而驚此類皆是病從外事所動內之心神者也若夫在身之陰陽盛衰而致驚恐者驚是火熱爍動其心心動則神亂神用無方故驚之變態亦不一狀隨其所之與五神相應而動肝臟魂魂不安則為驚駭為驚妄肺臟魄魄不安則驚躁脾臟意意不專則驚惑腎臟志志慊則驚恐心惕惕然胃雖無神然為五臟之海諸熱歸之則發驚狂若聞木音亦惕然心欲動也恐者則是熱傷其腎腎傷則精虛精虛則志不足志本一定而不移故恐亦無他狀內經於驚之病邪有火熱二淫司天在泉勝復之氣有各經熱病所致有三陽積並有氣並於陽皆為諸驚等病故病機統而言曰諸病驚駭皆屬於火也於恐病之邪者有精氣並於腎則恐有血不足則恐有陰少陽入陰陽相搏則恐有胃氣熱腎氣微弱則恐腎是動病者恐然於肝之驚恐互相作者以其臟氣屬陽居陰納血臟魂魂不安則神動神動則驚血不足則志歉志歉則恐故二者肝臟兼而有之似此之類於火熱二淫屬感邪之外余者之驚恐皆因人氣之陰陽所動而內生者也雖然亦非獨火熱二淫而已於陽明脈急則亦為驚矣曰驚恐二病與內外所因其治法同乎異乎曰驚則安其神恐則定其志治當分陰陽之別何得而同也夫易之為卦干坤交坎離列坎離交而後為既濟而人以五臟應之心為離火內陰而外陽腎為坎水內陽而外陰內者是主外者是用又主內者五神外用者五氣是故心以神為主陽為用腎以志為主陰為用陽則氣也火也陰則精也水也及乎水火既濟全在陰精上奉以安其神陽氣下臟以定其志不然則神搖不安於內陽氣散於外志感於中陰精走於下既有二髒水火之分治法安得無少異所以驚者必先安其神然後散亂之氣可斂氣斂則陽道行矣恐者必先定其志然後走失之精可固精固則陰氣用矣於藥而有二臟君臣佐使之殊用內外所感者亦少異焉為外事驚者雖子和氏謂驚者平之平常也使病者時時聞之習熟自然不驚固是良法不若使其平心易氣以先之而後藥之也吾謂內氣動其神者則不可用張氏之法唯當以藥平其陰陽之盛衰而後神可安志可定矣人之所主者心心之所養者血心血一虛神氣失守失守則舍空舍空而痰入客之此驚悸之所由發也或耳聞大聲目擊異物遇險臨危觸事喪志心為之忤使人有惕惕之狀是則為驚心虛而停水則胸中滲漉虛氣流動水既上乘心火惡之心不自安使人有怏怏之狀或築築然動是則為悸驚者與之豁痰定驚之劑悸者與之逐水消飲之劑所謂扶虛調養心血和平心氣而已若一切以剛燥從事或者心火自炎又有熱生風之證驚素問云東方青色入通於肝其病發驚駭脾移熱於肝則為驚衄二陽一陰發病主驚駭背痛善噫善欠者名曰風厥三陽一陰太陽脈勝一陰不得止內亂五臟外為驚駭胃足陽明之脈是動則病聞木音則惕然而驚心欲動陽明所謂甚者惡人與火聞木音則惕然而驚者陽氣與陰氣相搏水火相惡故惕然而驚也黃帝問曰足陽明之脈病惡人與火聞木音則惕然而驚鐘鼓不為動聞木音而動何也岐伯曰陽明者胃脈也胃者土也故聞木音而驚者土惡木也由是觀之肝膽心脾胃皆有驚證明矣運氣驚悸有三一曰肝木不及金來乘之經曰木不及曰委和委和之紀其發驚駭又云陽明之復甚則入肝驚駭筋攣是也二曰火邪助心經云少陽所至為驚恐又云少陽所至為驚躁又云少陽之勝善驚是也三曰寒邪傷心經云歲水太過寒氣流行病煩心躁悸是也東垣云六脈俱大按之空虛必面赤善驚上熱乃手少陰心之脈也此氣盛多而亡血以甘寒鎮墜之劑瀉火與氣以墜氣浮以甘辛溫微苦峻補其血熟地黃生地黃柴胡升麻白芍藥牡丹皮川芎黃耆之類以補之以防血溢上竭甘寒鎮墜之劑謂丹砂之類三因云五飲停蓄閉於中脘最使人驚駭屬飲家五飲湯丸心膽虛怯觸事易驚或夢寐不祥遂致心驚膽懾氣鬱生涎涎與氣搏變生諸證或短氣悸乏或復自汗者並溫膽湯主之嘔則以人參代竹茹若驚悸眠多異夢隨即驚覺者宜溫膽湯加酸棗仁蓮肉各一錢以金銀煎下十四友丸或鎮心丹遠志丸酒調妙香散琥珀養心丹定志丸寧志丸臥而多驚魘真珠母丸獨活湯羌活勝濕湯治臥而多驚悸多魘溲者邪在少陽厥陰也加柴胡五分如淋加澤瀉五分此下焦風寒二經合病也經曰腎肝之病同一治為俱在下焦非風藥行經不可也丹溪云病自驚而得者則神出於舍舍空得液則成痰矣血氣入舍則痰拒其神不得歸焉壽星丸或控涎丹加辰砂遠志驚悸因事有所大驚而成者其脈大動動脈之狀如豆厥厥動搖無頭尾者是也東垣云外物驚宜鎮平以黃連安神丸密陀僧研極細末茶湯調一錢匕治驚氣入心絡不能語者昔有為狼及大蛇所驚皆以此而安蓋驚則氣上故以重劑墜之熱鬱有痰寒水石散氣鬱有痰加味四七湯虛而有痰十味溫膽湯養心湯金匱云病有奔豚有吐膿有驚怖有火邪此四病皆從驚發得之經云陽氣者開闔不得寒氣從之乃生大僂陷脈為瘻留連肉腠俞氣化薄傳為善畏及為驚駭者是瘻瘡所為之驚駭也蓋俞則瘻瘡之俞竅其痛氣留連肉腠之間恐人觸著而痛故化惕惕然之心內薄而傳為善畏驚駭之疾也診寸口脈動而弱動即為驚弱即為悸趺陽脈微而浮浮為胃氣虛微則不能食如恐怖之脈憂迫所作也寸口緊趺陽浮滑氣虛是以悸驚主病者其脈止而復來其人目睛不轉不能呼氣悸傷寒明理論釋悸字云悸心忪也築築惕惕然動怔怔忪忪不能自安也則悸即怔忡而今人分為兩條謬矣心悸之由不越二種一者虛也二者飲也氣虛者由陽氣內虛心下空虛火氣內動而為悸也血虛者亦然其停飲者由水停心下心為火而惡水水既內停心不自安故為悸也有汗吐下後正氣內虛而悸者有邪氣交擊而悸者有榮衛涸流脈結代者則又甚焉必生津液益血以實其虛此從傷寒而論者若雜病則考諸內經云心痹者脈不通煩則心下鼓膽病者口苦嘔宿汁心下澹澹恐如人將捕之狀足陽明是動聞木音則惕然而驚心包絡是動病心中澹澹大動腎是動病善恐心惕然如人將捕之原病式云因水衰火旺其心胸躁動謂之怔忡然後知悸之為病是心臟之氣不得其正動而為火邪者也蓋心為君火包絡為相火火為陽陽主動君火之下陰精承之相火之下水氣承之夫如是而動則得其正而清淨光明為生之氣也若乏所承則君火過而不正變為煩熱相火妄動既熱且動豈不見心悸之證哉況心者神明居之經曰兩精相搏之謂神又曰血氣者人之神則是陰陽氣血在心臟未始相離也今失其陰偏傾於陽陽亦以失所承而散亂故精神怔怔忡忡不能自安矣如是者當自心臟中補其不足之心血以安其神氣不已則求其屬以衰之壯水之主以制陽光也又包絡之火非惟輔心而且遊行於五臟故五臟之氣妄動者皆火也是以各臟有疾皆能與包絡之火合動而作悸如是者當自各臟補瀉其火起之由而後從包絡調之平之隨其攸利而治若各臟移熱於心而致包絡之火動者治亦如之若心氣不足腎水凌之逆上而停心者必折其逆氣瀉其水補其陽若左腎之真水不足而右腎之火上逆與包絡合動者必峻補左腎之陰以制之若內外諸邪郁其二火不得發越隔絕榮衛不得充養其正氣者則皆以治邪解鬱為主若痰飲停於中焦礙其經絡不得舒通而鬱火與痰相擊於心下以為怔忡者必導去其痰經脈行則病自已丹溪云怔忡大概屬血虛與痰有慮便動者屬虛時作時止者痰因火動瘦人多是血虛肥人多是痰飲真覺心跳者是血少宜四物安神之類金匱云食少飲多水停心下甚者則悸微者短氣又云心下悸者半夏麻黃丸主之亦可用溫膽湯或導痰湯加炒酸棗仁下壽星丸及茯苓飲子茯苓甘草湯薑朮湯五苓散之類火盛加黃連脈結代而悸炙甘草湯久思所愛觸事不意虛耗真血心血不足遂成怔忡宜養榮湯感風寒暑濕閉塞諸經而怔忡者各見本門或有陰火上衝怔忡不已甚者火炎於上或頭暈眼花或齒落頭禿或手指如許長大或見異物或腹中作聲此陰火為患也治宜滋陰抑火湯心不寧者加養心之劑日久服降火藥不愈加附子從治或入參耆亦可有失志者由所求不遂或過誤自咎懊恨嗟嘆不已獨語書空若有所失宜溫膽湯去竹茹加人參柏子仁各一錢下定志丸仍佐以酒調辰砂妙香散有痞塞不飲食心中常有所歉愛處暗地或倚門後見人則驚避似失志狀此為卑惵之病以血不足故耳宜人參養榮湯脾胃不足者穀神嘉禾散加當歸黃耆各半錢恐臟腑恐有四一曰腎經云在臟為腎在志為恐又云精氣並於腎則恐是也二曰肝膽經云肝臟血血不足則恐戴人曰膽者敢也驚怕則膽傷矣蓋肝膽實則怒而勇敢肝膽虛則善恐而不敢也三曰胃經云胃為恐是也四曰心經云心怵惕思慮則傷神神傷則恐懼自失者是也運氣善恐皆屬肝木虛經云木不及曰委和委和之紀其病搖動注恐是也針灸善恐有三其一取腎經云腎足少陰之脈是動病氣不足則善恐心惕惕如人將捕之虛則補之寒則留之是也其二取肝經云肝虛則目䀮䀮䀮無所見耳無所聞善恐如人將捕之取其經厥陰與少陽是也其三取膽經云膽病者善太息口苦嘔宿汁心下澹澹恐人將捕之取陽陵泉又云善嘔嘔有苦善太息心中憺憺恐人將捕之邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔膽取三里以下胃氣逆則刺少陽血絡以閉膽逆卻調其虛實以去其邪是也丹溪治周本心年六十形氣俱實因大恐正月間染病心不自安如人將捕之狀夜臥亦不安兩耳後亦見火光炎上食飲雖進而不知味口乾而不欲食以人參白朮當歸身為君陳皮為佐加鹽炒黃柏炙玄參各少許煎服自愈月餘而安經云恐傷腎此用鹽炒黃柏炙玄參引參歸等藥入補腎足少陰絡也本事方人參散茯神散補膽防風湯皆治膽虛之劑健忘黃帝曰人之善忘者何氣使然岐伯曰上氣不足下氣有餘腸胃實而心氣虛虛則榮衛留於下久之不以時上故善忘也腎盛怒而不止則傷志志傷則喜忘其前言血並於下氣並於上亂而喜忘火不及曰伏明伏明之紀其病昏惑悲忘太陽司天寒氣下臨心氣上從善忘太陽之復甚則入心善忘善悲人生氣稟不同得氣之清則心之知覺者明得氣之濁則心之知覺者昏心之明者無有限量雖千百世已往之事一過目則終身記而不忘豈得忘其目前者乎心之昏者精神既短則目前不待於傷心而不能追憶其事矣劉河間謂水清明而火昏濁故上善若水下愚若火此稟質使之然也設稟質清濁混者則不耐於事物之擾擾則失其靈而健忘也蓋氣與血人之神也經曰靜則神藏躁則消亡靜乃水之體躁乃火之用故性靜則心存乎中情動則心忘於外動不已則忘亦不已忘不已則存乎中者幾希存乎中者幾希則語後便忘不俟終日已所以世人多忘者役役擾擾紛紜交錯當事於一生其氣血之陰者將竭必稟質在中人以上清明有所守不為事物所亂者百難一人也由是言之藥固有安心養血之功不若平其心易其氣養其在己而已若夫痰之健忘者乃一時之病然病忘之邪非獨痰也凡是心有所寄與諸火熱傷亂其心者皆得健忘如靈樞謂盛怒傷志志傷善忘內經謂血並於下氣並於上亂而善忘夫如是豈可不各從所由而為治耶思慮過度病在心脾宜歸脾湯有痰加竹瀝有因精神短少者人參養榮湯小定志丸寧志膏有因痰迷心竅者導痰湯下壽星丸或加味茯苓湯上虛下盛於補心藥中加升舉之劑心火不降腎水不升神志不定事多健忘宜朱雀丸千金孔子大聖枕中方龜甲龍骨遠志菖蒲四味等分為末酒服方寸匕日三服常令人大聰明治多忘方菖蒲一分茯苓茯神人參各五分遠志七分為末酒服方寸匕日三夜一五日效聖惠方菖蒲遠志各一分搗為細末戊子日服方寸匕開心不忘肘後方治人心孔惛塞多忘喜誤丁酉日密自至市買遠志著巾角中為末服之勿令人知本草商陸花主人心惛塞多忘喜誤取花陰乾百日搗末日暮水服方寸匕臥思念所欲事即於眼中自見雜門汗總論素問云陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒又云飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾凡眠熟而汗出醒則倏收者曰盜汗亦曰寢汗不分寤寐不由發表而自然汗出者曰自汗若勞役因動汗出非自汗也傷寒脈緊麻黃蔥豉發之汗出於衛傷寒脈緩白朮桂枝止之汗出於榮往來寒熱眩柴胡連翹和之汗出於少陽體若燔炭地骨皮秦艽解之汗出於三焦厥而抑鬱柴胡麻黃髮之汗出於血熱聚於胃大黃芒硝下之汗出於足陽明陰毒大汗附子乾薑溫之汗出於三陽自汗頭汗手足汗陰汗無汗心之所臟在內者為血發於外者為汗汗者乃心之液而自汗之證未有不由心腎俱虛而得之故陰陽虛必腠理髮熱自汗此固陰陽偏勝而致又有傷風中暑病濕兼以驚怖房室勞極則歷節腸癰痰飲產蓐等證亦能令人自汗仲景謂肉極則自津脫腠理開汗大出巢氏云虛勞病若陽氣偏虛則津發泄為汗又云心臟熱則腠理開腠理開則汗出諸家言汗出之義大約如此嘗因是而究之汗者津之泄也津與氣同類氣之所至津即有之以故知內經之言心為汗者大矣哉蓋心是主陽之臟陽乃火也氣也故五臟六腑表裡之陽皆心臟主之以行其變化是故津者隨其陽氣所在之處而生亦隨其火擾所在之處泄出為汗其汗盡由心出也不然何內經言風言勞動言陽陰相爭者其汗各由其所在臟腑而出之乎然五臟六腑又必以十二經脈榮衛為要因經脈是司其出入行氣之隧道榮行脈中以滋陰血衛行脈外以固陽氣陽氣固則腠理肥玄腑密而臟腑經脈榮衛通貫若一內之臟腑與表之經脈離居則兩者出入之機皆廢於是邪在於內則玄府不密而汗從腑臟出邪在表則腠理不固而汗從經脈出所以自汗之由不可勝計至若臟腑之陰拒格衛氣浮散於外無所依從或胃氣虛衰水穀氣脫散者或肺氣微弱不能宣行榮衛而津脫者如是自汗雖病重而尚有可治獨三陽之絕汗出者則不可治矣陰虛陽必湊故發熱自汗當歸六黃湯加地骨皮陽虛陰必乘故發厥自汗黃耆建中湯甚者加附子或耆附湯滑伯仁治一婦暑月身冷自汗口乾煩躁欲臥泥水中脈浮而數按之豁然虛散曰素問云脈至而從按之不鼓諸陽皆然此為陰盛格陽得之飲食生冷坐臥當風以真武湯冷飲之一進汗止再進躁去三進全安陰陽俱虛熱不甚寒不甚秋冬用桂枝春夏用黃耆脈證無熱者亦用桂枝脈證有熱者亦用黃耆或身溫如常而汗出冷者或身體冷而汗亦冷別無他病並屬本證戴復庵用黃耆建中湯加浮麥少許煎黃耆六一湯或玉屏風散平人氣象論云尺澀脈滑謂之多汗王注謂尺膚澀而尺脈滑也膚澀者榮血內涸又針經云腠理發泄汗出溱溱是謂津津脫者腠理開汗大泄按此二經論自汗多而血涸津脫者東垣周衛湯雖曰治濕勝自汗內有血藥實潤劑也可以治此濕勝自汗以東垣法治之東垣曰西南坤土也在人則為脾胃陽之汗以天地之雨名之濕主淋淫驟注者濕勝也陰滋其濕為露為雨此陰寒隔熱火也隔者解也陰濕寒下行地之氣也仲景云汗多則亡陽陽去則陰勝也重虛則表陽虛極矣甚為寒中濕勝則音聲如從甕中出若中水也相家有言土音如居深甕里言其壅也遠也不出也其為濕也審矣又知此二者亦為陰寒內經云氣虛則外寒雖見熱中蒸蒸為汗終傳大寒知始為熱中者表虛無陽不任外寒終傳為寒中者多成痹寒矣夫色以候天脈以候地形者乃候地之陰陽也故以脈氣候之皆有形之可見者也治張芸夫四月天寒陰雨寒濕相雜因官事飲食失節勞役所傷病解之後汗出不止沾濡數日惡寒重添厚衣心胸悶躁時躁熱頭目昏憒壅塞食少減此乃胃外陰火熾甚與夫雨之濕氣挾熱兩氣相合令濕熱大作汗出不休兼見風邪以助東方甲乙以風藥去其濕以甘藥瀉其熱羌活勝濕湯主之有痰證冷汗自出者宜七氣湯或理氣降痰湯痰去則汗自止火氣上蒸胃中之濕亦能作汗可用涼膈散有氣不順而自汗不止須理氣使榮衛調和小建中湯加木香素問帝曰有病身熱解惰汗出如浴惡風少氣此為何病岐伯曰病名酒風帝曰治之奈何岐伯曰以澤瀉術各十分麋銜五分合以三指撮為後飲麋銜一名薇銜俗名吳風草又云飲酒中風則為漏風漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣裳濡口乾善渴不能勞事河間以白朮散主之此即酒風也凡五臟風皆自汗惡風因飲食汗出日久心中虛風虛邪令人半身不遂見偏風痿痹之病先除其汗慓悍之氣按而收之安胃湯有病後多汗服正元散諸重劑不愈唯八珍散宜之有別處無汗獨心孔一片有汗思慮多則汗亦多病在心宜養心血用獖豬心一個破開帶血入人參當歸二兩縫之煮熟去藥止吃豬心仍以艾湯調茯苓末服之若服藥汗仍出者有熱牡蠣散無熱小建中湯加熟附子一錢不去皮或正元散仍以溫粉撲之大汗不止宜於諸藥中入煅牡蠣粉二錢半併吞硃砂丹或茸朱丹常自汗出經年累月者多用黑錫丹久病及大病新愈汗出者亦可用此若不宜熱補須交濟其陰陽自愈當以靈砂丹主之凡此皆為無他病而獨汗出者設非謂有兼病者也若服諸藥欲止汗固表而並無效驗藥愈澀而汗愈不收止可理心血蓋汗乃心之液心無所養不能攝血故溢而為汗宜大補黃耆湯加酸棗仁有微熱者更加石斛兼下靈砂丹汗出如膠之黏如珠之凝及淋漓如雨揩拭不逮者難治診肺脈軟而散者當病灌汗至今不復散發也肺脈緩甚為多汗頭汗陰陽俱虛枯燥頭汗亡津液也熱入血室頭汗傷濕額上汗因下之微喘者死胃上熱熏額汗發黃頭汗小便不利而渴此瘀血在裡也心下懊憹頭汗傷寒結胸無大熱以水結在胸脅間頭汗往來寒熱頭汗海藏云頭汗出劑頸而還血證也額上偏多何謂也曰首者六陽之所會也故熱熏蒸而汗出也額上偏多以部分左頰屬肝上頰屬肺鼻屬中州頤屬腎額屬心三焦之火涸其腎水溝渠之餘迫而上入於心之分故發為頭汗而額上偏多者屬心之部而為血證也飲酒飲食頭汗出者亦血證也至於雜證相火迫腎水上行入於心為盜汗或自汗傳而為頭汗出者或心下痞者俱同血證例治之無問傷寒雜病酒積下之而心下痞者血證也何以然曰下之亡陰亡陰者則損脾胃而亡血氣在胸中以亡其血陷之於心之分也故心下痞世人以為血病用氣藥導之則痞病愈甚而又下之故變而為中滿鼓脹非其治也然則當作何治曰獨益中州脾土以血藥治之其法無以加矣頭汗出胸脅滿小便不利往來寒熱心煩嘔而不渴柴胡桂薑湯身微熱表虛頭汗出不已或因醫者發汗以致表虛者黃耆湯手足汗一男子手足汗醫用芩連柏並補劑皆不效又足汗常多後以八物半苓為君白附川烏佐使其汗即無治腳汗白礬乾葛各等分為末每半兩水三碗煎十數沸洗日一次三五日自然無汗陰汗別見無汗經云奪血者無汗奪汗者無血束垣云真氣已虧胃中火盛汗出不休胃中真氣已竭若陰火已衰無汗反燥乃陰中之陽陽中之陽俱衰四時無汗其形不久濕衰燥旺理之常也其形不久者秋氣主殺生氣乃竭生氣者胃之穀氣也乃春少陽生化之氣也丹溪云盛夏浴食無汗為表實治謝老夏月無汗久嗽用半夏紫蘇二味為末入莎末枕流末蜆殼灰蛤粉之屬仁陷末神麯以栝蔞穰桃仁泥半兩為丸先服三拗湯三帖卻服此丸子盜汗衛氣至夜行於陰或遇天之六淫在於表或遇人氣興衰所變如天之五邪六淫者相乘於裡或臟腑經脈之陰陽自相勝負則皆有以致陽氣之不足然而非惟寒濕燥同其陰者能傷其陽而已至若風火熱同其陽者則亦傷之而相火出腎肝表裡四經者尤甚夫火與元氣不兩立故火盛則陽衰衛與陽一也陽衰則衛虛所虛之衛行陰當瞑目之時則更無氣以固其表故腠理開津液泄而為汗迨寤則目張其行陰之氣復散於表則汗止矣夫如是者謂之盜汗即內經之寢汗也內經謂腎病者腹大脛腫喘咳寢汗憎風又歲水太過甚則土氣乘之者病亦若是注曰腎邪攻肺心內微心液為汗故寢汗仲景傷寒論中名盜汗謂陽明病當作裡實而脈浮者必盜汗又三陽合病目合則汗成無己謂傷寒盜汗非若雜病者之責其陽虛而已是由邪在半表半裡使然也何者若邪氣一切在表干於衛則自汗出此則邪氣侵行於里外連於表邪及睡則衛氣行於里乘表中陽氣不致津液得泄而為盜汗亦非若自汗有為之虛者有為之實者其於盜汗悉當和表而已今觀仲景二論似若不同究其微旨則一而已矣何則內經論其源則心腎者乃陰陽之主所以論汗必自心之陽論寢必自腎之陰仲景之云從其邪之所在之陰陽便成盜汗是指陰陽之流者耳抑究其源流悉是衛氣之為用衛氣者由穀氣之所化肺臟之所布然天真之陽必得是而後充大無是則衰微故生氣通天論所言陽氣者如蒼天之氣順之則陽固與陽因而上衛外者之類皆指衛氣也所以王注以衛氣合天地之陽氣若夫成無己之釋仲景者固善矣抑亦未為至當虛勞雜病之人豈可獨責其陽虛而不有陰虛之可責者乎予每察雜病之盜汗有冷有熱豈無其故哉因熱邪乘陰虛而發者所出之汗必熱因寒邪乘陽虛而發者所出之汗必冷其汗冷之義即內經所謂陰勝則身寒汗出身上清也非獨為自汗雖盜汗亦然其溫汗之義殆以所乘之熱將同於傷寒鬱熱在表裡而汗者也雖然邪乘之重者亢則害承乃制兼化水為冷者有之相火出於腎挾水化而為冷者有之此又不可不審也蓋成無己因金匱要略敘雜病云平人脈虛弱微細善盜汗又以巢氏病源以虛勞之人盜汗有陽虛所致因即謂雜病之盜汗悉由於陽虛也且以金匱要略言之脈虛弱者乃陽氣之虛細弱者乃陰氣之虛何獨舉陽而遺其陰亦智士之一失也然虛勞之病或得於大病後陰氣未復遺熱尚留或得之勞役七情色欲之火衰耗陰精或得之飲食藥味積成內熱皆有以傷損陰血衰憊形氣陰氣既虛不能配陽於是陽氣內蒸外為盜汗灼而不已陽能久存而不破散乎當歸六黃湯治盜汗之聖藥宜潤劑者六黃湯宜燥劑者正氣湯無內熱者防風散白朮散肝火當歸龍薈丸虛者黃耆連翹湯實者三黃連翹湯身熱加地骨皮柴胡黃芩秦艽肝虛加酸棗仁肝實加龍膽草右尺實大黃柏知母煩心黃連生地黃當歸辰砂麥門冬脾虛人參白朮白芍藥乾山藥白扁豆浮麥亦可用山藥一味為末臨臥酒調下三錢經霜桑葉末茶調服豆豉微炒酒漬服外用五倍子或何首烏為末津唾調填臍中以帛縛定臟腑盜汗皆屬腎經云腎病者寢汗出憎風是也運氣盜汗皆屬寒水經云歲水太過寒氣流行甚則勞汗出憎風又云太陽所至為寢汗痙是也多臥不得臥臥不安內附靈樞大惑論云衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑矣衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉也寒熱病論云足太陽有通項入於腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間入腦乃別陰蹺陽蹺陰陽相交陽入陰陰出陽交於目銳眥陽氣盛則瞋目陰氣盛則瞑目四十六難曰老人臥而不寐少壯寐而不寤者何也然經言少壯者血氣盛肌肉滑氣道通榮衛之行不失於常故晝日精夜不寤老人血氣衰肌肉不滑榮衛之道澀故晝日不能精夜不寐也故知老人不得寐也海藏云膽虛不眠寒也酸棗仁炒為末竹葉湯調服膽實多睡熱也酸棗仁生為末薑茶汁調服素問帝曰人有臥而有所不安者何也岐伯曰臟有所傷及精有所倚則臥不安故人不能懸其病也羌活勝濕湯治臥而多驚邪在少陽厥陰也諸水病者故不得臥臥則驚驚則咳甚不得臥靈樞邪客篇帝問曰夫邪氣之客人也或令人目不瞑不臥出者何氣使然伯高曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉營氣者泌其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於陰常從足少陰之分間行於五臟六腑今厥氣客於五臟六腑則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹺陷陷當作滿不得入於陰陰虛故目不瞑黃帝曰善治之奈何伯高曰補其不足瀉其有餘調其虛實以通其道而去其邪飲以半夏湯一劑陰陽已通其臥立至黃帝曰善此所謂決瀆壅塞經絡大通陰陽和得者也願聞其方伯高曰其湯方以流水千里以外者八升揚之萬遍取其清五升煮之炊以葦薪火沸置秫米一升秫米北人謂之黃米可以釀酒治半夏五合徐炊令竭為一升半去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則臥汗出則已矣久者三飲而已也素問逆調論陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也下經曰胃不和則臥不安此之謂也金匱虛勞虛煩不得眠酸棗湯主之本事方鱉甲丸聖惠方治骨蒸煩心不得眠用酸棗仁一兩水一大盞半研絞取汁下米二合煮粥候熟下地黃汁一合更煮過不計時服之胡洽治振悸不得眠人參白朮茯苓甘草生薑酸棗仁六物煮服以上皆補肝之劑溫膽湯治大病後虛煩不得眠並內經半夏湯皆去飲之劑六一散加牛黃治煩不得眠戴云不寐有二種有病後虛弱及年高人陽衰不寐有痰在膽經神不歸舍亦令不寐虛者六君子湯加炒酸棗仁炙黃耆各一錢痰者宜溫膽湯減竹茹一半加南星炒酸棗仁各一錢下青靈丹大抵驚悸健忘怔忡失志心風不寐皆是膽涎沃心以致心氣不足若用涼心之劑太過則心火愈微痰涎愈盛病愈不減惟當以理痰氣為第一義導痰湯加石菖蒲半錢喘不得臥以喘法治之厥不得臥以腳氣法治之多臥靈樞大惑篇黃帝曰人之多臥者何氣使然岐伯曰此人腸胃大而皮膚濕而分肉不解焉腸胃大則衛氣留久皮膚濕則分肉不解其行遲夫衛氣者晝日常行於陽夜行於陰故陽氣盡則臥陰氣盡則寤故腸胃大則衛氣行留久皮膚濕分肉不解則行遲留於陰也久其氣不精則欲瞑故多臥矣其腸胃小皮膚滑以緩分肉解利衛氣之行於陽也久故少瞑焉黃帝曰其非常經也卒然多臥者何氣使然岐伯曰邪氣留於上焦上焦閉而不通已食若飲湯衛氣留久於陰而不行故卒然多臥焉運氣多睡皆屬內熱經云陽明司天之政初之氣陰始凝氣始肅病中熱善眠是也酸棗仁一兩生用臘茶二兩以生薑汁塗炙微焦搗羅為末每服二錢水七分盞煎六分溫服無時灸法無名指第二節尖一壯屈手指取之怠惰嗜臥東垣云脈緩怠惰嗜臥四肢不收或大便泄瀉此濕勝從平胃散又云怠惰嗜臥有濕胃虛不能食或沉困或泄瀉加蒼朮自汗加白朮食入則困倦精神昏冒而欲睡者脾虛弱也六君子湯加神麯麥芽山楂之屬四肢懶惰人參補氣湯丹溪云脾胃受濕沉困無力怠惰嗜臥者半夏白朮肥人是氣虛宜人參二朮半夏甘草又云是濕蒼朮茯苓滑石黑瘦人是熱黃芩白朮飲食太過轉運不調枳實白朮按人之虛實寒熱當審脈證定之豈可以肥瘦為準學者無以辭害意可也身重素問示從容論有云肝虛腎虛脾虛皆令人體重煩冤運氣身重有五一曰濕乃濕制腎虛而重經云太陰所至為身重又云太陰之復體重身滿又云歲土太過濕氣流行民病體重煩冤又云土鬱之發民病身重是也二曰濕熱經云少陽司天之政四之氣炎暑間化其病滿身重是也三曰寒濕經云太陰司天之政三之氣感於寒濕民病身重是也四曰風乃木製脾虛而重經云歲木太過風氣流行民病體重煩冤又云歲土不及風乃大行民病體重煩冤又云厥陰在泉風淫所勝病身體皆重是也五曰金乃燥制肝虛而重經云歲金太過燥氣流行民病體重煩冤是也東垣云身重者濕也補中益氣湯加五苓散去桂主之潔古云起臥不能謂之濕身重是也小柴胡湯黃耆芍藥湯仲景云風濕脈浮身重汗出惡風者防己黃耆湯主之潔古云夏月中風濕身重如山不能轉側除風勝濕去熱之藥治之仲景云腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出表裡冷濕久久得之腰以下冷痛腹重如帶五千錢甘姜苓朮湯主之脾胃虛弱元氣不能榮於心肺四肢沉重食後昏悶參朮湯主之針灸身重有二法其一取脾經云脾病者身重肉痿取其經太陰陽明少陰血者又云脾足太陰之脈是動則病腹脹身體皆重視盛虛熱寒陷下取之也其二取腎經云腎病者身重寢汗出憎風取其經少陰太陽血者是也不能食飢不能食惡食心下不痞滿自不能食也東垣云胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦故不能食皆作虛論若傷食惡食自有本門不在此例病人脈緩怠惰四肢重著或大便泄瀉此濕勝也從平胃散加味病人脈弦氣弱自汗四肢發熱或大便泄瀉皮毛枯槁發脫從黃耆建中湯加味病人脈虛氣弱脾胃不和從四君子六君子湯加味有痰從二陳湯加味兼下人參半夏丸虛而有痰用人參四兩半夏一兩薑汁浸一宿曝乾為末麵糊丸食後生薑湯下痰積痞隔食不得下皂莢燒存性研末酒調下一錢匕和中湯七珍散六神湯錢氏異功散皆四君子加減例開胃進食之正劑也羅謙甫云脾胃弱而飲食難任者不可一概用克伐之劑宜錢氏異功散補之自然能食設或嗜食太過傷脾而痞滿嘔逆權用枳實丸一服慎勿多服婁全善嘗治翁氏久瘧食少汗多先用補劑加黃連枳實月餘食反不進汗亦不止因悟謙甫此言遂減去枳連純用補劑又令粥多於藥而食進又於原方內加附子三分半一服而愈寬中進食丸和中丸木香枳朮丸木香乾姜枳朮丸皆有行氣之劑氣滯者宜之許學士云有人全不進食服補脾藥皆不效予授二神丸服之頓能進食此病不可全作脾氣治蓋腎氣怯弱真元衰削是以不能消化飲食譬之鼎釜之中置諸水穀下無火力終日米不熟其何能化黃魯直嘗記服菟絲子淘淨酒浸曝乾日挑數匙以酒下之十日外飲啖如湯沃雪亦知此理也今按治法虛則補其母不能食者戊己虛也火乃土之母故以破故紙補腎為癸水以肉豆蔻厚腸胃為戊土戊癸化火同為補土母之藥也楊仁齋云脾腎之氣交通則水穀自然克化瑞竹堂方謂二神丸雖兼補脾胃但無斡旋往往常加木香以順其氣使之斡旋空虛倉廩倉廩空虛則能受物屢用見效其殆使之交通之力歟嚴用和云人之有生不善攝養房勞過度真陽衰虛坎水不溫不能上蒸脾土沖和失布中州不運是致飲食不進胸膈痞塞或不食而脹滿或食而不消大腑溏泄古人云補腎不如補脾予謂補脾不如補腎腎氣若壯丹田火盛上蒸脾土脾土溫和中焦自治膈開能食矣薛新甫云予嘗病脾胃服補劑及針灸脾俞等穴不應幾殆吾鄉盧丹谷先生令予服八味丸飲食果進三料而平予兄年逾四十貌豐氣弱遇風則眩勞則口舌生瘡胸常有痰目常赤澀又一人脾虛發腫皆以八味丸而愈按此皆補腎之驗戴復庵云脾運食而傳於肺脾氣不足故不喜食宜啟脾丸煮樸丸若脾虛而不進食者當實脾宜鹿茸橘皮煎丸若脾虛寒而不進食者理中湯未效附子理中湯加砂仁半錢或丁香煮散心腎虛致脾氣不足以運者鹿茸橘皮煎丸脾上交於心下交於腎者也飢不能食靈樞大惑篇黃帝曰人之善飢而不嗜食者何氣使然岐伯曰精氣並於脾熱氣留於胃胃熱則消穀消穀故善飢胃氣逆上則胃脘寒故不嗜食也運氣飢不欲食皆屬濕邪傷腎經云太陰司天濕淫所勝民病心如懸飢不欲食治以苦熱是也針灸飢不欲食有二法其一清胃經云胃者水穀之海其腧上在氣衝下至三里水穀之海不足則飢不受谷審守其腧調其虛實是也其二取腎經云腎足少陰之脈是動則病飢不欲食心如懸苦飢狀視盛虛熱寒陷下取之也惡食經云太陰所謂惡聞食臭者胃無氣故惡食臭也用大劑人參補之丹溪云惡食者胸中有物導痰補脾二陳加二術渣芎湯失笑丸治虛痞惡食喑喑者邪入陰部也經云邪搏陰則為喑又云邪入於陰搏則為喑然有二證一曰舌喑乃中風舌不轉運之類是也一曰喉喑乃勞嗽失音之類是也蓋舌喑但舌本不能轉運言語而喉咽音聲則如故也喉喑但喉中聲嘶而舌本則能轉運言語也舌喑經云心脈澀甚為喑又云心脈搏堅而長當病舌卷不能言婁全善云人舌短言語不辨乃痰涎閉塞舌本之脈而然嘗治一中年男子傷寒身熱師與傷寒藥五帖日後變神昏而喑遂作體虛有痰治之人參五錢黃耆白朮當歸陳皮各一錢煎湯入竹瀝薑汁飲之十二日其舌始能語得一字又服之半月舌漸能轉運言語熱除而瘥蓋足少陰脈挾舌本脾足太陰之脈連舌本手少陰別系舌本故此三脈虛則痰涎乘虛閉塞其脈道而舌不能轉運言語也若此三脈亡血則舌無血營養而喑經云刺足少陰脈重虛出血為舌難以言又云刺舌下中脈太過血出不止為喑治當以前方加補血藥也又嘗治一男子五十餘歲嗜酒吐血桶許後不食舌不能語但渴飲水脈略數與歸芎芍地各一兩朮參各二兩陳皮一兩半甘草二錢入竹瀝童便薑汁至二十餘帖能言若此三脈風熱中之則其脈弛縱故舌亦弛縱不能轉運而喑風寒客之則其脈縮急故舌強舌卷而喑治在中風半身不收求之也丹溪治一男子三十五歲因連日勞倦發喊發為瘧疾醫與瘧藥三發後變為發熱舌短言語不辨喉間痰吼有聲診其脈洪數似滑遂以獨參湯加竹瀝兩蚶殼許兩服後吐膠痰三塊舌本正而言可辨餘證未退遂煎人參黃耆湯服半月而諸證皆退粥食調補兩月方能起立針灸喑有二法其一取脾經云脾足太陰之脈是動則病舌本強視盛虛熱寒陷下取之也其二取心經云手少陰之別名曰通里去腕一寸五分別而上行入於心中系舌本虛則不能言取之掌後一寸是也喉喑靈樞經憂恚無言篇黃帝問於少師曰人之卒然憂恚而言無音者何道之塞何氣出行使音不彰願聞其方少師答曰咽喉者水穀之道也喉嚨者氣之所以上下者也會厭者聲音之戶也口唇者音聲之扇也舌者音聲之機也懸雍垂者音聲之關也頏顙者分氣之所泄也橫骨者神氣所使主發舌者也故人鼻洞涕出不收者頏顙不開分氣失也是故厭小而疾薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也人卒然無音者寒氣客於厭則厭不能發發不能下至其開闔不致故無音黃帝曰刺之奈何岐伯曰足之少陰上繫於舌絡於橫骨終於會厭兩瀉其血脈濁氣乃闢會厭之脈上絡任脈取之天突其厭乃發也雜病篇厥氣走喉而不能言手足清大便不利取足少陰丹溪治俞繼道遺精誤服參耆及升浮劑遂氣壅於上焦而喑聲不出用香附童便浸透為末調服而疏通上焦以治喑又用蛤粉青黛為君黃柏知母香附佐之為丸而填補下焦以治遺十餘日良愈出聲音方訶子炮去核木通各一兩甘草半兩用水三升煎至升半入生薑地黃汁一合再煎數沸放溫分六服食後日作半料河間訶子湯訶子折逆氣破結氣木通通利機竅桔梗通利肺氣童便降火潤肺故諸方通用之發聲散開結痰肘後方陳皮五兩水三升煮取一升去渣頓服泄滯氣下痰千金云風寒之氣客於中滯而不發故喑不能言宜服發表之藥不必治喑以紫梗荊芥根一兩研汁入酒相和溫服半盞服無時又方用蘘荷根二兩絞汁酒一大盞和勻溫服半盞無時此皆治風冷失音冬月寒痰結咽喉不利語聲不出經云寒氣客於會厭卒然而啞是也玉粉丸主之肺間邪氣胸中積血作痛失音蛤蚧丸暴嗽失音宜潤燥通聲膏咳嗽聲嘶者此血虛受熱也用青黛蛤粉蜜調服之槐花瓦上炒令香熟於地上出火毒三更後床上仰臥隨意服治熱而失音杏仁三分去皮尖炒另研如泥桂一分和取杏核大綿裹含細細嚥之日五夜三又方以桂末著舌下咽津妙此治寒而失音孫兆口訣云內侍曹都使新造一宅落成遷入經半月飲酒大醉臥起失音不能語孫用補心氣薯蕷丸以細辛川芎治濕十日其病漸減二十日全愈曹既安見上問誰醫曰孫兆郎中上乃召問曰曹何疾也對曰凡新宅壁土皆濕地亦陰多人乍來陰氣未散曹心氣素虛飲酒至醉毛竅皆開陰濕之氣從而入乘心經心經既虛而濕氣又乘之所以不能語臣先用薯蕷丸使心氣壯燃後以川芎細辛又去濕氣所以能語也運氣喑有二法一日熱助心實經云少陰之復暴喑治以苦寒是也二曰寒攻心虛經云歲火不及寒乃大行民病暴喑治以鹹溫是也狐惑聲啞其證默默欲眠目不能閉起居不安是也針灸喑有三法其一取足少陰篇首所引二段經文是也其二取足陽明經云足陽明之別名曰豐隆去踝八寸別走太陰下絡喉嗌其病氣逆則喉痹卒喑取之所別是也婁全善治一男子四十九歲久病痰嗽忽一日感風寒食酒肉遂厥氣走喉病暴喑與灸足陽明豐隆二穴各三壯足少陰照海穴各一壯其聲立出信哉聖經之言也仍用黃芩降火為君杏仁陳皮桔梗瀉厥氣為臣訶子泄逆甘草和元氣為佐服之良愈其三取手陽明經云暴喑氣哽取扶突與舌本出血舌本廉泉穴也妊娠喑素問黃帝曰人之重身九月而喑此為何也岐伯曰胞之絡脈絕也帝曰何以言之岐伯曰胞絡者繫於腎少陰之脈貫腎系舌本故不能言帝曰治之奈何岐伯曰無治也當十月復王注云少陰腎脈也氣不榮養故不能言產後喑陳氏云產後不語因心氣虛而不能通於舌則舌強不能言語者宜服七珍散余當推其所因而治之薛新甫曰經云大腸之脈散舌下又云脾之脈是動則病舌本強不能言又云腎之別脈上入於心系舌本虛則不能言竊謂前證若心腎氣虛用七珍散腎虛風熱地黃飲大腸風熱加味逍遙散加防風白芷脾經風熱秦艽升麻湯肝經風熱柴胡清肝散加防風白芷脾氣鬱結加味歸脾湯加升麻肝木太過小柴胡加釣藤鉤脾受土侮六君加升麻白芷釣藤鉤肝脾血虛用佛手散脾氣虛用四君子氣血俱虛八珍湯如不應用獨參湯更不應急加附子補其氣而生其血若徑用血藥則誤矣郭氏論人心有七孔三毛產後虛弱多致停積敗血閉於心竅神志不能明瞭心氣通於舌心氣閉塞則舌亦強矣故令不語但服七珍散胡氏孤鳳丹散治產後閉目不語用白礬細研每服一錢熱水調下消癉口燥咽乾渴而多飲為上消經謂膈消消穀善飢為中消經謂消中渴而便數有膏為下消經謂腎消劉河間嘗著三消論謂五臟六腑四肢皆稟氣於脾胃行其津液以濡潤養之然消渴之病本濕寒之陰氣極衰燥熱之陽氣太盛故也治當補腎水陰寒之虛而瀉心火陽熱之實除腸胃燥熱之甚濟身中津液之衰使道路散而不結津液生而不枯氣血和而不澀則病自已矣況消渴者因飲食服餌之失宜腸胃乾涸而氣不得宣平或精神過違其度而耗亂之或因大病陰氣損而血液衰虛陽慓悍而燥熱鬱甚之所成也若飲水多而小便多曰消渴若飲食多不甚渴小便數而消瘦者名曰消中若渴而飲水不絕腿消瘦而小便有脂液者名曰腎消一皆以燥熱太甚三焦腸胃之腠理怫鬱結滯緻密壅滯雖復多飲於中終不能浸潤於外榮養百骸故渴不止小便多出或數溲也張戴人亦著三消之說一從火斷謂火能消物燔木則為炭燔金則為液燔石則為灰煎海水則為鹽鼎水則干人之心腎為君火三焦膽為相火得其平則烹煉飲食糟粕去焉不得其平則燔灼臟腑而津液耗焉夫心火甚於上為膈膜之消甚於中為腸胃之消甚於下為膏液之消甚於外為肌肉之消上甚不已則消及於肺中甚不已則消及於脾下甚不已則消及於肝腎外甚不已則消及於筋骨四臟皆消盡則心始自焚而死矣故治消渴一證調之而不下則小潤小濡固不能殺炎上之勢下之而不調亦旋飲旋消終不能沃膈膜之干下之調之而不減滋味不戒嗜欲不節喜怒則病已而復作能從此三者消渴亦不足憂矣然而二公備引內經諸條言消渴者表白三消所由來之病源一皆燥熱也雖是心移寒於肺為肺消者火與寒皆來乘肺肺外為寒所薄氣不得施內為火所爍故然太陽寒水司天甚則渴飲者水行凌火火氣內郁二者固屬外之寒邪則已郁成內之燥熱也或曰夫寒與熱反若冰炭之不同爐而今之燥熱由外寒所郁也將用涼以治內熱必致外寒增而愈郁用溫以散外寒必致內熱增而愈渴治之奈何曰先治其急處方之要備在本經謂處方而治者必明病之標本達藥之所能通氣之所宜而無加害者可以制其方也所謂標本者先病而為本後病而為標此為病之本末也標本相傳先當救其急也又六氣為本三陰三陽為標假若胃熱者熱為本胃為標也處方者當除胃中之熱是治其本也故六氣乃以甚者為邪衰者為正法當瀉甚補衰以平為期養正除邪乃天之道也為政之理也捕賊之義也即此觀之處方之要殆盡此矣若太陽司天寒水之勝心火受郁內熱已甚即當治內熱為急內熱未甚即當散寒解鬱為急如宣明論立方著內經諸證條下者其治漏風而渴用牡蠣白朮防風先治漏風為急也若心移寒於肺為肺消者則以心火乘肺傷其氣血為急所移之寒非正當其邪也故用黃耆人參熟地黃五味子桑白皮麥門冬枸杞子先救氣血之衰故不用寒藥瀉內熱也若心移熱於肺傳為膈消者則以肺熱為急用麥門冬治肺中伏火止渴為君天花粉知母瀉熱為臣甘草五味子生地黃葛根人參生津益氣為佐然心火上炎於肺者必由心有事焉不得其正以致其臟氣血之虛故厥陽之火上逆也所以用茯神安心定志養精神竹葉以涼之用麥門冬之屬以安其宅則火有所歸息矣因是三條消渴之方便見河間處方酌量標本緩急輕重之宜通臟腑切當之藥者如此可謂深得仲景處方之法者也仲景云男子消渴小便反多飲一斗而小便一斗腎氣丸主之脈浮小便不利微熱消渴者與渴欲飲水水入即吐者皆以五苓散利之脈浮發熱渴欲飲水小便不利者豬苓湯主之兼口乾舌燥者白虎湯加人參主之即此便見表裡分經因病用藥豈非萬世之準則哉坎三乾水也氣也即小而井大而海也兌三坤水也形也即微而露大而雨也一陽下陷於二陰為坎坎以氣潛行乎萬物之中為受命之根本故潤萬物莫如水一陰上徹於二陽為兌兌以形普施於萬物之上為資生之利澤故說萬物者莫說乎澤明此二水以悟消渴消中消腎三消之義治之而兼明導引之說又有水火者焉三焦為無形之火內熱爍而津液枯以五行有形之水制之者兌澤也權可也吾身自有上池真水亦氣也亦無形也天一之所生也以無形之水沃無形之火又常而可久者是為真水火升降既濟而自不渴矣上消者上焦受病逆調論云心移熱於肺傳為膈消是也舌上赤裂大渴引飲少食大便如常小便清利知其燥在上焦治宜流濕潤燥以白虎加人參湯主之能食而渴為實熱人參石膏湯加減地骨皮散不能食而渴為虛熱白朮散門冬飲子有汗而渴者以辛潤之無汗而渴者以苦堅之太陽經渴其脈浮無汗者五苓散滑石之類主之太陽無汗而渴不宜服白虎湯若得汗後脈洪大而渴者宜服之陽明經渴其脈長有汗者白虎湯涼膈散之類主之陽明汗多而渴不宜服五苓散若小便不利汗少脈浮而渴者宜服之少陽經渴其脈弦而嘔者小柴胡湯加栝蔞之類主之太陰經渴其脈細不欲飲縱飲思湯不思水者四君子理中湯之類主之少陰經渴其脈沉細自利者豬苓湯三黃丸之類主之厥陰經渴其脈微引飲者宜少少與之小便不利而渴知內有熱也五苓散豬苓散泄之小便自利而渴知內有燥也甘露飲門冬飲潤之大便自利而渴先用白芍白朮各炒為末調服後隨證用藥大便不利而渴止渴潤燥湯上焦渴小便自利白虎湯中焦渴大小便俱不利調胃承氣湯下焦渴小便赤澀大便不利大承氣湯戴院使云心消之病往往因嗜欲過度食啖辛熱以致煩渴引飲既多小便亦多當抑心火使之下降自然不渴宜半夏瀉心湯半夏非所宜用去乾薑加栝蔞乾葛如其數吞豬肚丸或酒煮黃連丸仍佐獨味黃連湯多煎候冷遇渴恣飲久而自愈若因用心過度致心火炎上而渴者宜黃耆六一湯加蓮肉遠志各一錢吞玄兔丹仍以大麥煎湯間下靈砂丹渴欲飲水不止仲景以文蛤一味捍為散沸湯和服方寸匕經驗方用大牡蠣於臘月或端午日黃泥裹煅通赤放冷取出為末用鯽魚煎湯下一錢匕蓋二藥性收澀最能回津綱目以為咸軟非也三因方用糯谷旋炒作爆桑根白皮厚者切細等分每服一兩水一碗煮至半碗渴即飲之夫水穀之氣上蒸於肺而化為津以溉一身此金能生水之義二藥固肺藥也而又淡滲故取之保命集用蜜煎生薑湯大器傾注時時呷之法曰心肺之病莫厭頻而少飲經云補上治上宜以緩又云辛以潤之開腠理致津液肺氣下流故火氣降而燥衰矣有食韭苗而渴愈者亦辛潤之意也丹溪云消渴飲繰絲湯能引清氣上朝於口予謂蠶與馬同屬午也心也作繭成蛹退臟之際故能抑心火而止渴焉飲多停積有化水丹又有神仙減水法東垣治張芸夫病消渴舌上赤裂飲水無度小便數制方名曰生津甘露飲子內經云熱淫所勝佐以甘苦以甘瀉之熱則傷氣氣傷則無潤折熱補氣非甘寒之劑不能故以石膏之甘寒為君王太僕云壯水之主以制陽光故以柏連梔子知母之苦寒瀉熱補水為臣以當歸杏仁麥門冬全蠍連翹白葵花蘭香甘草甘寒和血潤燥為佐升麻柴胡苦平行陽明少陽二經蓽澄茄白豆蔻木香藿香反佐以取之又用桔梗為舟楫使浮而不下也為末湯浸蒸餅和成劑曬乾杵碎如黃米大每於掌內舐之津液送下不令藥過病處也許學士治一卒病渴日飲水三斗不食已三月心中煩悶此心中有伏熱與火腑丹每服五十丸溫水下日三次日渴止又次日食進此方本治淋用以治渴效信乎藥貴變通用之經云少陽司天之政三之氣炎暑至民病渴又云少陰之復渴而欲飲又云少陽之復嗌絡焦槁渴引水漿是熱助心盛而渴治以諸寒劑世之所知也經云太陽司天寒氣下臨心火上從嗌乾善渴又云太陽司天寒淫所勝民病嗌乾渴而欲飲又云寒水太過上臨太陽民病渴而妄冒是寒攻心虛而渴治以諸熱劑則世之所未知也東垣云消渴末傳能食者必發腦疽背瘡不能食者必傳中滿鼓脹聖濟總錄皆為必死不治之證潔古分而治之能食而渴者白虎加人參湯主之不能食而渴者錢氏白朮散倍加葛根主之上下既平不復傳下消矣或曰末傳瘡疽者何也此火邪勝也其瘡痛甚而不潰或潰赤水者是也經曰有形而不痛者陽之類也急攻其陽無攻其陰治在下焦元氣得強者生失強者死末傳中滿者何也以寒治熱雖方士不能廢繩墨而更其道也然臟腑有遠近心肺位近宜制小其服腎肝位遠宜制大其服皆適其所至所為故知過與不及皆誅罰無過之地也如膈消中消制之太急速過病所久而成中滿之疾正謂上熱未除中寒復生者非藥之罪失其緩急之宜也處方之際宜加審焉雖為三條而分經止渴中下亦同例當參考焉中消者胃也渴而多飲善食而瘦自汗大便硬小便頻數赤黃熱能消穀知熱在中焦也宜下之以調胃承氣湯又三黃丸主之胃熱則善消水穀可飲甘辛降火之劑用黃連末生地白藕各自然汁牛乳各一升熬成膏和黃連末一斤丸如桐子大每服三五十丸少呷白湯下日進十服消渴中消自古只治燥止渴誤矣三陽結謂之消三陽者陽明也手陽明大腸主津液所生病熱則目黃口乾是津液不足也足陽明主血所生病熱則消穀善飢血中伏火是血不足也結者津液不足結而不潤皆燥熱為病也此因數食甘美而多肥故其氣上溢轉為消渴治之以蘭除陳氣也不可服膏粱芳草石藥其氣悍烈能助熱燥也越人云邪在六腑則陽脈不和陽脈不和則氣留之氣留之則陽脈盛矣陽脈太盛則陰氣不得榮也故肌肉皮膚消削是也和血益氣湯主之戴云消脾緣脾經燥熱食物易化皆為小便轉食轉飢然脾消又自有三曰消中曰寒中曰熱中宜用蓮茗飲加生地黃乾葛各一錢或烏金散或止用蓮茗飲順利散參蒲丸加味錢氏白朮散和血益氣湯清涼飲子甘露膏黃連豬肚丸爛金丸天門冬丸豬腎薺苨湯內經言大腸移熱於胃善食而瘦謂之食㑊胃移熱於膽亦曰食㑊食㑊者謂食移易而過不生肌膚亦易飢也東垣云善食而瘦者胃伏火邪於氣分則能食脾虛則肌肉削也即消中也運氣消中皆屬熱經云少陰之勝心下熱善飢又云少陽之勝熱客於胃善飢治以寒劑是也針灸消中皆取於胃經云邪在脾胃陽氣有餘陰氣不足則熱中善飢取三里灸又云胃足陽明之脈氣盛則身已前皆熱於胃則消穀善飢熱則清之盛則瀉之下消者病在下焦初發為膏淋謂淋下如膏油之狀至病成煩躁引飲面色黧黑形瘦而耳焦小便濁而有脂液治宜養血以分其清濁而自愈矣以六味地黃丸主之益火之源以消陰翳則便溺有節八味丸壯水之主以制陽光則渴飲不思六味丸金匱治男子消渴小便反多如飲水一斗小便亦一斗腎氣丸主之子和治腎消以腎氣丸本方內加山藥一倍外桂附從四時加減冬一兩春秋五錢夏二錢半又法腎氣丸去附子加五味子一兩半婁全善云腎消者飲一溲二其溲如膏油即膈消消中之傳變王注謂肺臟消燥氣無所持是也蓋肺臟氣肺無病則氣能管攝津液而津液之精微者收養筋骨血脈余者為溲肺病則津液無氣管攝而精微者亦隨溲下故飲一溲二而溲如膏油也筋骨血脈無津液以養之故其病成漸形瘦焦乾也然肺病本於腎虛腎虛則心寡於畏妄行陵肺而移寒與之然後肺病消故仲景治渴而小便反多用腎氣丸補腎救肺後人因名之腎消及下消也或曰經既云肺消死不治仲景復用腎氣丸治之何也曰飲一溲二者死不治若飲一未至溲二者病尚淺猶或可治故仲景腎氣丸治飲水一斗小便亦一斗之證若小便過於所飲者亦無及矣腎消服滋補丸藥外宜多煎黃耆湯飲之戴院使云若因色欲過度水火不交腎水下泄心火自炎以致渴濁不宜備用涼心冷劑宜堅腎水以濟心火當用黃耆飲加蓯蓉五味各半錢吞八味丸及小菟絲子丸玄兔丹鹿茸丸加減安腎丸或靈砂丹消腎為病比諸消為重古方謂之強中又謂之內消多因恣意色欲或餌金石腎氣既衰石氣獨在精水無所養故常發虛陽不交精出小便無度唇口乾焦黃耆飲吞玄兔丹八味丸鹿茸丸加減腎氣丸小菟絲子丸靈砂丹皆可選用未效黃耆飲加蓯蓉五味山茱萸各四分薺蘢湯蓯蓉丸天王補心丹雙補丸腎瀝散金銀箔丸白茯苓丸通治三消丸用好黃連治淨為細末不拘多少切冬瓜肉研取自然汁和成餅陰乾再為細末用汁浸和加至七次即用冬瓜汁為丸桐子大每服三十丸以大麥仁湯入冬瓜汁送下尋常渴止一服效酒色過度積為酷熱熏蒸五臟津液枯燥血泣小便並多肌肉消鑠專嗜冷物寒漿勿投涼劑以龍鳳丸主之戴云諸消不宜用燥烈峻補之劑惟當滋養除消脾外心腎二消宜用黃耆六一湯或參耆湯吞八味丸或玄兔丹或小菟絲子丸又用竹龍散皆可又用六神飲亦治腎消惟脾消則加當歸去黃耆三消小便既多大便必秘宜常服四物湯潤其大腸如加人參木瓜花粉在內仍煮四皓粥食之糯米泔折二亦可冷進三消久而小便不臭反作甜氣在溺桶中湧沸其病為重更有浮在溺面如豬脂濺在桶邊如桕燭淚此精不禁真元竭矣按消渴小便甜許學士論之甚詳其理未暢大抵水之在天地與人身皆有咸有甘甘者生氣而咸者死氣也坡仙乳泉賦備矣小便本咸而反甘是生氣泄也生氣泄者脾氣下陷入腎中也脾氣入腎者土剋水也三消久之精血既虧或目無見或手足偏廢如風疾然此證消腎得之為多但用治下消中諸補藥滋生精血自愈三消病退後而燥渴不解此有餘熱在肺經可用參苓甘草少許生薑汁冷服虛者可用人參湯渴病愈後再劇舌白滑微腫咽喉嚥唾覺痛嗌腫時渴飲冷白沫如膠飲冷乃止甘草石膏丸渴疾愈須預防發癰疽黃耆六一湯下忍冬丸凡諸虛不足胸中煩躁時常消渴唇口乾燥或先渴而欲發瘡或病癰疽而後渴者並宜黃耆六一湯多服已發者藍葉散玄參散薺苨丸消渴後成水氣方書雖有紫蘇湯瞿麥湯葶藶丸皆克泄之劑不若五皮飲送濟生腎氣丸及東垣中滿分消諸方為妥口燥咽乾此尋常渴非三消證東垣云飲食不節勞倦所傷以致脾胃虛弱乃血所生病主口中津液不行故口乾咽乾病人自以為渴醫以五苓散治之反加渴燥乃重竭津液以致危亡經云虛則補其母當於心與小腸中補之乃脾胃之根蒂也以甘溫之藥為之主以苦寒為之使以酸為之臣佐以辛心苦緩急食酸以收之心火旺則肺金受邪金虛則以酸補之次以甘溫及甘寒之劑於脾胃中瀉心火之亢盛是治其本也補中益氣湯加五味子葛根本事方黃耆湯亦可戴云無病自渴與病瘥後渴者參朮飲四君子湯縮脾湯俱加乾葛或七珍散加木瓜一錢生料五苓散加人參一錢名春澤湯以五苓散加四君子湯亦名春澤湯尤是要藥更兼作四皓粥食之諸病久損腎虛而渴並宜八味丸及黃耆飲四物湯加人參木瓜各半錢或七珍散大補湯並去朮加木瓜如數諸失血及產婦蓐中渴名曰血渴宜求益血之劑已於吐血證中論之有無病忽然大渴少頃又定只宜蜜湯及縮脾湯之類折二泔冷進數口亦可酒渴者乾葛湯調五苓散又有果木渴因多食果子所致藥中宜用麝香診𩩲𩨗弱小以薄者心脆肩背薄者肺脆脅骨弱者肝脆唇大而不堅者脾脆耳大不堅者腎脆皆善病消癉易傷心脈微小為消癉滑甚為善渴滑者陽氣勝肺肝脾腎脈微小皆為消癉諸脈小者陰陽俱不足也勿取以針而調以甘藥心脈軟而散者當消渴自已濡散者氣實血虛洪大者陽余陰虧寸口脈浮而遲浮為虛衛氣虧遲為勞榮氣竭趺陽脈浮而數浮為風數消穀脈實大病久可治懸小堅病久不可治數大者生細小浮短者死病若開目而渴心下牢者脈當得緊實而數反得沉澀而微者死也心移寒於肺消者飲一溲二不治黃疸食勞疳黃目黃色如熏黃一身盡痛乃濕病也色如橘子黃身不痛乃疸病也疸分為五黃汗黃疸谷疸酒疸女勞疸黃汗汗出染衣黃如柏汁是也問曰黃汗之為病身體腫一作強發熱汗出而渴狀如風水汗沾衣色正黃如柏汁脈自沉何從得之師曰以汗出入水中浴水從汗孔入得之宜耆芍桂酒湯主之黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身常暮盜汗出者此勞氣也若汗出已反發熱者久久其身必甲錯若發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤又胸前痛腰上有汗腰下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利者此為黃汗桂枝加黃耆湯主之按汗出浴水亦是仲景舉一隅耳多由脾胃有熱汗出逢閉遏濕與熱盦而成者宜黃耆湯治陰黃汗染衣涕唾黃用蔓菁子搗末平旦以井花水服一匙日再加至兩匙以知為度每夜小便中浸少許帛子各書記日色漸退白則瘥不過服五升而愈黃疸食已即飢遍身俱黃臥時身體帶青帶赤憎寒壯熱此飲食過度臟腑熱水穀並積於脾胃風濕相搏熱氣熏蒸而得之師曰病黃疸發熱煩喘胸滿口燥者以病發時火劫其汗兩熱所得然黃皆從濕得之一身發熱而黃肚熱熱在裡當下之黃疸脈浮而腹中和者宜汗之桂枝加黃耆湯熱服須臾飲熱粥以助藥力取微汗為度未汗更服若腹滿欲嘔吐懊憹而不和者宜吐之不宜汗黃疸腹滿小便不利而赤自汗出此為表和裡實當下之宜大黃硝石湯黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者小半夏湯主之黃疸病茵陳五苓散主之谷疸食畢即頭眩心中怫鬱不安遍身發黃趺陽脈緊而數數則為熱熱則消穀緊則為寒食即為滿尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食谷則眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸陽明病脈遲者食難用飽飽則發煩頭眩小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也谷疸之為病寒熱不食食即頭眩心胸不安久久發黃為谷疸茵陳湯主之續法谷疸丸寶鑑茵陳梔子湯紅丸子酒疸身目發黃則心下懊憹而熱不能食時時欲吐足脛滿小便黃面發赤斑此因飢中飲酒大醉當風入水所致夫病酒黃疸者必小便不利其候心中熱足下熱是其證也酒黃疸者或無熱靜言了了腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之酒疸心中熱欲嘔者吐之即愈酒疸下之久久為黑疸目青面黑心中如啖蒜韭狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故知之三因白朮湯酒黃疸心中懊憹或熱痛梔子大黃湯主之續法葛根湯小柴胡加茵陳豆豉大黃黃連葛根湯戴云飲酒即睡酒毒熏肺脾土生肺金肺為脾之子子移病而克於母故黃又肺主身之皮膚肺為酒毒熏蒸故外發於皮而黃法宜合脾肺而治宜藿枇飲葛根煎湯或梔子仁煎湯調五苓散或生料五苓散加乾葛一錢或葛花解酲湯酒疸發黃心胸堅滿不進飲食小便黃赤其脈弦澀當歸白朮湯酒疸後變成腹脹漸至面足俱腫或腫及遍身宜藿香脾飲加木香麥糵各半錢女勞疸額上黑微汗出手足中熱薄暮即發膀胱急小便自利或云小便不利發熱惡寒此因過於勞傷極於房室之後入水所致腹如水狀不治黃家日晡時發熱而反惡寒此為女勞得之膀胱急少腹滿一身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便黑或時溏此女勞之病非水也腹滿者難治硝石散主之續法加味四君子湯脾氣不健大便不實者用之滑石散小便不利者用之東垣腎疸湯通治丹溪云五疸不要分同是濕熱如盦曲相似輕者小溫中丸重者大溫中丸按丹溪之言已得大意其用藥則未備也考之內經病有上中下之分有謂目黃曰黃疸者有謂黃疸暴病久逆之所生者及少陰厥陰司天之政四之氣溽暑皆發黃疸者悉是上焦濕熱病也有謂食已如飢曰胃疸者與脾風發癉腹中熱出黃者又脾脈搏堅而長其色黃者靈樞謂脾所生病黃癉皆中焦濕熱病也有謂溺黃赤安臥者黃疸及腎脈搏堅而長其色黃者靈樞謂腎所生病皆下焦濕熱也獨張仲景妙得其旨推之於傷寒證中或以邪熱入里與脾濕相交則發黃或由內熱已盛覆被火者兩陽熏灼其身亦黃或陽明熱盛無汗小便不利濕熱不得泄亦發黃或發汗已身目俱黃者為寒濕在裡不解而黃也或食難用飽飽則頭眩必小便難欲作谷疸疸者單也單陽而無陰也成無己釋諸黃皆由濕熱二者相爭則黃濕家之黃黃而色暗不明熱盛之黃其黃如橘子色大抵黃家屬太陰太陰者脾之經也脾屬土黃色脾經為濕熱蒸之則色見於外或脈沉小腹不利者乃血在下焦之黃也凡此必須當其病用其藥直造病所庶無誅伐無過夭枉之失也大法宜利小便除濕熱脈浮腹中和宜汗脈浮心中熱腹滿欲吐者宜吐脈沉心中懊憹或熱痛腹滿小便不利而赤自汗出宜下脈不浮不沉微弦腹痛而嘔宜和解脈沉細無力身冷而黃或自汗泄利小便清白為陰黃宜溫男子黃大便自利宜補飢飽勞役內傷中州變寒病生黃非外感而得宜補治疸須分新久新病初起即當消導攻滲如茵陳五苓散胃苓飲茯苓滲濕湯之類無不效者久病又當變法也脾胃受傷日久則氣血虛弱必用補劑如參朮健脾湯當歸秦艽散使正氣盛則邪氣退庶可收功若口淡怔忡耳鳴腳軟或微寒熱小便赤白濁又當作虛治宜養榮湯或四君子湯吞八味丸五味子附子者皆可用不可過用涼劑強通小便恐腎水枯竭久而面黑黃色不可治矣然有元氣素弱避滲利之害過服滋補以致濕熱愈增者則又不可拘於久病調補之例也發汗桂枝加黃耆湯麻黃醇酒湯吐瓜蒂散藜蘆散二陳湯探吐下梔子大黃湯大黃硝石湯黃連散利小便五苓散益元散除濕熱茵陳五苓散茯苓滲濕湯和解小柴胡湯搐鼻瓜蒂散溫茵陳附子乾薑湯補養榮湯補中湯大小建中湯理中湯干黃燥也小便自利四肢不沉重渴而引飲梔子柏皮湯濕黃脾也小便不利四肢沉重似渴不欲飲者大茵陳湯大便自利而黃有實熱者茵陳梔子黃連三物湯無實熱者小建中湯往來寒熱一身盡黃者小柴胡加梔子湯腹痛而嘔者小柴胡湯諸疸小便不利為裡實宜利小便或下之無汗為表實宜發汗或吐之吐中有汗諸疸小便黃赤色者為濕熱可服利小便清熱滲濕之藥若小便色白是無熱也不可除熱若有虛寒證者當作虛勞治之故仲景云男子黃小便自利當與虛勞小建中湯若欲自利腹滿而喘不可除熱而除之必噦小半夏湯主之要當詳審勿令誤也海藏云內感傷寒勞役形體飲食失節中州變寒病生黃非外感而得只用理中大小建中足矣不必用茵陳戴復庵云諸失血後多令面黃蓋血為榮面色紅潤者血榮之也血去則面見黃色譬之竹木春夏葉綠遇秋葉黃潤與燥之別也宜養榮湯枳歸湯十全大補湯妨食者四君子湯加黃耆扁豆各一錢即黃耆四君子湯加陳皮名異功散亦有遍身黃者但不及耳目病瘧後多黃蓋脾受病故色見於面宜理脾為先異功散加黃耆扁豆各一錢諸病後黃者皆宜黑疸已前見酒疸女勞疸二條此證多死宜急治用土瓜根一斤搗碎絞汁六合頓服當有黃水隨小便出更服之食勞疳黃一名黃胖夫黃疸者暴病也故仲景以十八日為期食勞黃者宿病也至有久不愈者故另為此條大溫中丸小溫中丸暖中丸棗礬丸上前三方以針砂醋之類伐肝以朮米之類助脾後一方以礬醋之酸瀉肝以棗肉之甘補脾實人及田家作苦之人宜之若虛人與豢養柔脆者宜佐以補劑目黃經云目黃者曰黃疸亦有目黃而身不黃者故另為條經云風氣自陽明入胃循脈而上至目眥其人肥風氣不得外泄則為熱中而目黃煩渴引飲河間青龍散主之黃疸目黃不除以瓜蒂散搐鼻取黃水診脈沉渴欲飲水小便不利者皆發黃腹脹滿面痿黃躁不得睡屬黃家黃疸之病當以十八日為期治之十日以上宜瘥反劇為難治疸病渴者難治不渴者可治脈洪大大便利而渴者死脈微小小便利不渴者生發於陰部其人必嘔發於陽部其人必振寒而發熱凡黃家候其寸口脈近掌無脈口鼻並冷不可治疸毒入腹喘滿者危凡年壯氣實脈來洪大者易愈年衰氣虛脈來微澀者難瘥年過五十因房勞飲酒七情不遂而得額黑嘔噦大便自利手足寒冷飲食不進肢體倦怠服建中理中滲濕諸藥不效者不可為也嘈雜嘈雜與吞酸一類皆由肺受火傷不能平木木挾相火乘肺則脾沖和之氣索矣谷之精微不行濁液攢聚為痰為飲其痰亦或從火木之成化酸肝木搖動中土故中土擾擾不寧而為嘈雜如飢狀每求食以自救苟得少食則嘈雜亦少止止而復作蓋土虛不禁木所搖故治法必當補土伐木治痰飲若不以補土為君務攻其邪久久而虛必變為反胃為瀉為痞滿為眩暈等病矣脈洪大者火多二陳湯加薑汁炒山梔黃連脈滑大者痰多二陳湯加南星栝蔞黃芩黃連梔子肥人嘈雜二陳湯少加撫芎蒼朮白朮炒梔子脈弦細身倦怠者六君子湯加撫芎蒼朮白朮薑汁炒梔子有用消克藥過多飢不能食精神漸減四君子加白芍陳皮薑汁炒黃連心懸懸如飢欲食之時勿與以食只服三聖丸佳心下嘈雜者導飲丸最妙欠嚏腎主欠嚏經云腎為欠為嚏是也運氣欠嚏有三一曰寒經云太陽司天寒氣下臨心氣上從寒清時舉鼽嚏喜悲數欠是也二曰火經云少陽司天之政三之氣炎暑至民病嚏欠是也三曰濕鬱其火經云陽明司天之政初之氣陰始凝民病中熱嚏欠是也欠伸經云二陽一陰發病主驚駭背痛善噫善欠王注云氣鬱於胃故欠生焉運氣欠伸皆屬風經云厥陰在泉風淫所勝病善伸數欠治以辛是也靈樞口問篇黃帝曰人之欠者何氣使然岐伯曰衛氣晝日行於陽夜半則行於陰陰者主夜夜者臥陽者主上陰者主下故陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數欠陽氣盡陰氣盛則目瞑陰氣盡陽氣盛則寤矣瀉足少陰補足太陽針灸欠伸有二法此其一也其二取胃經云胃足陽明之脈是動則病振寒善伸數欠視盛虛熱寒陷下調之也仲景云中寒家善欠嚏靈樞口問篇黃帝曰人之嚏者何氣使然岐伯曰陽氣和利滿於心出於鼻故為嚏補足太陽滎眉本一曰眉上也運氣嚏有三一曰熱火經云少陰司天之政熱病生於上民病血溢鼽嚏又云少陰司天熱氣下臨肺氣上從病嚏鼽衄又云少陰之復燠熱內作煩躁鼽嚏又云少陽所至為鼽嚏又云少陽司天火氣下臨肺氣上從咳嚏鼽衄治以諸寒是也二曰金不及火乘之經曰金不及曰從革從革之紀其病嚏咳鼽衄從火化者是也三曰燥金經云陽明所至為鼽嚏是也劉河間云嚏鼻中因癢而氣噴作於聲也鼻為肺竅癢為火化心火邪熱干於陽明發於鼻而癢則嚏也或故以物擾之癢而嚏者擾癢屬火故也或視日而嚏者由目為五臟神華太陽真火晃曜於目心神躁亂而熱發於上則鼻中癢而嚏也仲景云其人清涕出發熱色和者善嚏第六冊大小腑門泄瀉滯下總論泄瀉之證水穀或化或不化並無努責惟覺困倦若滯下則不然或膿或血或膿血相雜或腸垢或無糟粕或糟粕相雜雖有痛不痛之異然皆裡急後重逼迫惱人潔古論曰臟腑瀉利其證多種大抵從風濕熱論之是知寒少熱多寒則不能久也故曰暴泄非陰久泄非陽論云春宜緩形形緩動則肝木乃榮反靜密則是行秋令金能制木風氣內臟夏至則火盛而金去獨火木旺而脾土損矣輕則餐泄身熱脈洪谷不能化重則下利膿血稠黏裡急後重故曰諸泄稠黏皆屬於火經曰溲而便膿血知氣行而血止也宜大黃湯下之是為重劑黃芩芍藥湯是為輕劑是實則泄其子木能自虛而脾土實矣故經曰春傷於風夏為餐泄此逆四時之氣人所自為也此一節熱泄所謂滯下也有自太陰脾經受濕而為水泄虛滑身重微滿不知穀味假令春宜益黃散補之夏宜泄之法云宜補宜泄宜和宜止和則芍藥湯止則訶子湯久則防變而為膿血是脾經傳受於腎謂之賊邪故難愈也若先利而後滑謂之微邪故易安也此皆脾土受濕天之所為也雖聖智不能逃口食味鼻食氣從鼻而入留積於脾而為水泄也此一節濕泄所謂泄瀉也有厥陰經動下利不止其脈沉而遲手足厥逆膿血稠黏此為難治宜麻黃湯小續命湯汗之法云謂有表邪縮於內當散表邪而自愈此一節風泄所謂久泄也有暴下無聲身冷自汗小便清利大便不禁氣難布息脈微嘔吐急以重藥溫之漿水散是也此一節寒泄所謂暴泄也故法曰後重者宜下腹痛者宜和身重者宜除濕脈弦者去風膿血稠黏者以重藥竭之身冷自汗者以毒藥溫之風邪內縮者宜汗之則愈鶩溏為利宜溫之而已又曰在表者發之在裡者下之在上者湧之在下者竭之身表熱者內疏之小便澀者分利之又曰盛者和之去者送之過者止之兵法曰避其來銳擊其惰歸此之謂也凡病泄而惡寒太陰傳少陰為土來剋水也用除濕白朮茯苓安脾芍藥桂枝黃連破血火邪不能勝水太陰經不能傳少陰而反助火邪上乘肺經而痢必白膿也加當歸芍藥之類是已又裡急後重脈大而洪實為裡實證而痛甚是有物結墜也宜下之若脈浮大慎不可下雖裡急後重脈沉細而弱者謂寒邪在內而氣散也可溫養而自安裡急後重閉者大腸氣不宣通也宜加檳榔木香宣通其氣若四肢慵倦小便少或不利大便走沉困飲食減少宜調胃去濕白朮芍藥茯苓三味水煎服白朮除脾胃之濕芍藥除胃之濕熱四肢困倦茯苓能通水道走濕如發熱惡寒腹不痛加黃芩為主如未見膿而惡寒乃太陰欲傳少陰也加黃連為主桂枝佐之如腹痛甚加當歸倍芍藥如見血加黃連為主桂枝當歸佐之如煩躁或先便白膿後血或發熱或惡寒非黃連不能止上部血也如惡寒脈沉先血後便非地榆不能除下部血也如惡寒脈沉或腰痛或臍下痛非黃芩不能除中部血也如便膿血相雜而脈浮大慎勿以大黃下之下之必死謂氣下竭也而陽無所收凡陰陽不和惟以分陰陽之法治之又曰暴泄非陰久泄非陽有熱者脈疾身動聲亮暴注下迫此陽也寒者脈沉而細身困鼻息微者姜附湯主之身重不舉朮附湯主之渴引飲者是熱在膈上水多入則自胸膈入胃中胃本無熱因不勝其水胃受水攻故水穀一時下此證當灸大椎三五壯立已乃督脈瀉也如用藥使車前子雷丸白朮茯苓之類五苓散亦可又有寒泄者大腹滿而泄又有鶩溏者是寒泄也鶩者鴨也大便如水其中有少結糞者是也如此者當用天麻附子乾薑之類又法曰泄有虛實寒熱虛則無力不及拈衣未便已泄出謂不能禁固也實則數至圊而不便俗云虛坐努責是也裡急後重皆依前法進退大承氣湯主之太陽病為挾熱痢涼膈散主之表證誤下因而下利不止為挾熱利陽明為痼瘕進退大承氣湯主之太陰濕勝濡瀉不可下而可溫四逆湯主之少陰蟄風不動禁固可澀赤石脂丸乾薑湯主之厥陰風泄以風治宜小續命湯消風湯主之少陽風氣自動大柴胡湯主之胃泄飲食不化色黃承氣湯脾泄腹脹滿泄注食即嘔吐逆建中理中湯大腸泄食已窘迫大便色白腸鳴切痛乾薑附子湯小腸泄溲而便膿血少腹痛承氣湯大瘕泄裡急後重數至圊而不能便莖中痛五泄之病胃小腸大瘕三證皆以清涼飲子主之其泄自止厥陰證加甘草以緩之少陰證裡急後重加大黃又有太陰陽明二證當進退大承氣湯主之太陰證不能食是也當先補而後泄之乃進藥法也先煎厚朴半兩制水煎二三服後未已謂有宿食未消又加枳實二錢同煎二三服泄又未已如稍進食尚有熱毒又加大黃三錢推過泄止住藥如泄未已為腸胃有久塵垢滑黏加芒硝半合宿垢去盡則愈也陽明證能食是也當先泄而後補謂退藥法也先用大承氣湯五錢水煎服如利過泄未止去芒硝後稍熱退減大黃一半再煎兩服如熱氣雖已其人必腹滿又減去大黃與枳實厚朴湯又煎三兩服如腹滿退泄亦自愈後服厚朴湯數服則已按進退承氣法須審之脈證的知有積熱及形病俱實而後可下此以上雖出潔古家珍東垣活法機要而多出於劉河間保命集之文故其用藥於疏蕩為多觀者會其意毋泥其辭可矣東垣云胃氣和平飲食入胃精氣則輸於脾上歸於肺行於百脈而養榮衛也若飲食一傷起居不時損其胃氣則上升精華之氣反下降是為餐泄久則太陰傳少陰而為腸澼假令傷寒冷飲食䐜滿而脹傳為餐泄者宜溫熱之劑以消導之傷濕熱之物而成膿血者宜苦寒之劑以內疏之風邪下陷者升舉之濕氣內盛者分利之裡急者下之後重者調之腹痛者和之洞泄腸鳴無力不及拈衣其脈細微而弱者溫之收之膿血稠黏數至圊而不能便其脈洪大而有力者下之寒之大抵治病當求其所因察何氣之勝取相剋之藥平之隨其所利而利之以平為期此治之大法也瀉利久不止或暴下者皆太陰受病不可離甘草芍藥若不受濕則不利故須用白朮是以聖人立法若四時下利於芍藥白朮內春加防風夏加黃芩秋加厚朴冬加桂附然更詳外證寒熱處之如裡急後重須加大黃如身困倦須用白朮若自汗逆冷氣息微加桂附以溫之如或後重膿血稠黏雖在盛冬於溫藥內亦加大黃診胃脈虛則泄脈滑按之虛絕者其人必下利肺脈小甚為泄小者氣血皆虛腎脈小甚為洞泄小者氣血皆少腎主閉臟今氣血俱少無以閉臟故泄尺寒脈細謂之後泄尺膚寒其脈小者泄少氣下利脈沉弦者下重下利寸口反浮數尺中自澀者必清膿血病若腹大而泄者脈當細微而澀反緊大而滑者死泄而脈大者難治病泄脈洪大是逆也泄注脈緩時小結者生浮大數者死下利脈大為不止下利日十餘行脈反實者死大便赤瓣餐泄脈小者手足寒難已餐泄脈小手足溫易已腹鳴而滿四肢清泄其脈大是逆也如是者不過十五日死矣腹大脹四末清脫形泄甚是逆也如是者不及一時死矣下利手足厥冷無脈者灸之不溫若脈不還反微喘者死下利後脈絕手足厥冷晬時脈還手足溫者生脈不還者死病者痿黃燥而不渴胸中寒而利不止者死假令下利寸口關上尺中悉不見脈然尺中時一小見脈再舉頭者腎氣也若見損脈來為難治下利如魚腦者半死半生下利如塵腐色者死純血者死如屋漏汁者死下利如竹筒注者不可治脈細皮寒氣少泄利前後飲食不入此謂五虛不治若用參朮膏早救之亦有生者下則泄瀉上則吐痰皆不已為上下俱脫死泄瀉金匱下利病脈證並治夫六腑氣絕於外者手足寒上氣腳縮五臟氣絕於內者利不禁甚者手足不仁下利脈沉弦者下重脈大者為未止脈微弱數為欲自止雖發熱不死下利手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負趺陽者為順也下利有微熱而渴脈弱者當自愈下利脈數有微熱汗出今當自愈設脈緊為未解下利脈數而渴者當自愈設不瘥必清膿血以有熱也清古圊字下利脈反弦發熱身汗者自愈下利氣者當利小便下利寸脈反浮數尺中自澀者必清膿血下利清穀不可攻其表汗出必脹滿下利脈沉而遲其人面少赤身微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也下利後脈絕手足厥冷晬時脈還手足溫者生脈不還者死下利腹脹滿身體疼痛者先溫其里後攻其表溫里宜四逆湯攻表宜桂枝湯下利三部脈皆平按之心下堅者急下之宜大承氣湯下利脈遲而滑者實也利未欲止急下之宜大承氣湯下利脈反滑者當有所去下乃愈宜大承氣湯下利已瘥至年月日時復發者以病不盡故也當下之大承氣湯以上數承氣湯本虛者當別議下利譫語者有燥矢故也小承氣湯主之下利便膿血者桃花湯主之熱利下重者白頭翁湯主之下利後更煩按之心下濡者為虛煩也梔子豉湯主之下利清穀裡寒外熱汗出而厥者通脈四逆湯主之下利腹痛紫參湯主之乾嘔下利黃芩湯主之上此下利一章後世名醫諸書皆以為法古之所謂下利即今之所謂泄瀉也內有治傷寒數方仲景用治雜病今全錄之使後人知云治傷寒有法治雜病有方者非也傷寒雜病同一法矣丹溪云有濕有氣虛火痰食積戴復庵云瀉水腹不痛者濕也飲食入胃輒後之完穀不化者氣虛也腹痛瀉水腸鳴痛一陣瀉一陣者火也或瀉或不瀉或多或少者痰也腹痛甚而瀉瀉後痛減者食積也濕多成五泄戴云餐泄者水穀不化而完出濕兼風也溏泄者漸下汙積黏垢濕兼熱也鶩泄者所下澄徹清冷小便清白濕兼寒也濡泄者體重軟弱泄下多水濕自甚也滑泄者久下不能禁固濕勝氣脫也濕瀉脈濡細乃太陰經脾土受濕泄水虛滑身重微滿不知穀味口不渴久雨泉溢河溢或運氣濕土司令之時多有此疾宜除濕湯吞戊己丸佐以胃苓湯重者朮附湯東垣云予病脾胃久衰視聽半失此陰盛乘陽加之氣短精神不足此由弦脈令虛多言之過也皆陽氣衰弱不得舒伸伏匿於陰中耳癸卯歲六七月間淫雨陰寒逾月不止時人多病泄利一日予體重肢節疼痛大便泄並下者三而小便閉塞思其治法按內經標本論大小不利無問標本先利小便又云在下者引而竭之亦是先利小便也又云諸泄利小便不利先分利之又云治濕不利小便非其治也皆言當利小便必用淡味滲泄之劑以利之是其法也噫聖人之法雖布在方策其不盡者可以意求耳今客邪寒濕之淫從外而入里以暴加之若從已上法度用淡滲之劑以除之病雖即已是降之又降是復益其陰而重竭其陽則陽氣愈削而精神愈短矣是陰重強陽重衰反助其邪之謂也故必用升陽風藥即瘥以羌活獨活柴胡升麻各一錢防風根半錢炙甘草半錢同㕮咀水二鍾煎至一盞去渣稍熱服大法云濕寒之勝助風以平之又曰下者舉之得陽氣升騰而去矣又法云客者除之是因曲而為之直也夫聖人之法可以類推舉一而知百者也若不達升降浮沉之理而一概施治其愈者幸也濕兼寒瀉內經曰濕勝則濡泄甲乙經云寒氣客於下焦傳為濡泄夫脾者五臟之至陰其性惡寒濕今寒濕之氣內客於脾故不能裨助胃氣腐熟水穀致清濁不分水入腸間虛莫能制故洞泄如水隨氣而下謂之濡泄法當除濕利小便也治之以對金飲子濕兼熱瀉益元散參萸丸濕兼風見餐泄條寒瀉脈沉細或弦遲身冷口不渴小便清白或腹中綿綿作疼宜理中湯附子溫中湯漿水散暴泄如水周身汗出一身盡冷脈沉而弱氣少而不能語甚者加吐此謂緊病宜以漿水散治之若太陽經傷動傳太陰下利為鶩溏大腸不能禁固卒然而下中有硬物欲起而又下欲了而又不了小便多清此寒也宜溫之春夏桂枝湯秋冬白朮湯理中湯治泄瀉加橘紅茯苓各一兩名補中湯若溏泄不已者於補中湯內加附子一兩不喜飲食水穀不化者再加砂仁一兩共成八味仲景云下利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之用此加法則能理下焦矣戴云寒瀉寒氣在腹攻刺作痛洞下清水腹內雷鳴米飲不化者理中湯或附子補中湯吞大已寒丸或附子桂香丸畏食者八味丸元是冷瀉因瀉而煩躁引飲轉飲轉瀉者參附湯連理湯如寒瀉服上藥未效宜木香湯或姜附湯六柱湯吞震靈丹養氣丹手足厥逆者兼進硃砂丹藥食方入口而即下者名曰直腸難治如瀉已愈而精神未復舊者宜十補飲寒瀉腹中大疼服前藥外兼進乳豆丸服諸熱藥以溫中並不見效登圊不迭穢物隨出此屬下焦宜桃花丸二五粒訶梨勒丸以澀之按戴方多過於亢熱用者審之熱瀉脈數疾或洪大口乾燥身多動音聲響亮暴注下迫益元散加芩連燈心淡竹葉之屬泄而身熱小便不利口渴者益元五苓若火多四苓加木通黃芩泄而困倦不便者及脈數虛熱者宜參朮滑石苓通泄而脈滑堅者實熱宜大承氣湯戴云熱瀉糞色赤黃彈響作疼糞門焦痛糞出穀道猶如湯熱煩渴小便不利宜五苓散吞香連丸凡瀉津液既去口必渴小便多是赤澀未可便作熱論的知熱瀉方用冷劑不然勿妄投以致增劇玉龍丸治一切伏暑泄瀉神效理中湯加茯苓黃連名連理湯用之多有奇功且如今當暑月若的知暑瀉自合用暑藥的知冷瀉自合用熱藥中間有一等盛暑又復內傷生冷非連理湯不可下泄無度泄後卻彈過響肛門熱小便赤澀心下煩渴且又喜冷此藥為宜若元是暑瀉經久下元虛甚日夜頻並暑毒之勢已然而瀉不已復用暑藥則決不能取效便用姜附輩又似難施疑似之間尤宜用此氣瀉腸鳴氣走胸膈痞悶腹急而痛瀉則腹下稍可須臾又急亦有腹急氣塞而不通者此由中脘停滯氣不流轉水穀不分所致戴法用大七香丸入米煎服久而不愈者五膈寬中散吞震靈丹仍佐以米飲調香附末調氣散金匱訶梨勒散治氣利氣虛瀉用四君子湯加曲柏升柴吞二神加木香丸積滯泄瀉腹必耕痛方泄者是也或肚腹滿按之堅者亦是也受病淺者宜神麯之類消導之病深而頑者必用進退承氣之類下之方安傷食瀉因飲食過多脾胃之氣不足以運化而瀉其人必噫氣如敗卵臭宜治中湯加砂仁半錢曲糵枳朮丸或七香丸紅丸子雜服食積腹疼而瀉不可遽用治中兠住宜先用消導推蕩之藥或因食一物過傷而瀉後復食之即瀉者以脾為所傷未復而然宜大建脾湯寒者可用仍燒所傷之物存性為末三五錢重調服因食冷物停滯傷脾脾氣不暖所食之物不能消化瀉出而食物如故宜治中湯加乾葛吞酒煮黃連丸有脾氣久虛不受飲食者食畢即腸鳴腹急盡下所食之物方快不食則無事俗名錄食瀉經年累月宜快脾丸因傷於酒每晨起必瀉者宜理中湯加乾葛吞酒煮黃連丸或葛花解酲湯吞之因傷面而瀉者養胃湯加萊菔子炒研一錢痛者更加木香五分瀉甚者去藿香加炮姜如其數痰瀉二陳湯海石青黛黃芩神麯薑汁竹瀝為丸每服三五十丸少者必用吐法吐之方愈一男子夜數如廁或教以生薑一兩碎之半夏湯洗與大棗各三十枚水一升瓷瓶中慢火燒為熟水時時呷之數日便已每日五更即泄瀉有酒積有寒積有食積有腎虛俗呼脾腎泄有人每早須大瀉一行或腹痛或不腹痛空心服熱藥亦無效有人教以夜食前又進熱藥一服遂安後如此常服愈蓋暖藥雖平旦服之至夜力已盡無以敵一夜陰氣之故也有人每五更將天明時必溏利一次有人云此名腎泄服五味子散頓愈有人久泄早必泄一二行泄後便輕快脈滑而少弱先與厚朴和中丸五十丸大下之後以白朮為君枳殼半夏茯苓為臣厚朴炙甘草芩連川芎滑石為佐吳茱萸十餘粒為使生薑煎服十餘帖而愈戴云有每日五更初洞瀉服止瀉藥並無效米飲下五味丸或專以北五味煎飲雖節省飲食大段忌口但得日間上半夜無事近五更其瀉復作此病在腎分水飲下二神丸及椒樸丸或平胃散下小茴香丸二神丸合五味子散名為四神丸治瀉尤妙小便不利而泄若津液偏滲於大腸大便瀉而小便少者用胃苓散分利之若陰陽已分而小便短少此脾肺氣虛不能生水也宜補中益氣湯加麥門五味陰火上炎而小便赤少此肺氣受傷不能生水也用六味地黃丸加麥門五味腎經陰虛陽無所生而小便短少者用滋腎丸腎氣丸腎經陽虛陰無所化而小便短少者用益氣湯六味丸若誤用滲泄分利復傷陽氣陰無所生而小便益不利則腫脹之證作而疾危矣凡大便泄服理中湯小便不利大便反泄不知氣化之過本肺不傳化以純熱之藥治之是以轉泄少服則不止多服則愈熱所以不分若以青皮陳皮之類治之則可經云膀胱者州都之官津液臟焉氣化則能出矣泄而口渴引飲此為津液內亡用錢氏白朮散或補中益氣湯腎水不足之人患泄或過服分利之劑而渴者加減八味丸失治必變小便不利水腫脹滿等危證矣水漬入胃名為溢飲滑泄渴能飲水水下復泄泄而大渴此無藥證當灸大顀在第一椎下陷中滑瀉東垣云中焦氣弱脾胃受寒冷大便滑泄腹中雷鳴或因誤下末傳寒中復遇時寒四肢厥逆心胃絞痛冷汗不止此腎之脾胃虛也沉香溫胃丸治之薛氏曰前證若脾胃虛寒下陷者用補中益氣湯加木香肉豆蔻補骨脂若脾氣虛寒不禁者用六君子湯加炮薑肉桂若命門火衰脾土虛寒者用八味丸若脾腎氣血俱虛者用十全大補湯送四神丸若大便滑利小便閉澀或肢體漸腫喘嗽唾痰為脾腎氣血俱虛宜用十全大補湯送四神丸若大便滑利小便閉澀或肢體漸腫喘嗽唾痰為脾胃虧損宜金匱加減腎氣丸保命集云虛滑久而不止者多傳變為利太陰傳少陰是為鬼邪先以厚朴枳實湯防其傳變按此法實者用之虛者不若四神丸實腎之為得也收澀之劑固腸丸訶子散皆治熱滑扶脾丸桃花丸訶子丸赤石脂禹餘糧湯皆治寒滑瀉已愈至明年此月日時復發者有積故也脾主信故至期復發熱積大承氣湯寒積感應丸虛者以保和丸加三稜蓬朮之屬投之趙以德云昔聞先生言泄瀉之病其類多端得於六淫五邪飲食所傷之外復有雜合之邪似難執法而治乃見先生治氣暴脫而虛頓瀉不知人口眼俱閉呼吸微甚殆欲絕者急灸氣海飲人參膏十餘斤而愈治陰虛而腎不能司禁固之權者峻補其腎治積痰在肺致其所合大腸之氣不固者湧出上焦之痰則肺氣下降而大腸之虛自復矣治憂思太過脾氣結而不能升舉陷入下焦而成泄瀉者開其鬱結補其脾胃使穀氣升發也凡此之類不可枚舉因問先生治病何其神也先生曰無他圓機活法具在內經熟之自得矣餐泄水穀不化而完出是也史記倉公傳迵風即此經云清氣在下則生餐泄又曰久風入中則為腸風餐泄夫脾胃土也氣衝和以化為事今清氣下降而不升則風邪久而干胃是木賊土也故沖和之氣不能化而令物完出謂之餐泄或飲食太過腸胃所傷亦致米穀不化此俗呼水穀利也法當下者舉之而消克之也以加減木香散主之東垣云清氣在下者乃人之脾胃氣衰不能升發陽氣故用升麻柴胡助甘辛之味以引元氣之升不令下陷為餐泄也又云凡泄則水穀不化謂之餐泄是清氣在下乃胃氣不升上古聖人皆以升浮藥扶持胃氣一服而愈知病在中焦脾胃也脈訣曰濕多成五泄濕者胃之別名也病本在胃真氣弱真氣者穀氣也不能克化飲食乃濕盛故也以此論之正以脾胃之弱故也初病奪食或絕不食一二日使胃氣日勝泄不作也今已成大泄矣經云治濕不利小便非其治也又云下焦如瀆又云在下者引而竭之惟此證不宜此論其病得之於胃氣下流清氣不升陽道不行宜升宜舉不宜利小便靈樞云頭有疾取之足謂陽病在陰也足有疾取之上謂陰病在陽也中有疾旁取之旁者少陽甲膽是也中者脾胃也脾胃有疾取之足少陽甲膽者甲風是也東方春也胃中谷氣者便是風化也作一體而認故曰胃中濕勝而成泄瀉宜助甲膽風勝以克之又是升陽助清氣上行之法也又一說中焦元氣不足溲便為之變腸為之苦鳴亦緣胃氣不升故令甲氣上行又云風勝濕也大抵此證本胃氣弱不能化食奪食則一日而可止夫奪食之理為胃弱不能克化食則為泄如食不下何以作泄更當以藥滋養元氣令和候泄止漸與食胃勝則安矣若食不化者於升陽風藥內加炒曲同煎兼食入頓至心頭者胃之上口也必口沃沫或食入反出皆胃土停寒其右手關脈中弦按之洪緩是風熱濕相合穀氣不行清氣不升為弦脈之寒所隔故不下也曲之熱亦能去之若反胃者更加半夏生薑入於風藥內同煎奪食少食欲使胃氣強盛也若藥劑大則胃不勝藥泄亦不止當漸漸與之今病既久已至衰弱當以常法治之不可多服餌也人之肉如地之土豈可人而無肉故肉消盡則死矣消瘦之人有必死者八內經有七外經有一又病肌肉去盡勿治之天命也如肌肉不至瘦盡當急療之宜先奪食而益胃氣便與升陽先助真氣次用風藥勝濕以助升騰之氣病可已矣余皆勿論此治之上法也治用升陽除濕湯之類是也春傷於風夏生餐泄木在時為春在人為肝在天為風風者無形之清氣也當春之時發為溫令反為寒折是三春之月行三冬之令也以是知水為太過矣水既太過金肅愈嚴是所勝者乘之而妄行也所勝者乘之則木虛明矣故經曰從後來者為虛邪木氣既虛火令不及是所生者受病也故所不勝者侮之是以土來木之分變而為餐泄也故經曰清氣在下則生餐泄以其濕令當權故餐泄之候發之於夏也若當春之時木不發生溫令未顯止行冬令是謂傷衛以其陽氣不出地之外也當以麻黃湯發之麻黃味苦味之薄者乃陰中之陽也故從水中補木而瀉水發出津液為汗也若春木既生溫令已顯陽氣出於地之上寒再至而復折之當以輕發之謂已得少陽之氣不必用麻黃也春傷於風夏生餐泄所以病發於夏者以木絕於夏而土旺於長夏濕本有下行之體故餐泄於夏也不病於春者以其春時風雖有傷木實當權故餐泄不病於木之時而發於濕之分也經曰至而不至是為不及所勝妄行所不勝者搏之所生者受病此之謂也仲景法下利清穀裡寒外熱汗出而厥者通脈四逆湯主之河間法餐泄風冷入中泄利不止脈虛而細日夜數行口乾腹痛不已白朮湯主之東垣云泄利餐泄身熱脈弦腹痛而渴及頭痛微汗宜防風芍藥湯東垣所云內動之風也經云春傷於風夏生餐泄又云久風為餐泄又云虛邪之中人也始於皮膚留而不去傳舍於絡脈留而不去傳舍於經留而不去傳舍於輸留而不去傳舍於伏沖之脈留而不去傳舍於腸胃在腸胃之時賁響腹脹多寒則腸鳴餐泄食不化則非內動之風也潔古云大渴引飲多致水穀一時下者宜灸大椎三五壯或用車前子雷丸白朮茯苓及五苓散等藥滲之又如久風為餐泄者則不飲水而谷完出治法當以宣風散導之後服蒼朮防風湯餐泄以風為根風非汗不出有病此者腹中雷鳴泄注水谷不分小便澀滯皆以脾胃虛寒故耳服豆蔻烏梅粟殼乾薑附子曾無一效中脘臍下灸已數千燥熱轉甚津液涸竭瘦削無力飲食減少延予視之予以應象論曰熱氣在下水穀不分化生餐泄寒氣在上則生䐜脹而氣不散何也陰靜而陽動故也診其脈兩手皆浮大而長身表微熱用桂枝麻黃湯以薑棗煎大劑連進三服汗出終日至旦而愈次以胃風湯和其臟腑調養陰陽食進而愈經云脾虛則腹滿腸鳴泄食不化又云餐泄取三陰三陰者太陰也宜補中益氣湯以白芍藥代當歸主之又云腎臟志志有餘腹脹餐泄瀉然筋血又云肝足厥陰之脈所生病者胸滿嘔逆餐泄視盛虛寒熱陷下施法此皆內因無風者也滯下即痢疾古以赤為熱白為冷至金河間李東垣始非之劉謂諸痢皆由乎熱而以赤屬之心火黃屬之脾土白屬之肺金青屬肝木黑乃熱之極而反兼腎水之化其諸瀉利皆兼於濕濕主於痞以致怫鬱氣不得宣通濕熱甚於腸胃之中因以成腸胃之燥故里急後重小便赤澀謂治諸痢莫若以辛苦寒藥而治或微加辛熱佐之辛能開鬱苦能燥濕寒能勝熱使氣宣平而已行血則便血自愈調氣則後重自除李從脾胃病者而論則曰上逆於肺為白下傳於陰為赤衛生寶鑑因謂太陰主瀉傳於少陰為痢由泄亡津液而火就燥腎惡燥居下焦血分也其受邪者故便膿血然亦赤黃為熱青白為寒丹溪謂滯下因火熱下迫而致裡急後重用劉氏之治濕熱李氏之保脾土更復一一較量氣血虛實以施治三家皆發前代之未發而舉其要也予嘗因是而研究之自其五色分五臟者言則可見濕熱之中具有五邪之相挾自其上逆下傳氣血者言則可見五臟六腑十二經脈之氣血諸邪皆得傷之而為痢之赤白本自其濕熱為病者言則可見由來致成濕熱之故非一端自其分痢有虛實者言則可見凡在痢病者中所有之證如煩躁者咽乾舌黑者噦噫後重者腹痛者脹滿者腳痛腫弱之類悉有虛實之殊是故予於痢證直斷之種種為邪入胃以成濕熱經臟受傷其氣傷則病於肺血傷則傳於心心肺者氣血之主也氣血所行之方既病安得不歸所主之臟乎而大小腸者心肺之合也出納水穀糟粕轉輸之官胃乃大小腸之總司又是五臟六腑十二經脈稟氣之海苟有內外之邪凡損傷於經臟者或移其邪入胃胃屬土濕之化胃受邪則濕氣不化怫鬱而成濕熱矣或心肺移氣血之病傳之於合大腸獨受其病則氣凝注而成白痢小腸獨受其病則血凝注而成赤痢大小腸通受其病則赤白相混而下胃之濕熱淫於大小腸者亦如之其色兼黃若色之黑者有二如色之焦黑此極熱兼水化之黑也如黑之光若漆者此瘀血也或曰治利從腸胃世人所守之法也今乃復求其初感之邪與初受之經將何為哉曰病在腸胃者是其標也所感之邪與初受之經者是其本也且內經於治標本各有所宜施之先後況所傳變之法又與傷寒表裡無異何可不求之乎豈止此而已至若腸胃自感而病亦當以邪正分或正氣先虛而受邪或因邪而致虛則以先者為本後者為標與夫積之新舊亦如之舊積者停食結痰所化之積也新積者舊積去後而氣血復郁所生者也舊積當先下之新積則不宜下其故何哉蓋腸胃之腐熟水穀轉輸糟粕者皆榮衛灑陳六腑之功今腸胃有邪則榮衛運行至此其機為之阻不能施化故衛氣鬱而不舒榮血泣而不行於是飲食結痰停於胃糟粕留於腸與所鬱氣泣血之積相挾成滯下病矣如是者必當下之以通壅塞利榮衛之行至於升降仍不行衛氣復郁榮血復泣又成新積故病如初若是者不必求邪以治但理衛氣以開通腠理和榮血以調順陰陽陰陽調腠理開則升降之道行其積不治而自消矣然而舊積亦有不可下者先因榮衛之虛不能轉輸其食積必當先補榮衛資腸胃之真氣充溢然後下之庶無失矣予數見俗方惟守十數方治利不過攻之澀之而已矣安知攻病之藥皆是耗氣損血之劑用之不已甚至於氣散血亡五臟空虛精憊神去而死其固澀之又皆足以增其氣鬱血泣之病轉生腹脹下為足腫上為喘呼諸疾作焉世人之法何足守乎丹溪云痢初得之必用調胃承氣及大小承氣有男子五十餘下利晝有積淡紅色夜無積食自進先吃小胃丹兩服再與四十丸次六十丸去積卻與斷下按此惟實者宜之虛者以芍藥湯益元散保和丸之類湯積芍藥湯治下血調氣經曰溲而便膿血知氣行而血止也行血則便血自安調氣則後重自除益元散治身發熱下痢赤白小便不利湯胃中積聚下痢勢惡頻並窘痛或久不愈諸藥不止須吐下之以開除濕熱痞悶積滯而使氣液宣行者宜玄青丸逐之玄珠利積丸亦可玄珠云下痢赤白腹滿脹痛裡急上渴引飲小水赤澀此積滯也宜泄其熱中用清腸丸導氣丸推其積滯而利自止矣凡治積聚之證輕則溫而利之清腸丸是也重者天真散舟車丸下之下後勿便補之其或力倦自覺氣少惡食此為挾虛證宜加白朮當歸身尾甚者加人參若又十分重者止用此藥加陳皮補之虛回而痢自止矣丹溪治葉先生患滯下後甚逼迫正合承氣證但氣口虛形雖實而面黃積白此必平昔食過飽而胃受傷寧忍二三日辛苦遂與參朮陳皮芍藥等補藥十餘帖至三日後胃氣稍完與承氣二帖而安苟不先補完胃氣之傷而遽行承氣寧免後患乎以上湯積戴云痢疾古名滯下以氣滯成積積成痢治法當以順氣為先須當開胃故謂無飽死痢疾也凡痢初發不問赤白裡急後重頻欲登圊及去而所下無多既起而腹內復急宜用藿香正氣散加木香半錢吞感應丸或蘇合香丸吞感應丸以上調氣赤痢血色鮮紅或如蛇蟲形而間有血鮮者此屬熱痢宜藿香正氣散加黑豆三十粒五苓散加木香半錢粟米少許下黃連丸或黃連阿膠丸茶梅丸熱甚服上項藥未效宜白頭翁湯赤痢發熱者敗毒散加陳倉米一撮煎若血色黯如瘀服涼藥而所下愈多去愈頻者當作冷痢宜理中湯或四君子湯加肉果一錢木香半錢加減平胃散青六丸治血痢佳諸血痢不止宜多用地榆易簡方云血痢當服胃風湯膠艾湯之類心經伏熱下純血色必鮮紅用犀角生磨汁半硃砂飛研二錢牛黃三分人參末三錢和丸如麻子大燈心龍眼肉煎湯下六七分脾經受濕下血痢用蒼朮地榆湯血痢久不止腹中不痛不裡急後重槐花丸乾薑於火上燒黑不令成灰瓷碗合放冷為末每服一錢米飲調下治血痢神效仲景云小腸有寒者其人下重便血可以此治之以上赤痢東垣云大便後有白膿或只便白膿因勞倦氣虛傷大腸也以黃耆人參補之如裡急頻見汙衣者血虛也宜加當歸如便白膿少有滑頻見汙衣者氣脫加附子皮甚則加御米殼如氣澀者只以甘藥補氣當安臥不言以養其氣戴云白痢下如凍膠或如鼻涕此屬冷痢先宜多飲除濕湯加木香一錢吞感應丸繼進理中湯亦有下如魫色或如臘茶色者亦宜用前白痢藥白蠟治後重白膿以上白痢若感暑氣而成痢疾者其人自汗發熱面垢嘔逆渴欲引飲腹內攻刺小便不通痢血頻並宜香薷飲加黃連一錢佐以五苓散益元散白湯調服不愈則用蜜水調感暑成痢疼甚食不進六和湯藿香正氣散各半帖名木香交加散以上暑痢老人深秋患痢發呃逆嘔者黃柏炒燥研末陳米飯為丸小豌豆大每服三十丸人參白朮茯苓三味濃煎湯下連服三劑即愈切不可下丁香等熱藥治冷利腹中不能食肉豆蔻去皮醋麵裹煨熟搗末粥飲下二錢匕世俗治夏中暑痢疾用黃連香薷飲加甘草芍藥生薑神效者蓋夏月之痢多屬於暑潔古治處暑後秋冬間下痢用厚朴丸大效者蓋秋之痢多屬於寒積經所謂必先歲氣無伐天和者也以上秋痢金匱下痢腹痛紫參湯主之潔古云厚朴丸治處暑後秋冬間腹痛下痢大效丹溪曰初下痢腹痛不可用參術然氣虛胃虛者可用初得之亦可用大承氣調胃承氣下之看其氣病血病然後加減用藥腹痛者肺經之氣鬱在大腸之間者以苦梗發之然後用治痢藥氣用氣藥血用血藥其或痢後糟粕未實或食粥稍多或飢甚方食肚中作疼切不可驚恐當以白朮陳皮各半煎湯和之自安粥多及食肉作痛者宜奪食奪食者減其粥食絕其肉味也因傷冷水瀉變作赤白痢腹痛減食熱燥四肢困倦無力宜茯苓湯下痢之後小便利而腹中滿痛不可忍此名陰陽反錯不和之甚也越桃散主之治痢止痛如神方揀淨川連片一兩淨枳殼片一兩槐花三二兩用水浸片時漉淨同川連先炒老黃色次入枳殼再炒待燥揀出槐花不用止將黃連五錢枳殼五錢作一服水煎七分去渣調乳香沒藥淨末各七分五釐服之次照前方再服一劑腹痛即止痢即稀神效此方有服之如醉者乃藥力行也不妨仲景建中湯治痢不分赤白久新但腹中大痛者神效其脈弦急或澀浮大按之空虛或舉按皆無力者是也下利膿血稠黏腹痛後重身熱久不愈脈洪疾者芍藥黃芩湯膿血痢無度小便不通腹中痛當歸導氣湯以上腹痛下利赤白裡急後重香連丸亦可用連二錢姜半錢為末和勻溫酒下仲景云熱利下重者白頭翁湯主之下利膿血裡急後重日夜無度宜導氣湯大瘕泄者裡急後重數至圊而不能便莖中痛用清涼飲子主之其泄自止莖中痛者屬厥陰加甘草稍裡急後重多者屬少陰加大黃令急推去舊物則輕矣內經曰因其重而減之又云在下者引而竭之裡急後重數至圊而不能便皆宜進退大承氣湯主之下利赤白後重遲澀宜感應丸或曰治後重疏通之劑羅謙甫水煮木香膏東垣白朮安胃散等方已盡矣又有用御米殼等固澀之劑亦愈者何也曰後重本因邪壓大腸墜下故大腸不能升上而重是以用大黃檳榔輩瀉其所壓之邪今邪已瀉其重仍在者知大腸虛滑不能自收而重是以用御米殼等澀劑固其滑收其氣用亦愈也然大腸為邪墜下之重其重至圊後不減大腸虛滑不收之重其重至圊後隨減以此辨之百不失一也其或下墜異常積中有紫黑色而又痛甚此為死血證法當用桃仁泥滑石粉行之或口渴及大便口燥辣是名挾熱即加黃芩或口不渴身不熱喜熱手熨湯是名挾寒即加乾薑後重積與氣墜下服升消藥不愈者用秦艽皂角子煨大黃當歸桃仁枳殼黃連等劑若大腸風盛可作丸服其或下墜在血活之後此為氣滯證宜前藥加檳榔一枚後重當和氣積與氣墜下者當兼升兼消升謂升麻之類消謂木香檳榔之類金匱方泄利下重者以水五升煮薤白三升至二升去渣以四逆散方寸匕內湯中煮取一升半分溫再服凡用諸承氣等藥挨積之後仍後重者乃陽不升也藥中當加升麻升其陽其重自去也東垣云裡急後重數至圊而不能便或少有白膿或少血者慎勿利之宜升陽除濕防風湯以上裡急後重其或氣行血和積少但虛坐努責此為亡血證倍用當歸身尾卻以生地黃生芍藥生桃仁佐之復以陳皮和之血生自安虛坐而不得大便皆因血虛也血虛則裡急加當歸身凡後重逼迫而得大便者為有物而然今虛坐努責而不得大便知其血虛也故用當歸為君生血藥佐之以上虛坐努責內經膿血稠黏皆屬相火夫太陰主瀉少陰主痢是先泄亡津液而火就燥腎惡燥居下焦血分其受邪者故便膿血然赤黃為熱青白為寒治須兩審治熱以堅中丸豆蔻丸香連丸治寒白膠香散或多熱少寒水煮木香膏虛滑頻數宜止宜澀宜養臟湯溲而便膿血者小腸泄也脈得五至以上洪大者宜七宣丸脈平和者立秋至春分宜香連丸春分至立秋宜芍藥柏皮丸四時皆宜加減平胃散如有七宣丸證者亦宜服此藥去其餘邪兼平胃氣以上膿血稠黏其或纏滯退減十之七八穢積未盡糟粕未實當以炒芍藥炒白朮炙甘草陳皮茯苓煎湯下固腸丸三十粒然固腸丸性燥恐尚有滯氣未盡行者但當單飲此湯固腸丸未宜遽用蓋固腸丸者雖有去濕實腸之功其或久痢體虛氣弱滑泄不止又當以訶子肉豆蔻白礬半夏等藥澀之甚者添牡蠣可擇用之然須以陳皮為佐恐太澀亦能作疼又甚者灸天樞氣海此二穴大能止泄仲景云下利便膿血者桃花湯主之丹溪云桃花湯主病屬下焦血虛且寒非乾薑之溫石脂之澀且重不能止血用粳米之甘引入腸胃水煮木香膏易簡斷下湯白朮安胃散養臟湯五倍子為丸赤痢甘草湯下白痢乾薑湯下各十丸烏梅二個煎湯石榴一個燒灰用酸石榴一個煎湯調二錢以上滑脫東垣治一老僕脫肛日久近復下利裡急後重白多赤少不任其苦此非肉食膏粱者也必多蔬食或飲食不節天氣已寒衣蓋又薄寒侵形體不禁而腸頭脫下者寒也滑也真氣不禁形質不收乃血脫也此乃寒滑氣泄不固故形質下脫也當以澀去其脫而除其滑以大熱之劑除寒補陽以補氣之藥升陽益氣以微酸之味固氣上收名之曰訶子皮散一服減半再服全愈養臟湯地榆芍藥湯戴云脫肛一證最難為藥熱則肛門閉寒則肛門脫內用磁石研末每二錢食前米飲調下外用鐵鏽磨湯溫洗以上脫肛滯下大便不禁其大孔開如空洞不閉者用蔥和花椒末搗爛塞穀道中並服酸澀固腸之劑收之如御米殼訶子皮之類是也神效大孔開痢久大孔痛亦有寒熱者熟艾黃蠟訶子燒熏之因熱而痛檳榔木香黃連黃芩加乾薑因寒而痛炒鹽熨之炙枳實熨之丹溪用瓦片敲圓如銅錢狀燒紅投童子小便中急取起令乾紙裹安痛處因時寒恐外寒乘虛而入也以人參當歸陳皮作濃湯飲之食淡味自安大孔痛痢疾不納食或湯藥入口隨即吐出者俗名噤口有因邪留胃氣伏而不宣脾氣澀而不布故嘔逆而食不得入者有陽氣不足胃中宿食因之未消則噫而食卒不下者有肝乘脾胃發嘔飲食不入縱入亦反出者有水飲所停氣急而嘔谷不得入者有火氣炎熾內格嘔逆而食不得入者有胃氣虛冷食入反出者有胃中邪熱不欲食者有脾胃虛弱不欲食者有穢積在下惡氣熏蒸而嘔逆食不得入者當各從其所因以為治以脈證辨之如脾胃不弱問而知其頭疼心煩手足溫熱未嘗多服涼藥者此乃毒氣上衝心肺所以嘔而不食宜用敗毒散每服四錢陳倉米一百粒姜三片棗一枚水一盞半煎八分溫服若其脈微弱或心腹膨脹手足厥冷初病則不嘔因服粟殼烏梅苦澀涼藥太過以致聞食先嘔者此乃脾胃虛弱用山藥一味銼如小豆大一半入銀瓦銚內炒熟一半生用同為末飯飲調下又方用石蓮捶去殼留心並肉碾為末每服二錢陳米飲調下此疾蓋是毒氣上衝心肺藉此以通心氣便覺思食效丹溪用人參黃連薑汁炒濃煎汁終日細細呷之如吐再吃但一呷下咽便開痢亦自止神效楊仁齋用參苓白朮散加石菖蒲末以道地粳米飲乘熱調下或用人參茯苓石蓮子肉入些菖蒲與之戴復庵用治中湯加木香半錢或縮砂一錢以上噤口痢其或在下則纏滯在上則嘔食此為毒積未化胃氣未平證當認其寒則溫之熱則清之虛則用參術補之毒解積下食自進矣泄痢久不安膿血稠黏裡急後重日夜無度宜大黃湯用大黃一兩銼用好酒兩大盞浸半日同煮至一盞半去渣分為二次頓服之痢止停服未止再服以利為度又服芍藥湯以和之所以徹其毒也服前藥痢已除宜以白朮黃芩湯和之丹溪治一人患痢百餘日百法不效六脈促急沉弦細弱芤左手為甚晝夜十行視之穢物甚少雖下清涕中有紫黑血絲食全不進此非痢也宜作瘀血治之以桃仁乳香沒藥滑石佐以檳榔木香神麯糊為丸米飲下百餘粒至夜半不動又依前法下二百粒至天明下穢如爛魚腸者二升半困頓終日漸與粥食而安按此方恐當有大黃無則難下又治族叔年七十稟壯形瘦夏末患泄痢至秋百方不應視之病雖久而神不瘁小便澀少而不赤兩手脈俱澀而頗弦自言胸微悶食亦減因悟此必多年沉積癖在腸胃詢其平生喜食何物曰喜食鯉魚三年無日不用此積痰在肺肺為大腸之臟宜大腸之不固也當與澄其源而流自清以茱萸陳皮青蔥蔍苜根生薑煎濃湯和以砂糖飲一碗許自以指探喉中至半時吐痰半升如膠其夜減半次早又服又吐半升而痢自止又與平胃散加白朮黃連旬日而安收澀用木香散訶黎勒丸久痢休息痢多因兜住太早積不盡除或因痢愈而不善調理以致時止時作宜四君子湯加陳皮一錢木香半錢吞駐車丸只緣兜住積滯遂成休息再投去積卻用兜劑張文仲用虎骨炙焦搗末調服日三匙效久痢休息痢虛滑甚者用椿根白皮東南行者長流水內漂三日去黃皮切片每一兩配人參一兩入煨木香二錢粳米一撮煎湯飲之休息痢勞痢因痢久不愈耗損精血致腸胃空虛變生他證或五心發熱如勞之狀宜蕷蓮飲赤多倍蓮肉白多倍山藥痢後調補宜四君子湯加陳皮一錢半即異功散或七珍散惡甜者生料平胃散加人參茯苓各半錢諸病壞證久下膿血或如死豬肝色或五色雜下頻出無禁有類滯下俗名刮腸此乃臟腑俱虛脾氣欲絕故腸胃下脫若投痢藥則誤矣六柱飲去附子加益智仁白芍藥或可冀其萬一痢後風因痢後下虛不善調將或多行或房勞或感外邪致兩腳痿軟若痛若痹遂成風痢獨活寄生湯吞虎骨四斤丸或用大防風湯或多以骨碎補三分之一同研取汁酒解服外以杜牛膝杉木節白芷南星萆薢煎湯熏洗丹溪云痢後風系血入臟腑下未盡復還經絡不得行故也松明節一兩以乳香二錢炒焦存性蒼朮黃柏各一兩紫葳一兩半甘草半兩桃仁去皮不去尖一兩俱為末每服三錢生薑同杵細水湯起二三沸服鄰人鮑子年二十餘因患血痢用澀藥取效後患痛風號叫撼鄰里予視之曰此惡血入經絡證血受濕熱久為凝濁所下未盡留滯隧道所以作痛經久不治恐成枯細遂與四物湯桃仁紅花牛膝黃芩陳皮甘草煎生薑汁研潛行散入少酒飲之數十帖又與刺委中出黑血近三合而安寶鑑云且如瀉痢止脾胃虛難任飲食不可一概用克伐之劑若補養其脾胃氣足自然能飲食宜錢氏方中異功散設或喜嗜飲食太過有傷脾胃而心腹痞滿嘔逆噁心則不拘此例當權用橘皮枳實丸一服得快勿再服若飲食調節無傷則胃氣和平矣大小便不通脈盛皮熱腹脹前後不通瞀悶此謂五實脾胃氣滯不能轉輸加以痰飲食積阻礙清道大小便秘澀不快升柴二術二陳湯數服能令大便潤而小便長濕熱痰火結滯脈洪盛大小便秘赤肢節煩疼涼膈散通聖散金匱厚朴大黃湯選用丹溪治一婦人脾疼後患大小便不通此是痰隔中焦氣聚上焦二陳加木通初服後吐渣再服燒皂角灰為末粥清調下推車客七個土狗七個二物新瓦上焙乾為末以虎目樹皮即虎杖向東南者煎濃湯服之連根蔥一二莖帶土生薑一塊淡豆豉二十一粒鹽二匙同研爛作餅烘熱掩臍中以帛扎定良久氣透自通不通再換一餅陰證大小便不通及諸雜病陰候大小便不通危急者用牡蠣陳粉乾薑炮各一兩上為細末男病用女人唾調手內擦熱緊掩二卵上得汗出愈女病用男子唾調手內擦熱緊掩二乳上得汗出愈蓋卵與乳乃男女之根蒂坎離之分屬也非急不用大便不通潔古云臟腑之秘不可一概治療有虛秘有實秘胃實而秘者能飲食小便赤當以麻仁丸七宣丸之類主之胃虛而秘者不能飲食小便清利厚朴湯主之胃氣實者秘物也胃氣虛者秘氣也有風秘有冷秘有氣秘有熱秘有老人津液乾燥及婦人分產亡血及發汗利小便病後血氣未復皆能作秘不可一例用硝黃利藥巴豆牽牛尤在所禁風秘者由風搏肺臟傳於大腸故傳化難或其人素有風病者亦多有秘宜小續命湯去附子倍芍藥入竹瀝一杯吞潤腸丸或活血潤腸丸冷秘由冷氣橫於腸胃凝陰固結津液不通胃氣閉塞其人腸內氣攻喜熱惡冷宜藿香正氣散加官桂枳殼各半錢吞半硫丸熱藥多秘惟硫黃暖而通冷藥多泄惟黃連肥腸而止泄氣秘由氣不升降穀氣不行其人多噫宜蘇子降氣湯加枳殼吞養正丹或半硫丸來復丹未效佐以木香檳榔丸有氣作痛大便秘塞用通劑而便愈不通又有氣秘強通之雖通復秘或迫之使通因而下血者此當順氣氣順則便自通又當求溫暖之劑熱秘面赤身熱腸胃脹悶時欲得冷或口舌生瘡此由大腸熱結宜四順清涼飲吞潤腸丸或木香檳榔丸實者承氣湯仲景云脈有陽結陰結者何以別之曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反硬名曰陰結也期十四日當劇東垣云陽結者散之陰結者熱之前所云實秘熱秘即陽結也前所云虗秘冷秘即陰結也老人虛秘及出汗利小便過多一切病後血氣未復而秘者宜蘇子降氣湯倍加當歸吞威靈仙丸或肉黃飲蓯蓉潤腸丸尤宜東垣云津液耗而燥者以辛潤之腎主五液津液盛則大便如常若飢飽勞役損傷胃氣及食辛熱厚味之物而助火邪伏於血中耗散真陰津液虧少故大便結燥又有年老氣虛津液不足而結者腎惡燥急食辛以潤之是也血虛津液枯竭而秘結者脈必小澀面無精光大便雖軟努責不出大劑四物湯加陳皮甘草酒紅花導滯通幽湯益血丹血少兼有熱者脈洪數口乾小便赤少大便秘硬潤燥湯活血潤燥丸四物湯加酒芩梔子桃仁紅花大法云大便秘服神芎丸大便不通小便反利不知燥濕之過本大腸少津液以寒燥之藥治之是以轉燥少服則不濟多服則亡血所以不通若用四物麻子杏仁之類則可經云燥則為枯濕劑所以潤之金匱真言論云北方黑色入通於腎開竅於二陰故腎陰虛則小大便難宜以地黃蓯蓉車前茯苓之屬補真陰利水道少佐辛藥開腠理致津液而潤其燥施之於老人尤宜若大小便燥結之甚求通不得登廁用力太過便仍不通而氣被掙脫下注肛門有時泄出清水而裡急後重不可忍者胸膈間梗梗作惡乾嘔有聲渴而索水飲食不進呻吟不絕欲利之則氣以下脫命在須臾再下即絕欲固之則溺與燥矢膨滿腹腸間恐反增劇欲升之使氣自舉而穢物不為氣所結自然通利則嘔惡不堪宜如何處家姑年八十餘嘗得此患予惟用調氣利小便之藥雖小獲效不收全功嘗慰之令勿急性後因不能食遽索末藥利下數行不以告予自謂稍快矣而脈忽數動一止氣息奄奄頹然床褥予知真氣已泄若不收攝恐遂無救急以生脈藥投之數劑後結脈始退因合益血潤腸丸與服勸以勿求速效勿服他藥久之自有奇功如言調理兩月餘而二便通調四肢康勝矣便秘自是老人常事俗以為後門固壽考之徵而一時難堪輒躁擾而致疾予所處方不犯大黃可以久服故表而出之元戎五燥大便秘東方其脈弦風燥也宜瀉風之藥治之獨活羌活防風茱萸地黃柴胡川芎南方其脈洪熱燥也宜鹹苦之藥治之黃芩黃連大黃黃柏芒硝西南方其脈緩土燥也宜潤濕之藥治之芍藥半夏生薑烏梅木瓜西方其脈澀血燥也宜滋血之藥治之杏仁麻仁桃仁當歸氣結用木香檳榔枳實陳皮地黃郁李仁北方其脈遲寒燥也宜溫熱之藥治之當歸肉桂附子烏頭硫黃良薑巴豆潤腸丸加減法如病人不小便因大便不通而澀其邪盛者急加酒洗大黃以利之如血燥者加桃仁酒洗大黃如風結燥者加麻仁大黃如風澀者加煨皂角仁大黃秦艽以利之如脈澀覺身癢氣澀者加郁李仁大黃以除氣燥如寒陰之病為寒結閉者以局方中半硫丸或加煎附子生薑湯冰冷與之其病雖陰寒之證當服陽藥補之若大便恆不甚通者亦當十服中與一服利藥微通其大便不令秘結乃治之大法也若病人雖是陰證或是陰寒之證其病顯躁脈堅實亦宜陽藥中少加苦寒之劑以去熱躁躁止勿加如陰躁欲坐井中者其二腎脈按之必虛或沉細而遲此為易辨如有客邪之病亦從權加之有物有積而結者當下之食傷太陰腸滿食不化腹響響然不能大便者以苦泄之七宣丸木香檳榔丸桃杏仁俱治大便秘當以血氣分之年老虛人大便燥秘者脈浮在氣杏仁陳皮主之脈沉在血桃仁陳皮主之所以俱用陳皮者以手陽明病與手太陰為表裡也又云盛則難便行陽氣也敗則便難行陰血也注夏大便澀滯者血少血中伏火也黃耆人參湯加生地黃當歸身桃仁泥麻仁泥潤之如潤之大便久不快利者少加煨大黃微利之如加大黃久不快利者非血結血秘是熱則生風病必濕風證止當服黃耆人參湯只用羌活防風各半兩水四盞煎至一盞去渣空心服之其大便必大走也大便不通五日一遍小便黃赤渾身腫面上及腹尤甚色黃麻木身重如山沉困無力四肢痿軟不能舉動喘促唾清水吐穢痰白沫如膠時躁熱發欲去衣須臾而過振寒頂額有時如冰額寒尤甚頭旋眼黑目中溜火冷淚鼻不聞香臭小腹急痛當臍有動氣按之堅硬而痛宜麻黃白朮湯此病宿有風濕熱伏於榮血之中其水火乘於陽道而上盛元氣短少上喘為陰火傷其氣四肢痿在腎水之間乃所勝之病今正遇冬寒得時乘其肝木又實其母肺金剋木凌火是大勝必有大復其證善怒欠多嚏鼻中如有物不聞香臭目視䀮䀮多悲健忘少腹急痛遍身黃腹大脹面目腫尤甚食不下痰唾涕有血目眥瘍大便不通只二服皆愈凡諸秘服藥不通或虛人畏服利藥者用蜜煎導或用鹽及皂角末和入蜜煎中尤捷蓋鹽能軟堅潤燥皂角能通氣疏風故也冷秘用醬生薑導或於蜜煎中加草烏頭末以化寒消結熱者豬膽汁導烏梅湯浸去核為丸如棗子大亦可導醬瓜削如棗亦可導丹溪云予觀古方通大便皆用降氣品劑蓋肺氣不降則大便難傳送用枳殼沉香訶子杏仁等是也又老人虛人風人津液少而秘者宜以藥而滑之用胡麻麻仁阿膠等是也如妄以峻利藥逐之則津液走氣血耗雖暫通而即秘矣必更生他病昔王少腑患此疾有人以駛藥利之者屢矣後為肺痿咯膿血卒至不通而死閉癃遺尿總論遺尿者溺出不自知也閉癃者溺閉不通而淋瀝滴點也唯肝與督脈三焦膀胱主之肝脈督脈主之者經云肝足厥陰之脈過陰器所生病者遺溺閉癃又云督脈者女子入系廷孔其孔溺孔之端也其男子循莖下至篡與女子等其生病癃痔遺溺故遺溺閉癃皆取厥陰俞穴及督脈俞穴也三焦主之者經云三焦下脈在於足太陽之前少陽之後出於膕中外廉名曰委陽足太陽絡也三焦者足太陽少陽之所將太陽之別也上踝五寸別入貫腨腸出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺遺溺則補之閉癃則瀉之是也膀胱主之者經云膀胱不利為癃不約為遺溺是也然遺溺閉癃不取膀胱俞穴者蓋膀胱但臟溺其出溺皆從三焦及肝督脈也閉癃合而言之一病也分而言之有暴久之殊蓋閉者暴病為溺閉點滴不出俗名小便不通是也癃者久病為溺癃淋瀝點滴而出一日數十次或百次名淋病是也今分其病立為二門小便不通丹溪大法小便不通有熱有濕有氣結於下宜清宜燥宜升有隔二隔三之治如因肺燥不能生水則清金此隔二如不因肺燥但膀胱有熱則宜瀉膀胱此正治也如因脾濕不運而精不升故肺不能生水則當燥脾健胃此隔三車前子茯苓清肺也黃柏知母瀉膀胱也蒼朮白朮健胃燥脾也寶鑑小便不利有三不可一概而論若津液偏滲於腸胃大便泄瀉而小便澀少一也宜分利而已若熱搏下焦津液則熱濕而不行二也必滲泄則愈若脾胃氣澀不能通調水道下輸膀胱而化者三也可順氣令施化而出也東垣大法小便不通皆邪熱為病分在氣在血而治之以渴與不渴而辨之如渴而不利者熱在上焦肺分故也夫小便者是足太陽膀胱經所主也肺合生水若肺熱不能生水是絕其水之源經云虛則補其母宜清肺而滋其化源故當從肺之分助其秋令水自生焉又如雨如霧如霜皆從天而降下也且藥有氣之薄者乃陽中之陰是感秋清肅殺之氣而生可以補肺之不足淡味滲泄之藥是也茯苓澤瀉琥珀燈心通草車前子木通瞿麥萹蓄之類以清肺之氣泄其火滋水之上源也如不渴而小便不通者熱在下焦血分故不渴而小便不通也熱閉於下焦者腎也膀胱也乃陰中之陰陰受熱邪閉塞其流易老云寒在胸中遏塞不入熱在下焦填塞不便須用感北方寒水之化氣味俱陰之藥以除其熱泄其閉塞內經云無陽則陰無以生無陰則陽無以化若服淡滲之藥其性乃陽中之陰非純陰之劑陽無以化何以補重陰之不足也須用感地之水運而生大苦之味感天之寒氣而生大寒之藥此氣味俱陰乃陰中之陰也大寒之氣人感之生膀胱寒水之運人感之生腎此藥能補腎與膀胱受陽中之陽熱火之邪而閉其下焦使小便不通也夫用大苦寒之藥治法當寒因熱用又云必伏其所主而先其所因其始則氣同其終則氣異也如熱在上焦以梔子黃芩熱在中焦以黃連芍藥熱在下焦以黃柏熱在氣分渴而小便閉清肺散豬苓湯五苓散茯苓琥珀湯紅秫散熱在血分不渴而小便閉滋腎丸黃連丸導氣除燥湯東垣治一人病小便不利目睛突出腹脹如鼓膝以上堅硬皮膚欲裂飲食不下服甘淡滲泄之藥皆不效曰疾急矣非精思不能處思之半夜曰吾得之矣經云膀胱者津液之腑必氣化而能出焉多服淡滲之藥而病益甚是氣不化也啟玄子云無陽則陰無以生無陰則陽無以化甘淡氣搏皆陽藥獨陽無陰欲化得乎遂以滋腎丸群陰之劑投服再服即愈渴而腹冷水氣也金匱云小便不利者有水氣其人苦渴栝蔞瞿麥丸主之以小便利腹中溫為度小便不通腹下痛狀如覆碗痛悶難忍者乃腸胃乾涸膻中氣不下經云膀胱者州都之官津液藏焉氣化則能出矣膻中者臣使之官三焦相火腎為氣海也王注曰膀胱津液之腑胞內居之少腹處間毛內臟胞器若得氣海之氣施化則溲便注下氣海之氣不及則隱秘不通故不得便利也先用木香沉香各三錢酒調下或八正散甚則宜上湧之令氣通達便自通利經所謂病在下上取之王注曰熱攻於上不利於下氣盛於上則溫辛散之苦以利之一方煎橘紅茯苓湯調木香沉香末服之空心下丹溪云小便不通屬氣虛血虛有實熱痰氣閉塞皆宜吐之以提其氣氣升則水自降蓋氣承載其水者也氣虛用參朮升麻等先服後吐或就參耆藥中調理吐之血虛用四物湯先服後吐或就芎歸湯探吐之痰多二陳湯先服後探吐之痰氣閉塞二陳加香附木通探吐之實熱當利之或用八正散蓋大便動則小便自通矣或問以吐法通小便方論中未嘗有之理將安在曰取其氣化而已何則內經謂三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣故上中下三焦之氣有一不化則不得如決瀆之水而出矣豈獨下焦膀胱氣塞而已哉上焦肺者主行榮衛通調水道下輸膀胱而腎之合足三焦下輸又上連肺此豈非小便從上焦之氣化者乎張仲景有言衛氣行則小便宣通其義亦在是矣內經又謂脾病則九竅不通小便不利是其一也此豈非小便從中焦之氣化者乎由是而言之三焦所傷之邪不一氣之變化無窮故當隨處治邪行水求其氣化亦無窮也然而大要在乎陰與陽無相偏負然後氣得以化若方盛衰論曰至陰虛天氣絕至陽盛地氣不足夫腎肝在下地道也心肺在上天道也脾胃居中氣交之分也故天之陽絕而不交於地者尚且白露不下況人同乎天其在上之陽不交於陰則在下之陰無以為化而水道其能出乎東垣引八十一難經謂有陰陽相乘有覆有溢而為內關不得小便者有或在下之陰虛在上之陽盛不務其德而乘之致腎氣之不化者必瀉其陽而舉之則陰可得而平也若此條所敘之證皆用吐法蓋因氣道閉塞升降不前者而用耳何嘗舍眾法而獨施是哉丹溪嘗曰吾以吐通小便譬如滴水之器上竅閉則下竅無以自通必上竅開而下竅之水出焉予嘗推是開竅之法用之多驗姑書一二證以明之甲午秋治一婦人年五十初患小便澀醫以八止散等劑展轉小便不通身如芒刺加於體予以所感霖淫雨濕邪尚在表因用蒼朮為君附子佐之發其表一服即汗小便即時便通又治馬參政父年八旬初患小便短澀因服藥分利太過遂致閉塞涓滴不出予以飲食太過傷其胃氣陷於下焦用補中益氣湯一服小便通因先多利藥損其腎氣遂致通後遺尿一夜不止急補其腎然後已凡醫之治是證未有不用泄利之劑者安能顧其腎氣之虛哉表而出之以為世戒有瘀血而小便閉者宜多用牛膝本事方云頃在毘陵有一貴官妻妾小便不通臍腹脹痛不可忍眾醫皆作淋治如八正散之類數種皆治不通病愈甚予診之曰此血瘕也非瞑眩藥不可去乃用桃仁煎初服至日午大痛不可忍臥少頃下血塊如拳者數枚小便如黑豆汁一二升痛止得愈此藥猛峻氣虛血弱者宜斟酌之大抵小腹痛脹如覆碗者為實亦分在氣在血氣壅塞於下者木香流氣飲血汙於下者桃仁煎代抵當丸牛膝膏經云腎合膀胱膀胱者津液之腑也小腸屬腎腎上連肺故將兩臟三焦者中瀆之腑也水液出焉是屬膀胱乃腎之腑也又云膀胱者州都之官津液藏焉氣化則能出矣由是言之膀胱藏水三焦出水治小便不利故刺灸法但取三焦穴不取膀胱也小腸屬腎肺故東垣用清肺飲子滋腎丸利小便也運氣小便不利有三其一屬濕邪攻三焦經云太陰在泉濕淫所勝病小腹痛腫不得小便又云水不及曰涸流涸流之紀上宮與正宮同其病癃閉是也其二屬風邪攻脾經云厥陰司天風淫所勝病溏瘕泄水閉是也其三屬燥熱經云陽明司天之政天氣急地氣明民病癃閉初之氣其病小便黃赤甚則淋又云少陰司天之政地氣肅天氣明二之氣其病淋是也良法治小便不通諸藥不效或轉胞至死危困用豬尿胞一個底頭出一小眼子翎筒通過放在眼兒內根底以細線系定翎筒子口細杖子堵定上用黃蠟封尿胞口吹滿氣七分系定了再用手捻定翎筒根頭放了黃蠟塞其翎筒在小便出里頭放開翎筒根頭手捻其氣透於裡小便即出神效妊娠小便不通妊娠胎滿逼胞多致小便不利若胞系了戾小便不通名曰轉胞丹溪以為多因胎婦虛弱憂悶性躁食味厚古方用滑利疏導藥鮮效若脬為胎所墜而不通但升舉其胎胞系疏而小便自行若臍腹作脹而小便淋閟此脾胃氣虛胎壓尿胞四物二陳參術空心服後探吐數次自安薛氏云前證亦有脾肺氣虛不能下輸膀胱者亦有氣熱鬱結膀胱津液不利者亦有金為火燥脾土濕熱甚而不利者更當詳審施治金匱要略問曰婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得溺也以胞系了戾故致此病但利小便則愈宜腎氣丸主之即八味丸酒下十五丸至三十丸日再服又云妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散主之又云妊娠小便難飲食如故歸母苦參丸主之丹溪治一婦轉胞小便閉脈似澀重取則弦左稍和此得之憂患澀為血少氣多弦為有飲血少則胞不舉氣多有飲中焦不清而溢則胞知所避而就下故墜以四物湯加參朮半夏陳皮甘草生薑空心飲隨以指探吐之俟氣定又與至八帖而安此恐偶中後又治數人皆效又一婦四十一歲孕九月轉胞小便閉腳腫形瘁脈左稍和而右澀此飽食氣傷胎系弱不能自舉而下墜壓著膀胱偏在一邊氣急為其所閉所以水竅不能出也宜補血養氣氣血既正胎系自舉則不下墜方有安之理遂用人參當歸身尾白芍藥白朮陳皮炙甘草半夏生薑煎湯濃與四帖次早以渣煎頓服探吐之小便即通皆黑水後就此方加大腹皮枳殼青蔥葉砂仁二十帖與之而得以安產一孕婦小便不通脈細弱乃氣血俱虛胎壓膀胱下口用補藥升起恐遲反加急滿令穩婆以香油抹手入產戶托起其胎溺出如注卻以參耆升麻大劑服之一法將孕婦倒豎起胎自運溺自出勝手托遠矣產後小便不通舊方用陳皮去白為末空心酒調二錢外用鹽填臍中卻以蔥白剝去粗皮十餘根作一縛切作一指厚安鹽上用大艾炷滿蔥餅上以火灸之覺熱氣入腹內即時便通按此唯氣壅不得通者宜之若氣虛源涸與夫熱結者不可泥也淋胞痹淋之為病嘗觀病源候論謂由腎虛而膀胱熱也膀胱與腎為表裡俱主水水入小腸與胞行於陰為溲便也若飲食不節喜怒不時虛實不調臟腑不和致腎虛而膀胱熱腎虛則小便數膀胱熱則水下澀數而且澀則淋瀝不宣故謂之淋其狀小腹弦急痛引於臍小便出少氣數及分石淋勞淋血淋氣淋膏淋冷淋其石淋者有如沙石勞淋者勞倦即發血淋者心主血氣通小腸熱甚則搏於血脈血得熱則流行入胞中與溲俱下膏淋者肥液若脂膏又名肉淋氣淋者胞內氣脹小腹堅滿出少喜數尿有餘瀝冷淋者冷氣客於下焦邪正交爭滿於胞內水道不宣先寒戰然後便數成淋可謂悉病情矣考之內經則淋病之因又不止此大綱有二曰濕曰熱謂太陰作初氣病中熱脹脾受積濕之氣小便黃赤甚則淋少陽作二氣風火鬱於上而熱其病淋蓋五臟六腑十二經脈氣皆相通移是故足太陽主表上行則統諸陽之氣下行則入膀胱又肺者通調水道下輸膀胱脾胃消化水穀或在表在上在中凡有熱則水液皆熱轉輸下之然後膀胱得之而熱矣且小腸是心之腑主熱者也其水必自小腸滲入膀胱胞中諸熱應於心者其小腸必熱胞受其熱經緭胞移熱於膀胱者則癃溺血是也由此而言初起之熱邪不一其因皆得傳於膀胱而成淋若不先治其所起之本止從末流胞中之熱施治未為善也予嘗思之淋病必由熱甚生濕濕生則水液渾凝結而為淋不獨此也更有人服金石藥者入房太甚敗精流入胞中及飲食痰積滲入者則皆成淋丹溪嘗治一小兒在胎受久服金石藥之餘毒病淋一十五年以紫雪治愈凡治病不求其本可乎小便澀痛常急欲溺及去點滴莖中痛不可忍者此五淋病生料五苓散加阿膠或車前子末或五苓散益元散等分和服並可吞火腑丹佐以導赤散石葦散若熱極成淋服藥不效者宜減桂五苓散加木通滑石燈心瞿麥各少許仍研麥門冬草連根車前草白龍草各自然汁和蜜水調下氣淋氣壅不通小便淋結臍下妨悶疼痛瞿麥湯石葦散榆枝湯木香流氣飲氣虛淋八物湯加杜牛膝黃芩汁煎服老人氣虛亦能淋參術中加木通山梔血受傷者補血行血自愈勿作淋治死血作淋牛膝膏妙但虛人能損胃不宜食千金云用牛膝以酒煮服治小便淋痛肘後方用牛膝根莖葉亦以酒煮服治小便不利莖中痛欲死及治婦人血結堅痛如神蓋牛膝治淋之聖藥也但虛人當用補劑監製之耳血淋用側柏葉生藕節車前草等分搗汁調益元散立效散瞿麥散小薊飲子柿蒂散當歸湯羚羊角飲雞蘇飲子金黃散發灰散戴氏云血淋一證須看血色分冷熱色鮮者心小腸實熱色瘀者腎膀胱虛冷若的是冷淋及下元虛冷血色瘀者並宜漢椒根銼碎不以多少白水煎候冷進按血多有熱極兼水化而黑凝者未可便以為冷也膏淋鹿角霜丸沉香散沉香丸磁石丸海金砂散菟絲丸戴云有似淋非淋小便色如米泔或便中有如鼻涕之狀此乃精溺俱出精塞溺道故便欲出不能而痛宜大菟絲子丸鹿茸丸之類按此即膏淋也沙石淋乃是膀胱蓄熱而成正如湯瓶久在火中底結白鹼而不能去理宜清徹積熱使水道通則沙石出而可愈宜神效琥珀散如聖散石燕丸獨聖散石首魚腦骨十個火煅滑石二錢琥珀三分俱為細末每服一錢空心煎木通湯調下鱉甲九肋者一個酥炙令脆為細末每服一匙酒煎服當下沙石雄鵲燒灰淋取汁飲之石即下石淋小便時沙石下流塞其水道痛不可忍經及時日水道不通其氣上攻頭痛面腫重則四肢八節俱腫其石大者如梅核堅硬如有稜角其石小者唯碎石相結通下即碎宜服此取石方用冬葵子滑石射干知母以上各一分通草三分為細末每服二錢半水一盞半苦竹葉十片同煎取一盞去滓食前熱服又大腑熱頭痛若體氣壯健先進後方藥兩三盞然後進取石方用麻黃去節羌活射干荊芥穗紫菀防風知母蔓荊子牽牛各一分半夏二銖為細末每服二錢水一盞煎九分去滓食後熱服石淋導水用螻蛄七枚以鹽一兩同於新瓦上鋪蓋焙乾研為細末每服一錢匕溫酒調服勞淋地黃丸黃耆湯白芍藥丸冷淋肉蓯蓉丸澤瀉散沉香散檳榔散生附散戴氏云進冷劑愈甚者此是冷淋宜地髓湯下附子八味丸有因服五苓散等藥不效用生料鹿茸丸卻愈此皆下元虛冷之故乃劉河間則謂亦由熱客膀胱鬱結不能滲泄非真冷也小便淋莖中痛不可忍相引脅下痛宜參苓琥珀湯有小便艱澀如淋不痛而癢者虛證也宜八味丸生料鹿茸丸之類若因思慮過度致淋宜歸脾湯或辰砂妙香散吞威喜丸或妙香散和五苓散汗多而小便赤澀暑月多有此證盛暑所飲既多小便反澀少而赤緣上停為飲外發為汗津液不通小腸澀閉則水不運下五苓散一名導逆內有朮桂收汗豬苓澤瀉茯苓分水道收其在外者使之內又從而利導焉發者斂之壅者通之義取於此然有虛勞汗多而赤澀者卻是五內枯燥滋腴既去不能生津故溺澀而赤不宜過用通小便之劑竭其腎水唯當溫養潤肺十全大補湯養榮湯之類自足選用汗者心液心主血血榮則心得所養汗止津生不待通而溺自清矣諸失精血及患癰毒人或有小便赤澀之證此亦是枯竭不潤之故並宜前法胞痹痹論云小腹膀胱按之內痛若沃以湯澀於小便上為清涕夫膀胱者州都之官津液藏焉氣化則能出矣今風寒濕邪氣客於胞中則氣不能化出故胞滿而水道不通其證小腹膀胱按之內痛若沃以湯澀於小便以足太陽經其直行者上交巔入絡腦下灌鼻竅則為清涕也腎著湯茯苓丸巴戟丸腎瀝湯妊娠淋乃腎與膀胱虛熱不能制水然妊婦胞系於腎腎間虛熱而成斯證甚者心煩悶亂名曰子淋也若頸項筋攣語澀痰甚用羚羊角散若小便澀少淋瀝用安榮散若肝經濕熱用龍膽瀉肝湯若肝經虛熱用加味逍遙散腿足轉筋而小便不利急用八味丸緩則不救若服燥劑而小便頻數或不利用生地茯苓牛膝黃柏知母芎歸甘草若頻數而色黃用四物加黃柏知母五味麥門玄參若肺氣虛而短少用補中益氣加山藥麥門若陰挺痿痹而頻數用地黃丸若熱結膀胱而不利用五淋散若脾肺燥不能化生宜黃芩清肺飲若膀胱陰虛陽無所生用滋腎丸若膀胱陽虛陰無所化用腎氣丸產後淋因熱客於脬虛則頻數熱則澀痛氣虛兼熱血入胞中則血隨小便出而為血淋也若膀胱虛熱用六味丸若陰虛而陽無以化用滋陰腎氣丸蓋土生金金生水當滋化源陳氏云治產前後淋其法不同產前當安胎產後當去血瞿麥蒲黃最為產後要藥茅根湯主治產後諸淋診腎脈滑實為癃㿉痹脈滑甚為㿉癃少陰脈數婦人則陰中生瘡男子則氣淋盛大而實者生虛小而澀者死下焦氣血乾者死鼻頭色黃者小便難素問奇病論病有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也太陰脈細微如發者此不足也其病安在名為何病岐伯曰病在太陰其盛在胃頗在肺病名曰厥死不治小便數運氣小便數皆屬火經云少陽之復便數憎風是也小便數唯二臟有之一屬肺經云肺手太陰之脈氣盛有餘則肩背痛風寒汗出中風小便數而欠是也以刺言之瀉手太陰則愈一屬肝經云足厥陰之瘧令人如癃狀而小便不利又云肝痹者夜臥則驚多飲數小便是也視虛實補瀉之則愈數而少茯苓琥珀湯利之數而多薯蕷蓮肉益智仁之屬收之生薯蕷半斤刮去皮以刀切碎於鐺中煮酒沸下薯蕷不得攪待熟加鹽蔥白更添酒空腹下二三盞妙蓮肉去皮不以多少用好酒浸一兩宿豬肚一個將酒浸蓮肉入肚中多半為度水煮熟取出蓮肉切焙乾為細末酒煮麵糊為丸如芡實大每服五十丸食前米飲湯下名水芝丸夜多小便益智二十四個為末鹽五分水一盞煎八分臨臥溫服衛真湯並丸桑螵蛸散戴氏云小便多者乃下元虛冷腎不攝水以致滲泄宜菟絲子丸八味丸玄兔丹生料鹿茸丸有人每日從早至午前定尿四次一日之間又自無事此腎虛所致亦猶脾腎泄早泄而晚愈次日又復然者也若小便常急遍數雖多而所出常少放了復急不澀痛卻非淋證亦有小便畢少頃將謂已盡忽再出些少者多因自忍尿或忍尿行房事而然宜生料五苓散減澤瀉之半加阿膠一錢吞加減八味丸此丸須用五味子者有盛喜致小便多日夜無度乃喜極傷心心與小腸為表裡宜分清飲四七湯各半帖和煎仍以辰砂妙香散吞小菟絲子丸或玄兔丹若頻頻欲去而溺不多但不痛耳此腎與膀胱俱虛客熱乘之虛則不能制水宜補腎丸六味地黃丸熱入水道澀而不利八正散或五苓散加黃柏知母麥門冬木通大便硬小便數者是謂脾約脾約丸主之小便不禁原病式云熱甚客於腎部干於足厥陰之經廷孔鬱結極甚而氣血不能宣通則痿痹神無所用故津液滲入膀胱而旋溺遺失不能收禁也考之內經則謂督脈生病為遺溺靈樞謂肝所生病為遺溺蓋因二經循陰器系廷孔病則榮衛不至氣血勞劣莫能約束水道之竅故遺失不禁劉河間可謂得此旨矣然內經復言膀胱不約為遺溺靈樞言手太陰之別名曰列缺其病虛則欠㰦小便遺數由此觀之則又不獨病在陰器廷孔而已夫如是者內由三焦決瀆之失常也何則手少陽之脈從缺盆布膻中下鬲循屬三焦足太陽之脈從肩膊內挾脊抵腰中入循膂屬膀胱三焦虛則膀胱虛故不約也肺從上焦通調水道下輸膀胱腎又上連肺故將兩臟是子母也母虛子亦虛此上中下三焦氣虛皆足以致遺溺矣由是而知三焦所部五臟之淫氣變而為五邪者悉能幹於下焦腎肝膀胱出水之竅而為不禁之病何止於熱極鬱結痿痹腎部而已乎又自內經所謂太陰在泉客勝濕客下焦溲便不時太陰之復甚則入腎竅泄無度者觀之則知濕主於痞況是所勝之邪其不為鬱結痿痹者乎從而思之聖人之言舉一隅便當以三隅反前所謂肝腎膀胱之病不言其邪可見諸邪盡能病之也次言手太陰列缺虛者為子母臟氣之要也可見所生所勝不勝之五邪皆足以乘之也其言太陰之勝復則濕為所勝之重者也其他風寒燥熱雖不及言可知在其中矣治法上虛補氣下虛澀脫東垣云小便遺失者肺金虛也宜安臥養氣禁勞役以黃耆人參之類補之不愈當責有熱加黃柏生地下虛謂膀胱下焦虛經云水泉不止者是膀胱不藏也仲景云下焦竭則遺溺失便其氣不能自禁制不須治久則愈又云下焦不歸則遺溲世用桑螵蛸雞䏶胵之類是也古方多燥熱如二氣丹家韭子丸菟絲子丸固脬丸白茯苓散鹿茸散菟絲子散內有桂附唯真虛寒者宜之桑螵蛸散鹿角霜丸阿膠飲鹿茸散溫補而不僭小便不禁而淋瀝澀滯者澤瀉散茯苓丸滑脫者牡蠣丸如白薇散雞腸散內俱有寒藥內熱者宜之婁全善治一男子遺溺不覺脈洪大盛以黃柏知母杜牛膝為君青皮甘草為臣木香為佐桂些少反佐服數帖大效此法與千金白薇散皆河間所謂熱甚廷孔鬱結神無所用不能收禁之意也遺尿有實熱者用神芎導水丸每服百丸空心白湯下若一服利止後服此謂淫氣遺溺痹聚在腎痹謂氣血不通宣也戴云睡著遺尿者此亦下元冷小便無禁而然宜大菟絲子丸豬胞炙碎煎湯下凡遺尿皆屬虛通用方薏苡仁鹽炒煎服雞腸一具以水三升煮取一升分三服一方用雄雞燒灰為末用三指撮溫漿水調一錢向北鬥服之更良雄雞喉嚨及矢白䏶胵里黃皮燒為末麥粥清調服羊脬盛水貯令滿系兩頭煮熟開取水頓服之雞䏶胵一具並腸洗淨燒灰男用雌女用雄為細末每服二錢空心溫酒調服一方加豬脬灰燕蓐草主眠中遺尿不覺燒令黑研水進方寸匕膀胱咳者咳而遺溺妊娠尿出不知用白薇芍藥為末酒調下或白礬牡蠣為末酒調二錢或雞毛灰末酒服一匕或炙桑螵蛸益智仁為末米飲下薛氏云前證若脬中有熱宜加味逍遙散若脾肺氣虛宜補中益氣湯加益智若肝腎陰虛宜六味丸產後小便數乃氣血不能制故也薛氏曰若因穩婆不慎以致胞損而小便淋瀝者用八珍湯以補氣血兼進補脬飲若因膀胱氣虛而小便頻數當補脾肺若膀胱陰虛而小便淋瀝須補肺腎婦人產蓐產理不順致傷膀胱遺尿無時宜補脬飲桑螵蛸散白薇散薛氏曰前證若脾肺陽虛用補中益氣湯若肝腎陰虛用六味地黃丸若肝腎之氣虛寒用八味地黃丸若肝脾氣血虛熱用加味逍遙散佐以六味丸丹溪云嘗見尿胞因收生者不謹以致破損而得淋瀝病遂為廢疾有婦年壯難產得此因思肌肉破傷在外者可以補完胞雖在腹恐亦可治診其脈虛甚遂與峻補以參耆為君芎歸為臣桃仁陳皮黃耆茯苓為佐煎以豬羊胞中湯極飢時飲之但劑小者率用一兩至一月而安蓋令氣血驟長其胞自完恐稍緩亦難成功矣小便黃赤諸病水液渾濁皆屬於熱小便黃者少腹中有熱也臟腑小便黃有四一屬肝熱經云肝熱病者小便先黃是也二屬胃實經云胃足陽明之脈氣盛則身已前皆熱其有餘於胃則消穀善飢溺色黃是也三屬肺虛經云肺手太陰之脈氣虛則肩背痛寒少氣不足以息溺色變是也四屬腎虛經云冬脈者腎脈也冬脈不及則令人䏚清脊痛小便變是也運氣小便黃有二一屬風經云厥陰之勝胠脅氣並化而為熱小便黃赤是也二屬熱經云少陰司天熱淫所勝病溺色變又云少陽之勝溺赤善驚又云陽明司天燥氣下臨暴熱至乃暑陽氣鬱發小便變是也蓋暴熱謂地氣少陰之熱也邪之所在皆為不足中氣不足溲便為之變補足外踝下留之用藥則補中益氣湯是已小便黃無如黃柏知母效脈經云尺澀足脛逆冷小便赤宜服附子四逆湯足太衝補之遺精丹溪書分夢遺精滑為二門蓋夢與鬼交為夢遺不因夢感而自遺者為精滑然總之為遺精也其治法無二故合之或問精滑何因得之曰金匱要略謂虛勞之病脈浮大手足煩陰寒精自出又謂脈弦而大此名革亡血失精又謂小腹弦急陰頭寒脈動微緊男失精女子夢交通巢氏病源以虛勞病分出五勞七傷六極二十三蒸之名於七傷中精連蒸病中玉房蒸男則遺瀝漏精與尿精聞見精出及失精等候皆混同仍類虛勞門為腎主藏精故盡作腎氣衰弱之病似若他臟無損焉豈其然哉夫五臟皆藏精者也嘗考靈樞本神篇首謂天之在我者德也地之在我者氣也德流氣搏而生者也故生之來謂之精兩精相搏謂之神如是者通言一身主宰之精神也因心腎是水火之臟法天地施化生成之道故藏精神為五臟之宗主其次言所以任物者謂之心心有所憶謂之意意有所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智如是者皆因心神隨物所感變而分之是謂五志遂有五神藏之名五神既分則於德化政令性味各司其屬者之用於是心腎之水火亦俯從五神之列然而所主之精神則並行未始相離而五神五變者分之如此則精亦從神之所變隨處與之合矣故五臟各得藏其精神以行其用是之謂藏真主所以屬本氣之生化者也苟有一臟之真不得其正則一臟之病作矣苟一臟之精神傷之甚者則必害其心腎之主精神者也如所謂怵惕思慮則傷神神傷則恐懼流淫而不止喜樂恐懼則傷精精傷則骨酸痿厥而不舉喜樂者憚散而不藏恐懼者蕩燀而不收是故主藏精者不可傷傷則失守而陰虛陰虛則無氣無氣則死矣如是者精神之在五臟傷之則淫邪立至心之在志為喜在氣為火為熱腎之在志為恐在氣為水為寒於是怵惕思慮傷其神神傷則火動不止火動不止則腎水恐懼之志者並矣恐甚不解則動中而腎自傷腎主藏精與所受五臟六腑所輸至之精皆不得藏而時自下矣此乃以心腎主宰精神者言也至若他臟之精各得而泄有所據乎曰內經所謂思想無窮所願不得意淫於外入房太甚宗筋弛縱發為白淫其病筋痿筋痿者生於肝使內王注以白淫是白物淫衍如精之狀因溲而下雖云如精殆非將化未成之精而徑出者乎何以言之精有謂生來之精者先身生之精也有謂食氣入胃散精於五臟者有謂水飲自脾肺輸腎而四布五經並行之精者此水穀日生之精也然飲食日生之精皆從生來元精之所化而後分布其臟盈溢則輸之於腎腎乃元氣之本生成之根以始終化之養之之道也若飲食之精遇一臟有邪則其臟之食味化之不全不得入與元精俱藏而竟泄出與夫所謂脾移熱於腎少腹冤熱而痛出白者義亦如之王注雖謂消脂爍肉無乃消其腎所藏之精歟蓋使二臟無病則此白物其不為精乎使二臟有病則所藏之精其不變為白物而出之乎以此比例則肺脾二臟之精寧不有似肝臟之傷神動氣致精失守而走泄者乎然則治當何如曰獨腎泄者治其腎由他臟而致腎之泄者則兩治之在他臟自泄者治其本臟必察四屬以求其治大抵精自心而泄則血脈空虛本縱不收自肺而泄者皮革毛焦喘急不利自脾而泄者色黃肉消四肢懈惰自肝而泄者色青而筋痿自腎而泄者色黃黑髓空而骨惰即脈亦可辨也或問夜夢交接之理何如曰內經曰腎者主水受五臟六腑之精而藏之又曰主蟄封藏之本精之處也又曰陰陽之要陽密乃固故陽強不能密陰氣乃絕陰平陽秘精神乃治陰陽離決精氣乃絕又曰陰陽總宗筋之會會於氣街靈樞淫邪發夢篇曰厥氣客於陰器則夢接內蓋陰器者宗筋之所繫也而足太陰陽明少陰厥陰之筋皆結聚於陰器與沖任督三脈之所會然厥陰主筋故諸筋皆統屬於厥陰也腎為陰主藏精肝為陽主疏泄陰器乃泄精之竅是故腎之陰虛則精不藏肝之陽強則氣不固若遇陰邪客於其竅與所強之陽相感則精脫出而成夢矣所謂陽強者非臟之真陽強也乃肝臟所寄之相火強耳蓋水為陰火為陽故通言火為陽然分言之則為二若火盛不已反消亡其臟之真陽也肝乃魂之居藏之真陽虛則遊魂為變變則為夢與肝虛病者多夢亡人無異曰如子所言夢遺則從肝腎得之乎曰不然病之初起亦有不在腎肝而在心肺脾胃之不足者然必傳於肝腎而後精方走也蓋有自然相傳之理存焉何則宗筋者上絡胸腹挾臍下合橫骨故內經謂其總陰陽之會會於氣街主束骨而利機關也夫五臟俱有火其相火之寄於肝者善則發生惡則為害獨甚於他火故平人肝氣之剛勇充於筋而為罷極之本也其陰器既宗筋之所聚乃強於作用皆相火充其力也若遇接內得陰氣與合則三焦上下內外之火翕然而下從百體玄府悉開其滋生之精盡趍會於陰器以躍出豈止腎之所臟者而已哉所謂厥氣客於陰器則夢者其厥氣亦身中陰分所逆之氣與接內之氣同是陰類故夢猶接內之精脫也若思欲不已精氣已客於陰器至臥故成夢而泄矣但夢者因真陽虛而得之故精脫之後其氣未能卒復未免形體衰憊不比平人接內之氣一二時便可復也曰治法當何如曰病從他臟而起則以初感病者為本腎肝聚病處為標若由腎肝二臟自得者獨治腎肝由陰陽離決水火不交通者則既濟之陰陽不相抱負者則因而和之陽虛者補其氣陰虛者補其血陽強者瀉其火火有正治反治從多從少隨其攸利經曰思想無窮所願不得意淫於外入房太甚宗筋弛縱發為白淫夢遺等證先賢治法有五其一用辰砂磁石龍骨之類鎮墜神之浮游河間秘真丸本事八仙丹之屬是也其二思想結成痰飲迷於心竅而遺者許學士用豬苓丸之類導利其痰是也其三思想傷陰者潔古珍珠粉丸海藏大鳳髓丹本事清心丸丹溪用海蛤粉青黛香附黃柏知母之類降火補陰是也其四思想傷陽者謙甫鹿茸蓯蓉菟絲子等補陽是也其五陰陽俱虛者丹溪治一形瘦人便濁夢遺作心虛治用珍珠粉丸定志丸服之是也戴氏云遺精得之有四有用心過度心不攝腎以致失精者有因思色欲不遂致精失位輸瀉而出者有色欲太過滑泄不禁者有年壯氣盛久無色欲精氣滿泄者然其狀不一或小便後出多不可禁者或不小便而自出或莖中出而癢痛常如欲小便者並宜先用辰砂妙香散吞玉華白丹佐以威喜丸或分清飲別以綿裹龍骨同煎或分清飲半帖加五倍牡蠣粉白茯苓五味子各半錢失精夢泄亦有經絡熱而得者若以虛冷用熱劑則精愈失本事方清心丸用黃柏腦子者最良大智禪師云夢遺不可全作虛冷亦有經絡熱而得之者嘗治一男子至夜脊心熱夢遺用珍珠粉丸豬苓丸遺止終服紫雪脊熱始除又一男子脈洪腰熱遺精用沉香和中丸下之導赤散治其火而愈於此知身有熱而遺者皆熱遺也若是用心過度而得之宜遠志丸用交感湯加蓮肉五味子吞下仍佐以靈砂丹若審是思色欲不遂得之且以四七湯吞白丸子甚者耳聞目見其精即出名曰白淫妙香散吞玉華白丹初虞世方治清滑不禁用青州白丸子辰砂為衣服之神效若審是色欲過度下元虛憊泄滑無禁宜正元飲加牡蠣粉肉蓯蓉各半錢吞養氣丹或靈砂丹仍佐以鹿茸丸山藥丸大菟絲子丸固陽丸之類按此項藥太僭燥若妄用過劑則陰水耗竭壯火獨炎枯脂消肉骨立筋痿而成不救之疾矣用者審之若審是壯盛滿溢者本事方清心丸夢遺俗謂之夜夢鬼交宜溫膽湯去竹茹加人參遠志蓮肉酸棗仁炒茯苓各半錢吞玉華白丹固陽丸夢遺亦備前四證宜審其所感用前藥婁全善云愚壯年得夢遺症每四五十日必一遺累用鳳髓丹河間秘真丸雖少效終不除根後改用菖蒲遠志韭子桑螵蛸益智酸棗仁牡蠣龍骨瑣陽等劑為丸服之良愈又一中年男子夢遺以珍珠粉丸等藥與服了無一效亦以遠志菖蒲等劑服之隨手而愈又云王元圭虛而泄精脈弦大累與加減八物湯吞河間秘真丸及珍珠粉丸其泄不止後用五倍子一兩茯苓二兩為丸服之良愈此則五倍子澀脫之功敏於龍骨牡蠣也又云詳古治夢遺方屬鬱滯者居大半庸醫不知其鬱但用龍骨牡蠣等澀劑固脫殊不知愈澀愈郁其病反甚嘗治一壯年男子夢遺白濁少腹有氣衝上每日腰熱卯作酉涼腰熱作則手足冷前陰無氣腰熱退則前陰氣耕手足溫又旦多下氣暮多噫時振隔一旬二旬必遺脈旦弦滑而大午洪大予知其有鬱滯也先用沉香和中丸大下之次用加減八物湯吞滋腎丸百粒若稍與蛤粉等澀藥則遺與濁反甚或一夜二遺遂改用導赤散大劑煎湯服之遺濁皆止漸安又一中年男子夢遺醫或與澀藥反甚連遺數夜愚先與神芎丸大下之卻制豬苓丸服之皆得痊安又丹溪治鎮守萬戶蕭伯善便濁精滑不禁百藥不效與試倒倉法而安於此見夢遺屬鬱滯者多矣葉氏云遺滑之證予累見人多作腎虛而用補澀之藥無效殊不知此因脾胃濕熱所乘飲酒厚味痰火之人多有此疾腎雖藏精其精本於脾胃飲食生化而輸於腎若脾胃受傷濕熱內郁使中氣淆而不清則所輸皆濁氣邪火擾動水不得而安靜故遺滑也治以蒼白二陳湯加黃柏升麻柴胡俾清氣升濁氣降而脾胃健運則遺滑自止矣其有欲心太熾思想無窮而致者當從心治心清則神寧而火不妄起宜遠志丸茯神湯房勞無度致腎虛者必兼見怯弱等證方可用補腎藥故治有多端須當審察不可偏作腎虛治也趙以德治鄭叔魯二十餘歲攻舉子業讀書夜至四鼓猶未已遂發此病臥間玉莖但著被與腿便夢交接脫精懸空則不夢飲食日減倦怠少氣此用心太過二火俱起夜不得睡血不歸肝腎水不足火乘陰虛入客下焦鼓其精房則精不得聚藏而欲走因玉莖著物猶厥氣客之故作接內之夢於是上補心安神中調脾胃升舉其陽下用益精生陰固陽之劑不三月而病安矣一老人年六十患瘧嗽自服四獸飲多積成濕熱乘於下焦幾致危困診其脈尺部數而有力與補中益氣加涼劑三日與黃柏丸次早診之尺脈頓減問之曰夜來夢交接否曰然幸不泄曰年老精衰固無以泄其火熱結於精房者得泄火益陰之藥其火散走於陰器之竅病可減矣再服二日又夢其瘧嗽全愈亦有鬼魅相感者大全良方論婦人夢與鬼交者由臟腑虛神不守故鬼氣得為病也其狀不欲見人如有對晤時獨言笑或時悲泣是也脈息乍大乍小乍有乍無皆鬼邪之脈又脈來綿綿不知度數而顏色不變亦其候也夫鬼本無形感而遂通蓋因心念不正感召其鬼附邪氣而入體與相接所以時見於夢治之之法則硃砂雄黃麝香鬼箭虎頭骨辟邪之屬是也蔣右丞子每夜有夢招以德治之連二日診脈觀其動止終不舉頭但俯視不正當人知為陰邪相著叩之不肯言其所交之鬼狀其父遂問隨出之童僕乃言一日至城隍廟見侍女以手於其身摩久之三五日遂聞病此即令法師入廟毀其像小腹泥土皆濕其病即安試觀張仲景治下焦真陽與精血兩虛病小腹弦急脈芤動微緊男子失精女子夢交通則用桂枝龍骨之屬溫之固之若陽浮上而不降作悸衄手足煩熱咽乾口燥陰獨居於內而為裡急腹中痛夢失精者小建中湯和之皆可取以為法也醫家大法曰嘗治脫真不止者以澀劑收止之則不能收不能止不若瀉心火若瀉心火不能止之不若用升陽之劑加風藥之類止之非此能止之也舉其氣上而不下也赤白濁溺與精所出之道不同淋病在溺道故綱目列之肝膽部濁病在精道故綱目列之腎膀胱部今患濁者雖便時莖中如刀割火灼而溺自清唯竅端時有穢物如瘡膿目眵淋漓不斷初與便溺不相混濫猶河中之濟焉至易辨也每見時醫以淋法治之五苓八正雜投不已而增劇者不可勝數予每正之而其餘尚難以戶說也蓋由精敗而腐者什九由濕熱流注與虛者什一丹溪云屬濕熱有痰有虛赤屬血由小腸屬火故也白屬氣由大腸屬金故也或曰思慮過度嗜欲無窮俾心腎不交精元失守以為赤白二濁之患赤濁者為心虛有熱由思慮而得之白濁者為腎虛有寒因嗜欲而得之葉氏曰原病式以赤白濁均屬於熱其辨甚明然因於虛寒者不可謂無如上所言是也但熱多寒少耳虛熱者清心蓮子飲虛寒者萆薢分清飲白濁有濕痰流注宜燥中宮之濕赤者濕傷血也有胃中濁氣下流滲入膀胱而白濁者蒼白二陳湯加升提之劑虛勞者用補陰藥胃弱者參術加升麻柴胡心經伏暑赤濁者四苓散加香薷麥門冬人參石蓮肉戴氏云有白濁人服玄兔丹不愈服附子八味丸即愈者不可不知有小便如常停久才方澱濁有小便出即如米泔若小兒疳病者宜分清飲加茯苓半錢下小菟絲子丸如服藥未效宜四七湯吞青州白丸子及辰砂妙香散吞玄兔丹及小菟絲子丸山藥丸如白濁甚下澱如泥或稠黏如膠頻逆而澀痛異常此非是熱淋此是精濁窒塞竅道而結宜五苓妙香散吞八味丸小菟絲子丸或萆薢分清飲精者血之所化有濁去太多精化不及赤未變白故成赤濁此虛之甚也何以知之有人天癸未至強力好色所泄半精半血若溺不赤無他熱症縱雖赤濁不可以赤為熱只宜以治白濁法治之若溺赤下濁亦赤口渴時發熱者辰砂妙香散吞靈砂丹或清心蓮子飲發熱不退口燥舌乾之甚者此乃精虧內燥腎枯不潤四物湯吞玄兔丹和加減八味丸久服乃效按既熱燥如此而用藥無一涼補濡潤之劑非其治也曷若以生地麥門冬五味鹽炒黃耆淡竹葉地骨皮山藥之類治之或問丹溪云白濁之病因何與前人所論不同將古今異也子能與我折衷乎曰辨古今之得失必以內經證之是病自巢氏病源候論曰白濁者由勞傷腎腎氣虛冷故也由是歷代方論宗其說無異詞不唯白濁之理不明所治之法亦誤不思內經本無白濁之名唯言少陰在泉客勝溲便變少陽在泉客勝則溲白又言思想無窮入房太甚發為白淫與脾移熱於腎出白二者皆隨溲而下夫如是非白濁之源乎原病式因舉內經謂諸病水液渾濁皆屬於熱言天氣熱則水渾濁寒則清潔水體清火體濁又如清水為湯則自然白濁也可謂發聖人之旨以正千載之誤矣然不讀其書者世猶未盡知斯道也予嘗聞先生論白濁多因濕熱下流膀胱而成赤白濁即靈樞所謂中氣不足溲便為之變是也必先補中氣使升舉之而後分其臟腑氣血赤白虛實以治與夫其他邪熱所傷者固在瀉熱補虛設腎氣虛甚或火熱亢極者則不宜峻用寒涼之劑必以反佐治之要在權衡輕重而已痿論曰思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫夫腎臟天一以慳為事志意內治則精全而澀若思想外淫房室太甚則固有淫泆不守輒隨溲溺而下也然本於筋痿者以宗筋弛縱也宜內補鹿茸丸茯兔丸金箔丸珍珠粉丸診脈洪大而澀按之無力或微細或沉緊而澀為元氣不足若尺脈虛或浮者急疾者皆難治遲者易治前陰諸疾陰縮陰縱陰痿陰汗臊臭陰冷陰癢陰腫痛陰吹前陰所過之脈有二一曰肝脈二曰督脈經云足厥陰之脈入毛中過陰器抵少腹是肝脈所過也又云督脈者起於小腹以下骨中央女子入系廷孔循陰器男子循莖下至篡與女子等是督脈所過也陰縮陰縱陰縮謂前陰受寒入腹內也陰縱謂前陰受熱挺長不收也經曰足厥陰之筋傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣是也丹溪治鮑兄二十餘歲玉莖挺長腫而痿皮塌常潤磨股不能行兩脅氣上手足倦弱先以小柴胡加黃連大劑行其濕熱略加黃柏降其逆上之氣其挺腫漸收漸減及半但莖中有堅塊未消遂以青皮為君佐以散風之劑末服外以絲瓜汁調五倍子末敷而愈平江王氏子年三十歲忽陰挺長腫而痛脈數而實用朴硝荊芥湯浸洗又用三一承氣湯大下之愈內經刺灸前陰挺長之法有一經云足厥陰之別名曰蠡溝去內踝五寸別走少陽其病實則挺長取之所別是也內經診陰縮而死者皆屬肝傷經云肝悲哀動中則傷魂魂傷則狂妄不精不精則不正當陰縮而攣筋兩脅骨不舉毛悴色夭死於秋又云厥陰終者喜溺舌卷卵上縮是也陰痿陰痿皆耗散過度傷於肝筋所致經云足厥陰之經其病傷於內則不起是也腎脈大甚為陰痿運氣陰痿皆屬濕土製腎經云太陰司天濕氣下臨腎氣上從陰痿氣衰而不舉是也仲景八味丸治陽事多痿不振今依前方夏減桂附一半春秋三停減一疾去精足全減桂附只依六味地黃丸此法可治傷於內者陰痿弱兩丸冷陰汗如水小便後有余滴臊氣尻臋並前陰冷惡寒而喜熱膝亦冷此肝經濕熱宜固真湯柴胡勝濕湯此法可治濕氣制腎者腎脈大右尺尤甚此相火盛而反痿宜滋腎丸或鳳髓丹陰汗臊臭陰冷陰癢陰汗濕癢用大蒜煨剝去皮爛研同淡豆豉末搜和丸桐子大硃砂為衣每服三十丸棗二枚燈心數莖煎湯空心送下陰汗不止內服青蛾丸外用爐甘石一分真蛤粉半分干撲或密陀僧和蛇床子研末撲之東垣治一富者前陰間常聞臊臭又因連日飲酒腹中不和夫前陰者足厥陰之脈絡陰器出其挺末臭者心之所走散入於五方為臭入肝為臊臭此其一也當於肝經中瀉行間是治其本後於心經中瀉少衝以治其標如惡針當用藥除之治法當求其本連日飲酒夫酒者氣味俱能生濕熱是風濕熱合於下焦為邪故經云下焦如瀆又云在下者引而竭之酒者是濕熱之水亦宜決前陰以去之是合下焦二法治之宜龍膽瀉肝湯柴胡入肝為引用澤瀉車前子木通其淡滲之味利小便亦除臊臭是謂在下者引而竭之生地黃草龍膽之苦寒瀉酒濕熱更兼車前子之類以徹肝中邪氣肝主血用當歸以滋肝中血不足也面色痿黃身黃腳軟弱無力陰汗陰莖有夭色宜溫腎湯前陰如冰冷並冷汗兩腳痿弱無力宜補肝湯溺黃臊臭淋瀝兩丸如冰陰汗浸兩股陰頭亦冷正值十二月天寒凜冽霜雪交集寒之極矣宜清震湯兩外腎冷兩髀樞陰汗前陰痿弱陰囊濕癢臊氣宜柴胡勝濕湯千金方有人陰冷漸漸冷氣入陰囊腫滿恐死日夜痛悶不得眠取生椒擇之洗淨以布帛裹著丸囊令厚半寸須臾熱氣大通日再易之取出瘥本事方曾有人陰冷漸次冷氣入陰囊腫滿晝夜悶疼不得眠煮大薊汁服立瘥前陰兩丸濕癢秋冬尤甚冬月減宜椒粉散腎囊濕癢先以吳茱萸煎湯洗之後用吳茱萸半兩寒水石三錢黃柏二錢半樟腦蛇床子各半兩輕粉一錢白礬三錢硫黃二錢檳榔三錢白芷三錢為末摻之陰腫痛風熱客於腎經腎虛不能宣散而腫發歇疼痛聖惠沉香散沉香五錢檳榔一兩丹參赤芍藥白蒺藜去刺炒制枳殼赤茯苓各七錢半空心溫服腫而有氣上下攻注脹悶聖惠木香散木香半兩赤茯苓一兩牡丹皮澤瀉各七錢半防風半兩檳榔一兩郁李仁一兩湯浸去皮微炒為末食前溫酒服小蟠蔥散五苓散生料和四兩重依方加檳榔半兩茴香炒八錢川楝肉半兩薑蔥煎空心服腫痛不可忍雄黃二兩研白礬二兩甘草二尺煮水三升稍熱浴之又雞翅燒灰為末空心粥飲調下二錢患左取左翅患右取右翅又取伏龍肝以雞子白和敷之又馬齒莧搗汁或桃仁去皮搗爛或蛇床子末雞子黃和三者各可敷之痛用苦楝樹向陽根木香吳茱萸檳榔為末醋糊丸熱酒不拘時服卒痛如刺大汗出小蒜一升韭根一斤楊柳根一斤銼酒三升煎沸乘熱熏之陰莖痛是厥陰經氣滯兼熱用甘草稍蓋欲緩其氣耳若病淋而作痛似難一概論之必須清肺氣而清濁自分矣氣虛六君血虛四物等各用黃柏知母滑石石葦琥珀之類婦人陰腫腎痛枳實半斤切碎炒熱布裹包熨之冷即易陰吹胃氣下泄陰吹而正喧此穀氣之實也膏發煎導之疝或問疝病古方有以為小腸氣者有以為膀胱氣者唯子和丹溪專主肝經而言其說不同何以辨之曰小腸氣小腸之病膀胱氣膀胱之病疝氣肝經之病三者自是不一昔人以小腸膀胱氣為疝者誤也殊不知足厥陰之經環陰器抵少腹人之病此者其發睪丸脹痛連及少腹則疝氣之繫於肝經可知矣小腸氣俗謂之橫弦豎弦繞臍走注少腹攻刺而膀胱氣則在毛際之上小腹之分作痛與疝氣之有形如瓜有聲如蛙或上於腹或下於囊者不同也但小腸膀胱因經絡並於厥陰之經所以受病連及於肝則亦下控引睪丸為痛然止是二經之病不可以為疝也趙以德曰此條本為睪丸之症立名然內經以疝者痛也有腹中臟腑之痛一以疝而名者故通敘於此其腹中五臟之疝得以就此而考焉有睪丸之痛內經謂任脈為病男子內結七疝女子帶下瘕聚衝脈為病逆氣裡急然稱任脈有七疝名無疝之狀及按諸篇以雙字命其名者曰㿗疝者以三陽為病發寒熱痿厥其傳為㿗疝及陽明司天與之勝肝是動病足陽明筋病皆為㿉疝謂厥疝者面黃脈之至大而虛有積氣在腹中有厥氣名曰厥疝謂疝瘕者脾傳之腎病名疝瘕少腹冤熱而痛出白一名曰蠱謂沖疝者以沖任督生病上衝心痛不得前後謂卒疝者邪客厥陰之絡則卒疝暴痛與厥陰別蠡溝氣逆亦睪丸卒痛謂㿉癃疝者厥陰之陰盛而脈脹不通謂狐疝者肝所生病也殆非及此雙字之名者由任脈行諸經之會而有七疝者歟此外獨稱一字疝者則有太陰在泉主勝寒氣厥陽甚則為疝有太陽在泉小腹控睪上引心痛有小腹痛不得大小便名曰疝得之寒有足太陰筋病陰器紐痛上引臍有心疝脈急小腸為使少腹當有形有腎脈大急沉皆為疝心脈搏滑急為心疝肺脈沉搏為肺疝三陰急為疝靈樞有謂心脈微滑為心疝肝脈滑甚為㿉疝脾脈微大為疝氣腹中裹大膿血在腸胃之外滑甚為㿉癃腎脈滑甚為癃㿉諸脈之滑者為陽氣甚盛微有熱夫如是者名為七疝中分邪氣之寒熱者也內經又云少陽脈滑病肺風疝太陰脈滑病脾風疝陽明脈滑病心風疝太陽脈滑病腎風疝少陽脈滑病肝風疝所言風者非外人之風由肝木陽臟動之風也故經云脈滑曰風然連以疝稱者蓋腎肝同居下焦而足厥陰佐任脈之生化因肝腎之氣並逆所以任之陰氣為疝肝之陽氣為風所以風疝連稱也李東垣謂脈滑者為丙丁火熱並於下不勝壬癸從寒水之化故生㿗疝亦用熱治內經初不見於尺部而言也豈不為外寒鬱內熱之故乃曰熱火從寒化恐理未當而經更有莖垂者身中之機陰陽之候津液之道也或飲食不節喜怒不時津液內溢下流於睪血道不通日久不休俯仰不便趍翔不能此病滎然有水不上不下若此者亦㿉疝之一也張仲景言疝皆由寒邪得之亦同內經之云脈者當溫散之或曰內經言疝似若各從諸經脈所生今子何為盡屬於任脈乎曰任脈是疝病之本源各經是疝病之支流何以言之蓋腎臟以四方分部者言則屬五行之寒水以居在下位者言則屬地道之陰陰形偶故腎有兩兩其形則地道之剛柔立焉胞居兩形之間出納腎臟之精血以行坤土之化生成百骸萬象及夫生長壯者已之天癸與作強伎巧之用悉在於斯然而坤土居尊不自司其職司其職者乃衝任二脈起於胞中者行其化也是故五臟六腑之經皆受氣於六脈因以海名之所以二脈貴乎流通而惡閉塞流通則天之陽氣下降與之從事故施化之道行閉塞則天之陽絕故地之陰亦結而百病作矣疝者是其二也所致任脈之病者若剛柔自相勝負與內外邪之感傷皆得使其陰陽不和陰偏勝則寒氣衝擊陽偏勝則熱氣內入陰反之外悉致任脈為疝縱其邪不自任脈而起初由各經所受而得者亦必與任脈相犯故也所犯者何或所勝之經脈相傳或受不以次所乘或任脈過處與受邪之經相會或六經受氣之際挾邪犯其海則皆足以感動任脈內舍結固不化之陰上擊臟腑則為腹中之疝下入厥陰會於陰器則為睪丸之疝蓋疝自立名獨為任脈所職在地之陰特然起擊者而命之也若諸經受邪不與任脈相干則不名為疝矣不然何內經舉痛篇靈樞百病始生篇專為發明經脈腹中諸痛者乃無一字名其疝也始可見任脈者是疝病之本源諸經所云疝者是其支流余裔耳若夫巢氏所敘七疝者曰厥疝癥疝寒疝氣疝盤疝胕疝狼疝也其厥逆心痛諸飲食吐不下名曰厥疝腹中氣乍滿心下盡痛氣積如臂名曰癥疝寒飲食即脅下腹中盡痛名曰寒疝腹中乍滿乍減而痛名曰氣疝腹中痛在臍旁名曰盤疝腹中臍下有積聚名曰胕疝小腹與陰相引而痛大便難名曰狼疝及言諸疝之候止以陰氣積於內為寒氣所加使榮衛不調血氣虛弱故風冷入於腹內而成疝也小兒㿉者陰核腫大由啼哭躽氣不止動於陰氣結聚不散所致者也觀於五疝皆是痛在心腹之疝也獨舉㿉疝屬小兒病者耳後人述其說更舉內經謂脾風傳之於腎名曰疝瘕少腹冤熱而痛一名曰蠱者謂之蠱病又立陰疝條即㿗疝也將以足七疝之數此言五條為心腹痛者之治療則曰若因七情所傷者當調氣安其五臟外邪所幹者當溫散之治之不當內外之氣交入於腎者為腎氣入於膀胱者為膀胱氣入於小腸者為小腸氣腎與膀胱一臟一腑其氣通於外腎小腸繫於睪丸系會故也又謂陰疝一名㿗疝其種有四積腸㿗氣㿗卵脹水㿗是也若寒溫之氣有連於小腸者即小腹控睪丸而痛陰丸上下謂之腸㿗寒氣客於經筋足厥陰脈受邪脈脹不通邪結於睪卵謂之卵脹腎虛之人因飲食不節喜怒不時津液內結謂之水㿗至張戴人非之曰此俗工所立謬名也蓋環陰器上抵少腹乃屬足厥陰肝經之部分是受疝之處也或在泉寒勝水氣攣縮鬱於此經或司天燥勝木氣抑鬱於此經或忿怒悲哀憂抑頓挫結於此經或藥淋外固閉尾縮精壅於此經了不相干膀胱腎小腸之事乃厥陰肝經之職也凡疝者非肝木受邪則肝木自甚也由是於陰疝中亦立七疝之名曰寒疝水疝筋疝血疝氣疝狐疝㿗疝也寒疝其狀囊冷結硬如石陰莖不舉或連控睪丸而痛得於坐臥濕地及磚石或冬月涉水或值雨雪或風冷處使內過勞宜以溫劑下之久而無子水疝其狀腎囊腫痛陰汗時出或囊腫狀如水晶或囊癢搔出黃水或小腹按之作水聲得之飲水醉酒使內過勞汗出而遇風寒濕之氣聚於囊中故水多令人為卒疝宜以逐水之劑下之筋疝其狀陰莖腫脹或潰或膿或痛而裡急筋縮或莖中痛痛極則癢或挺縱不收或白物如精隨溲而下得於房室勞傷及邪術所使宜以降心火之藥下之血疝其狀如黃瓜在小腹兩旁橫骨兩端約中俗云便癰得於春夏重感大燠勞於使內氣血流溢滲入脬囊留而不去結成癰腫膿少血多宜以和血之劑下之氣疝其狀上連腎區下及陰囊或因號哭忿怒則氣鬱乏而脹怒哭號罷則氣散者是也宜以散氣之劑下之或小兒亦有此疾俗曰偏氣得於父已年老或年少多病陰痿精怯強力入房因而有子胎中病也此病不治狐疝其狀如瓦臥則入小腹行立則出小腹入囊中狐則晝出穴而溺夜入穴而不溺此疝出入上下往來正與狐相類亦與氣疝大同小異令人帶鉤鈐是也宜以逐氣流經之藥下之㿗疝其狀陰囊腫縋如升如斗不癢不痛是也得之地氣卑濕所生故江淮之間湫塘之處多感此疾宜以去濕之藥下之諸疝下去之後可調則調可補則補各量病勢勿拘俗法經所謂陰盛而腹脹不通者㿗癃疝也不可不下其論如此戴人既曰用內經靈樞明堂之論要窮疝病之源而不及於任脈生病之源何也蓋因力辨陰器與小腸腎膀胱了不相干是屬足厥陰部分受病之原立說所以不及於任脈然已三見於論中矣其間引治疝之穴多與任脈所會一也又稱沖任督與厥陰會於曲骨環陰器二也復言凡精滑白淫皆男子之疝也血涸不月罷腰膝上熱嗌乾少腹有塊女子之疝也但女子不謂之疝而謂之瘕即任脈內結之病尤明者三也凡戴人辯論之詞強直專主其一則不復顧其二在㿗疝中有無六經外證之可辨若果有膀胱小腸之證者又安得不從之如靈樞謂小腸病者小腹痛腰脊控睪丸而痛之類論治法亦然因病在下必先下之更不問虛弱之人於首尾不可下者下之有不旋踵之禍豈待下後始補而可回其生乎然而戴人之書其詞直其義明讀之使人豁然以去胸中之茅塞誠是諸醫書之冠及乎詳玩之則少溫潤反覆之意且夫陰陽變化生病於無窮治法亦無窮非一人所能究學者當因其已明益其未至然後得為善用其書者丹溪先生嘗論睪丸連小腹急痛者或有形或無形或有聲或無聲人皆以為經絡得寒收引不行而作痛不知此病始於濕熱郁遏至久又感外寒濕熱被鬱而作痛也其初致濕熱之故蓋大勞則火起於筋醉飽則火起於胃房勞則火起於腎大怒則火起於肝火鬱之久濕氣便盛濁液凝聚併入血隧流於厥陰肝屬木性急速火性又暴烈為寒所束宜其痛甚而暴也此論亦就厥陰受病處發明戴人之未至者也誠有功於後學蓋㿗疝不離此三者之邪熱則縱寒則痛濕則腫須分三者多少而治之兩丸俱病固然也設有偏於一者予又不能無其說焉腎有兩分左右其左腎屬水水生肝木木生心火三部皆司血統納左之血者肝術之職也其右屬火火生脾土土生肺金三部皆司氣統納右之氣者肺金之職也是故諸寒收引則血泣所以寒血從而歸肝下注於左丸諸氣憤鬱則濕聚所以氣濕從而歸肺下注於右丸且夫睪丸所絡之筋非盡由厥陰而太陰陽明之筋亦入絡也往往見人偏患於左丸者則痛多腫少偏於右丸者則痛少腫多此便可驗也姑書治效者一二症以明之予壯年啖柑橘過多積成飲癖在右脅下隱隱然不敢復啖數年已一日山行大勞飢渴甚遇橘芋食之橘動舊積芋復滯氣即時右丸腫大寒熱交作因而思之脾肺皆主右故積飲滯氣下陷太陰陽明之經筋俱傷其邪從而入於囊中著在睪丸筋膜而為腫脹張戴人有言病分上下治雖是木鬱為疝在下則不可吐亦當從下引而竭之竊念病有不同治可同乎今犯飢勞傷脾脾氣下陷必升舉之則胃氣不復下陷而積可行若用藥下之恐重陷胃氣也先服調胃劑一二帖次早注神使氣至下焦嘔逆而上覺肋下積動到中焦則吐而出之吐後㿗腫減半次早復吐吐後和胃氣疏通經絡二三日愈凡用此法治酒傷與飲水注右丸腫者皆效又治一人病後飲水患左丸痛甚灸大敦用摩腰膏內用烏附丁麝者以摩其囊上抵橫骨端炙溫帛覆之痛即止一宿腫亦全消矣歷代獨治外束之寒發明云男子七疝痛不可忍者婦人瘕聚帶下皆任脈所主陰經也乃肝腎受病治法同歸於一宜丁香楝實丸凡疝氣帶下皆屬於風全蠍治風之聖藥也川楝茴香皆入小腸經當歸玄胡索活血止痛疝氣帶下皆積寒邪入於小腸之間故用附子佐之丁香木香為引導藥也羅謙甫治火兒赤紐鄰久病疝氣復因七月間飢飽勞役過飲潼乳所發甚如初面色青黃不澤臍腹陣痛搐撮不可忍腰曲不能伸熱物熨之稍緩脈得細小而急難經云任之為病男子內結七疝皆積寒於小腸之間所致也非大熱之劑即不能愈遂制一方名之曰沉香桂附丸臍下撮急疼痛並臍下周身一遭皆急痛小便頻數清其五脈急洪緩澀沉按之皆虛獨腎脈按之不急皆虛無力名曰腎疝宜丁香疝氣丸男子婦女疝氣臍下冷痛相引腰胯而痛宜當歸四逆湯發明天台烏藥散川苦楝散簡易木香楝子散皆用巴豆炒藥許學士云大抵此疾因虛而得之不可以虛驟補邪之所湊其氣必虛留而不去其病則實故必先滌去所蓄之邪熱然後補之是以諸藥多借巴豆氣者蓋為此也金匱方寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當烏頭桂枝湯主之用烏頭一味以蜜二升煎減半去渣以桂枝湯五合和之令得一升後初服二合不知再服三合又不知復加至五合其知者如醉狀得吐者為中病海藏以附子建中湯加蜜煎治疝即此法也腹痛脈弦而緊弦則衛氣不行即惡寒緊則不欲食弦緊相搏即為寒疝寒疝繞臍痛若發則自汗出手足厥冷其脈沉弦者大烏頭煎主之衍義云葫蘆巴本經云得茴香桃仁治膀胱氣甚效嘗合用桃仁麩炒各等分半酒糊丸半為散每服五七十丸空心食前鹽酒下散以熱米飲調下與丸子相間空心各一二服效寶鑑葫蘆巴丸丹溪治內郁之濕熱煎方枳實九粒炒桃仁十四個炒山梔仁九個炒吳茱萸七粒炒山楂四粒炒生薑如指大上六味同入擂盆擂細取順流水一鍾入瓶內煎至微沸帶渣服如濕勝㿗疝者加荔枝核如痛甚者加鹽炒大茴香二錢如痛處可按者加薄桂少許丸方山梔二兩炒山楂四兩炒枳實炒茴香炒各二兩柴胡牡丹皮八角茴香各一兩炒桃仁茱萸炒各半兩末之酒糊丸空心鹽湯下五六十丸陽明受濕熱傳入大腸發熱惡寒小腹連毛際間悶痛不可忍用梔子仁炒桃仁炒枳實炒山楂各等分同研細入生薑汁半合用水一小鐘湯起煎令沸熱服之一方加茱萸寒熱兼施靈樞云胃中熱腸中寒則疾飢小腹痛脹丹溪云愚見有用川烏頭梔子等分作湯用之其效亦敏後因此方隨症與形加減用之無有不效蓋川烏頭治外束之寒梔子仁治內郁之熱也又云諸疝痛處用手按之不痛者屬虛必用桂枝炒山梔細切川烏頭等分為細末生薑自然汁打糊為丸如桐子大每服三四十丸空腹白湯下羅謙甫云陰疝足厥陰之脈環陰器抵少腹或痛因腎虛寒水涸竭瀉邪補肝蒺藜湯主之補例丹溪云疝有挾虛而發者其脈不甚沉緊而大豁無力者是也然其痛亦輕唯覺重墜牽引耳當以參朮為君䟽導藥佐之蓋䟽導藥即桃仁山楂枳實梔仁茱萸川楝玄胡索丁香木香之類是也海藏云姬提領因疾服涼劑數日遂病臍腹下大痛幾至於死與姜附等劑雖稍蘇痛不已隨本方內倍芍藥服之愈金匱方寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯主之衍義云張仲景治寒疝用生薑羊肉湯服之無不應驗有一婦人產當寒月寒氣入產門腹臍以下脹滿手不欲犯此寒疝也師將治之以抵當湯謂有瘀血非其治也可服仲景羊肉湯二服遂愈肝氣肝足厥陰經之病必小腹引脅而痛經云厥陰之復小腹堅滿裡急暴痛是風氣助肝盛而然治法當瀉肝也又云歲金太過民病兩脅下痛小腹痛又云歲木不及燥乃大行民病中清胠脅痛少腹痛又云歲土不及風乃大行民病腹痛復則胸脅暴痛下引小腹者是燥邪攻肝虛而然治法當補肝瀉金也又云寒氣客於厥陰之脈則血泣脈急故脅肋與小腹相引痛又云肝病者兩脅下痛引小腹取其經厥陰小腸又云邪客厥陰之絡令人卒疝暴痛刺足大指爪甲上與肉交者各一痏男子立已女子有頃已左取右右取左瀉肝山梔川芎桂芍之屬補肝當歸生薑羊肉之屬小腸氣小腸之病小腹引睪丸必連腰脊而痛經云少陰之脈心下熱善飢臍下痛又云少陰之復燠熱內作小腹絞痛者是熱助小腸盛而然治法當瀉小腸也又太陽在泉寒淫所勝與太陽之復皆病小腹控睪引腰脊上衝心痛及太陰司天大寒且至病小腹痛者是寒邪攻小腸虛而然治法當補小腸瀉寒邪也寶鑑引至真大要論云小腹控睪引腰脊上衝心唾出清水及為噦噫甚則入心善悲善忘甲乙經曰邪在小腸也小腸病者小腹痛引腰脊貫肝肺其經虛不足則風冷乘間而入邪氣既入則厥之證上衝肝肺客冷散於胸結於臍控引睪丸上而不下痛而入腹甚則衝心胸蓋其經絡所屬所繫也治之方茴香炒練實銼炒食茱萸陳皮馬蘭花醋炒各一兩芫花醋炒五錢上為末醋糊丸如桐子大每服十丸至二十丸溫酒送下又方益智仁蓬朮各半兩茴香山茱萸肉牛膝續斷川芎葫蘆巴防風牽牛炒熟甘草各二錢半為細末每服三錢水一盞二分煎兩三沸空心連滓服白湯調下二錢匕亦得膀胱氣膀胱之病小腹痛腫不得小便是也經云太陰在泉病小腹痛腫不得小便是濕邪攻膀胱虛而然治法當補膀胱瀉濕土邪也又云膀胱病者小腹偏腫而痛以手按之即欲小便而不得取委中央又云小腹痛腫不得小便邪在三陽取之足太陽大絡即委陽穴許學士云頃在岳城日歙尉宋荀甫膀胱氣作疼不可忍醫者以剛劑與之痛愈甚小便不通三日矣臍下虛脹心悶予因候之見其面赤黑脈洪大予曰投熱藥太過陰陽痞塞氣不得通為之奈何宋尚手持四神丹數粒云醫謂不止更服此予曰若服此定斃後無悔渠求治予適有五苓散一兩許分三服用連須蔥一莖茴香一撮鹽一錢水一盞半煎至七分令接續三服中夜下小便如墨汁者一二升腰下寬得睡翌日診之脈已平安矣續用硇砂丸與之數日瘥婁全善治謝人妻小腹疼痛小便不通先艾灸三陰交以茴香丁香青皮檳榔桂茱萸玄胡索山楂枳實又倍用黃柏煎服愈心疝心脈微滑為心疝心脈搏滑急為心疝帝曰診得心脈而急此為何病岐伯曰病名心疝小腹當有形也心為牡臟小腸為之使故曰少腹當有形也木香散廣臟煮散㿗疝睪囊腫大如升如斗是也丹溪云下部㿗氣不痛之方細思非痛斷房事與厚味不可用藥唯促其壽若蒼朮神麯白芷山楂川芎枳實半夏皆要藥人視其藥皆鄙賤之物已啟慢心又不能斷欲以愛護其根本非惟無益而反被其害者多矣且其藥宜隨時月寒熱更按君臣佐使加減大抵㿗疝屬濕多蒼朮神麯白芷散水山楂川芎枳實半夏南星有熱加山梔一兩堅硬加朴硝半兩秋冬加吳茱萸二錢半神麯糊丸又方南星山楂蒼朮各二兩白芷半夏枳實神麯各一兩海藻昆布各半兩玄明粉吳茱萸各二錢為末酒糊丸又方治木腎不痛南星半夏黃柏酒洗蒼朮鹽炒枳實山楂白芷神麯炒滑石炒茱萸昆布酒糊丸空心鹽湯下治㿗脹用香附子不拘多少為末每用酒一盞海藻一錢煎至半盞先撈海藻細嚼用所煎酒調末二錢服楮葉雄者曬乾為末酒糊丸空心鹽酒下無實者為雄潔古海蛤丸㿗氣痛者易治荔核散三層茴香丸宣胞丸地黃膏子丸安息香丸念珠丸隨宜選用陰囊腫脹大小便不通宜三白散偏墜初生用穿山甲茴香二味為末酒調下乾物壓之外用牡蠣煆良薑各等分為細末津唾調敷大者一邊須臾如火熱痛即安丹溪治一人因飲酒後飲水與水果偏腎大時作蛙聲或作痛炒枳實一兩茴香鹽炒梔子炒各三錢研煎下保和丸一人膀胱氣下墜如蛙聲臭橘子核炒十枚桃仁二十枚蘿蔔自然汁研下保和丸一人左腎核腫痛此飲食中濕墜下成熱以橘核五枚桃仁七枚細研順流水一盞煎沸熱下保和丸木腎以枇杷葉野紫蘇葉蒼耳葉水晶葡萄葉濃煎湯熏洗雄黃一兩研礬二兩生甘草半兩水五升煎洗荊芥穗一兩朴硝二兩為粗末蘿蔔蔥同煎湯淋洗大黃末醋和塗之干即易馬鞭草搗塗蔓菁根搗敷經云陽明司天燥淫所勝丈夫㿗疝婦人小腹痛又云陽明之勝外發㿗疝是燥邪攻肝氣虛而然治法當補肝瀉燥金也又云厥陰所謂㿗疝婦人少腹腫者厥陰者辰也三月陽中之陰邪在中故曰㿗疝少腹腫也所謂癃疝膚脹者曰陰亦盛而脈脹不通故曰㿗癃疝也三陽為病發寒熱下為癰腫及為痿厥腨㾓其傳為㿗疝東垣曰陰陽別論云三陽為病發寒熱下為癰腫及為痿厥腨㾓其傳為索澤又傳為㿗疝夫熱在外寒在內則累垂此九夏之氣也寒在外熱在內則卵縮此三冬之氣也足太陽膀胱之脈逆上迎手太陽小腸之脈下行至足厥陰肝之脈不得伸其任脈並厥陰之脈逆則如巨川之水致陽氣下墜是風寒濕熱下出囊中致兩睪腫大謂之曰疝太甚則為㿗足厥陰之脈與太陽膀胱寒水之脈同至前陰之末傷寒家說足厥陰肝經為病煩滿囊縮急下之宜大承氣湯以瀉大熱靈樞經云足厥陰肝經筋中為寒則筋攣卵縮為大寒前說囊縮為大熱此說為大寒此說囊縮垂睪下引㿗疝腳氣為大寒風濕盛下垂為寒與上二說不同何也曰以平康不病人論之夏暑大熱囊卵累垂冬天大寒急縮收上與前三說又不同何也是相乖耶不相乖耶答曰傷寒家囊卵縮大熱在內宜承氣湯急下之與經筋說囊卵縮大寒在外亦是熱在內與傷寒家同故再引平康人以證之冬天陽氣在內陰氣在外人亦應之故寒在外則皮急皮急則囊縮夏月陰氣在內陽氣在外人亦應之故熱在外則皮緩皮緩則囊垂此㿗疝之象也三說雖殊其理一也用藥者宜詳審之以上三論各有所主兼此考訂則脈證陰陽寒熱虛實之辨判然矣內經刺灸㿗疝有四法其一鈹石取睪囊中水液經云腰脊者身之大關節也肢脛者人之管以趨翔也莖垂者身中之機陰精之候津液之道也故飲食不節喜怒不時津液內溢乃下流於睪血道不通日久不休俯仰不便趨翔不能此病滎然有水不上不下鈹石所取形不可匿常不得蔽命曰去爪其法今世人亦多能之睪丸囊大如斗者中臟穢液必有數升信知此出古法也其二取肝經云足厥陰之脈是動則病丈夫㿗疝婦人小腹腫是也是於足厥陰肝經視盛虛熱寒陷下而施補瀉留疾與灸也其三取肝之絡經云足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者循脛上睪結於莖其病氣逆則睪腫卒疝取之所別是也是於內踝上五寸貼脛骨後近肉處蠡溝取之也其四取足陽明筋經云足陽明之筋聚於陰器上腹其病轉筋髀前腫㿉疝腹筋急治在燔針劫刺以知為數以痛為輸是也是於轉筋痛處用火針刺之也狐疝臥則入腹立則出腹偏入囊中者是也仲景方陰狐疝氣有大小時時上下者蜘蛛散主之內經刺灸狐疝但取足厥陰一經經云肝足厥陰之脈所生病者狐疝是也隨其經盛虛寒熱陷下取之也耳後陷者腎下腎下則腰尻痛不可俯仰為狐疝通治不問何證皆可用生料五積散每服一兩入鹽炒吳茱萸茴香各一錢生薑三片蔥白五寸煎空心熱服服藥未效大痛攻刺不已陰縮手足厥冷宜香附子仍炒鹽乘熱用絹裹熨臍下若大小腑不甚通者五苓散加桂下青木香丸初發或頭疼身熱或憎寒壯熱並宜參蘇飲加木香有逆上攻心下不覺痛而見心疼者宜以生韭搗取自然汁和五苓散為丸茴香湯下有腎氣才動心氣亦發上下俱疼者宜異功散吞茱萸內消丸或且專治下下痛定則上痛定矣神方治疝氣上衝如有物築塞心胸欲死手足冷者二三服除根硫黃火中熔化即投水中去毒研細荔核切片炒黃陳皮各等分上為末飯丸桐子大每服十四五丸溫酒下其疼立止患人自覺疼甚不能支持止與六丸不可多也食積與瘀血作痛者導積行血則愈於傷食蓄血二門求之診寸口弦緊為寒疝弦則衛氣不行氣不行則惡寒緊則不欲食寸口遲緩遲為寒緩為氣氣寒相搏轉絞而痛沉緊豁大為虛弦急搏皆疝視在何部而知其臟心脈微滑為心疝肝脈滑為㿗疝腎脈滑為癃㿉大急沉為腎疝肝脈大急沉為肝疝心脈搏急為心疝肺脈沉搏為肺疝脾脈緊為脾疝寸弦而緊弦緊相搏為寒疝趺陽虛遲為寒疝肝脈滑甚為㿗疝腎肝滑甚為癃㿉東垣曰夫滑脈關以上見者為大熱蓋陽與陽並也故大熱滑脈尺部見為大寒生㿗疝滑脈者命門包絡之名也為丙丙丁熱火併於下蓋丙丁不勝壬癸從寒水之化也故生㿗疝交腸交腸之病大小便易位而出或因醉飽或因大怒遂致臟氣乖亂不循常道法當宣吐以開提其氣使闌門清利得司泌別之職則愈矣宜五苓散調氣散各一錢加阿膠末一錢湯調服或研黃連阿膠丸為末加木香少許再以煎藥送下丹溪治馬希聖年五十餘性嗜酒常痛飲不醉糟粕出前竅便溺出後竅六脈皆沉澀與四物湯加海金沙木香檳榔木通桃仁服而愈此人酒多氣肆酒升而不降陽極虛酒濕積久生熱煎熬血乾陰亦大虛陰陽偏虛皆可補接此人中年後陰陽俱虛時暫可活者以其形實酒中谷氣尚在三月後其人必死後果然腸鳴內經腸鳴有五一曰脾虛經云脾虛則腹滿腸鳴餐泄食不化取其經太陰陽明少陰血者是也二曰中氣不足經云中氣不足腸為之苦鳴補足外踝下留之五分申脈穴也三曰邪在大腸經云腸中雷鳴氣上衝胸邪在大腸刺肓之原巨虛上廉三里是也四曰土鬱經云土鬱之發腸鳴而為數後是也五曰熱勝經云少陰在泉熱淫所勝病腹中腸鳴氣上衝胸治以鹹寒是也東垣云如胃寒泄瀉腸鳴於升陽除濕湯加益智仁五分半夏五分生薑棗子和煎丹溪云腹中水鳴乃火擊動其水也二陳湯加芩連梔子腹中鳴者病本於胃也婁全善云腸鳴多屬脾胃虛一男子腸鳴食少臍下有塊耕動若得下氣多乃已已則復鳴醫用疏氣藥與服半年不效予用參術為君甘草連芩枳乾薑為臣一帖腸鳴止食進又每服吞厚朴紅豆丸其氣耕亦平經云脾胃虛則腸鳴腹滿又云中氣不足腸為之苦鳴此之謂也肺移寒於腎為湧水湧水者按之腹不堅水氣客於大腸疾行則鳴濯濯如囊裹水漿之聲也河間葶藶丸主之脫肛難經云虛實出焉出者為虛入者為實肛門之脫非虛而何哉蓋實則溫溫則內氣充而有所蓄虛則寒寒則內氣餒而不能收況大腸有厚薄與肺為表裡肺臟蘊熱則閉虛則脫本草有云補可以去弱澀可以去脫若脫甚者既補之必兼澀之設不澀於內亦須澀於外古方用五倍子末托而上之一次未收至五七次必收而不復脫矣久利婦人小兒老人有此疾者產育及久痢用力過多小兒氣血未壯老人氣血已衰故肛易於出不得約束禁固也肛門為大腸之候大腸受熱受寒皆能脫出當審其因證寒者以香附子荊芥等分煎湯洗之熱者以五倍子朴硝煎湯洗之亦用木賊燒灰不令煙盡入麝香少許大便了貼少許或以五倍子末攤紙上貼肛緩緩揉入有腸頭作癢即腹中有蟲丈夫因酒色過度大腸者傳導之官腎者作強之官蓋腎虛而泄母氣肺因以虛大腸氣無所主故自脫肛治法實元氣去蘊熱之劑外用前藥洗之醫治無不愈矣大腸熱甚與腸風者涼血清腸散瀉痢後大腸氣虛肛門脫出不腫不痛屬氣血虛宜補氣血為主赤腫有痛宜涼血祛風為主補氣血八珍湯十全散涼血生苄赤芍槐花槐角黃栝蔞雞冠花疏風防風羌活荊芥久瀉痢者補養脾胃宜參朮實脾湯用力過多者十全大補湯參朮芎歸湯訶子人參湯內加升提藥大腸虛而挾熱脫肛紅腫宜縮砂湯槐花散薄荷散大腸虛而挾寒脫肛不紅腫宜蝟皮散香荊散日久不愈常宜服收腸養血和氣湯澀脫龍骨散澀腸散外治陽證蟠龍散陰證伏龍肝散五倍子末煎湯加白礬洗五倍荊芥小便濃煎洗荊芥龍腦薄荷朴硝煎湯洗皂角捶碎煎湯浸生栝蔞搗汁浸蔥湯洗軟芭蕉葉托上生鐵三斤水一斗煮取五升出鐵以汁洗內服瓷石散鱉頭燒灰塗穀道癢痛穀道癢多因濕熱生蟲欲成痔瘻宜以雄黃入艾綿燒煙燻之並納蜣螂丸蜣螂丸治肛門癢或出膿血有蟲旁生孔竅內用蜣螂七枚五月五日收去翅足炙為末新牛糞半兩肥羊肉一兩炒令香上共如膏丸如蓮子大炙令熱以新綿薄裹納下部中半日少吃飯即大便中蟲出三五度永瘥治穀道䘌赤腫或癢或痛用杏仁搗作膏敷之或炒令黃以綿蘸塗穀道中外臺治下部蟲齧杵桃葉一斛蒸之令極熱內小口器中以下部榻上坐蟲立死治肛門腫痛用木鱉子去殼取肉四五枚研如泥安新瓦器或木盆以沸湯衝動洗了另用少許塗患處診䘌蝕陰脫其脈虛小者生緊急者死痔巢氏病源有五痔之論云肛邊生鼠乳出在外時時出膿血者牡痔也肛邊腫生瘡而出血者牝痔也肛邊生瘡癢而復痛出血者脈痔也肛邊腫核痛發寒熱而血出者腸痔也因便而清血隨出者血痔也又有酒痔肛邊生瘡亦有血出又有氣痔大便難而血出肛亦出外良久不肯入諸痔皆由傷風房室不慎醉飽合陰陽致勞損血氣而經脈流溢滲漏腸間沖發下部久不瘥變為瘻也聖濟總錄敘痔之形狀謂由五腑之所傳大腸之所受可謂得其始末矣若內經所謂因而飽食筋脈橫解腸澼為痔又謂少陰之復為痔注又以小腸有熱則戶外為痔又謂督脈生病癃痔蓋督脈自會陰合篡間繞篡後別繞臀是督脈者與衝任本一脈初與陽明合筋會於陰器故屬於腎而為作強者也由是或因醉飽入房精氣脫舍其脈空虛酒毒之熱乘之流著是脈或因淫極而強忍精不泄或以藥固其精停積於脈流注篡間從其所過大腸肛門之分以作痔也與靈樞所謂膀胱足太陽之脈及筋皆抵腰中入絡腎其支者貫臀故主筋生病者為痔亦與督脈病痔之理同也自此推之足厥陰之筋脈環前後二陰寧不為痔乎每見患鼠痔者其發則色青痛甚豈非因肝苦急苦痛甚故本色見耶方論有謂五痔潰皆血膿者獨為熱甚血腐者言也至若潰出黃水者則為濕熱矣更宜於東垣方論求之東垣治濕熱風燥四氣內經曰因而飽食筋脈橫解腸澼為痔夫大腸庚也主津本性燥清肅殺之氣本位主收其所司行津液以從足陽明中州戊土之化若旺則能生化萬物而衰亦能殞殺萬物故曰萬物生於土而歸於土也然手足之陽明同司其化焉既在西方本位為之害蜚司殺之腑因飽食行房忍泄前陰之氣歸於大腸以致木乘火勢而侮燥金以火就燥則大便閉而痔漏作矣其疾甚者當以苦寒瀉火以辛溫和血潤燥疏風止痛是其治也以秦艽當歸稍和血潤燥以桃仁潤血以皂角仁除風燥以地榆破血止血以枳實之苦寒補腎以下泄胃實以澤瀉之淡滲使氣歸於前陰以補清燥受胃之濕邪也白朮之苦甘以苦補燥氣之不足其甘味以瀉火而益元氣也故曰甘寒瀉火乃假枳實之寒也古人用藥為下焦如瀆又曰在下者引而竭之多為大便秘澀以大黃推去之其津血益不足以當歸和血及油潤之劑大便自然軟利矣宜作銼湯以與之是下焦有熱以急治之之法也以地榆惡人而壞胃故宿食消盡空心作丸服之曰秦艽白朮九又云痔瘡若破謂之痔漏大便秘澀必作大痛此由風熱乘食飽不通氣逼大腸而作也受病者燥氣也為病者胃熱也胃刑大腸則化燥火以乘燥熱之實勝風附熱而來是濕熱風燥四氣相合故大腸頭成塊者濕也作大痛者風也大便燥結者主病兼受火邪熱也當去此四者其西方肺主諸氣其體收下亦助病為邪須當以破氣藥兼之治法全矣不可作丸以銼湯與之效如神速秦艽蒼朮湯主之痔漏經年因而飽食筋脈橫解腸澼為痔治法當補北方瀉中央宜紅花桃仁湯痔漏大便結燥疼痛秦艽當歸湯痔漏大便硬努出大腸頭下血苦痛不能忍當歸郁李仁湯痔漏成塊下垂不任其癢秦艽羌活湯脈訣云積氣生於脾臟旁大腸疼痛陣難當漸教稍瀉三焦火莫漫多方立紀綱七聖丸主之痔漏每日大便時發疼痛如無疼痛者非痔漏也秦艽防風湯主之丹溪專一涼血為主人參黃連生地涼血當歸和血川芎和血槐角涼生血條芩涼大腸枳殼寬腸升麻提起上煎湯服之外以澀藥蘆甘石童便煆牡蠣粉龍骨海蛤密陀僧之類敷之薛新甫云初起焮痛便秘或小便不利者宜清熱涼血潤燥疏風若氣血虛而寒涼傷損者調養脾胃滋補陰精若破而久不愈多成痔漏有穿臀穿陰穿腸者宜養元氣補陰精為主大便秘澀或作痛者潤燥除濕肛門下墜或作痛者瀉火除濕下墜腫痛或作癢者祛風勝濕腫痛小便澀滯者清肝導濕若有患痔而兼疝患疝而兼下疳皆屬肝腎不足之變症但用地黃丸益氣湯以滋化源為善若專服寒涼治火者無不致禍牡痔乳香散豬蹄灰丸牝痔檳榔散榼藤散麝香散酒痔赤小豆散乾葛湯氣痔橘皮湯威靈仙丸熏熨方血痔地榆散椿皮丸豬臟丸腸痔皂角煎丸鱉甲丸脈痔刺蝟皮丸桑木耳散痛甚秦艽當歸湯七聖丸能消丸地榆散試蟲散龍腦散白聖散黑玉丹或用荔枝草煎湯入朴硝洗之效癢甚秦艽羌活湯外用槐白皮濃煎汁安盆中坐熏之冷即再暖良久欲大便當蟲出或用水銀棗膏各二兩研勻捏如棗形薄綿裹納之明日蟲出若痛者加粉草三大分作丸或用威靈仙枳殼麩炒各一兩為粗末熬水熏洗冷即再暖臨臥避風洗三次挹干貼蒲黃散或用艾入雄黃末燒煙燻之下血不止芎歸丸黑丸子臭樗皮散二礬丸苦楝丸槐角地榆湯槐角枳殼湯外敷血竭末氣滯發痔荊枳湯血瘀作痛逐瘀血湯血痔久痔潔古用黑地黃丸主之云治痔之聖藥也運氣痔發皆屬寒經云太陽之勝痔瘧發治以苦熱是也則痔固有寒者矣本事四方用桂附乃其治乎熏痔方用無花果葉煮水熏少時再洗又法燒新磚以醋沃坐熏良洗藥方治番花痔用荊芥防風朴硝煎湯洗之次用木鱉子五倍子研細調敷如肛門腫熱再以朴硝末水調淋之良又方無花果葉七片五倍二錢皮硝二錢水一碗煎八分砂鍋內乘熱熏洗敷藥雞內金蒲黃血竭各等分為末濕則乾摻干則油調敷又方茄蒂何首烏文蛤酥炙各等分蜜薑汁雞子清攪勻調敷膏藥杏仁去皮五錢蓖麻子去殼七錢乳香二錢沒藥四錢血竭六錢片腦一錢銅綠二錢瀝青三錢松香二兩穿山甲灰炒研末二錢人乳一酒鍾先將蓖麻杏仁搗如泥次入松香搗爛次第入諸藥量入人乳搗令軟硬得所再搗五六百下收瓷器中封固臨時以手捻如錢攤厚紙或帛上拔腐去膿生新肉李防禦專科治痔九方朝貴用之屢效蓋其用藥簡要有次第製造有法無苦楚而收效甚速凡痔出外或番若蓮花復便血疼痛不可坐臥甚者用下藥早上藥一次午一次晚又一次至夜看痔頭出黃水膏如泉當夜不可再上藥且令黃水出盡次日看痔消縮一半若更上藥一二日為好若年高人應外腎牽引疼痛可用人以火烘熱手於大小便間熨之其痛自定黃水未盡可再敷一日藥仍須勤用曉外科人早晚看照黃水流至盡是病根已去也水澄膏系護肉藥鬱金白芨二味各等分細末候痔出側臥以鹽湯洗淨拭用新水和蜜盞內調勻卻入藥末同敷在穀道四向好肉上留痔頭在外用紙蓋藥仍用筆蘸溫水塗紙令常潤澤卻用下枯藥好白礬四兩通明生砒二錢半重硃砂一錢生研如粉細三味先用砒末安建盞中次用白礬末蓋之用火煅令煙斷其砒盡從煙去止是借砒氣在白礬中將枯礬取出為細末先看痔頭大小多寡將礬末抄上掌中加硃砂少許二味以津唾調勻得所用蓖子調塗痔頭上周遭令遍日三上須仔細詳看痔頭顏色欲其轉焦黑乃取落之漸至夜自有黃水膏出以多為好方是惡毒水切勿他疑中夜再上藥一次來日依舊上三次有小疼不妨如換藥用新瓦器盛新水或溫水在痔邊以筆輕手刷洗舊藥卻上新藥仍用前護藥老弱人用藥要全無疼痛只增加硃砂末於礬末內自然力慢不可住藥但可少遍數直候痔頭焦枯方可住也次用荊芥湯洗以荊芥煎湯入瓦器時洗之潤腸丸用大黃煨淨制枳殼當歸各等分蜜丸每服二三十丸白湯下以防肛門急燥欲大便出無澀痛而已又龍石散用龍骨煆出火毒軟石膏煆出火毒白芷黃丹作末摻瘡口又導赤散用生地黃木通黃芩等分煎以防小便赤澀又雙金散用黃連鬱金等分為末用蜜水調敷痔頭有小痛即敷之若得腦子末敷尤佳又痔頭收斂即可服十宣散以生氣血又國老湯生甘草治痔本藥也煎水熏洗生肌解石毒瘡極癢亦主之共九方周先生枯痔法明礬赤石脂五錢辰砂痛加一錢黃丹上為末先用鬱金末護肛門如無鬱金用薑黃末代之調塗四圍好肉如不就加綠豆粉打合卻將枯藥敷上如肛門疼急濃煎甘草湯放溫拂四圍肛門上就與寬腸藥槐花大黃枳殼木通連翹瞿麥當歸上半酒半水煎枯藥早辰上一次日午一次洗去舊藥申時又洗去又上一次如要急安至夜半子時又洗上一次至次日且看痔頭淡淡黑色兩三日如烏梅四五日內用竹蓖子輕輕敲打痔頭見如石堅至七八日便住更不須上枯藥且待自然如蘿蔔根乃脫去也洗用甘草荊芥槐花洗去舊藥方上新藥凡醫痔之法且如明日要下手今日先與此藥所以寬大腸使大便軟滑不與痔相礙且不泄瀉痔頭未脫落者須要日日與之以大黃一兩煨枳殼炒當歸酒洗一兩同為細末丸如桐子大好酒吞下治枯痔頭慮生他症凡用枯藥或觸壞腎根或水道赤澀痛與此方大黃木通生地各一兩滑石瞿麥各半兩同為細末每用四錢煎服催痔方如枯盡未脫落以此催之好磁石一錢白殭蠶生川烏五分同為細末冷水調敷上立脫凡用枯藥去盡乳頭恐留痔硬頭損破肛門四圍成瘡用此藥龍骨一錢石膏一錢沒藥五分膩粉五分同研十分細先以荊芥湯洗次摻之切忌毒物生薑痔脫後用甘草湯豆豉湯洗再用荊芥五倍子煎水洗便不生膿治痔脫後肉癢方用大粉草濃煎湯洗收腸方凡用枯藥脫下乳頭隨即與此以收其腸此方補氣又收膿去血生肉令痕壯人參當歸各一兩川芎甘草白芷防風厚朴桔梗桂枝黃耆上細末半酒半水煎如惡酒者酒少水多煎之夏月減桂樸加芩柏治痔切勿用生砒毒氣入腹反至奄忽忌吃生冷硬物冷菜之類及酒濕面五辣辛熱大料物及乾薑之類犯之無效灸法大蒜十片頭垢捏成餅子先安頭垢餅於痔頭上外安蒜片以艾灸之唐峽州王文顯充西路安撫司判官乘騾入駱谷有痔疾因此大作其狀如胡瓜貫於腸頭熱如煻灰火至驛僵仆主驛吏云此病予曾患來須灸即瘥用柳枝濃煎湯先洗痔便以艾炷其上連灸三五壯忽覺一道熱氣入腸中因轉瀉鮮血穢物一時出至痛楚瀉後遂失胡瓜所在登騾馳去秘傳痔漏隔礬灸法皂礬一斤用新瓦一片兩頭用泥作一壩先用香油刷瓦上焙乾卻以皂礬置瓦上煆枯去砂為末穿山甲一錢入紫罐內煅存性為末木鱉子亦如前法煆過取末二錢五分乳香沒藥各一錢五分另研上件和勻冷水調量瘡大小作餅子貼瘡上用艾炷灸三四壯灸畢就用熏洗藥先熏後洗日六度三五日後如前法再灸以瘥為度熏洗方皂礬如前制過約手規二把知母末一兩貝母末一兩蔥七莖先用水同蔥煎三四沸傾入瓶內再入前藥令患者坐瓶口上熏之待水溫傾一半洗患處留一半俟再灸復熱熏洗以瘥為度第七冊七竅門上目經云瞳子黑眼法於陰白眼赤脈法於陽故陰陽合轉而精明此則眼具陰陽也又曰五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨氣血之精而與脈併為系上屬於腦後出於項中此則眼具五臟六腑也後世五輸八廓之說蓋本諸此臟腑主目有二一曰肝經云東方青色入通於肝開竅於目臟精於肝又云人臥血歸於肝肝受血而能視又云肝氣通於目肝和則目能辨五色矣二曰心經云心合脈諸脈者皆屬於目是已至東垣又推之而及於脾如下文所云東垣曰五臟生成篇云諸脈者皆屬於目目得血而能視針經九卷大惑論云心事煩冗飲食失節勞役過度故脾胃虛弱心火太盛則百脈沸騰血脈逆行邪害孔竅天明則日月不明也夫五臟六腑之精氣皆稟受於脾土而上貫於目脾者諸陰之首也目者血氣之宗也故脾虛則五臟之精氣皆失所司不能歸明於目矣心者君火也主人之神宜靜而安相火代行其令相火者包絡也主百脈皆榮於目既勞役運動勢乃妄行及因邪氣所並而損其血脈故諸病生焉凡醫者不理脾胃及養血安神治標不治本不明正理也陽主散陽虛則眼楞急而為倒睫拳毛陰主斂陰虛不斂則瞳子散大而為目昏眼花靈樞顛狂篇云目眥外決於面者為銳眥在內近鼻者為內眥上為外眥下為內眥論疾診尺篇云診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病太陽病宜溫之散之陽明病宜下之寒之少陽病宜和之保命集云眼之為病在腑則為表當除風散熱在臟則為里當養血安神暴發者為表而易療久病者為里而難治除風散熱者瀉青丸主之養血安神者定志丸主之婦人熟地黃丸主之或有肥體氣盛風熱上行目昏澀槐子散主之此由胸中濁氣上行也重則為痰厥亦能損目常使胸中氣清自無此病也又有因目疾服涼藥多則損氣者久之眼漸昏弱乍明乍暗不能視物此則失血之驗也熟乾地黃丸宣風散定志丸相須養之或有視物不明見黑花者此之謂腎氣弱也當補腎水駐景丸是也或有暴失明者謂眼居諸陽交之會也而陰反閉也此風邪內滿當有不測之病也子和曰聖人雖言目得血而能視然血亦有太過不及也太過則目壅塞而發痛不及則目耗竭而失明故年少之人多太過年老之人多不及但年少之人則無不及年老之人其間猶有太過者不可不察也夫目之內眥太陽經之所起血多氣少目之銳眥少陽經也血少氣多目之上綱太陽經也亦血多氣少目之下綱陽明經也血氣俱多然陽明經起於目兩旁交頞之中與太陽少陽俱會於目惟足厥陰經連於目系而已故血太過者太陽陽明之實也血不及者厥陰之虛也故出血者宜太陽陽明蓋此二經血多故也少陽一經不宜出血血少故也刺太陽陽明出血則目愈明刺少陽出血則目愈昏要知無使太過不及以養血脈而已凡血之為物太多則溢太少則枯人熱則血行疾而多寒則血行遲而少此常理也目者肝之外候也肝主目在五行屬木雖木之為物太茂則蔽密太衰則枯瘁矣夫目之五輪乃五臟六腑之精華宗脈之所聚其白輪屬肺金肉輪屬脾土赤脈屬心火黑水神光屬腎水兼屬肝木此世俗皆知之矣及有目疾則不知病之理豈知目不因火則不病何以言之白輪變赤火乘肺也肉輪赤腫火乘脾也黑水神光被翳火乘肝與腎也赤脈貫目火自甚也能治火者一句可了故內經曰熱勝則腫凡目暴赤腫起羞明癮澀淚出不止暴翳目瞞皆火熱之所為也治火之法在藥則鹹寒吐之下之在針則神廷上星囟會前頂百會血之翳者可使立退痛者可使立已昧者可使立明腫者可使立消惟小兒不可刺囟會為肉分淺薄恐傷其骨然小兒水在上火在下故目明老人火在上水不足故目昏內經曰血實者宜決之又經曰虛者補之實者瀉之如雀目不能夜視及內障暴怒大憂之所致也皆肝主目血少禁出血止宜補肝養腎至於暴赤腫痛皆宜以䤵針刺前五穴出血而已次調鹽油以塗髮根甚者雖至於再至於三可也量其病勢以平為期按此謂目疾出血最急於初起熱痛暴發或久病郁甚非三稜針宣泄不可然年高之人及久病虛損並氣鬱者宜從毫針補瀉之則可故知子和亦大略言耳於少陽一經不宜出血無使太過不及以養血脈而已斯意可見五輪金之精騰結而為氣輪木之精騰結而為風輪火之精騰結而為血輪土之精騰結而為肉輪水之精騰結而為水輪氣輪者目之白睛是也內應於肺西方庚辛申酉之令肺主氣故曰氣輪金為五行之至堅故白珠獨堅於四輪肺為華蓋部位至高主氣之升降少有怫鬱諸病生焉血隨氣行氣若怫鬱則火勝而血滯火勝而血滯則病變不測火剋金金在木外故氣輪先赤金剋木而後病及風輪也金色尚白故白澤者順也風輪者白內青睛是也內應於肝東方甲乙寅卯厥陰風木故曰風輪目竅肝肝在時為春春生萬物色滿宇宙惟目能鑑故屬竅於肝也此輪清脆內包膏汁有涵養瞳神之功其色青故青瑩者順也世人多黃濁者乃濕熱之害唯小兒之色最正至長食味則泄其氣而色亦易矣血輪者目兩角大小眥是也內應於心南方丙丁巳午火心主血故曰血輪夫火在目為神光火衰則有昏瞑之患火炎則有焚燎之殃雖有兩心而無正輪心君主也通於大眥故大眥赤者實火也心包絡為小心小心相火也代君行令通於小眥故小眥赤者虛火也若君主拱默則相火自然清寧矣火色赤唯紅活為順也肉輪者兩睥是也中央戊己辰戌丑未之土脾主肉故曰肉輪脾有兩葉運動磨化水穀外亦兩睥動靜相應開則萬用如陽動之發生閉則萬寂如陰靜之收斂土臟萬物而主靜故睥合則萬有寂然而思睡此臟納歸靜之應也土為五行之主故四輪亦為睥所包涵其色黃得血而潤故黃澤為順也華元化云目形類丸瞳神居中而前如日月之麗東南而晚西北也內有大絡六謂心肺脾肝腎命門各主其一中絡八謂膽胃大小腸三焦膀胱各主其一外有旁支細絡莫知其數皆懸貫於腦下連臟腑通暢血氣往來以滋於目故凡病發則有形色絲絡顯見而可驗內之何臟腑受病也外有二竅以通其氣內有諸液出而為淚有神膏神水神光真氣真元真精此皆滋目之源液也神膏者目內包涵膏液如破則黑稠水出是也此膏由膽中滲潤精汁積而成者能涵養瞳神衰則有損神水者由三焦而發源先天真一之氣所化在目之內雖不可見然使觸物損破則見黑膏之外有似稠痰者是也在目之外則目上潤澤之水是也水衰則有火勝燥暴之患水竭則有目輪大小之疾耗澀則有昏眇之危虧者多盈者少是以世無全精之目神光者謂目自見之精華也夫神光發於心原於膽火之用事神之在人也大矣在足能行在手能握在舌能言在鼻能嗅在耳能聽在目能視神舍心故發於心焉真血者即肝中升運滋目經絡之血也此血非比肌肉間易行之血因其脈絡深高難得故謂之真也真氣者蓋目之經絡中往來生用之氣乃先天真一發生之元陽也大宜和暢少有鬱滯諸病生焉真精者乃先後天元氣所化精汁起於腎施於膽而後及瞳神也凡此數者一有所損目則病矣大概目圓而長外有堅殼數重中有清脆內包黑稠神膏一函膏外則白稠神水水以滋膏水外則皆血血以滋水膏中一點黑瑩是也膽所聚之精華唯此一點燭照鑑視空闊無窮者是曰水輪內應於腎北方壬癸亥子水也其妙在三膽汁腎氣心神也五輪之中四輪不鑑唯瞳神乃照物者風輪則有包衛涵養之功風輪有損瞳神不久留矣或曰瞳神水也氣也血也膏也曰非也非血非氣非水非膏乃先天之氣所生後天之氣所成陰陽之妙用水火之精華血養水水養膏膏護瞳神氣為運用神則維持喻以日月理實同之而午前則小午後則大亦隨天地陰陽之運用也大抵目竅於肝主於腎用於心運於肺臟於脾有大有小有圓有長亦由稟受之異男子右目不如左目精華女子左目不如右目光彩此各得其陰陽氣分之王也然聰愚佞直柔剛壽夭亦能驗目而知之神哉豈非人身之至寶乎八廓應乎八卦脈絡經緯於腦貫通臟腑達血氣往來以滋於目廓如城郭然各有行路往來而匡廓衛御之意也乾居西北絡通大腸之腑臟屬肺肺與大腸相為陰陽上運清純下輸糟粕為傳送之官故曰傳道廓坎正北方絡通膀胱之腑臟屬於腎腎與膀胱相為陰陽主水之化源以輸津液故曰津液廓艮位東北絡通上焦之腑臟配命門命門與上焦相為陰陽會合諸陰分輸百脈故曰會陰廓震正東方絡通膽腑臟屬於肝肝膽相為陰陽皆主清淨不受濁穢故曰清淨廓巽位東南絡通中焦之腑臟屬肝絡肝與中焦相為陰陽肝絡通血以滋養中焦分氣以化生故曰養化廓離正南方絡通小腸之腑臟屬於心心與小腸相為臟腑為謂陽受盛之胞故曰胞陽廓坤位西南絡通胃之腑臟屬於脾脾胃相為臟腑主納水穀以養生故曰水穀廓兌正西方絡通下焦之腑臟配腎絡腎與下焦相為臟腑關主陰精化生之源故曰關泉廓臟腑相配內經已有定法而三焦分配肝腎者此目之精法也蓋目專竅於肝而主於腎故有二絡之分配焉左目屬陽陽道順行故廓之經位法象亦以順行右目屬陰陰道逆行故廓之經位法象亦以逆行察乎二目兩眥之分則昭然可見陰陽順逆之道矣開導說夫目之有血為養目之源充和則發生長養之功全而目不病虧滯則病生矣猶物之有水為生物之澤時中則灌溉滋生之得宜而物秀旱澇則物壞矣皆一氣使之然也是故天之六氣不和則陰陽偏勝旱澇承之水之盈虧不一物之秀稿不齊雨暘失時而為物害也譬之山崩水湧滂沛妄行不循河道而流任其所之不得已而䟽塞決堤以泄其溢使無淪溺昏墊之患人之六氣不和水火乖違淫亢承之血之旺衰不一氣之升降不齊營衛失調而為人害也蓋由陰虛火盛炎熾錯亂不遵經絡而來鬱滯不能通暢不得已而開澀導瘀以瀉其餘使無脹潰損珠之患與戰理同其所有六謂迎香內睥上星耳際左右太陽穴也內睥正隊之衝鋒也其功雖遲漸收而平順兩太陽擊其左右翼也其功次之上星穴絕其餉道也內迎香抵賊之巢穴也成功雖速乘險而徵耳際擊其遊騎耳道遠功卑智者不取此實拯危之良術挫敵之要機與其閉門捕賊不若開門逐之為良法也蓋病淺而邪不勝正者固內治而邪自退矣倘或六陽炎熾不若開導通之縱使其虛雖有所傷以藥內治之功而補其所虧庶免瘀滯至極而有潰爛枯凸之患惜乎開導之法利害存焉有大功於目而人不知有隱禍於目而人亦不知其摧鋒挫銳臨大敵而拯禍亂此其功之大也耗液傷膏弱光華而乏滋生此其禍之隱也唯能識證之輕重目之虛實而伐之無過不及之弊庶可為醫之良者點服藥說病有內外治各不同內疾已成外證若無點之何益外有紅絲赤脈若初發乃微邪退後乃余賊點亦可消服之猶愈內病始盛而不內治只泥外點者不唯徒點無功且有激發之患內病既成外病已見必須內外夾攻點服並行奈之何人有愚拗不同有喜服而畏點者有喜點而畏服者不知內疾既發非服不除外疾既成非點不退濬其流不若塞其源伐其枝不若斫其根揚湯止沸不如釜底抽薪此謂治本也內病既發不服而除者吾未之見也物汙須濯鏡垢須磨脂膏之釜不經洗滌烏能清淨此謂治標也若外障既成不點而去者吾亦未之見也若內障不服而點者徒激其火動其氣血反損無益服而不點者亦然外障服而不點病初發浮嫩不定者亦退既已結成者服雖不發不長所結不除當內外夾攻方盡其妙鉤割針烙說鉤者鉤起之謂割割去也針非砭針之針乃針撥瞳神之針烙即熨烙之烙此四者猶斬刈之刑剪戮凶頑之法也要在審鞫明而詳奪定然後加刑先滅巨魁次及從惡則情真罪當而良善無侵濫之憂強暴無猖獗之患在治法乃開泄鬱滯滌除瘀積之術也要在證候明而部分當始可施治先伐標病後去本病則氣和血寧而精膏無傷耗之患輪廓無誤損之失如鉤先須識定何處皮肉筋脈浮淺而手力亦隨病輕重行之如針先須識定內障證候可針歲月已足氣血寧定者方與之庶無差謬針後當照證內治其本或補或瀉各隨其證之所宜若只治其標不治其本則氣不定不久復為害矣割如在氣血肉三輪者可割而大眥一塊紅肉乃血之英心之華也若誤割之則目盲因神在而傷者死有割傷因而惹風及元虛之人犯燥濕盛者潰爛為漏為目枯丸障若掩及風輪之重厚者雖可割亦宜輕輕從旁淺淺披起及諸病如攀睛胬肉雞冠蜆肉魚子石榴赤脈虯筋內睥黏輪等證可割余病及在風輪之淺者誤割之則珠破而目損烙能治殘風潰弦瘡爛濕熱久不愈者輕則不須烙而治自愈若紅障血分之病割去者必須用烙定否則不久復生在氣分之白者不須用烙凡針烙皆不可犯及烏珠不惟珠破亦且甚痛雖有惡障厚者鉤割亦宜輕輕淺淺披去外邊其內邊障底只點藥緩伐久自潛消若鐮割風毒流毒瘀血等證當以活法審視不可拘於一定針瞳神反背又與內障之針不同在心融手巧輕重得宜須口傳親見非筆下之可形容大抵鉤割針烙之治功效最速雖有撥亂反正乃乘險救危要在心小而膽大證的而部當必兼內治方盡其術目痛有二一謂目眥白眼痛一謂目珠黑眼痛蓋目眥白眼疼屬陽故晝則疼甚點苦寒藥則效經所謂白眼赤脈法於陽故也目珠黑眼疼屬陰故夜則疼甚點苦寒則反劇經所謂瞳子黑眼法於陰故也婁全善云夏枯草治目珠疼至夜則疼甚者神效或用苦寒藥點眼上反疼甚者亦神效蓋目珠者連目本目本又名目系屬厥陰之經也夜甚及用苦寒點之反甚者夜與寒亦陰故也丹溪云夏枯草有補養厥陰血脈之功其草三四月開花遇夏至陰生則枯蓋稟純陽之氣也故治厥陰目疼如神者以陽治陰也予周師目珠疼及連眉稜骨痛及頭半邊腫痛遇夜則作用黃連膏子點上則反大疼諸藥不效灸厥陰少陽則疼隨止半月又作又灸又止者月餘遂以夏枯草二兩香附二兩甘草四錢同為細末每服一錢五分用茶清調服下咽則疼減大半至四五日良愈又一男子年六十歲亦目珠連眉稜骨痛夜甚用苦寒劑點亦甚與前證皆同但有白翳二點在黑目及外眥與翳藥皆不效亦以此藥間東垣選奇湯又加四物黃連煎服並灸厥陰少陽而安倪仲賢論七情五賊勞役飢飽之病云陰陽應象大論曰天有四時以生長收藏以生寒暑燥濕風寒暑燥濕風之發耶發而皆宜時則萬物俱生寒暑燥濕風之發耶發而皆不宜時則萬物俱死故曰生於四時死於四時又曰人之五臟化為五氣以生喜怒憂悲恐喜怒憂悲恐之發耶發而皆中節則九竅俱生喜怒憂悲恐之發耶發而皆不中節則九竅俱死故曰生於五臟死於五臟目竅之一也光明視見納山川之大及毫芒之細悉雲霄之高盡泉沙之深至於鑑無窮為有窮而有窮又不能為窮反而聚之則乍張乍斂乍動乍靜為一泓一點之微者豈力為強致而能此乎是皆生生自然之道也或因七情內傷五賊外攘飢飽不節勞役異常足陽明胃之脈足太陰脾之脈為戊己二土生生之源也七情五賊總傷二脈飢飽傷胃勞役傷脾戊己既病則生生自然之體不能為生生自然之用故致其病曰七情五賊勞役飢飽之病其病紅赤睛珠痛痛如刺刺應太陽眼睫無力常欲垂閉不敢久視久視則痠疼生翳者成陷下所陷者或圓或方或長或短或如點或如縷或如錐或如鑿有犯此者柴胡復生湯主之黃連羊肝丸主之睛痛甚者當歸養榮湯主之助陽活血湯主之加減地黃丸主之決明益陰丸主之加當歸黃連羊肝丸主之龍腦黃連膏主之以上數方皆群隊升發陽氣之藥其中有用黃連黃芩之類者去五賊也搐鼻碧雲散亦可間用最忌大黃芒硝牽牛石膏梔子之劑犯所忌則病愈劇又論亡血過多之病曰六節臟象論曰肝受血而能視宣明五氣篇曰久視傷血氣厥論曰膽移熱於腦則辛頞鼻淵傳為衄衊瞑目四時刺逆從論曰冬刺經脈血氣皆脫令人目不明由此推之目為血所養明矣手少陰心生血血榮於目足厥陰肝開竅於目肝亦主血故血亡目病男子衄血便血婦人產後崩漏亡之過多者皆能病焉其證睛珠痛珠痛不能視羞明癮澀眼睫無力眉骨太陽因為痠疼芎歸補血湯主之當歸養榮湯主之除風益損湯主之滋陰地黃丸主之諸有熱者加黃芩婦人產漏者加阿膠脾胃不佳噁心不進食者加生薑復其血使得其所養則愈然要忌咸物宣明五氣篇曰咸走血血病無多食鹹是也白眼痛多有赤脈視其從上而下者太陽病也羌活為使從下而上者陽明病也升麻為使從外走內者少陽病也柴胡為使太陽病宜溫之散之陽明病宜下之少陽病宜和之又惡寒脈浮為有表宜選奇湯防風飲子等散之脈實有力大腑閉為有里宜瀉青丸洗肝散等微利之亦有不腫不紅但沙澀昏痛者乃氣分隱伏之火脾肺絡有濕熱秋天多有此患故俗謂之稻芒赤亦曰白赤眼也通用桑白皮散玄參丸瀉肺湯大黃丸洗眼青皮湯硃砂煎天行赤熱證目赤痛或睥腫頭重怕熱羞明涕淚交流等證一家之內一里之中往往老幼相傳者是也然有虛實輕重不同亦因人之虛實時氣之輕重何如各隨其所以而分經絡以發病有變為重病者有變為輕病者有不治而愈者不可概言此一章專為天時流行熱邪相感染而人或素有目疾及痰火熱病水少元虛者則爾我傳染不一其絲脈雖多赤亂不可以為赤絲亂脈證常時如是之比若感染輕而源清邪不勝正者則七日而自愈蓋火數七故七日火氣盡而愈七日不愈而有二七者乃再傳也二七不退者必其犯觸及本虛之故防他變證矣暴風客熱證非天行赤熱爾我感染之比又非寒熱似瘧目痛則病發病發則目痛之比乃素養不清躁急勞苦客感風熱卒然而發也雖有腫脹乃風熱夾攻火在血分之故治亦易退非若腫脹如杯等證久積退遲之比火脹大頭證目赤痛而頭面浮腫皮肉燥赤也狀若大頭傷寒夏月多有此患有濕熱風熱濕熱多淚而睥爛風熱多脹痛而憎寒若失治則血滯於內雖得腫消而目必有變矣羞明怕熱證謂明熱之處而目痛澀畏避不能開也凡病目者十之六七皆有此患病源在於心肝脾三經總而言之不過一火燥血熱病在陽分是以見明見熱則惡類而澀痛畏避蓋已之精光弱而不能敵彼之光是以陰黑之所則清爽怕熱無不足之證羞明有不足之證若目不赤痛而畏明者乃不足之證為血不足膽汁少而絡弱不能運精華以敵陽光之故今人皆稱為怕日羞明者俗傳音近之誤蓋日熱二音類近習俗呼誤已久不察其理遂失其正只以怕熱羞明論之其理灼然可見夫明字所包已廣何用再申日字若以日字專主陽光言之則怕熱一證無所歸矣瞼硬睛疼證不論有障無障但兩瞼堅硬而睛疼頭或痛者尤急乃風熱在肝肝虛血少不能營運於目絡水無所滋火反乘虛而入會痰燥濕熱或頭風夾搏故血滯於睥肉睛因火擊而疼輕則內生椒瘡重則為腫脹如杯瘀血灌睛等證治當傅退稍軟翻睥開導之吉若堅硬之甚且漸漸腫起而痛及頭腦雖已退而復來其脹日高雖敷治不退不軟者此頭風欲成毒也宜服通肝散二術散若有障膜用春雪膏點之赤痛如邪證每目痛則頭亦痛寒熱交作如瘧狀凡病發則目痛目痛則病發輕則一年數發重則一月數發蓋肝腎俱虛之故熱者內之陰虛火動邪熱也寒者榮衛虛外之腠理不實而覺寒也若作風寒瘧疾或用峻削之治則血愈虛而病愈深矣宜小柴胡合四物湯主之不效則活血益氣湯氣眼證才怒氣則目疼宜酒調復元通氣散痛如針刺證目珠痛如針刺病在心經實火有餘之證若痛驀然一二處如針刺目雖不赤亦是心經流火別其痛在何部分以見病將犯其經矣宜服洗心散次服還睛散及乳香丸補肝散按此證多有體勞目勞榮氣不上潮於目而如針刺之痛者宜養其榮若降火則殆矣熱結膀胱證目病則小便不通利而頭疼寒熱者方是若小便清利者非也乃熱蒸於膀胱先利清其水後治其目則愈矣蓋太陽經脈循目絡上行巔頂故頭疼火極則兼水化又血虛者表疏故發寒熱熱甚則水氣閉澀而神水被蒸乏潤安得不竭大小雷頭風證此證不論偏正但頭痛倏疾而來疼至極而不可忍身熱目痛便秘結者曰大雷頭風若痛從小至大大便先潤後燥小便先清後澀曰小雷頭風大者害速小者稍遲雖有大小之說而治則同一若失緩禍變不測目必損壞輕則米厭凸重則結毒宜早為之救免於禍成而救之不逮世人每慮此患害速故疑於方犯惑於鬼祟深泥巫祝而棄醫治遂致禍成悔無及矣左右偏頭風證左邊頭痛右不痛曰左偏風右邊頭痛左不痛曰右偏風世人往往不以為慮久則左發損左目右發損右目有左損反攻右右損反攻左而二目俱損者若外有赤痛淚熱等病則外證生若內有昏眇眩暈等病則內證生矣凡頭風痛左害左痛右害右此常病易知者若難知者左攻右右攻左痛從內起止於腦則攻害也遲痛從腦起止於內則攻害也速若痛從中間發及眉梁內上星中發者兩目俱害亦各因其人之觸犯感受左右偏勝起患不同遲速輕重不等然風之害人尤慘若能保養調護亦可免患愚者驕縱不知戒忌而反觸之以致患成而始悔良可痛哉陰邪風證額板骨眉稜骨痛也發則多於六陽用事之時元虛精弱者則有內證之患若兼火者則有外證之病陽邪風證腦後枕骨痛也多發於六陰用事之月發則有虛運耳鳴之患久而不治內障成矣卒腦風證太陽內如槌似鑽一團而痛也若痛及目珠珠外有赤脈縱貫及瘀滯者必有外之惡證來矣若珠不赤痛只自覺視如雲遮霧障漸漸昏眇者內證成矣急早治之以免後慮巔頂風證天靈蓋骨內痛極如槌如鑽也陽分痛尤甚陰分痛稍可夾痰濕者每痛多眩暈若痛連及珠子而脹急瘀赤者外證之惡候若昏眇則內證成矣成內證者尤多於外者遊風證頭風痛無常位一飯之頃遊易數遍而不能度其何所起止也若痛緩而珠赤赤而有障起者必變外障痛甚而腫脹緊急者必有瘀滯之患久而失治不赤痛而昏眇者內證來成外證者多然為害遲如各風耳邪風證人素有頭風因而目病或素目病因而頭風二邪並立搏夾而深入腦袋致傷肝膽諸絡故成此患頭痛則目病目病則頭痛輕則一年數發重則一月數發頭風目病常並行而不相悖也非若雷頭風風火搏激而瘀滯之急者又非若天行赤熱傳染之邪客風暴熱之風火寄旅無定及諸火脹頭痛之比此專為自家本病久成者非若彼之標病新來之輕者若赤痛脹急則有外證之候若無赤痛而只內脹及赤痛不甚無瘀滯之證而只昏眇者內證成矣目赤內經目赤有三一曰風助火鬱於上經云少陰司天之政二之氣陽氣布風乃行寒氣時至民病目瞑目赤氣鬱於上而熱又云少陽司天之政初之氣風勝乃搖候乃大溫其病氣怫於上目赤是也二曰火盛經曰火太過曰赫曦赫曦之紀其病目赤又云火鬱之發民病目赤心熱又曰少陽司天之政三之氣炎暑至目赤又云少陽之勝目赤是也三曰燥邪傷肝經云歲金太過燥氣流行民病目赤又云陽明司天燥氣下臨肝氣上從脅痛目赤是也倪仲賢論心火乘金水衰反制之病曰天有六邪風寒暑濕燥火也人有七情喜怒憂思悲恐驚也七情內召六邪外從從而不休隨召見病此心火乘金水衰反制之原也世病目赤為熱人所共知者也然不審其赤分數等治各不同有白睛純赤熱氣炙人者乃淫熱反克之病也治如淫熱反克之病有白睛赤而腫脹外睫虛浮者乃風熱不制之病也治如風熱不制之病有白睛淡赤而細脈深紅縱橫錯貫者乃七情五賊勞役飢飽之病也治如七情五賊勞役飢飽之病有白睛不腫不脹忽如血貫者乃血為邪勝凝而不行之病也治如血為邪勝凝而不行之病有白睛微變青色黑睛稍帶白色白黑之間赤環如帶謂之抱輪紅者此邪火乘金水衰反制之病也此病或因目病已久抑鬱不舒或因目病誤服寒涼藥過多或因目病時內多房勞皆能內傷元氣元氣一虛心火亢盛故火能剋金金乃手太陰肺白睛屬肺水乃足少陰腎黑睛屬腎水本剋火水衰不能克反受火制故視物不明昏如霧露中或睛珠高低不平其色如死甚不光澤赤帶抱輪而紅也口乾舌苦眵多羞澀稍有熱者還陰救苦湯主之黃連羊肝丸主之川芎決明散主之無口乾舌苦眵多羞澀者助陽活血湯主之神驗錦鳩丸主之萬應蟬花散主之有熱無熱俱服千金磁朱丸鎮墜心火滋益腎水榮養元氣自然獲愈也噫天之六邪未必能害人也唯人以七情召而致之也七情匿召六邪安從反此者豈止能避而已哉猶當役之而後已也論淫熱反克之病曰膏粱之變滋味過也氣血俱盛稟受厚也亢陽上炎陰不濟也邪入經絡內無御也因生而化因化而熱熱為火火性炎上足厥陰肝為木木生火母妊子子以淫勝禍發反克而肝開竅於目故肝受克而目亦受病也其病眵多眊矂緊澀赤脈貫睛臟腑秘結者為重重者芍藥清肝散主之通氣利中丸主之眵多眊矂緊澀赤脈貫睛臟腑不秘結者為輕輕者減大黃芒硝芍藥清肝散主之黃連天花粉丸主之少盛服通氣利中丸目眶爛者內服上藥外以黃連蘆甘石散收其爛處兼以點眼春雪膏龍腦黃連膏搐鼻碧雲散攻其淫熱此治淫熱反克之法也非膏粱之變非氣血俱盛非亢陽上炎非邪入經絡毋用此也用此則寒涼傷胃生意不上升反為所害論風熱不制之病曰風動物而生於熱譬以烈火焰而必吹此物類感召而不能違間者也因熱而召是為外來久熱不散感而自生是為內發內外為邪唯病則一淫熱之禍條已如前益以風邪害豈纖止風加頭痛風加鼻塞風加腫脹風加涕淚風加腦巔沉重風加眉骨痠疼有一於此羌活勝風湯主之風加癢則以杏仁龍腦草泡散洗之病者有此數證或不服藥或誤服藥翳必隨之而生矣余文詳外障條七情五賊勞役飢飽之病見目痛論血為邪勝凝而不行之病曰血陰物類地之水泉性本靜行其勢也行為陽是陰中之陽乃坎中有火之象陰外陽內故行也純陰故不行也不行則凝凝則經絡不通經曰足陽明胃之脈常多氣多血又曰足陽明胃之脈常生氣生血手太陽小腸之脈斜絡於目眥足太陽膀胱之脈起於目內眥二經皆多血少氣血病不行血多易凝靈蘭秘典論曰脾胃者倉廩之官五味出焉五味淫則傷胃胃傷血病是為五味之邪從本生也又曰小腸者受盛之官化物出焉遇寒則阻其化又曰膀胱者州都之官津液藏焉遇風則散其藏一阻一散血亦病焉是為風寒之邪從末生也凡是邪勝血病不行不行漸滯滯則易凝凝則病始外見以其斜絡目眥耶以其起於目內眥耶故病環目青黤如被物傷狀重者白睛亦黤輕者或成斑點然不痛不癢無淚眵眊矂羞澀之證是曰血為邪勝凝而不行之病此病初起之時大抵與傷風證相似一二日則顯此病也川芎行經散主之消凝大丸子主之睛痛者更以當歸養榮湯主之如此則凝復不滯滯復能行不行復行邪消病除血復如故戴復庵云赤眼有數種氣毒赤者熱壅赤者有時眼赤者無非血壅肝經所致蓋肝主血通竅於眼赤眼之病大率皆由於肝宜黑神散消風散等分白湯調食後睡時服仍用豆腐切片敷其上鹽就者可用酸漿者不可用即烏豆敷盦之意風熱赤甚者於黑神散消風散二藥中放令消風頭高間以折二泔睡時冷調洗肝散或菊花散服仍進四物湯內用生地黃赤芍藥只須半帖食後作一服卻加赤茯苓半錢醉將軍一錢即酒蒸大黃早晨鹽湯下養正丹二三十粒若不便於過涼之劑則不必用洗肝散宜黑神散二錢消風散一錢尋常赤眼用黃連研末先用大菜頭一個切了蓋剜中心作一竅入連末在內復以蓋遮住竹籤簽定慢火內煨熟取出候冷以菜頭中水滴入眼中若赤眼久而不愈用諸眼藥無效者早起以蘇子降氣湯下黑錫丹日中以酒調黑神散臨睡以消風散下三黃丸此數藥不獨治久赤諸眼疾皆治之海藏云目赤暴作雲翳痛不可忍宜四物龍膽湯眼赤暴發腫散熱飲子瀉青丸肝臟實熱眼赤疼痛竹葉湯龍膽飲決明子湯麥門冬湯瀉肝散羊肝丸服寒涼藥太過目赤而不痛內服助陽和血補氣湯外用碧天丸洗之目赤腫足寒者必用時時溫洗其足並詳赤脈處屬何經灸三里臨泣崑崙等穴立愈赤眼癢痛煎枸杞汁服治暴赤眼古銅錢刮淨姜上取汁於錢唇點目熱淚出隨點隨愈有瘡者不可用或削附子赤皮末加蠶屎著眥中或本事針頭丸皆治陰病目赤九節黃連秦皮粗末加滑石煎湯洗或用艾燒煙以碗蓋之候煙上煤取下入黃連以溫水調洗及前煨菜汁方皆治陽病目赤瘀血灌睛證為病最毒若人偏執己見不用開鐮者其目必壞初起不過紅赤次後紫脹及後則白珠皆脹起甚則脹為形如蝦座蓋其病乃血灌睛中瘀塞不通在睥則腫脹如杯椒瘡之患在珠則白輪湧起凝脂翳黃膜上衝痕米厭成窟花翳白陷鶻眼凝睛等惡證出也失治者必有青黃牒出米厭凸之禍凡見白珠赤紫睥腫虯筋紫脹敷點不退必有瘀滯在內可翻睥內視之若睥內色暈泛浮椒瘡或粟瘡者皆用導之之法則吉不然將有變證生焉宜服宣明丸分珠散麥門冬湯通血丸及膝歸糖煎散等劑血灌瞳神證謂視瞳神不見其黑瑩但見其一點鮮紅甚則紫濁色也病至此亦甚危且急矣初起一二日尚可救遲則救亦不愈不但不愈恐其人亦不久蓋腎之真一有傷膽中精汁皆損故一點元陽神氣靈光見其血之英色而顯於腎部十患九不治者今人但見瘀血灌睛便呼為血灌瞳神謬矣色似胭脂證不論上下左右但見一片或一點紅血儼似胭脂抹者是也此血不循經絡而來偶然客遊肺膜之內滯成此患若欲速愈者略略於相近處睥內開導治之或就於所滯之處開之亦好若畏開者內外夾治亦退只是稍遲獨於內治亦退其效尤遲亦有寡欲慎火者不治自愈若犯禁而變則瘀滯轉甚因而感激風熱者他證生焉赤脈貫睛證或一赤脈或二三赤脈不論粗細多少但在這邊氣輪上起貫到風輪經過瞳外接連那邊氣輪者最不易治且難退而易來細者稍輕粗者尤重從上下者重從下上者稍輕貫過者有變證絲粗及有傍絲虯亂者有變證凡各障外有此等脈窧者雖在易退之證亦退遲也貫雖未連而侵入風輪或一半或三分之二之一皆不易退蓋得生氣之故也此證專言脈已掛侵風輪之重非比赤絲亂脈止在氣輪之輕者今人但見絲脈便呼為赤脈貫睛非也夫絲脈在風輪氣輪上下粗細連斷為病各有緩急常變不同既不能明其證又何能施療乎赤絲亂脈證謂氣輪有絲脈赤亂久久常如是者然害各不同或因目痛火雖退不守禁戒致血滯於絡而赤者或因冒風沙煙瘴親火向熱鬱氣勞心恣酒嗜燥竭視勞瞻而致有所鬱滯而赤者有痛不痛有淚無淚有羞明不羞明為病不等蓋病生在氣輪白珠上有絲脈縱橫或稀密粗細不等但常常如是久而不愈者也非若天行客風等證之暴壅赤脈貫睛之難惡者比若只赤亂或昏昧澀緊不爽或有微微淚濕者輕因而犯戒者雙重若脈多赤亂兼以枯澀而緊痛淚濕而爛腫者重驗之當以大脈為主從何部分而來或穿連某位即別其所患在何經絡或傳或變自病合病等證分其生克承製然後因其證而投其經以治之治外者細脈易退大脈虯紫者退遲雖點細而脈大者必須耐久去盡方已庶無再來之患不然他日犯禁其病復發若有別證火亦循此而至凡絲脈沿到風輪上者病尤重而能變若因其滯而日積月累一旦觸發脈紫脹及睥腫者用開導之凡見絲脈虯紫內服外點點時細縮不點即脹久久亦然及因而激動滯病變者珠雖不紫睥雖不腫亦有積滯在內深處乃積滯尚輕而在絡中幽深之所故未脹出耳揭開上睥深處看之其內必有不平之色在焉因其滯而量其輕重略略導之不可過過則有傷真血水虧膏澀目力昏弱之患附目珠俱青證乃目之白珠變青藍色也病在至急蓋氣輪本白被郁邪蒸逼走散珠中膏汁游出在氣輪之內故色變青藍瞳神必有大小之患失治者瞳神損而為終身痼疾矣然當各因其病而治其本如頭風者風邪也傷寒瘧疾痰火熱邪也因毒者毒氣所攻也余仿此目腫脹風眼腫用枸杞白皮雞子白皮等分研令極細每日三次吹鼻內肝經實熱眼赤腫痛麥門冬湯瀉肝散龍膽飲風熱上攻目赤腫痛金絲膏琥珀煎滌風散白睛腫脹痛大黃丸桑白皮散洗眼青皮湯玄參丸瀉肺湯硃砂煎腫脹如杯證謂目赤痛睥脹如杯覆也是邪在木火之有餘蓋木剋土火生土今肝邪實而傳脾土土受木克而火不能生火邪反乘虛而為炎燥之病其珠必疼尤重而睥亦急硬若暴風客熱作腫者必熱淚多而珠疼稍緩然風熱自外客感易退治亦易愈若木火內自攻擊則病亦退遲重則疼滯閉塞血灌睛中而變證不測矣須用開導之法輕則敷治而退重則必須開導此大意也若敷治不退及退而復來並開導不消消而復發痛連頭腦而腫愈高睥愈實者此風熱欲成毒之候也形如蝦座證因瘀滯已甚血脹無所從出遂致壅起氣輪狀如蝦座甚則吐出睥外者病尤急非比魚胞氣分之可緩者瘀血灌睛證與此證病雖一種灌睛則概言而未至於極此則極矣有半邊脹起者有通珠俱被脹起蓋定烏珠者又有大眥內近鼻梁處脹出一片如皮如肉狀似袋者乃血脹從額前中落來故脹起了大眥里白上寬皮也不可割為血英在此處誤割者為漏為瞎不可不辨認仔細只用開導血漸去而皮漸縮小眥脹出如袋者亦然其病大意是血氣兩盛之患宜以開導為先次看餘證從而治之在肺部最重久則移傳於肝而風輪有害也狀如魚胞證氣輪努脹不紫不赤或水紅或白色狀如魚胞乃氣分之證金火相搏所致不用鐮導唯以清涼則自消復若有微紅及赤脈者略略於上睥開之不可過此亦是通氣之說雖不通亦可若頭痛淚熱及內燥而赤脈多者防有變證宜早導之庶無後患鶻眼凝睛證有項強頭疼面臉赤燥之患其狀目如火赤綻大脹於睥間不能斂運轉動若廟塑凶神之目猶鶻鳥之珠赤而綻凝者凝定也乃三焦關格陽邪實盛亢極之害風熱壅阻諸絡澀滯目欲爆出矣大宜於內迎香太陽兩睥上星等處要隘之所並舉而劫治之因風成毒證初發時乃頭風濕熱瘀血灌睛瞼硬睛疼等病失於早治雖治不得其法遂致邪盛搏夾成毒睥與珠通行脹出如拳似碗連珠帶腦痛不可當先從烏珠爛起後爛氣輪有爛沿上下瞼並腦及顴上肉盡空而死若飲食少脾泄臟結者死尤速若能飲食而臟調者死遲人至中年患此者百無一二可生若患頭疼腫脹珠凸等證治退復發再治再發痛脹如前者即成此患若已成者雖治之脹少退痛少止決又發發時再治至於數四終當一發不復退矣既成此證必無可生之理未成者十分用心調攝療治得宜猶有可生凡目病但見頭腦痛甚珠及睥脹而瘀努硬緊雖敷鐮亦不軟總開時略軟少頃如故者皆此病來也宜向內尋其源而救之庶無噬臍之悔旋臚泛起證氣輪自平水輪自明唯風輪高泛起也或只半邊泛起者亦因半邊火來之故乃肝氣獨盛膽液滯而木道澀火鬱風輪故隨火脹起或在下或在上或在兩旁各隨其火之所來從上脹者多非比旋臚尖起已成證而俱凸起頂尖不可醫者乃止言風輪脹起者耳旋螺尖起證乃氣輪以里烏珠大概高而綻起如螺師之形圓而尾尖視烏珠亦圓綻而中尖高故曰旋螺尖起因亢滯之害五氣壅塞故脹起烏珠在肝獨盛內必有瘀血初起可以平治失於內平之法則瘀雖退而氣定膏凝不復平矣病甚膏傷者珠外亦有病如橫翳玉翳水晶沉滑等證在焉蓋初起時本珠欲凸之候因服寒涼之劑救止但失於戕伐木氣故血雖退而絡凝氣定不復平也神珠自脹證目珠脹也有內外輕重不同若輕則自覺目內脹急不爽治亦易退重則自覺脹痛甚甚則人視其珠亦覺漸漸脹起者病亦發見於外已甚大凡目珠覺脹急而不赤者火尚微在氣分之間痛者重重則變赤痛脹急重者有瘀塞之患疼滯甚而脹急珠覺起者防鶻眼之禍若目不赤止覺目中或脹或不脹時作有止不一者為火無定位遊客無常之故有風邪濕熱氣勝怫鬱者皆有自脹之患但經血部至於痛者皆重而有變矣珠突出眶證烏珠忽然突出眶也與鶻眼證因滯而慢慢脹出者不同其故不一有因真元將散精華衰敗致絡脈俱損癢極揩擦而出者其人不久必死有酒醉怒甚及嘔吐極而䦛出者有因患火證熱盛而關格亢極而脹出者有因怒甚吼喊而䦛出者此皆因水液衰少精血耗損故脈絡澀脆氣盛極火無所從出出而竅澀泄之不及故湧脹而出亦有因打撲而出者凡出雖離兩瞼而脈皮未斷者乘熱捺入雖入脈絡損動終是光損若突出閣在瞼中而含者易入光不損若離瞼脈絡皮俱斷而出者雖華佗復生不能救矣目癢因風而癢者驅風一字散因火而癢者於赤痛門求降火之劑因血虛而癢者四物湯癢若蟲行證非若常時小癢之輕乃如蟲行而癢不可忍也為病不一須驗目上有無形證決其病之進退至如有障無障皆有癢極之患病源非一有風邪之癢有血虛氣動之癢有虛火入絡邪氣行動之癢有邪退火息氣血得行脈絡通暢而癢大凡有病之目常時又不醫治而自作癢者癢一番則病重一番若醫治後而作癢病必去速若癢極難當時時頻作目覺低陷者命亦不久有極癢而目脫者死期至矣癢而淚多者血虛夾火大抵痛屬實癢屬虛雖有火亦是邪火乘虛而入非其本病也外障在睛外遮暗內經診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病按此論表裡之翳明矣用以治病如鼓應桴也凡赤脈翳初從上而下者屬太陽以太陽主表其病必連眉稜骨痛或腦頂痛或半邊頭腫痛是也治法宜溫之散之溫則臘茶鹽川附等分煎服立愈薛立齋嘗以此證用川附一錢作一服隨愈一方附子半兩芽茶一大撮白芷一錢細辛川芎防風羌活荊芥各半錢煎服神效散則簡要夏枯草散必與退云丸相兼服東垣選奇湯羌活除翳湯之類是也赤脈翳初從下而上者或從內眥出外者皆屬陽明以陽明主裡其證多熱或便實是也治法宜下之寒之下則局方流氣飲錢氏瀉青丸局方溫白丸加黃連黃柏之類累用累驗寒則一味黃連羊肝丸之類是也婁全善云妻侄女形肥笄年時得目疾每一月或二月一發發時紅腫澀痛難開如此者三年服除風散熱等劑及尋常眼藥則左目反有頑翳從銳眥來遮瞳神右目亦有翳從下而上經云從外走內者少陽病從下上者陽明病予謂此少陽陽明二經有積滯也脈短滑而實晨則似短潔古云短為有積滯遏抑臟腑宜下之遂用溫白丸減川芎附子三之二多加龍膽黃連如東垣五積法從二丸每日加一丸加至大利然後減丸又從二丸加起忽一日於利下下黑塊血若干如墨大而硬堅從此漸覺痊而翳盡去矣赤脈翳初從外眥入內者為少陽以少陽主半表半裡治法宜和解之神仙退云丸羌活退翳湯消翳散之類是也翳膜者風熱重則有之或斑入眼此肝氣盛而發在表也翳膜已生在表明矣宜發散而去之若反疏利則邪氣內搐為翳益深邪氣未定謂之熱翳而浮邪氣已定謂之冰翳而沉邪氣牢而深者謂之陷翳當以焮發之物使其邪氣再動翳膜乃浮佐之以退翳之藥而能自去也病久者不能速效宜以歲月除之新翳所生表散方東垣羌活除翳湯有熱者退云丸之類焮發陷翳保命集羚羊角散之類用之在人消息若陰虛有熱者兼服神仙退云丸東垣云陽不勝其陰乃陰盛陽虛則九竅不通令青白翳見於大眥乃足太陽少陰經中郁遏足厥陰肝經氣不得上通於目故青白翳內阻也當於太陽少陰經中九原之下以益肝中陽氣衝天上行此當先補其陽後於足太陽少陰標中瀉足厥陰肝經陰火乃次治也內經曰陰盛陽虛則當先補其陽後瀉其陰此治法是也每日清晨以腹中無宿食服補陽湯食遠服升陽泄陰丸臨臥服連柏益陰丸若天色變大寒大風並大勞役預日飲食不調精神不足或氣弱俱不得服候體氣和平天氣如常服之先補其陽使陽氣上升通於肝經之末利空竅於眼目矣魏邦彥夫人目翳暴生從下而起其色綠腫痛不可忍先師曰翳從下而上病從陽明是也綠非五方之正色殆肺腎合為病邪乃就畫家以墨膩粉合成色諦視之與翳同色肺腎為病無疑矣乃瀉肺腎之邪而入陽明之藥為之使既效而他日病復作者三其所從來之經與翳色各異乃以意消息之曰諸脈皆屬於目脈病則從之此必經絡不調則目病未已也問之果然因視所不調者治之病遂不作翳除盡至其年月日期復發者或間一月或二月一發皆為積治如脈滑者宜溫白丸加黃連草龍膽如東垣五積法服之倪仲賢論風熱不制之病曰翳如雲霧翳如絲縷翳如秤星翳如秤星者或一點或三四點而至數十點翳如螺蓋者為病久不去治不如法至極而致也為服寒涼過多脾胃受傷生意不能上升漸而致也然必要明經絡庶能應手翳凡自內眥而出為手太陽足太陽受邪治在小腸膀胱經加蔓荊子蒼朮羌活勝風湯主之自銳眥客主人而入者為足少陽手少陽手太陽受邪治在膽與三焦小腸經加龍膽草藁本少加人參羌活勝風湯主之自目系而下者為足厥陰手少陰受邪治在肝經心經加黃連倍加柴胡羌活勝風湯主之自抵過而上者為手太陽受邪治在小腸經加木通五味子羌活勝風湯主之熱甚者兼用治淫熱之藥搐鼻碧雲散俱治以上之證大抵如開鍋法搐之隨效然力少而銳宜不時用之以聚其力雖然始者易而久者難漸復而復漸復而又復可也急於復者則不治今世醫用磨翳藥者有之用手法揭翳者有之噫翳猶瘡也奚斯愈乎非徒無益而又害之論奇經客邪之病曰人之有五臟者猶天地之有五嶽也六腑者猶天地之有四瀆也奇經者猶四瀆之外別有江河也奇經客邪非十二經之治也十二經之外別有治奇經之法也繆刺論曰邪客於足陽蹺之脈令人目痛從內眥始啟玄子王冰注曰以其脈起於足上行至頭而屬目內眥故病令人目痛從內眥始也針經曰陰蹺脈入鼽屬目內眥合於太陽陽蹺而上行故陽蹺受邪者內眥即赤生脈如縷縷根生瘀肉瘀肉生黃赤脂脂橫侵黑睛漸蝕神水此陽蹺為病之次第也或兼銳眥而病者以其合於太陽故也銳眥者手太陽小腸之脈也銳眥之病必輕於內眥者蓋枝蔓所傳者少而正受者必多也俗呼為攀睛即其病也還陰救苦湯主之撥雲退翳丸主之梔子勝奇散主之萬應蟬花散主之磨障靈光膏主之消翳復明膏主之朴硝黃連蘆甘石泡散主之病多藥不能及者宜治以手法先用冷水洗如針內障眼法以左手按定勿令得動移略施小眉刀尖剔去脂肉復以冷水洗淨仍將前藥餌之此治奇經客邪之法也故並置其經絡病始七情五賊勞役飢飽之病見目痛條內急外弛之病見倒睫拳毛黃膜上衝證在風輪下際坎位間神膏之內有翳生而色黃如年少人指甲內際白岩相似與凝脂翳同一氣脈但凝脂翳在輪外生點藥可去者此則在膏內熱蒸起點藥所不能除若漫及瞳神其珠必損不可誤認為湧波可緩者之證此是經絡阻塞極甚三焦關格火土邪之盛實者故大便秘小便澀而熱蒸從膏內作膿潰起之禍也失治者目有米厭凸之患通脾瀉胃湯神消散皂角丸犀角飲選用赤膜下垂證初起甚薄次後甚大大者病急其患有障色赤多赤脈貫白輪而下也烏珠上半邊近白際起障一片仍有赤絲牽絆障大絲粗赤甚淚澀珠疼頭痛者病急而有變絲細少色微赤珠不疼頭不痛者緩而未變亦有珠雖不疼頭亦不痛若無他證或只澀赤而生薄障障上仍有細絲牽絆或於障邊絲下仍起星數點此星亦是凝脂之微病也此等皆是火在內滯之患其病尚輕治亦當善蓋無形之火潛入膏內故作是疾非比有形血熱之重也若障上有絲及星生於絲稍皆是退遲之病為接得絲脈中生氣故易生而難退雖然退遲翳薄絲細赤不甚者只用善逐之足矣甚者不得已而開導之大抵白珠上半邊有赤脈生起垂下到烏珠者不論多寡但有疼痛虯赤便是凶證來了總是絲少赤微但從上而落者退亦遲治當耐久若貫過瞳神者不問粗細聯斷皆退遲此證是濕熱在腦幽隱之火深潛在絡故有此脈之赤四圍雖無瘀血其深處亦有積滯緣滯尚深而火尚伏故未甚耳一旦觸發則其患迸發疾亦盛矣內無澀滯外無此病輕者消散重者開導此定法也內服炙肝散外用紫金膏點之次服通肝散神消散皂角丸凝脂翳此證為病最急起非一端盲瞽者十有七八在風輪上有點初起如星色白中有米厭如針刺傷後漸長大變為黃色米厭亦漸大為窟者有初起如星色白無米厭後漸大而變色黃始變出米厭者有初起便帶鵝黃色或有米厭或無米厭後漸漸變大者或初起便成一片如障大而厚色白而嫩或色淡黃或有米厭或無米厭而變者或有障又於障內變出一塊如黃脂者或先有痕米厭後變出凝脂一片者所變不一禍則一端大法不問星障但見起時肥浮脆嫩能大而色黃善變而速長者即此證也初起時微小次後漸大甚則為窟為漏為蟹睛內潰精膏外為枯凸或氣極有聲爆出稠水而破者此皆郁遏之極蒸爍肝膽二絡清氣受傷是以蔓及神膏潰壞雖遲不過旬日損及瞳神若四圍見有瘀滯者因血阻道路清汁不得升運之故若四圍不見瘀赤之甚者其內絡深處必有阻滯之故凡見此證當作急曉夜醫治若遲待長大蔽滿烏珠雖救得珠完亦帶病矣去後珠上必有白障如魚鱗外圓翳等狀終身不能脫若結在當中則視昏眇凡目病有此證起但是頭疼珠痛二便燥澀即是急之極甚若二便通暢禍亦稍緩有一於斯猶為可畏花翳白陷證因火爍絡內膏液蒸傷凝脂從四圍起而漫神珠故風輪皆白或微黃視之與混障相似而嫩者大法其病白輪之際四圍生漫而來漸漸厚闊中間尚青未滿者瞳神尚見只是四圍高了中間低了些此金剋木之禍也或有就於脂內下邊起一片黃膜此二證夾攻尤急亦有上下生起名順逆障內變為此證者此火土鬱遏之禍也亦有不從沿際起只自凝脂翳色黃或不黃初小後大其細條如翳或細顆如星這邊起一個那邊起一個四散生將起來後才長大牽連混合而害目此木火禍也以上三者必有所滯治當尋其源濬其流輕則清涼之重則開導之若病漫及瞳神不甚厚重者速救亦有挽回之理但終不得如舊之好凡疾已甚雖瞳神隱隱在內亦不能救其無疾止可救其米厭凸而已知母飲子桑白皮湯蟹睛證謂真睛膏損凝脂翳破壞風輪神膏綻出黑顆小則如蟹睛大則如黑豆甚則損及瞳神內視瞳神亦如杏仁棗核狀者極甚則細小無了者至極則青黃牒出者此證與黑翳如珠狀類而治大不同夫黑翳如珠源從膏內生起非若此因破而出故大不同然有虛實二證虛者軟而不疼來遲去速實者堅而多痛來速去遲其視有二其治則一雖有妙手難免瘢黶之患斑脂翳證其色白中帶黑或帶青或焦黃或微紅或有細細赤脈絆罩有絲絆者則有病發之患以不發病者論大略多者粉青色結在風輪邊傍大則掩及瞳神掩及瞳神者目亦減光雖有神手不能除去治者但可定其不垂不發亦須內外夾治得氣血定久瘢結牢固庶不再發若治欠固或即縱犯則斑跡發出細細水泡時起時隱甚則發出大泡起而不隱又甚則於本處作痛或隨絲生障或蟹睛再出矣其病是蟹睛收回結疤於風輪之側非若瑪瑙內傷因內傷氣血結於外生之證猶有可消之理故治亦不同耳黃油證生於氣輪狀如脂而淡黃浮嫩乃金受土之濕熱也不腫不疼目亦不昏故人不求治無他患至老只如此略有目疾發作其證則為他病之端矣揭開上睥目上邊氣輪上有黃油者是濕熱從腦而下目必有病又非兩傍可緩之比或有頭風之患然此病為患又緩治亦容易但不治者恐貽後患故宜預自保重而去之癘風目上有此者又重與常人不同狀如懸膽證有翳從上而下貫及瞳神色青或斑上尖下大薄而圓長狀如膽懸以此得名蓋腦有瘀熱肝膽膏汁有損變證急來之候宜作緊醫治若眼帶細細赤脈紫脹而來者尤急頭疼者尤惡內必有滯急向四圍尋其滯而通之庶免損壞之患玉粒分經此證或生於睥或生於氣輪生於氣輪者金火亢承之證燥熱為重生於睥者濕熱為重由土之燥滯其形圓小而顆堅淡黃色或白肉色當辨其所生部分而治之故曰玉粒分經初起不疼治亦易退亦有輕而自愈者若恣酒色嗜辛熱火毒多怒忿躁急之人及久而不治因而積久者則變大大而堅堅而疼或變大而低潰色白或淡黃如爛瘡相似者證尚輕若復不知禁忌且犯戒者則爛深爛深復至於不戒不治者則變為漏矣不可誤認為粟瘡銀星獨見烏珠上有星獨自生也若連萃而相生相聚者不是星蓋星不能大大而變者亦不是有虛實自退不退之證虛實者非指人之氣血而言乃指絡間之火而言若絡間之虛火客遊因而鬱滯於風輪結為星者其火無源不得久滯火退氣散膏清而星自消若火有源而來氣實壅滯於絡者則水不清故星結不散其色白圓而顆小浮嫩者易退易治沉澀堅滑者宜作急治之恐滯久氣定治雖退而有跡為冰瑕矣夫星者猶天之有星由二氣而結其大小亦由積受盛衰之所致無長大之理故人之患星亦由火在陰分故為星星亦不能大若能大者此必是各障之初起也障猶云云隨天地之氣而聚散障因人之激戒而消長即如凝脂一證初起白顆小而圓嫩儼然一星不出一二日間漸漸長大因而觸犯遂致損目若誤認為星則謬於千里矣亦有凝脂雖成因無根客火鬱在膏中作此一點無所觸犯善於護養水清而退者便謂是星退醫者亦謂是星退遂誤認為星終身執泥不改者誤人多矣每見世人用愚夫蠢婦執草掄絲朝燈對日呪咀詭魘謂之結眼間有凝脂水晶銀星虛火聚開翳障等證偶然而退遂以為功駭羨相傳眇醫棄藥智者尚蒙其害況愚人乎夫人之目因氣血不能清順是故壅滯而生病焉調養緘護尚恐無及乃反勞掙強視搏此陽光即無病之目精強力盛者且不能與之敵而況病目能無損乎雖幸自病退者光亦渺茫難醒大凡見珠上有星一二顆散而各自生過一二日看之不大者方是若七日而退者火數盡之故若連萃貫串相生及能大者皆非星也又有一等愚人看各色障翳亦呼為星者抑又謬之甚矣聚開障證謂障或圓或缺或厚或薄或如雲似月或數點如星痛則見之不痛則隱聚散不一來去無時或月數發或年數發乃腦有濕熱之故痰火人患者多久而不治方始生定因而觸犯者有變證生成不退各隨所發形證而驗之鎮心丸退血散連翹散磨睛膏美玉散聚星障證烏珠上有細顆或白色或微黃微黃者急而變重或聯綴或團聚或散漫或一同生起或先後逐漸一而二二而三三而四四而六七八十數余如此生起者初起者易治生定者退遲能大者有變團聚生大而作一塊者有凝脂之變聯綴四散傍風輪白際而起變大而接連者花翳白陷也若兼赤脈爬絆者退遲若星翳生於絲盡頭者亦退遲進速且有變蓋接得脈絡生氣之故此證大抵多由痰火之患能保養者庶幾斫喪犯戒者變證生焉羚羊角散垂簾障證生於風輪從上邊而下不論厚薄但在外色白者方是若紅赤乃變證非本病也有初起水膏不清而便成此者有起先赤色火退後膏澀結為此者因其自上而下如簾之垂故得此名有證數般相似緩急不同治亦各異不可誤認混呼而誤人一胬肉初生亦在風輪上邊起但色如肉且橫厚不同一偃月侵睛亦在上邊起是氣輪膜內垂下白色而薄與此在外有形者不同一赤膜下垂因瘀滯火實之急者不同此則只是白障漫漫生下來而為混障者間有紅亦是略略微紅而已因其觸犯搏動其火方有變證其病從上而下本當言順何以逆稱蓋指火而言火本炎上今反下垂是其逆矣羌活除翳湯湧波翳證障從輪外自下而上故曰湧波非黃膜上衝從內向上之急甚者可比白者緩而不變赤者急而有變亦有激犯變發他證者就於此障之內變出黃膜治宜先去上衝後治此證則萬無一失矣流氣飲逆順障證色赤而障及絲脈赤亂縱橫上下兩邊生來若是色白而不變者乃是治後凝定非本證生來如是治亦不同若色浮嫩能大或微黃色者又不是此證乃花翳白陷也凡見風輪際處由白珠而來無數粗細不等赤脈周圍圈圓侵入黑睛黑睛上障起昏澀者即此證必有瘀滯在內蓋滯於左則從左而來滯於右則從右而來諸絡皆有所滯則四圍而來睥雖不赤腫珠雖不脹痛亦有瘀滯於內不可輕視若傷於膏水則有翳嫩白大而變為花翳白陷若燥澀甚者則下起一片變為黃膜上衝之證若頭疼珠痛脹急者病又重而急矣消翳散陰陽翳證烏珠上生二翳俱白色一中虛一中實兩翳聯串如陰陽之圖若白中略帶焦黃色或純白而光滑沉澀者皆不能去盡若有細細赤絲絆者退尤遲大抵此證非心堅耐久不能得其效也羌活退翳散瑪瑙內傷證其障薄而不厚圓斜不等其色昏白而帶焦黃或帶微微紅色但如瑪瑙之雜者是雖生在輪外實是內傷肝膽真氣清液受傷結成此翳最不能治盡或先有重病退後結成者久久耐心醫治方得減薄若要除淨須華佗更生可也連珠外翳證與聚星似是而非蓋聚星在可治之時而色亦不同此則凝定之證形色沉滑堅澀等狀雖有妙手久治亦難免跡滯如冰瑕之患也劍脊翳證亦名橫翳色白或如糙米色者或帶微微焦黃色者但狀如劍脊中間略高兩邊薄些橫於風輪之外者即此證也厚薄不等厚者雖露上下風輪而瞳神被掩視亦不見薄者瞳神終是被掩視亦昏眊較之重者稍明耳縱色嫩根浮者亦有瘢痕若滑澀根深沉者雖有妙手堅心止可減半若微微紅絲罩絆者尤為難退易來以上不論厚薄非需之歲月必無功耳七寶湯皂角丸生熟地黃丸冰瑕翳證薄薄隱隱或片或點生於風輪之上其色光白而甚薄如冰上之瑕若在瞳神傍側者視亦不礙光華若掩及瞳神者人看其病不覺自視昏眊渺茫其狀類外圓翳但甚薄而不圓又似白障之始但經久而不長大凡風輪有痕米厭者點服不久不曾補得水清膏足及凝脂聚星等證初發點服不曾去得盡絕井點片腦過多障跡反去不得盡而金氣水液凝滯者皆為此證大抵雖治不能速去縱新患者必用堅守確攻久而方退若滑澀沉深及患久者雖極治亦難盡去圓翳外障證薄而且圓其色白大小不等厚薄不同薄者最多間有厚者亦非堆積之厚比薄者稍厚耳十有九掩瞳神亦名遮睛障病最難治為光滑深沉之故有陰陽二證之別陽者明處看則不甚鮮白暗處看則明亮而大陰者暗處看則昏淺明處看則明大然雖有陰陽驗病之別而治法則同雖堅心久治亦難免終身之患水晶障證色白如水晶清瑩見內但高厚滿珠看雖易治得效最遲蓋雖清而滑根深氣結故也乃初起膏傷時內服寒涼太過外點冰片太多致精液凝滯結為此病非比白混障之浮嫩可治者當識別之庶無舛誤其名有三曰水晶曰玉翳浮瞞曰冰輪如冰凍之堅若傍斜細看則白透睛瞳內陰處與日中看其形一同治雖略減難免終身之患魚鱗障證色雖白澀而不光亮狀帶欹斜故號魚鱗乃氣結膏凝不能除絕者如凝脂翳損及大片病已甚不得已大用寒涼及冰片多點者往往結為此也馬蝗積證與胬肉大同小異蓋殺伐內外藥治皆同但胬肉有不用割而治愈故曰小異也亦有是胬肉先起後變為重其狀兩頭尖薄中間高厚肉紅色若馬蝗狀橫臥於中四匝有薄薄肉油紫赤筋脈圍繞乃血分之病久久方成最不易治且難去而易來風疾人每多患此治之必先用鉤割十去五六方用殺伐之藥則有功不割則藥力不敵病勢徒費其力然割須用烙其根處不爾則朝去暮生枉受痛楚多則有激邪之禍變證出焉外雖劫治內須平治不然外雖平而內必發徒勞無功此狀乃橫條非若努攀漫積之謂也胬肉證多起上輪有障如肉或如黃油至後漸漸厚而長積赤瘀努起如肉或赤如朱凡性燥暴悖恣嗜辛熱之人患此者多久則漫珠積肉視亦不見治宜殺伐久久自愈積而無瘀甚惡證及珠尚露者皆不必用鉤割之治一云胬肉攀睛或先赤爛多年肝經為風所沖而成或用力作勞有傷肝氣而得或癢或痛自兩眥頭努出心氣不寧憂慮不已遂乃攀睛或起筋膜宜服洗刀散及二黃散定心丸肺瘀證由眥而起貫過氣輪如皮似筋橫帶至於風輪光亦不損甚則掩及瞳神方礙瞻視大抵十之八九皆由大眥而起有赤白二證赤者血分白者氣分其原在心肺二經初起如薄薄黃脂或赤脈數條後漸漸大而厚赤者少白者多雖赤者亦是白者所致蓋先有白而不忌火毒辛熱故傷血而赤非血分之本病也治赤雖退其質不退必須殺伐殺伐之治雖不見形勢之惡久而且痛功亦遲緩不若一割即去烙之免其再發大抵眼科鉤割一法唯此患最為得效雞冠蜆肉二證形色相類經絡相同治亦一法故總而言之非二病同生之謂也其狀色紫如肉形類雞冠蜆肉者即是多生睥眥之間然後害及氣輪而遮掩於目治者須用割治七八後用殺伐不然藥徒費功若割亦用烙定方好其目大眥內有紅肉一塊如雞冠蜆肉者乃心經血部之英華若誤割者輕則損目重則喪命慎之抽風湯決明散魚子石榴二證經絡同治法亦同故總而言之亦非二病同生魚子障非聚星之比又非玉粒之比其狀生肉一片外面累累顆顆叢生於目或淡紅色或淡黃色或肉色石榴狀如榴子綻露於房其病紅肉顆或四或六或八四角生來障滿神珠視亦不見以上二障俱是血部瘀實之病目疾惡證治用割割後見三光者方可伐治三光瞑黑者內必瞳神有損不必治也輪上一顆如赤豆證氣輪有赤脈灌注直落風輪風輪上有顆積起色紅初如赤小豆次後積大專為內有瘀血之故急宜開導血漸通顆亦漸消病到此十有九損若白珠上獨自有顆鮮紅者亦是瘀滯上下無絲脈接貫者只用點服自消若有貫接者必絡中有血灌來宜向所來之處尋看量其輕重而導之若白輪有紅顆而脹急澀痛者有變而急痛連內而根深接內者火疳也又非此比若白珠雖有紅顆而珠不疼雖疼不甚者病輕治亦易退善消可矣睛中一點似銀星證白點一顆如星光滑當睛中蓋定雖久不大不小傍視瞳神在內只是小些其視光華亦損乃目痛時不忌房事及服滲泄下焦寒涼之藥過多火雖退而腎絡氣滯膏凝結為此病雖服不退點亦不除終身之患也五花障證生於神珠之上斑斑雜雜蓋五臟經絡間之氣俱傷結為此疾其色或白或糙米色或肉色中帶焦黃微紅藍碧等色斑爛駁雜不一若中有一點黑色者乃腎絡氣見雖治不能盡去此狀與斑脂翳瑪瑙內傷形略相似斑脂翳乃破而結成瘢痕不能去者瑪瑙內傷乃小而薄未掩瞳神之輕者此則高厚顯大生在膏外可退故不同耳混障證謂漫珠皆一色之障也患之者最多有赤白二證赤者易治於白者赤者怕赤脈外爬白者畏光滑如苔有此二樣牽帶者必難退而易發若先因別證而成混障則障去而原病見矣若無別證到底只是一色者若混障因而犯禁觸發者則變證出先治變證後治本病一云混睛證白睛先赤而後癢痛迎風有淚閉澀難開或時無事不久亦發年深則睛變成碧色滿目如凝脂赤路如橫赤絲此毒風積熱宜服地黃散外點七寶膏驚振外障證目被物撞觸而結為外障也與傷在膏上急者不同初撞目時亦有珠疼澀脹之苦為其傷輕而瘀自潛消故痛雖止而不戒禁有所觸發其火致水不清氣滯絡澀而生外障有撞雖輕反不知害有所觸犯遂為外障者有撞重不戒反觸而變為凶疾者凡外障結而珠疼頭痛及腫脹者皆是惡證防變急宜治之治見為物所傷條黑翳如珠證非蟹睛木疳之比木疳是大者生則瞳損不可治此則至大方損珠後損瞳神也又非蟹睛因破流出之比此肝氣有餘欲泛起之患故從風輪際處發起黑泡如珠子圓而細或一或二或三四五六多寡不一其證火實盛者痛虛緩者不痛治亦易平若長大則有裂目之患先服羚羊角散後服補腎丸木疳證生於風輪者多其色藍綠青碧有虛實二證虛者大而昏花實者小而痛澀非比蟹睛因破而出乃自然生出者大小不一亦隨其變長也內障在睛里昏暗與不患之眼相似唯瞳神里有隱隱青白者無隱隱青白者亦有之婁全善云內障先患一目次第相引兩目俱損者皆有翳在黑睛內遮瞳子而然今詳通黑睛之脈者目系也目系屬足厥陰足太陽手少陰三經蓋此三經臟腑中虛則邪乘虛入經中鬱結從目系入黑睛內為翳龍木論所謂腦脂流下作翳者即足太陽之邪也所謂肝氣衝上成翳者即足厥陰之邪也故治法以針言之則當取三經之腧穴如天柱風府太衝通里等穴是也其有手巧心審諦者能用針於黑眼裡撥其翳為效尤捷也以藥言之則當補中疏通此三經之鬱結使邪不入目系而愈飲食不節勞傷形體脾胃不足內障眼病宜人參補胃湯益氣聰明湯圓明內障升麻湯復明散婁云上四方治目不明皆氣虛而未脫故可與參耆中微加連柏若氣既脫則黃柏等涼劑不可施經云陽氣者煩勞則張精絕目盲不可以視耳閉不可以聽之類是其證也內障右眼小眥青白翳大眥亦微顯白翳腦痛瞳子散大上熱惡熱大便澀後痞難小便如常遇熱暖處頭疼暗脹能食日沒後天陰暗則昏此證可服滋陰地黃丸翳在大眥加升麻葛根翳在小眥加柴胡羌活東垣云肝木旺則火之勝無所畏懼而妄行也故脾胃先受之或病目而生內障者脾裹血胃主血心主脈脈者血之腑也或曰心主血又曰脈主血肝之竅開於目也治法亦地黃丸當歸湯之類是也倪仲賢論陰弱不能配陽之病曰五臟無偏勝虛陽無補法六腑有調候弱陰有強理心肝脾肺腎各有所滋生一臟或有餘四臟俱不足此五臟無偏勝也或浮或為散是曰陽無根益之欲令實翻致不能禁此虛陽無補法也膀胱大小腸三焦膽包絡俾之各有主平秘永不危此六腑有調候也衰弱不能濟遂使陽無御反而欲匹之要以方術盛此弱陰有強理也解精微論曰心者五臟之專精目者其竅也又為肝之竅腎主骨骨之精為神水故肝木不平內挾心火為勢妄行火炎不制神水受傷上為內障此五臟病也勞役過多心不行事相火代之五臟生成論曰諸脈皆屬於目相火者心包絡也主百脈上榮於目火盛則百脈沸騰上為內障此虛陽病也膀胱小腸三焦膽脈俱循於目其精氣亦皆上注而為目之精精之窠為眼四腑一衰則精氣盡敗邪火乘之上為內障此六腑病也神水黑眼皆法於陰白眼赤脈皆法於陽陰齊陽侔故能為視陰微不立陽盛即淫陰陽應象大論曰壯火食氣壯火散氣上為內障此弱陰病也其病初起時視覺微昏常見空中有黑花神水淡綠色次則視岐睹一成二神水淡白色可為沖和養胃湯主之益氣聰明湯主之千金磁朱丸主之石斛夜光丸主之有熱者瀉熱黃連湯主之久則不睹神水純白色永為廢疾也然廢疾亦有治法先令病者以冷水洗眼如冰氣血不得流行為度用左手大指次指按定眼珠不令轉動次用右手持鴨舌針去黑睛如米許針之令入白睛甚厚欲入甚難必要手准力完重針則破然後斜回針首以針刀刮之障落則明有落而復起者起則重刮刮之有至再三者皆為洗不甚冷氣血不凝故也障落之後以綿裹黑豆數粒令如杏核樣使病目垂閉覆眼皮上用軟帛纏之睛珠不得動移為度如是五七日才許開視視勿勞也亦須服上藥庶幾無失此法治者五六不治者亦四五五臟之病虛陽之病六腑之病弱陰之病四者皆為陰弱不能配陽也學者慎之青風內障證視瞳神內有氣色昏蒙如晴山籠淡煙也然自視尚見但比平時光華則昏矇日進急宜治之免變綠色變綠色則病甚而光沒矣陰虛血少之人及竭勞心思憂鬱忿恚用意太過者每有此患然無頭風痰氣夾攻者則無此患病至此亦危矣不知其危而不急救者盲在旦夕耳羚羊角湯白附子丸補腎磁石丸羚羊角散還睛散綠風內障證瞳神氣色濁而不清其色如黃云之籠翠岫似藍靛之合藤黃乃青風變重之證久則變為黃風雖曰頭風所致亦由痰濕所攻火鬱憂思忿怒之過若傷寒瘧疫熱蒸先散瞳神而後綠後黃前後並無頭痛者乃痰濕攻傷真氣神膏耗溷是以色變也蓋久鬱則熱勝熱勝則肝木之風邪起故瞳愈散愈黃大凡病到綠風危極矣十有九不能治也一云此病初患則頭旋兩額角相牽瞳人連鼻鬲皆痛或時紅白花起或先左而後右或先右而後左或兩眼同發或吐逆乃肺之病肝受熱則先左肺受熱則先右肝肺同病則齊發先服羚羊角散後服還睛散黑風內障證與綠風候相似但時時黑花起乃腎受風邪熱攻於眼宜涼腎白附子丸補腎磁石丸還睛散黃風內障證瞳神已大而色昏濁為黃也病至此十無一人可救者銀風內障證瞳神大成一片雪白如銀其病頭風痰火人偏於氣忿怒郁不得舒而傷真氣此乃痼疾恐金丹不能為之返光矣絲風內障證視瞳神內隱隱然若有一絲橫經或斜經於內自視全物亦有如碎路者乃絡為風攻郁其真氣玄府有一絲之遏故視亦光華有損久而不治則變重為內證之篤矣烏風內障證色昏濁暈滯氣如暮雨中之濃煙重霧風痰人嗜欲太多敗血傷精腎絡損而膽汁虧真氣耗而神光墜矣偃月內障證視瞳神內上半邊有隱隱白氣一灣如新月覆垂向下也乃內障欲成之候成則為如銀翳腦漏人及腦有風寒不足陰氣怫鬱者患之與偃月侵睛在輪膜中來緩者不同仰月內障證瞳神下半邊有白氣隱隱一灣如新月仰而從下生向上也久而變滿為如銀內障乃水不足木失培養金反有餘故精液虧而元氣鬱滯於絡而為病也如銀內障證瞳神中白色如銀也輕則一點白亮如星似片重則瞳神皆雪白而圓亮圓亮者一名圓翳內障有仰月偃月變重為圓者有一點從中起視漸昏而漸變大不見者乃鬱滯傷乎太和清純之元氣故陽光精華為其閉塞而不得發見亦有濕冷在腦腦油滴落而元精損鬱閉其光非銀風內障已散大而不可復收之比年未過六十及過六十而血氣未衰者撥治之皆有復明之理如金內障證瞳神不大不小只是黃而明瑩乃是元氣傷滯所成因而痰濕陰火攻激故色變易非若黃風之散大不可醫者綠映瞳神證瞳神乍看無異久之專精熟視乃見其深處隱隱綠色自視亦漸覺昏眇病甚始覺深綠而變有氣動之患蓋痰火濕熱害及於清純太和之元氣也久而不治反有觸犯者為如金青盲等證其日中及日映紅光處看瞳神有綠色而彼自視不昏者乃紅光爍於瞳神照映黑紅相射而光映為綠之故非綠色自生之謂及春夏瞳神亦覺色微微綠瑩者乃肝膽清純之正氣而視亦不昏不可誤認為此但覺昏眇而瞳神綠色明處暗處看之皆一般氣濁不清者是此證也雲霧移睛證謂人自見目外有如蠅蛇旗斾蛺蝶絛環等狀之物色或青黑粉白微黃者在眼外空中飛揚撩亂仰視則上俯視則下也乃玄府有傷絡間精液耗澀鬱滯清純之氣而為內障之證其原皆屬膽腎黑者膽腎自病白者因痰火傷肺金之清純不足黃者脾胃清純之氣有傷其絡蓋瞳神乃先天元陽之所主稟聚五臟之精華因其內損而見其狀虛弱不足人及經產去血太多而悲哭太過深思積忿者每有此病小兒疳證熱證瘧疾傷寒日久及目痛久閉蒸傷精液清純之氣亦有此患幼而無知至長始曉氣絡已定治亦不愈今人但見此證則曰鬼神現像反泥於禳禱而不求內治他日病愈盛而狀愈多害成而不可救矣圓翳內障證黑睛上一點圓日中見之差小陰處見之則大或明或暗視物不明醫者不曉以冷藥治之轉見黑花此因肝腎俱虛而得也宜服皂角丸合生熟地黃丸及補肺散補腎丸鎮肝丸虎精丸聚寶丸化毒丸青金丹捲雲膏冰翳內障證如冰凍堅實傍觀目透於瞳神內陰處及日中看之其形一同疼而淚出此因膽氣盛遂使攻於肝而得之宜服七寶丸皂角丸合生熟地黃丸通肝散羊肝丸瀉肝丸分珠散滑翳內障證有如水銀珠子但微含黃色不疼不痛無淚遮繞瞳神宜服皂角丸生熟地黃丸還睛丸羊肝丸黃連膏澀翳內障微如赤色或聚或開兩傍微光瞳神上如凝脂色時復澀痛而無淚出宜服皂角丸生熟地黃丸散翳內障證形如鱗點或瞼下起粟子而爛日夜痛楚瞳神最疼常下熱淚宜服皂魚丸生熟地黃丸八味還睛散四物湯穀精散磨風膏宣肺湯清金散雄豬散浮翳內障證上如冰光白色環繞瞳神初生目小眥頭至黑珠上不癢不痛無血色相潮宜服皂角丸合生熟地黃丸宣肺湯七寶散白萬膏細辛散川芎散沉翳內障證白臟在黑水下向日細視方見其白或兩眼相傳疼痛則早輕夜重間或出淚宜服皂角丸及生熟地黃丸靈寶丹救睛丹羊肝丸美玉散二和散上自圓翳以下七證雖有治法終難奏功唯金針撥之為善偃月侵睛證風輪上半邊氣輪交際從白膜內隱隱白片薄薄蓋向下來其色粉青乃非內非外從膜中而來者初不以為意久之始下風輪而損光或沿遍風輪周匝而為棗花為害最遲人每忽之常中其患乃腦有風濕久滯郁中微火攻擊腦油滴下親火嗜燥好酒暴怒激走其鬱者為變亦急凡發經水不待乾而濕蒸及痰火人好燥膩濕熱物者皆有此患墜翳丸棗花障證甚薄而白起於風輪周匝從白膜之內四圍環布而來也凡性躁急及患痰火竭視勞瞻耽酒嗜辣傷水濕熱之人多罹此患久則始有目急乾澀昏花不爽之病犯而不戒甚則有瞳神細小內障等變或因人觸激火入血分淚而赤痛者亦在變證之例雖有棗花鋸齒之說實無正形又有二十四枚四十枚之數百無一二不必拘泥於此說凡見白圈傍青輪際從白膜四圍圈圓而來即是此證若白而嫩在風輪外四圍生起珠赤痛者是花翳白陷不可誤認為此一云此候周圍如鋸齒四五枚相合赤色刺痛如針視物如煙晨輕晝則痛楚迎風有淚昏暗不見宜皂角丸生熟地黃丸桑白皮湯蕤生散白翳黃心證四邊皆白中心一點黃大小眥頭微赤時下澀淚團團在黑珠上乃肝肺相傳停留風熱宜服還睛散及皂角丸合生熟地黃丸黑花翳證其狀青色大小眥頭澀痛頻頻下淚口苦不喜飲食蓋膽受風寒宜涼膽丸還精丸四物湯靈寶丸青金散皂角丸生熟地黃丸五風變成內障證其候頭旋偏腫痛甚瞳人結白顏色相間卻無淚出乃毒風腦熱所致日中如坐暗室常自憂嘆宜除風湯皂角丸合生熟地黃丸龍木論內障根源歌不疼不痛漸昏濛薄霧輕煙漸漸濃或見花飛蛇亂出或如絲絮在虛空此般狀樣因何得肝臟停留熱與風大叫大啼驚與恐腦脂流入黑睛中初時一眼先昏暗次第相牽與一同苦口何須陳逆耳只緣肝氣不相通此時服藥宜銷定將息多乖即沒功日久既應全黑暗時名內障障雙瞳名字隨形分十六龍師聖者會推窮靈藥這回難得效金針一撥日當空強修將息依前說莫遣依前病復蹤針內障眼法歌內障由來十六般學醫人子審須看分明一一知形狀下針方可得安然若將針法同圓翳誤損神光取瘥難冷熱光明虛與實調和四體待令安不然氣悶違將息嘔逆勞神翳卻翻咳嗽震頭皆未得多驚先服鎮心丸若求涼藥銀膏等用意臨時體候看老翳細針初復嫩針形不可一般般病虛新產懷娠月下手才知將息難不雨不風兼皓月清齋三日在針前安心定意行醫道唸佛親姻莫雜喧患者嚮明盤膝坐提撕腰帶得心安針者但行賢哲路惻隱之情實善緣有血莫驚須住手裹封如舊再開看忽然驚振醫重卜服藥三旬見朗然七日解封難見日花生水動莫他言還睛丸散堅心服百日分明覆舊根針內障後法歌內障金針針了時醫師言語要深知綿包黑豆如球子眼上安排日系之臥眠頭枕須安穩仰臥三朝莫厭遲封后忽然微有痛腦風牽動莫他疑或針或烙依經法痛極仍將火熨之擬吐白梅含咽汁吐來仰臥卻從伊起則恐因遭努損雖然稀有也須知七朝豉粥溫溫食震著牙開事不宜大小便時須緩緩無令自起與扶持高聲叫喚言多後驚動睛輪見雪飛如此志心三十日漸行出入認親知狂心莫憶陰陽事夫婦分床百日期一月不須臨洗面針痕濕著痛微微五腥酒面周年斷服藥平除病本基上龍木論金針開內障大法謹按其法初患眼內障之時其眼不痛不澀不癢頭不旋不痛而翳狀已結成者宜金針撥去其翳如撥雲見日而光明也今具其略於後開內障圖圓翳初患時見蠅飛花發垂蟻薄煙輕霧先患一眼次第相牽俱圓翳如油點浮水中陽看則小陰看則大金針一撥即去滑翳翳如水銀珠宜金針撥之澀翳翳如凝脂色宜針撥之浮翳臟形睛之深處細看方見宜針深撥之橫翳橫如劍脊兩邊薄中央厚宜針於中央厚處撥之巳上五翳皆先患一目向後俱損初患之時其眼痛澀頭旋額痛雖有翳狀亦難針撥獨偃月翳棗花翳黑水凝翳微有頭旋額痛者宜針輕撥之冰翳初患時頭旋額痛者眼瞼骨鼻頰骨痛目內赤澀先患一眼向後翳如冰凍堅白宜於所過經脈針其腧穴忌出血宜針撥動不宜強撥偃月翳初患時微微頭旋額痛先患一目次第相牽俱損翳一半厚一半薄宜針先從厚處撥之棗花翳初患時微有頭旋眼澀眼中時時癢痛先患一眼向後俱翳周圍如鋸齒輕輕撥去莫留短腳兼於所過之經針灸其腧散翳翳如酥點乍青乍白宜針撥之黑水凝翳初患時頭旋眼澀見花黃黑不定翳凝結青色宜針撥之驚振翳頭腦被打築惡血流入眼內至二三年成翳翳白色先患之眼不宜針牽損後患之眼宜針之雖不痛不癢其翳黃色紅色者不宜針撥翳狀破散者不宜針撥中心濃重者不宜針撥撥之不動者曰死翳忌撥獨白翳黃心宜先服藥後針之若無翳者名曰風赤不宜針白翳黃心翳四邊白中心黃者先服逐翳散次針足經所過諸穴後用金針輕撥若先患一眼向後俱損烏風無翳但瞳人小三五年內結成翳青白色不宜針視物有花為虛宜藥補不宜藥瀉肝風無翳眼前多見虛花或白或黑或赤或黃或見一物二形二眼同患急宜補治切忌房勞五風變初患時頭旋額痛或一目先患或因嘔吐雙目俱暗瞳子白如霜綠風初患時頭旋額角偏痛連眼瞼眉及鼻頰骨痛眼內痛澀先患一眼向後俱損無翳目見花或紅或黑黑風初患時頭旋額偏痛連眼瞼鼻頰骨痛眼內痛澀先患一眼向後俱損無翳眼見黑花青風初患時微有痛澀頭旋腦痛先患一眼向後俱損無翳勞倦加昏重雷頭風變初患時頭旋噁心嘔吐先患一目次第相牽俱損瞳神或大或小凝脂結白瞳神散大東垣云凡心包絡之脈出於心中代心君行事也與少陽為表裡瞳子散大者少陰心之脈挾目系厥陰肝之脈連目系心主火肝主木此木火之勢盛也其味則宜苦宜酸宜涼大忌辛辣熱物是瀉木火之邪也飲食中常知此理可也以諸辛主散熱則助火故不可食諸酸主收心氣瀉木火也諸苦瀉火熱則益水也尤忌食冷水大寒之物此物能損胃氣胃氣不行則元氣不生元氣不生緣胃氣下陷胸中三焦之火及心火乘於肺上入胸灼髓火主散溢瞳子之散大者以此大熱之物直助火邪尤為不可食也藥中去茺蔚子以味辛及主益肝是助火也故去之加黃芩半兩黃連三錢黃連瀉中焦之火黃芩瀉上焦肺火以酒洗之乃寒因熱用也亦不可用青葙子為助陽火也更加五味子三錢以收瞳神之散大也且火之與氣勢不兩立故經曰壯火食氣氣食少火少火生氣壯火散氣諸酸物能助元氣孫真人曰五月常服五味子助五臟氣以補西方肺金又經云以酸補之以辛瀉之則辛瀉氣明矣或曰藥中有當歸其味亦辛甘而不去何也此一味辛甘者以其和血之聖藥也況有甘味又欲以為鄉導為諸藥之使故不去也熟地黃丸瞳神散大而風輪反為窄窄一周甚則一周如線者乃邪熱鬱蒸風濕攻擊以致神膏遊走散壞若初起即收可復緩則氣定膏散不復收斂未起內障顏色而止是散大者直收瞳神瞳神收而光自生矣散大而有內障起者於收瞳神藥內漸加攻內障藥治之多用攻內障發藥攻動真氣瞳神難收病既急者以收瞳神為先瞳神但得收復目即有生意有何內障或藥或針庶無失收瞳神之悔若只攻內障不收瞳神瞳神愈散而內障不退緩而疑不決治者二證皆氣定而不復治終身疾矣大抵瞳神散大十有七八皆因頭風痛攻之害雖有傷寒瘧疾痰濕氣怒憂思經產敗血等久鬱熱邪火證而蒸傷膽中所包精汁虧耗不能滋養目中神膏故精液散走而光華失皆水中隱伏之火發夫水不足不能制火火愈勝陰精愈虧故清純太和之氣皆乖亂氣既亂而精液隨之走散矣凡頭風攻散者又難收如他證譬諸傷寒瘧疾痰火等熱證炎燥之火熱邪蒸壞神膏內障來遲而收亦易斂若風攻則內障即來且難收斂而光亦損耳保命集當歸湯瞳神緊小倪仲賢論強陽搏實陰之病曰強者盛而有力也實者堅而內充也故有力者強而欲搏內充者實而自收是以陰陽無兩強亦無兩實惟強與實以偏則病內搏於身上見於虛竅也足少陰腎為水腎之精上為神水手厥陰心包絡為相火火強搏水水實而自收其病神水緊小漸小而又小積漸至如菜子許又有神水外圍相類蟲蝕者然皆能睹而不昏但微覺眊矂羞澀耳是皆陽氣強盛而搏陰陰氣堅實而有御雖受所搏終止於邊鄙皮膚也內無所傷動治法當抑陽緩陰則愈以其強耶故可抑以其實耶惟可緩而弗宜助助之則反勝抑陽酒連散主之大抵強者則不易入故以酒為之導引欲其氣味投合入則可展其長此反治也還陰救苦湯主之療相火藥也亦宜用搐鼻碧雲散秘要云瞳子漸漸細小如簪腳甚則小如針視尚有光早治可以挽住復故則難患者因恣色之故雖病目亦不忌淫欲及勞傷血氣思竭心意肝腎二經俱傷元氣衰弱不能升運精汁以滋於膽膽中三合之精有虧則所輸亦乏故瞳中之精亦日漸耗損甚則陷沒俱無而終身疾矣亦有頭風熱證攻走蒸乾精液而細小者皆宜乘初早救以免噬臍之悔也瞳神欹側謂瞳神歪斜不正或如杏仁棗核三角半月也乃腎膽神膏損耗瞳神將盡矣若風輪破損神膏流綻致瞳神欹側者輪外必有蟹睛在焉蟹睛雖平而瞳神不得復圓外亦結有脂翳終身不脫若輪外別無形證而瞳神欹側者必因內傷腎水肝血膽乏化源故膏液日耗而瞳神欲沒甚為可畏宜急治之雖難復圓亦可挽住而免墜盡無光之患目昏花運氣目昏有四一曰風熱經云少陽司天之政風熱參布雲物沸騰太陰橫流寒乃時至往復之作民病聾瞑此風熱參布目昏也二曰熱經云少陰在泉熱淫所勝病目瞑治以鹹寒此熱勝目昏也三曰風經云歲水不及濕乃大行復則大風暴發目視䀮䀮此風勝目昏也四曰燥經云陽明司天燥淫所勝目昧眥傷治以苦熱是也經云肝虛則目䀮䀮無所見耳汨汨無所聞善恐如人將捕之狀海藏云目瞑肝氣不治也鎮肝明目羊肝丸補肝散養肝丸許學士云素問曰久視傷血血主肝故勤書則傷肝主目昏肝傷則自生風熱氣上騰致目昏亦不可專服補藥但服益血鎮肝明目藥自愈經云膽移熱於腦則辛頞鼻淵傳為衄衊瞑目千金方用牛膽浸槐子陰乾百日食後每日吞一枚可以治之經云腎足少陰之脈是動則病坐而欲起目䀮䀮如無所見又云少陰所謂起則目䀮䀮無所見者陰內奪故目䀮䀮無所見也此蓋房勞目昏也左腎陰虛益本滋腎丸六味地黃丸右腎陽虛補腎丸八味地黃丸劉河間云目昧不明熱也然玄府者無物不有人之臟腑皮毛肌肉筋膜骨髓爪牙至於世之萬物盡皆有之乃氣出入升降之道路門戶也人之眼耳鼻舌身意神識能為用者皆升降出入之通利也有所閉塞者不能為用也若目無所見耳無所聞鼻不聞臭舌不知味筋痿骨痹爪退齒腐毛髮墮落皮膚不仁腸胃不能滲泄者悉由熱氣怫鬱玄府閉密而致氣液血脈榮衛精神不能升降出入故也各隨鬱結微甚而為病之重輕故知熱鬱於目則無所見也故目微昏者至近則轉難辨物由目之玄府閉小如隔簾視物之象也或視如蠅翼者玄府有所閉合者也或目昏而見黑花者由熱氣甚而發之於目亢則害承乃制而反出其淚泣氣液眯之以其至近故雖微而亦見如黑花也婁全善曰誠哉河間斯言也目盲耳聾鼻不聞臭舌不知味手足不能運用者皆由其玄府閉塞而神氣出入升降之道路不通利故先賢治目昏花如羊肝丸用羊肝引黃連等藥入肝解肝中諸郁蓋肝主目肝中郁解則目之玄府通利而明矣故黃連之類解鬱熱也椒目之類解濕熱也茺蔚之類解氣鬱也芎歸之類解血鬱也木賊之類解積鬱也羌活之類解經郁也磁石之類解頭目郁墜邪氣使下降也蔓菁下氣通中理亦同也凡此諸劑皆治氣血鬱結目昏之法而河間之言信不誣矣至於東垣丹溪治目昏用參耆補血氣亦能明者又必有說通之蓋目主氣血盛則玄府得利出入升降而明虛則玄府無以出入升降而昏此則必用參耆四物等劑助氣血運行而明也倪仲賢論氣為怒傷散而不聚之病曰氣陽物類天之雲霧性本動聚其體也聚為陰是陽中之陰乃離中有水之象陽外陰內故聚也純陽故不聚也不聚則散散則經絡不收經曰足陽明胃之脈常多氣多血又曰足陽明胃之脈常生氣生血七情內傷脾胃先病怒七情之一也胃病脾病氣亦病焉陰陽應象大論曰足厥陰肝主目在志為怒怒甚傷肝傷脾胃則氣不聚傷肝則神水散何則神水亦氣聚也其病無眵淚痛癢羞明緊澀之證初但昏如霧露中行漸空中有黑花又漸睹物成二體久則光不收遂為廢疾蓋其神水漸散而又散終而盡散故也初漸之次宜以千金磁朱丸主之鎮墜藥也石斛夜光丸主之羨補藥也益陰腎氣丸主之壯水藥也有熱者滋陰地黃丸主之此病最難治餌服上藥必要積以歲月必要無飢飽勞役必要驅七情五賊必要德性純粹庶幾易效不然必廢廢則終不復治久病光不收者亦不復治一證因為暴怒神水隨散光遂不收都無初漸之次此一得永不復治之證也又一證為物所擊神水散如暴怒之證亦不復治俗名為青盲者是也世病者多不為審第曰目昏無傷始不經意及成世醫亦不識直曰熱致竟以涼藥投殊不知涼藥又傷胃況涼為秋為金肝為春為木又傷肝矣往往致廢而後已病者不悟藥之過猶諉之曰命也醫者亦不自悟而曰病拙悲夫視瞻昏眇證謂目內外別無證候但自視昏眇濛昧不清也有神勞有血少有元氣弱有元精虧而昏眇者致害不一若人年五十以外而昏者雖治不復光明蓋時猶月之過望天真日衰自然日漸光謝不知一元還返之道雖有妙藥不能挽回故曰不復愈矣此專言平人視昏非因目病昏眇之比各有其因又當分別凡目病外障而昏者由障遮之故欲成內障而昏者細視瞳內亦有氣色若有障治愈後昏眇者因障遮久滯澀其氣故光隱眊當培其本而光自發有目病漸發漸生痛損經絡血液澀少故光華虧耗而昏有因目病治失其中寒熱過傷及開導針烙炮炙失當當而失中傷其血氣耗其光華而昏者以上皆宜培養根本乘其初時而治之久則氣脈定雖治不愈若目在痛時而昏者此因氣塞火壅絡不和暢而光澀譬之煙不得透火反不明如目暴痛愈後尚昏者血未充足氣未和暢也宜謹慎保養以免後患若目病愈久而昏眇不醒者必因六慾七情五味四氣瞻視哭泣等故有傷目中氣血精液脈絡也早宜調治久則雖治亦不愈矣若人年未五十目又無痛赤內障之病及斫喪精元之過而視昏眇無精彩者其人不壽凡人年在富強而多喪真損元竭視苦思勞形縱味久患頭風素多哭泣婦女經產損血者目內外別無證候只是昏眊月復月而年復年非青盲則內障來矣睛黃視眇證風輪黃亮如金色而視亦昏眇為濕熱重而濁氣熏蒸清陽之氣升入輪中故輪亦色易好酒嗜食濕熱燥膩之人每有此疾與視瞻昏眇證本病不同乾澀昏花證目自覺乾澀不爽利而視物昏花也乃勞瞻竭視過慮多思耽酒恣燥之人不忌房事致傷神水目上必有證如細細赤脈及不潤澤等病在焉閤眼養光良久則得淚略潤開則明爽可見水少之故若不戒謹保養甚則有傷神水而枯澀之變生矣治惟滋陰養水略帶抑火以培其本本正則清純之氣和而化生之水潤若誤認火實用開烙針泄之治者則有緊縮細小之患起坐生花證內外別無證候但其人動作少過起坐少頻或久坐或久立久眠久視便覺頭眩目花昏暈也乃元氣弱陰精虧損水少液傷脈絡衰疲之咎怯弱證陰虛水少痰火人每多患此螢星滿目證自見目前有無數細細紅星如螢火飛伏撩亂甚則如燈光掃星之狀其人必耽酒嗜燥勞心竭腎痰火上升目絡澀滯精汁為六賊之邪火熏蒸所損故陽光散亂而飛伏水不勝火之患久而不治內障成矣非若起坐生花證與有火人昏花中亦帶螢星之輕者此言其時時屢見螢星之重者耳養肝丸羚羊羌活湯菊睛丸明目生熟地黃丸石決明丸加減駐景丸補腎磁石丸千金神麯丸三仁五子丸補肝丸補腎丸羚羊角飲蕤仁丸熟乾地黃丸摩頂膏決明丸白龍粉煮肝散服椒方芎藭散暴盲平日素無他病外不傷輪廓內不損瞳神倏然盲而不見也病致有三曰陽寡曰陰孤曰神離乃痞塞關格之病病於陽傷者緣忿怒暴悖恣酒嗜辣好燥膩及久患熱病痰火人得之則煩躁秘渴病於陰傷者多色欲悲傷思竭哭泣太頻之故患則類中風中寒之起傷於神者因思慮太過用心罔極憂傷至甚驚恐無措者得之患則其人如癡騃病發之狀屢有因頭風痰火元虛水少之人眩暈發而醒則不見能保養者亦有不治自愈病復不能保養乃成痼疾其證最速而異人以為魘魅方犯鬼神為祟之類泥於禳禱殊不知急治可復緩則氣定而無用矣丹溪治一老人病目暴不見物他無所苦起坐飲食如故此大虛證也急煎人參膏二斤服二日目方見一醫與青礞石藥朱曰今夜死矣不悟此病得之氣大虛不救其虛而反用礞石不出此夜必死果至夜半死一男子四十餘歲形實平生好飲熱酒忽目盲脈澀此因熱酒所傷胃氣汙濁之血死在其中而然也遂以蘇木作湯調人參膏飲之服二日鼻內兩手掌皆紫黑曰此病退矣滯血行矣以四物加蘇木紅花桃仁陳皮煎調人參末服數日而愈一男子五十五歲九月間早起忽開眼無光視物不見急就睡片時卻能見人物竟不能辨其何人何物飲食減平時之半神思極倦脈之緩大四至之上重按則散而無力朱作受濕治詢之果因臥濕地半個月得此證遂以白朮為君黃耆茯苓陳皮為臣附子為佐十餘帖而安上三方治目暴盲皆為氣脫而用參術追回者也經云上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣氣脫者目不明即其證也青盲目內外並無障翳氣色等病只自不見者是乃玄府幽邃之源郁遏不得發此靈明耳其因有二一曰神失二曰膽澀須訊其為病之始若傷於七情則傷於神若傷於精血則損於膽皆不易治而失神者尤難有能保真致虛抱元守一者屢有不治而愈若年高及疲病或心腎不清足者雖治不愈世人但見目盲便呼為青盲者謬甚夫青盲者瞳神不大不小無缺無損仔細視之瞳神內並無些少別樣氣色儼然與好人一般只是自看不見方為此證若有何氣色即是內障非青盲也雀盲俗稱也亦曰雞盲本科曰高風內障至晚不明至曉復明也蓋元陽不足之病或曰既陽不足午後屬陰何未申尚見子後屬陽何醜寅未明曰午後雖屬陰日陽而時陰陽分之陰且太陽明麗於天目得其類故明至酉日沒陰極而瞑子後雖屬陽夜陰而時陽陰分之陽天地晦黑理之當瞑雖有月燈而不見者月陰也燈亦陰也陰不能助內之陽病輕者視亦稍見病重者則全不見至寅時陽盛日道氣升而稍明卯時日出如故若人調養得宜神氣融和精血充足陽光復盛不治自愈若不能愛養反致喪真則變為青盲內障甚則有陰陽乖亂痞塞關格為中滿而死者食以牛豬之肝治以補氣之藥即愈益見其元氣弱而陽不足也倪仲賢論陽衰不能抗陰之病或問曰人有晝視通明夜視罔見雖有火光月色終不能睹物者何也答曰此陽衰不能抗陰之病諺所謂雀盲者也黃帝生氣通天論曰自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣又曰陰陽者一日而主外平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉又曰陽不勝其陰則五臟氣爭九竅不通是也問曰陽果何物耶答曰凡人之氣應之四時者春夏為陽也應之一日者平旦至昏為陽也應之五臟六腑者六腑為陽也問曰陽何為而不能抗陰也答曰人之有生以脾胃中州為主也靈蘭秘典曰脾胃者倉廩之官在五行為土土生萬物故為陽氣之原其性好生惡殺遇春夏乃生長遇秋冬則收藏或有憂思恐怒勞役飢飽之類過而不節皆能傷動脾胃脾胃受傷則陽氣下陷陽氣下陷則於四時一日五臟六腑之中陽氣皆衰陽氣既衰則於四時一日五臟六腑之中陰氣獨盛陰氣既盛故陽不能抗也問曰何故夜視罔見答曰目為肝肝為足厥陰也神水為腎腎為足少陰也肝為木腎為水水生木蓋亦相生而成也況怒傷肝恐傷腎肝腎受傷亦不能生也晝為陽天之陽也晝為陽人亦應之也雖受憂思恐怒勞役飢飽之傷而陽氣下陷遇天之陽盛陰衰之時我之陽氣雖衰不得不應之而升也故猶能晝視通明夜為陰天之陰也夜為陰人亦應之也既受憂思恐怒勞役飢飽之傷而陽氣下陷遇天陰盛陽衰之時我之陽氣既衰不得不應之而伏也故夜視罔所見也問曰何以為治答曰鎮陰升陽之藥決明夜靈散主之三因蛤粉丸千金方地膚子五錢決明子一升二味為末以米飲汁和丸食後服二十丸至三十丸日日服至瘥止蒼朮四兩米泔水浸一宿切作片焙乾為末每服三錢豬肝二兩批開摻藥在內用麻線縛定粟米一合水一碗砂鍋內煮熟熏眼候溫臨臥服大效又方蒼朮一兩搗羅為末每服一錢不計候真睛膏損此證乃熱傷真水以致神膏缺損若四圍赤甚痛極者由絡間瘀滯火燥了神膏若凝脂翳碎壞神膏而缺者是熱爛了神膏為病尤急若四圍不甚赤痛不是凝脂所損者為害稍緩乃色欲煩躁恣辛嗜熱之故大略是蒸郁爍損了肝膽絡分之病其狀風輪有證或痕或米厭長短大小不一或米厭小如針刺傷者或米厭大如簪腳刺傷者或痕如指甲刻傷者或風輪周匝有痕長甚者凡有此等皆系內有鬱滯熱蒸之甚爍壞了神膏之故急須早治勿使深陷為窟而蟹睛突出若至深大縱蟹睛未出而翳滿亦有白暈如冰瑕翳等病結焉乃藥氣填補其膏故有此瘢若久服久點方得水清膏復若治少間怠則白暈終身難免淺小者方得如故深大者亦有微微之跡蓋神膏乃先天二五精氣妙凝自然至清至粹者今以後天藥物之氣味而補其缺損乃於濁中薰陶其含蘊之清也非識鑑之精需以歲月鮮能復其初焉膏傷珠陷謂目珠子覺低陷而不鮮綻也非若青黃牒出諸漏等病因損破膏流水耗而米厭低之比蓋內有所虧目失其養源枯絡傷血液耗澀精膏損涸之故所致不一有恣色而竭腎水者有嗜辛燥而傷津液者有因風痰濕熱久鬱而蒸損精膏者有不當出血而誤傷經絡及出血太過以致膏液不得滋潤涵養者有哭損液汁而致者有因竅因漏泄其絡中真氣及元氣弱不能升載精汁運用者大抵系元氣弱而膏液不足也凡人目無故而自低陷者死期至矣若目至於外有惡證內損精膏者不治神水將枯視珠外神水乾澀而不瑩潤最不好識雖形於言不能妙其狀乃火鬱蒸膏澤故精液不清而珠不瑩潤汁將內竭雖有淫淚盈珠亦不潤澤視病氣色乾澀如蜒蝣唾涎之光凡見此證必有危急病來治之緩失則神膏乾澀神膏乾澀則瞳神危矣夫神水為目之機要其病幽微人不知之致變出危證而救之已遲其狀難識非心志巧眼力精雖師指不得盡其妙若小兒素有疳證糞如鴨溏而目疾神水將枯者死五十以外人糞如羊矢而目病神水將枯者死熱結膀胱證神水將枯者蓋下水熱蒸不清故上亦不清澄其源而流自清矣一云瞳神幹缺證其睛乾澀全無淚液或白或黑始則疼痛後來稍定而黑不見此證不可治療宜瀉膽散轆轤轉關目病六氣不和或有風邪所擊腦筋如拽神珠不待人轉而自驀然察上驀然察下下之不能上上之不能下或左或右倏易無時蓋氣搏激不定筋脈振惕緩急無常被其牽拽而為害輕則氣定脈偏而珠歪如神珠將反之狀甚則翻轉而為瞳神反背矣天門冬飲子瀉肝散聚寶丹雄豬散牛蒡子丸還睛丸退血散雙目睛通亦曰睊目甲乙經云睊目者水溝主之此證謂幼時所患目珠偏斜視亦不正至長不能愈者患非一端有因脆嫩之時目病風熱攻損腦筋急縮者有因驚風天吊帶轉筋絡失於散治風熱遂致凝滯經絡而定者有因小兒眠之牖下亮處側視久之遂致筋脈滯定而偏者凡有此病急宜乘病嫩血氣未定治之若至長筋絡血氣已定不復愈矣此專言幼患至長不可醫者非神珠將反急病之比神珠將反謂目珠不正人雖要轉而目不能轉乃風熱攻腦筋絡被其牽縮緊急吊偏珠子是以不能運轉甚則其中自聞刮眙有聲時響血分有滯者目亦赤痛失治者有反背之患與雙目睛通初起狀相似而不同瞳神反背因六氣偏勝風熱搏急其珠斜翻側轉白向外而黑向內也藥不能療止用撥治須久久精熟能識其向入何眥或帶上帶下之分然後撥之則療在反掌否則患者徒受痛楚醫者枉費心機今人但見目盲內障或目損風水二輪壞而膏雜白掩黑者皆呼為瞳神反背謬矣夫反背實是斜翻烏珠向內豈有珠正向外而可謂之反背者哉青黃牒出風輪破碎內中膏汁疊出也不治者甚則膏盡珠米厭有因自破牒出而火氣得以舒泄內外不治致氣定而脹出不收者有醫以寒涼逐退內火外失平治滯定為凸起者乃不治之病初起由風熱攻擊及撞損真膏等害血氣瘀滯亢極攻碎神珠神珠之中膏汁俱已潰爛而出縱有妙手不復可救但可免其米厭凸而已珠上膏水斑雜結為翳狀如白混障者南人呼為白果即華元化復生何能為也珠中氣動視瞳神深處有氣一道隱隱嫋嫋而動狀若明鏡遠照一縷清煙也患頭風痰火病郁久火勝搏激動其絡中真一之氣遊散飄耗急宜治之動而定後光冥者內證成矣倒睫拳毛眼睫毛倒捲入眼中央是也久則赤爛毛刺於內神水不清以致障結且多礙澀淚出之苦人有拔去剪去者有醫以夾板腐去上睥者得效雖速殊不知內病不除未幾復倒譬之草木糞壤枯瘦則枝葉萎垂即朝摘黃葉暮去枯枝徒傷其本徒速其槁不若培益糞壤滋調水土本得培養則向之黃者翠而垂者聳矣夾之一治乃劫法耳其經久睥壞而寬甚者藥攻甚遲不得已而夾去之內當服藥以治其本不然未幾而復寬睫矣拔剪之法未聞其妙屢有內多濕熱外傷風邪致爛弦極醜一毛俱無如風疾者有毛半斷者有夾而復睫云是尚寬復夾至於三四目亦急縮細小徒損無益終莫之悟愚之甚也倪仲賢論內急外弛之病曰陰陽以和為本過與不及病皆生焉急者緊縮不解也弛者寬縱不收也緊縮屬陽寬縱屬陰不解不收皆為病也手太陰肺為辛為金也主一身皮毛而目之上下睫之外者亦其屬也手少陰心為丁手太陽小腸為丙丙丁為火故為表裡故分上下而目之上下睫之內者亦其屬也足厥陰肝為乙乙為木其脈循上睫之內火其子也故與心合心肝小腸三經受邪則陽火內盛故上下睫之內緊縮而不解也肺金為火克受克者必衰衰則陰氣外行故目之上下睫之外者寬縱而不收也上下睫既內急外弛故睫毛皆倒而刺里睛既受刺則深赤生翳此翳者睛受損也故目所病者皆具如羞明沙澀畏風怕日沁爛或痛或癢生眵流淚之證俱見有用藥夾施於上睫之外者欲弛者急急者弛而睫毛無倒刺之患者非其治也此徒能解厄於目前而終復其病也何則為不審過與不及也為不能除其原病也治法當攀出內瞼向外速以三稜針亂刺出血以左手大指甲迎其針鋒後以黃耆防風飲子主之無比蔓荊子湯主之決明益陰丸主之菊花決明散主之搐鼻碧雲散亦宜兼用如是則緊縮自弛寬縱漸急或過不及皆復為和藥夾之治慎勿施也徒為苦耳智者審之瀉肝散洗刀散石膏羌活散五蛻還光丸皂角丸五蛻散青黛散以無名異末摻捲紙中作燃子點著至藥末處吹殺以煙燻之自起蠶沙一兩虢丹五錢慢火熬成膏入輕粉五分熬黑色逐時湯泡洗摘去拳毛用蝨子血點入眼內數次即愈睥急緊小謂眼楞緊急縮小乃倒睫拳毛之漸也若不曾治而漸自縮小者乃膏血精液澀耗筋脈緊急之故若治而急小者治之之故患者多因睥寬倒睫枷去上睥失於內治愈後復倒復枷遂致精液損而脈不舒睥肉壞而血不足目故急小有不當割導而頻數開導又不能滋其內以致血液耗而急小者凡因治而愈者若不乘時滋養則絡定氣滯雖治不復愈矣神效黃耆湯有翳撥雲湯小角偏緊連翹飲子婁全善云陽虛則眼楞緊急陰虛則瞳子散大故東垣治眼楞緊急用參耆補氣為君佐以辛味疏散之而忌芍藥五味子之類酸收是也治瞳子散大用地黃補血為君佐以酸味收斂之而忌茺蔚子青葙子之類是也睥肉黏輪目內睥之肉與氣輪相黏不開難於轉運有熱燥血湧者目必赤痛有熱退血散失於治療者其狀雖黏必白珠亦痛止須用劆割之治若赤痛時生黏者必有瘀滯宜漸導漸劆如別病雖退而黏生不斷亦須劆割漸開仍防熱血復黏生合須用藥時分之排風散胞肉膠黏證兩睥膩沫黏合難開夜臥尤甚輕則如膠黏刷重則結硬必得潤而後可開也其病重在脾肺濕熱之故夫肺主氣氣化水為淚淚為熱擊而出邪熱蒸之渾濁不清出而為脾土燥濕所滯遂阻膩凝結而不流燥甚則結硬而痛故當以清涼滋潤為主雖有障在珠亦是水不清內滯之故非障之愆久而不治則有瘡爛之變內則有椒瘡粟瘡羞明瘀滯等證生矣睥翻黏瞼證乃睥翻轉貼在外瞼之上如舌舐唇之狀乃氣滯血湧於內皮急系吊於外故不能復轉有自病壅翻而轉有因翻睥看病為風熱搏滯不得復返而轉大抵多風濕之滯所致故風疾人患者多治亦難愈非風者易治宜用劆剔開導之法睥輪振跳謂目睥不待人之開合而自牽拽振跳也乃氣分之病屬肝脾二經絡牽振之患人皆呼為風殊不知血虛而氣不順非純風也若有濕爛及頭風病者方是風邪之故久而不治為牽吊敗壞之病血瘀睥泛謂睥內之肉紫淤浮泛如臭血壞泛之狀其色紫暈泛起甚則細細如泡無數相連成片蓋睥絡血滯又不忌火毒燥膩致積而不散其血皆不瑩澤而瘀泛睥內肉壞或碎睥出血因而冒風風傷其血血滯澀而睥肉不得潤澤此乃久積之病也非比暴疾治以活血為上甚者方以劫治輕者止用殺伐之治足矣睥虛如球謂目睥浮腫如球狀也目尚無別病久則始有赤絲亂脈之患火重甚皮或紅目不痛濕痰與火夾搏者則有淚有眥爛之候乃火在氣分之虛證不可誤認為腫如杯覆血分之實病以兩手掌擦熱拭之少平頃復如故可見其血不足而虛火壅於氣也風沿爛眼丹溪云風沿眼繫上膈有積熱自飲食中挾怒氣而成頑痰痞塞濁氣不降清氣不上升由是火益熾而水益降積而久也眼沿因膿漬而腫於中生細小蟲絲遂年久不愈而多癢者是也用紫金膏以銀釵腳揩去油膩點之試問若果癢者又當去蟲以絕根本蓋紫金膏只是去濕與去風涼血而已若前所謂飲食挾怒成痰又須更與防風通聖散去硝黃為細末以酒拌勻曬乾依法服之禁諸厚味及大料物方盡諸法之要風弦赤爛證乃目睥沿赤爛垢膩也蓋血虛液少不能滋養睥肉以致濕熱滯於脾絡常時赤爛如是者非若迎風因邪乘虛之比久而不治則拳毛倒入損甚則赤爛濕垢而拳毛皆壞若先有障而後赤爛者乃經絡澀滯神水不清而爛治其障通其脈絡而自愈有因毛倒而拔剪損動精液引入風邪以致壞爛各因其源而浚之一法劫治以小烙鐵捲紙蘸桐油燒紅烙之爛濕而癢者頗獲其效若失於內治終難除根迎風赤爛證謂目不論何風見之則赤爛無風則否與風弦赤爛入脾絡之深者不同夫風屬木木強土弱弱則易侵因邪引邪內外夾攻土受木克是以有風則病無風則愈赤爛者木土之正病耳赤者木中火證爛者土之濕證若痰若濕盛者爛勝赤若火若燥盛者赤勝爛心承肺承者珠亦痛赤焉此專言見風赤爛之患與後章迎東迎西迎風冷熱淚證入內之深者又不同眥赤爛證謂赤爛唯眥有之目無別病也若目有別病而赤爛者乃因別火致傷其眥又非此比赤勝爛者火多乃勞心憂鬱忿悖無形之火所傷爛勝赤者濕多乃恣燥嗜酒哭泣過多冒火沖煙風熱熏蒸有形所傷病屬心絡甚則火盛水不清而生瘡於眥邊也要分大小二眥相火君火虛實之說洗刀散菊花通聖散內服黃連散洗蘆甘石散點二蠶沙香油浸月餘重綿濾過點紫金膏用水飛過虢丹蜜多水少文武火熬以器盛之點治眼赤瞎以青泥蛆淘淨曬乾末之仰臥合目用藥一錢放眼上須臾藥行待少時去藥赤瞎自無東垣云目眶赤爛歲久俗呼赤瞎是也常以三稜針刺目外以泄濕熱立愈治風弦爛眼秘穴大骨空在手大指第二節尖灸九壯以口吹火滅小骨空在手小指二節尖灸七壯亦吹火滅目淚不止靈樞黃帝曰人之哀而泣涕者何氣使然岐伯曰心者五臟六腑之主也目者宗脈之所聚也上液之道也口鼻者氣之門戶也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈感宗脈感則液道開液道開故涕泣出焉液者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣故命曰奪精補天柱經俠頸又云五臟六腑心為之主耳為之聽目為之視肺為之相肝為之榮脾為之衛腎為之主外故五臟六腑之津液盡上滲於目心悲氣並則心系急心系急則肺舉肺舉則液上溢夫心系與肺不能常舉乍上乍下故咳而泣出矣素問解精微論曰厥則目無所見夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹也夫一水不勝五火故目眥盲是以氣衝風泣下而不止夫風之中目也陽氣內守於精是火氣燔目故見風則泣下也有以比之夫火疾風生乃能雨此之類也肝為淚運氣淚出皆從風熱經曰厥陰司天之政三之氣天政布風乃時舉民病泣出是也張子和曰凡風沖淚出俗言作冷淚者非也風衝於內火發於外風熱相搏由是淚出內外皆治可愈治外以貝母一枚白膩者加胡椒七粒不犯銅鐵研細臨臥點之治內以當歸飲子服之經云風氣與陽明入胃循脈而上至目內眥則寒中而泣出此中風寒淚出也河間當歸湯主之東垣云水附木勢上為眼澀為眵為冷淚此皆由肺金之虛而肝木寡於畏也迎東證謂目見東南二風則澀痛淚出西北風則否與迎風赤爛迎風淚出末同而本異各證不論何風便發此二證則有東西之別以見生克虛實之為病迎風之淚又專言其淚不帶別病而本病之深者又非迎東迎西有別病之比故治亦不同迎東與迎西又不同迎東乃肝之自病氣盛於血發春夏者多非若迎西因虛受克而病發也迎西證謂目見西北二風則澀痛淚出見東南風則否乃肝虛受克之病秋冬月發者多治當補肝之不足抑肺之有餘迎風冷淚證不論何時何風見則冷淚交流若赤爛障翳者非也乃水木二家血液不足陰邪之患與熱淚帶火者不同久而失治則有內障視眇等陰證生焉與無時冷淚又不同此為竅虛因邪引邪之患無時冷淚則內虛膽腎自傷之患也迎風熱淚證不論何時何風見之則流熱淚若有別證及分風氣者非也乃肝膽腎水木之精液不足故因虛竅不密而風邪引出其淚水中有隱伏之火發故淚流而熱久而不治反有觸犯者則變為內障如螢星滿目等證也無時冷淚證目不赤不痛苦無別病只是時常流出冷淚甚則視而昏眇也非比迎風冷淚因虛引邪病尚輕者蓋精液傷耗肝膽氣弱膏澀腎水不足幽隱之病已甚久而失治則有內障青盲視瞻昏眇之患精血衰敗之人性陰毒及悲傷哭泣久郁者又如產後悲泣太過者每多此疾且為患又緩人不為慮往往罹其害而禍成也悔已遲矣無時熱淚證謂目無別病止是熱淚不時常流也若有別病而熱淚流出者乃火激動其水非此病之比蓋肝膽腎水耗而陰精虧澀及勞心竭意過慮深思動其火而傷其汁也故血虛膏液不足人哭泣太傷者每每患此久而失治觸犯者變為內障因其為患微緩故罹害者多矣肝虛還睛補肝丸枸杞酒二妙散肝實洗肝湯羚羊角散肝熱決明子方涼膽丸風熱羌活散青葙子丸風冷羌活散風濕菊花散蟬蛻餅子川芎丸外點真珠散乳汁煎食鹽如小豆大內目中習習去鹽以冷水洗目瘥開元銅錢一百文背上有月者更妙甘草去皮三錢青鹽一兩半於白瓷器內用無根水一大碗浸七日每著一盞洗無力換洗到十日約添甘草青鹽每日洗三次忌食五辛驢馬雞魚葷酒治冷淚久而眼昏烏雞膽汁臨臥點眼中治迎風冷淚不止烏賊魚骨研極細末點目中治無時熱淚目中溜火惡日與火隱澀小角緊久視昏花迎風有淚連翹飲子主之氣壅如痰證睥內如痰白沫稠膩甚多拭之即有者是痰火上壅脾肺濕熱所致故好酒嗜燥悖郁者每患此疾若覺睥腫及有絲脈虯赤者必滯入血分防瘀血灌睛等變生矣目瘡疣內經運氣目眥瘍有二一曰熱經云少陰司天之政三之氣大火行寒氣時至民病目赤眥瘍治以寒劑是也二曰燥經云歲金太過民病目赤腫眥瘍又云陽明司天燥淫所勝民病目眯眥瘍治以溫劑是也實熱生瘡證輕重不等痛癢不同重則有堆積高厚紫血膿爛而腥臭者乃氣血不和火實之邪血分之熱尤重如瘀滯之證膏溷水濁每每流於睥眥成瘡血散而瘡自除勤勞濕熱人每患睥眥成瘡無別痛腫證者亦輕而無妨若火盛瘡生堆重帶腫痛者又當急治恐濁氣沿於目內而病及於珠若先目病後生瘡必是熱沿他經凡見瘡生當驗部分以別內之何源而來因其輕重治之椒瘡證生於睥內累累如瘡紅而堅者是也有則沙擦開張不便多淚而痛今人皆呼為粟瘡誤矣粟瘡亦生在睥但色黃軟而易散此則堅而難散者醫者率以龍鬚燈心等物出血取效效雖速不知目以血為榮血損而光華有衰弱之患輕則止須善治甚重至於累累連片矻磕高低不平及血瘀滯者不得已而導之中病即止不可太過過則血損恐傷真水失養神膏大概用平熨之法退而復來者乃內有瘀滯方可量病漸導若初治便用開導者得效最速切莫過治粟瘡證生於兩睥細顆黃而軟者是今人稱椒瘡為粟瘡非也椒瘡紅而堅有則礙睛沙澀不便未至於急粟瘡見若目痛頭疼者內必有變證大意是濕熱鬱於土分為重椒瘡以風熱為重二證雖皆屬於血分一易散一不易散故治亦不同有素好濕熱燥膩者亦有粟瘡若睛雖赤而痛不甚者雖有必退與重者不同又不可誤認為玉粒玉粒乃淡黃色堅而消遲為變亦遲者睥生痰核證乃睥外皮肉有贅如豆堅而不疼火重於痰者皮或色紅乃痰因火滯而結此生於上睥者多屢有不治自愈有恣嗜辛辣熱毒酒色斫喪之人久而變為癭漏重疾者治亦不同若初起劫治則頃刻平復矣木疳證前見火疳證生於睥眥氣輪在氣輪為害尤急蓋火之實邪在於金部火剋金鬼賊之邪故害最急初起如椒瘡榴子一顆小而圓或帶橫長而圓如小赤豆次後漸大痛者多不痛者少不可誤認為輪上一顆如赤豆之證因瘀積在外易消者此則從內而生也土疳證謂睥上生毒俗呼偷針眼是也有一目生又一目者有止生一目者有邪微不出膿血而愈者有犯觸辛熱燥膩風沙煙火為漏為吊敗者有竅未實因風乘虛而入頭腦俱腫目亦赤痛者其病不一當隨宜治之巢氏曰凡眼內眥頭忽結成疱三五日間便生膿汁世呼為偷針此由熱氣客在眥間熱搏於津液所成但其勢輕者小小結聚汁潰熱歇乃瘥謹按世傳眼眥初生小疱視其背上即有細紅點如瘡以針刺破眼時即瘥故名偷針實解太陽經結熱也人每試之有驗然巢氏但具所因而不更分經絡其諸名實所過者多矣治偷針眼方南星生為末三錢生地黃不拘多少一處研成膏貼太陽兩邊腫自消又方生薑搗細盦之淚出即愈金疳證初起與玉粒相似至大方變出禍患生於睥內必礙珠澀痛以生障翳生於氣輪者則有珠痛淚流之苦子後午前陽分氣升之時尤重午後入陰分則病略清寧久而失治違戒反觸者有變漏之患水疳證忽然一珠生於睥眥氣輪之間者多若在風輪目必破損有虛實大小二證實者小而痛甚虛者大而痛緩狀如黑豆亦有橫長而圓者與木疳相似但部分稍異色亦不同黑者屬水青綠藍碧者屬木久而失治必變為漏頭風人每有此患風屬木肝部何以病反屬水蓋風行水動理之自然頭風病目每傷瞳神瞳神之精膏被風攻郁郁久則火勝其清液為火擊散走隨其所傷之絡結滯為疳也疳因火滯火兼水化化因邪勝不為之清潤而反為之濕熱濕熱相搏而為漏矣故水疳屬腎與膽也倪仲賢論血氣不分混而遂結之病曰輕清圓健者為天故首象天重濁方厚者為地故足象地飄騰往來者為云故氣象云過流循環者為水故血象水天降地升云騰水流各宜其性故萬物生而無窮陽平陰秘氣行血隨各得其調故百骸理而有餘反此則天地不降升雲水不騰流各不宜其性矣反此則陰陽不平秘氣血不行隨各不得其調矣故曰人身者小天地也難經云血為榮氣為衛榮行脈中氣行脈外此血氣分而不混行而不阻也明矣故如雲騰水流之不相雜也大抵血氣如此不欲相混混則為阻阻則成結結則無所去還故隱起於皮膚之中遂為疣病然各隨經絡而見疣病自上眼睫而起者乃手少陰心脈足厥陰肝脈血氣混結而成也初起時但如豆許血氣衰者遂止不復長亦有久止而復長者盛者則漸長長而不已如杯如盞如碗如斗皆自豆許致也凡治在初須擇人神不犯之日大要令病者食飽不飢先汲冷井水洗眼如冰勿使氣血得行然後以左手持銅箸按眼睫上右手翻眼皮令轉轉則疣肉已突換以左手大指按之勿令得動移復以右手持小眉刀尖略破病處更以兩手大指甲捻之令出則所出者如豆許小黃脂也恐出而根不能斷宜更以眉刀尖斷之以井水再洗洗後則無恙要在手疾為巧事畢須投以防風散結湯數服即愈此病非手法則不能去何則為血氣初混時藥自可及病者則不知其為血氣混也比結則藥不能及矣故必用手法去去畢則又以升發之藥散之藥手皆至庶幾了事漏睛眥頭結聚生瘡流出膿汁或如涎水黏睛上下不痛仍無翳膜此因心氣不寧並風熱停留在瞼中宜服五花丸白薇丸歌曰原因風熱瞼中停凝結如膿似淚傾驅毒除風無別病黃連膏子點雙睛合用糖煎散三和散密蒙花散倪仲賢論熱積必潰之病曰積者重疊不解之貌熱為陽陽平為常陽淫為邪常邪則行行則病易見易見則易治此則前篇淫熱之病也深邪則不行不行則伏因伏而又伏日漸月聚勢不得不為積也積已久久積必潰潰始病見病見則難治難治者非不治也為邪積久此潰已深何則潰猶敗也知敗者庶可以救其病隱澀不自在稍覺眊矂視物微昏內眥穴開竅如針目按之則泌泌膿出有兩目俱病者有一目獨病者目屬肝內眥屬膀胱此蓋一經積邪之所致也故曰熱積必潰之病又曰漏睛眼者是也竹葉瀉經湯主之大便不硬者減大黃為用蜜劑解毒丸主之不然藥誤病久終為禍害大眥漏證大眥之間生一漏時流血水其色紫暈腫脹而疼病在心部火之實毒治法宜補北方瀉南方小眥漏證小眥間生一漏時流血色鮮紅病由心包絡而來相火橫行之候失治則神膏損而明喪矣當於北方中補而抑之陰漏證不論何部生漏但從黃昏至天曉則痛脹流水作青黑色或腥臭不可聞日間則稍可非若他證之長流乃幽陰中有伏隱之火隨氣升而來故遇陰分即病重治當溫而清之陽漏證不論何部分生漏但日間脹痛流水其色黃赤遇夜則稍可非若他漏長流也治當補正氣清金火正漏證有漏生於風輪或正中或略偏病至此目亦危矣若初發破淺則流出如痰白膏猶為可救至於日久而深則流出青黑膏汁損及瞳神即有金丹妙藥難挽先天二五元精喪明必矣病屬肝腎二部目竅於肝主於腎故曰正漏耳偏漏證漏生在氣輪金堅而位傍為害稍遲故曰偏漏其流如稠濁白水重則流膿久而失治水泄膏枯目亦損矣外漏證生於兩睥之外或流膿或流稠臭水脹痛則流出不脹則略止其害目遲於各漏久而失治則睥壞氣泄膏水耗損目亦壞矣竅漏證乃目傍竅中流出薄稠水如膿腥臭拭之即有久則目亦模糊也人嗜燥耽酒痰火濕熱者每患此疾久而不治亦有暗傷神水耗澀神膏之害與氣壅如痰相似彼輕此重如痰乃在外水不清瞼內欲出不得出者此則從內邪氣熏蒸而出欲罷不能者治亦深淺遲速不同能遠視不能近視東垣云能遠視不能近視者陽氣有餘陰氣不足也乃血虛氣盛血虛氣盛者皆火有餘元氣不足火者元氣穀氣真氣之賊也元氣之來也徐而和細細如線邪氣之來也緊而強如巨川之水不可遏也海藏云目能遠視責其有火不能近視責其無水法當補腎地芝丸主之秘要云陰精不足陽光有餘病於水者故光華髮見散亂而不能收斂近視治之在心腎心腎平則水火調而陰陽和順陰陽和順則收斂發用各得其宜夫血之所化為水在身為津液在目為膏汁若貪淫恣欲飢飽失節形脈甚勞過於悲泣皆斫耗陰精陰精虧則陽火盛火性炎而發見陰精不能制伏挽回故越於外而遠照不能治之而反觸激者有內障之患能近視不能遠視東垣云能近視不能遠視者陽氣不足陰氣有餘乃氣虛而血盛也血盛者陰火有餘也氣虛者元氣虛弱也此老人桑榆之象也海藏云目能近視責其有水不能遠視責其無火法宜補心局方定志丸主之秘要云此證非謂稟受生成近覷之病乃平昔無病素能遠視而忽然不能者也蓋陽不足陰有餘病於火者故光華不能發越於外而偎斂近視耳治之在膽腎膽腎足則神膏厚神膏厚則經絡潤澤經絡潤澤則神氣和暢而陽光盛矣夫氣之所用謂之火在身為運用在目為神光若耽酒嗜燥頭風痰火忿怒暴悖者必傷神損氣神氣弱必發用衰發用衰則經絡澀滯經絡澀滯則陰陽偏勝而光華不能發達矣目妄見靈樞大惑論帝曰予嘗上清冷之臺中堦而顧匍匐而前則惑予私異之竊內怪之獨瞑獨視安心定氣久而不解獨搏獨眩披髮長跪俯而視之復久之不已也卒然自止何氣使然岐伯曰五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈併為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪中其精其精所中不相比也則精散精散則視岐故見兩物又云目者五臟六腑之精也榮衛魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黑睛法於陰白眼赤脈法於陽也故陰陽合轉而睛明也目者心之使也心者神之舍也故神精亂而不轉卒然見非常處精神魂魄散不相得故曰惑也帝曰予疑其然予每之東苑未曾不惑去之則復予唯獨為東苑勞神乎何其異也岐伯曰不然也心有所喜神有所惡卒然相感則精氣亂視誤故惑神移乃復是故間者為迷甚者為惑素問云夫精明者所以視萬物別白黑審長短以長為短以白為黑如是則精衰矣東垣益氣聰明湯之類主之神光自見證謂目外自見神光出現每如電閃掣甚則如火焰霞明時發時止與視瞻有色之定者不同乃陰精虧損清氣怫鬱玄府太傷孤陽飛越神光欲散內障之重者非若螢星痰火之輕也黑夜精明證夫人體天地之陰陽晝明夜晦理之常也今晦冥之中倏忽見物是背於陰陽矣乃水火不交精華關格乖亂不和陽光飛越之害不能培養陰精以留制陽光而自以為精華之盛至於光墜而盲始悔之不巳晚乎視正反邪證謂物本正而目見為邪也乃陰陽偏勝神光欲散之候陽勝陰者因恣辛嗜酒怒悖頭風痰火氣傷之病陰勝陽者因色欲哭泣飲味經產血傷之病此內之玄府鬱滯有偏而氣重於半邊故發見之火亦偏而不正耳治用培其本而伐其標久而失治內障成焉云麓漫抄云淮南陳吉老儒醫也有富翁子忽病視正物皆以為斜几案書席之類排設整齊必更移令斜自以為正以至書寫尺牘莫不皆然父母甚憂之更歷數醫皆不諳其疾或以吉老告遂以子往求治既診脈後令其父先歸留其子設樂開宴酬勸無算至醉乃罷扶病者坐轎中使人舁之高下其手常令傾倒展轉久之方令登榻而臥達旦酒醒遣之歸家前日斜視之物皆理正之父母躍然而喜且詢治之之方吉老云令嗣無他疾醉中嘗閃倒肝之一葉搭於肺上不能下故視正物為斜今復飲之醉則肺脹展轉之間肝亦垂下矣藥安能治之哉富翁厚為之酬視定反動證謂物本定而目見為動也乃氣分火邪之害水不能救之故上旋眩暈振掉不定光華欲墜久則地石亦覺振動而不定內障成矣恣酒嗜燥頭風痰火人陰虛血少者屢有此患視物顛倒證謂目視物皆振動而倒植也譬之環舞后定視則物皆移動而倒植蓋血氣不正陰陽反復真元有傷陰精衰弱陽邪上干虛眩而運掉有一年數發有一月數發者若發一視倒而視冥不醒者神光墜矣須因其所發時令及別其因虛因風因痰因火而治之若以風眩不足為慮斫斯喪而激觸者內障之患終莫能逃九靈山房集云元末四明有呂復別號滄洲翁深於醫道臨川道士蕭云泉眼中視物皆倒植請治於復復問其因蕭曰某嘗大醉盡吐所飲酒熟睡至天明遂得此病復切其脈左關浮促即告之曰嘗傷酒大吐時上焦反覆致倒其膽腑故視物皆倒植此不內外因而致內傷者也法當復吐以正其膽遂以藜蘆瓜蒂為粗末用水煎之使平旦頓服以吐為度吐畢視物如常視一為二證謂一物而目視為二即內經所謂視岐也乃精華衰亂偏隔敗壞病在腎膽腎膽真一之精不足而陽光失其主倚故視一為二若目赤痛者乃火壅於絡陰精不得升運以滋神光故反為陽邪錯亂神光而岐其視譬諸目痛時見一燈火為二三燈也許學士云荀牧仲嘗謂予曰有人視一物為兩醫作肝氣盛故見一為二服瀉肝藥皆不驗此何疾也予曰孫真人曰靈樞有云目之系上屬於腦後出於項中雲云則視岐故見兩物也令服驅風入腦藥得愈視瞻有色證非若螢星雲霧二證之細點長條也乃目凡視物有大片甚則通行當因其色而別其證以治之若見青綠藍碧之色乃肝腎不足之病由陰虛血少精液衰耗膽汁不足氣弱而散故視亦見其色怯弱證人眼前每見青綠色益見其陰虛血少之故也若見黃赤者乃火土絡有傷也痰火濕熱人每有此患夫陰虛水少則賊火得以燥爍而清純太和之氣為之乖戾不和故神光乏滋運之化源而視亦因其本而見其色也因而不能滋養反有觸犯者內障生焉若見白色者病由金分元氣有傷及有痰沫阻滯道路者皆有此患若視有大黑片者腎之元氣大傷膽乏所養不久盲矣視赤如白證謂視物卻非本色也因物著形之病與視瞻有色空中氣色不同或觀太陽若冰輪或睹燈火反粉色或視粉牆如紅如碧或看黃紙似綠似藍等類此內絡氣鬱玄府不和之故當因其色而別之以知何臟腑乘侮之為病而施治光華暈大證謂視日與燈燭皆生紅暈也甚則通紅而人物在燈光之下亦大矣皆是實火陽邪發越於上之害諸絡必有滯澀輕者暈小而淡重者暈大而濃治雖外證已退目視尚有暈者陽邪未平陰精未盛猶宜滋養化源而剋制其火耳道山清話云張子顏少卿晚年常目光閃閃然中有白衣人如佛相者子顏信之彌謹乃不食肉不飲酒然體瘠而多病矣一日從汪壽卿求脈壽卿一見大驚不復言但投以大丸數十小丸千餘粒祝曰十日中服之當盡卻以示報既如期視所見白衣人衣變黃而光無所見矣乃欲得肉食又思飲酒又明日俱無所見覺氣體異他日矣乃詣壽卿以告壽卿曰吾固知矣公脾初受病為肺所乘心脾之母也公既多疑心氣不固自然有所睹吾以大丸實其脾小丸補其心肺為脾之子既不能勝其母其病自愈也北夢瑣言曰有少年苦眩暈眼花常見一鏡子趙卿診之曰來晨以魚鱠奉候及期延於內從容久飢候客退方得攀接俄而枱上施一甌芥醋更無他味少年飢甚聞芥醋香徑啜之逡巡再啜遂覺胸中豁然眼花不見卿曰郎君吃魚鱠太多芥醋不快又有魚鱗在胸中所以眼花故權誑而愈其疾也視直如曲證夢溪筆談云有一人家妾視直物如曲弓弦界尺之類視之皆如鈞醫僧奉真親見之目閉不開足太陽之筋為目上綱足陽明之筋為目下綱熱則筋縱目不開目直視視物而目睛不轉動者是也若目睛動者非直視也傷寒直視者邪氣壅盛冒其正氣使神氣不慧臟腑之氣不上榮於目則目為之直視傷寒至於直視為邪氣已極證候巳逆多難治經曰衄家不可發汗發汗則額上陷脈緊急直視不能眴不能眠以肝受血而能視亡血家肝氣已虛目氣已弱又發汗亡陽則陰陽俱虛所致此雖錯逆其未甚也逮狂言反目直視又為腎絕直視搖頭又為心絕皆臟腑氣脫絕也直視譫語喘滿者死下利者亦死又劇者發狂則不識人循衣摸床惕而不安微喘直視脈弦澀者死皆邪氣盛而正氣脫也素問曰少陽終者其百節縱目睘絕系王注曰睘謂直視如驚貌睘音瓊目系絕故目不動而直視目上視經云瞳子高者太陽不足戴眼者太陽已絕太陽之脈其終也戴眼反折瘛瘲針灸法見中風目為物所傷倪仲賢論曰志於固者則八風無以窺其隙本於密者則五臟何以受其邪故生之者天也召之者人也雖生弗召莫能害也為害不已召之甚也生氣通天論曰風者百病之始也清靜則肉腠閉拒雖有大風苛毒弗之能害陰陽應象論曰邪風之至疾如風雨故善治者治皮毛夫肉腠固皮毛密所以為害者安從來也今為物所傷則皮毛肉腠之間為隙必甚所傷之際豈無七情內移而為衛氣衰憊之原二者俱召風安得不從故傷於目之上下左右者則目之上下左右俱病當總作除風益損湯主之傷於眉骨者病自目系而下以其手少陰有隙也加黃連除風益損湯主之傷於額者病自抵過而上傷於耳中者病自銳眥而入以其手太陽有隙也加柴胡除風益損湯主之傷於額交巔耳上角及腦者病自內眥而出以其足太陽有隙也加蒼朮除風益損湯主之傷於耳後耳角耳前者病自客主人斜下傷於頰者病自銳眥而入以其手少陽有隙也加枳殼除風益損湯主之傷於頭角耳前後及目銳眥後者病自銳眥而入以其足少陽有隙也加龍膽草除風益損湯主之傷於額角及巔者病自目系而下以其足厥陰有隙也加五味子除風益損湯主之諸有熱者更當加黃芩兼服加減地黃丸傷甚者須從權倍加大黃瀉其敗血六節藏象論曰肝受血而能視此蓋滋血養血復血之藥也此治其本也又有為物暴震神水遂散更不復治故並識之於此驚振外障前見驚振內障證因病目再被撞打變成內障日夜疼痛淹淹障子赤膜繞目不能視三光亦如久病內障宜補肝丸補腎丸石決明丸及皂角丸合生熟地黃丸物損真睛證謂被物觸打徑在風輪之急者物大則狀大物小則狀小有黃白二色黃者害速白者稍遲若尖細之物觸傷淺小者可治可消若粗厲之物傷大而深及缺損神膏者雖愈亦有瘢痕若觸及破膏者必有膏汁或青黑色或白色如痰者流出為害尤急縱然急治瞳神雖在亦難免欹側之患綻甚而瞳神已去者不治物有尖小而傷深膏破者亦有細細黑顆如蟹睛出愈後有瘢且如草木刺金石屑苗葉尖針尖觸在風輪淺而結顆黃者狀如粟瘡急而有變白者狀如銀星為害稍緩每見耘苗人竹木匠往往誤觸竹絲木屑苗葉在風輪而病者若飛揚之物重大而打破風輪者必致青黃牒出輕而膏破者膏汁流出黑顆為蟹睛又輕而傷淺者黑膏未出有白膏流出狀如稠痰凝在風輪欲流不流嫩白如凝脂者此是傷破神珠外邊上層氣分之精膏也不可誤認為外障若視昏者瞳神有大小欹側之患久而失治目必枯凸大凡此病不論大小黃白但有淚流赤脹等證者急而有變珠疼頭痛者尤急素有痰火風濕斫喪之人病已內積未至於發今因外傷而激動其邪乘此為害痛甚便澀者最凶又如木竹芒刺誤觸斷在風輪膏內者必曉夜脹痛難當急宜取出物若粗大入深者於此損處必有膏出為蟹睛治亦有瘢取遲膏水滯結障生者物去而治障障自退障若大而厚者雖退亦有跡失取而攻損瞳神者不治若刺傷斷在氣輪皮內取遲者必有瘀血灌脹取去物而先導之後治餘證大抵此證物尖細者傷亦小易退而全好粗大者傷亦大難退而有跡小者能大大者損目風輪最急氣輪次之其小物所觸淺細者年少精強及善於護養性情純緩之人亦有不治而愈者必其內外別無他證也振胞瘀痛證謂偶被物撞打而血停滯於瞼睥之間以致脹痛也緩而失治則脹入珠內瘀血灌睛而睛有損壞之患狀亦與脹如杯覆同外治開導敷治亦同內治不同蓋脹如杯覆因火從內起而後壅滯此因外觸凝滯脈道阻塞而後灌及神珠或素有痰火風邪因而激動乘虛為患又當驗其形證絲絡各隨其經而治之觸傷真氣證乃被物撞打而目珠痛痛後視復如故但過後漸覺昏冥也蓋打動珠中真氣絡澀滯而鬱遏精華不得上運損及瞳神而為內障之急若初覺昏暗速治之以免內障結成之患若疾已成瞳神無大小欹側者猶可撥治內宜調暢氣血無使凝滯此證既成即驚振內障飛絲入目證謂風揚遊絲偶然撞入目中而作痛也若野蠶蜘蛛木蟲之絲患尚遲若遇金蠶老鸛絲其目不出三日迸裂今人但患客風暴熱天行赤熱痛如針刺一應火實之證便呼為天絲眼不知飛絲入目乃人自知者但迴避不及不意中被其入也入目之時亦自知之倏然而痛淚湧難開豈可以之混治他證乎治飛絲入目方頭垢點入眼中柘樹漿點了綿裹筋頭蘸水於眼上繳拭涎毒火麻子一合杵碎井水一碗浸攪卻將舌浸水中涎沫自出神效一方用茄子葉碎杵如麻子法尤妙飛絲入眼眼腫如眯痛澀不開鼻流清涕用京墨濃磨以新筆塗入目中閉目少時以手張開其絲自成一塊看在眼白上卻用綿輕輕惹下則愈如未盡再塗物偶入睛證謂偶然被物落在目中而痛也凡人被物入目不可乘躁便擦須按住性待淚來滿而擦則物潤而易出如物性重及有芒刺不能出者急令人取出不可揉擦擦則物愈深入而難取若入深須翻上睥取之不取則轉運阻礙氣滯血凝而病變芒刺金石稜角之物失取礙久及擦重者則壞損輪膏如痕米厭凝脂等病輕則血瘀水滯為痛為障等病有終不得出而結於睥內者必須翻而尋看因其證而治之此與眯目飛揚不同飛揚細沙擦眯已成證者此則未成證若已成證則大同小異終彼輕而此重也眯目飛揚證因出行間風吹沙土入目頻多揩拭以致氣血凝滯而為病也初起澀濕赤脈次後淚出急澀漸漸重結為障翳然有輕重赤白亦因人之感受血氣部分或時令之寒熱不同耳或變或不變亦隨人之戒觸所致當辨形證別經絡而施治治眯目鹽與豉置水中浸之視水其渣立出物落眼中用新筆蘸繳出又方濃研好墨點眼立出治稻麥芒入眼取蠐螬以新布覆目上待蠐螬從布上摩之其芒出著布上傷寒愈後之病倪仲賢曰傷寒病愈後或有目復大病者以其清陽之氣不升而餘邪上走空竅也其病隱澀赤脹生翳羞明頭腦骨痛宜作群隊升發之劑餌之數服斯愈傷寒論曰冬時嚴寒萬類深藏君子固密不傷於寒觸冒之者乃名傷寒其傷於四時之氣者皆能為病又生氣通天論曰四時之氣更傷五臟五臟六腑一病則濁陰之氣不得下清陽之氣不得上今傷寒時病雖愈濁陰清陽之氣猶未來復濁陰清陽之氣未復故餘邪尚熾不休走上而為目之害也是以一日而愈者餘邪在太陽二日而愈者餘邪在陽明三日而愈者餘邪在少陽四日而愈者餘邪在太陰五日而愈者餘邪在少陰六日而愈者餘邪在厥陰七日而復是皆清陽不能出上竅而復受其害也當為助清陽上出則愈人參補陽湯主之羌活勝風湯主之加減地黃丸主之搐鼻碧雲散亦宜用也忌大黃芒硝苦寒通利之劑犯之不可復治妊娠目病其病多有餘要分血分氣分氣分則有如旋臚泛起瞳神散大等證血分則有如瘀血凝脂等病蓋其否隔陰陽澀滯與常人不同為病每多危急人不知慮屢見臨重而措手不及者內伐又恐傷胎泄氣不伐又源不澄病不去將奈何籲能知其胎系固否善施內護外劫之治則百發百中矣產後目病產則百脈皆動氣血俱傷太虛不足邪易以乘肝部發生之氣甚弱血少而膽失滋養精汁不盛則目中精膏氣液皆失化源所以目病者多然輕重內外不同有勞瞻竭視悲傷哭泣而為無時冷熱淚內障昏眇等證有竅不密引入風邪為濕爛頭風者有因虛沐發濕氣歸腦而為內障諸病者有因虛勞役恣辛嗜熱及患熱病而傷目血為外障者皆內不足所致善知愛護者疾微而不變不知保養反縱斫喪則變重不一大抵產後病宜早治莫待其久久則氣血定而病深治亦不易其外證易知者人皆知害而早治其內證害緩者人多忽之比其成也為無及之悔者多矣參看目痛條亡血過多之病因風證謂患風病人目疾也風在五行為木在臟為肝在竅為目本乎一氣久風則熱勝熱勝則血弱風久必郁鬱則火生火性炎上故患風人未有目不病者然各因其故而發有日淺而鬱未深為偏喎歪斜者有入脾而睥反濕勝而赤爛者有血虛筋弱而振搐者有不禁反傷精神及恣燥嗜熱助邪乖亂清和融純之氣氤鬱而為內障者有風盛血滯結為外障如胬肉等證者加以服餌香燥之藥耽酒縱辛陰愈虧而火愈爍病變瘀變重者治各因其證而伐其本內外常劫不同大抵風病目者當去風為先不然目病雖退而復來雖治至再至三風不住目病終無不發之理因毒證謂人生瘡瘍腫毒累及目病也夫六陽火燥有餘水不能制致妄亂無拘氣滯血壅而始發瘡瘍腫毒火性炎上目竅高火所從泄濁能害清理之自然肝膽清淨融和之腑瘡毒癰疽濁亂之邪邪既熾盛侵攪清和因素斫喪肝腎有虧陰虛血少膽之精汁不光化源弱而目絡少滋故邪得乘虛入目而為害若病目正在病毒之時治毒愈而目亦愈若毒愈而目不愈者乃邪入至高之深處難以自退當浚其流澄其源因而觸激甚者有瘀滯之變因他證謂因患別病而害及目也所致不同有陰病而陰自傷有陽病而陽自損有寒病熱藥太過傷其神氣有熱病寒藥太過耗其精血補者瀉之瀉則損其元瀉者補之補則助其邪針砭之泄散真氣炮炙之激動火邪實實虛虛損不足益有餘之故不同亦各因人觸犯感受臟腑經絡衰旺隨其所因而入為病內外輕重不等當驗其標而治其本譬如傷寒陽證熱鬱蒸損瞳神內證也熱盛血滯赤痛淚澀者外證也陰證脫陽目盲內證也服姜附溫熱之劑多而火燥赤澀者外證也瘧疾之熱損瞳神內證也火滯於血而赤澀外證也瀉利後昏眇為穀氣乏土腑清純之氣傷不能發生長養津液耗而膏汁不得滋潤內證也山嵐瘴氣目昏者邪氣矇蔽正氣外證也蠱脹中滿赤痛者陰虛難制陽邪內證也氣證多怫鬱弱證多昏花皆內證也痰證之膩沫火證之赤澀皆外證也余仿此夢靈丸明目生熟地黃丸合皂角丸茺蔚子丸痘疹餘毒證痘疹為毒最重為自稟受以來蘊積惡毒深久之故古稱曰百歲瘡謂人生百歲之中必不能免一發則諸經百脈清純太和之氣皆為其擾亂一番正氣大虛而邪得以乘之各因所犯而為疾況目又清純之最者通於肝膽肝膽為清淨之腑邪正不並立今受濁邪熏灼則目有失發生長養之源而病亦易侵皆由人不能救而且害之之故也或於病中食物太過懷臟太暖誤投熱藥多食甘酸而致病者或於病後因虛未復恣食辛辣燥膩竭視勞瞻好烘多哭沖冒風沙煙瘴而致病者有為昏蒙流淚之內證者有為赤爛星障之外證者有餘邪蘊積為凝脂黃膜花翳蟹睛等證之重而目米厭凸者有餘邪偶流為赤絲羞明微星薄翳等證之輕而病自消者輕重淺深亦各隨人之犯受所患不一當驗其證而審其經以治之不可執一反有激變之禍蓋痘疹之後人同再造比之常人不同若有所誤貽害終身行斯道者宜加謹焉大抵治之早則易退而無變遲則雖無變恐血氣凝定即易治之證亦退遲矣今人但見痘後目疾便謂不治不知但瞳神不損者縱久遠亦有可治之理惟久而血定精凝障翳沉滑澀損者則不治耳倪仲賢云癍疹餘毒所害者與風熱不制之病稍同而異總以羚羊角散主之便不硬者減硝黃未滿二十一日而病作者消毒化癍湯主之海藏云東垣先生治癍後風熱毒翳膜氣暈遮睛以瀉青丸子瀉之大效初覺易治余詳見痘疹門時復證謂目病不治忍待自愈或治失其宜有犯禁戒傷其脈絡遂致深入又不治之致搏夾不得發散之故或年之月月之日如花如潮至期而發至期而愈久而不治及因激發遂成大害未發者問其所發之時令以別病本在何經位已發者當驗其形證絲脈以別其何部分然後治之第八冊七竅門下耳耳屬足少陰腎經中藏曰腎者精神之舍性命之根外通於耳素問曰腎在竅為耳腎和則耳能聞五音矣靈樞師傳曰腎者主為外使之遠聽視耳好惡以知其性故耳好前居牙車者腎端正注牙車即頰車穴也在耳下曲頷端陷中耳偏高者腎偏傾耳高者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆玄珠曰耳薄而黑或白者腎敗也又屬手少陰心經素問曰南方赤色入通於心開竅於耳又曰手少陰之絡會於耳中又屬手太陰肺經李東垣曰耳本主腎而復能聽聲者聲為金是耳中有肺水土生於申也王太僕曰手太陰肺絡會於耳中肺虛則少氣不能報息而耳聾又屬足厥陰肝經素問曰肝病氣逆則耳聾不聰朱丹溪曰耳聾屬熱少陽厥陰熱多又屬手足少陽三焦膽手太陽小腸經之會靈樞曰少陽根於竅陰結於窗龍窗龍者耳中也素問曰一陽獨嘯少陽厥也其終者耳聾注嘯耳中鳴如嘯聾也膽及三焦脈皆入耳故氣逆上則耳中鳴又曰少陽主膽其脈循脅絡於耳故傷寒三日少陽受之則胸脅痛而耳聾九日少陽病衰耳聾微聞靈樞曰手太陽所生病者耳聾目黃又屬手足陽明大腸胃經素問曰頭痛耳鳴九竅不利腸胃之所生也靈樞曰聾而痛者取手陽明聾而不痛者取足少陽又曰耳者宗脈之所聚也胃中空則宗脈虛虛則下溜脈有所竭者故耳鳴又屬足太陽膀胱經素問曰太陽所謂耳鳴者陽氣萬物盛上而躍故耳鳴也又屬手足少陰心腎太陰肺脾足陽明胃經之絡素問曰此五絡皆屬於耳中上絡左角邪客之則病耳前屬手足少陽三焦膽足陽明胃經之會素問曰上部人耳前之動脈注在耳前陷者中動應於手手少陽脈氣之所行也耳後屬手足少陽三焦膽經之會李東垣曰少陽者邪出於耳前後也按此語並證上文耳下曲頰屬足少陽膽陽明大腸經之會又屬手太陽小腸經靈樞曰手太陽當曲頰曲頰前屬足少陽膽陽明大腸經之會前寸許屬手陽明大腸經曲頰後屬足少陽膽經靈樞曰足少陽在耳下曲頰之後保命集云夫耳者以竅言之水也以聲言之金也以經言之手足少陽俱會其中也有從內不能聽者主也有從外不能入者經也有若鐘鳴者有若鐘聲者有若火熇熇然者各隨經見之其間虛實不可不察也假令耳聾者何謂治肺肺主聲鼻塞者肺也何謂治心心主臭如推此法皆從受氣於始腎受氣於巳心受氣於亥肝受氣於申肺受氣於寅脾受氣於四季此治法皆生長之道也趙以德曰耳者腎之竅足少陰經之所主然心亦寄竅於耳在身十二經脈中除足太陽手厥陰外其餘十經脈絡皆入耳中蓋腎治內之陰心治外之陽合天地之道精氣無處而不交通故清淨精明之氣上走空竅耳受之而聽斯聰矣因此耳屬二臟之竅也於是諸經稟其陰陽五行精明者皆上入之所以宮商角徵羽之五音從斯辨矣經曰積陽為天積陰為地清陽出上竅是也若二氣不調則交通不表故陽氣者閉塞地氣者冒明而陽氣之閉塞者或因煩勞陰虛氣浮或因衛氣不下循脈積聚於上或得於邪風與陽並盛或因熱淫之勝或因三焦之火獨光而耳中渾渾焞焞或因經臟積熱所致或因大怒氣上而不下夫如是者皆由心氣虛實不調虛則不能治其陽下與陰交實則恃陽強而與陰絕經曰至陰虛天氣絕是也而地氣之冒明者或憂愁不解陰氣閉塞不與陽通或內外濕飲痞隔其氣不得升降則耳中亦渾渾焞焞或腎精脫若熱病之精脫二者尺脈絕則死或耳中因二氣不和結干耵聹塞之夫如是皆由腎氣不和虛則陰氣微不能上交於陽而陽是暴實則陰氣逆不納其陽也靈樞曰腎氣通於耳腎和則能聞五音五臟不和則七竅不通故凡一經一絡有虛實之氣入於耳中者皆足以亂二臟主竅之精明至於聾聵此言暴病者也若夫久聾者於腎亦有虛實之異左腎為陰主精右腎為陽主氣精不足氣有餘則聾為虛其人瘦而色黑筋骨健壯此精氣俱有餘固藏閉塞是聾為實乃高壽之兆也二者皆稟賦使然不須治之又有乍聾者經曰不知調陰陽七損八益之道早衰之節也其年五十體重耳目不聰明矣此亦無治也唯暴聾之病與陰陽隔絕之未甚經脈欲行而未通衝擊其中鼓動聽戶隨其氣之微甚而作嘈嘈風雨諸聲者則可隨其邪以為治補不足瀉有餘務使陰陽和平自然清淨之氣上走耳中而聽斯聰矣曰若子所表言水火同開此竅何原病式之非溫補耶曰心在竅為舌以舌非孔竅因寄竅於耳則是腎為耳竅之主心為耳竅之客以五臟開竅於面部分陰精陽氣言之在腎肝居陰故耳目二竅陰精主之在心肺脾居陽故口舌鼻三竅陽氣主之所以陰精主者貴清涼而惡煩熱陽氣主者貴溫暖而惡寒涼潔古老人嘗有是論信耳目之不可以溫補也仁齊直指云腎通乎耳所主者精精氣調和腎氣充足則耳聞而聰若勞傷氣血風邪襲虛使精脫腎憊則耳轉而聾又有氣厥而聾者有挾風而聾者有勞傷而聾者蓋十二經脈上絡於耳其陰陽諸經適有交併則臟氣逆而為厥厥氣搏入於耳是為厥聾必有時乎眩暈之證耳者宗脈之所附脈虛而風邪乘之風入於耳之脈使經氣否而不宣是為風聾必有時乎頭痛之證勞役傷於血氣淫欲耗其精元瘦悴力疲昏昏憒潰是為勞聾有能將適得所血氣和平則其聾暫輕其或日就勞傷風邪停滯則為久聾之證矣外此又有耳觸風邪與氣相擊其聲嘈嘈眼或見火謂之虛鳴熱氣乘虛隨脈入耳聚熱不散膿汁出焉謂之膿耳人耳間有津液輕則不能為害若風熱搏之津液結革夘成核塞耳亦令暴聾謂之耵耳前是數者腎脈可推風則浮而盛熱則洪而實虛則澀而濡風為之疏散熱為之清利虛為之調養邪氣並退然後以通耳調氣安腎之劑主之風虛耳聾排風湯桂星散羊腎羹魚腦膏磁石丸姜蠍散風熱耳聾犀角飲子芍藥散犀角散茯神散耳聾皆屬於熱少陽厥陰熱多宜開痰散風熱通聖散滾痰丸之類耳因郁聾以通聖散內加大黃酒煨再用酒炒三次後入諸藥通用酒炒厥聾和劑流氣飲加石菖蒲每服三錢以生薑蔥白同煎食後服沉香降氣湯或蘇子降氣湯不換金正氣散指迷七氣湯輕者吞來復丹重者吞養正丹凡治耳聾皆當調氣氣逆耳聾有三肝與手太陽少陽也經云肝氣逆則頭痛耳聾不聰頰腫又云太陽所謂浮為聾者皆在氣也羅謙甫云手太陽氣厥而耳聾者其候聾而耳內氣滿也手少陽氣厥而耳聾者其候耳內渾渾焞焞此皆氣逆而聾也治法宜四物湯吞龍薈丸降火及復元通氣散調氣是也耳聾有濕痰者檳榔神芎丸下之耳聾面頰黑者為精脫腎虛羅謙甫云經曰精脫者則耳聾夫腎為足少陰之經乃藏精而氣通於耳耳者宗脈之所聚也若精氣調和則腎臟強盛耳聞五音若勞傷氣血兼受風邪損於腎藏而精脫者則耳聾也然五臟六腑十二經脈有絡於耳者其陰陽經氣有相併時並則臟氣逆名之曰厥厥氣相搏入於耳之脈則令聾其腎病精脫耳聾者其候頰顴色黑手少陽之脈動則氣厥逆而耳聾者其候耳內渾渾焞焞也手太陽厥而耳聾者其候聾而耳內氣滿也宜以燒腎散主之燒腎散益腎散補腎丸蓯蓉丸肉蓯蓉丸桑螵蛸湯腎虛有寒者宜之本事地黃湯腎虛有熱者宜之耳聾耳聾少氣嗌乾者為肺虛東垣曰臟氣法時論云肺虛則少氣不能報息耳聾嗌乾注云肺之絡會於耳中故聾此說非也蓋氣虛必寒盛則氣血俱澀滯而不行也耳者宗氣也肺氣不行故聾也宜生脈散嚼下蠟彈丸耳聾多恐者為肝虛經云肝虛則目䀮䀮無所見耳無所聞善恐治法用四物湯加防風羌活柴胡菖蒲茯神等分煎湯服二十餘帖卻用姜蠍散開之本草云肝虛則生薑補之是也勞聾宜益氣聰明湯頭目不清清神散氣閉不通通氣散秘傳降氣湯加菖蒲外治通神散通耳法追風散蓖麻丸雄黃散透耳筒鯽魚膽膏蠍稍膏鼠膽丸雞卵方灸方驢脂方醋附方龜尿方乾地龍方魚腦膏久聾蓖麻子丸天雄雞子方通氣散水銀方大蒜方勝金透關散暴聾蒲黃膏龍腦膏川椒巴豆菖蒲松脂以蠟熔為筒子內耳中一日一易或用雄黃一錢巴豆肉一個研細蔥涎和作錠子紙卷塞耳中或用凌霄花葉杵自然汁滴耳中羅謙甫云夫卒耳聾者由腎氣虛為風邪所乘搏於經絡隨其血脈上入耳正氣與邪氣相搏故令卒聾也婁全善云暴聾皆是厥逆之氣經云暴厥而聾偏塞閉不通內氣暴搏也又云少陽之厥暴聾是也宜於前厥聾條求其治法運氣耳聾有四一曰濕邪傷腎三焦聾經云太陰在泉濕淫所勝民病耳聾渾渾焞焞治以苦熱是也二曰燥邪傷肝聾經云歲金太過燥氣流行肝木受邪民病耳聾無所聞是也三曰火邪傷肺聾經云歲火太過炎暑流行肺金受邪民病耳聾是也四曰風火炎擾於上聾經云少陽司天之政風熱參布雲物沸騰民病聾瞑三之氣炎暑至民病熱中聾瞑治以寒劑是也耳鳴經云耳者宗脈之所聚也故胃中空則宗脈虛虛則下溜脈有所竭故耳鳴補客主人手大指爪甲上與肉交者也又云上氣不足耳為之苦鳴補足外踝下留之又云腦為髓之海其輸上在百會下在風府髓海不足則腦轉耳鳴審守其輸調其虛實又云液脫者腦髓消脛酸耳數鳴凡此皆耳鳴之屬虛者也經云太陽所謂耳鳴者陽氣萬物盛上而躍故耳鳴也又云厥陰司天風行太虛雲物搖動目轉耳鳴三之氣天政布氣乃時舉民病耳鳴又云厥陰之脈耳鳴頭眩又云少陽所至為耳鳴治以涼寒凡此皆耳鳴之屬實者也王汝言云耳或鳴甚如蟬或左或右或時閉塞世人多作腎虛治不效殊不知此是痰火上升鬱於耳中而為鳴郁甚則壅閉矣若遇此證但審其平昔飲酒厚味上焦素有痰火只作清痰降火治之大抵此證多先有痰火在上又感惱怒而得怒則氣上少陽之火客於耳也若腎虛而鳴者其鳴不甚其人多欲當見勞怯等證丹溪云耳鳴因酒過者用大劑通聖散加枳殼柴胡大黃甘草南星桔梗青皮荊芥如不愈用四物湯薛新甫云若血虛有火用四物加山梔柴胡若中氣虛弱用補中益氣湯若血氣俱虛用八珍湯加柴胡若怒便聾而或曰耳屬肝膽經氣實用小柴胡加芎歸山梔虛用八珍湯加山梔若午前甚者陽氣實熱也小柴胡加黃連山梔陽氣虛用補中益氣湯加柴胡山梔午後甚者陰血虛也四物加白朮茯苓若腎虛火動或痰盛作渴者必用地黃丸胃中空宗脈虛上氣不足皆參耆為君柴升佐之耳中哄哄然是無陰也又液脫者腦髓消脛酸耳數鳴宜地黃丸腎虛耳中潮聲蟬聲無休止時妨害聽聞者當墜氣補腎正元飲咽黑錫丹間進安腎丸有熱者龍齒散腎藏風耳鳴夜間睡著如打戰鼓更四肢抽掣痛耳內覺有風吹奇癢宜黃耆丸腎者宗脈所聚耳為之竅血氣不足宗脈乃虛風邪乘虛隨脈入耳氣與之搏故為耳鳴先用生料五苓散加制枳殼橘紅紫蘇生薑同煎吞青木香丸散邪疏風下氣續以芎歸飲和養之耳中耵聹耳鳴耳聾內有汙血宜柴胡聰耳湯余法與耳聾相參用之外治麝香散吳茱萸散及烏頭燒灰菖蒲等分末之綿包塞耳或用生地黃截塞耳數易之以瘥為度耳腫痛屬少陽相火經云少陽之勝耳痛治以辛寒是也生犀丸犀角飲子解熱飲子耳內痛生瘡用黍黏子湯耳濕腫痛用涼膈散加酒炒大黃黃芩酒浸防風荊芥羌活服之更以腦多麝香少濕加枯礬吹入耳中丹鉛續錄云王萬里時患耳痛魏文靖公勸以服青鹽鹿茸煎雄附為劑且言此藥非為君虛損服之曷不觀易之坎為耳痛坎水藏在腎開竅於耳而水在志為恐恐則傷腎故為耳痛氣陽運動常顯血陰流行常幽血在形如水在天地間故坎為血卦是經中已著病證矣竟餌之而良愈外治白龍散杏仁膏菖蒲挺子或用穿山甲二片土狗子二個夾在穿山甲內同炒焦黑色為度入麝香少許同研細吹一字於耳內亦治耳聾或用草烏削如棗核大蘸薑汁塞耳內一方不用薑汁或用鬱金研細末每以淨水調一字傾入耳卻急傾出或用油胡桃肉為末狗膽汁和為丸如桐子大綿裹安耳中或用食鹽炒熱用棗面蒸熟青花布包定枕之耳癢沈存中雲予為河北察訪使時病赤目四十餘日黑睛傍黯赤成瘡晝夜痛楚百療不瘥郎官丘革相見問予病目如此曾耳中癢否若耳中癢即是腎家風有四生散療腎風每作二三服即瘥閭里號為聖散子予傳其方合服之午時一服臨臥一服目反大痛至二鼓時乃能眠及覺目赤稍散不復痛矣更進三四服遂平安如常是時孫和甫學士帥鎮陽聞予說大喜曰吾知所以自治目矣向久病目嘗見呂吉甫參政云頃目病久不瘥因服透冰丹乃瘥如其言修合透冰丹一劑試服了二三十服目遂愈乃知透冰丹亦療腎風耳聖惠云有人耳癢一日一作可畏直挑剔出血稍愈此乃腎臟虛致浮毒上攻未易以常法治也宜服透冰丹勿飲酒啖濕面蔬菜雞豬之屬能盡一月為佳不能戒無效停耳羅謙甫云耳者宗脈之所聚腎氣之所通足少陰之經也若勞傷氣血熱氣乘虛入於其經邪隨血氣至耳熱氣聚則生膿汁故謂之停耳也內服柴胡聰耳湯通氣散蔓荊子散外用紅綿散松花散白蓮散麝香散杏仁膏礬石散蔥涎膏菖蒲散竹蛀散蠍倍散立效散香附散三黃散二聖散如壯盛之人積熱上攻耳中出膿水不瘥用無憂散送雄黃丸瀉三四五行瘥耳內瘡羅謙甫云耳內生瘡者為足少陰是腎之經也其氣通於耳其經虛風熱乘之隨脈入於耳與氣相搏故令耳門生瘡也曾青散主之黃連散亦可內服黍黏子湯薛新甫云耳瘡屬手少陽三焦經或足厥陰肝經血虛風熱或肝經燥火風熱或腎經風火等因若發熱焮痛屬少陽厥陰風熱用柴胡梔子散若內熱癢痛屬前二經血虛用當歸川芎散若寒熱作痛屬肝經風熱用小柴胡湯加山梔川芎若內熱口乾屬腎經虛火用加味地黃丸如不應用加減八味丸余當隨證治之凍耳成瘡方柏葉三兩微炙為末杏仁四十九枚湯浸去皮研成膏亂髮兩雞子大食鹽乳香各半兩細研黃蠟一兩半清油一斤上先煎油令沸即下亂髮以消盡為度次下諸藥煎令焦黃濾去滓更以綿重濾過再以慢火煎之後下乳香黃蠟等攪令稠稀得所於瓷器盛每用鵝翎旋取塗之又方柏白皮榆白皮桑白皮杏仁湯浸去皮各二兩甘草一兩羊腦髓半斤上銼以羊腦髓煎令黃濾去滓於瓷器盛每用鵝翎蘸藥塗之蟲入耳薛新甫云先君嘗睡間有蟲入耳痛瞀將生薑擦貓鼻其尿自出取尿滴耳內蟲即出而愈又有百戶張錦謂予曰耳內生瘡不時作痛痛而欲死痛止如故診其脈皆安靜予謂非瘡也話間痛忽作予度其有蟲入耳令回急取貓尿滴耳果出一臭蟲遂不復痛或用麻油滴之則蟲死難出或用炒芝麻枕之則蟲亦出但俱不及貓尿之速也治百蟲入耳藍汁蔥汁韭汁萵苣汁雞冠血酸醋香油稻稈灰汁俱灌入耳中桃葉挼細塞耳白膠香燒煙燻入耳豬肉少許炙香置耳孔邊麻油作煎餅側臥以耳枕之以火照之以刀兩口於耳上相擊作聲水銀一大豆傾入耳中欹耳孔向下於耳上擊銅器物數聲白礬雄黃等分為細末香油調成膏每用皂角子大塞耳川椒為末一錢醋半盞浸良久少少滴耳中用口氣盡力吸出最妙蜒蝣入耳立驗散硇砂膽礬等分研細鵝翎管吹一字入耳中蟲化為水雞一隻去毛足以油煎令黃箸穿作孔枕之綠礬為末水調濯耳雄黃為末醋調灌耳蝸牛一個槌碎置耳邊牛乳一盞少少灌入耳內若入腹者飲一二升當化為黃水驢乳三合灌耳中其蟲從左耳入右耳出蜈蚣入耳用煎雞枕之或用炙豬肉掩兩耳韭汁或薑汁灌耳中蜈蚣及蟻入耳用豬脂一指大炙令香安耳邊即出又用生薑汁灌耳中即出大蒜汁亦可蟻入耳搗韭汁灌大蒜汁亦可鯪鯉甲燒灰為末水調濾過滴入耳中飛蛾入耳醬汁灌入耳即出或以鵝管極氣吸之出或擊銅器於耳邊蒼蠅入耳最害人速用皂角子蟲研爛生鱔血調灌入耳中蚤蝨入耳痛菖蒲為末炒乘熱以綿裹著耳邊水入耳以薄荷汁點立效治耳中有物不可出以麻繩剪令頭散敷好膠著耳中使其物黏之徐徐引出效用弓弦尤妙鼻頞中頞亦作齃鼻山根也俗呼鼻梁屬足陽明胃經督脈之會素問曰膽移熱於腦則辛頞鼻淵傳為衄衊瞑目注足太陽膀胱脈起目內眥上額交巔絡腦陽明脈起於鼻交頞中旁約太陽之脈今腦熱則足太陽逆與陽明之脈俱盛薄於頞中故頞辛鼻淵頞辛者鼻痠痛也鼻淵者濁涕下而不止如水泉也熱盛則陽絡溢陽絡溢故衄衄者鼻出汗血也又謂之蔑血出甚則陽明太陽脈衰不能榮養於目故目瞑瞑暗也鼻屬手太陰肺經素問曰西方白色入通於肺開竅於鼻畏熱靈樞曰肺病者喘息鼻張又曰肺虛則鼻塞不利和則能知香臭矣喬嶽曰肺絕則無涕鼻孔黑燥肝逆乘之而色青東垣曰傷風鼻中氣出粗合口不開肺氣通於天也又屬手少陰心經李東垣曰鼻本主肺而復能聞香臭者鼻中有心庚金生於己也素問曰五氣入鼻藏於心肺心肺有病而鼻為之不利也又屬手足陽明大腸胃經督脈之交會劉河間曰傷風寒於腠理而為鼻塞者寒能收斂陽氣不通暢也素問曰傷寒二日陽明受之陽明主肉其脈俠鼻故鼻乾不得臥王海藏曰石膏發汗辛寒入手太陰經仲景治傷寒陽明經證乃用之者何也蓋胃脈行身之前而胸為胃肺之室邪熱在陽明則肺受火制故用辛寒以清肺所以號為白虎湯也素問又曰運氣陽明所至為鼽嚏注鼽鼻窒也嚏噴嚏也其在小兒面部謂之明堂靈樞曰脈見於氣口色見於明堂明堂者鼻也明堂廣大者壽小者殆況加疾哉按此語即相家貴隆準之說也然須視其面部何如愚嘗見明堂雖小與面相稱者壽可八十要不可執一論也屬足太陰脾經素問曰脾熱病者鼻先赤俠鼻孔兩旁五分名迎香穴屬手足陽明大腸胃經之會直兩目瞳子名巨髎穴屬足陽明胃經陰蹺脈之會余處無恙獨鼻尖色青黃者其人必為淋也鼻尖微白者亡血也赤者血熱也黃者小便難也鼻塞皆屬肺經云肺氣通於鼻肺和則鼻能知香臭矣又云五氣入鼻藏於心肺心肺有病而鼻為之不利也又云西方白色入通於肺開竅於鼻藏精於肺又云肺主臭在藏為肺在竅為鼻是也東垣曰金匱真言論云西方白色入通於肺開竅於鼻藏精於肺夫十二經脈三百六十五絡其氣血皆上走於面而走空竅其精陽氣上走於目而為睛其彆氣走於耳而為聽其宗氣出於鼻而為臭難經云肺氣通於鼻肺和則能知香臭矣夫陽氣宗氣者皆胃中生髮之氣也其名雖異其理則一若因飢飽勞役損脾胃生髮之氣既弱其營運之氣不能上升邪塞孔竅故鼻不利而不聞香臭也宜養胃氣實營氣陽氣宗氣上升鼻管則通矣又一說難經云心主五臭肺主諸氣鼻者肺竅反聞香臭者何也蓋以竅言之肺也以用言之心也因衛氣失守寒邪客於頭面鼻亦受之不能為用是不聞香臭矣故經曰心肺有病鼻為之不利潔古曰視聽明而清涼香臭辨而溫暖者是也治法宜先散寒邪後補衛氣使心肺之氣得交通則鼻利而聞香臭矣麗澤通氣湯主之眼多眵淚溫肺湯咳嗽上喘禦寒湯目中溜火氣寒血熱淚多臍下冷陰汗足痿弱溫衛湯耳鳴口不知穀味氣不快四肢困倦行步不正發脫落食不下膝冷陰汗帶下喉中介介不得臥口舌嗌乾太息頭不可回顧項筋緊急脊強痛頭旋眼黑頭痛呵欠嚏噴溫衛補血湯人參湯辛夷散增損通聖散辛夷湯醍醐散通關散防風湯排風散蓽澄茄丸皆治鼻塞之劑宜審表裡寒熱而用之小薊一把水二升煮一升去渣溫服外治通草散菖蒲散瓜蒂散蒺藜汁葫蘆酒或用生蔥分作三段早用蔥白午用蔥管中截晚換蔥管末稍一截塞入鼻中令透里方效王汝言曰鼻塞不聞香臭或但遇寒月多塞或略感風寒便塞不時舉發者世俗皆以為肺寒而用解表通利辛溫之藥不效殊不知此是肺經素有火邪火鬱甚則喜得熱而惡見寒故遇寒便塞遇感便發也治法清肺降火為主而佐以通氣之劑若如常鼻塞不聞香臭者再審其平素只作肺熱治之清金瀉火清痰或丸藥噙化或未藥輕調緩服久服無不效矣此予所親見而治驗者其平素原無鼻塞舊證一時偶感風寒而致窒塞聲重或流清涕者自作風寒治薛新甫云前證若因飢飽勞役所傷脾胃發生之氣不能上升邪害空竅故不利而不聞香臭者宜養脾胃使陽氣上行則鼻通矣補中益氣湯之類是也孫氏姑鼻不聞香臭有年矣後因他疾友人繆仲淳為處方每服用桑白皮至七八錢服久而鼻塞忽通鼻塞久而成齆蓋由肺氣注於鼻上榮頭面若上焦壅滯風寒客於頭腦則氣不通冷氣停滯搏於津液膿涕結聚則鼻不聞香臭遂成齆也內服芎藭散山茱萸丸外用赤龍散通頂散雄黃散黃白散通草散鼻鼽謂鼻出清涕也內經運氣鼻鼽有二一曰火攻肺虛鼻鼽經云少陰司天熱氣下臨肺氣上從鼽衄鼻窒又云少陰司天熱淫所勝民病鼽衄嚏嘔又云少陽司天火淫所勝甚則鼽衄又云少陽之復煩躁鼽嚏又云少陰司天客勝則鼽嚏又云歲金不及炎火乃行民病鼽嚏又云金不及曰從革從革之紀其病嚏咳鼽衄治以諸寒是也二曰金助肺實鼻鼽經云陽明所至為鼽嚏治以溫劑是也孫一奎曰大腸肺之腑也胃五臟之所受氣者也經曰九竅不利腸胃之所生也鼻主無形者經曰清氣通於天又曰鼻主天氣設腸胃無痰火積熱則平常上升之氣皆清氣也縱火熱主令之歲何嘗病耶若腸胃素有痰火積熱則其平常上升之氣皆氳而為濁矣金職司降喜清而惡濁今受濁氣熏蒸凝聚既久壅遏鬱結而為涎涕至於痔珠瘜肉之類皆由積久燥火內燔風寒外束隧道壅塞氣血升降被其妨礙澆培彌厚猶積土而成阜也即非火熱主令之歲有不病者乎治者無拘於運氣之說可也細辛散本事通草丸三因辛夷散千金細辛膏川椒散塞鼻柱膏皆溫熱之劑真是腦冷者乃可用白芷丸有外感者可服丹溪云肥人鼻流清涕乃飲食痰積也蒼朮片芩南星川芎白芷辛夷甘草或末或丸皆可白湯下鼻淵謂鼻出濁涕也經云膽移熱於腦則辛頞鼻淵鼻淵者濁涕不止也傳為衄蔑瞑目又云泣涕者腦也故腦滲為涕故得之氣厥也王太僕注云腦液下滲則為濁涕涕下不止如彼水泉故曰鼻淵也頞謂鼻頞也足太陽脈起於目內眥上額交巔上入絡腦足陽明脈起於鼻交頞中傍約太陽之脈今腦熱則足太陽逆與陽明之脈俱盛薄於頞中故鼻頞痠痛也熱盛則陽絡溢陽絡溢則衄出汗血也血出甚陽明太陽脈衰不能榮養於目故目瞑厥者氣逆也皆由氣逆而得之宜服防風湯運氣鼻淵皆屬熱經云少陰之復甚則入肺咳而鼻淵治以苦寒是也仲景云肺中寒者吐濁涕原病式曰夫五行之理微則當其本化甚則兼其鬼賊故經曰亢則害承乃制也易曰燥萬物者莫熯乎火以火鍊金熱極而反化為水故其熱極則反汗出也由是肝熱甚則出泣心熱甚則出汗脾熱甚則出涎肺熱甚則出涕腎熱甚則出唾經曰鼻熱甚出濁涕又曰膽移熱於腦則辛頞鼻淵故凡痰涎涕唾稠濁者火熱盛極消爍致之也或言鼽為肺寒者誤也但見鼽涕鼻窒遇寒則甚遂以為然豈知寒傷皮毛則腠理致密熱氣怫鬱而病愈甚也三因蒼耳散嚴氏辛夷散皆表劑也丹溪治鼻淵藥南星半夏蒼朮白芷神麯酒芩辛夷荊芥婁全善治一中年男子右鼻管流濁涕有穢氣脈弦小右寸滑左寸澀先灸上星三里合谷次以酒芩二兩蒼朮半夏各一兩辛夷細辛川芎白芷石膏人參葛根各半兩分七帖服之全愈此乃濕熱痰積之證也孫一奎云嘗以防風通聖散除硝黃其滑石石膏減半倍加辛夷花先服三五帖再用此為丸每服七十丸早晚白湯吞服半斤則瘳矣抑金散戴復庵云有不因傷冷而涕多涕或黃或白或時帶血如腦髓狀此由腎虛所生不可過用涼劑宜補腦散仍以黑錫丹紫靈丹靈砂丹亦有痰氣者宜南星飲頭風鼻涕下如白帶宜辛夷丸久患鼻膿極臭者以冷水調百草霜末服治腦漏驗方人參白朮川芎當歸各一錢黃耆防風各七分陳皮八分白芷木通各五分辛夷四分細辛升麻炙甘草各三分水煎食後半飽服又方川芎二錢防風一錢二分白芷荊芥穗黃芩石膏各一錢細辛升麻木通各七分藁本桔梗各五分甘草三分末之每七錢加煆過黃魚腦中骨三錢茶清調下虛人加人參麥門冬鼻中時時流臭黃水甚者腦亦時痛俗名控腦砂有蟲食腦中用絲瓜藤近根三五尺許燒存性為細末酒調服即愈又方沉香少許宿香去白二錢雄黃皂角各少許白牛毛橙葉焙乾各二錢上為細末吹入鼻中倘有少血出不妨血出加炒山梔子灸法囟會在鼻心直上入髮際二寸再容豆是穴灸七壯又灸通天在囟會上一寸兩傍各一寸灸七壯左臭灸左右臭灸右俱臭俱灸曾用此法灸數人皆於鼻中去臭積一塊如朽骨臭不可言去此全愈鼻瘜肉韓氏醫通云貴人鼻中肉贅臭不可近痛不可搖束手待斃予但以白礬末加硇砂少許吹其上頃之化水而消與勝濕湯加瀉白散二帖愈此厚味擁濕熱蒸於肺門如雨霽之地突生芝菌也肺虛而壅鼻生瘜肉不聞香臭羊肺散胃中有食積熱痰流注宜星半蒼朮酒芩連神麯辛夷細辛白芷甘草消痰積之藥內服外用蝴蝶礬二錢細辛一錢白芷五分為末綿裹納鼻中頻換辛夷膏輕黃散黃白散二丁散瓜丁散地龍散皆外治之藥鼻瘡內服烏犀丸甘露飲黃連阿膠丸外治地黃煎辛夷膏杏仁研乳汁敷烏牛耳垢敷黃柏苦參檳榔為末豬脂調敷青黛槐花杏仁研敷鼻疳蝕椿根湯烏香散藍靛敷令遍日十度夜四度立瘥鼻乾無涕犀角散桑根白皮散吹鼻散鼻痛氣道壅塞故痛內服人參順氣散外敷白芷散風冷搏於肺臟上攻於鼻則令鼻痛沒藥散肺受風面色枯白頰時赤皮膚乾燥鼻塞干痛此為虛風白蘚皮湯鼻塞眼昏疼痛腦悶葫蘆酒卒食物從鼻中縮入腦中介介痛不出以牛脂或羊脂如指頭大內鼻中以鼻吸取脂入須臾脂消則物逐脂俱出也鼻赤一名酒齄鼻乃血熱入肺也肺氣通於鼻為清氣出入之道路多飲酒人邪熱熏蒸肺葉伏留不散故見於鼻或肺素有風熱雖不飲酒其鼻亦赤謂之酒齄蓋俗名也宜一味折二泔食後冷飲或以枇杷葉拭去毛不須塗炙銼細煎濃湯候冷調消風散食後臨臥進亦可服升麻防風散瀉青丸秘方用枇杷葉去毛大山梔苦參蒼朮米泔浸炒各等分為末每服一錢半酒調白滾湯嚥下晚服之去右邊赤早服之去左邊赤其效如神外用硫黃入大菜頭內煨碾塗之或以生白礬研末每洗面時置掌中滴酒擦患處數日即白或以白鹽常擦或以牛馬耳垢水調敷或以生半夏末水調敷或以青黛槐花杏仁研敷或以杏仁一味乳汁研敷或用硫黃一兩白果燒灰一錢琥珀三分輕粉五分白礬五分各為末用燒酒一碗入酒壺將前藥裝內封固懸空鍋內熱湯浸壺慢火頓一二時取出放冷日用燒酒塗夜用沉底藥末敷鼻紫黑丹溪云諸陽聚於頭則面為陽中之陽鼻居面中央而陽明起於頞中一身之血運到面鼻陽部皆為至清至精之氣矣酒性善行而喜升大熱而有峻急之毒多酒之人酒氣熏蒸面鼻血得酒為極熱熱血得冷為陰氣所搏汙濁凝結滯而不行宜其先為紫而後為黑色也須用融化滯血使得流通滋生新血可以運化病乃可愈予嘗以酒製四物湯加酒炒片芩陳皮生甘草酒紅花生薑煎調下五靈脂末飲之氣弱形肥者加酒黃耆無有不應入好酒數滴為引使口口者脾之所主胃大腸脈之所挾經云中央黃色入通於脾開竅於口藏精於脾又云脾主口在藏為脾在竅為口又云脾氣通於口脾和則口能知五味矣此脾之主於口也又經云胃足陽明之脈挾口下交承漿又云大腸手陽明之脈挾口交人中此胃大腸之脈挾於口也脾熱則口甘肝熱則口酸心熱則口苦肺熱則口辛腎熱則口咸胃熱則口淡口甘生地黃芍藥黃連及三黃丸口苦柴胡黃芩黃連苦參龍膽草及小柴胡湯加麥門冬酸棗仁地骨皮遠志內經曰有病口苦名曰膽癉乃肝主謀慮膽主決斷盛汁七合是清淨之腑取決於膽膽或不決為之恚怒則氣上逆膽汁上溢故口苦或熱甚使然也龍膽瀉肝湯主之口酸黃連龍膽瀉肝神麯蘿蔔消食鬱口辛黃芩梔子瀉肺芍藥瀉脾麥門清心口淡白朮半夏生薑茯苓燥脾滲濕口醎知母烏賊魚骨淡胃口澀黃芩瀉火葛根生津防風薄荷疏風栝蔞茯苓行痰口糜內經云膀胱移熱於小腸膈腸不便上為口糜東垣云好飲酒人多有此疾易老用五苓散導赤散相合服之神效經云少陽之復火氣內發上為口糜治以苦寒胡黃連散必效散皆苦寒之劑以辛溫佐之口糜野薔薇根煎湯漱之良口瘡有二一曰熱經云少陽司天火氣下臨肺氣上從口瘍是也二曰寒經云歲金不及炎火乃行復則寒雨暴至陰厥且格陽反上行病口瘡是也或問口瘡如何得之曰經云膀胱移熱於小腸膈腸不便上為口糜蓋小腸者心之腑也此舉由邪熱之端耳心屬君火是五臟六腑之火主故諸經之熱皆應於心心脈布舌上若心火炎上熏蒸於口則為口舌生瘡脾脈布舌下若脾熱生痰熱涎相搏從相火上炎亦生瘡者尤多二者之病諸寒涼劑皆可治但有涎者兼取其涎然則有用理中湯加附子以治者又何如曰夫火有虛實因諸經元有熱而動者謂之實無熱而動者謂之虛實則正治寒涼之劑是也虛則從治如此用溫熱是也理中湯者因胃虛谷少則所勝腎水之氣逆而承之反為寒中脾胃衰虛之火被迫炎上作為口瘡故用參朮甘草補其土薑附散其寒則火得所助接引其退舍矣至聖濟總錄有謂元臟虛冷上攻口瘡者用巴戟白芷高良薑末豬腰煨服又有用丁香胡椒松脂細辛末蘇木湯調塗瘡上及不任食者用當歸附子白蜜含咽者有用生附塗腳心者有用吳茱萸末醋熬膏入生地龍末塗兩足心者若此之類皆是治龍火按寒水上迫心肺之陽不得下降故用溫熱之劑或散於上或散於下或從陰隨陽所攸利者也胃中有熱脈洪大宜服涼膈散甘桔湯加芩三補丸金花丸漱以黃連升麻湯敷以綠袍散蜜柏散丹溪用西瓜漿水徐徐飲之如無以皮燒灰噙之外用細辛黃柏末摻取涎胡氏方以好墨研螻蛄極細敷之立效按此治膀胱移熱於小腸者之正劑也蓋螻蛄專走小腸膀胱而通利膈腸者因力峻氣猛陰虛氣上致瘡者戒勿用唯體實有熱在上焦者宜之張子和治一男子病口瘡數年上至口中至咽嗌下至胃脘皆痛不敢食熱物一湧一泄一汗十去其九次服黃連解毒湯十餘日皆釋以上治實熱服涼藥不愈者此酒色過度勞役不睡舌上光滑而無皮或因憂思損傷中氣虛火泛上無制用理中湯甚者加附子或官桂噙之薛新甫云口瘡上焦實熱中焦虛寒下焦陰火各經傳變所致當分別治之如發熱作渴飲冷實熱也輕則用補中益氣湯重則用六君子湯飲食少思大便不實中氣虛也用人參理中湯手足逆冷肚腹作痛中氣虛寒也用附子理中湯晡熱內熱不時而熱血虛也用八物加丹皮五味麥門冬發熱作渴唾痰小便頻數腎水虧也用加減八味丸食少便滑面黃肢冷火衰土虛也用八味丸日晡發熱或從腹起陰虛也用四物參朮五味麥門不應用加減八味丸若熱來復去晝見夜伏夜見晝伏不時而動或無定處或從腳起乃無根之火也亦用前丸及十全大補加麥門五味更以附子末唾津調搽湧泉穴若概用寒涼損傷生氣為害匪輕以上治虛火治少陰口瘡半夏散聲絕不出者是寒遏絕陽氣不伸半夏制一兩桂烏頭各一字同煎一盞分二服治太陰口瘡甘礬散以甘草二寸白礬栗子大含化咽津治赤口瘡乳香散以乳香沒藥各一錢白礬半錢銅綠少許研為末摻之治白口瘡沒藥散以乳香沒藥雄黃各一錢輕粉半錢巴豆霜少許為末摻之口瘡久不愈以五倍末搽之或煎湯漱或煎湯泡白礬或膽礬漱蓋酸能收斂戴復庵云下虛上盛致口舌生瘡若用鎮墜之藥以降氣湯或鹽水下養正丹或黑錫丹仍於臨臥熱湯洗足炒揀淨吳茱萸小撮拭足了便乘炒熱置足心用絹片扎之男左女右口臭常熟嚴文靖公年逾七十未斷房室日服溫補之藥無算兼以人參煮粥蓯蓉作羹致滋胃熱滿口糜爛牙齒動搖口氣臭穢殆不可近屢進寒涼清胃之藥不效有欲用薑桂反佐者請決於予予曰用之必大劇主用加減甘露飲八劑而平香薷煮濃汁含之噙雞舌香即沉香花如無沉香可代口中如膠而臭知母地骨皮桑白皮山梔麥門冬甘草鹽湯噙早起汲井中第一汲水即井華水含之吐棄廁下即瘥心氣不足口臭益智仁加甘草少許為末乾嚥或湯點張子和治一男子二十餘歲病口中氣出臭如登廁夫肺金本主腥金為火所乘火主臭應便如是也久則成腐腐者腎也此亢極則反兼水化也病在上宜湧之以茶調散湧而去其七分夜以舟車丸浚川散下五七行比旦而臭斷藥性獷悍不宜輕用羅謙甫治梁濟民膏粱多飲因勞心過度肺金有傷以致氣出腥臭涕唾稠黏咽嗌不利口苦幹燥以加減瀉白散主之難經云心主五臭入肺為腥臭此其一也因洪飲大熱之氣所傷從心火刑于肺金以桑白皮地骨皮苦微寒降肺中伏火而補氣為君以黃芩知母苦寒治氣腥臭清利肺氣為臣肺欲收急食酸以收之五味子酸溫以收肺氣麥門冬苦寒治涕唾稠黏口苦幹燥為佐桔梗辛溫體輕浮治痰逆利咽膈為使也齒齒統屬足少陰腎經素問曰丈夫五八腎氣衰發墮齒槁又曰腎熱者色黑而齒槁少陰終者面黑齒長而垢齒分上下齗亦作齦齒根肉也上齗屬足陽明胃經素問曰邪客於足陽明之經令人鼽衄上齒寒針經曰上爿痛喜寒而惡熱取足陽明之原衝陽穴在兩足跗上五寸骨間動脈中注爿判也左半為爿右半為片朱丹溪曰當灸三里穴三里足陽明經之合穴也在兩膝下外側輔骨下三指地離䯒骨外一指許兩筋間宛宛也下齗屬手陽明大腸經張潔古曰秦艽去下牙痛及除本經風濕針經曰下爿痛喜熱而惡寒取手陽明之原合谷穴在兩手大指次指岐骨間陷中朱丹溪曰當灸三間穴三間手陽明經之俞穴也在兩手大指次指本節後內側骨上縫中赤白肉際男子八歲腎氣實而齒生更三八真牙生五八則齒槁八八而齒去矣女子亦然以七為數蓋腎主骨齒乃骨之餘髓之所養也故隨天癸之盛衰也足陽明之支者入於上齒手陽明之支者入於下齒若骨髓不足陽明脈虛則齒之諸病生矣何以言之陽明金也齒屬腎水也陽明之支入齒間此乃母氣榮衛其子也故陽明實則齒堅牢陽明虛則齒浮動所以齒痛者乃陽明經有風冷濕熱之邪乘虛而入聚而為液為涎與齒間之氣血相搏擊而痛也若熱涎壅盛則腫而痛也熱不盛則齒齗微腫而根浮也有蟲牙痛者由濕熱生蟲蝕其根而作痛也有齒間血出者由陽明之支有風熱之邪入齒齗搏於血故血出也有齒齲者亦以陽明入風熱之邪搏齒齗氣血腐化為膿出臭汁謂之齒齲亦曰風齲有齒䘌者是蟲蝕齒至齗膿爛汁臭也有齒挺者由氣熱傳入脈至齒齗間液沫為膿氣血竭肉齗消故齒根露而挺出也有齒動搖者陽明脈虛氣血不榮故齒動搖也有齒歷蠹者由骨髓氣血不能榮盛故令牙齒黯黑謂之歷齒其齒黃黑者亦然以此而言豈非諸齒病皆因陽明之所致哉東垣云夫齒者腎之標口者脾之竅諸經多有會於口者其牙齒是手足陽明之所過上齗隸於坤土乃足陽明胃脈之所貫絡也止而不動下齗嚼動而不休手陽明大腸脈之所貫絡也手陽明惡寒飲而喜熱足陽明喜寒飲而惡熱故其病不一牙者腎之標亦喜寒寒者堅牢為病不同熱甚則齒動齦斷袒脫作痛不已故所治療不同也有惡熱而作痛者有惡寒而作痛者有惡寒又惡熱而作痛者有惡寒飲少熱飲多而作痛者有惡熱飲少寒飲多而作痛者有牙齒動搖而作痛者有齒袒而作痛者有齒齗為疳所蝕缺少血出而作痛者有齒齗腫起而作痛者有脾胃中有風邪但覺風而作痛者有牙上多為蟲所蝕其齒缺少而色變為蟲牙痛者有胃中氣少不能於寒袒露其齒作痛者有牙齒疼痛而臭穢之氣不可近者痛既不一豈可一藥而盡之哉劉宗厚云頭面外冒風寒或口吸寒冷致牙疼者皆外因也實熱陰虛火動骨蒸所致氣鬱血熱蟲蛀皆內因也硬物所支打擊等致皆不內外因也薛新甫云濕熱甚而痛者承氣湯下之輕者清胃散調之大腸熱而齦腫痛者清胃散治之重則調胃湯清之六鬱而痛者越鞠丸解之中氣虛而痛者補中益氣湯補之思慮傷脾而痛者歸脾湯調之腎經虛熱而痛者六味丸補之腎經虛寒而痛者還少丹補之重則八味丸主之其屬風熱者獨活散不愈茵陳散風寒入腦者羌活附子湯病證多端當臨證制宜牙痛有風毒熱壅齲蛀腎虛未辨何證俱用消風散揩抹諸證皆宜香附炒黑三分炒鹽一分研勻揩用如常風寒濕犯腦痛項筋急牙齒動搖肉齦袒脫疼痛宜羌活散冬月時風寒濕頭疼項筋急牙齒動搖疼痛宜麻黃散大寒犯腦連頭痛齒亦痛宜細辛散白芷散蠍稍散牙齒寒痛用牢牙地黃散擦或露蜂房川椒去目炒等分為粗末煎漱或荔枝殼或核燒灰存性擦痛處牙痛用清涼藥便痛甚者從治之用蓽茇川椒薄荷荊芥細辛樟腦青鹽為末擦牙上得熱而痛得涼則止者以辛涼藥治之東垣治劉經歷內子年三十餘病齒痛不可忍須騎馬外行口吸涼風則痛止至家則痛復作此濕熱之邪也足陽明貫於上齒手陽明貫於下齒陽明多血多氣又加以膏粱之味助其濕熱故為此痛因立一方不須騎馬出外當令風寒之氣常生於齒間以黃連梧桐律之苦寒新薄荷葉荊芥穗之辛涼四味相合而作風寒之氣治其濕熱更以升麻之苦平引入陽明經為使牙齒骨之餘以羊脛骨灰補之為佐麝香少許入內為引用名曰馘鬼散為細末擦之神效又以調胃承氣湯去芒硝加黃連以治其本服之下三五行其病良愈不復作風毒牙痛內服獨活散外用皂角寸節實之以鹽火煨熟湯泡通口漱吐下涎沫風毒及熱壅上攻牙齦痛或齒縫有紅肉努出宜消風散食後臨臥入茶點仍入荊芥防風白芷蜂房之屬煎冷頻頻漱口若熱壅甚牙腫連頰痛不可忍宜金沸草散去麻黃加薄荷如其數三因方云一婦人牙痛治療不效口頰皆腫以金沸草散大劑煎湯熏漱而愈陽明熱牙疼大黃炒焦黑存性香附亦然為末入青鹽少許擦無時因服補胃熱藥致上下牙疼痛不可忍牽引頭腦滿面發熱大痛陽明之別絡入腦喜寒惡熱乃手陽明經中熱盛而作其齒喜冷惡熱清胃湯主之倉公治齊中大夫病齲齒灸左手陽明脈苦參湯日漱三升五六日愈寒熱皆痛當歸龍膽散益智木律散寒多熱少者微惡熱飲大惡寒飲宜草豆蔻散熱多寒少者微惡寒飲大惡熱飲宜麝香散立效散上爿牙疼升麻散下爿牙疼白芷散平昔多食肉人口臭牙齒動搖欲落或血出不止乃內傷濕熱膏粱之疾也宜神功丸牢牙散調胃承氣去硝加黃連湯腎虛牙浮而痛甚則憎寒壯熱全具如欲脫之狀宜安腎丸八味丸還少丹間進黑錫丹病齒非腫非疼虛不能嚼食用局方嘉禾散姜煎食後一服次以地骨皮煎湯漱之候空心以羊腰子一對切片勿令斷以蔥絲椒末青鹽蒺藜去刺末固元散二錢拌勻摻於腰子內以豆蔻葉或荷葉包裹煨令熟食之服經兩日頓覺快利飲食如故擦藥用牢牙散引涎止痛方枯礬露蜂房微炙等分為末每服二錢水煎乘熱炸牙冷即吐之或用蟾酥銀硃摻和為丸如蘿蔔子大每用一丸搽患處便不疼至三丸吐濃涎數口全愈塞耳方雄黃定痛膏透關散及巴豆一粒煨黃熟去殼用蒜一瓣切一頭作蓋剜去中心入巴豆其中以蓋合之用綿裹隨患左右塞耳中常用刷牙牢牙散白牙散麝香刷牙散羊脛骨灰散長春散沉香散硃砂散妙應散齲蛀海藏云牙齒等齲數年不愈當作陽明蓄血治之桃仁承氣湯為細末煉蜜丸如桐子大服之好飲過者多得此疾屢服有效蛀牙痛用巴豆一粒爛研一方香油燈上燒過搓乳香細末丸之塞蛀孔中內藜蘆細末於孔中勿咽津用不蛀皂角一錠去皮子卻於每皂子處安巴豆一粒鹽泥固濟燒灰研細末用剜耳子抄少許填入蛀孔內雄雀糞綿裹塞孔內日一二易蘆薈白膠香塞蛀孔內松脂銳如錐者塞孔中少頃蟲出脂上蘆薈四分炒研細先用鹽揩淨齒敷少許鶴蝨枝插患處蕪荑仁安蛀齒上有縫就以窒之吳茱萸雄黃各等分樟腦乳香各少許末之擦痛處鶴蝨細辛白芷干茄等分為末揩痛處如有蛀孔用飯丸藥末塞孔中蟲蝕牙根肉腐用棘針燒取瀝頻敷之或煮汁含之亦可煮郁李根白皮濃汁含溫米醋漱出蟲自愈香白芷細辛煎漱天仙子燒煙用竹筒抵牙引煙燻之即蟲死不再發用小瓦片置油拌韭子燒煙擱在水碗上以漏斗覆之以蛀牙受漏斗口中煙其牙內蟲如針者皆落水碗中蛀牙有孔疼痛不斷根者用雄黃乳香各一錢樟腦少許末之黃蠟為丸隨孔大小納一丸以鐵打條一尺五寸長如箸小頭大作一勾頭如鉗尾狀火燒紅筆管筒住只留勾頭勿令熱傷唇舌須先以箸挑開口唇然後以頭勾炷湯藥上須熔開覺熱為度以水漱之神效有牙蟲已出其孔穴空虛而痛者宜用乳香少許火炙令軟以實之牙齗宣露用栝蔞根二兩砂鍋內甘草水煮軟取出令乾雞舌香十枚白芷半兩麝香一分上為細末每用少許揩牙誤咽無妨蚯蚓矢水和為泥火燒令赤研如粉臘月豬脂和敷上日三次永瘥一方同入瓷瓶內黃泥固濟煻火煨燒一夜候冷取出細研用如常法揩牙生地黃一斤於木臼內搗碎入鹽二合和之上用白麵裹可厚半寸以來煨於煻灰火中斷煙始成去焦面入麝香一分同研末每用少許貼齒根上蔓荊子生地黃地骨皮青蒿各一兩郁李根皮二兩每服半兩水煎熱含冷吐牙齒動搖東垣云還少丹常服牢牙齒地黃丸亦好陰虛內熱者甘露飲外用五靈膏宣牙膏五倍子散生薑地黃汁制皂角散土蒺藜散黑鉛砂貼搽生地細銼綿裹著齒上咂之日三四並咽津效牙齒不生用黑豆三十枚牛糞火內燒令煙盡取出細研入麝香少許研勻先以針挑破不生處令血出卻塗藥在上不可見風忌酸鹹物雄鼠矢三七枚麝香半錢同研細揩齒露蜂房散川升麻散唇唇屬足太陰脾經素問曰脾者倉廩之本營之居也其華在唇靈樞曰脾者主為衛使之迎糧視唇舌好惡以知吉凶故唇上下好者脾端正唇偏舉者脾偏傾揭唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆脾病者唇黃脾絕者唇四面腫又曰唇舌者肌肉之本也足太陰氣絕則脈不榮肌肉脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也又屬足陽明胃經靈樞曰足陽明所生病者口喎唇胗注所生病者血也胗古疹字唇瘍也又曰陽明氣至則齧唇中藏曰胃中熱則唇黑又屬手少陰心經玄珠曰上下唇皆赤者心熱也上唇赤下唇白者腎虛而心火不降也又屬手太陰肺經錢仲陽曰肺主唇白白而澤者吉白如枯骨者死唇白當補脾肺蓋脾者肺之母也母子皆虛不能相營其名曰怯故當補若深紅色則當散肺虛熱俠口統屬衝任二脈靈樞曰衝任二脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口故氣血盛則充膚熱肉血獨盛則澹滲皮膚而生毫毛婦人數脫血是氣有餘血不足衝任之脈不營唇口所以無須也上唇俠口屬手陽明大腸經下唇俠口屬足陽明胃經燥則干熱則裂風則瞤寒則揭若唇腫起白皮皺裂如蠶繭名曰繭唇有唇腫重出如繭者有本細末大如繭如瘤者或因七情動火傷血或因心火傳授脾經或因厚味積熱傷脾大要審本證察兼證補脾氣生脾血則燥自潤火自除風自息腫自消若患者忽略治者不察妄用清熱消毒之藥或用藥線結去反為翻花敗證矣腎虛唇繭時出血水內熱口乾吐痰體瘦宜濟陰地黃丸肝經怒火風熱傳脾唇腫裂或患繭唇宜柴胡清肝散胃火血燥唇裂為繭或牙齦潰爛作痛宜清胃散或加芍芎柴胡可治脾胃肝膽經熱風熱傳脾唇口瞤皺或頭目眩或四肢浮腫如風狀宜羌活散風熱客於脾經唇燥裂無色宜瀉黃飲子中氣傷損唇口生瘡惡寒發熱肢體倦怠宜補中益氣湯思慮傷脾血耗唇皺宜歸脾湯意思過度蘊熱於脾瀋裂無色唇燥口乾生瘡年久不愈內服五福化毒丹外用橄欖燒灰末豬脂調塗或用核中仁細研敷之又硫黃白礬灰硃砂水銀麝香黃柏為末和水銀瓷器中臘月豬脂和如泥光淨拭唇卻以膏塗之又八月藍葉絞汁洗不過二日瘥又訶子肉五倍子等分為末干貼又黃連一分乾薑半分炮為細末敷之又大銅錢四文石上磨以豬脂磨取汁塗又蛇蛻灰晚蠶蛾末油調敷又以甑上滴下汗敷之白荷花瓣貼之皆神效緊唇白燈散或皂角末少許水調塗風濕入脾唇口瞤動𤸷揭頭目眩痛結核浮腫用薏苡仁炒防己赤小豆炒甘草炙等分姜煎聖惠獨活散加白蘞黃耆枳殼或升麻飲外用松脂半兩大黃白蘞赤小豆胡粉各二錢半為細末雞子清調塗脾熱唇焦枯無潤澤宜生地黃煎冬月唇乾拆血出方桃仁搗爛豬脂調塗唇舌者肌肉之本也唇反者肉先死舌舌屬手少陰心經素問曰心在竅為舌畏寒內經曰心氣通於舌心和則舌能知五味矣病則舌卷短顴赤其脈搏堅而長喬嶽曰心絕則舌不能收及不能語又屬足太陰脾經李東垣曰舌者心也復能知味是舌中有脾也靈樞曰足太陰之正貫舌中素問曰中央黃色入通於脾故病在舌本靈樞又曰足太陰是動則病舌本強所生病者舌本痛素問刺舌下中脈太過血出不止為喑注舌下脈脾脈也喑不能言也孫景思曰舌者心氣之所主脾脈之所通二臟不和風邪中之則舌強不能言壅熱攻之則舌腫不能轉更有重舌木舌舌腫出血等證皆由心脾二經風熱所乘而然也又兼屬足陽明胃經張雞峰曰脾胃主四肢其脈連舌本而絡於唇口胃為水穀之海脾氣蘑而消之由是水穀之精化為營衛以養四肢若起居失節飲食不時則致脾胃之氣不足而營衛之養不周風邪乘虛而干之則四肢與唇口俱痹語言謇澀久久不治變為痿疾經云治痿獨取陽明謂足陽明也治法宜多用脾胃藥少服去風藥則可安矣又屬足少陰腎經靈樞曰足少陰之正直者系舌本舌縱涎下煩悗取足少陰玄珠曰舌之下竅腎之津液所朝也注下竅廉泉穴也一名舌本在頷下結喉上素問曰刺足少陰脈重虛出血為舌難以言又屬足厥陰肝經靈樞曰肝者筋之合也筋者聚於陰器而脈絡於舌本舌主嘗五味以榮養於身資於脾以分布津液於五臟故心之本脈繫於舌根脾之絡脈繫於舌旁肝脈循陰器絡於舌本心脾虛風熱乘之則為病風寒濕所中則舌捲縮而不能言宜小續命湯挾熱升麻湯加桔梗漱之碧雪敷之七情所郁則舌腫滿不得息宜本事方烏星薑末貼手足心心熱則裂而瘡木舌重舌宜三黃丸真蒲黃摻之三因龍石散三黃丸末水調貼腳心升麻湯加桔梗玄參黃芩又白礬大黃朴硝擦漱又醋調五靈脂末烏賊骨真蒲黃末塗之服散肝經實熱之藥脾熱則滑而胎脾閉則白胎如雪宜薄荷汁白蜜薑片揩之肝壅則血上湧宜蒲黃或槐花末摻之服清肝之藥薛新甫云如口舌腫痛或狀如無皮或發熱作渴為中氣虛熱宜清熱補氣湯若眼如煙觸體倦少食或午後益甚為陰血虛熱宜清熱補血湯若咽痛舌瘡口乾足熱日晡益甚為腎經虛火宜六味丸若四肢逆冷惡寒飲食或痰甚眼赤為命門火衰宜八味丸若發熱作渴飲冷便閉為腸胃實火宜涼膈散若發熱惡寒口乾喜湯食少體倦為脾經虛熱宜加味歸脾湯若舌本作強腮頰腫痛為心脾壅熱宜玄參升麻湯若痰盛作渴口舌腫痛為上焦有熱宜清熱化痰湯若思慮過度口舌生瘡咽喉不利為脾經血傷火動宜加味歸脾湯若恚怒過度寒熱口苦而舌腫痛為肝經血傷火動宜小柴胡湯加丹皮山梔血虛者用八珍加參朮柴胡山梔丹皮虛甚須加炮姜舌腫痛舌根腫脹為重舌舌腫而不柔和者為木舌風寒傷於心脾令人憎寒壯熱齒浮舌腫痛宜金沸草散漱口吐一半吃一半治舌腫黃藥湯或亂髮燒灰水調下外用釜底煤研細醋調敷舌上下脫去更敷能先決去血竟敷之尤佳一方用鹽等分井花水調敷硼砂細末切生薑蘸藥揩舌腫處即退蓖麻取油蘸紙捻燒煙燻之愈好膽礬研細敷之舌上腫硬出血海螵蛸蒲黃各等分研細井花水調敷木舌腫脹馬牙硝丸牛黃散玄參散飛礬散䗪蟲散百草霜散重舌用一味真蒲黃末摻之又用皂角刺煅朴硝少許研勻先以手蘸水擦口內並舌上下將藥摻之涎出自消又用五靈脂一兩去砂石研末米醋一大碗煎逐旋噙漱口又用皂角不蛀者四五挺去皮弦炙令乾荊芥穗少許研細末以米醋調塗腫處又以蛇蛻燒灰研極細少許敷之烏犀膏牛黃散黃藥湯亦可以鈹刀刺之出血愈三因云凡舌腫下必有噤蟲狀如螻蛄臥蠶有頭尾其頭小白可燒鐵烙烙頭上即消不急治能殺人東垣云廉泉一穴一名舌本在頷下結喉上治舌下腫難言舌縱涎出口禁舌根急縮下食難刺瘧論云舌下兩脈者廉泉也刺禁論云刺舌下中脈太過血不止為喑刺節真邪論云取廉泉穴血變而止以明宜出血禁用針或問取廉泉穴二說不同一說取頷下結喉上一說取舌下兩脈何者為當答曰舌本者乃舌根蒂也若取舌下兩脈是取舌稍也舌標也此法誤也當取頷下者為當此舌根也況足陽明之脈根於厲兌結於廉泉頷下乃足陽明之所行也若取舌下兩脈非足陽明經也戊與癸合廉泉足少陰也治涎下解云胃中熱上溢廉泉開故涎下當出血瀉胃中熱又知非舌下兩脈也頷下結喉上者為準矣脹論曰廉泉玉英者津液之道路也張戴人治南隣朱老翁年六十餘歲身熱數日不已舌根腫起和舌尖亦腫腫至滿口比原舌大三倍一外科以燔針刺其舌兩旁下廉泉穴病勢轉凶將至顛嶻戴人曰血實者宜決之以䤵針磨令鋒極尖輕砭之日砭八九次出血約一二盞如此者三次漸覺血少痛減腫消夫舌者心之外候也心主血故血出則愈又諸痛癢瘡瘍皆屬心火燔針艾火皆失此義也薛新甫云凡舌腫脹甚宜先刺舌尖或舌上或邊傍出血泄毒以救其急惟舌下廉泉穴此屬腎經雖宜出血亦當禁針慎之舌強三因礬石散治風寒濕舌強不能語牛黃散治舌腫強又用蛇蛻燒存性全蠍等分為細末敷之
