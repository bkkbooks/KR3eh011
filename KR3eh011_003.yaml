body:
  text: 舌瘡風熱口中乾燥舌裂生瘡宜甘露飲栝蔞根散甘露丸外敷蘆薈散玄參散緑雲散並以白礬末湯化洗足曾有舌上病瘡久蝕成穴纍服涼劑不效後有教服黑錫丹遂得漸愈此亦下虛故上盛也又有舌無故常自痹者不可作風治由心血不足理中湯加當歸服之舌出不收心經熱甚及傷寒熱毒攻心及傷寒後不能調攝往往有之宜用珍珠末冰片等分敷之即收或用巴豆一枚去油取霜用紙捻卷之內入鼻中舌自收此治傷寒後不能調攝者治一婦人産子舌出不能收令以硃砂末敷其舌乃令作産子狀以二女掖之乃於壁外潛纍盆盎置危處墮地作聲聲聞而舌卷矣舌縱涎下多唾靈樞口問篇黃帝曰人之涎下者何氣使然岐伯曰飲食者皆入於胃胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開廉泉開故涎下補足少陰蕭炳治口角流涎不止口目喎邪手足痿軟用神龜滋陰丸通天愈風湯清心導痰丸清心牛黃丸婁全善治宣文炳口流涎不止喜笑舌喑脈洪大用連芩柏梔白朮蒼朮半夏竹瀝薑汁服之五日涎止笑息流涎者自然流出也仲景云大病瘥喜出唾久不了了者胃上有寒當以丸藥溫之宜理中丸東垣云多唾或唾白沫者胃口上停寒也藥中加益智仁自齧舌靈樞經黃帝曰人之自齧舌者何氣使然岐伯曰此厥逆走上脈氣皆至也少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇矣視主病者則補之面面統屬諸陽靈樞曰諸陽之會皆在於面又屬足陽明胃經素問曰五七陽明脈衰面始焦發始墮六八衰竭面焦髮鬢頒白靈樞曰邪中於面則下陽明中藏曰胃熱則面赤如醉人素問又曰已食如飢者胃疸面腫曰風注胃陽明之脈行於面故耳又屬足太陽膀胱經靈樞曰足太陽之上血多氣少則面多少理血少氣多則面多肉肥而不澤血氣和則美色俱有餘則肥澤俱不足則瘦而無澤又統屬手少陰心經素問曰心者生之本神之變也其華在面又曰心之合脈也其榮色也又以五色候五臟故面青屬肝素問曰生於肝如以縞裹紺故青欲如蒼璧之澤不欲如藍注縞繒之精白者紺深青揚赤色又曰青如翠羽者生如草茲者死注茲滋也如草初生之色也赤屬心素問曰生於心如以縞裹朱故赤欲如白裹朱不欲如赭注赭赤土也又曰赤如雞冠者生如衃血者死注衃血凝血也黃屬脾素問曰生於脾如以縞裹栝蔞實故黃欲如羅裹雄黃不欲如黃土又曰黃如蟹腹者生如枳實者死白屬肺素問曰生於肺如以縞裹紅故白欲如鵝羽不欲如鹽又曰白如豕膏者生如枯骨者死黑屬腎素問曰生於腎如以縞裹紫故黑欲如重漆色不欲如地蒼又曰黑如烏羽者生如炲者死注炲煤也又曰五臟六腑固盡有部視其五色黃赤為熱白為寒青黑為痛靈樞邪氣臟腑病形篇黃帝曰首面與身形也屬骨連筋同血合於氣耳天寒則裂地凌冰其卒寒或手足懈惰然而其面不裂何也岐伯答曰十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為睛其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上熏於面而皮又厚其肉堅故天氣甚寒不能勝之也葉氏曰手足六陽之經皆上至於頭而唯陽明胃脈起鼻交頞中入上齒中俠口環唇循頰車上耳前過客主人故人之面部陽明之所屬也其或胃中有熱則面熱升麻湯加黃連胃中有寒則面寒升麻湯加附子若風熱內甚而上攻令人面目浮腫或面鼻紫色或風刺癮疹隨其證而治之李氏云風邪入皮膚痰飲漬腑臟則面皯𪒟脾應見於面肺應皮毛二經風濕搏而為熱濕故面生瘡面腫面腫為風宜用羌活防風升麻白芷牛蒡子之屬外杵杏仁如膏敷之余見水腫門面寒面熱丹溪云面熱火氣因鬱熱面寒屬胃虛東垣云飲食不節則胃病胃病則氣短精神少而生大熱有時而火上行獨燎其面針經云面熱者足陽明病咳逆停息不得臥面熱如醉此為胃熱上衝熏其面茯苓桂枝五味子甘草湯加大黃以利之羅謙甫療楊郎中之內五十一歲身體肥盛患頭目昏悶面赤熱多服清上藥不效診其脈洪大有力內經云面熱者足陽明病脈經云陽明經氣盛有餘則身已前皆熱況其人素膏粱積熱於胃陽明多血多氣木實則風熱上行諸陽皆會於頭目故面熱之病生矣先以調胃承氣湯七錢加黃連三錢犀角一錢疏下一兩行徹其本熱次以升麻加黃連湯去經絡中風熱上行如此則標本之邪俱退矣又治尼長老六十一歲身體瘦弱十月間病頭面不耐寒氣弱不敢當風行諸治不效診之其脈皆弦細而微其人年高素食茶果而已陽明之經本虛脈經云氣不足則身以前皆寒栗又加看誦損氣由此胃氣虛經絡之氣亦虛不能上榮頭面故惡風寒先以附子理中丸溫其中氣次以升麻湯加附子主之或曰升麻加黃連湯治面熱升麻加附子湯治面寒有何依據答曰出自仲景云岐子注傷寒論中辨葛根湯云尺寸脈俱長者陽明受病也當二三日發以其脈夾鼻絡目故身熱目疼鼻乾不得臥此陽明經受病也始於鼻交頞中從頭至足行身之前為表之裡陽明經標熱本實從標脈浮而長從本脈沉而實陽明為病主蒸蒸而熱不惡寒身熱為標病陽明本實者胃中燥鼻乾目疼為本病陽明為肌肉之本禁不可發汗在本者不禁下發之則變黃證太陽主表榮衛是也榮衛之下肌肉屬陽明二陽並病葛根湯主之衛者桂枝榮者麻黃榮衛之中桂枝麻黃湯各半主之榮衛之下肌肉之分者葛根湯主之又名解肌湯故陽明為肌肉之本非專於發汗止汗之治桂枝麻黃兩方互併為一方加葛根者便作葛根湯故榮衛肌肉之次也桂枝芍藥生薑甘草大棗止汗麻黃桂枝生薑甘草發汗葛根味薄獨加一味者非發汗止汗也從葛根以解肌故名葛根湯錢仲陽制升麻湯治傷寒瘟疫風熱壯熱頭痛肢體痛瘡疹已發未發用葛根為君升麻為佐甘草芍藥安其中氣朱奉議作活人書將升麻湯列作陽明經解藥豫診楊氏婦陽明經標本俱實先攻其里後瀉經絡中風熱故用升麻湯加黃連以寒治熱也尼長老陽明經標本俱虛先實其里次行經絡故用升麻湯加附子以熱治寒也仲景乃群方之祖信哉面青難經云肝外證面青善潔善怒面塵運氣面塵有二一曰燥金制肝經云陽明司天燥淫所勝民病嗌乾面塵又云陽明在泉燥淫所勝病嗌乾面塵又云金鬱之發嗌乾面塵宜治以濕劑是也二曰火經云少陽之復厥氣上行面如浮塵目乃瞤瘈治以寒劑是也針灸面塵皆取肝膽二經經云肝足厥陰之脈是動病甚則嗌乾面塵脫色又云膽足少陽之脈是動病甚則面微有塵皆視盛虛熱寒陷下取之也面赤難經云心外證面赤口乾善笑東垣云面赤為邪氣怫鬱在經宜表不宜下仲景云下利脈沉而遲其人面赤身有微熱下利清穀者必鬱冒汗出而解此面赤亦表而解也運氣面赤皆屬寒經云太陽司天寒淫所勝民病面赤目黃治以熱劑是也針灸面赤皆取心主經云心主手厥陰之脈是動則病面赤目黃視盛虛熱寒陷下取之也治面赤用好柏銼碎四兩人乳浸拌勻以日曬乾再浸拌勻如此六七次為妙然後為細末臨臥清茶或湯調下二錢有奇效面黃難經云脾外證面黃善噫善思善味素問云陽明經終者口目動作善驚妄言色黃治法見黃疸門面白難經云肺外證面白善嚏悲愁不樂欲哭血脫者色白夭然不澤其脈空虛肺病面白不悅則為脫氣脫血脫津脫液脫精脫神巴戟丸主之脈緊者寒也或面白善嚏或面色惡皆寒也以羌活防風甘草藁本四味瀉足太陽少加附子以通其脈面色惡悲恐者更加桂附太陽終者戴眼反折瘛瘲其色白絶汗出少陽終者耳聾百節皆縱目睘絶系其色青白面黑難經云腎外證面黑善恐欠羅謙甫治一婦人年幾三十憂思不已飲食失節脾胃有傷面色黧黑不澤環唇尤甚心懸如飢狀又不欲食氣短而促大抵心肺在上行榮衛而光澤於外宜顯而藏肝腎在下養筋骨而強於內當隱而不見脾胃在中主傳化精微以灌四旁沖和而不息其氣一傷則四臟失所憂思不已氣結而不行飲食失節氣耗而不足使陰氣上溢於陽中故黑色見於面又經云脾氣通於口其華在唇今水反來侮土故黑色見於唇此陰陽相反病之逆也上古天真論云陽明脈衰於上面始焦故知陽明之氣不足非助陽明生髮之劑無以復其色故以沖和順氣湯主之內經曰上氣不足推而揚之以升麻苦平葛根甘溫自地升天通行陽明之氣為君人之氣以天地之風名之氣留而不行者以辛散之防風辛溫白芷甘辛溫以散滯氣為臣蒼朮苦辛蠲除陽明經之寒白芍藥之溫酸安太陰經之怯弱十劑云補可去弱人參羊肉之屬人參黃耆甘草甘溫補益正氣為佐至真要大論云辛甘發散為陽生薑辛熱大棗甘溫和榮衛開腠理致津液以復其陽氣故以為使每服早飯後午飯前取陽升之時使人之陽氣易達故也數服而愈孫兆治一人滿面黑色相者斷其死孫診之曰非病也乃因登溷感非常臭氣而得去至臭無如至香令用沉檀碎劈焚於爐中安帳內以熏之明日面色漸變旬日如故蓋腎臭腐屬水脾臭香屬土今夫廁臭者腐臭也故聞之則入腎而面黑沉香者香臭也故熏之則脾土勝腎水而色還也浙全夫人忽日面上生黑斑數點日久滿面俱黑遍求醫治不效忽遇一草澤醫人云夫人中食毒治之一月平復後校其方止用生薑汁服之問其故云食斑鳩蓋此物常食半夏苗中毒故以薑解之針灸面黑有二法其一取胃經云胃足陽明之脈是動則病灑灑振寒顏黑其二取腎經云足少陰之脈是動則病飢不欲食面如漆柴視盛虛熱寒陷下取之也少陰終者面黑齒長而垢腹脹閉太陰終者腹脹閉不得息善噫嘔逆則面赤不逆則面黑皮毛黑洗面藥七白散白蘞白朮白牽牛白附子白芷白芍藥白殭蠶面上細瘡常出黃水桃花陰乾加當歸或杏花作末洗面面上熱毒惡瘡柏連散塗面上五色瘡用鹽湯綿浸塌瘡上日五六度易瘥面上黃水瘡並目生瘡三月三日桃花陰乾為末食後熟水下方寸匕日三良面上豆痕或斑皯黶密陀僧細末夜以人乳汁調敷有效面上粉刺用不語唾塗之或搗菟絲子汁塗之或以白礬末少許酒調塗之斗門方治黑皯令人面色好白殭蠶黑牽牛北細辛粗末作澡豆去小兒胎穢面里皮痛何首烏末薑汁調成膏敷之帛蓋以火炙鞋底熱尉之面赤酒皶生附子川椒野葛少許銼醋浸一宿取出用豬脂同煎以附子黃為度去滓時時塗之又硫黃半兩蝸牛殼自死枯乾小者為上木香各半兩虢丹半兩俱為末杏仁半兩去皮研膏入臘月豬脂調成膏夜臥時用漿水先洗面令乾以藥塗患處平明洗去濕癬以米泔水洗卻上前藥指爪破面用生薑自然汁調輕粉敷破處更無瘢瑕頰腮䪼頄也俗呼顴骨屬手足少陽三焦膽手太陽小腸經之會又屬手少陰心經靈樞曰心病者顴赤喬嶽曰心絶則虛陽上發面赤如脂按如脂者如女人以粉敷面以丹敷顴也夫白者肺之候丹者心之候發明謂之火剋金是從所不勝來者為賊邪其病不治故脈訣云面赤如妝不久居也又屬足少陰腎經靈樞曰腎病者顴與顏黑頰面旁也屬手足少陽三焦膽手太陽小腸足陽明胃經之會素問曰少陽之脈色榮頰前熱病也注足少陽部在頰色赤色也前當依甲乙經作筋靈樞曰邪氣中於頰則下少陽又曰少陽氣至則齧頰素問又曰少陽之厥則暴聾頰腫而熱又曰上部地兩頰之動脈注在鼻孔下兩旁近於巨髎穴之分動應於手足陽明脈氣之所行也巨髎直兩目瞳子又屬足厥陰肝經素問曰肝病氣逆則頰腫其在小兒面部左頰屬足厥陰肝經素問曰肝熱病者左頰先赤右頰屬手太陰肺經素問曰肺熱病者右頰先赤頰側蕃也屬足少陽膽陽明胃經之會頤本作臣顄中也屬足陽明胃經素問曰陽明虛則寒栗鼓頷終則口耳動作注口耳動作謂目睒睒而鼓頷也又屬足少陰腎經素問曰腎熱病者頤先赤俠頤屬足陽明胃經素問曰病上衝喉者治其漸漸者上俠頤也注陽明之脈漸上頤而環唇故名俠頤為漸即大迎穴也在曲頷下一寸三分骨陷中動脈內經取治面頰腫痛有三法其一取手陽明經云顑痛刺足陽明曲周動脈見血立已不已按人迎於經立已又云厥胸滿面腫唇漯漯然暴言難甚則不能言取足陽明又云厥頭痛面若腫起而煩心取之足陽明太陰為煩心也又云顑痛刺手陽明與顑之盛脈出血是也其二取手太陽經云手太陽之脈是動則頷腫不可以顧所生病者目黃頰痛視盛虛熱寒陷下取之也其三取手足少陽經云三焦手少陽之脈所生病者頰痛又云膽足少陽之脈所生病者頷腫視盛虛熱寒陷下取之也又云肝氣逆則頭痛耳聾頰痛取血者蓋取足少陽之血也丹溪治朱奶兩腮熱腫膈壅之病也用乾葛桔梗一錢半升麻一錢蘇葉一錢半甘草炙七分薄荷一錢薑一片水煎服東垣云咽痛頷腫脈洪大面赤者羌活勝濕湯加黃芩桔梗甘草各半錢治之如耳鳴目黃頰頷腫頸肩臑肘臂外後廉痛面赤脈洪大者以羌活防風甘草藁本通其經血加黃芩黃連消其腫以人參黃耆益其元氣而瀉其火邪兩腮腫以細辛草烏等分為末入蚌粉以豬脂調敷腫處或用醋調赤小豆末敷之亦妙口含白梅置腮邊良久腫退出涎患消矣消時腫必先向下痄腮用柏葉車前草柏子仁杵碎熱敷患處或用雞子清調赤小豆末詳見瘍科平江陳氏因驚懼後常用手指甲拄掐兩頰遂兩頰破損心中懊憹不安脈數而實諸藥不愈用活幼口議牛黃清心涼膈丸數服如失三因方凡伸欠頰車蹉但開不能合以酒飲之令大醉睡中吹皂角末搐其鼻嚏透即自止咽喉咽在喉之前所以咽物楊上善謂喉嚨之後屬咽者非屬手太陽小腸少陰心足太陰脾厥陰肝經之會素問曰咽主地氣地氣通於隘足太陰脈布胃中絡於嗌故病則腹滿而嗌乾靈樞曰足太陰之正上結於咽又屬足少陰腎經靈樞曰足少陰所生病者口熱舌乾咽腫上氣嗌乾及痛素問曰邪客於足少陰之絡令人嗌痛不可內食無故善怒氣上走賁上注賁鬲也賁上賁門也難經胃為賁門舊注氣奔而上者非朱丹溪曰手足陰陽合生見證曰咽腫足少陰厥陰又屬足陽明胃經靈樞曰陽明之脈上通於心上循咽出於口又屬足厥陰肝少陽膽經素問曰肝者中之將也取決於膽咽為之使靈樞曰足少陽之正上挾咽出頤頷素問又曰一陰一陽代絶此陰氣至心上下無常出入不知喉咽乾燥病在脾土注一陰厥陰脈一陽少陽脈並木之氣也木剋土故咽喉病雖在脾上實由肝膽之所為也俠咽屬手少陰心足太陰脾經之會喉在咽之後所以候氣屬手太陰肺足陽明胃少陰腎厥陰肝經任脈之會靈樞曰手太陰之正出缺盆循喉嚨素問曰喉主天氣天氣通於肺謂之肺系又屬手少陰心少陽三焦經靈樞曰手少陰之正上走喉嚨出於面素問曰心咳之狀咳則心痛喉中介介如哽狀甚則咽腫喉痹張潔古曰三焦通喉喉和則聲鳴利不和則暴喑熱閉素問又曰邪客於手少陽之絡令人喉痹舌卷口乾心煩又曰運氣少陽所至為喉痹耳鳴嘔湧又曰一陰一陽結謂之喉痹注一陰手少陰心也一陽手少陽三焦也二脈並絡於喉氣熱內結故為喉痹又屬手足陽明大腸胃手少陽三焦經之合靈樞曰手陽明之正上循喉嚨出缺盆又曰喉痹不能言取足陽明能言取手陽明素問曰手陽明少陽厥逆發喉痹嗌腫痓注痓謂骨強而不隨也朱丹溪曰手足陰陽經合生見證曰喉痹手足陽明手少陽又屬足太陰脾經千金方曰喉嚨者脾胃之候也喉嚨後屬手厥陰心包經結喉兩旁應手大動脈名人迎脈一名五會屬足陽明胃經內經曰頸側俠喉之動脈人迎人迎足陽明胃脈也陽明者常動注動謂動於結喉旁也素問曰其脈之動常左小而右大左小常以候臟右大常以候腑按此動字與上文不同謂左右手二脈之動也人迎後屬手陽明大腸經經云咽喉者水穀之道也喉嚨者氣之所以上下者也會厭者音聲之戶也懸雍者音聲之關也咽與喉會厭與舌此四者同在一門而其用各異喉以納氣故喉氣通於天咽以納食故咽氣通於地會厭管乎其上以司開闔掩其厭則食下不掩其喉必錯必舌抵上齶則會厭能閉其喉矣四者交相為用缺一則飲食廢而死矣或問咽喉有痹有腫二者之外又有纏喉風乳鵝生瘡諸病何邪致之何經病之與治法大略願聞其説曰十二經脈皆上循咽喉盡得以病之然統其所屬者乃在君相二火何則經曰喉主天氣咽主地氣又曰諸逆衝上皆屬於火是也蓋肺主氣天也脾主食地也於是喉納氣咽納食納氣者從金化納食者從土化金性燥土性濕至於病也金化變動為燥燥則澀澀則閉塞而不仁故在喉謂之痹土化變動為濕濕則泥泥則壅脹而不通故在咽謂之腫痹腫之病雖少異然一時火鬱於上焦致痰涎氣血聚結於咽喉也自其咽腫形狀分之則有纏喉風乳蛾之名纏喉風者其腫透達於外且麻且癢且痛乳蛾者腫於咽兩傍名雙乳蛾一邊腫者名單乳蛾喉痹之暴發暴死者名走馬喉痹內經又有嗌塞咽喉乾者亦皆因諸經所致中間雖有經氣之寒熱不等其為火證一也大抵治法視火微甚微則正治甚則反治撩痰出血三者隨宜而施或更於手大指少商出血行氣若腫達於外者又必外敷以藥豫嘗治是證每用鵝翎蘸米醋繳喉中摘去其痰蓋醋味酸能收其痰隨翎而出又能消積血若乳蛾甚而不散上以小刀就蛾上刺血用馬牙硝吹點咽喉以退火邪服射干青黛甘桔梔芩礬石惡實大黃之類隨其攸利為方以散上焦之熱外所敷藥如生地龍韭根伏龍肝之類皆可用若夫生瘡或白或赤其白者多涎赤者多血大率與口瘡同例如薔薇根皮黃柏青黛煎噙細咽亦佳凡經云喉痹者謂喉中呼吸不通言語不出而天氣閉塞也云咽痛云嗌痛者謂咽喉不能納唾與食而地氣閉塞也云喉痹咽嗌痛者謂咽喉俱病天地之氣並閉塞也蓋病喉痹者必兼咽嗌痛病咽嗌痛者未必兼喉痹也喉痹作痛或有瘡或無瘡初起通用甘桔湯不效加荊芥一錢半重名如聖湯或如聖湯中更加連翹黍黏子各一分防風竹茹半分或甘露飲喉痹惡寒及寸脈小弱於關尺者皆為表證宜甘桔湯半夏桂枝甘草湯詳寒熱發散之若水漿不得入口者用解毒雄黃丸四五粒以極酸醋磨化灌入口內吐出濃痰卻服之間以生薑自然汁一蜆殼噙下之神效婁全善云喉痹惡寒者皆是寒折熱寒閉於外熱鬱於內薑汁散其外寒則內熱得伸而愈矣切忌膽礬酸寒等劑點喉反使其陽鬱結不伸又忌硝黃等寒劑下之反使其陽下陷入里則禍不旋踵矣韓祗和云寸脈弱小於關者宜消陰助陽東垣云兩寸脈不足乃陽氣不足故用表藥提其氣升以助陽也或三部俱小弱亦用其法也喉痹鄉村病皆相似者屬天行運氣之邪治必先表散之亦大忌酸藥點之寒藥下之郁其邪於內不得出也其病有二其一屬火經云少陽所至為喉痹又云少陽司天之政三之氣炎暑至民病喉痹治宜仲景桔梗湯或面赤斑者屬陽毒宜陽毒諸方汗之其二屬濕經云太陰之勝火氣內郁喉痹又云太陰在泉濕淫所勝病嗌腫喉痹治宜活人半夏桂枝甘草湯或面青黑者屬陰毒宜陰毒諸方汗之婁全善云洪武戊辰春鄉村病喉痹者甚衆蓋前年終之氣及當年初之氣二火之邪也豫纍用甘桔湯加黃連半夏殭蠶鼠黏子根等劑發之挾虛者加參耆歸輩水漿不入者先用解毒雄黃丸醋磨化之灌喉痰出更用生薑汁灌之卻用上項藥無不神驗若用膽礬等酸寒點過者皆不治蓋邪郁不出故也三因方治卒喉痹不得語小續命湯加杏仁七個煎甚妙活人半夏桂枝甘草湯治暴寒中人咽痛此外感風寒作喉痹者之治法也喉痹不惡寒者及寸脈大滑實於關尺者皆屬下證宜硝石青黛等寒藥降之或白礬等酸劑收之也韓祗和云寸脈大於關尺者宜消陽助陰東垣云兩寸脈實為陰盛陽虛下之則愈故豫每用此法治急喉痹如鼓應桴或三部俱實亦可用其法也外臺療喉痹神驗朴硝一兩細細含咽汁立愈或含黃柏片或咽萊蔔汁或吹蠡魚膽或噙李實根及玉鑰匙玉屑無憂散清心利膈湯碧玉散防風散追風散皆寒降之劑也白礬末或用烏雞子清調灌或枯而吹之用燈盞底油腳灌下或同馬屁勃等分為細末以鵝翎吹入喉中或用一握金燒灰拌炒青色為度吹入患處或用牙皂和霜梅為末噙之或用鴨嘴膽礬末以筋蘸藥點患處及開關散七寶散皆酸收之劑也丹溪治風熱痰喉痹先以千緡湯次以四物湯加黃柏知母養陰則火降矣七情鬱結氣塞不通宜五香散血壅而為痹宜取紅藍花汁服之無鮮者則濃煎絞汁亦得或用茜草一兩煎服或用杜牛膝搗自然汁和醋服或用馬鞭草搗自然汁服或用射干切一片含咽汁皆破血之劑也喉閉者先取痰瓜蒂散解毒雄黃丸烏犀膏或用鵝翎蘸桐油探吐之或用射干逆流水吐之或用遠志去心為末每半錢水小半盞調服口含竹管或用皂角揉水灌下或用返魂草根即紫菀一莖淨洗入喉中取寒痰出更以馬牙硝津咽之或用土烏藥即矮樟根醋煎先噙後咽牙關閉者搐鼻取之憊急如聖散一字散或用巴豆油染紙作捻子點火吹滅以煙燻入鼻中即時口鼻涎流牙關開矣經云寒氣客於會厭卒然如啞宜玉粉丸陳藏器每治臟寒咽閉吞吐不利用附子去皮臍炮裂以蜜塗炙令蜜入內含之勿咽急喉痹其聲如鼾有如痰在喉響者此為肺絶之候速宜參膏救之用薑汁竹瀝放開服如未得參膏或先煎獨參湯救之服早者十全七八次則十全四五遲則十不全一也治喉痹逡巡不救方皂莢去皮弦子生半兩為末以箸頭點少許在腫痛處更以醋糊調藥末厚塗項上須臾便破血出瘥針法治喉閉刺少商出血立愈孫兆治文潞公喉腫刺之嘔出膿血升余而愈婁全善治一男子喉痹於太溪穴刺出黑血半盞而愈由是言之喉痹以惡血不散故也凡治此疾暴者必先發散發散不愈次取痰取痰不愈次去汙血也咽嗌痛咽唾與食則痛者是也經云形苦志苦病生於咽嗌治之以百藥又云肝者中之將也取決於膽咽為之使丹溪云咽痛必用荊芥陰虛火炎上者必用玄參氣虛人參加竹瀝血虛四物加竹瀝陰氣大虛陽氣飛越痰結在上遂成咽痛脈必浮大重取必澀去死為近宜補陰斂陽人參一味濃煎湯細細飲之此證皆是勞嗽日久者有之如用實喉痹條下諸方無益有害咽瘡多虛火遊行無制客於咽喉宜用人參蜜炙黃柏荊芥治之實熱咽痛三黃丸或用黃連荊芥薄荷為末蜜薑汁調噙或山豆根噙之及用黃柏黃連大黃水調塗足心與患處及龍麝聚聖丹祛毒牛黃丸咽喉備急丹浮熱表散之增損如聖湯利膈湯桔梗湯散之不已則收之或單用硼砂或和膽礬白殭蠶白霜梅和噙或用百藥煎去黑皮硼砂甘草生白礬等分為細末每服一錢食後米飲調細細咽下戴云熱壅咽痛或嗽中帶血者宜金沸草散佐以辰砂化痰丸咽喉痛用諸冷藥不效者宜枳南湯有咽疼服冷劑反甚者宜用薑汁詳見嗽門然生瘡損了者戒勿用用之辣痛又能散不收若熱壅上焦咽喉疼痛而吞咽乾物不若常時之潤睡覺口舌全無津液者如聖湯加人參半錢玄參七分或佐以碧雲散雞蘇丸有上證兼心頭煩躁辰砂五苓散咽痛妨悶咽物則微痛不宜寒藥過泄之用栝蔞一個白殭蠶微炒半兩桔梗七錢半甘草炒二錢為細末每用少許乾摻咽喉中若腫痛左右有紅或只一壁紅紫長大水米難下用此散一錢朴硝一錢和勻摻喉中咽津如喉中生赤腫或有小白頭瘡用前散一錢匕白礬細研半錢乾摻內經運氣咽嗌痛皆屬寒云太陽在泉寒淫所勝民病嗌痛頷腫是也三因方蜜附子治感寒咽門閉不能咽大附子一枚生去皮臍切作大片蜜塗炙令黃噙咽津甘味盡更以附子片塗蜜炙用之咽痛用諸藥不效者此非咽痛乃是鼻中生一條紅線如發懸一黑泡大如櫻珠垂挂到咽門而止口中飲食不入須用深取牛膝根直而獨條者洗淨入好醋三五滴同研細就鼻孔滴二三點入去則絲斷珠破其病立安乳蛾一名懸癰羅青散粉香散玄參散射干丸燒鹽散馬牙硝散射干散硼砂散啓關散咽喉生瘡黃耆散桃紅散琥珀犀角膏救命散牛蒡子丸硼砂散咽喉如有物噎塞經云膽病者善太息口苦嘔宿汁嗌中介介然數唾取陽陵泉又云心咳之狀喉中介介如梗狀取心之俞大陵仲景云婦人咽中如有炙臠半夏厚朴湯主之射干散含化龍腦丸木香散絡石湯四味湯杏仁煎丸有人患纏喉風食不能下大麥面作稀糊咽之咽喉塞鼻中瘡出及乾嘔頭痛食不下生雞子一個開頭取白去黃著米醋拌煨煻火頓沸起擎下沸定須頻三度就熱飲醋盡不過一二次瘥王醫師法冬月於臨臥時食生萊蔔三五片無咽喉之疾諸物梗喉三因方煮薤白令半熟以線縛定手執線頭少嚼薤白咽之度薤白至哽處便牽引哽即出矣祕方用傾銀爐上倒挂灰塵砂糖和丸咽之自下骨梗槿樹葉油馬屁勃砂糖三味熬膏為丸噙化薴麻根杵爛丸如彈子大將所哽物煎湯化下以犬吊一足取其涎徐徐咽之剪刀草如野茨菰生於籬塹間其根白研之則如膠用順水吞下即吐出骨不過兩三口效研萱草根順水下亦佳朴硝研對入雞蘇丸如彈子大含化不過三四丸南硼砂井花水洗滌含化最軟骨貫衆濃煎一盞半分三服連進片時一咯骨自出魚骨哽以皂角少許吹入鼻中得嚏哽出細茶五倍子等分為末吹入咽喉立愈食橄欖即下或用其核為末順流水下魚骨在肚中刺痛煎茱萸汁一盞飲之骨軟而出雞骨鯁用水簾草搗汁飲之骨自消野薴根洗淨搗爛如泥每用龍眼大如被雞骨所傷雞羹化下魚骨所傷魚湯化下稻芒粳谷哽喉將鵝吊一足取涎徐徐咽下即消或取薦頭草嚼亦妙吞釘鐵金銀銅錢等物但多食肥肉自隨大便而下吞錢及鐵物在喉不得下南燭根燒細末湯調一錢下之吞鐵或針用餳糖半斤濃煎艾汁調和服或用磁石磨如棗核大鑽眼以線穿令吞喉間針自引出磁石須陰陽家用驗者張子和治一小兒誤吞錢在喉中不下以淨白表紙卷實如箸以刀縱橫亂割其端作鬅鬙之狀又別取一箸縛針鉤於其端令不可脫先下咽中輕提輕抑探之覺鉤入於錢竅然後以紙卷納之咽中與鉤尖相抵覺鉤尖入紙卷之端不礙肌肉提之而出吞錢燒炭末白湯調服數匙即出或服蜜升許或食荸薺茨菰其錢自化或用艾一把水五升煎至一升頓服即下或用百部根四兩酒一升漬一宿溫服一升日再吞叉取薤白曝令萎黃煮使熟勿切食一大棗即出吞錢叉及鐶飴糖一斤漸漸食之吞發繞喉不出取自亂髮作灰白湯調服一錢陳無擇云凡治哽之法皆以類推如顱鷀治魚哽磁石治針哽發灰治發哽貍虎治骨哽亦各從其類也四肢陽主四肢經云四肢者諸陽之本也又云陽受氣於四肢是也陽實則肢腫經云結陽腫四肢是也陽虛則肢滿經云冬氣滿在四肢是也脾主四肢經云四肢皆稟氣於胃而不得至經必因於脾乃得稟者是也脾實則四肢不舉經云脾脈太過為病在外則令人四肢不舉者是也脾虛則四肢不用經云脾臟肉形不足則四肢不用又云四肢懈惰此脾精之不行是也治見痿及中風五臟有邪留在支節經云肺心有邪其氣留於兩肘肝有邪其氣留於兩股脾有邪其氣留於兩髀腎有邪其氣留於兩膝是也治見痛痹運氣四肢不舉皆屬濕經云土太過曰敦阜敦阜之紀其病腹滿四肢不舉是也筋轉筋靈樞經筋篇云足太陽之筋起於足小指上結於踝邪上結於膝其下循足外側結於踵上循跟結於膕其別者結於踹外上膕中內廉與膕中並上結於臀上挾脊上項其支者別入結於舌本其直者結於枕骨上頭下顏結於鼻其支者為目上綱下結於頄音求其支者從腋後外廉結於肩髃其支者入腋下上出缺盆上結於完骨其支者出缺盆邪上出於頄其病小指支跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖治在燔針劫刺以知為數以痛為腧名曰仲春痹足少陽之筋起於小指次指上結外踝上循脛外廉結於膝外廉其支者別起外輔骨上走髀前者結於伏兔之上後者結於尻其直者上乘䏚季脅上走腋前廉繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乘䏚季脅痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹺脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針劫刺以知為數以痛為腧名曰孟春痹也足陽明之筋起於中三指結於跗上邪外上加於輔骨上結於膝外廉直上結於髀樞上循脅屬脊其直者上循骭結於膝其支者結於外輔骨合少陽其直者上循伏兔上結於髀聚於陰器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上綱陽明為目下綱其支者從頰結於耳前其病足中指支脛轉筋腳跳堅伏兔轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂塗之其緩者以桑鉤鉤之即以生桑灰置之坎中高下以坐等以膏尉急頰且飲美酒啖美炙肉不飲酒者自強也為之三拊而已治在燔針劫刺以知為數以痛為腧名曰季春痹也足太陰之筋起於大指之端內側上結於內踝其直者絡於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裡結於肋散於胸中其內者著於脊其病足大指支內踝痛轉筋痛膝內輔骨痛陰股引髀而痛陰器紐痛上引臍兩脅痛引膺中脊內痛治在燔針劫刺以知為數以痛為輸名曰孟秋痹也足少陰之筋起於小指之下並足太陰之筋邪走內踝之下結於踵與太陽之筋合而上結於內輔之下並太陽之筋而上循陰股結於陰器循脊內夾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癇瘛及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰治在燔針劫刺以知為數以痛為輸在內者尉引飲藥此筋折紐紐發數甚者死不治名曰仲秋痹也足厥陰之筋起於大指之上上結於內踝之前上循脛上結內輔之下上循陰股結於陰器絡諸筋其病足大指支內踝之前痛內輔痛陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣其病轉筋者治在燔針劫刺以知為數以痛為輸名曰季秋痹也手太陽之筋起於小指之上結於腕上循臂內廉結於肘內鋭骨之後彈之應小指之上入結於腋下其支者後走腋後廉上繞肩胛循頸出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥其病小指支肘內鋭骨後廉痛循臂陰入腋下腋下痛腋後廉痛繞肩胛引頸而痛應耳中鳴痛引頷目瞑良久乃得視頸筋急則為筋瘻頸腫寒熱在頸者治在燔針劫刺之以知為數以痛為輸其為腫者復而鋭之本支者上曲牙循耳前屬目外眥上頷結於角其痛當所過者支轉筋治在燔針劫刺以知為數以痛為輸名曰仲夏痹也手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸合手太陽其支者當曲頰入系舌本其支者上曲牙循耳前屬目外眥上乘頷結於角其病當所過者即支轉筋舌卷治在燔針劫刺以知為數以痛為輸名曰季夏痹也手陽明之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃其支者繞肩胛挾脊直者從肩髃上頸其支者上頰結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔針劫刺以知為數以痛為輸名曰孟夏痹也手太陰之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑內廉入腋下出缺盆結肩前髃上結缺盆下結胸裡散貫賁合賁下抵季脅其病當所過者支轉筋痛甚成息賁脅急吐血治在燔針劫刺以知為數以痛為輸名曰仲冬痹也手心主之筋起於中指與太陰之筋並行結於肘內廉上臂陰結腋下下散前後挾脅其支者入腋散胸中結於臂其病當所過者支轉筋前及胸痛息賁治在燔針劫刺以知為數以痛為輸名曰孟冬痹也手少陰之筋起於小指之內側結於鋭骨上結肘內廉上入腋交太陰挾乳里結於胸中循臂下繫於臍其病內急心承伏梁下為肘網其病當所過者支轉筋筋痛治在燔針劫刺以知為數以痛為輸其成伏梁唾血膿者死不治經筋之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俯不伸焠刺者刺寒急也熱則筋縱不收無用燔針名曰季冬痹也足之陽明手之太陽筋急則口目為劈眥急不能卒視治皆如上方也形樂志苦病生於筋治之以尉引諸筋病皆屬於節經云諸筋者皆屬於節又云手屈而不伸者病在筋是也肝主諸筋經云肝主筋又云在臟為肝在體為筋又云酸生肝肝生筋筋生心是也筋病忌風忌食酸辛忌久行經云風傷筋燥勝風酸傷筋辛勝酸又云酸走筋筋病無多食酸又云多食辛則筋急而爪枯又云久行傷筋是也轉筋經云足太陽之下血氣皆少則善轉筋踵下痛丹溪云轉筋皆屬血熱四物加黃芩紅花蒼朮南星有筋轉於足大指轉上至大腿近腰結了乃因奉養厚飲酒感寒而作加酒芩蒼朮紅花南星薑煎服仲景云轉筋之為病其臂腳直脈上下行微弦轉筋入腹者雞矢白散主之用雞矢白一味為散取方寸匕以水六合和溫服聖惠方治肝虛轉筋用赤蓼豆葉切作三合水一盞酒三合煎至四合去渣溫分二服孫尚藥治腳轉筋疼痛攣急松節二兩細銼如米粒乳香一錢上件藥用銀石器內慢火炒令焦只留一分性出火毒研細每服一錢至二錢熱木瓜酒調下同是筋病皆治之外臺治轉筋取故綿以釅醋浸甑中蒸及熱用綿裹病人腳令更易勿停瘥止丹溪云轉筋遍身入肚不忍者作極鹹鹽湯於槽中暖浸之靈樞四時氣篇轉筋於陽治其陽轉筋於陰治其陰皆焠刺之婁全善云此則經所謂以痛為輸之法蓋用火燒燔針劫刺轉筋之時當察轉筋之痛在何處在陽刺陽在陰刺陰隨其所痛之處刺之故曰以痛為輸也若以一針未知則再刺之以知覺應效為度故曰以知為數也竇太師云轉筋而疼灸承山而可治霍亂轉筋已見霍亂門此謂不霍亂而筋自轉骨腎主骨在體為骨在臟為腎又云腎之合骨也其榮發也又云少陰者冬脈也伏行而濡骨髓也骨病忌食甘苦久立經云多食甘則骨痛而發落又云苦走骨骨病無多食苦又云久立傷骨是也骨病不屈經云手屈而不伸者病在筋伸而不屈者病在骨在骨守骨在筋守筋是也骨度詳靈樞骨度篇骨空詳素問骨空篇肉脾主肉經云脾主肉在體為肉在臟為脾又云邪在脾胃則病肌肉痛是也脾病在溪經云北方黑色入通於腎故病在溪溪者肉之小會也素問氣穴論帝曰願聞溪谷之會也歧伯曰肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以會大氣邪溢氣壅脈熱肉敗榮衛不行必將為膿內消骨髓外破大膕留於節湊必將為敗積寒留舍榮衛不居卷肉縮筋肋肘不得伸內為骨痹外為不仁命曰不足大寒留於溪谷也溪谷三百六十五穴會亦應一歲其小痹淫溢循脈往來微針所及與法相同形樂志樂病生於肉治之以針石濕傷肉甘傷肉經云濕傷肉風勝濕甘傷肉酸勝甘又云甘走肉肉病無多食甘又云多食酸則肉胝䐢而唇揭是也坐樂傷肉經云久坐傷肉又云形樂志樂病生於肉治之以針石是也皮膚素問皮部篇黃帝問曰余聞皮有分部脈有經紀筋有結絡骨有度量其所生病各異別其分部左右上下陰陽所在病之始終願聞其道岐伯對曰欲知皮部以經脈為紀者諸經皆然陽明之陽名曰害蜚上下同法視其部中有浮絡者皆陽明之絡也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也絡盛則入客於經陽主外陰主內少陽之陽名曰樞持上下同法視其部中有浮絡者皆少陽之絡也絡盛則入客於經故在陽者主內在陰者主出以滲於內諸經皆然太陽之陽名曰關樞上下同法視其部中有浮絡者皆太陽之絡也絡盛則入客於經少陰之陰名曰樞儒一作檽上下同法視其部中有浮絡者皆少陰之絡也絡盛則入客於經其入經也從陽部注於經其出者從陰內注於骨心主之陰名曰害肩上下同法視其部中有浮絡者皆心主之絡也絡盛則入客於經太陰之陰名曰關蟄上下同法視其部中有浮絡者皆太陰之絡也絡盛則入客於經凡十二經絡脈者皮之部也是故百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃邪之始入於皮也溯然起毫毛開腠理其入於絡也則絡脈盛色變其入客於經也則感虛乃陷下其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍䐃破毛直而敗帝曰夫子言皮之十二部其生病皆何如岐伯曰皮者脈之部也邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟也故皮者有分部不與而生大病也帝曰善皮膚屬肺經云肺之合皮也其榮毛也又云肺主皮毛在臟為肺在體為皮毛是也毛折爪枯為手太陰絶經云手太陰者行氣溫於皮毛者也氣不榮則皮毛焦皮毛焦則津液去皮絶者津液既去則爪枯毛折毛折者毛先死矣皮膚痛屬心實經云夏脈者心也夏脈太過則病身熱膚痛為浸淫運氣皮膚痛皆屬火邪傷肺經云少陰在泉熱淫所勝病寒熱皮膚痛又云少陽司天火淫所勝熱上皮膚痛又云少陰之復咳皮膚痛治以諸寒是也針灸皮膚痛取肺經云邪在肺則病皮膚痛寒熱上氣喘汗出咳動肩背取之膺中外腧背三節五椎之傍以手疾按之快然乃刺之取之缺盆中以越之是也升麻湯皮膚索澤即仲景所謂皮膚甲錯蓋皮膚澀而不滑澤者是也三陽為病發寒熱其傳為索澤王注云索盡也精血枯涸故皮膚潤澤之氣皆盡也運氣皮膚索澤屬燥傷膽氣經云陽明在泉燥淫所勝病體無膏澤治以苦寒是也仲景云五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡榮衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃蟅蟲丸主之咳有微熱煩滿胸中甲錯是為肺癰葦莖湯主之尺膚粗如枯魚之鱗者水泆飲也針灸皮膚索澤取足少陽經云足少陽之脈是動則病體無膏澤視盛虛熱寒陷下取之也髭發內經云腎者主蟄封臟之本精之處也其華在發腎之合骨也其榮發也多食甘則骨痛而發落王注云甘益脾勝於腎腎不勝故骨痛而發落女子一七歲腎氣實齒更髮長五七陽明脈衰面始焦發始墮丈夫八歲腎氣實髮長齒更五八腎氣衰發墮齒稿巢氏病源云足少陽膽之經其榮在須足少陰腎之經其華在發衝任之脈為十二經之海謂之血海其別絡上唇口若血盛則榮於頭髮故鬚髮美若血氣衰弱經脈虛竭不能榮潤故鬚髮脫落帝曰婦人無須者無氣血乎岐伯曰衝脈任脈皆起於胞中上循胸裡為經絡之海其浮而外者循腹上行會於咽喉別絡唇口今婦人之生有餘於氣不足於血以其數脫血也女人月月而經通故曰數脫血衝任之脈不榮口唇故須不生焉又曰人有傷於陰陰氣絶而不起陰不用然其須不去宦者獨去其故何也岐伯曰宦者去其宗筋傷其衝脈血瀉不復皮膚內結唇口不榮故須不生有人未嘗有所傷不脫於血其須不生何也曰此天之所不足也稟衝任不盛宗筋不成有氣無血唇口不榮故須不生髭鬚黃赤者多熱多氣白者少血少氣黑色者多血少氣美眉者太陽多血通髯極須者少陽多血美須者陽明多血此其時然也發黃白張天師草還丹七寶美髯丹單用自已發不足則父子一氣者又不足則無病童男女發與胎髮用皂角水洗淨無油氣為度入新鍋內上用小鍋蓋之鹽泥固口勿令泄氣桑柴慢火煆三炷香冷定取出研為細末每用一二分空心酒調下揩齒變白髮方酸石榴皮一個泥裹燒令通赤候冷去泥用茄子根與槐枝同燒令煙絶急以器蓋之候冷用槐枝馬齒莧牆上生者好不令人見採薄荷石膏五倍子燒熟川升麻各一兩為末揩牙不但變白為黑亦且堅牙甚妙東垣青絲散西嶽石碑方拔白生黑良曰正月四日二月八日三月十三四月十六五月二十六月二十七月二十八八月十九九月二十五十月一日十一月十一日十二月十日早起拔之永不白又正月五日十三日二月八日十八日三月三日四月十三二十五五月五日十五日六月十四二十四七月十八二十八八月九日十日九月八日十八日十月十三二十三十一月十日十二月十六日以上月日並用午時前拔之凡拔時先以水於石上磨丁香汁候拔了急手敷於毛孔中即生黑者李卿換白髮方云刮老生薑皮一大升於鐺中以文武火煎之不得令過沸其鐺唯得多油膩者尤佳更不須洗刮便以薑皮置鐺中密封固濟勿令通氣令一精細人守之地色未分時便須煎之緩緩不得令火急如其人稍疲即換人看火一伏時即成置瓷鉢中研極細李方雖曰一伏時若火候勻至日西即藥成也使時以小簪腳蘸取如麻子大先於白髮下點藥訖然後拔之再點以手指熟捻之令入肉第四日當有黑者生神效發落不生東垣云脈弦氣弱皮毛枯稿發脫落黃耆建中湯主之發脫落及臍下痛四君子湯加熟地黃丹溪治胡氏子年十七八歲發脫不留一莖飲食起居如常脈微弦而澀輕重皆同此厚味成熱濕痰在膈間又日多吃梅酸味收濕熱之痰隨上升之氣至於頭熏蒸髮根之血漸成枯稿遂一時盡脫遂處以補血升散之藥用防風通聖散去芒硝唯大黃三度酒炒兼以四物湯酒製合和作小劑煎以灰湯入水頻與之兩月餘後診其脈濕熱漸解停藥淡味調養又二年髮長如初而愈甜瓜葉治人無發搗汁塗之即生滋榮散三聖膏治發落不生令長麻子一升熬令黑壓油以敷頭髮上千金云麻葉桑葉二味以泔煮沐發七次可長六尺眉毛墮落生半夏羊矢燒焦等分為末薑汁調塗又用七月烏麻花陰乾為末生烏麻油浸每夜敷之烏麻即秋麻是也腋腋謂臂下脅上際也屬手厥陰心包絡經丹溪云手足陰陽合生見證曰腋腫手厥陰足少陽又再足厥陰肝經靈樞曰肝有邪其氣留於兩腋腋前屬手太陰肺經腋後屬少陰心經腋下屬足厥陰肝經下六寸屬足太陰脾之大絡靈樞曰脾之大絡名曰大包出淵腋下三寸布胸脅注大包淵腋並穴名穴各有二淵腋在腋下三寸宛宛中舉臂取之腋腫內經針灸腋腫有二法其一取膽經云膽足少陽之脈所生病者缺盆中腫痛腋下腫是也其二取心經云心主手厥陰脈是動則痛手心熱腋腫皆視虛實寒熱陷下施補瀉疾留灸也腋氣亦曰狐臭有竅諸藥鮮能除根止堪塞竅耳用銅青好者不拘多少米醋調成膏用皂角煎湯洗淨腋下以輕粉摻過卻使上件塗之立效蠱毒凡蠱毒有數種曰蛇毒蜥蜴毒蝦蟆毒蜣蜋草毒等皆是變亂元氣人有故造作之者即謂之蠱也多因飲食內行之與人禍患禍患於他則蠱主吉利所以人畜事之中其毒者心腹絞痛如有物齧或吐下血皆如爛肉或好臥暗室不欲光明或心性反常乍嗔乍喜或四肢沉重百節痠疼或乍寒乍熱身體習習而痹胸中滿悶或頭目痛或吐逆不定或目面青黃甚者十指俱黑診其脈緩大而散皆其候也然其毒有緩有急急者倉卒或數日便死緩者延引歲月遊走腸內蝕五臟盡則死凡入蠱鄉見人家門限屋梁絶無塵埃潔淨者其家必畜蠱當用心防之如不得已吃其飲食即潛地於初下箸時收臟一片在手盡吃不妨少頃卻將手臟之物埋於人行十字路下則蠱反於本家作鬧蠱主必反來求或食時讓主人先動箸或明問主人云莫有蠱麼以箸築卓而後食如是則蠱皆不能為害南方有蠱毒之鄉於他家飲食即以犀角攪之白沫起即為有毒無沫者即無毒也欲知蠱主姓名者以敗鼓皮燒作末令病人飲服方寸匕須臾自呼蠱家姓名可語之令呼喚將去則愈治之亦有方驗蠱法令病人唾於水內沉者是蠱浮者即非或令含黑豆驗之若豆脹皮脫者是蠱豆不脹皮不脫即非又初虞世方云嚼黑豆不腥嚼白礬味甜皆中毒之候也凡初中蠱在膈上者用歸魂散吐之以下膈者雄朱丸下之吐利後猶覺前後心刺痛拘急咽中如茅刺者此是取利後氣之候也更不須再服吐利藥但服桔梗散自然平復西溪叢話云泉州一僧能治金蠶蠱毒如中毒者先以白礬末令嘗不澀次食黑豆不腥乃中毒也即濃煎石榴皮汁飲之即吐出有蟲皆活無不愈者李晦之云凡中毒以白礬茶芽搗為末冷水服廣南挑生殺人以魚肉延客對之行厭勝法魚肉能反生於人腹中而人以死相傳謂人死陰役於其家昔雷州推官符昌言於乾道五年親勘一公事買肉置之盤中俾囚作法以驗其術有頃肉果生毛何物淫鬼乃能爾也然解之亦甚易但覺有物在胸膈則急服升麻以吐之覺在腹中急服鬱金以下之雷州鏤板印行者蓋得之於囚也夷堅志云陳可大知肇慶腑肋下忽腫起如癰狀頃之大如碗識者云此中挑生毒也俟五更以緑豆嚼試若香甘則是已而果然使搗川升麻取冷熟水調二大盞服之遂洞下瀉出生蔥數莖根莖皆具腫即消續煎平胃散調補且食白粥經旬復常雷州康財妻為蠻巫用雞挑生值商人楊一者善醫與藥服之食頃吐積肉一塊剖開筋膜中有生肉雞形已具康訴於州捕巫置獄而呼楊令具疾證及所用藥略云凡吃肉瓜果湯茶皆可挑初中毒覺胸腹稍痛明日漸加攪刺滿十日則內物能動騰上則胸痛沉下則腹痛積而瘦悴其候也在上鬲則取之法用熱茶一甌投膽礬半錢於中候礬化盡通口呷服良久以雞翎探喉中即吐出毒物在下鬲則瀉之以米飲下鬱金末三錢毒即瀉下乃以人參白朮各半兩為末同無灰酒半升納瓶內慢火熬半日許度酒熟取出溫服之日一杯五日乃止佛説解蠱毒神呪凡在旅中飲食先默念七遍其毒不行呪曰姑蘇琢磨耶琢吾知蠱毒生四角父是穹隆窮母是耶舍女眷屬百千萬吾今悉知汝摩訶薩摩訶凡見飲食上有蛛絲便莫吃又法每遇所到處念藥王萬福七遍亦驗灸蠱毒法當足小指尖灸三炷即有物出酒上得者酒出肉果上得者肉果上出飰上得者飰出余如方診脈訣云凡脈尺寸緊數形又似叉直吐轉增此患蠱毒急須救脈逢數軟病延生經云脈浮澀而疾者生微細者死洪大而速者生蟲蟲由濕熱鬱蒸而生觀之日中有雨則禾節生蟲其理明矣善乎張戴人推言之也曰水火屬春夏濕土屬季夏水從土化故多蟲焉人患蟲積多由飢飽調燮失宜或過餐魚鱠白酒或多食牛羊或誤啖鱉莧中脘氣虛濕熱失運故生寸白諸蟲或如蚯蚓或似龜鱉小兒最多大人間有其候心嘈腹痛嘔吐涎沫面色痿黃眼眶鼻下青黑以致飲食少進肌肉不生沉沉默默欲眠微有寒熱如不早治相生不已古人云蟲長一尺則能害人蟲若貫串殺人甚急治法追蟲取積以剪紅丸尊神丸遇仙丹夫人腹中有尸蟲此物與人俱生而為人大害尸蟲之形狀似大馬尾或如薄筋依脾而居乃有頭尾皆長三寸又有九蟲一曰伏蟲長四分二曰蛔蟲長一尺三曰白蟲長一寸四曰肉蟲狀如爛杏五曰肺蟲狀如蠶六曰胃蟲狀如蝦蟆七曰弱蟲狀如瓜瓣八曰赤蟲狀如生肉九曰蟯蟲至細微形如菜蟲狀伏蟲則群蟲之主也蛔蟲貫心殺人白蟲相生子孫轉多其母轉大長至四五丈亦能殺人肉蟲令人煩滿肺蟲令人咳嗽胃蟲令人嘔吐胃逆喜噦弱蟲又名膈蟲令人多唾赤蟲令人腸鳴蟯蟲居胴腸之間多則為痔劇則為癩因生瘡痍即生諸癰疽癬瘻瘑疥齲蟲無所不為人亦不必盡有有亦不必盡多或偏有或偏無類婦人常多其蟲凶惡人之極患也常以白筵草沐浴隹根葉皆可用既是香草且是尸蟲所畏也凡欲服補藥及治諸病皆須去諸蟲並痰飲宿澼醒醒除盡方可服補藥不爾必不得藥力凡得傷寒及天行熱病腹中有熱又人食少腸胃空虛三蟲行作求食蝕人五臟及下部若齒齗無色舌上盡白甚者唇里有瘡四肢沉重忽忽喜眠當數看其上唇內有瘡唾血唇內如粟瘡者心內懊憹痛悶此蟲在上蝕也九蟲皆由臟腑不實脾胃皆虛雜食生冷甘肥油膩咸臟等物節宣不時腐敗停滯所以發動又有神志不舒精魄失守及五臟勞熱又病餘毒氣血積鬱而生或食瓜果與畜獸內臟遺留諸蟲子類而生蟲之為候嘔惡吐涎口出清沫痛有去來乍作乍止寸白蟲色白形褊損人精氣力乏腰疼蟯蟲細如菜蟲能為痔漏瘡癩疥癬癰疽等患寸白蟯蛔是三者皆九蟲數中之一物也外此又有兒童疳𧈟昏睡煩躁鼻爛汁臭齒齗生瘡下利黑血蟲食下部為狐下唇有瘡蟲食其臟為惑上唇有瘡三蟲者謂長蟲赤蟲蟯蟲也乃有九種而蟯蟲及寸白人多病之寸白從食牛肉飲白酒所成相連一尺則殺人服藥下之須結裹潰然出盡乃佳若斷者相生未已更宜速治之蟯蟲多是小兒患之大人亦有其病令人心痛清朝口吐汁煩躁則是也其餘各種皆不利人人胃無不有者宜服九蟲丸以除之蛔蟲者是九蟲之一也長一尺亦有長五六寸或因臟腑虛弱而動或因食甘肥而動其發動則腹中痛發作種聚行來上下痛有休息亦攻心痛腹中熱口中喜涎及吐清水貫傷心者則死診其脈腹中痛其脈法當沉弱弦今反洪而大則蛔蟲也蛔蟲九蟲之數人腹中皆有之小兒失乳而哺早或食甜過多胃虛蟲動令人腹痛惡心口吐清水腹上有青筋火煨史君子與食以殼煎湯送下甚妙然世人多於臨臥服之又無日分多不驗唯是於月初四五間五更服之至日午前蟲盡下可以和胃溫平藥一兩日調理之不可多也九蟲在人腹中月上旬頭向上中旬橫之下旬頭向下故中下旬用藥即不入蟲口所以不驗也牛馬之生子上旬生者行在母前中旬生者並肩而行下旬生者後隨之貓之食鼠亦然上旬食上段中旬中段下旬下段自然之理物皆由之而莫知之客座新聞云青陽夏戚宗陽家素業醫任江陰訓科有儒生之父患腹脹求其診視乃曰脈洪而大濕熱生蟲之象況飲食如常非水腫蠱脹之證以石榴皮椿樹各東行根加檳榔三味各五錢用長流水煎空心頓服之少頃腹作大痛瀉下長蟲一丈許遂愈本事方云肺蟲如蠶能殺人居肺葉之內蝕人肺系故成瘵疾由是咳嗽咯血聲嘶藥所不到治之為難道臟經中載諸蟲頭皆向下唯自初一至初五以前蟲頭向上故用藥多取效者此也又姚寬西溪叢話云五臟蟲皆上行唯有肺蟲下行最難治用獺爪為末調藥於初四初六日治之此日肺蟲上行也二説小異姑兩存之以備參考泊宅編永州通判廳軍員毛景得奇疾每語喉中必有物作聲相應有道人教令誦本草藥名至藍而默然遂取藍捩汁而飲之少頃吐出肉塊長一寸余人形悉具自後無聲陳正敏遁齋間覽載楊勔中年得異疾每發言應答腹中有小聲效之數年間其聲浸大有道人見而驚曰此應聲蟲也久不治延及妻子宜讀本草遇蟲不應者當取服之勔如言讀至雷丸蟲無聲乃頓服之遂愈正敏後至長沙遇一丐者亦有是疾環而觀之甚衆教使服雷丸丐者亦愈丁志記齊州士曹席進孺招所親張彬秀才為館舍彬嗜酒每夜必置數升於床隅一夕忘設至夜半大渴求之不可得忿悶呼躁俄頃嘔吐一物於地旦起視之見床下肉塊如肝而黃上如蜂窠猶微動取酒沃之唧唧有聲始悟平生酒病根本亟投諸火中後遂不飲庚志記趙子山字景高寓居邵武軍天王寺苦寸白蟲為撓醫者戒云是疾當止酒而以素所耽嗜欲罷不能一夕醉於外舍歸已夜半口乾咽燥倉卒無湯飲適廊廡下有甕水月色下照瑩然可掬即酌而飲之其甘如飴連飲數酌乃就寢逮曉蟲出盈席覺心腹頓寬宿疾遂愈一家皆驚異驗其所由蓋寺僕日織草履浸紅藤根水也吳少師在關外嘗得疾數月間肌肉消瘦每日飲食下咽少時腹如萬蟲攢攻且癢且痛皆以為勞瘵也張鋭是時在成都吳遣驛騎招致鋭到興元既切脈戒云明日早且忍飢勿啖一物俟鋭來為之計旦而往天方劇暑白請選一健卒趨往十里外取行路黃土一銀盂而令廚人旋治面將午乃得食才放箸取土適至於是溫酒一升投土攪其內出藥百粒進於吳飲之覺腸胃掣痛幾不堪忍急登溷鋭密使別坎一穴便掖吳以行須臾暴下如傾穢惡鬥許有馬蝗千餘宛轉盤結其半已困死吳亦憊甚扶憩竹榻上移時方餐粥一器三日而平始信去年正以夏夜出師中塗躁渴命候兵持馬盂挹澗水甫入口似有物焉未暇吐之則徑入喉矣自此遂得病鋭曰蟲入人肝脾里勢須滋生常日遇食時則聚丹田間吮咂精血飽則散處四肢苟惟知殺之而不能掃盡故無益也鋭是以請公枵腹以誘之此蟲喜酒又久不得土味乘飢畢集故一藥能洗空之耳吳大喜厚賂以金帛送之歸瀉出後宜以四物湯加黃耆煎服生血調理蔡定夫戡之子康積苦寸白為孽醫者使之碾檳榔細末取石榴東引根煎湯調服之先炙肥豬肉一大臠置口中嚼咀其津膏而勿食云此蟲惟月三日以前其頭向上可用藥攻打餘日即頭向下縱有藥皆無益蟲聞肉香咂啖之意故空群爭赴之覺胸中如萬箭攻攢是其候也然後飲前藥蔡悉如其戒不兩刻腹中雷鳴急登廁蟲下如傾命僕以杖挑撥皆聯綿成串幾長數丈尚蠕蠕能動舉而拋於溪流宿患頓愈
