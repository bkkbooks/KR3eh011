front:
  text: 序王念西先生勝國名翰林理學文章表表一時出其緒餘遊藝於岐黃之學以濟人雖未曾以專門名一家而其所施治往往奇騐夫醫自天之陰陽寒暑地之燥濕剛柔以至昆蟲草木之形質性味莫不詳而察焉其施之於人外而氣色神情內而經絡部分必先炯然昭晰而又貴識其歲氣消長子母勝復之機然後可以治病此即儒者格物致知窮理盡性之學而非可與方技同類而輕量之也準繩一書採輯精要議論曉暢門分類列綦詳且審洵醫學之金科玉律雖有謂其瘍科痘科未甚詳備者要不得以此輕議之余不知醫閒居多暇流覽之餘或間遇篤疾之人每竊取準繩之意檢方治之輒得效亦冀稍有濟於人耳蓋此書流傳足資後學法守特少善本欲校以付梓顧卷帙浩繁力有不逮遲之又久至戊戌歲立志刊木積十餘年而告成其間反覆校勘已數四矣然不敢以為無誤且往來參訂於青浦王半學茂才錢塘陸琛紫孝廉二公皆精於醫者間有舛誤無考者仍之恐失真耳噫醫豈小道哉若人在死生苦患之際為之調劑使獲安全真不啻出水火而登之袵席也念西先生濟人之心深且遠矣後之讀此書者當亦體其意而恆其心則善爾乾隆五十八年孟冬之月瘦樵程永培書於心導樓
