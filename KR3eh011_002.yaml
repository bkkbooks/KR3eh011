body:
  text: 舌卷經云邪客手少陽之絡令人喉痹舌卷口乾心煩臂外廉痛手不及頭刺手中指次指爪甲上去端如韭葉各一痏又云手少陽之筋其病支痛轉筋舌卷治在燔針劫刺以知為數以痛為輸又云厥陰絡者甚則舌卷卵上縮又云肝者筋之合也肝脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死
